front:
  text: 四分律疏飾宗義記目次卷第一本末不傳卷第二本自疏本文初至第四所被分別門卷第二末自第五釋緣多少門至受體已竟卷第三本自解律題名至十二部經釋第一辨相釋名卷第三末自第二總明體性至四波羅夷法婬戒第一卷第四本自婬戒之餘結戒六門義至盜戒第二卷第四末自殺戒第三至十三僧伽婆尸沙法有主房戒第七卷第五本自無根謗戒第八至三十尼薩耆波逸提法先解長衣戒第一卷第五末自離衣宿戒第二至迴僧戒第三十卷第六本自九十單波逸提法初戒至第五十八戒卷第六末自同第五十九戒至第二分一百七十八單波逸提法卷第七本釋受戒犍度第一卷第七末釋受戒犍度之餘別轉文四已下卷第八本自說戒犍度第二至第三分自恣犍度第四卷第八末自皮革犍度第五至瞻波犍度第十卷第九本末不傳卷第十本自尼犍度第十七至第四分雜犍度第二十如是我聞之釋卷第十末自一時釋至畢四分律疏飾宗義記目次終
