body:
  text: 藉緣門昔律師五受皆具五緣善來五者合此三四以為一緣謂假佛形并佛言教更加心境相應及言成事訖今詳此中已説內有出家善心復有佛形并佛聖教便是已顯心境相應又復佛言無落非過何因言成事訖上法五緣者一假佛教授同此章中第一緣二立誓要期三精勤苦修四三毒皆盡五盡智現前此同章中第三緣也今詳盡智已顯勤修及三毒盡也三語合此初二以為一緣謂假弟子形及三歸教二出家相具文言教令剃髮披袈裟等尊者云更加此緣好三歸依心成領前歸仗即是章中第三緣也四心境相應五言成事訖今詳亦可攝在第三歸仗緣中八敬五緣同三歸説謂一者假形及教二者相具三者有永戒心領受奉行四者相應五者事訖今詳五中相具求心之有亦好領受奉行相應事訖恐不具足是故章中改為四緣也羯磨受戒昔來所辨等者今師意存此釋已今詳四緣義雖具足若配律文似乖文相文相意云若受大戒者舉能受人也白四羯磨如法成就者此即總是四緣具足故名如法成就也得處所者稱可聖教名得處所如説如來處非處智力者處謂稱理非處即是不稱道理如來皆達不可屈伏故名為力故今此中稱教名得處所也住比丘法中者結前作法稱教名成就便得安住比丘法中又詳四緣雖言年滿身無遮難復應細尋下律文中不問十三難不名受戒故雖無難不問亦不得戒也破四緣義不合道理者非謂出妨破也但辨四緣別更立義即是破也不然之義當釋者即下略敘是也祇六緣者願律師云一年滿二十二身無遮難三結界成就四盡集五羯磨稱文六僧數滿足準祇第二似有五緣願云六緣蓋是義立也彼文云滿非二十不滿似當第一緣又云若比丘受具足時善受具足一白三羯磨當第五緣無障法當第二緣和合非別衆當第四緣滿十僧若過十當第六緣是為受戒已上祗文第三結界成就善是願律師準義立也理必有故故須加之總為頌曰二十無遮界集羯磨僧滿亦是釋八比丘義者祇律第二但有一種羯磨比丘何以乃言釋八比丘今詳疏意云汝若祇羯磨六緣亦是釋此四分律中八比丘義何如直取自部文耶非謂疏注云彼祇律有八比丘也言雖廣閙者即是首律師五緣也今來彼師五緣以為頌曰能受有五種人根清相法已上第一緣所七謂界僧十集羯時資第二緣也乞心境相應乞是第三緣也心境相應是第四緣也及言成事訖第五緣今師以四緣攝彼五緣總盡復為頌曰初攝僧十集二羯四半訖三界四能五時資乞四半釋曰言五緣者第一能受人第二有所對第三乞第四心境相應第五言成事訖且第一緣能受有五一要是人簡餘趣故二根具足文云啞聾等不得受故三身器清淨簡十三難四出家相具文言不應與俗服者受故五少分得法文言不應不與沙彌戒而受故第二所對曲復分七一結界成就祇第八云不羯磨地者不得作僧事故二僧位所攝非別人秉故三十人瞻波云若少一人非法非毗尼故文言自今已去聽十人受故四界內盡集和合文云更無方便界內別衆作羯磨故五白四教法文言息三語興羯磨故六佛法時中故心論云法滅盡時結界羯磨一切息故受不失未受不得故七資緣具足文言乃至無衣鉢不應受故第三乞戒文言不乞者不名受戒故第四心境相應文言眼醉狂人不成受戒故知心不稱境也復以文言白四羯磨不如白法作白等故知境不稱心也第五言成事訖白四具漏獨秉至頭無人呵制方成事訖今師攝彼四緣者如前頌云初攝僧十集者今師初緣云僧數滿足者攝彼昔師所對之中僧位十人盡集等三也二羯四半訖者今師第二緣云教法成就者攝彼昔師所對之中白四教法及彼第四心境相應之中境稱心此第四緣具攝四半故云四半也并攝第五言成事訖也三界者今師第三緣云結界成就界內不別衆者攝彼昔師所對之中結界成就也四能五時資乞四半者今師第四緣云年歲滿足身無遮難攝彼昔師頓受五種及所對之中佛法時中資緣具足及第三乞并第四心境相應之中心稱境也四半義準前釋四心俱得者多論第一於三性心及無心皆得如彼應知前四以心為緣者心論第四頌云隨心上中下得三品律儀故準心論立前四受必假心緣也羯磨一受文雖不列者謂八比丘中律文自釋具緣之義然文不列以心為緣也文雖不列亦要須心順心論故四緣是何緣者緣有四種一因緣二等無間緣三所緣緣四增上緣然準俱舍總攝五因以為因緣唯能作因攝為增上故今先應辨六因義後釋四緣令義易了然大乘中亦有六因名字雖同其義全別若欲廣敘恐厭繁文故且應依俱舍第六婆沙十六乃至二十一廣釋六因今當略敘俱舍頌云能作及俱有同類與相應遍行并異熟許因唯六種且辨第一能作因者舊名所作因是也俱舍頌云除自餘能作論曰一切有為唯除自體以一切法為能作因由彼生時無障住故顯宗第九一釋云因即能作名能作因此因有力能作果故雖餘因性亦能作因更無別稱如色處等總即別名此意顯持業釋也又云或此令他能有所作他能即是果能作之因名能作因此顯依主釋也除自者且如一極微色或復一剎那心正生之時除自體不以餘一切有為無為無量諸法為能作因由彼生時因法自體無障住故因謂自安住因法自相不障果生也然總辨者此中果法體狹於因因體總通為無為法果體唯局有為法故然能作因略有二種一者有力如眼望識二者無力猶如涅槃望有為法第二俱有因者舊名共有因是也自下五因體局有為且辨俱有者頌云俱有互為果如大相所相心於心隨轉論曰若法互為士用果彼法更互為俱有因此釋頌中初句也即指事云一者如大謂如四大展轉相望二者復指如相所相相謂能相生住異滅也所相即是所相色心等也生住異滅復有二種一者大相相於八法二者小相但相一法法望小相為俱有因小相於法非俱有因準此本法是小相因小相但是本法之果本法即非更互為果而亦許法望彼小相而為俱因故知頌云俱有互為果者且説多分大相望法并望小相並為俱因三者後指心於心隨轉謂心於彼心隨轉邊雖為俱因俱因之果却望於心不必一切皆為俱因如後辨也心隨轉者頌云心所二律儀彼及心諸相謂心隨轉總有三類一者心所二者定道二種律儀三者彼及心諸相彼者彼前心所及二律儀也及心者及取心王也此中舉其心所二律及心王者意欲標取此等法上大小諸相也上來爾許心隨轉法若以心王與彼為因於中須除心所二律一切小相以論文云心王但與五十八法為俱因故若以前來俱因之果却望於心為俱因者於中又除心王小相非心俱因所餘五十四法一切亦並與心為俱有因所言隨轉於心不必一切皆為俱因者此即釋竟第三同類因者舊名自分因或名自種因也頌云同類因相似自部地前生道展轉九地唯等勝為果加行生亦然聞思所成等論曰同類因者謂相似法與相似法為同類因略敘彼論指事釋云謂善五蘊與善五蘊展轉相望為同類因染汙與染汙應知亦爾無記五蘊彼有四釋一釋亦是五蘊展轉為同類因第二釋云有餘師説無覆無記五是色果四非色因此中意云為果望須或等於因或勝於因為因理須或等於果或劣於果此中若論色是色果即等於因四是也果即勝於因於此遂言五是也果既不許勝與劣為因是故必定罪色因也此即義顯四望於四既等於過故亦成因也第三釋云有餘師説五是四果色非四因此中意云四因勢報能取同類及異類果故五皆是四家之果為因勢弱唯取同類不取果類故非色是四家之因第四釋云有餘師説色與四蘊相望展轉皆不為也此中意云無記法者色心不互不遮心法四薀互因也光法師云諸論皆有四説並無評家且以後師為正授記法師云光敘正義後述餘師初釋為正今詳四蘊更互為因四釋無諍但諍色心互為因義故成四釋然二法師雖各判釋然並未違是非所以故今欲存初釋為正應破後三其義方立破云三無記心皆能發表如何乃言心非色因此即通破二四師訖又所發業與三無記為所緣緣令三無記得增長明知此表能為同類此即別破第三師訖故知初釋為正也問異熟生心不能發表理應四蘊非是色因答今總通説心為色因何用何舉異熟心難問異熟色法望異熟色同類因不答有同類因若爾俱舍第二云離異熟外無別等流如何通釋答彼意説言離異熟外無有等流別體可得不遮異熟當體之上亦有等流故婆沙十八俱舍第六並云羯剌藍位與餘十位為同類因等也言自部自地者顯有漏法部謂五部即四諦斷及修斷也謂唯自部為同類因異部相望無此因義又九地中始從欲界乃至有頂皆唯自地為同類因異地相望無此因義言前生者過現二世前生之法與現後世為同類因未來世中無此因義廣如俱舍問答成立道展轉九地者顯無漏道不隨界地是故九地展轉為因順正理第十六廣有料簡如彼應知準等勝為果者此九地道準取等果及勝果也不應加行求劣果故加行生亦然聞思所成等者謂即有漏聞思修法隨應自界準取等勝以之為果故云亦然如欲界中唯有聞思乃至無色唯有修慧唯於自界有同類因越界即無也生得善法勝劣九品皆互為因染汙亦爾異熟威儀工巧變化如其次第能與四三二一為因廣如俱舍不能繁敘第四相應因者頌云相應因決定心心所同依論曰唯心心所是相應因又云由五平等共相應義立相應因謂同一所依同一所緣同一行相同一剎那并及事等謂一受一想無有一心有二受等故云事等也所餘心法準此亦然問相應因體亦是俱有此有何別答相依行世是俱有因世中同業是相應因是則體同而義異也第五遍行因者頌曰遍行謂前遍為同地染因論曰遍行因者謂前已生遍行諸法與後同地染汙諸法為遍行因述曰謂前已生者此因亦唯過現二世與現後世為遍行因未來無故故説已生也遍行諸法者謂見苦集二部所斷七見二疑及二無明合説即是十一隨眠及此相應俱有並是遍行因體二無明者一見苦斷見疑相應及不共無明二見集斷見疑相應及不共無明問遍行因得亦是此因攝不答婆沙十八云遍行因得與遍行法不常相隨或前或後非極親近故非此因正理十六意亦同此今應略辨此因相者薩婆多宗一切有漏望因分邊名為集諦望果分邊名為苦諦此之苦集即是五部所斷法性於向十一遍行因中見及無明緣此苦集以之為境能所展轉隨增漏過正理論意説譬喻云豬入糞中豬增糞塠糞塠增豬更互相因轉增其臭此亦如是婆沙十八亦云隨緣有漏隨漸增長然五所斷雖通染淨然此十一緣淨法邊但增漏過緣染法邊不但增并與為因是故婆沙正理二論並説十一隨眠具有三義一者遍緣五部二者隨增五部三者遍與五部染法為因十一相應心心所法但具二義一者遍緣二者遍因此俱有法但有一義謂遍為因此之相應及俱有法由能助惑相從是因此因良由能增染法故為因也問同類遍行二因何別俱舍釋云此與染法為通因故同類因外更別建立此論意云遍與五部為因同類但與常部為因故不同也今應更徵即望當部二因相別云何可了正理論中雖廣分別今且理推如種子義是同類因令增盛義是遍因義第六異熟因者頌云異熟因不善及善唯有漏述曰一切有漏善惡二性皆是此因且作一釋異類熟故名為異熟異熟之因依主釋也無記劣如朽敗種不招異熟非異熟因無漏復無愛水潤故如真實種無水潤沃故此亦非能招異熟唯有有漏善惡二性為此因體上來六因同類遍行局過現世相應俱有異熟等三皆三世有能作一因通世非世即攝六因以為四緣如俱舍第七頌云説有四種緣因緣五因性等無間非後心心所已生所緣一切法增上即能作述曰謂除能作餘之五因即因緣性釋第二句訖等無間緣非阿羅漢最後心聚以其此緣作因所顯既不能引後位心生故非此緣是故但取自餘已生心心所法為此緣體何緣不許未來世有等無間緣以未來法雜亂住故此釋第三第四句訖所緣緣者即一切法隨與心聚為所緣緣增上緣者且據多分是能作因理實能作亦有因緣故婆沙百三十一云大種與所造為幾緣答因增上因謂生因依因立因持因養因增上者謂不礙生及唯無障親造四大不礙生也除親造外望餘所造但無障也又此四緣差別相者婆沙一百七云因緣者如種子法等無間緣如開避法所緣緣者如任杖法增上緣如不障礙法增上具通有力無力望所生法皆名不障也上來略辨及緣説體同義異故顯宗十一云六因四緣體雖無別而義有異復辨異云因謂能生緣能長養猶生養二母差別云云如彼復總結云此意總顯因親緣疏授記法師破此論文云豈可以緣義是疏即令因緣疏於能作因義是親而令能作親於因緣又如婆沙云增上緣者如不障者能作因中亦云不障因緣不同云云如彼今詳此破理未善成因緣自合望五因明能作復須望增上辨此即妙顯體一義殊何乃因緣難他能作而於異體對辨親疏今詳親疏於一物上有為種義及長養義以開二門故不應難又難不障亦非不異謂因不障不障果生緣義不障不障果盛故論將喻生養母殊理甚精理甚精微不應謬破問緣因若異何故婆沙十六一釋云謂前五因即是因緣能作一因是餘三緣答此據體因故云即是顯宗約義乃説親疏故無有失今應略辨一切諸法幾何因生釋曰法有四類一者染汙法二者異熟生法三者初無漏法即苦法忍初剎那心并相應俱有及得等四者三所餘法從五因生謂除異熟因也異熟生法亦五因生謂除遍行因也三所餘法從四因生雙除異熟遍行因也初無漏法從三因生即於前四復除同類次辨色法不相應行於中除法從四因生謂除異熟相應二因異熟生法亦四因生謂遍行相應二因三所餘法從三因生謂異熟遍行相應初無漏法從二因生即前三中更除同類決定無有一因生法廣釋六因如婆沙俱舍及雜心第三智度論三十五三十六然雜集第四卷中大乘六因及瑜伽顯揚唯識等論十因四緣不可繁敘次配疏中云答謂從二緣生者從因緣及增上緣生也先辨因緣如章云以有祈戒心者既攝五因為因緣體今此祈心顯與所發表無表色為同類因俱舍等論云善五蘊展轉互為同類因體前能引後若與祈心同時表等豈是同類因耶答前引後邊是同類因望俱時邊但為增上今且偏取同類因邊故無有失章云四大造者顯表無表俱從大造然四大種望所造色前已顯有生等五因亦是因緣也章云及四相者表無表上雖復具有大小四相然大相與表無表為俱有因小相於法非俱因故然表無表雖與彼小相以為俱因今欲辨章云即是因緣者上來總顯同類俱有辨能作中生等五因合為因緣次辨增上緣者章云餘僧界等是增上緣者此中且辨有力增上理實表等自體之外一切有為及無為法皆為增上皆望自體無障住故章云非餘二緣生者以非心法故者心聚諸法必具四緣且心生時要由前念心聚開避故用前念為無間緣復由所緣境界而起故用境界為所緣緣因緣增上其義易了今表無表體既是色是故必無等無間緣問前念色法亦開避後何以不立等無間緣諸論釋意云以其色法前後剎那不等生故現見前念有大取色引生後念極細少色故非等生若爾前聚心中或十大地并善法及以心王即二十一引生後念無記心聚但十大地并一心王豈非不等諸論釋意云此亦是等無有一心二受二想乃至廣説故云等也又表無表體非能緣故所緣緣決定非有章云以非心法故者應言以是色法故者好也以其非心法中無想滅定從三緣生謂四緣中但除所緣故也上來以配四緣門訖以配六因章云及二因所生謂所作業共有者即新譯中能作俱有也以表除自體外所餘一切不障生者為能作因其俱有因如緣中辨章云第二念無作應加自分因者分是因義後念法起由前自因即新譯中同類因是崇云此釋違理嶮等山川所以爾者舊云自分新名同類初念亦從同類因生如何第二始加自分如彼拾遺欲須辨之今詳法相理如崇説三羯磨前已有祈心為同類因況復亦有無表相續羯磨之前雖非戒體然能續至羯磨之後足為同類何得言無況復過去無量生前自界地法並為同類故知第二方加自分其言有失今以理通亦可無爽謂意且説鄰念體同之同類因不遮體別性同之因故理無真謂前祈心心色體別及前無表戒非別過去諸法隔越時言體別而同善性也別故並不談理實不遮也別體性同者雖得戒時節門盡智現前時得者覺云若準多論第九無間道時得盡無生智餘宗無間道時斷惑解脫道時得盡無生智今詳此言無方可救請諸後學慎勿傳之且準多宗第九無間金剛喻定唯一剎那次解脫道即得盡智若利根者起盡智時亦一剎那次起無生智或一剎那或復相續次後或起無學正見或世俗心準此得戒在盡智時非無生時也若準大乘餘可同前準盡無生體同義別無問利鈍皆證此二是則二智許同念也如上釋名門中已辨義門可準彼以非營為故無其作以道力故得無作戒者此且據其現非營為然入觀前立誓表業能發無表相續流至盡智之時名以道力為增上緣緣具名戒故謂得戒理實承前已有無表但緣未具未名為戒如上略辨智教旨歸門中亦已辨釋次辨三皈者本為具戒因談五八等也又尋上代諸師共立五種三歸一者翻邪三歸善生經意欲為受戒先合三歸翻昔邪歸外道師等二者五戒三歸三者八戒四者十戒五者具戒亦有義立菩薩三歸然瑜伽論及地持等菩薩亦以羯磨受戒泛解三歸首律師依薩婆多論勒為七門一者三歸體性二者三歸之意三者歸境寬狹四者歸境真偽立五者總別次第六者對趣差別七者漸頓得失謂漸重受得以不及顯受重得不多論第一婆沙三十四具明其義樂廣慧者任自尋之彼非難文故略不録尊者每敘故復記之更有所加者多論第一云有人趣何故優婆塞受三自歸及以沙彌乃至八戒皆受三歸何故不名受具戒耶佛言二義各異優婆塞者不止在三歸更加五戒始名優婆塞沙彌及八戒亦爾受具與此為足更無所加故言受具乃至當爾之時佛未制二百五十戒乃至八戒以是義故直受三歸得具戒也已上論文章云今解三歸結竟即發五戒引多論證云欲受五戒先受三歸三歸竟爾時已得五戒名者乃至其猶白四已為説相等為知故説然尋多論總有三釋向者章中引初釋訖次又釋云有言三歸竟説不煞戒爾時得戒能持一戒五盡持故乃至有言受五戒竟然後得戒於諸説中初説是定已上論文章中雖準多論初釋然違婆沙百二十四如彼論中評家正義云如是説者無但三歸即成近事何故兩論如此相違今詳多論譯人不善致令上代稍為謬解今準婆沙實同多論如百二十四引契經中受近事戒經文句云我某甲歸依佛法僧願尊憶持我是近事我從今日乃至命終護生歸淨已上經文論中具敘兩國師釋且健馱羅國論師意云此經文句唯願三歸自釋誓受此三歸即名近事而未得戒戒師後更説五戒相方始得戒然經文言説護生歸淨者若不護生歸非淨故此句非是顯戒相也迦濕彌羅國諸論師意云此經文句即顯三歸并顯戒相謂契經言護生歸淨者婆沙兩釋一云護生謂離煞生以此為依餘四成故於損生中煞為首故二云又護生言通於五戒以護衆生不煞盜淫妄語飲酒作此誓已亦得三歸亦得律儀方名近事次後戒師與説五相但為了知非為得戒故立義破健馱羅諸論師云無但三歸即成近事理實兩國受戒詞句同依經文但由釋經應別故不同也今詳多論三釋本意並是婆沙評家正義兩論意同實無違背且多論中初釋意顯具誦經文自誓竟時名三歸竟三歸竟已得五戒者即經文中誓護生故故得五戒第二第三兩釋本意但釋其護生之言非是違前初釋道理而譯論人妄評是非云初釋定蓋非梵本有此諍言承前已來經律論師不尋文相謬與人受不謹經文定不得戒雜心第十三亦依經文詞句云我某甲歸依佛兩足尊歸依法離欲尊歸依僧諸衆尊我是是優婆塞當證知盡壽捨衆生受歸依心清淨乃第三已上論文然百二十四引經文云護生歸淨彼論復云然有別誦言捨生者云云多釋不具録也故知經文兩本不同雜心即依捨生經本也上來推核理義善成疏中立義應更息釋疏云答此謂心期者標也以説相多少故令受者期五期十等隨心所期者釋也辭句各別者翻邪二歸及五八戒諸經論師並云我某甲歸依佛兩足尊歸依法離欲尊歸依僧衆中尊三説我某甲歸依佛竟歸依法竟歸依僧竟從今以往稱佛為師更不歸餘邪魔外道唯願三寶慈悲攝受三説南山律師受八戒云我某甲乃至歸依僧一日一夜為淨行優婆塞今詳優婆塞者正梵音云塢婆索迦翻為近事梵云塢波婆娑翻為近住兩名既別應不八戒名優婆塞故今更詳前歸依云更不歸餘邪魔等者但是翻邪論其五戒如前已引婆沙雜心經文是也八戒三歸未見文説且準五戒應言乃至願尊憶持我是近住我從今時至明清且誓修梵行十戒三歸者準下文云乃至歸依僧我今隨佛出家某甲為和上如來至真等正覺是我世尊具戒三歸準下文云乃至歸依僧今於如來所出家如來至真等正覺是我世尊多論第一問曰若受三歸或先稱法寶後稱佛者成三歸不答曰若無所曉知説不次第者自不得成三歸師自無罪亦令弟子得成三歸若有所解故倒説者得突吉羅亦不成三歸師得吉羅亦令弟子不成三歸問若稱佛及法不稱僧者成三歸不餘二句準作答曰不成三歸歸境既闕故不成也問曰若不受三歸得五戒八戒十戒不若不白四羯磨得具戒不答曰一切不得婆沙三十四云問若不受歸依而受律儀彼得律儀不有説不得有説亦得若不知法或復忘誤不受者得而授者得罪若有憍慢不受三歸但受律儀彼必不得弟子忘受師默任之故師得罪百二十四亦有兩説同前應知心論第三云或十二種或二十一種然不解釋應準多論謂由無貪善根所雜淫盜煞妄故成四戒無嗔無癡各四亦然故成十二也若由善離七支惡即二十一也多論云等論第一卷也乃可有漏不漏者就學戒説具不具者就位明也然成分學故普緣也者問若普緣境應普發戒即應沙彌已具獲得二百五十如是便違婆沙百四云近事受勤䇿律儀不捨五戒更得十戒爾時成就十五律儀勤䇿更受苾芻律儀爾時成就過二百六十五律儀論既分明言十戒位但十五至具戒位方加其數何容沙彌普緣尋發答論據十戒成沙彌性不遮普發無表此即十戒立為律儀所餘無表善而非戒設使違犯通名惡作不可即名犯戒惡作為調機器故令普學也五之與十聖不制問者準善生經受五戒時亦須撿問尊者每敘今略經意不能謹録彼云先問父母下至奴婢次白國王方求受戒戒師應問汝父母妻子奴婢國主聽不汝不負三寶及他物不汝今身中將無內外身心病耶汝不曾煞發菩提心人盜現前僧物兩舌惡口成於人於母姊妹作非法耶不於大衆中作妄語乎廣説乃至受三歸已名優婆塞優婆塞有一分多滿分謂持一戒或二四五如次是也乃至受已為説六重二十八輕準此乃是菩薩戒非小宗所明然梵網經菩薩乃有十重四十八輕不同善生也其猶和上通具不具者十戒具戒皆有和上準下律文具戒即有諸和上文十戒即無也多論所明具受方得等者多論第一卷也婆沙百二十四亦同故婆沙云契經何故安立一分少多分滿分近事答此説持位非説受位其近住戒百二十四云尊者妙音衆世説曰應言近住或全無或一二三乃至或七非要具八如是説者非全無支乃至或七得名近住近住者要具八支成實問答八戒者如彼第十二卷八戒品説問答五戒如彼第十一卷五戒品説就時者多論第一成論十二説也如億耳所見者彼律第二十五皮革法云億耳入海採寶回還經餓鬼城至夜到一樹下見有男女類貌端正著天寶冠共相娛樂夜過女滅即有狗表噉男子肉億耳問之答言我先世作屠兒迦旃延化我我言先祖常習此業何得不作遂救我云晝既屠煞應受夜戒由此今生業報如是憶耳前行更至一樹下見有男子晝日受樂廣説準前此由好淫迦延教言夜既貪淫應受晝戒具説如彼若準多論第一婆沙百二十四並會此文且婆沙云如是所説當云何通謂若不許晝夜分受如是律文當云何通答彼妙行攝非是律儀受妙行果非律儀果是以無過有餘師説是彼尊者神力化作非是真實令俱胝耳厭世間故故不須通有説亦得謂亦得分受評曰前説為善晝夜戒故今引十誦以證分受即當婆沙不正義釋然準成實第十二七善律儀品云若但一日或但一夜若半日或半夜隨能受得準此成實即許十誦正明分受也此由宗別故也俱舍十四頌云近住於晨旦下座從師受隨教説具支離嚴飾晝夜述曰要晨旦受此戒要經一日夜故婆沙百二十四云除先要期月八日等恆受齋戒彼有餘緣午前不憶食已方憶深生悔愧即請戒師如法受者亦得此戒座者要就卑座也從師受者無容自受故也隨教説者要逐師語勿前俱也具支者要具八支也離嚴飾者離憍逸故也晝夜者終晝一夜至明便捨也俱舍論主依婆沙正義造論故也羯磨竟發者古來三釋一云誦至與某甲受足具戒竟方名三羯磨竟三云誦至是事如是持方名三羯磨竟今詳初釋好也三番羯磨文句應齊故也又釋結詞偏表第三是竟分齊故如是持三所攝論云先以善心禮僧等者多論第一也一解有要期出故者那含出定必不犯性或容犯遮故須防之若爾何用性戒答非唯獨為防過受戒亦為招生十利功德故並須受多論無作望要期故得定前發者第三剎那所有無作望第三前發故今縱在餘心之中得從前發而成善性也作取當時色為體以從心故不説有作體者謂取當時造作善色以之為體此體必由現善心成既現餘心不説有作體也無作非色心故得藉前方便説有無作者體既非心故雖現在餘心之中得藉方便有善無作也若言作戒以色為體色唯無記身語口業損益者是作色者謂色本性是其無記要善惡心令身發動及起口業方成損益始是作色損是不善性違益故益是善性性順益故顯揚論云色性非善惡隨能發心假名善惡成實文亦同也若取此宗唯善心發善心得者執現律文以之為宗故云此宗也下律文云眼等不得故知要由善心發得尊者曰此未必然律文蓋據始終眼醉故云不得儻若初有善心開白後方眠醉理亦應得順多論故並以前二是俗及未滿故者以十加五以具加十此二位中並加意者以前二位一則是未俗滿故也五外方十十外方具如常所辨者如下受授漸頓門中準多論説五十具等始終位別言得三藏戒理實無三至下當知今詳多義論第一難作此釋乃是婆沙不正義也推驗多論并取婆沙正義造論此獨不正蓋是梵文根本脫漏或是譯人脫錯或造論意異也婆沙百二十四云問諸近事勤䇿律儀及勤䇿受苾芻律儀為捨前律儀得律儀不答受後律儀不捨前戒諸近事受勤䇿律儀不捨五戒更得十戒爾時成就十五律儀勤䇿苾芻相望亦爾爾時成就過二百六十五律儀有餘師説若近事受勤䇿律儀不捨五戒更得五戒爾時成就十種律儀勤䇿苾芻相望亦爾正義云如是説者不捨前戒而得後戒彼後所受非前所受相違法故又前後戒因緣各別不應相合成十數等心論一切因一切支及俱舍亦爾者梁朝真諦所翻古俱舍論二十二卷也心論第四新俱舍第十五同有此文也且依新俱舍頌云律從諸有情支因説不定述曰得戒從一切有情無少分理也支因不定者支或具七如比丘戒或唯具四如所餘戒故云不定也因中有義若無貪等三根為因是則必定具一切因若以下中上心三品為因是則三心不可俱起兩約既異復是不定然通律師引略跋律釋此三心彼是大乘非全符會不須引之但知三心勝劣不同分為三品約此三心可為四句論云或有一類住律儀者於一切有情得律儀非一切支非一切因謂以下心或中或上受近事勤䇿戒此即第一俱非句也或有一類住律儀者於一切有情得律儀由一切支非一切因謂以下心或中或上受比丘戒此即第二偈句也有或一類住律儀者於一切有情得律儀由一切支及一切因謂以三心受近事勤䇿比丘戒此即第三俱是句也或有一類住律儀者於一切有情得律儀由一切因一切支謂以三心受近事戒近住勤䇿戒此即第四偈句也今為許之總束為頌曰初約五十戒第二唯具戒第三五十具第四五八十然雜心論破俱舍師立第四句云此並盡壽八戒日夜何得成句婆沙百一十七亦然俱舍論主立第四句意者但使成句何用局取盡壽戒耶今章中意且準俱舍三四兩句並證重發也薩婆多資傳受具已嫌前心不上品更以上品心受戒不失本夏七善律儀者成實第十二七善律儀品云問曰律儀幾時可得答曰有人受一日戒是初律儀即日受優婆塞戒是第二律儀即日出家作沙彌是第三律儀即日受具足戒是第四律儀即日得禪戒是第五律儀即日得無色定是第六律儀即日得無漏是第七律儀隨得道果處得律儀而本得不失但勝者受名述曰隨得道果處者隨得四禪及無色等世間之道又得無漏出世間道及聖道果於如是等得道果處隨應即得定道律儀而本所得五戒等體今亦不失雖復不失而從勝者名比丘等而復應知但可五戒從沙彌名或復沙彌從比丘名決定不得比丘具戒從定道名也然有人言善律儀者八戒五戒十戒具戒定道二戒及斷律儀為七者彼以不尋成實論宗復以薩婆多宗無色界中無有律儀律儀是色彼無色故故除第六無色律儀也此不應理今依成實無表既以非色非心為其體性故無色界亦有律儀勿以薩婆多宗而合成實亦同彼義三皈羯磨此二須結者崇云除羯磨外餘並無結遂破此疏中義云前三能發戒後三結義成説後戒方生那得名為結今詳結者結成歸詞本不欲結得戒已竟若爾者何以文言歸佛竟等竟言即是結成義故三歸俱説者復有疏本云三歸具説今詳二義俱可理通且俱説者意顯三歸師弟俱説豈可羯磨亦師弟俱説耶或具者三歸結詞牒前説羯磨結詞豈具牒遮難緣與方有教授者差威儀師教授也八敬前後者下尼犍度佛告阿難今為女人制八盡形不可過法若能行者即是受戒説八相訖文中復云如是阿難我今説此八不可過法若女人行者即是受戒第二犯廣方説相者所為受人是當第二能受僧亦是犯略也如文可知者下文受已衆僧捨去彼即還與故二行非僧遂問言何故在後彼即具白僧遂呵擯彼便語僧應先語我我當不作因此遂制受已説相後令新受戒人在前而去第七受捨漸頓門問若一時受得三種戒者並依多論第一問答也不破威儀者通律師兩釋一云直受具戒於五戒十戒威儀法式咸悉不知人解十戒制令分學既闕分學多破威儀今詳威儀是軌則義然舊譯人多言威儀此謂破受戒之軌則也衆生得道時異者多論第一復次衆生應受五戒而得道果受十戒亦爾婆沙百二十四云問若先不受近事律儀便受勤䇿律儀得勤䇿律儀不有説不得以彼與此為門為依為加行故有説不定若不了知信戒師故受者得戒戒師罪若彼了知先受近事律儀後受勤䇿律儀是正儀式但為憍慢故不欲受近事律儀作如是言何用受此近事劣戒彼慢纏心雖受不得乃至不受勤䇿律儀受苾芻律儀廣説亦爾下文那羅陀解龍王偈先受五戒後始出家耶輸伽文已有五戒者佛初成道度耶輸伽其文為受五戒八年之後方止三歸豈可八年之中無有一人受五戒已後方三歸受具戒耶俱舍十五頌曰捨別解調伏由故捨命終及二形俱生斷善根夜盡述曰夜盡者八戒也總有五捨雜心論頌中雖無夜盡長行亦有也依俱舍釋四捨云作法捨者與受相違表業生故命終捨者所依故斷善者所因斷故二形者所依變故八戒者過期限故問瑜伽論説三聚淨戒中律儀戒者即是七衆所受律儀若爾菩薩應有命終捨答捨亦無失義準上諸部同異門中辨五種不位戒釋之犯重捨者論主不存者通律師曰舍利弗阿毗曇立犯重捨及法滅盡時捨雜心論主不存今詳舍利弗論元無此文又舍利弗法輪大將儻若立義誰復敢違然不存者心論云有説犯初衆罪名捨律儀此則不然若言捨者犯已還俗應得出家已捨戒故佛言非比丘者以非第一義比丘故此説無過謂於別解脫猶名比丘於無漏戒非是比丘又持律者云法滅時捨阿毗曇者云法沒盡時先受不捨未曾得者更受不得廣説如彼故知通律師無憑妄判婆沙百一十七亦立四捨義意同此俱舍十五亦敘薩婆多宗不立犯重捨乃至云非比丘者依勝説世親破云此言凶勃凶勃者何謂於世尊了義所説以別義釋令成不了與多煩惱者作犯重罪緣寧知此言是了義説由律自釋謂非白四羯磨比丘故知此言是了義説廣説如彼瑜伽五十三立五捨加犯重捨涅槃第三十五四種比丘一者畢竟到道斷二障盡名畢竟到二者示道能以正法示人令學三者受道領受聖道在身中故四者污道犯重戒者婆沙六十六云準陀經中亦作是説沙門有四無有第五一者勝道沙門二者示道三者命道四者汙道當知此中勝道沙門謂佛世尊自能覺故一切獨覺應知亦然中自覺故其道最勝示道沙門謂尊者舍利子無等雙故大法將故常能隨佛轉法輪故一切無學聲應知亦爾無學之人自行已辦但應度人命道沙門者謂尊者阿難阿難居學地而同無學多聞聞持具淨戒禁一切有學應知亦然謂有學人身中聖道猶應漸長如命增長故云命道污道沙門者謂莫喝落迦苾芻喜盜他財物等是莫喝落迦此云大愚鈍者舊云摩訶羅也瑜伽二十九云一勝道二説道三活道四壞道當知諸善逝名勝道沙門簡獨覺故不同婆沙也然可義同涅槃畢竟到道諸説正法者名説道沙門此通凡夫及菩薩等不同婆沙也涅槃示道可得同此諸修善行者名活道沙門堪生聖道名之為活此通凡不同婆沙也涅槃受道可同此也諸邪行者名壞道沙門邪行者身語意業三邪行也此同上經論汙道又學無學名勝道壞滅一切見修惑故此不同婆沙及涅槃也諸聲聞衆持三藏者名説道沙門唯顯聲聞若諸異生為觸未觸為證未證勤修加行堪能觸證名活道沙門由彼現有諸善法𤏙能生長聖慧命根名活非死此顯學聲聞行者也壞道可知廣説如彼近法師以修思聞三慧逆配前三沙門第四污道如常可知十輪第五亦釋四種四種比丘不能煩敘捨法十九者下文淫戒中具有明文今為頌曰捨三寶二師同梵戒律學受家人塞彌外子非沙釋上兩句厭上下兩句欣下無四災患者一羸二捨三變根為二形四斷善也故多論第二云問曰七種戒幾戒羸幾不羸捨根變斷善作問亦爾答曰一戒羸六戒不羸捨根變斷善作答亦爾一戒者所謂白四羯磨也已上論文念處已前具足四捨者謂見道前有七方便一五停心觀二別相念處三總相念處四燸五頂六忍七世第一法今言念處已前者即第三方便已前也具足四捨者命終捨可知有餘三捨觀行力微容可退敗戒作法捨及斷善二形也若爾入燸等位豈不亦退斷善二形及捨耶且如婆沙第七云問起順決擇分更可受扇𢮎半擇迦無形二形不答更可受唯燸頂非餘謂退燸頂或命終後更受二根等也然諸論説前三善根如別解脫命終時捨初二善根復退捨也忍必不退又俱舍二十三云若得燸法有退斷善根造無間業準此等文既許斷善及二形生復應亦有命終及捨何故俱言念處已前具足四捨答且就過重云已前有而實不遮燸頂亦有四捨也四現忍已去是色界法無二根故者謂觀四諦現前忍可生燸等注名四現忍也是色界法無二根故者問此言無二根為據縱退亦無二根若據不退應同多論無四災患何獨二根若據縱退無二根者便違婆沙第七卷説𤏙頂容退受二根身如何會釋今解釋章中據不退説所言無二根者無者違也何故説此是色界界法以其違二根故也謂二根生本由貪欲故色界法必違二根若爾色界之法亦違斷善何故不説答二根貪欲決是色界敵對所違斷善耶見但續即違非是要須色界法違故不説也上來章中且是總顯色界之法違於二形復應別辨一一善根各無何捨故次章云然燸頂之中無二形一此則且顯二位之中敵對所違也此位既非正違斷善及作法故捨隱不説無斷善等若爾忍位亦非正違斷善何故章中次至忍位除其斷善謂如章云忍心二除二形斷善忍心二者此有二釋一云忍心有二種捨一故捨二命終捨一云忍心二者即所除二形及斷善二也答忍位除斷善者顯前燸頂容退斷善今此忍位決定無有退而斷善有此殊勝故須別説若準俱舍二十三頂位雖退亦不斷善故彼頌云燸必至涅槃頂終不斷善忍不墮惡趣第一入離生長行意云若得𤏙法雖有退善根造無間業墮惡趣等而無久流轉必至涅槃若得頂法雖有退及造無間業而畢竟不斷善根雜心第七義亦同此人準涅槃第三十六𤏙位即能不斷善根婆沙第六一説亦同涅槃也準此經論今此章中至於忍位方除斷善便是太遲然意欲顯不退斷善至忍方説也以前二位俱容退故又準忍位應無厭捨望欲供養容故捨具如均提沙彌為供養師誓作沙彌況於忍位也世第一法及見諦不捨者正在觀位無作法捨必入聖故無斷善捨不受惡身故無二形前忍位中尚無斷善二形況今世世第一法無命終者先來釋云既一剎那以時促故無容命終若爾見道十五剎那應有命終故今解者由法爾力必須入聖故不命終又上品忍亦一剎那即準俱舍第二十三上忍已得於第八有不生法故亦法爾力無容命終必須入聖故也若依多論四現忍亦唯命終者前來就顯故以四捨別別配之今依多論就盡理説故若不退四種善根決定於中無有三捨已生戒善者未捨已前戒家作用也一者戒法二者戒業者戒法即是無表體也戒業即是取果與果功能也謂後無表雖斷不續而前已生入過去者猶得在身耶果與果功能不失也若語得果捨業不失法者謂別解脫感欲界果若得不還阿羅漢果決定不於欲界受生故合別解雖不失體名不失法而決定失與果功能名為捨業也然準大乘預流已去不造新業即初二果在凡位先得戒者具有牽引圓滿二業感欲界生若得聖後方受戒者但可發得圓滿業體無牽引業以不造故若準小宗許造新業亦具二業自餘凡夫準而可解故有得得者因此略辨得捨之體且為四門一釋名二辨體三差別四相須且釋名者有情身中創初獲法名之為得後相續獲名為成就雖復得獲及與成就體性實同且分別相作如是釋若有情身創失之法名之為捨後復續捨名不成就雖復非得及不成就若失若捨體性實同亦且辨別作如是次辨體者經部大乘離色心外無別有體且如根境色等諸法及諸心所等法自身所攝即名為得失捨之後即名非得離色心外無別實體若薩婆多離色心外有別實物即是非色非心不相應行五蘊之中行蘊所攝大乘蘊攝亦是同但是假法次辨差別者大乘差別無暇分別且依薩婆多毗婆沙百五十八云能得有四一者法前得二者法俱得三者法後得四者無為得然諸無為既不隨世故不可説法前後俱也所得有六一者有所得法唯有俱得如異熟生二者有所得法唯有前得如三類智邊世俗智等三有所得法唯有俱後如別解脫戒等四有所得法唯有前俱如道類智忍等五有所得法具有前俱後得如所餘善染等法六有所得法不可説有前後及俱而許有得如擇滅決定無有唯法後得問論家何意立此六類答有為法中勢力有三謂上中下且上品法理應具有前後俱得而今上品分為三類一者唯有前得由是上品故有前得但由緣闕畢竟不生既不流入現在過去故無俱得及以後得儻若流入則應具三也二者唯有前及俱得亦是上品但由後念必定捨故故無後得儻若未捨理亦應有三者具有前俱後三義可準知次中品法唯有俱後次下品法唯獨有俱并無為得故成六類也次辨非得者望有為一者唯有法前非得如入涅槃時最後剎那諸蘊二者具有法前後三者無為非得廣如婆沙必無唯有法後非得亦決定無法俱非得亦決定如理應思四辨相須者問由獲所得故言有得此得復由誰獲故得得復有得應成無窮婆沙百五十八評家釋云如是説者一剎那中但有三法一彼法二得三得得即由得故成就彼法及成就得得復由得得故成就得更互相得故非無窮準此且辨法俱得等若準俱舍第四通法俱後以辨其相故彼云一一自體初生起時并其自體三法俱起如婆沙準知第二剎那六法俱起謂三法得及三得得第三剎那所生諸法有九法得及九得得如是諸得後後轉增無對礙故互相容受若不爾者一有情得虗空不容況第二等雜心十三亦釋得義應知校量優劣門多坐作法者謂於三洲同於一時各別集僧為人受戒也自外三受中間即止又局閻浮者並據多論第二説也若據前來自所立義上法容通末代亦遍他方又三歸者因賓頭盧取木鉢故佛償令往東西兩洲然未委知八年前償為在後耶首律師云百一十羅漢遊方度人賓頭無名故知三歸不通餘二天下通律師云文中直列百一十人本不説名何妨賓頭即在其數然依多論局閻浮也受體所因之戒者教為能因戒為所因也方便身口乃至心論作者身動身方便者婆沙百一十三問何故名業有一師釋云復有説者由三義故説名為業一有作用故二有行動故三有造作故有作用者即是語業如是評論我當如是如是所作有行動者即是身業雖實無動如往餘方有造作者即是意業造作前二由此義故説名為業已上論文而無評家今此心論取此即釋依相續假所以言動據實有為剎那剎那生已即滅無動轉義故俱舍十三頌身表許別形非行動為體長行中云論曰由思力故別起如是如是身形名身表業有餘部説動名身表以身動時由業動故為破此故説非行動以一切有為皆有剎那故乃至若此處生即此處滅無容從此轉至餘方故不可言動名身表述曰既言餘部有實行動不破婆沙假行動也若爾多宗業豈是假答若論尅性剎那剎那實色為體今談其相故舉行動亦無有失然作無作或名教無教新翻經論名表無表釋此名者謂善思等等起身語表彰善惡故名為表言無表者俱舍第一云無表雖以色業為性如有表業而非表示令他了知故名無表述曰無表色性雖同表業無所表示故名無表教者教是示義準表等釋作無作者作即作動義稍疏僻新譯改之就表無表也與餘識俱者無記心等名之為餘也心識名異體同也穢污無記者先辨穢污新譯經論名為染污染污即通不善及有覆無記也次辨無記者唯無覆無記也調伏心智者問經文也善生第七又復戒者名學學調伏心智慧諸根是故名學已上具足經文也謂調伏心離貪欲故調伏智慧離無明故調伏諸根善防護故防護即顯根律儀也義用得名者且總辨者法體是義法業是用也配疏應知是故從用立名稱之為戒者彼經句句皆言戒者名制又戒者名上等而此戒者並是用名五之別名通義通用如章自配即彼剎那無作有七種名者若準婆沙百一十二作及無作俱有七名故彼文云此中根本七善業道若表及此剎那無表各具七義一尸羅二妙行三律儀四別解脫律儀六業七業道心論第十三頌云律儀妙行業道初解脫説業及尸羅如是七種名章引論云一切惡戒對治故名律儀者正以對治釋律儀名以其律儀是防護義故俱舍云能防身語故名律儀章云二防護惡戒故入七衆故名波羅提木叉律儀者雜心文無一二等數而今疏主以義加之此中既名木叉律律儀復須以防護釋也又章云防護惡戒者已下是疏主釋非論文也又言不為惡衆所縛者且就一相然俱舍云初表無表別別棄捨種種惡故依初別捨立別脫名故知心論入七衆者意顯戒方入七衆創受即能別別棄捨故名別脫章云三於一切衆生所得故善作故名為妙行者簡異外道百由旬內而得律儀今則不然故成妙行故俱舍云智者稱揚故名妙行四得愛果故思願道故名為業道者道是通義通生愛果故名業道故唯識論云通生苦樂異熱果故名為業道又復道是所遊履義即身語色是思所履故云思願道故五最初隨順解脫故名婆羅提木叉者以其木叉依初棄捨而立名故六作所起故名業者俱舍難云豈不無表亦名不作如何今説所作自體答不造諸惡故名不作表思所造得所作名此意説云亦得名作亦名不作也七名尸羅者淳善不害心起故者論文云尸羅者淳善義不害心起故述曰以淳善義正釋尸羅由行淳善謂由不害心起故俱舍云能平嶮業故名尸羅俱舍十四亦有七名崇云六名者違婆沙百十三依數列七亦違雜心論偈云如是七種名也第三羯磨一剎那者此門所引並心論第四説也根本業無作或復説者作彼論云前七業道定有無作邪淫定有作以自究竟故餘業道不定若自作若使他一向闕作故頌中云或也問今釋戒義何故引不善業道耶彼論次又釋云捨不善業道方便即是善業道方便捨根本捨後起亦爾問此事云何答沙彌受具及至白二皆是方便第三剎那作及無作根本業道如疏引是也俱舍十六婆沙百一十三亦同多論初念等第一卷論也以道力故者增上緣力也三聚分別者一色聚二心聚三非色非心不相應聚也若開心聚以之為二應言四聚開二者謂心聚及心所有聚也復加無為即成五聚出體出體之法如初卷記心及四相不相應等者心是同類因也四相即不相應持業釋也及無作假色者雜心論第一卷偈云十種謂色入及無作假色是分別色陰牟尼之所説述曰彼論意辨色陰總有十一種色於中十種即是五根及以五境皆是色體十入所取故云十種謂色入也及無作假色者準薩婆多無作是實而今言假是彼論師別意建立何以知然且如婆沙百二十七大造納息云尊者法救説離大種有別造色説心所法非即是心然説色中二非實有謂所造觸及法處色雜心論主雖即非是婆沙法救然亦名為法救論師其所造論往往遵承婆沙法救且如心論第十二云尊者説曰注中云此達磨多羅以古昔達磨多羅為尊者達磨多羅此云法救準此應知雜心論主亦立法處無表色體以之為假然婆沙中法救論師者即婆沙七十七須正理五十二俱舍第二十并云薩婆多宗有四大論師之一數也第三色聚中三色分別者應了知一切諸法三科攝盡一者十二處一眼二耳三鼻四舌五身已上即名五色根也六意此上六種即是內六根也七色八聲九香十味十一觸已上五種即五色境也十二法此上六種即外六境也言十二處者俱舍釋云心心所法生長門義名之為處舊名十二入者即心心所流入根境義也然法處中有四種法一無表二諸心所三不相應四無為法二者十八界一眼界二耳界三鼻界四舌界五身界已上五色根六意界此一即以心躰為性也此上即內六根也七眼識界八耳識界九鼻識界十舌識界十一身識界十二意識界此上六識並心為體此即於前意所之中離出心也此六界並前意界合名七心界也十三界十四聲界十五香界十六味界十七觸界此上外五境也十八法界此法界亦有四類準前法處釋之所言界者是種族義謂一切法合有十八族差別也三者五薀一色薀即五色根并五色境及法處法界中無表也二受薀三想薀此二即法處法界中諸心所內別立此二為薀也四行薀即法處法界中諸心所內除受想已取餘心所及不相應為此薀也五色薀即十二處中意處及十八界中七心界也上來三科於界處門取五色根及五色境并法界法處中無表立為三色於中雖有聲香等異通相為言皆是色聚即此亦是色薀所收如向已辨言三色者章云一可見有對色謂色入新名有色有見有對是也俱舍略釋云以可示現此彼差別故名有見即當舊名可見義也極微聚故相對礙故名為有對體即是色名為有色章云色入即十二入中色入也二不可見有對色謂二不可見有對色謂五根四塵舊名五塵新名五境今言四塵謂於五中除色塵也即此四塵及五境根總名不可見有對色新名有色無見有對俱舍意云不可示現此彼差別故名無見極微聚及互相對故名有對也三不可見無對色謂法入中無作法入中説有四類今除三類但取無表名為不可見無對色也新名有色無見無對無見者準前釋之無對者非極微聚不相對礙故名無對然體是色故名有色若言作戒前二色收身語三表體即色聲故是前二色收也以無作法入法界中攝是故非三有對者問心所雖是法入中攝而是境界所緣有對故知不由是法處故即非有對答心所雖具二有對義而非具三故亦得名非三有對或可即依俱舍論釋非極微聚名為無對章疏之言何煩苦救三有對義此應廣説者俱舍第二云對是礙義此復三種障礙境界所緣異故一障礙有對二境界有對三所緣有對礙有二種一者對礙如障礙有對也二者拘礙如餘二種也障礙有對謂十色處自於他處被礙不生如手礙手或石礙石或二相礙此即五根及五色境既是微聚故一微聚無第二聚互相障故故雜心第一云若彼有一則無第二極微故據處故述曰障礙即有對持業釋也境界有對謂十二界法界一分諸有境法於色等境六根六識為十二界也法界一分者四類之中除諸三類但聚心所故云一分此中心所隨應與前六識相應後依六根能取色等六種境界即是境界之有對依主釋也各有自境以為所對故名有對也俱舍云如施設論云有眼於水有礙非陸如魚等眼有眼於陸有礙非水多分如人等有眼俱礙如畢舍遮等有眼俱非礙非晝如蝙蝠鵂等於晝非夜多分如人等有眼與礙如狗野干及貓狸等有非者除前相所緣有對謂心心所於自所緣心者即七心界也心所者即法界中心所也此心心所隨其所應於自所緣有拘礙義即是所緣之有對依主釋也境界所緣復有何別此難意云五種色根能取境界名為境界有對既非緣慮故非所緣有對其義易知然論境界所緣有對二門並言以七心界及諸心所而為體性是則境界所緣有對應無差別若於彼法此有功能即説彼為此法境界心心所法執彼而起彼於心等名為所緣若於彼法者彼色等境也此有功能者此十二界一分有取境一功能也即説彼為此法境界者説彼色等是此十二界法界一分之境界也總相意者取境功能即立名為境界有對猶如燈炎有燒炷功能也心心所法執彼而起者執彼色等境界而起也謂憑境力心方生總相意者自由他生即立名為所緣有對猶如燈炎藉炷已生也亦如羸人杖力故起也名為所緣者境名所緣也所緣之有對依主釋也此文分明自辨異已光法師等浪為多釋云何眼等於自境界所緣轉時説名有礙此即雙問二種有對云何名有拘礙越彼於餘此不轉故此答意云且如眼識越彼色境於餘聲等即不得轉故有拘礙此即第一釋也或復礙者是和會義謂眼等法於自境界及自所緣和會轉故且如眼根於自色境和會而轉而終不於他聲等和會也此第二釋礙義也問若法境界有對亦障礙有對耶應作四句謂七心界法界一分諸相應法是第一句此謂是境界有對非障礙有對也色等五境是第二句此謂是障礙有對非境界有對也眼等五根是第三句此即俱是句也法界一分非相應法是第四句法界中有四類除諸心所自餘三類名非相應法也若法境界有對亦所緣有對耶此以境界問所緣也應順後句此舉答法也謂若法互有寬狹應四句答且如境界望障礙邊境界或寬通心色法或復是狹不通五境障礙或寬通取五根及五色境或復是狹局色非心故成四句也今將境界即亦所緣耶若是所緣耶應順後句述成其事故云順後句也若將狹法以問寬者應順前句及境應知謂若所緣有對定是境界有對此正順成問事後句也有雖境界有對而非所緣有對謂眼等五根此正違於問中前句以顯順後義也準此亦應名為違前句也上來謹依俱舍論釋三有對訖若廣分別如順正理第四及婆沙七十六并顯宗等不能繁敘今言無表既不取境故非境界及以所緣又非極微所積集色故非障礙故云無作非三有對也非餘八色者內五色根外五色境名十色處於中既除色聲兩處故餘八色即是五根及香味觸也此作無作但是色陰者以其色薀攝十一色故作無作於薀門中並色所收第四就色聲中報方便分別者舊譯名報新名異熟報謂酬宿業故言異熟者亦是酬報而由此報異時而熟名為異熟謂造業時異得果時異類而熟名為異熟因是善惡果是無記故名異類變異而熟名為異熟謂所造業至得果時由變異故能令異熟舊名方便新名加行方法巧便令事得成故名方便新名加行者行是造加心造作名為加行二相既分次配疏意疏云作者身動身方便者若其不欲加心造作既任本性故名報色今既加心造作營事故今身動身成方便故俱舍云由思力故別報如是如是身形名身表業口作唯方便者如俱舍云語表即言聲聲體一向非是報法故俱舍第二云聲無異熟生隨欲轉故婆沙百一十八云有説聲是現在加行所發異熟果是先業所發有説聲隨欲轉非異熟法可隨欲轉復有説者聲有間斷異熟色無間斷是故聲非異熟若依犢子部聲亦異熟故彼宗中引施設足論云菩薩昔餘生中離粗惡語此業究竟得梵音聲故知聲是異熟具敘如婆沙百一十八報與方便亦一亦異者諸宗不同且如薩婆多宗若起內思動異熟身即於身中別有大種造身表業故依彼宗一向是異不得言一也若依成實宗説色性非善惡隨能發心假名善惡方可説為非一非異謂若任性如本而住名為報色若由內心鼓動造作名為方便二義既別故名異然鼓動時於報身外無別大種造身表業故復是一大乘宗義亦可同此方便現起體通三性者善惡二性其相易知言無記者四無記中三無記心能發表業除異熟心其異熟心不能發表具如婆沙百一十七然無記唯能發表不發無表也身口無二無作非報非方便已下二釋初釋引經證成非報非方便義如疏易知次釋唯依道理成立章中意云作既方便非報其無作體異於作體豈得更是報及方便作此釋訖次破前引經妄證故云然彼經文未必證成非報非方便也因此遂作別義釋經也如章意云作與無作若受若隨及處中位各各具有然於其中一切作體皆名為因一切無作皆名為果果因既異故云異色經中欲取受中無作是故簡却所餘異色因及異色因果也尋疏可知言處中者至下受隨同異門辨之疏意且然應求別理且如崇云諸釋雖復各逞異端終乖聖旨夫方便者須對根本論之何得方便對報分別今詳方便自有多門一者加心造作發身語業亦名方便如前已辨此即無間加行根本及後報業皆名加行舊名方便是也故婆沙百一十八云煞生後起亦名加行二者加行根本後報三者聞思修慧亦名加行既有此三今辨發業何用對彼根本分別又崇云古舊引經深成謬亂不識旨歸雜亂抄引又云倒寫連理教又云問舊解既非何繁序別答若不剖折熟知是非指事再明息諸野論又云依前重寫恐誤後人又云故今依文聊申正解夫身語業由心故起言非異色因者謂無受戒善心色因非彼惡無記因故言非異色因不作異色因果者謂但感得自類善果必不能招惡無記果既於自類因果性成一得在身相續隨轉隨轉不絶是無作色故言不作異色因果以此解經冀無違失今詳若言受戒善心非惡無記因故言非異色因者此則通於發表業心但感自類必不能招惡無記果此亦通於所發表業何理能顯相續隨轉而成無表故此復應更求別理今尋涅槃第三十四説佛滅後諸弟子輩廣興諍論有二十四雙今所引者當第十三如彼文言善男子往昔一時菩提王子作如是言若有比丘護持禁戒若發惡心當知是時失比丘戒我時語言菩提王子戒有七種七支是也從於身口有無作色從身口表發無表也以是無作色因緣故其心雖在惡無記中不名失戒猶名持戒此答不失戒所由訖以何因緣名無作色此問何緣名無作色不復更問不失戒義以佛前番答訖故也非異色因不作異色因果正釋無作名義也如後辨善男子我諸弟子聞是説已不解我意唱言佛説有無作色善男子我於餘經作如是言戒者即是遮制惡法若不作惡是名持戒我諸弟子聞是説已不解我意唱言如來決定宣説無無作色述曰言非異色因不作異色因果者謂非異我色身之外而成因性此顯無表雖無表示然隨自身也不作異色因果者不作異我色身之外因緣家之果此顯感果亦隨自身果既不亡明知別有無表色體此亦簡彼外道妄計離我身外梵王為因能感愛果等也更有別釋如破述記即向初色有二十種者前十二種名為顯色一青二黃三赤四白五影六光七明八暗九煙十雲十一霧十二塵次有八種名為形色如章所辨如初卷説釋之三聲者一因受四大聲新譯名為執受大種為因聲也謂心心所執受四大以為所依故云執受大種也以此為擊發生聲故云為因也二因不受四大聲新名無執受大種為因聲謂風鈴等無心心所之所執受三因俱聲新名有執受及無執受大種為因聲如手鼓等合所生聲俱舍論第一世親破云如不許一顯色極微二四大造聲亦應爾順正理第一云雖有執受與無執受二四大種共相扣擊而俱為因各別發聲雖生二聲而相映集隨取一種其差別相不易可知謂耳識隨想者先取又正理意不立三聲以因俱聲不異前二故如彼應知前兩不如亦應發戒者今亦及難前既已發後應無用故應解云以前兩番資成三辨不可即令初已後戒亦可唯局第三不妨而得口業之體此即互造者婆沙百一十八云頗有非身作而得煞生罪耶答有謂遣煞頗有不發語而得虗誑語罪耶答有謂身表頗有非身作不發語而得二罪耶答有謂仙人意憒及布灑他時默然表淨準彼惡業既許互造善業翻此亦應互造問語業即聲現既無聲如何互造答薩婆多宗身中無有無聲之時又婆沙百二十二云然表依身而起有依一分如彈指舉足等一分動轉作善惡業有依具分如禮佛逐怨等舉身運動作善惡業此中隨所依身極微數量表業亦爾如表數量無表數量亦爾此顯身表百二十七云問諸有情類口所發聲當言何處大種所造有説喉邊大種所造有説心邊大種所造有説臍大種所造評曰總説此聲一切身支大種所造若別説者輕小語聲應言喉邊大種所叱吒哮吼號叨等聲應言遍身大種所造現見此等舉身掉動故此顯語表又百三十二云律儀所攝復有七種如是七支各四大造此復有二謂表無表評家正義表與無表復各大造準此等文身造語業亦發語表非謂但發語無表也以其文言如表數量無表三亦然身表三支如何得發語四無表若爾何故諸論教人煞盜俱有無表答正根本位可唯無表於加行位教人之時令身變異亦有身表故婆沙百二十二評家義云加行位中決定有表無表不定即準此義儻以身業表成語業正身表時亦令身中有語表生若以現今無語聲故便執定無語表業者亦應婆沙非非身作不發語而得二罪應無語表若無語表豈可從意直發無表若許從意直發無表即應名為隨心轉攝崇云第三剎那許無語表有何過耶者理甚不通是故論云已知無作非心者彼成實論第九卷無作品云意無律儀所以者何若人在不善心無記心若無心亦名持戒故知爾時有無作不善律儀亦如是此即顯戒定非是心續次云問云已知無作悲等如疏應知以色等五法是無記者謂色聲香味觸五也若準薩婆多色聲二處通於三性五根三境局是無記今成實宗色性非善惡隨能發心假名善惡故云色等五法是無記也又色等是惱壞性者謂以手等觸色等時令其變壞也但作戒者取文不定者謂諸師取成實文不定也即此疏中敘三師釋色心二法為體次釋局心為體後釋唯色為體即引論云身口業依止四大等然彼宗意色香味觸有堅濕等即成四大四大體性雖是無記若令動發即名善惡故使身業四大為體口業者準論雖言依止四大四大出聲聲方是業尋疏當知今詳三釋並可存之然疏主意欲存後釋且辨俱存者謂若假實俱説為業即取初釋若唯實業即取中釋若唯假業即取後釋故使論文三處不同也彼宗實業以思為體思即是心故即以心為三業體色性無記由心發動假相名業是故説色以之為業是法名聲性法入所攝者意顯名句十二入中雖是法入然論實性體即是聲但由法相假實殊門故分聲法二入也謂一剎那實聲之中無名句字要須相續屈曲成名既是離聲無別體性故是假也破外人義思與心同時別體者謂成實師故破薩婆心王心所雖同一聚各有別體而共相應大乘立義同薩婆多今即破云離心無思謂心王無別心所中思也心未必思者了境名心造作名思故也色即無記色陰攝作戒善惡性行陰收者作戒既許色法為體成實論宗乃至諸宗曾無色法是行陰攝故此問答甚違正理宜應廢之若據實業作義戒理應用思為體方可名為行陰所攝此復與色條然各別應言不即理非不離也亦可難意云作戒是善惡性應是行陰收更加應字即成難詞也如似四相即於色心者謂成實宗離色心外無有別物名為生住異滅等相大乘亦同成實宗中命根亦是離色心外無別體也然青黃等者青等顯色實非業體容依形色而起相從俱説也俱以遠從要期生故並有二業之體者理恐不然若談無表可從遠生而談語表許從遠生應入惡心無記心等亦應許有語表業此起則與彼無表何別故依後釋身能造口謂即以身表成口業此宗色聲既是假業故互造義道理易為也無作三時者疏主依義作此解釋非論文也果時無作無作有二者其實體一而義有二現同剎那名曰作俱復能引起後後諸念復名形俱若依此宗似先後發者準成實論第九無作品云問曰幾時從作生無作答曰從第二心生隨善惡心強則能久住若心弱則不久住如受一日戒則住一日如受盡形住已上論文疏意釋云第二心生者第二念生也念即是心故也論雖如是理稍難通若詳第三羯磨竟時但有作義後念方生無作戒者即應許有律儀善行不受而得故知理擁也又善生經者善生第六云初發心異遠因心也方便心異近因心也作時心異正起身表業也説時心異正起語表業也衆緣和合故得名作以作因緣生於無此顯無作從作而生如威儀異其心亦異謂受戒竟改威儀時其心亦異不可壞故名為無作謂雖改心而戒不壞從此作法得無作已心雖在善不善無記所作諸業無有漏失謂從壇場作法而生無作也疏録經意非謹寫文又詳經意以作因緣生無作者同時因果亦是相生何能正證無作先後又詳成實第二心生者應顯第二念已去唯無表生不遮初念同時無表以其表業色法為體為無表者非色非心二體既殊何妨同念楯者傍牌是也無作多種者古來諸德搜尋經論纂集為九或為七種非有論文作此説也一者作俱即顯無作與作同時故心論云第三羯磨竟作及無作二者事在如造佛像塔寺橋船此事在時常能生福婆沙百二十二云或造佛像寧持婆乃至造井橋船階道處等此諸表業所發無表具有三緣相續不斷一由意樂謂緣彼事深生歡喜意樂不息二由所依謂所依身同分相續命未終位三由事物謂所修建佛像等事未都壞滅如是三緣隨闕一種無表便斷成論十二九業品心論第四並同此也三者從用者成論第十一卷三障品云食檀越食著檀越衣入無量定而此檀越得無量福慈悲喜捨四無量定四者異緣者如上受緣開合釋五者心俱者定道律儀隨心轉故六者願俱者成論十二九業品云若人發願願我當要布施若起塔寺是人定得無作述曰問與前事在有何異耶答前現作事非但發心今從發心即生無表依此應言若是事在必是願俱有是願俱而非事在謂已發心而未作事七者要期者疏自釋云如日夜乃處中要期等日夜謂八戒也處中有善及有不善謂雖善業非是律儀或雖惡業非是惡戒既處中庸故云處中通律師云善非淳淨心惡非深厚纏未曉其義故作是説且如有善唯利一人雖非律儀容心極猛豈得名為善非淳淨也惡準此知問此與願俱有何差別答現作當作通名願俱要期唯局現作亦應説言若是要期必是願俱而有願俱非是要期謂擬當作是也八者助緣者遣他作業成自業是也九者形俱可知前六局隨者不然作俱亦應通在受中處中隨作業者處中亦許有隨行也且如要期百日禮誦是名中日未滿來隨作禮誦無作復起隨用者即前從用是也互緣者諸師皆云即異緣是今解不同如上受緣開中辨也不異前七者助緣若受即形俱要期中攝若隨即所餘攝互緣亦爾故言不異同義有三者同名無作二者或色為體或非色非心三者義同謂同防非離惡義也羅漢成就下戒者心論第四云雖復阿羅漢猶成就下戒婆沙百一十七問有新學苾芻成就上品律儀而阿羅漢成下品律儀耶答有謂有新學苾芻以上品心起有表業受諸律儀是也教相所詮者如淫戒中結戒義第五門辨也亦同此狹者教相所詮既辨隨行故同此中隨行狹也此準多論有五不同者謂有如上第四長短第五三性有無也薩婆多宗靜慮無漏二種律儀在定道心亦成就亦現行出定道心唯成就不現行故定道戒縱在隨中亦無長義是故受隨定有長短即由隨行定不得長故亦即非三性中有由此復説三性有無若成論宗不得作此四五二門以其隨中容有定道出定入定常有無表既出定有善等性中亦恆現行故章云以道無作寬長故爾是也故成論十七二善律儀品云問曰有人言入定時有禪律儀出定則無是事云何答出入常有如彼廣説定共既爾道共應同通律師云問若爾應不名為隨心轉戒答從初受名以初發時要從定道方能故然諸大德以出道定有義唯三性亦恆現行今詳若得初之二果欲界煩惱既未斷盡故或有時起不善心即定道戒三性中有儻得不還或阿羅漢不即得言三性常有彼宗阿羅漢等常在無漏無無記心況有不善若得禪定或容無記定無不善準此隨中亦猶説狹寧知羅漢常在無漏彼宗無我無假緣心即名無漏彼宗無我無假緣心即名無漏彼論二十二智相品云阿羅漢無緣瓶等心已壞一切假名相故如彼廣説二作同義有五者一名二體三義言義同者同有防非離惡義也不同有四比前無作義準可知緣境發戒中薩婆多宗婆沙百二十心論第四俱舍十五同有此説且俱舍頌云從一切二現得欲界律儀從根本恆時得靜慮無漏述曰前之兩句釋定道戒從一切者謂從一切根本加行後起業道得律儀也從二者謂從二類即情非情性罪遮罪也現者謂從現墮有情數蘊界處得不於過未以其過未墮法數故墮法數故者過未之境唯意識緣名隨法處不可煞盜故不緣之得戒也得欲界律儀者別解律儀唯欲界故既從一切二現而得是故防非還通此等章中且顯緣現在境并辨防於根本眷屬而性遮異略而不論問遮罪豈非眷屬攝耶答遮罪之中自加行根本後起故不可言眷屬所攝禪無漏戒唯從根本業道處得唯七支性罪所攝不從遮罪也言恆時者從三世境亦發律儀法處不善亦須斷故悉如論若曇無德宗不存過未心得戒以非衆生故者此辨得戒之人能緣心也然現在中亦不得約一剎那説以其此宗五蘊相續假名衆生識想受行次第而起既於一念不具五蘊是則不可説為衆生既無衆生説誰得戒故約相續假説現在不同薩婆宗一剎那中具足五蘊剎那過未即非現在也三世境所有之惡者此即辨所緣境也彼論十二七善律儀品云問曰但於現在衆生得戒為從三世衆生得耶答曰皆於三世衆生所得如人供養過去所尊等三世諸佛戒齊等者兩宗義異且據成實意説過去迦葉佛時有無量人已入涅槃此等境亦發戒品故云齊等若於此等不發戒者釋迦弟子戒境應減若據薩婆多宗婆沙百二十有三種一云應作是説律儀境界雖有多少而律儀體前後無異俱從一切有情境處總發得故有作是説三世如來律儀不等亦無有失問若爾施設論當云何通如彼論説一切如來應正等覺皆悉平答由三事等故一修行等謂皆過去三無數劫勤修四種波羅蜜多究竟圓滿得菩提故二利益等謂於無量應化有情作利樂事皆究竟故三法身等謂諸如來皆得十力四無所畏三念住大悲十八不共等勝功德故由此三義故言平等非律儀體無多少異又由根等我等一切如來皆住上品根皆得上品戒故有餘師説一切如來所有律儀皆於一切有情處得故説等言非説無異謂過去佛戒所從境設今猶在者釋迦從彼亦得律儀然無此理釋迦律儀所從情境設當在者慈氏從彼亦得律儀然無此理故説等言亦無有然準俱舍世親存其後釋多論第一存中間釋次辨發戒多少門從生數從非生數者先準婆沙百二十有五釋云此中有説彼七支戒一一各於一切有情處得而所得是一有情犯一支戒於一切有情此一支戒斷餘六猶轉二云一一各於一切有情處得而所得而得異如有情數量所得戒亦爾彼説於一有情犯一支戒即此一處一支戒斷餘六猶轉餘有情處七支皆轉三云有餘師説別解律儀隨因差別成二十一此中有説二十一種一一各於一切有情處得所得不異彼説由貪煩惱於一有情所犯一支戒於一切有情無貪所生一支戒於一切有情無貪所生一支戒斷餘二十種如先猶轉有説此二十一種一一各於一切有情處得而所得各異如有情異所得戒亦爾彼説由貪煩惱於一切有情所犯一支戒即此一處無貪所生一支戒斷餘二十種如先猶轉於餘有情二十一種具足皆轉乃至依如是説寧作出家犯諸學處不為五戒塢婆索迦所以者何彼若毀犯五種學處身中便空諸出家者設犯五處而更有餘衆多猶轉五者迦濕彌羅國諸論師言雖犯律儀而戒不斷如法悔除還名持戒無有頓受別捨得故未悔除位具得二名已悔除位但名持戒述曰作心頓受不應別捨亦應別得也未悔除位得二名者一者持戒二者犯戒也前四師説犯一戒時此戒即捨迦濕彌羅不言前四誰是誰非然犯不捨異前四也章中所引多論第一也然多論意於四師中存第四釋犯亦不捨也故多論云猶名破戒比丘不名非比丘也不可煞者諸入滅定慈定中陰如來輪王佛使等決不可煞諸得他心是不可誑問生生與趣緣何發戒古來傳釋引雜心第一十頌云生攝一切趣非趣攝於生中陰增當知非趣攝述曰增者處所異名也亦是增如義也如言地獄有十六增也準斯發戒亦生非趣古來又云六趣亦應不攝如來今詳大乘王宮現生是化非實容有斯義若依化相示現受生亦是趣攝是故薩婆多宗後身菩薩許是異生即此生身雖已成佛猶是有漏菩薩入胎三時正知婆沙百二十説佛胎生由此亦許是趣所攝若非生數多論第一有五種子彼一粒麥一粒粟斷一根草但使得一罪處即得一戒堀一微塵地下至金剛皆準前説若準婆沙不同多論百二十云問於外物中得律儀不若有得者所得律儀應有增減謂生草枯時酒味壞時應減即彼生時熟時應增乃至若無得者即此律儀境應少分處受而世尊説如是律儀無少分受又斷生草悔應無用評家云如來説者於外物中亦得律儀問若爾律儀應有增減答無有增減以總得故此律儀總於一切生草等上得一無表而世間無有無生草等時總於一切蒲桃等酒則不壞時得一無表世間無有無諸酒時是故律儀無於一有增減餘亦如是述曰餘如是者一切非法衣食等類一一類上得一無表不約微塵一粒等別也根本戒四百二十者彼論云如來所立戒有四百二十也婆藪斗律者真諦三藏云此翻品類律此律多説緣起制諸輕戒優波提舍翻為正教此律正説是罪非罪制諸重罪無願毗尼者了論九毗尼中第七無願毗尼也九毗尼至下今演毗尼中辨之俱舍十五若人不作五種定限方可受得別解律儀謂有情支處時緣定一有情定念我唯於其類有情當離煞等二支定念我唯於某律儀支當持不犯三處定念我唯住某處方域當離煞等四時定念我唯於一月等時能離煞等五緣定念我唯除鬪戰等緣能離煞等如是受者不得律儀相似妙行受體已竟
