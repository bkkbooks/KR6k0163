body:
  text: 第二大門總明體性者章云此十二部經以聲為性佛語性故者有雖名句方名為語名不離聲即聲為體又章云通有名句味者應言名句文而言名句味者是古釋謬假實通論故名有名句等以名句等體是假有不離聲故故得通論聲與名等四法為體又章云謂色行二陰中攝者假實門殊故許聲是色陰所攝而名句等是行陰攝謂是非色非心不相應行也此即教體二陰為性此據成實及大乘宗出體如是若依薩婆多宗教體唯用聲為自性能詮作用是名句等非是教體故婆沙百二十六云佛教云何答謂佛語言唱詞評論語言是契經唱詞是律藏評論是論藏語音十四音語路生名句路語業簡身意業語表簡無表非教體故是謂佛教問如是佛教以何為體正義家云如是説者語業為體語業即聲彼卷復云佛教名何法乃至廣説問何故作此論答前雖顯示佛教自體而未顯示佛教作用今為顯示教作斯論佛教名何法答謂名身句身文身次第行列次第安布次第連合此即總顯佛教作用已上論文第三展轉相攝者且問契經容攝幾分答或攝十二或唯攝十若約始從如是我聞乃至奉行即契經中具有十二若約長行名契經者須除二頌故但攝十次辨應頌容攝十分如法華偈舍利弗來世成佛普智尊即攝授記應頌之中定無諷頌諷頌之體非重頌故即應頌中亦有自説即如偈中記舍利弗本非請記故也亦有因緣如觀音偈世尊妙相具我今重問彼佛子何因緣名為觀世音具足妙相尊偈答無盡意汝聽觀音行等既因請説故名因緣也亦有譬喻即法華偈譬如長者有一大宅等偈是也亦有本事即法華偈云彼佛滅度後懈怠者汝是妙光法師者今則我身是既非本生故是本事也亦有本生即法華偈云彼時不輕則我身是時四部衆著法之者聞不輕言汝當作佛以是因緣值無數佛故有本生也亦有方廣華嚴經中大有其例即法華云十方佛土中唯有一乘法等亦是也亦有希法大通智勝佛十劫坐道場又如舌相至梵天身放無數光為求佛道故現此希有事等是也亦有論議如解深密長行已辨三無性訖後説頌言相生勝義無自性如是我皆已顯示等既佛自顯三無性理故是論議也上來應頌且除契經并除諷頌攝餘十分餘記別等準此方隅如應決了次第四配入三藏者理實十二各成三藏今約相顯以辨攝者如顯揚第六瑜伽二十五並云契經應頌記別諷頌自説譬喻本事本生方廣希法是契經藏此中因緣即是律藏此中論議是阿毗達磨次第五門隱顯有無者章云大小隱顯等者此準地持第三地持即是瑜伽同梵本瑜伽三十八云當知於彼十二分教方廣一分唯菩薩藏所餘諸分有聲聞藏準此故知大乘經中顯説方廣隱説十一亦應義準小乘經中隱説方廣顯説十一也次辨有無者大乘有九而無三部小乘亦爾有九無三且辨大乘有九無三者如涅槃第三明菩薩藏唯有九部除其緣起譬喻論議以其菩薩無有起過因而制戒故無緣起法説即通後無譬喻少聞多悟不假論議故無三也次辨聲聞有九無三者如法華云或説修多羅伽陀及本事本生未曾有亦説於因緣譬喻并祇夜優波提舍經鈍根樂小法貪著於生死乃至我此九部法隨順衆生説入大乘為本等其中即無記別自説方廣等三以其聲聞不記成佛故無記別恐情生慢故無自説不説七地四菩薩行不共法等故無方廣此等並據一切偏説理實通論聲聞菩薩各具十二如前已引瑜伽二十一聲聞地中云哀愍一切諸聲聞故説十二分教及婆沙順正理等並明十二如應當知上來略辨十二分教義門已訖謂是羯磨或可如是者以餘四受是佛在秉又釋來上八敬乃是聖人聖人不應有滅法過三歸一受若準釋迦不通末代何妨彼佛不同釋迦三歸通末義亦無妨若不爾者既有羯磨應非略教也章云問所以初欲舉滅法之人兼舉第三在世流布者以其前者科文為四一止廣二説略三現益四後損今既為釋第四滅法何故文中乃云如是舍利弗彼佛及聲聞衆在世者佛法流布却舉第三現益之文也釋妨如章也如下辨者如下淫戒中結戒義辨對略辨廣者謂對次後説略之文故即前文先明廣説亦得釋言對廣辨略反上應知據利根者説者有云利根之人七日假教鈍根之人始終假教句便有六者文中一者未生漏二生漏三未得利四得利五未得名六得名對便有三者如其次第兩兩合説即成三對綩轉相釋者舊新諸師合有四釋一者從且止釋且止何以且止以未犯有漏故何以未犯有漏未得利養故何以未得利養未得名稱故以未得名稱即未得利未得利故未生漏未生漏故佛言且止二者從知時釋知時知何等時知漏起時漏過何以起以得利養故何以得利養以得名稱故若得名即得利若得利即生漏漏過既生世尊為諸比丘制故曰知時第三從且止釋知時謂佛言且止何以且止以未生有漏故何故未生漏未得利養故何故未得利養未得名稱故若得名即得利若得利即生漏漏過既生世尊隨制故曰知時第四從知時釋且止謂佛言知時何等時謂知漏過起時漏過何以起以得利養何以得以得名稱故若不得名即不得利不得利故不生漏不生漏故佛言且止義少不便者以其得利親釋生漏得名亦是親釋生漏故不可以得名釋得利也不得名等準此可知是好醫師者見論第五云譬如醫師未善治病見始生癰雖有癰性未大成就輒為破之而出狼藉受大苦痛以藥陰之瘡即還復醫師謂曰我治汝病當與我直病人答曰此癡醫師若我有病可為我治我今無病強破我肉血出大苦反責我直詎非狂耶聲聞亦爾若先結戒而生誹謗我自無罪強為結戒若漏起者譬如良醫應病設藥令得除愈大獲賞賜又復讚歎此好醫王善治我患如來亦爾隨犯而制歡喜受持無有怨言智度論十七云提婆達多身二十相而不能忍伏其心為利養故而作大罪生入地獄以是故言利養創深破肉至髓應當除却愛供養心又智度論第六云譬如天雹傷害五穀利養名聞亦復如是壞功德苗令不增長如佛説喻譬如毛繩縛人斷膚截骨貪利養人斷功德本亦復如是越為人識等者謂越六字為人所識多聞是也已下疏本第二律云爾時世尊在毗舍離章云自下正宗疏主總標宗旨也將欲解釋尊者分三第一顯宗來意第二正宗之旨第三判文解釋今詳來意復三第一總標宗旨如章云自下正宗第二別問起由如章云所以得興者第三答由緣備謂由緣具便起正宗如章良由僧尼不勝名利廣生有漏壞其略教此顯正宗緣也良由者答義之端僧尼者緣起人也即戒本前善男子等及戒本中若比丘尼是也不勝名利者生漏緣也廣生有漏壞其略教者諸戒本前起種種過是也是以如來隨其缺犯制廣補之既由緣備故有宗體也是以者牒前緣備也如來者立教之主即諸戒首爾時世尊是也隨其缺犯制廣者辨正宗體由隨缺犯逐制五七廣教補之是則廣教為正宗體即諸戒本是也使犯相分須輕重位別教禁羣機有當時之益雖已明體復辨宗相使犯相分須者五七分須也輕重位別者諸戒本下釋相重輕如律文言成者波羅夷不成者蘭等是也教禁羣機者釋相之下比丘尼波罪夷式叉等吉羅是謂為犯是也有當時之益者即戒本前生十利是此是兼顯利由二緣一者皎潔無𠍴事由與厭故須廣辨戒本釋相二者開成無過須辨開文即律文中不犯者乃至痛惱所纏等文並為招生十利也原意在此故號正宗向明正宗之來此結制宗之意來意既爾故號正宗次辨第二正宗之旨如章正宗之旨不出身口止善受之與持犯相輕重但人多釋此意説云云正宗之中有受有持犯相輕重人雖多釋今明旨意不出止善謂雖別相有止作二持通相為言莫不止惡而成其善止則是善持業釋也由其戒宗本意為明增上生道故須止惡而成其善然崇破云舊解以止善為宗但離惡邊即是其止諸有䇿修即是其善所以不立者既不許以止惡為宗如何復取修善為宗然崇遂以戒行為宗今詳不許止惡為宗憑何理教自立戒行寧非止惡若不止惡若不止惡應通惡戒故知非理復此止善止即是善何以語云唯修取善修善之義通三藏故且止斯事今章中云但人多釋者昔來章疏向二十家諸説不同不可繁具且首與願所明宗旨一教二行數不孤起必有所詮之行行不自顯藉教以明教能詮行行能成人故以此二為宗旨也教有二種謂止與作教無止作能詮止作故云也止謂離惡如五篇是作謂成善如受説等又教有二種一專精不犯二犯已能悔教無此二能詮此二故云也或有以因果為宗謂此宗中從初至雜犍度總明其因大小持戒揵度獲得三明五種勝法總明其果故用此二為宗或有以受隨為宗又有以止作二持為宗先來共破皆言教行及以因果義通三藏既無所簡濫故非宗又因果者彼是舉果勸成因行而果非宗若當是宗應即名為果報犍度既稱持戒明是勸因又云宗者即是總義受隨止作等乃是別義亦不成宗故唯止善妙符正理覺云但人釋有兩種意一向上用即釋立宗二向下用分文解釋如言六百段等是也何以疏主不存此科答若不科文義即不顯故不存也多少差別者大僧二百五十尼兼七滅三百四十八若除七滅即三百四十一也輕重不同者一者尼僧輕如摩觸戒等二者僧重尼輕如粗語戒等有無互缺者尼有僧無如洗淨過分戒等二者僧有尼無如輒教譏教誡教誡至日暮蘭若六夜等犯同緣異者如畜長鉢俱犯捨墮名曰犯同僧開十日尼唯一日生罪緣異也又可前明止持次辨作持者疏主敘古自意亦許一有惡心蘭者謂知不集故秉羯磨即犯偷蘭二有懈怠吉者此懈怠吉秉法之人懈怠不求餘僧合集也其自餘人不來赴集懈怠故吉此不欲明故言殄已起者既結能殄惡心懈怠故顯所為是殄已起也二罪合防者即違篇戒各唯防一罪也蘭有三處防上下律文列七聚名蘭或第三或在第五若七滅中立有蘭者便成三處即是違文蘭有立教住處防準義偷蘭與他為因故在第三與他為果即在第五三五無定律文意爾今立七滅定有蘭者蘭應決定有住處故即是違義也不攝百一防伽論立百一羯磨若使惡心發百一法並容得蘭今若七滅獨立偷蘭此無功能攝餘有蘭也唯吉之防者尊者云此不成防且如尼律中有德不為他滅諍尼得提罪彼戒下文結僧罪云比丘吉羅今若立防者若彼緣起本有惡心及有懈怠下文結罪唯結吉罪隱蘭不説可使成防云僧七滅從有惡心亦須隱却然彼緣中本亦雙有如何成防今詳正由無雙緣起所以成防以惡心秉不合局就七滅中論彼既不論此亦應爾此四位言者若以因從果但合明篇今以因果別陳故成四位也毗尼以止善為宗等者此中止善即能治行也為蘭疑濫故有此言謂疑云自下盛明罪相輕重應以罪為宗耶故釋疑故云罪是所防意舉所防欲顯能治非欲以罪為宗也是故章云用能治行以為所明也尼百衆學不論七滅者以彼七滅入單提故尊者曰亦有七滅若他求滅不滅過重容入單提泛見諍事應與不與故亦應吉也如常所破者首律師云外書亦有學而為政豈有相形又相形偏字從人作之篇章篇字從所竹作之字既不同故不應理今重詳曰曾尋祗律屢見偏字從人而作近來傳寫多改從竹尋彼律意偏者要義急義戒相雖衆半月一説且從急要故曰五偏也設今從竹三均名篇就別義説理亦無失或曰外書豈有均義崇亦云篇者編也編此法義成其一聚故名為篇即是章品異名豈勞廣釋今詳章云説有五階即是編比以為立段段段各具名等三均誰言用均即釋篇字故無勞破餘義如破述記述之夷罪十六部等者明了疏云舊呼為篇梵本名部部有二義一成就根本義二隨順根本義言成就者四夷一一各有四部一遠方便如欲犯淫已起決心身口未動此犯吉羅責心懺滅二次方便動身就彼或口陳説此亦犯吉對人懺滅三近方便或摩或捉未交之前為淫故觸犯蘭非殘亦對人懺此三方便為成根本故名為部即成就根本義也言隨順者若未成果方便可懺已成果罪逐果不懺亦名為部即隨順根本義也三因一果即名四部夷殘一一各有四部準此應思提提舍尼各有兩因及一根本由其輕故除偷蘭遮餘義同前章云非四部所攝乃至獨柯多攝者並論文也前四部中雖有因吉隨應自攝入前四中今辨第五雖亦吉羅要須非是前四部攝取所餘罪也學對者梵云息佉柯羅尼翻為學對梵云獨柯多此云惡作為分輕重作此異名輕名學對重名惡作輕但責心重對人懺真諦云此間不解分別通名衆學此為謬矣責心對人通名為學以此對治所作之罪故名學對今詳別相即分兩名若就通相亦得通名學對是真諦意也婆藪斗律所説罪者此品類律二百惡作一切皆是獨柯多攝謂名惡作部也又詳此釋若輕若重復得通名惡作也又明了疏云第五部中或有二因或全無因故不同前準數為部謂但起心不動身口唯果無因若有動業因果具有如欲上樹未動身語是遠方便動身或語是近方便上樹過人即名究竟隨應準説名當罪人故名當體者謂即此人是極惡也新譯經論名他勝處善法為自惡法名他故也藥有五故者夷若無覆立為一藥有餘釋言滅擯羯磨亦名為藥殺活雖殊不妨俱藥通律師問答云問七聚應有七藥答聚唯六病惡作惡説體類同故蘭復同提共用一藥故雖七聚亦但五藥若爾七滅應除多諍答法相不同應為三例一藥多病少如七滅除四諍二藥少病多如四輪摧八難如下十三難義中辨之且為頌曰三塗北長壽亦前後辨聰根善處摧前五值願損餘三三藥病俱等如五篇有五藥今詳此等並是彼彼間語也不具分者謂不具支分即是不具緣義也此七聚次第者自下疏主敘真諦釋也前所引者即了論文也論云謂一切二聚不具分所生明了疏云偷蘭翻粗遮耶翻過粗有二義一是重罪近因故粗二能斷善根故粗重罪因者發心破僧是遠方便未名為粗一諫二諫是近因蘭即名為粗能斷善者謂彼後時或斷善也此之二種通名為粗所言過者違教而行故名為過如牛突破籬授出外故名為過此破僧蘭得粗過名餘蘭從此亦名粗過如初牛出後牛亦過雖犯餘戒亦是過收然此罪粗故獨名過初二聚中一一因蘭名不具分從粗過起故曰所生唯取根本為前六聚者且辨根本門也前二聚近方便為第三聚已下就方便中曲分二例謂入第三攝及入第七攝為二例也三聚總明者前釋十號中已明三聚即是善聚不善聚無記聚也若就具往分等者是一古師義也乃至問據聖本制等者疏主敘首律師難也乃至答逐義等者疏主救古師義也彼本難云若言就具不出身口不安不恣即非具攝何得立言五所不攝還復二位故二位言非為無過又凡離分要先同體杖分為異汝身口邊逐義離分此身口犯為通為別身犯惡作口犯惡説泛爾通名俗人亦有非佛別制故名為通若據具戒惡作惡説佛別制名名為別也若約通者俗亦應分若約別者如祇制淫未有廣教吉名未有從何出夷亦不應言必當有故懸借而用即應借夷何繁借吉救中意云能造是具所造是業業差別相重者有五謂夷殘蘭提提舍尼始從當體乃至責過五義既殊即立為五此之五種逐義為名惡作惡説當位立目謂就身作及口説位縱不安等豈非惡性也又復就戒以立篇聚者首律師作前破竟即自解云造過有七從粗至細此疏主云亦是離分豈違前義故言無爽也罪是大障道是所障者引文不具故失意也見論第九云偷蘭者大遮者障善道後墮惡道於一人前懺悔諸罪中此罪最大如律本中偈説偷蘭遮罪其義汝諦聽於一人前悔受悔者亦一悔於一人中此罪最為大已上論文易解準論即是釋罪體大不欲云是障大也作惡故惡等者先來釋云如跳行入白衣舍今助詳之此於不善處得罪也由作得惡者如不齊整著三衣今助詳之此於無記處得罪也説惡故惡者如高聲入白衣舍今詳如對男子粗語等又助詳之此於不善處得罪也由説得惡者如為不恭敬人説法等今助詳之此於善性處得罪也得罪由佛制故不蕳善無記處也破僧調達是也伴三聞達多四伴是也助五百捉籌皮人皮鉢石鉢露形露形見佛肉血飲生肉血四不可治前偈序中已引母論九清淨人者十誦第五十也佛言四蘭者十誦五十九也悔法如上者如上重蘭悔也故多論第二云重偷蘭遮大衆中懺應䠒跪合掌三從衆乞乞已衆應一白一白已懺悔亦應三説輕偷蘭遮界外四人懺懺法亦同但輕重異已上論文如下對衆等者指滅諍揵度也破僧近遠二因當須大衆小衆懺者義準之言也如前夷因輕重二蘭大小衆懺破僧滅擯既是同夷故應因吉同夷因懺也自有造重不假於觸者下條部文言我今不觸彼身可得無犯佛言波羅夷疏意雖爾今詳默妄判為方便恐違正理故今破云自有造重不假於觸故觸究竟者亦應自有妄語不假默妄默應究竟又難無有妄語不假虗心故默妄是方便者亦應無有犯重不假染心觸應方便進退既非故今立義默是究竟以無擬默今還默故若爾何不入篇答如打謗俗人摩觸男子對不變畜作大妄語斯皆果吉何獨責默今應更釋凡入篇者必具三均未必三均一切皆入但今入者且就數犯急要之者録入篇中若不爾者即不録耳為是三均之外更加急要為四義好也不隨人別結者今詳應言若本加行擬誑別人三問竟時各別得罪若加行心不欲分別衆人之異三問竟時不隨人別告淨提亦爾但約問結默不從於罪以其默妄僧問便有不問即無問緣既一何得多罪不同覆藏覆罪生罪故隨覆多罪等者今詳此下並不應理若言默妄僧問便有遂約問結者覆藏亦是由人同住何不約人而結罪也又言覆藏覆罪生罪故隨罪結者亦應默妄隱罪生罪亦隨罪結又言默妄誑問生罪非誑罪生罪者覆藏亦由對人不發非對罪不發又言覆本覆罪不覆明相者默妄亦是本默隱罪非默隱問義既並齊故難取別今解若加行心各別緣罪皆擬誑者雖問是一而隨罪結若加行心不別分別但總生誑徑問之時但一默罪若爾如覆十罪其加行時總作覆心亦應徑明但得一罪答理亦應同憶數別隱理別生覆不憶數隱理總生覆告淨提罪類默應知六罪三處犯默者首云八罪謂屏覆二坐道俗女別故應言八罪也除蘭一處餘咸二處者此且總言而未盡理應言除篇攝之外餘咸二處以吉羅中不入篇者亦同偷蘭唯於序中一處犯默也如五分衆學為七問者承前講家多言五分衆學實無七問或是傳寫之謬或疏主錯引或曰如從四夷乃至衆學五篇分成七問別也述曰不勞救之設言錯者何失七種十五種説者説戒犍度自當有文今略論者有難略説從緩向急合有七略一種直去如難猶寬容得説至提舍尼竟此為一也復略提舍是第二略乃至第七略四夷法唯説戒序即是七略也若難更逼直爾起去故名一直去也從急向緩即十五種如難欲至衆共量宜擬説戒序此為一略説序竟時難猶未至更説四事此為二略更説十三為第三略二不定為第四略三十為第五略此上一五衆共量宜擬説戒序并及四事復是一略説至十三為第二乃至九十為第五復是一五第三五者擬説戒序四事十三為第一乃至提舍為第五復是一五三五總十五種略也不須八説等者若分衆學七滅之別別略七滅從緩向急即成八略從急向緩三六十八準思可見也與人法非類者人犍度中犯僧殘罪先已發露後罷道已還受大戒還更覆藏復須發露言非類者彼據時長不同説戒一坐之間對衆發露衆僧已知不須更發今詳此據對僧發言發露可作此解若當心念作發露者應言隨隱隨應發露也餘準可知者前言夷等但等取殘次釋不定竟復言餘可知者即是三十已下準可知也若據有犯不合聞戒等者首律師云將欲説戒皆先審衆以其有犯不合聞戒故前八問皆是先問後方正説彼即自難云若爾七滅之下何故復問答問下犍度七佛略偈等也疏主不存故別立義云若據不合聞戒但應八問之外結不應吉也又復序問為憶識不疑下八別向為疑不憶識者若先憶識説序之時即懸憶識不假至篇始能憶識故説序者正為憶等然論下八縱先疑等令為説相忽即醒憶故説下八正為疑等章中又云此據位言者據正所為相顯之位也又云若以義推等者謂盡理推之也初問不通疑等者疑便不能懸憶識故故無默也下之八問通憶識不疑等者雖説下八本為疑者然實不疑而不發者亦有默也三方便義今詳遠方便者罪增上緣也進趣方便者加行不息也問緣方便者加行不滿也如自覆藏罪是者如徑一宿生一覆吉後後徑宿展轉無量此初䨱吉皆能遠資後後更犯吉也又如䨱夷得吉此吉更資後後犯夷其唯究竟者此等覆吉體是究竟也下二準説者下二篇中如入村中從尼取食或受尼指授食及衆學中左右顧視皆資犯淫尋之可曉進趣方便章中略敘兩古師釋昔通律師敘古三釋謂於前二更加一釋也然初釋意凡言結罪一得心停二待事畢進趣之中無此二事何得結罪猶如須達往向佛所步步增其順理之福故許犯戒步步增惡而無罪名此即以違理不善為進趣體也第二師意如章然約有邊蘭吉為體若約無邊亦違理為體同前也第三師云約篇聚中無問法隔或復不隔進趣方便或有或無所言有者步步趣求或違諸諫但是違教無別罪名故善生經云受戒之人犯罪報重違佛語故即以違教不善為進趣體也所言無者猶如被逼失念受樂何有方便又如違諫法未滿前聖開思審思審之間故亦無罪且破初師例云須達見佛果無名故許因中無福號違制之名捨果有何得進趣在因無又復違文如多論等步步蘭等破第二師言有無爽言無準同初師例破破第三師所言有者果中立名不違教可得因違不立名果必違教以成名因定成名以違教所言無者失念受樂義容可得違諫無罪即違文理可知正義如章若望自成蘭吉二罪有同不同者此約自成門中分別解釋或得自成或不自成也謂以同名自類為因還成同名自類為因還成同名自類之果蘭吉二罪則不得同以其吉羅以自為因還成自果蘭則不爾故也此即吉同蘭不同故云有同不同也若因因相望蘭吉則同者謂以同名自類為因還成同名自類之因蘭吉則同無相成義且如違諫之中初白蘭不成違初諫蘭違初諫蘭不成第二諫蘭等吉中亦爾如利吒違初白吉不成初違諫吉乃至廣説此則一向不自成也作過緣缺者若據通相攝七方便若據別相唯攝緣差心境互差者謂心差境即想疑是又境差心即境差是權思不暢即善心息及境強是有餘於此攝彼緣差義恐不然也為害兄第等者增一含三十四舍利弗在耆闍崛山中入金剛三昧是時有二鬼一名伽羅二名優波伽羅毗沙門天王遣至毗留勒天王所欲論人天之事是時二鬼從彼虗空而過遙見舍利弗結跏趺坐意寂然定伽羅謂彼鬼言我今堪以摧打此沙門頭憂波伽羅語第二鬼曰汝勿興此意所以然者此沙門極有神德有大威德此尊名舍利弗世尊弟子中聰明高才無復過是智慧中最彼鬼再三曰我能堪任打此沙門頭憂波伽羅曰汝不隨我語汝便住此吾欲捨去此惡鬼曰汝畏此沙門乎優波伽羅曰我實畏之設汝以手打者地當分為二分正爾當暴風疾雨地亦振動諸天驚動地已振動四天王亦當驚怖四天王知於我不安是時惡鬼曰我今堪任逼此沙門善鬼聞已捨去時彼鬼即以手打舍利弗頭是時天地大動四面暴風疾雨尋時來至地分二分全身墮地獄中舍利弗從三昧起整衣服下闍山往竹園至世尊所佛告舍利弗汝今身體無有疾病乎舍利弗言體素無患唯苦頭痛世尊告曰伽羅鬼打汝若彼鬼以手打須彌山者即時便為二分有大力故然此鬼全身入阿鼻受罪佛告比丘甚奇甚特金剛三昧力乃至於斯由此力故無所傷害正使須彌山打其頭終不能動其毫毛又有處云為害是兄伏害是弟應撿長含煞含四境者四束為二故雜集第七云煞生事者謂有情數非有情數如其所應依此處所起煞生等餘三方便在此中收者首云在此闕緣收也不疑善心者不疑即是想之異名五中上二單闕境者因此應知此七方便並名闕緣者且如煞戒具足八緣謂通緣有三一是大比丘二制廣教後三無重病壞心別緣有五一人二人想三煞心四興方便五斷命於此八中隨應闕之成七方便今言單闕境者即別緣中單闕初緣也雙闕者即闕初及第二緣謂人及人想也餘亦類然者謂更加闕緣緣差也類盜説者古云文言求過五得五錢夷即是攬過五方便成五重罪也兩境既別起心亦異者張王兩境必不同時託境興心決有前後故言異也有餘所釋不可記也第四杌木八句異境無罪非生數故等者前來所立三十八種異境來差即令本境亦三十八成境差蘭章中辨相雖已具足今轉令明故別列出一欲煞張王來替處緣王作張想王境不境不強而被煞二欲煞張王來替處緣王作張想對王闕緣三欲煞張廣説乃至王境強不可煞四廣説乃至對王緣差五廣説乃至對王善心息此是上五從此已下是下五段心息為首逆數至不強而煞尊者束此上五下五段為頌曰不闕德緣善善緣強闕不六欲煞張王來替處緣王起疑為張為王對王善心息七欲煞張王來替處緣王起疑對王緣差八廣説乃至對王境強九廣説乃至對王闕緣十廣説乃至王境不強而被煞此是下五人中十句竟非人畜生上下五者欲煞人非人來替處緣非人作人想非人不強而被煞餘九句及畜生十句類同人中改名為異杌木上四下四者欲煞人杌木來替處緣杌木作人想而煞餘七句亦準人中俱除二強為異也即是異境三十八種來差本境故令本境三十八蘭名境差蘭今詳此義稍違正理且泛論者凡因未止由果未成果定亡時因亦須息如且朝起奔逐張人而作煞心未息之須王人忽至緣作張心張心至暮緣王而起意煞亦爾至暮未停而定朝時張夷已息豈容至暮仍有張因若至暮時無張因者儻至暮後王上境強及闕緣等豈得令彼朝起張因而成四五境差之異有人救云誰言朝起張夷已息今應問彼緣王張想寧得煞張既不煞張張夷何在復有救云我約四度五度煞張故成四五境差之罪若爾亦應百度煞張應百境差何但四五良為四五煞張之時張境正差一類未有闕緣等異是則本境正得罪時一類無差何成四五復有救言望後為名故無有失者朝已結罪豈暮為名若許爾者今日煞人明名夷罪詎非可怪即由此理章云二趣上五無罪者理亦甚違謂緣異心煞想至暮而於本境朝因已停豈可中間煞心附異而於異趣全説無𠎝若言緣人心不當異故異無罪者若都無異何處生心良以煞心雖逐人想想不孤起還託非人既託非人煞心還爾解心雖異煞境無差二趣寧容上五無罪餘皆準破不復繁言且隨章疏次第解釋闕緣境強緣差心息位各為四者且如闕緣即歷四位謂歷人中想疑二位及非畜中各有疑位即成一四餘境強等各四準知第五想差方便首律師於此作八句料蘭一心差境方便想疑方便是二境差心方便境差方便是三心差境究竟淫酒是也四境差心究竟首云無此句尊者曰本擬漏失乃有正道來差本境緣異向本作想作疑亦成此句也五心境俱差成方便首云無此句尊者曰境差之中唯取雙闕是也六心境俱差成究竟首云無此句尊者曰本擬漏失乃正道差而心起疑雙闕者是七心境不差成方便出佛身血是今詳緣差心息亦是八心境不差成究竟一切是此等於義並成無益第六疑心方便首亦八句謂我疑他方便如疑心煞等是他疑我方便如現相大妄他疑我云為當為我而現相耶等煩不須敘教人現前同自作説者謂能教者本擬煞人今乃轉作非畜想疑即望本期人境之上煞心便息遂成輕耳隨境非境者生罪之境非生罪境即情非情是也及境優劣者就有情中人趣是勝餘可思知有犯非犯者情境有犯非情無犯也雖想雖疑而是進趣者謂於人境縱使改轉作非人想不由此想能闕煞事故是進趣謂於本境曾無一念不擬煞心何成闕緣疑心準此今恐不然若對本境作異境想煞心必經若緣異境作本境想本境應於此剎那死乃即不死豈非於本且得曰𠍴餘咸類然者謂尅王李趙等準此廣説即有無量者謂對尅非畜亦準此今詳前來所説二漫俱四義恐不然雖可加行頓發煞心豈可於境一時令死既無一時頓究竟義故今現對追逐一境非無想疑境差之異且如即今現逐一人擬即時煞想疑交是煞心輕微境差現是替本逐境雖對所逐心未全息然且此時現失本境理應結罪且結闕緣又如發心一切擬煞後逢一人始終緣彼作杌木想煞之命斷豈容有罪若約了心持一煞具以一加行頓煞多境此則方可隨境而斷故今更解不對大漫容言有四現前對漫理應思擇就尅辨漫門尅漫名異而體是一也想疑即同者通云前專尅張轉想乃作王想王疑而張命終竟不成因今既漫心雖有緣張為王想疑今煞張死亦不成因故言即同亦有疏言想疑亦同者意説亦同境差而説謂亦唯望異趣之上方有想疑錯誤門問錯誤何別答律文錯誤交涉難知準義差分令成別想謂若煞心現託此境心縱謬誤於此境上不説無𠎝即想疑境差是也此即是誤也若本煞心元在東人雖有西人心不在西擬斫東人失手煞西手非心制是錯所攝錯墮椽梁不待成立也若有無分別者局據異境論有無也前破此義可知通説得有其五者人趣異境但含四因異趣二疑即含五種同異合辨故名為通境差位故者謂此異境已差本境不可復論異被異差無窮過故餘四斷不斷者闕緣容斷命餘境強等即不斷也不由想故者不由緣王作張想故而令王上成因罪也上來體是有無者七方便中境差想疑一向是誤故云體是也言有無者謂異境上有五無二也言無二者如向章中辨無境差想差二也言有五者王等四境雖並是異非情一種既全無罪故不得論有五之義却就情道人中想疑有強等四無想無疑二趣疑中具足有五三趣通收勿過有五故云有無也不得説體是及有無者以不親緣無心迷謬故不得説體是誤等即此二無局在本境者前言境差想差二種是異境無既異境無故唯在本境也通云然此錯誤唯據尅心以其大漫隨犯非犯若就尅辨漫亦得辨錯誤少通緣者闕少通緣中初三兩緣也闕別二者闕別緣中第二人想也息不息門意辨現對所煞之境有五別緣五中人想及以煞心既並是心故辨此心息不息義也張心人心有息義者若同趣為異境即是張心有息義若異趣為異境即人心有息義也不分方便故待事成等者理實對異之時果謝因停故不應言不分方便如前已破亦可類如同趣對異即方便者此解好也並不並門通別二緣明並不並者謂闕通緣與闕別緣必不相並也謂對前事心境等説者事含一因即緣差是也心含三因謂想疑心息是也境含二因境強境著也舉境差二心者舉本境境差望異境上二心也與八或五一一有並者據異境十八方便説也亦可通對有無重輕説者疏意此中據於異境三十八事與本境上三十八蘭一一並也然言有者謂二十有罪無者謂二趣上五杌木中八是無罪故重輕者二十罪中夷蘭等別也崇云解此境差三門分別第一敘舊第二辨非第三顯是初門即從此章中境差之初謹寫宜至自有疑不成疑即人中第十是二三兩門可兩紙許不可具敘統彼大意且第三門彼立義言異境來差總有四種一者天二非人三畜生四杌木初釋即約單雙二闕以成八句又釋心非境故約境但四同趣之中殺人齊犯不得論差縱王命終攬張方便而成王果故律文言非人人想曾無文説王為張想如淫約道是道皆犯不以趣別立有境差故除此一舊人不立天趣來差若如是者本煞非人天來替處不成差故更如此彼又不許四異境上各別有罪故彼立言於彼異境無心欲害心緣不具並悉無𠎝若此差位結異罪者何殊非畜之上復辨二形又云上來解釋非是故情直為舊義背理違文既失旨歸解途成妨事不獲已有斯立破彼第二門大意況者非舊義云問尅心趣本境如何結異罪異境若結罪異境即大境境差義不成是漫非尅故又云異境若結罪本境非是尅今由立尅心異境定無犯許是尅心故異境何有罪又云若無簡別心可結異境罪無心既簡別異境定無𠎝本來定境差豈得論異罪今總難曰對異煞心停由蘭容無罪對異心仍起何得異無𠎝若言對異雖心起而名本境罪異上有本罪異境應是本異趣為異既有斯妨同趣為異理分方便不得言攬張因煞王理既分明故所引文並有餘説是不了義耳境差闕於境者此語太寬也此境差中唯約四境上半而説不論下半故太寬也通一別二者謂通緣中第二緣者理不可闕一立制後更無中闕此亦從多分説如倫開八事等亦是暫度別二者別緣之中煞心及與方便亦不可闕也隨戒釋具闕者下對諸戒皆有四門一制戒意二釋戒名三具緣成犯四辨闕緣義今言具闕即三四二門是也方便闕緣亦一亦異者一釋彼隨戒闕緣與此闕緣同名闕緣而有罪無罪異人釋不然謂彼隨戒闕緣之中若有罪邊即是此處七方便體故名為同諸無罪者非與此同故名異也謂心不犯者此是始終迷彼減年謂滿二十若轉想者有前方便即具六種亦可無境差者尊者言有準作即得餘心境制者謂簡淫酒淫酒唯約境制故也似通一切隨而準説者若諸非情即非境強故復除強故言準説煞盜可知者謂煞與盜皆具對不對尅之與漫四門義也名狹體寬等者兩釋之中前釋好也五分亦有無想心方便者第八卷云非時時想提也十誦文中想疑方便古來傳云有無不定故彼第五十一云非母想煞得夷并逆耶答曰得五十八云人非人想疑煞皆夷第三云女作男想黃門二根想觸殘六十一云女作非人女想疑觸殘第十云生草乾想疑提已上即是無二方便第五十云若不知有異想煞父母未受戒者應受已受者不應滅擯疑亦類然已上即是有二方便古來相承釋此妨云若先加行擬犯之境後縱轉想及起疑心亦得究竟本無加行縱有煞等有二方便今詳彼文無二方便一向決定而第五十云異想煞父許出家者自據俗人豈證有方便罪故無妨也持犯義即是隨戒法門者前五篇等豈非隨耶答前五七等是行所防故上已言既識過相階差理須護持等今此明持是能治行治行者是正隨義故此方言隨戒法門若爾犯即非隨答犯實非隨在隨位故相從説隨對文説者為翻古師於上開宗即明持犯今對初篇律文説者上開而説不同古師如開宗中辨隨戒二門第一專精不犯第二犯已能悔乃至專精復二義分衆別等並是也對法對事者對法謂受根本總發也對事謂隨對事別起也四流者謂欲暴流有暴流無明暴流欲界煩惱除見及無明名欲流上二界煩惱除見及無明名有流三界五見名見流三界無明名無明流婆沙三十八云問何故名暴流暴流是何義答漂激義騰注義墜溺義是暴流義漂激義者謂諸煩惱漂激有情令於諸界諸趣諸生生死流轉騰注等廣説亦同即向廣造諸惡者謂向所論五篇七聚等對文説可知者二部戒本名止持犍度以下名作持等如地持説者彼論第四云若從他受若淨心受此二是法若犯而悔專精不犯此二隨法已上論文亦可從用者由有受體有持犯之用次望體不壞故用者謂此持行令受不壞也俱順要期故義者隨中之業順受而生即是有體義也二持之體等者謂作無作為體二種無作等者無作但通善惡兩性不同於作作通三性章云亦同此判者謂持之與犯二種無作持即是善非餘兩等準前説也昔解總就三業等者雲律師言離身三耶名身止善屈身禮拜行檀布施名身作善離口四過名口止善讚歎三寶讀誦等業名口作善意離三耶名意止善修慈等觀及一切善名意作善疏主不存者以非制教之所要故且如不施而非破戒智論第十云迦葉佛時有兄弟二人兄持戒不施弟布施不持戒至釋迦文佛出世兄得羅漢乞食不得弟作白象受王供養故知不施非是犯戒智論七十二云受十二頭陀不名為戒能行則戒莊嚴不能行不犯戒譬如布施能行則得福不能行者無罪頭陀亦如是已上論文不安坐受食者提舍尼中第四戒是身口合説者前受持衣鉢及造房等即是無勞遠覓舉斯兩犯皆是作持者懺悔法即是作持也故文但意不犯者如條部文六群見恆水中有流船念言可盜此船不勞身手白佛佛言但意無犯而不應生如是意以色礙故無未來成者不煞如定道戒亦是色法有未來成異熟生心雖是心法無未來成言未來成者謂有法前得也此義如上受緣之中已分別竟無勞異釋若隨準説作與無作俱應二世成者受體作戒一念落謝隨中作體容相續起應二世成也覺釋不堪記之通持別犯者既不可得頓犯諸戒於中犯者是別犯餘不犯者名曰通持疏意且然此未盡理自有意中宜生惡尋不擬動發身語業者未名別犯也三識三心一切得成者古來相承謂五識五意識及第六意識為三也此準成實宗中識創緣境但了總相名曰識心次取像貌名之為想次領受此苦樂俱非名之為受次起貪等名之為行五識次第既引四心五識之後有意識生亦望創起名為識心次想次受次行亦爾其獨意識亦起四心準前而説亦可俱有者教他止犯望自亦名止犯如下疏自釋五識行心者若從五識引後行心義則可爾謂成實宗行心一向唯在意識五識之中定無煩惱自無行心也或五意識或第六意識者通云聲聞不防意地故取五意識不取第六意為善者大迷法相以五意識亦是意業何但第六是意地耶然今疏意欲明五意或第六意發身語業五識不能發身語業故也此亦且依成實宗説也問所以止持前三得有止犯則無乃至止犯不先屬己等者疏中意説本受戒時誓願離惡受止持體亦誓修善受作持體今在隨中前三止中得成止持順本離惡不成止犯違本修善也止作並持者由先受中頓發止作一切戒故今既不汙故並稱持問前體狀中疏云今可並就兩教説之何故今此成就門中不明進趣答既明制教即顯進趣至下通塞門中當釋亦可所成作持體中即通進趣也反却作犯可非止持者止是遮義由得法故能遮作過也不同舊釋者古師得法作房是作持全止不作是止持也要期斷惡處中無作者非律儀所攝善表無表色名曰處中且如要期百日禮佛心懈怠中問無表無失壞故亦名止持此止持得入餘三中也二持有二犯二犯無兩持兩持是塞二犯説通者謂犯得有長時之義故得入餘三位之中即説犯體名之為通此中通義與餘門別餘門通者能包含他名之為通此門通義能入他中名之為通德衣月五利無罪者離衣宿背請別衆不囑入聚落長衣不説淨於中別衆一戒是止持體餘並雙持由受得衣五月之中五利二持體常清淨故一一持入餘三中也離衣杖囊得法而作並雙持也通云此自業門中亦可四四十六謂欲取水先安漉器是止持方便説戒日不欲赴集隱在房中現不在相是止犯方便知有音樂當來禁閇沙彌是作持方便今行如蘭若先敕檀越莫來送食安煞具是作犯方便後於四行隨作一事彼四究竟是也問此通塞門中第三辨自業相成中明進趣及以制教於進趣及以制教於進趣中引長離等以釋其義於制教中復引長離二教何別答二門義別體亦寬狹謂望制教應䇿進邊名為進趣應防過邊名為制教體寬狹者謂若制教必是進趣修戒學境是然有進趣非制教攝定慧境是故知成就門中雖復不言進趣之教望䇿進邊亦即是有進趣之義有餘所釋不堪記之以其止等四行雖別具有作無作故者加行之時必具作業論其無作則不究竟之時若自究竟即具二種教他究竟唯有無作是故不妨教他作名曰止業制教亦然者自止自作義則易知教人止作者教人離煞即是教人止持也教人不説諍即是教人攝臥具誦戒等即是教人作持也教人煞生即教人作犯也能悔兩行當篇即通者止作同用一藥滅故故云通也此作持中通有餘三者此即包含之通也又制教中亦通進趣者如誦戒羯磨等雖是制教亦有進趣義也止通十三作局初房少分者端拱不作十三並持設若作者初房乞法雖名作持望不過量仍是止持半止半作故言少分餘可準知但除不攝耳戒者自此已上約大僧説也畜衆等十八者如下第六疏中料簡尼單提中云同戒有一不攝耳是不同十七其受戒有五謂取衣不與受不與戒又受不與二歲不與六法及本法經宿違敬有五謂不請不聽不恣不依安居不禮已上五種不為他滅諍不結安居被擯不去不以二法攝受不看同活病安居竟不去不送淫女五六由旬已上合有十八總為頌曰取歲六受受請聽禮恣安安安滅擯攝耳病六由旬若尼作雖可通初篇者覆他重罪理須發露故是作持第四復無者乞蘇乞油乞蜜石蜜乞乳酪等一向須止也等就有中而亦是狹可知者謂就有中但有攝耳十八等昔解止犯境寬體狹等者生罪之所名之為境即三學是也所生之罪名之為體即不學無知也唯犯第五者理實第五篇中無此吉羅也亦是其狹者亦同前制教門中止犯狹也作犯境體俱寬等者生罪之所名之為境即戒學是也所生之罪名之為體即淫盜等一切作犯是也今師意境體亦同前釋又言不一心兩耳聽等者如意不攝耳聽得提於上復增無知吉羅覺云由先不聽後緣不了名曰無知即此無知得波逸提南山釋言無知有兩一者根本不學而後無知即得提罪二者先誦今不利無知得吉今詳如章釋者好至彼不攝所戒當辨類似無知者謂如有人勤勤學問力未堪知雖緣不了不得罪也二止吉羅者謂不學及無知二吉也緣而不了復結無知今詳不然若使終身不以心緣豈可終身不犯耶今解於不了心中隨犯一戒隨得無知故下文言我説此人愚癡波羅夷僧殘乃至惡説崇師亦約緣不了邊不應理也其猶默妄覆藏者如徑明相或徑問緣猶如緣而不了是疏意也言止犯者謂止法作事者如造房也亦有單止法如止誦戒或單止事如安坐受食對事止法者如畜長衣也若約事成有並不並者長滿十日房已泥成俱時得罪故名為並不並可知制教分齊約前事者如畜長日滿等也望義宗以辨者經律論中但與律儀宗旨相應並名義宗也護根戒者即根律儀也次二內凡者要起燸等善根方便內凡今護根戒始於初業終於無學不局內凡其定其戒若起燸等可言內凡若無燸等縱得四禪亦非內凡也前二果依未來禪者謂初二果決定不得根本四禪故必定依未來禪起無漏道也舊名未來禪新名未至定謂是初禪方便也通云未來禪者謂中間禪甚可怪笑耳如上第一卷記應知此相經云四種不尅十利者涅槃三十六云有四善事獲得惡果一者為勝他故讀誦經典二為利養故受持禁戒三為他屬故而行布施謂令他歸屬也四為非想非想處故繫念思惟謂唯求世間極報也是四善事得惡果報此四事中意引第二證成疏義也第一道者三業菩提皆是第一道也以出世故持乃千差者應約時辨如付法藏第二卷説商那和修度優波毱多與受戒已得羅漢道便自念曰我於今者已覩法身未見如來相好之身思惟是已深生哀變爾時有一老比丘尼年百二十曾見如來優波毱多知彼見佛欲至其所尼聞欲來即以一鉢盛滿中油置戶扉後毱多入時棄油數渧共相慰問然後就坐問言大姊世尊在時諸比丘輩威儀進止其事云何比丘尼言昔佛在時六群粗暴雖入此房未曾遺我一渧之油大德高勝世人號為無相好佛然入吾房棄油數渧以是觀之佛在時人定為奇妙毱多聞已極懷慚愧尼言大德不應自耻如佛言曰我滅度後初日衆生勝第二日三日之後蓋後卑劣如是展轉善法羸損況今大德去佛百年雖非威儀何足為怪次應約處人趣三洲有木叉戒南州最勝厭背情猛故餘可準知學人有故犯義者然定不犯淫盜殺妄飲酒五戒所餘容犯然決不入三惡道也凡人犯重者如順正理六十五頌云愚作罪小亦隨惡智為罪大亦脫苦如團鐵小亦沈水為鉢鐵大亦能浮俱舍二十三亦同二止咸然者制教及進修二止也誤全非犯者此中是錯以誤名説問若錯不犯衆學律文若不故作犯突吉羅義云何通答言非故者不作故違聖教等如章釋之餘無餘者夷是教無餘殘等教有餘四不可治性無餘所餘性有餘懺不懺準此而説改名為異增二二十一者下增二文以夷為頭歷餘六聚即成六句次以殘為頭五句乃至惡作為頭一句合二十一句也母論四不可治如上偈序記中已引見論十八偈云五罪可懺等三句如章第四句云如來分別結此是舍利弗問優波離答此偈解小非小隨小等者此言到也彼論云偈曰解小隨小非小戒釋曰佛世尊立戒有三品小戒者僧伽胝施沙等隨小戒者是彼不具分罪非小戒者四夷復次小戒者諸戒中自性罪隨小者諸戒中所有制罪非小戒者四夷等已上論文明了疏中釋前復次云有殘罪非極重故名小五部罪家三方便並是成就根本及隨順根本而由輕故名隨小夷極重故名非小釋後復次云此中不論方便究竟但於諸戒若有殘中是性罪者悉名為小若是制罪名為隨小夷是非小論言等者等取出血破僧此亦大重亦是非小故言等也遮法中四者遮犍度云破戒破見破威儀破正命四妄語者如增四文夷殘提及毗尼阿毗婆羅妄語第十疏釋云阿毗婆羅謂是輕心雜碎戲笑不實語未詳何據一時有心中第三句初犯重餘三輕者謂成己有心餘二無心也然煞盜妄成己有心謂起隨喜自慶之心理合得吉然得他物理須還主若當不還計宜得夷也及學所學者如説相云汝當學問誦經等此即是所學法也亦有通制聽者猶如三衣制今常持若病等緣聽乞法離若爾無法作房制得殘罪復聽乞法義復是聽應通制聽與離衣何異答但欲作房無時不聽故即一向聽明所攝欲雖離衣無病等緣非是常聽故不同也制不過量聽如量而乞法即同也專對兩教中可學不可學事等者且疏主意言可學者如造房衣身手量度等及發口言誦戒誦羯磨等斯事皆須身語學作名曰可學言不可學者不可身作淫盜煞等及不口言妄謗綺等斯並不可身語學作名不可學諸師意異後當辨之然不可學唯是制門制離煞等可學之中通於制聽制誦戒等聽作房等即知聽教唯是可學於中義通學法學事處分法尺量事制教通收學及不學學中亦通學法學事誦戒法受食事不學唯是不學其事也不可學中唯是止持如人非想煞及盜等可學之中自有二別若是制門具二單持如止過量作誦戒等及作受食等若是聽門具二雙持如房長等得法而作若令止者理亦非雙以犯及持皆準上説此中以略義記之一者以學不學配於制聽二者以聽及制配學不學三者以學不學配二持犯明記此言疏義自顯若更煩釋翻合雜亂也然制教少分謂除可學也者以制教中不可學事須止成持其可學事受食等類既不得止故須除也不望於法者於聽教中作事之法於制教中單論其法並不可望而説止也然制教少分不望於事者不望不可學事而説作也其制教中應來者來乃至受食可學之事既復作持章中疏略也亦有作法作事義者此通兩解謂約開合且言開者一者作法如説恣誦戒羯磨等二者作事如受食不安坐受食等此準制教言合者謂加法作房等此準聽教然宗明作法者謂聽教中法強於事以要須法而作事故又制教中法多於事既並法強所以就強宗明法也上止持亦有望法義者準前作持此應説言亦有止事止法義然疏但言望法者以其止事易故不明若欲釋者亦有開合且言開者一者止事如止淫等二者止法如有外界諍比丘來止不説恣等此亦唯制教言合者止房長事法自然止此唯聽門以止事為宗者一者事強於法以止作房法自止故二者事多於法淫盜等事皆須止故上來止持有餘所釋約離盜等起少欲觀等名為望法者不契戒宗復非是止故不堪記故該兩教中事者理但該於聽教可學制教不學而不可該制教可學以受食事非止持故故復疏略也問所以作持止犯不通不可學事者以其聽中可學法事制中可學之事共許是作持收故但須問不可學事也答中兩教法及兩教可學事須修也品別義然此門中古今諸師義意雖異然作句法不過三種故先立圖然後辨其諸師意異亦是隨疏釋義也第一九句上品一句中下各四句識事識罪識事疑罪識事不識罪識罪疑事識罪不識事不識事疑罪亦有言不識罪疑事不識事不識罪不識罪疑事亦有言疑罪疑事不識罪不識事第二九句三品各三句識事識罪識事疑罪識事不識罪疑事識罪疑事疑罪疑事不識罪不識事識罪不識事疑罪不識事不識罪第三九句逆數初九即是也或為八句者除下品一句不識事疑罪亦不識罪疑事不識事不識罪不識罪疑事亦疑罪疑事不識罪不識事識事疑罪識事不識罪識罪疑事識罪不識事識事識罪右三種九句後若引用即名初九中九後九也次辨諸師意異者辨昔義中初師即是曇覆律師律師乃於淫戒之中明作犯一九即中九是第二篇前明作持九即初九是然於九十以彼小妄兩舌等戒應止持故二敷臥具應作持故約彼九十先明止持九句即初九是止犯八句即後九是二不可學止持即中九是三可學作犯即初九是四不可學作犯即中九是五可學作持即初九是六可學止犯或九或八即後九是此後九中若九與八各別説者即六九一八也然畢昵陀言可學不可學者亦與疏主意趣不殊如上略釋問何故可學或事為頭或罪為頭不可學事唯事為頭為諸九耶昔師答言可學事罪俱可學故心緣事罪先後無唯然不可學唯罪可學事為罪本以諸比丘先作事故聖制與罪故不同也問昔義不越三九各依何答準諸師意諸立中五皆依境想若立初後但是準義而不依文且如首律師不可學作犯即中九是彼自難云問根本不識事三句無罪便是六句何故云九答若就根本實應有六然根本上不識及疑亦有犯故若爾不識事識犯即是無罪但應有八不應言九答句法相從為九無失準斯立義諸依中九即依境想所餘九句不依境想諸師大同然不依境想者緣事三心謂緣房衣尺量之心了知七搩等名之為識猶豫不決名之為疑一向不了名為不識然疏主破大意有四一者據雙持破雙持戒體既是一體何用別立二九之異即顯昔師繁言別立過也二者約境想破謂初後九乖境想文即顯昔師無文孤立過也雖知昔師不依境想意難昔師汝立中九既依境想立初後九何以不依若言初後就房衣等諸可學説豈房衣等無境想耶既亦是有何須不依此即以理逼之令依非謂古師皆依境想大意如是次當墮章文次而釋止持無輕重者若使犯罪可論輕重今既明持故無輕重也識法識犯者若依昔意謂識七搩等了了分明若依後門疏中破意欲令古師依境想中初句立為識法識犯復由此中辨止持義故知即是自身不作但是緣他餘人作房起境想等自餘疑等準此應思唯除不可學事雖疑不識一向不犯可知者謂緣罪邊是可學處結罪如上而緣事邊縱疑不識亦不結其不學無知此謂境想疑與不識由心謬起不由不學故言不犯此即古師釋不可學意也準疏主意如犯淫盜等貪愛等事不可作故名不可學其中縱有不識疑等豈容有犯若從對法事應為二九者若準昔意法謂心緣白二如非事謂心緣尺量應不若準疏主破意法謂乞法事謂作房等約境想也止犯或九八言九者緣法緣事古今意別一同次前而説也言八者對教行不學者謂自身一向不作房等然亦泛緣白二教法及緣起行尺量事等并緣諸罪以起疑等是古意也若疏主破意謂緣他人作房等境想也辨非門於中總有五重辨破謂於昔師六九一八之中一者約第三第六不異為破也章云問對可學法作犯九等已下是章云不異煞戒境想上三者謂設許汝取過量者即是單犯理應九句作何用依初九作耶二者約第一第五不異為破也章云問對可學法説止持九者已下是章云若就名體各別止持者謂都不作是也章云然亦不得即攝同體止持者此中亦字意顯不由止名是同即令別止亦攝同止故云然亦不得即攝也明在雙持中辨所以但言作持為九正持之名沒而不彰者別體既無攝同體力故我難汝雙持之中所以但言作持為九止持之名不彰耶若言及過量境想是單止持者謂不過不過想不過疑不過過想即是反過量境想也論其階品還同煞等反作犯以明止持即彼中攝者謂若許汝依單止持者即應在汝六九之中第二不可學止持中攝應依中九何須別立三者單破第六也章云問對事翻行已下是對事翻行者謂對作房之事翻乞法順教不犯之行也上品四殘等者若準昔意緣尺量等起疑等九皆犯殘義即無失若依境想理如疏破然破意者難知古師不約境想但以房等文有境想應同不可學作犯依境想立何意獨令房等不依境想立九若言不可學中已依境想於可學中別依餘義者即應更難云不可學中雖依境想彼不能攝可學境想可學境想何不立九故違理也作犯準文九唯識事然彼通三此亦應爾者例破也謂彼作犯亦應九句皆唯識事然彼既許通識等三此亦應爾以此彼文俱有境想何故不同耶若無文孤立義成虗搆若境想又乖文次者疏主進退破也謂若進就別義立者即是無文亦是孤立謂可學中許就別立其不可學不就別義者即是孤立也若退就境想者翻到如是復為非理故知進退皆違理也準此詳之上來皆是雙遮而破而崇一向謂此先宗專依境想破彼昔義復有惡言大相陵忽出家之道豈得然乎四者單破第五章云又問作持上品為一已下是五者單破第一章云持作既非可學止持本合已下是頌曰三六與一五單五一假入雙中明理同此壞者若許別立應依中九假入雙持亦須依於境想還須依於中九別體之與雙持破既不殊故言同壞也顯正義門今師五九或六九多依中及依後九全廢初九而不用之也一者作犯對可學不可學二事合為一九唯是制教二者止持約二事唯制教也三者雙犯及單止犯合名為止犯唯可學通制聽兩教四者雙持并單作持合名為作持唯可學通制聽五者或立別體止持唯可學唯聽教六者進趣修習止犯八句作持一句合為一九通三學前之五九唯依中九後之一九依於後九次隨疏釋章云前房過量境想是可學事者崇難云若以淫等事不可作名不可學是則過量亦不可學如何過量是可學事今詳過量名可學者以手執尺量知過量此事可學不同淫等不許以身造境而犯以造境事不可學故名不可學故不同也又復齊是止犯作持為宗者盡理為言名雙持犯就勝為言但名為止犯作持也以先止法後方名犯要先作法後方名持就初為名即名止犯作持故也或可別體止持等者若據句法階降同於可學作持理應不須更別立九但由泛緣他造房事其相既別故復別論義既二途故言或也若根本不識便無下品者謂本迷人為杌想煞或復過量作不過想由本迷故便無下品不識事三更細論者若迷人作非人等想亦有後心之吉還成九句若同趣為異境雖是不識事而義同識事人想不虧故緣人之心有長短者疑心數數亦緣本境名之為長此判為重也想心一向棄本想餘故説名短此判為輕也若對可學緣事疑不識等兩全三句更加十二吉羅者計理不然疏主若約境想立義者緣事疑與不識心迷謬時制不由己何由乃結不學無知且如迷人為杌過量作不過想等豈由學問使無此迷何因乃結不學無知又疏自言事上三疑三不識謂是方便豈有得方便罪而由不學無知而得耶故不合理罪上三疑三不識是究竟者謂不學無知皆是果罪十二愚癡亦同究竟者緣可學事十二種不學無知吉知亦同緣罪二吉是究竟也若過量事疑不識者名同犯吉者此明止持何得過量以其過量是作犯故答謂實不過而心疑過故無失也然尋其況似脫不字應言不過量事也倍加前二者前不可學作犯止持之中唯緣罪邊結與不學無知二吉今此可學非但緣罪結此二吉而復緣事倍加前門不學無知二種吉羅故成二十四也境想所不出者謂律文中諸戒境想皆合六句第六一句文略不出也如下衣法分受成不成者衣犍度中有比丘有比丘想分衣不成分得吉有比丘疑分衣不成得吉有比丘無比丘想分衣不成無犯無比丘想成分得吉無比丘有疑成分犯吉無比丘無比丘想成分無罪受衣六句者亦如是對手分衣名受也羯磨法即名分也對作法儀軌者直緣七搩等事有識疑不識即成緣事三心也對成不成説者望心説也如不處分處分想本來無法而謂法成也又不處分疑本來無法而心疑法為成不成也為是其止為是其作者今此作持為句法式理實同於止持階次並是依於中九法式然望文取即不同也如前成立止持翻犯句句相當作持翻犯乃取境想第六句作若其不作如此辨異為是其止為是其作既須分別故不同前也對犯上辨異亦不類前者謂前作犯對犯成不成因果罪上辨其疑等今此作持對尺量上識疑等辨故不同也一如反多非者下曠彼疏中廣辨且略舉者如城諍犍度非法自言對七聚為四十九句如不犯夷自言犯七聚即為七句乃至不犯惡説自言犯七聚七七四十九若如法者實犯七聚各相當説即是七句反四十九句也持之體相隱在犯文之下者謂一一戒釋相之中先明五衆成犯方言不犯者睡眠無所覺知等今指其文也總解已竟者今詳前來非無妨難且順章疏不暇繁論然崇立破如破迷記已廣分別故今且止十門義三毒起成者諸經論中皆約十不善業辨其起成今此律中直辨四戒不得全中皆約十不善業道辨真起成今此律中直辨四戒同經論所説煞直故人盜唯滿五淫一切斷妄唯大妄故不全同也經論文多不可具敘且略指文如婆沙百一十六善生第六成論十二十不善業道品雜心第四俱舍十六彼皆廣説論其大況加行皆由三毒而起究竟不定俱舍頌云煞粗語嗔恚究竟皆由嗔盜邪行及貪皆由貪究竟邪見癡究竟許所由餘三雜心一同俱舍婆沙兩釋前釋同俱舍後釋云後有説者欲邪行不定謂若欲令要出不淨方成業道者則三為加行由三究竟所餘業道皆以三為加行由三究竟已上論文由三加行諸文廣説不繁録之然律罪名望業道罪或寬或狹如破迷記彼已略明此不繁敘以教人言了未犯要藉他身故者古來諸師雖同師釋尋其意況似未得意且如心論第四卷云自在者口語仙人意所嫌而煞謂是口意業自性者不然業自性異故事不究竟已上論文古來釋云此破外人義也謂成實師身口異業皆能互造雜心論主遂即破云業性異故謂身三支口具四過其性各異也又云事不究竟者此是釋通成實論主難也難云若業性異而令煞生唯是身業者如自在者口語仙人意所嫌豈非口煞耶答口業意嫌之時前人未死故云事不究竟故也謂假護仙鬼神打煞一國及假使人打煞前人成論十二云外道神仙起一嗔心即成耶羅于陀因若爾師子吼煞獸然夫咄煞人何有身業答以身力強吼咄方死若爾深河誑道淺何有身業答誑時未死要假前人身入水中亦是身業若爾呪物過開何有身業答準多論判呪神力持故也若爾妄語現相豈非身成答假他口業唱言坐起故非身業通律師云若爾造書置他人見即解何有口業故知理推然是一宗也今詳諸師以護仙神身業然故遂判以為仙人身業若爾仙人便受他人煞生之罪是豈容他作我受果耶妄語現相似他口讀判我口業亦同此破今應更釋薩婆多意遮意業不能煞生不將他身判我身業謂身業者必不待餘即能斷命今仙意憤乃假他身故知意業不能親煞若爾仙人得煞生罪既非意業又不許以他身判業將何以受煞生果報答意業既非親成煞事故假他身煞彼為緣發生仙人身中無表以為身業深河誑淺亦假前人入死為緣發我身中身業無表乃至造書置他既不即能令他耳聞故知身中不親造語還假他讀領解為緣生我身中語無表業故云業性異也不同大乘經部成實皆許意憤親成煞生不假身中別表無表故不同也故二十唯識頌破小宗云彈宅迦等空云何由仙忿意罰成大罪此復云何成述曰真諦三藏云彈宅迦是王名也彼時有仙未獲五通先有妻室顏貌端正與世無雙彼仙後時遂得五通山中禪思每使其妻營辦飲食彈宅迦王入山遊戲遇見仙妻問是何人傍臣答云此是仙妻王言仙人既已離欲何用妻乎即錢入宮仙人食時望食不得問其所在有人答云被王將去仙人往至王邊索妻王不肯還云汝是何用畜妻仙云我令供給飲食再三不還仙便生忿於其夜中遂雨沙石王及國人悉皆死盡此國俄頃遂成山林如是等處空寂無人既由仙忿豈非意業成煞生事薩婆多故云護仙鬼神敬重仙人知嫌為煞遂即破云意罰成大罪此復云何成此意説云昔有長者名塢波離來至佛所佛即問言汝頗曾聞彈宅迦林皆空寂不長者白佛此由仙憤佛言長者故知三罰意罰為大謂由一念煞一國人豈容身業有此大罪既佛引此彈宅迦林為成意罰汝薩婆多何得執言護仙鬼神為仙煞也問大乘等宗許意成煞何故經中煞生業道皆名身業答從多分判多由身煞非謂意業不能煞也心論云口業或身動乃至業性異故亦是心論第四答也續以又云著身口業故謂各自屬著無容雖雜亂也尼教僧漏失尼得蘭罪尼自漏失尼得提罪也犯不犯四句者自犯他犯教人買賣是他犯自不犯使尼浣故衣是俱犯煞盜等是俱不犯作餘食法以勑人兩個四句者能重所輕諫調達時作白未生見教令莫捨調達得吉能教蘭所重能輕教人行淫俱重俱有盜心盜得滿五俱輕劈地能犯所不犯能教有盜心所教無盜心第二句反上自是俱犯俱盜心是俱不犯俱無盜心又復天物人應無用者智論三十八云四天王衣重二兩忉利天重一兩摩天十八銖兜率天十二銖化樂天六銖他化自在天三銖色界天衣無重相述曰既全輕薄故無用也時久生瞋者下文那迦波羅恐怖世尊也盜誑畜生並得吉羅者準鼻奈耶盜畜得夷此律無文亦應能變盜之得蘭不變者吉誑畜生者律有明文變形得蘭不變得吉文義既爾故使章中不勞問答上二多智者人非人二也斷命奪財夷蘭各等也畜生階四夷蘭提吉者淫夷也煞蘭提也盜誑吉也如實義者盜誑蘭吉也自施自慳等妨者謂作難言若無自盜應無自慳何故經言世又有人身不衣食命終當墮等耶答慳結或盜約損他若爾既有自慳應有自施答施據捨財寧容句攝若論異境者已下並局據異境上罪也尅漫並犯輕者尅漫名異體一如上已辨錯誤義別亦如上辨錯誤對妄語所稱法者如章中釋然崇引十誦五十一問頗有比丘虗説聖法不得夷耶答曰有比丘欲須陀洹誤説斯陀含伽論第八欲説須陀洹而説斯陀犯蘭今許此據欲稱此聖錯稱彼聖理合犯蘭豈能破此錯稱凡也又詳善見不同十伽故善見十二云欲説第一禪發語我入第二禪此是語誤第三第四禪亦如是悉犯重罪捨戒亦爾十種七句非受具人離處謂捨戒作非具人也嗔境雖二者情非情二也得罪不等者若煞非情不犯夷也然於情道復應蘭釋也誑要有心者境若無心不成虗誑也崇云不識文由故作斯釋婆沙一一三為加行云何乃云貪心起於前兩等今詳此約四戒彼據業道又就顯勝有何不識此如破迷記中廣已破訖五年冬分等者西國月法先黑後白準此數之正月半後方是正月也不同五十二戒接俗不斷自妻制淫不盡故在第三若爾沙彌都禁淫應初制答沙彌年幼淫總未生小兒乏慈煞為初首此準初緣為語如未曾有經羅云出家始年九戒是沙彌之道也至今西域七月十五日諸沙彌等採華供養羅云也今詳未曾有經是為經也又詳次第義者或可更釋制後後戒以防前前煞之與淫俱有初義淫煞謠煞諍初同前奪釋思之可解五支戒者涅槃十一云一根本業清淨戒二前後眷屬餘清淨戒三非餘惡覺覺清淨戒四護持正念念清淨戒五回向阿耨多羅三藐三菩提戒不造二業者不造五中根本業及眷屬也千門義竟多論云以結戒等者彼第二卷不謹録論文也三種通緣今詳猶恐未足第四應加隨違制脫辨通緣即應通攝諸因果罪也諸戒別緣即開此第四作之或無罪者先捨戒而後犯也怨逼闕緣者闕初緣容可同前自犯闕緣若闕第二亦容自犯闕三四緣即全無犯戒闕第三容逼非境得殘第四闕別有四者謂境強緣差境心息故不身境合也若準怨逼又除心息也解毗那耶為四者梁朝攝論第一云復次毗那耶有四義應知一人佛世尊依此立戒人謂犯人二立制已説過失大師集衆立學處戒本是也謂立制者即是已説過失也三分別已略立更廣解釋解釋相是四決判此立制中云何犯罪云何不犯等還是釋相中決判犯不犯問與第三何別答前辨戒本唯顯犯相此中第四通釋開遮也增五疏釋與此中不同也從初至正法久住辨結戒相等者有餘破云此中未結如何酬諸人即釋言至久住來是結戒結欲説已下下正結戒今詳疏釋理亦無如謂生十利是結戒家功德想也第二欲説已下示其説律並無違失而崇浪破不能繁敘文言爾時世尊者多論第一問契經阿毗曇不以佛在初獨律誦以佛在初答曰以勝故祕故佛獨制故如契經中諸弟子説乃至有時化佛説律則不爾一切佛説是故以佛在初有如契經隨處決律則不爾若屋中有事不得即結必當出外若白衣邊有事必在衆結聚落中有事亦在衆結五衆有事必在比丘比丘尼邊結是以佛在初聖住等者智論第四云何名住身四威儀是名為住復次三種住六欲天住法是為天住窮地且謂天梵天等乃至非想天住法是法梵住定地法名為梵佛辟支阿羅漢住法是名聖住三乘無學於三住中住聖住法憐愍衆生住王舍城復次布施持善心三事故名天住並是散善是生欲界天因也四無量心故名梵住此四無量唯在色界空無相無作三三昧名聖住聖住法佛於中住此三三昧唯顯無漏也復次四住三住如前第四佛住佛住首楞嚴等無量三昧十力四無所畏十八不共法一切智乃至如是等種種諸佛功德是佛所住處佛於中住見論山鼠第六卷也多云求得者彼論第一父母求諸神祇得故名求得了論名善與者論疏云須陳那翻為善與其父母無兒供養鬼神從之乞兒乃感鬼神為作因緣令其得兒其母夢見有一夫人懷抱一兒須提那母語夫人云我今無兒願以與我彼遂與之別有夫人來欲奪之須提母云彼與我兒與兒夫人即是此夫人之姊也其聞姊與歡喜不奪讚云善與因此有娘生便為字也五家者見云王賊水火及惡子也餘悉不論者祇律第一云信家非家捨家出家善見第六云往到佛所便求出家乃至從羅睺出家之後父母不聽佛不許度是故佛問父母聽汝不彼方還家求父母聽乃至問曰為是如來度為衆僧度答曰比丘度是時佛邊有一乞食比丘佛告曰可度須提與具足戒唯此便是問遮之後定是羯磨疏言餘悉不論故不盡理也二損者比丘失利親族無施福也兩益反此也文言但汝父財既多者了論疏云其家大富若以財物䨱地在東望西不見西人若積聚之亦能次人兩邊相望亦不相見文二可知者一重舉財勸二母如是再三已下正舉色勸也經與凡夫為喻身口如釜等母經第七云云何煩惱名為犯義如器中著水然大濕出煩惱火能令身口放逸作不善是名為犯西音者明了疏説也又云兒年五歲母遂遣送與須提那父子相念不復肯還年七歲度兒出家出家後即得阿羅漢其母聞兒出家亦即出家亦得羅漢須提既見毒妻兒得聖又見諸同行人得聖者衆而猶不得自念其身我曾不懈何獨無獨得愁憂不學問諸同行諸同行人語云汝宜自觀有何過失遂説昔事比丘呵責白佛佛因立制須提那於佛得道後即出家爾後少時遂即破戒破戒後經八年佛方制戒唯此制時復異僧祇續種者祇律第一云其家義言本為乞種故今當立字名為續種文言尊者種子者尊者即種子持業釋也五分第一云是兜率大威德天受胎時地神告虗空神言迦蘭陀子於未曾有僧中作未曾有事空神告四天王四天王告忉利天展轉至梵天首律師云上下呵人總有十種佛及七衆非人畜生思之可見非要不録若理趣時情等者謂若深理事即難知今既同後所呵明知可有了知之分在己身立也思前重貪等者此是依成論宗義也然所是心差別識想受行次第而起不同大乘及薩婆多於一剎那心王心所各別有體也此貪受等一切煩惱皆是第四行心中攝然行心中亦次第起以先起貪次方成業業即是思貪於先起故言思前餘句準此文云世尊爾時以此因緣者首云向上有二因緣一者以須提那犯因緣二以諸比丘白我因緣向下有三一者集僧呵責因緣二集僧制戒因緣三對衆呵責須提作鑒誡因緣故佛成觀者並是略録多論第二云為肅現在將來弟子凡是僧事衣問有力無力問衆詳宜不得專獨論文也五種僧多論第二云羣羊僧者不知布薩行籌説戒自恣羯磨一切僧事盡皆不知猶如羣羊故名羣羊僧無慙愧僧者舉衆共行非法行淫飲酒過中食凡是犯戒非法一切同住名無慙愧僧別衆僧者如羯磨死比丘物以貪穢心設客比丘來不同羯磨凡是隨心別衆羯磨名為別衆僧清淨僧者一切凡夫持戒清淨衆無非法名清淨僧第一義諦僧者四果四向名第一義諦僧多論四過等者彼諸第一但有一四疏中反覆用名非謹云義合疑問多論四益者此中別文即是制義意中通制之意與此中所引文同然此言四益前言三者彼除知先作無罪是故但三以此一緣非通制意不該第三已後犯故故彼除之崇拾遺云此妮假説成失不爾情懼金剛者五分第一云諸佛常法有五百金剛神待衛左右佛問三返不以實答頭破七分情有所懼不敢拒且應有一何以故者亦應有一何以故何以略教須斷欲法故言何以故多過故者謂應接此第三舉略轉釋文後即置此何以故何以略教須斷欲法故等也此後方言説欲如火等好毒蛇三同七異並多論第二文下二轉釋單勸捨順意者前者科文總為四節即下二節文為下二轉釋也疏意向前取第三文向後取第四文為下二轉釋也翻此二種轉釋即應言何以故何以犯毒不墮惡道故釋言不違略教故又應言何以故以何不違教故以毒非過故如疏應知文言亦如樹果者有餘共引孛經云惡從心生反以自賊如鐵生垢消毀其形樹繁華果還折其枝蚖蛇含毒反害其軀多論第二云是愚癡人者佛大慈愍兼無惡口云何言愚癡人答曰佛稱實之語非是惡口此具縛煩惱衆具足愚癡故二慈悲故呵責折伏如令和上阿者利教誡弟子故稱言癡人言亦非是惡口見論第六如來以慈悲心薄賤佛言次癡人空無所有乃至佛見須提耶已作惡法以慈悲之心而言癡人譬如慈父母子作惡亦呵罵其子癡人何以作如此事婆沙十六多復次釋不能具敘一釋云有作是説世尊所以訶責諸弟子者欲使來種善根者能種善根已種善根未成熟者速能成熟若已成熟未解脫者速得解脫若不可責失此善利故佛為此稱言癡人問癡人是何義為從癡生故説癡人為現行癡故説為癡設爾何失若從癡人生名癡人者亦從貪恚慢見等生世尊何故唯言癡人若現癡故名契經不應説阿羅漢亦名癡人如契經説遠去癡人勿我前住乃至又餘煩惱亦有現行何故唯説癡人非餘有作是説從癡生故名為癡人若爾亦從貪等生何故唯言癡答遍行故癡為一切煩惱相應故言遍若佛知訶阿羅漢等以為癡人於物有益即亦訶彼阿羅漢身亦癡生故如契經説無明所䨱愛結所繫愚夫感得有識之身智者亦爾阿羅漢等説為癡者有餘師説現行癡故名為癡人問若爾者契經云何通答且契經説遠去癡人勿我前住者是誦者謬應如是説遠去苾芻勿我前住乃至有餘師説阿羅漢等亦現行癡不染無知猶未斷故問諸餘煩惱亦有現行何故唯説癡人非餘答前已説言癡遍行故多種有漏處者覺云華嚴十地論有二種業一者招生要經三趣二者若生人中得二種報一妻不貞良二二相諍今詳不然若以招報若有漏處持戒清淨亦招異熟應亦須呵餘律餘論多言開諸漏門此意説言與餘無量多煩惱者為前導故無量煩惱及隨煩惱因此而生名多種有漏處故多論第二云開諸漏門者須提那於劫初來未有男女作淫欲事而此人於彼最初行淫作惡法根本今佛法清淨未有非法而須提那最初為惡作將來非法罪過之始故言開諸漏門祇律第一佛言耶舍是為大過比丘僧中未曾有此汝愚癡人最初開大罪門未有漏患而起漏患天磨波旬常求諸比丘短而不能汝今最初開魔徑路汝今便為毀正法幢建波旬幢等又釋無量無數尤重煩惱住汝身中名曰多種有漏處也
