body:
  text: 嵩嶽鎮國道場沙門賓作無根謗戒梵云阿莫洛迦阿奴段莎此云無根謗也式叉鉢陀此云學處今就義翻名之為戒或見言聞疑前戒中收者法相然亦有文證故十誦第四云若疑言見疑已言聞是謗也不可無他非時者淨施之法不能無他非時過也不癡正修者謂彼本來於正修中未具足故今者雖擯無正可損二重教者一者大僧舉法二者尼中諫法也敬云見聞中淨者對之作法得成非謂即得足數也有餘不許謂據下文解不足數皆云自言今者既未自言又無三根故亦三根故亦得成足數也今詳體淨和合義生體若不淨合和不生故依敬釋為正下文自言者據共委知故作此說不欲顯彼未自言者即成足數問既未自言誰委不足答如本受戒十僧之中有不淨者後徑多時知彼不淨理須更受故云不足也五分下至不同犯者彼者因病開乃至亦開犯為境但不同犯也若准律攝開不同犯許為懺境然波羅夷望波羅夷名為同犯望餘殘等為不同犯殘望殘罪以為同犯餘名不同犯乃至廣說或可成舉者以不淨心對不淨境復具五德故成舉也或不成謗者以不淨心雙對淨境及不淨者境皆不成謗也故無不淨想者謂要須作具戒淨想始得謗罪也所以彼具五德者彼舉罪中要具五德也如下遮犍度知時不以非時真實不以不實有益不以損粗礦慈心不以嗔恚頌曰時實益濡慈為結僧殘故須八緣者餘皆破云若由具八故結殘者小謗具八何不得殘今詳疏意非顯數八即結僧殘若數減八即成小謗也今疏意云所謗之罪通上下能謗結犯亦階降故結殘罪由所謗殊然得殘時由八緣具不遮小謗亦八緣具也要應對僧者不然依僧祇五分好也欲求捨會捨不窂法會堅窂法也二屏言者一求捨會二念營僧也有餘身智者未入無餘身智未寂有為生滅故可厭也尅之不難者或可沓婆是留壽行婆沙百二十六云云何苾芻留多壽行答謂阿羅漢成就神通得心自在若於僧衆若別人所以衣鉢或以隨一沙門命緣衆具布施施已發願即入邊際第四靜慮從定起已心念口言諸我能感當異熟業願此轉招壽異熟果時彼能招富異熟業則轉能招壽異熟果問彼有何緣留多壽行答留多壽行略有二緣謂為饒益他及住持佛法住持佛法者謂營佛像房等事又彼觀見當有國王大臣長者欲毀佛法若見餘人無能善巧方便住持便留壽行問所留壽行為由定力為由施力乃至如是說者俱由二種文云彼審觀察為施僧衆當獲大果為施別人若見施僧當獲大果便施與僧若別人當獲大果便施別人述曰准此或可求堅固者是留壽行分僧臥具等是住持佛法也見論十三云問曰此沓婆何時發此願也答曰過去有佛號波頭勿多羅是時國人請佛入國六萬八千比丘圍繞大會供養七日布施時有羅漢於大衆中以神通力處分床席及諸飲食是時沓婆見已心應而白佛言願我後身當來佛時如今羅漢神力無異是時佛言從此百千劫已有佛號釋迦牟尼必得此願沓婆從此展轉乃至釋迦出世出家得道從禪定起而作是念多論第三差陀驃者為滿本願過去迦葉佛時亦為衆僧作知臥具人稱可僧意爾時作願願我將來亦為衆僧作知臥具人及在彼世時亦知臥具稱悅時人是以今佛還知臥具五分以今佛還知臥具五分第二云佛在王舍瓶沙日日請五百僧城中臣民亦復如是六羣比丘常往好處諸人問言我等為僧次第設食何故長老常來不見餘人時陀婆子十四出家在靜處作是念而僧無有差次會者致使六群選擇好處以失衆望喪人施意若我二十受具足戒得阿羅漢當為衆僧作差會人及分臥具十六成道二十受具便作是念今時以到便可作之述曰過去此生發願時別是故章云稍異可知梵云杜多窶拏拏舊云頭陀訛也言杜多者因搖動亦詮洗濯即是搖動煩惑洗除過患義也聖住意經下卷云斗擻貪欲嗔恚愚癡斗擻三界內外六入我說彼人能說斗擻如是斗擻若不取不捨不修不著非不著我說彼人能說頭陀述曰謂因斗擻而能證理不取不捨既證理已復能依自所證為人宣說故云我說彼人能說頭陀也崇云杜多此云洗除頭陀此云斗擻者今詳本音元來是一不合別翻也謂隨坐一是人最勝於餘所行咸能同彼故稱隨坐者破迷記中雖為別釋意顯釋者義有多端理實疏意欲顯隨坐隨修十一繫念而坐也此即逐名以顯其義俱顯行勝於理無違然若欲令憑文釋者梵云搜悉他僧悉呾理迦上聲呼之云隨有坐處人住也意說此人於敷具貪捨其愛著故云隨坐故瑜伽二十五云云何名為處如常坐一敷設後終不數數翻舉修理如是名為處如常坐即常此律隨坐也即毗尼母云隨得敷具足也崇云舊解隨坐最勝於餘所行咸能同彼故稱隨坐餘十一偏能未必通行此解不然若以隨坐通行餘者衣食既非是坐如何得稱是坐又昔解云於坐四中恐生貪著故立隨坐此亦不然於坐既爾若貪衣食應知亦爾斯並不識文意故作斯釋此是隨坐敷具不名為坐又引瑜伽一敷設後終不數不數翻舉修理如是名為處如常坐小品名隨敷座母論名隨得敷具解脫道論名遇得處坐今詳崇師實不遍尋此等諸文而遇撿見其法師依諸經論集為義稍懸即引來能通大教幽旨今詳實理小見對文大智隨義故諸聖教其例實繁且如律自言見者苦見集見盡見道又自稱言天眼清淨等此逐見名而開兩義今遠隨坐顯隨修義深順大智之遠見也然於世間多封文句謂為違理深擁修學一切智門於一義中解無量義實難得起也因今決斷故示此途實不存乎彼我之意也如瑜伽六十九云鸚鵡喻補特伽羅者唯隨文轉不能依義發異語言炬燭喻補特伽羅者依少羯磨便多增益現行種種隨意言詞猶如炬燭即其事也然昔解意文中五坐必有敷具餘之四坐或有生貪唯此隨敷離貪最勝故云於坐四中恐生貪等亦無失也因此便釋杜多意者如瑜伽云如是杜多功德能淨修治令其純直柔𤏙輕妙有所堪任隨依止能修梵行是故名為杜多功德述曰意顯杜多但是令其身器清淨方堪受道故云依止能修梵行也故智度論七十二云是頭陀法皆是助道及隨道故諸佛常讚也謂檀越僧食食有多過故者智論七十二云若受請食若衆僧食起諸漏緣謂受請者若得請時即作是念我是福德好人故得若不得請則嫌請者彼無所識應請不請不應請請或自鄙薄懊惱自責是貪憂法則能遮道若僧食者當隨衆法斷事儐人料理僧事處分作便心則散亂廢修行道有是事故受乞食多論第二淫戒中敦厚也崇量也此少藥故等者智論云於古四聖種中頭陀即三三事述曰古四聖種者謂諸論師古釋以四依為四聖種也後諸論師五四聖種其義即別且如婆沙八十一云隨所得食喜足聖種二隨所得衣喜足聖種三隨所得臥具喜足聖種四依有無有樂斷樂修聖種婆沙百八十一釋云問樂斷樂修有何差別答樂斷煩惱樂修聖道復次無間道名樂斷解脫道名樂修復次見道樂斷修道名樂修復次樂斷者顯諸忍樂修者顯諸智是謂差別述曰古諸論師即開前三為四聖種故不同也四聖種義至下破僧戒中釋之梵云阿蘭若迦諸迦字並上聲呼之去村五百弓義云住靜處人也嵩云梵音正曰阿練若此云無聲處今詳此是妄判訛正也梵云賓茶波底迦此云常乞食也梵云羯專鉢夫遮薄底迦此云不重受食也此含二義一者不作餘法而食二者一時受訖更益不受也梵云㗨迦珊尼此云一坐食也梵云波呾囉賓茶波底迦義譯云一揣食也智論七十二云如經中說舍利弗言我若食五六口以水足之則足支身於秦人食可十口許已上論文梵云染摩奢你迦義譯云冢間坐也梵云何毗婆哥始迦此云露坐也梵云苾力叉慕里迦此云樹下坐也智論云樹下思惟如佛生時轉法輪時涅槃時皆在樹下行者隨諸佛法常處樹下梵云泥殺此云常坐也隨坐如前梵云呾哩支伐離迦此云但三衣也或有處說十三杜多如解脫道論瑜伽論等同異之相不繁論也唄匿者下受尼無尼讚食戒中云是讚偈多論第三云讚修妬路讚修妬路共是也多論又云問曰是四人其業各異何以常不相離答曰阿練若禪法有所疑滯咨問有處兼欲數問說法僧修是以相近持律者凡欲知戒相輕重決了罪過斷解僧法是以相近法師者義論說法稱揚三寶能增善根契經者誦諸大經多知廣見隨事能答故相親近見論乃至無記語亦共一處第十三云無記語者不修三業食已而眼眼起洗浴共論世間無記之語全身肥然問曰何以無業共在一處耶答使樂道故得生天上十五俱云入火光三昧者十誦第四分臥具時不須燈燭左手出光右手持與有比丘故待暗來欲看陀驃神通之力五分第二即入火光三昧左手出光右手示臥具處莫不見合時諸遠方聞有是德皆作是念我當往彼問訊世尊并見陀婆及覩婆神力僧祇第六左手小指出燈明見論十三入大光三昧者此是第四禪定禪定起已放右手第二指以為光明須臾聞滿閻浮地諸比丘從遠方來欲看神力沓婆自隨一比丘為安止住處為餘比丘安止住處悉是化身如真身無異佛被婆羅門女謗者智論第十云旃遮婆羅門女繫木盂作腹謗佛云與我私通故有身也淨定心者然四靜慮皆能發通依善見論云是第四靜慮所發若手出光也應知四靜慮及前三無色各有三種謂味相應淨無漏味謂愛味謂此定心與愛相應緣於淨定以之為境深生愛著也言淨者謂善有漏謂定與此善法相應婆沙百六十三云問善有漏定有垢有濁有毒有刺有漏有過失云何名淨答雖非究竟而以少分淨故名淨謂引發無漏勝義淨故順聖道故也言無漏者謂是聖慧謂定與此無漏相應總名無漏今言淨定三種之中簡染汙及無漏定也從淨定心者准俱舍第七欲界加行善心無間許生色界加行善心復說色界加行善心容生自界六心謂即一加行善二生得善三有覆無記四異熟五威六變化上界無二坊心或生欲界三心謂三一加行善二生得善三變化心准此故知離淨定外無別通慧心也其淨定心即是色界加行善也應知此中沓婆入定起變化心化作事訖留此化事至定外用故婆沙百三十五云如是說者有留化事俱舍二十七亦爾多論第三正義不正義相雜而說有人謬引不違是非今不繁引問何故檀越聞慈地來便設惡食答多論第三云先業力故又此人日夜無清淨心天龍鬼神與作因緣令不如意據凡聖等者昔在凡位猶尚不犯況今得聖以難況易准此應知過去果報惡業熟者多論第三云過去迦葉佛時作知食人時有一羅漢儀容端正在路而行有一女人見生染愛隨觀不捨時主食人見其如是謂先與交通尋作是言比丘必與此女人共作惡法以謗賢聖故墮在地獄罪畢得出以本善業值佛得道殘業力故受此惡報五分第二得惡食已便還道中行罵陀婆力士子要當令汝受苦劇我到所住已向諸上坐言陀婆隨愛若畏與好不畏與惡諸比丘言汝等莫作是語何以故陀婆比丘得阿羅漢備六神通隨愛恚癡無有是處慈地言正以得神通故觀見請家好與餘人惡輒差我作是語已先為陀婆作惡名聲然後遣妹往佛邊謗五分第二唱言大德僧聽此彌多羅比丘尼言陀婆汙我僧今與自言滅擯若僧時到僧忍聽白如是述曰彼律大僧與尼作擯者且顯當時之事非是通於末代也見論十三諸比丘即教慈地比丘尼脫法服覓白衣服服與著驅令出慈地比丘見擯慈尼語衆僧言此是我罪莫擯慈尼下文不犯白言犯者滅諍犍度下文不犯夷白言犯七聚乃至不犯突吉羅自言犯七聚七七四十九句不成白言也九總者一愛我怨家二憎我善友三及憎我身過去然未來當爾現在現為三世各三故成九也非情處起嗔者如俗書說冬祁寒小人猶曰怨恣咨等類也此通相說有十因緣今謗他者但由九總或亦通十思之可知論言眼識隨生見等者雜心第二卷頌云若眼隨生見耳界隨生聞章中言眼識隨生見者非也以二十卷云自分眼見色非彼眼識見非慧非和合不見部障色故述曰自分眼者謂發識眼識現在根名為自分眼與眼識同作自事名為自分也新經論中名同分眼也非彼眼識見等者經部立義識見非眼故復有餘部眼識相應慧能見色復有經部一師別計眼與眼識和合名見今薩婆多並皆破云不見障色故謂心心所取境之時無有障隔若識等見應見障外故知識見不應正理今章中引文言雖似雜心論文而言識見順成實論故第五卷根等大品云但識能見眼得其名廣說如彼天眼非事者天眼是通不同事眼也解釋可知者聞取聲境理不合從見疑後生見取色境理亦不從聞疑後起自他想疑者此四各合三根也此四並虗者容有虗義非謂決虗也以不定見聞故者不是決定定明白見彼入林出林亦是問彼動床等聲然不的知彼實有犯故不得成見根聞根而但得成疑根所攝也若有第三即無餘三等者計理應許自起想根復有他人言彼人犯犯是則想根與他根並疑類亦然故章所釋非為盡理也從他但應二者自他想疑各含三根從他但二豈不違例也言舉謗成者解此根義前標四門第二門云定根多少虗實並不並等今此為釋標中等字故云言舉謗成不成也自他二種有則成舉者若必闕德亦不成舉然不成謗也證正義弱者既由橫想僧若勘問不能一一問答想應也若無或成舉謗者實根以替想根亦名為無而由具德故即成舉二者直爾無其想根妄陳他犯故即成謗故云或成舉謗者由實根替而𨷂五德故不成舉然由有根故不成傍也有人釋云或成舉謗者謂成舉也不成舉謗者由前成舉今不成謗由前謗今不成舉也今詳此釋不順本意故前釋好無同於想者同前想者同前想中以實根替亦名為無若直爾𨷂亦名為無由此亦有或舉謗不成舉謗義也不以見聞名疑根者此離意云今此實根何意不言見疑根聞疑根耶事雖是有是實者入林動床事雖是有眼見耳聽亦復非虗故云是有是實也然疑通見聞又通有無故即見聞時未定者謂疑通緣見聞處起亦通有犯無犯處起故即見聞之時未定知犯也攝疑不盡者若言見疑但顯緣見不顯緣聞及緣有無故攝不盡若言聞疑及此應說此義通四者即通見聞有無四處而起疑也謂謗成不成者成謗之疑濫不成謗之疑也謂若橫疑隱而成謗若有根疑即是實根足得舉罪不隱成謗也又寬狹故者今詳疏意根疑為寬謂通見聞有無四處起故也橫疑是狹疑三根故也瑤云根疑是寬疑五犯故橫疑是狹疑三根故有餘釋云橫疑是寬通三根故根疑是狹唯見聞生故也今取初釋以順疏意故下疏釋云根疑從見聞事生也謂所見事如入林等及所事如動床等即此事中疑其有犯及以無犯也又云不從前二根生謂別有了見聞生而不疑見聞但疑事不犯者意說不從前二根生云我為見為不見等謂別有不了所見所聞入林等事而不疑能見能聞云我為見為不見等也想與實根同緣俱於犯起者謂此橫想與彼實根俱於犯處謂為實犯故於三根各配一想顯與實根相相似故雖顯相似而想與根名既不同不恐相濫若論橫疑相非相似是故三根不各配疑又儻配者若見配疑即濫根疑以聞配疑應知亦爾故總言疑方顯橫也又可想類前二根等者前釋實根見聞及就別相為名疑根乃就通相為自今論橫想是別相故類前二根而論橫疑是通相故類第三疑也問小妄八語此無六語者何者小妄之中不見言見不聞言聞不觸言觸不知言知成四語復有四語反此應知何故謗中但有小妄初之二語餘六皆無也犯非觸知之境者若准明了疏釋疑根具從五塵而生如見女衣在比丘床便疑有犯或聞女人共比丘語或聞衣服有女人香或見從女乞食之時少乞與或與酒等或比丘邊觸著別人應知亦爾准此觸後亦得生疑餘可知也疑二生疑者從見聞生疑也上來相傳皆言曇無德顛倒解義將欲說無必先解有今詳未必然也不以此義而釋顛倒也應言三四有疑不妄妄五六無疑無妄妄章中欲令言辭便易故倒說之第二心驗三四心證者文中第二既有想妄即驗初是有想不忘文中三四既是有疑不忘及忘即證初二有相不忘忘也古師有想不忘心言得出者彼蓋意說謂彼前境內實清淨然於外想粗橫不護彼能謗者見聞疑彼相粗事已即作想云據彼相粗決是有犯此是有想及至謗時言我無相我實見等今師意者說橫起還心謂見謂聞謂疑彼犯即是想根既稱想說如何成謗故知非理前後相違濫者前言無見聞疑等相後言我見聞疑汝若內心無見等相云何口說得言見等即說相違名之為濫單同後六現六者是汝者據現作其理即得所加兩句即不應理如小妄第二心欲發言道不見等者彼小妄第二心云若比丘不見不聞不觸不知是中有見等相便言不見等知而妄語提此雖亦是有想不妄然彼發言不見成妄即是違心返顯言見即不成妄故此謗中若發言見亦不成謗是故章云如小妄第二心等也上判五妄殘提二妄唯取心虗者若是古義可成自違若是今義無容自證也無想妄即有想不妄者本緣前境作清淨解各為無想後時緣彼忽謂有犯即是妄前無犯相也無疑妄心准此應釋以防巧故者我若本來有疑不妄可說成謗我曾元疑後方有疑應不成謗防此巧故俱判成謗若前有想尚妄可說成謗我曾無疑後方有疑應不成謗防此巧故而成謗乃至故不對有以言無想者謂如文中第二句義若先有想至彼謗時尚須妄却而方成謗況今初先來無想足得成謗而豈須言由更別有有想謗句為對彼句而言無想故次疏中結云故不對有以言無也問聞疑為有無等對詞是敘古人難意也古人難云聞疑若是有順前而妨後順前者順前文云不見也妨後者妨後謗時言聞疑犯而得成謗也聞疑若是無順後而妨前順後者順後失也身時成謗無文中妨前者妨前單云不見也今詳亦應云聞疑若是有順前為妨聞疑若是無順而妨前也今章中意敘此古難故云若是有者可得獨言一不見此即順前也亦應言道不聞疑何以獨舉一不見此即妨前也昔來作難作解非者諸人敘其古人難解言詞雜亂難可取悟今取古意為作巧文以顯其義言古難者即向順前而妨後等難也言古解者且總泛論見聞疑各有三種自及橫想此師不立疑心三根次配律文者三見俱無故得前文單標不見論其聞疑雖無自他二種聞疑猶有想心聞疑根在故不得言不聞不疑此古師意由有想心聞疑在故即不妨前後由無彼自他聞疑故不妨後若爾既有想心聞疑何容成謗即昔解云隱却想心舉實聞疑故得成謗即復有雲律師云且如無一舉二傍中第四章門第三心應言若不疑彼犯夷是中有疑便言我見聞犯夷僧殘然此有疑即是橫疑既有橫疑而文亦得標云是則違汝三見俱無獨標不見也以此不疑不具三無而標不疑故也復有餘人將此雲師以為契理遂助破云此有橫疑上下成妨一者上妨猶不見以第四章既有橫疑得言不疑如何汝言三見俱無獨標不見也二者下妨以第章疏有橫疑得言不疑亦應雖有想心聞疑得言不聞不疑耶是故初釋不應道理今詳雲師亦不違理何因妄許雲師契理且如雲師所言有橫疑者為據疑想名曰橫疑體即是橫疑想是橫疑者即第四句有疑忘心與第二句有想忘心應無差別謂第二心作文應言若不疑彼犯夷是中有疑想後忘此相便言我見聞犯僧殘故與第四應不成別若言疑體即是橫疑儻他古師救云我但說言三見俱無曾說言橫疑是無於我何過此豈成難故今疏中都棄古釋云昔來作難作解者非也遂即直破云以初心是無無想不忘何處得有想心聞疑來耶若許有想心聞疑者疏稱想說何容成謗如上廣以五義破之者是也今詳即以第二心破是顯非非理何用更引第四章門第三心也此次第二心律文云若不見彼犯是中有見想後忘此想便言我聞疑犯汝若執云三見俱無故標不見何因次心文有見想亦標不見自下同然者此章既無想心聞疑後章亦無想見疑等也謂皆據其謗者之情所欲舉根不欲舉根而互舉之非有想心及三見俱無等也問第二句不見彼犯等者此難意云此句欲舉聞疑謗他而文不言有聞疑想忘聞疑想何因前章欲舉三謗而文即言有三想忘三想耶解言道理此章門中三根俱無信立一不見者有疏本云信交立一不見復有疏本云位立一不見謂據實理三根俱無而希他信立一不見也此中總意者實理決定有三忘三何妨就中立一忘一也又解縱使位不見不妨亦得三想俱有忘三想後解好答以其橫想皆無起有等者此總意云本立不見名之為無以皆此立有見想復對見想立忘見想是律文意也本來立不聞不疑故不皆此不聞不疑立聞疑想由不有想亦不說忘彼據理說者一切章門理實無三然獨初章言無三者據理盡說今舉謗情者即談第二已下諸章故立多少者謂謗者情或自口云我不見有見想忘見想其結集家依彼口言立為章門餘句類然故互多少也不煩作多句者願律師云且無三中第一心上廣加六句總數即七初句無三舉三文中自有也第二無三舉見聞謗第三無三舉見疑第四無三舉問疑第五無三舉一見第六無三舉聞謗第七句無三舉疑謗上來唯初句更加六句合成七句也下之五句各加六句准前應知即是無三舉三之中句有六七四十二句也今師意云汝於六句各加六句以為七者一切句中所加六中第二三四即是無三舉二根謗與現文中第二三四無三舉二見竟有何別又復所加一切句中第五六七即是無三舉一根謗與現律文文煩之中無三舉一見復何別故並非理也二對小忘辨同異者欲辨同異欲且敘小忘兩箇六句然彼具約見聞觸知今且約見遂要略故初六者一不見有見想言不見三有疑言無疑見四不見有疑言無疑不見五不見無疑言有疑見六不見無疑便言疑不見後六者下文但言此應廣說應廣說者應更六句一見言不見二見有不見想便言見三見有疑言無疑不見四見有疑言無疑見五見無疑言有疑不見六見無疑言疑見此兩箇六句並約實事境說是故初三五心境俱違二四六境順心違也實事境者上大忘中已釋其相也今此殘中六句律文並言彼人不淨望我無三即是境淨心謂為淨復是心淨今違二淨而諦名曰心境俱虗也此即約實相境說也六句同爾次當配釋以三忘心入三不忘心者謂有想忘入無想不忘無疑忘入有疑不忘有疑忘入無疑不忘義如上釋即是第二攝入第一第六攝入第三第四攝入第五攝六為三同他小忘初三五也全是翻到者彼後六中見言六不見此謗六句皆是不見言見一倍到也二處二四六者謂小忘兩箇六中二四六句境順心違故不同此境心俱違也十誦二逆謗人蘭餘者吉者不然彼律五十一煞母等三得殘也四法了了者即指印相書并遣使為四也若加自作應言五法者好也亦可四法四夷也通云一面謗二指印三相四書即法𨷂遣使也七法毀人者一種二姓三業四伎術五犯六結使七相謂妄瞎等也理有境想者應言大僧大僧尼想等也開中文言說實者南山云實有五種一真實二想實三事實如煞王人還言煞王十誦五十一云若自言煞父謗言煞母殘此即事不實四三根不互如上引十誦第四五五四戒不互實准十誦五十一云若比丘言我犯淫比丘謗言汝煞盜得殘也今詳四實可然言真實者隨應餘攝不應別立也假根謗戒梵云梨鑠迦阿奴段莎此云似根謗也廣釋中崇云不解無根句今詳戒明異分根即是無根也故今章中云釋中第三異分上根也言異分者覩此律文以同善見不同十誦也且如十誦第四戒本中云異分中取片似片事廣釋中云異分者四波羅夷是何以故是四夷中若犯一一事非沙門非釋子失比丘法故名異分者十三事二不定三十九十提舍學七止諍法名不異分何以故若犯是事故名比丘故名釋子不失比丘法是名不異分片須臾片者諸威儀中事是名為片亦名須臾片述曰准律攝意異涅槃分故名異分今此十誦若犯四夷非沙門故意亦同彼若爾前戒亦應名為異分故復釋言片須臾片也此正釋假根也彼文言片者諸威儀事意欲說言假託諸餘四威儀中行非法事言須臾片者須臾是少分義謂取少分令與沓娑作相似義也戒本中云似片是也若准善見第十三云餘分者沓婆是人羊是非人以羊當沓婆處是名餘分以母羊當慈尼亦名餘分何以故以事相似故是故律本中說若片似已上論文准此見論直用假根以釋異分異分即是片似片也今此四分後文不清淨人不清淨人相似以此人事謗彼以異分無根謗得僧殘者似同善見也初四二句謂犯下六等者尊者云細觀律文初句即是第四句頭以初句云謂犯僧殘第四句云謂犯提等故知第四句即是接僧殘次也合此二句以為謂犯下六也文觀第三即是第二句頭合此二句頭合此二句以為見犯下六也總為四六者一者見犯下六二者謂犯三者聞犯四疑犯也破僧違諫戒比丘有七者殘中四諫即四也提中一者不受屏諫二者利吒違僧諫三者輕人不受訓導合前總七也尼別有六者謂尼不同戒也一者夷中隨順被舉比丘違尼僧三諫此上初篇一數也二者自習任違尼三諫殘三者謗僧習近住違尼三諫殘四者瞋心捨三寶違尼三諫殘五者發起四諍違尼諫殘此曰上第二篇四數也六者習近居士子違尼三諫提此第三篇一數也上來合六也法但位一者不同人中展轉簡別故云一也義可准知者諸違僧諫局在大界諸屏諫者通一切界也但有夷殘提吉者吉謂提中不受諫戒彼文說言若他遮言莫作是不應爾然故作犯根本不從語突吉羅此謂迷心自謂作是心實故吉也若自知所作非然故犯根本不從語提此則心虗自知作非知他諫是過重故提二提各不具分吉者前門已除輕人不受訓導故此二提唯是利吒及不受屏諫也違六衆者調達等違下六衆諫吉也又可違諫一二者謂違諫中違一重教如殘是違二重教如尼違得夷者是一違當衆諫法二違大僧舉法故夷也上來六別細分十一者謂向六門細分即十一門也六中初門開四第二門唯一第三門有二第四門一第五門二第六門一還尋向來疏文自可知也斯對二破得具此等者破僧助破為過事大故有初之三門也一姓惡者簡媒及二房二顯露簡漏失三惱僧簡摩觸二粗通云簡二謗二謗非惱僧故四倚傍總簡前九登云二房亦倚傍倚傍佛開故通故云二謗亦倚傍倚傍舉罪故彼即釋云雖亦倚傍不具四義故不諫也言說相似濫理行二教者且如調達五耶濫同理行二教也餘惡性違諫等唯是言說相似也謂倚佛教但自觀身故有惡性違諫也一切准知冀彼改迷者迷謂無明不懼因果非謂想心之迷也以想違違心虗故有人云應言冀彼改邪從正者好此應廣說者下一一諫戒中自當廣說也今問有無不問九殘所以不諫者謂難同篇何以設諫四有九無即是以無倒有以有難無也不問九殘所以不諫者不欲偏問九殘何不諫而不例難餘四諫也為人故與諫人有迷悟者如破僧四句中非法相者是悟也法想者是迷也雖復迷語並須設諫又復利吒是迷餘者是悟為事故與諫事有已未者未謂破僧餘則已也謗及惡性易不煩釋者即擯謗等下至彼文亦自言也我身滅後可得名稱故知此虗者今詳法想說者豈不須三諫也故知不勝舊人釋也舉法難成准祇文說者古師義也祇第七云爾時諸比丘為提婆達多作舉羯磨初二羯磨無有遮者第三羯磨時時調達者六群面而作是言今僧為我作舉羯磨已至再說而皆默然汝今持我任於衆人如酪塗與鳥如蘇塗餅與那俱羅如油和飯與野干修梵行者為人所因而坐觀之六群即起作是言如是如是長老是法語律語有多人遮羯磨不成應不應如增二說者下增二文云復有二法比丘應與作呵責羯磨非法說法乃至說不說如是擯依止遮不至舉羯磨亦如是若據作法呵責犍度自有明文也利吒亦爾何以出舉者下九十中隨舉戒有利吒舉法利吒違諫戒中無也此假明隨唯吉者謂前二舉隨但得吉也下二非邪者汙家惡性不同利吒說欲耶也前解無舉准無第三後解無舉俱無然後解中下二非耶謂無三舉所治耶病也稱法如談者如而也古人而字多作如字隨應當知也說緣為種等者義准多論第三也釋名者梵云僧伽抱譯為僧破回文應言破僧也類前可知者類第四緣也大段分二從初至正法分住辨結戒相第二欲說戒下辨說戒相就前復三初至白四羯磨呵諫正明不勝名利壞略制緣第二自今已去與比丘結戒下制廣補略第三集十句義下招生十利增一含云父王遣釋種中兄弟二人者出家普曜經云科度五百釋子父言人命無常者舍利弗阿毗曇第十三偈云不還日夜常衰損如魚處熱中生苦無復逼五分第三跋提王耶律白言願不違誓王言當從汝願寬我七年阿那律言却後七年佛不必在又我危胞性命難保王今云何以此為期以昔比今者昔在園觀如令出日也止誹謗故者若度調達後當破僧即當謗佛無一切智若度阿難後當侍佛即當謗佛貪愛供給自度求侍證增上地者憂波離等既是佛度明知先時已得初果今言增上謂得盡漏故五分第三云六人漏盡得阿羅漢阿難侍佛不盡諸漏調達一人空無所得於是世尊受阿耨達龍王請調達未得神通不能得去羡耻兼深便往白佛願佛為我說修通法佛即為說調達受學安居之中便獲神通拂疑通化中五分立立跋提白佛我昔在家住於七重城塹之裏七行象七行馬七行車七行步四兵圍繞忽聞異聲心驚毛竪今在樹下空路之地坦然無憂是故稱快文二可知者一化令生信二念畜徒衆也是應非真文五可知者一迦休致敬來白目連二由承此言而往咨三佛還審問答以虛四止世真言表佛無謬五告其五事彰我不順五分迦休得那含生梵天准此生化自在天非即那含也問調達破僧何不信答涅槃第四云我觀人天無有能破和合僧者此但示現故佛不可目連之語法喻合者喻中文意天授貪心如惡獨鼻闍王繞供伐杖擊之益彼愚心喻增凶惡立二章門者一害佛門二殺王門也就因辨權實者害佛加行名為因也下受戒犍度佛過去作彌却摩納集十二醜婆羅門名利十二醜今調達是也二人無因者過去無怨也辨權者謂示現非真實也論曰佛有捕魚因者十住毗婆沙云八百天子得宿命通見佛過去捕魚等業不受成佛由是天子不信因果故示其事章云第五立邪破僧文三初始心方便二提婆達即往已下共伴與計立邪三寶三時提婆達即以五法下以其邪化誘誑新學者初一段文如章辨釋第二段文章中科制稍大繁雜今者不改疏中默文而作長科分為十段一以名誘伴二伴恐不成三舉正教門四顯邪能破五別陳邪教六顯有功能七擬用化人八觀機有別九結成能破十伴便許之科文既竟釋義如章佛僧已知未識邪法故次第二盡下正出五邪之法或有疏本云故須第三盡形等且依前本者謂前科文云前文復有三初舉正三第二我今已下立邪三寶應更開二初明邪僧第二盡壽下舉邪五法以為邪法章不作此開故令人惑也章中雖復不作此開而釋義中作此開釋故云第二盡形壽下也復有疏本云第三形壽下若言第三者即是前明二寶已訖故今明其第三寶也第三我今此已下結成能破如章應知心論二解者心論第五云凡夫壞非聖人以正定聚故不壞淨故不壞淨者四不壞淨也又說得忍凡夫亦不壞已入決定聖僧世尊不壞眷屬故婆沙百一十六云問何等種類補特伽羅可破壞耶答唯是異生非諸聖者所以者何世尊記說無處無容一切聖者可破壞故問諸有已順決擇分為可破不或有說者除此所餘是可破壞復有說者此亦可破所以者何世尊唯說無處無容一切聖者是可破壞不記餘故據理忍位亦不可破也俱舍二十三云若得忍時雖命終捨住異生位而增無退不造無間不墮惡趣今詳既言無退理無信受有別大師故知婆沙且總相說俱舍十八亦言有說得忍亦不可破成論生空如上已辨彼論二十二智相品云世間心緣假名出世間心緣空無我述曰生空已是破彼假名故知即是出世間心心既出世故不可破未達生空雖觀骨想等猶名乾慧理水未沾故名乾也此乾慧名成論雖無以義而說有餘所釋令不可記也第四發言響順章中不釋也第三大文時提婆達下誘誑新學亦不釋也四聖種義章中雖有五門分別今分明顯更助釋之謂初門中泛明衆行二法之別二三四門簡取行法局辨聖種第五一門對彼五耶正今但助釋第二門義如章開四第一列數釋名第二定其體性第三立四之意第四與顯陀辨異先明列數釋名者如章所列衣食處藥准智度論古四聖種即四依是今律即同智度論義是故文言何等四我常無數方便說衣服趣得知足此即於所得衣喜足聖種也我亦無數方便說飯食此即於所得食喜足聖種也牀臥具此即於所得臥具喜足聖種也病瘦醫藥此即於藥喜足聖種婆沙等論除此一種趣得知足總顯上來食及臥具并一醫藥等生喜足也若依俱舍第二十二順正理五十九婆沙百八十一明四聖種其義稍異且婆沙云如契經說一依所得食喜足聖種二依所得衣喜足聖種三依所得臥具喜足聖種四依有無有樂新樂修聖種問何故不同答智度論意顯古論師立四聖種即是四依故今婆沙顯新論師於四依中除其藥依更加第四於有無有樂新樂修以之為四謂經律中有此兩文遂合古今取文有異問二文何故如是不同答佛為宜聞及為除執故不同也就宜聞者謂有一類心無僻執但樂順行故就宜聞直宣道具及道體性謂以前三為道資具即以第四為道體性若有一類心有僻執或執自餓謂為聖種或執裸形或執蹻足或執牛戒狗戒之類噉草噉糞苦惱身心無有道益故對治彼以說四位行中道已方能進修故立四依以為聖種今因調達僻執教文故以四依立為聖種也次釋名者釋其古名如章已辨若釋新名如婆沙云有說亦聖亦種故名聖種謂善故名聖種謂善故名聖無漏故名聖即此能生諸功德法相續不斷故名為種更有多釋如彼應知此釋意云一切善法道名為聖即此善法能生後後復名為種此即且釋聖種之名未釋四名也今詳前三以之為緣能生聖種第四一種體即聖種故名四聖種也又第四云於有者有愛也無有者無有愛也於此二愛樂欲斷除而修聖道故婆沙云樂斷煩惱樂修聖道復次無間道名樂斷解脫道名樂修復次見道名樂斷修道名樂修如彼廣說有愛者諸緣後有願得常恆無有斷滅此即多是有樂有情也無有愛者謂緣後有願得斷滅無復有餘此即多是有苦有情也於此二境起顛倒愛理須對治故云於有無有樂修也次定體者章中先出生聖之緣衣食等體次第正辨聖種自體且辨緣者章云若約事辨四塵四大等是四塵謂是色香味觸四大即是能造四塵之大種也然色香味唯是所造就觸塵中總有土謂四大滑澀輕重冷飢渴也於中四大即是能造餘之七種即是所造若局論者衣處二種各具四塵及有四大食藥二種是段食性唯香味觸三塵為體故婆沙百二十九云十三事是段食體謂土體及香味處也今詳既食能除飢渴何因乃取飢渴為體答自有飲食能令飢渴如消食藥等也次下正辨聖種自體章云若就行辨順本要期者總顯受隨皆煩要期也緣中節儉者即顯無貪性也作與無作者即無貪心之所等起也理應唯取無作為體如章所引心論文證婆沙亦同故婆沙云問何故別解脫律儀唯無表立聖種非表耶答前說相續不斷名為聖種表非相續不斷是故不說有說無表可與聖道俱故立聖種表不與俱是故不說又章云心論就受中無表說者未必要受中也婆沙正義四聖種以皆無貪善根為性能治貪故若爾第四亦治嗔慢等答貪愛偏增故說治貪也若兼眷屬則欲色二界五蘊為性無色界者四蘊為性謂欲界中雖無隨心轉無表亦有無貪之所等起別解無表故有色蘊以成聖種餘之四蘊義在易知又此無貪通聞思修有漏無漏皆是聖種唯除生得非聖種攝廣如婆沙又無貪中唯取喜足以之為體舊名知足是也婆沙云問少欲喜足俱對治貪無貪為性何故喜足立聖種非少欲耶答少欲之名有過失有增益喜足不爾有過失者但言少欲不言無欲有增者於實無欲而名少欲少欲實是無貪為性應名無欲何故乃云少欲也於喜足中無如是事故立聖種有說小欲於未來處未得事轉喜足於現前在處已得事轉不取現在一迦利沙鉢拏為雖非未來轉輪王位以喜足難故立為異外道故不說少欲為聖種若說少欲為聖種者諸外道輩當作是言我等真是住聖種者所以者何汝等猶著糞掃衣而我等露形無衣汝等猶乞食自活而我等多自餓不食多自餓不食汝等猶坐樹下而我等或常手舉蹻足而住是故我等真名住聖種者為遮彼故但說喜足俱舍二十二對法諸師咸作是說於己得妙衣服等更多求名不喜足於未得妙衣等希求名大欲此敘有宗義也已下世親不許云豈不更求亦緣未得此二差別便應不成是故此中應作是說於所已得不妙不多悵望不歡名不喜足於所未得衣服等事求妙求多名為大欲喜足少欲能治此故與此相違應知差別已上論文第三立四之意者如章行藉資成等應說應知又准俱舍二十二云為顯何義立四聖種答以諸弟子捨俗生具謂捨資而出家也為求解脫歸佛出家法主世尊愍彼安立助道二事一者生具即是前三二者事業即是第四汝等若能依前生具作後事業解脫不久今詳助道者助是前三道是第四也四種供養者衣服飲食臥具醫藥也然婆沙等不立於藥所生喜足為聖者有二釋云為欲饒益病苾芻故不說於藥喜足為聖種今詳立者稱病服藥亦非不喜足也是故古四聖種立之也頭陀辨異者頭陀無藥但有餘三四依無常坐但攝餘士也餘三制開類而可知者乞食樹下腐藥是制施食房舍蘇等是開咸同初依改名廣說章云何等四者從此下釋文也問自言文三者初明集僧次知而已下舉法以問三對曰已下正引自言也上下有妨等者一師釋師云懼調達故不敢輒呵如上佛呵洟唾之身推山押佛況諸比丘誰敢輒呵若爾下文阿難脫多羅僧語諸比丘長老誰忍此五法非法非毗尼者脫多僧者一面阿難何故不懼耶答阿難自皆本非呵責若爾上下者有妨如上文中出面之後衆多比丘各執杖石繞窟高聲何為不懼耶不妨者如後戒中呵調達伴復何不懼登云復一師解欲令該通義勢便故故闕呵辭謂若先呵後該通隔訶其義不便以令諫後即該通故若先該通後方呵者呵復不便以違諫後即令呵故今隔該通故不便也此曰上妨上煞戒中先為改觀後方訶責亦應此戒先該無失又下有妨下輒教誡中先呵責已後制十德此戒先責亦復何違一切諫戒亦呵分文三雙一隻合為七句謂諫所為人諫所為事若此丘者諫所為人也此即開其章中初句為此一雙屏諫拒屏諫此合章中第二第三為此一雙僧諫拒僧諫此取章中第四句全第五句中少分為一雙僧伽婆尸沙者第七結犯句也牒前始心方便者牒上文中我寧可破彼僧輪等文言三諫捨者善者今詳三諫即三羯磨謂舉三諫令其隨應捨之也不同疏釋也律非律者互說亦爾者還將八聖道五法互說此並多論第三釋也五邪道分者即八正道中翻正為邪謂邪見邪思惟邪精進邪念邪定五正道分反上應知三邪道分者即八正道中反正為邪即是邪諸邪業邪命反上即是正三也真諦云問何故八中五說為法三說毗尼答毗尼是戒故三為體此所不攝名之曰法也已下皆真諦釋過如來所立制者如佛制立初波羅夷若犯此罪失滅比丘法尚不應生心何況故犯於此罪中制有四部三因一果隨應起犯一一悉過如來立制是故名罪也非罪反此應知應知輕重等者論文也釋云重輕各有四句一者由罪重不由制重煞畜性惡故罪是重由非上篇據制非重二者由制重不由罪重如制煞草非後二篇名由制重是遮罪故非由罪重三者罪制俱重夷制初篇是名制重亦性罪故名之罪重四者俱非高下著衣是遮罪故故罪非重制入下篇故制非重輕亦四句一由罪輕不由制輕即前第二句是也二由制輕不由罪輕即前初句是也三由俱輕前第四句是也有殘無殘者真諦釋二不定義中解有殘無殘義且正量部云若破戒已戒善即斷而不失戒然於其中若可懺者戒善續生生有餘故名曰有殘不可懺者翻此應知上座部說若犯初篇隨一重罪即失諸戒名曰無殘若犯第二篇已去戒仍不失名曰有殘薩婆多部七聚罪中前前者犯第二篇已去戒仍不失名曰有殘薩婆多部七聚罪中前前者勝後後者劣犯戒亦爾前前者重後後者輕若犯第二重於下五下五由是有兼破義此雖犯六猶未犯未初故名有殘若犯初取容遍犯七名曰無殘第三已去悉名有殘例此應息不可治者乃至翻此名可治是論文也釋云可以行法對治者名曰可治若無行法可治者名不可治然不可治總有四種一者四夷罪無行法治二者犯二邊一者時邊如十三中隨犯一戒若忘犯時不憶年月二者數邊不憶犯夷於此二邊既不可知欲作行行不成三者比丘與女隱覆處坐聖女淨心向衆僧說僧喚問之辭言無事聖女謗我既撥聖人此惡最重僧作最惡滅諍羯磨擯之終身不離此法四者論言如此等者三篇已下若犯不知何名何罪無行法治此罪恆在此人相續故言如此等翻此四例名曰可治也粗者論文如章犯意有四一邪見撥無因果由斯犯戒二者不信若謂此戒非佛所制或言此戒非解脫因或言犯戒不應頓受如此苦報由斯犯戒三者放逸謂非前二俱不愛惜尊重所受縱意所為由斯破戒四者重戒上心由貪嗔纏深重故犯約此分別應為四句一者由犯意粗不由罪粗若由前四殺草等是二者由罪粗非由犯意粗如意粗如離前四煞蚊蚋等三俱由者如由前四依作煞盜等四俱非由如離前四煞草等是復有四句一由犯意非粗由罪粗前第二句是餘句准思二十二根俱舍第三有一釋頌云心所依此別此住此雜染此資糧此淨由此量立根論曰心所依者眼等六根此內六處是有情本頌心所依是也復由命根此一期住頌云此住是也此成雜染由五受根五受根者苦樂憂喜捨也頌云此雜染是也此淨資糧由信等五淨謂無漏也信進念定慧五根也頌云此資糧是也此成清淨由後三根一未知當知根見道十五心中九根為體二已知根第十六心已去修道位中九根為體三具知根無學位中九根為體者意樂喜捨并信等五頌云此淨是也由此立根事皆究竟已上論文婆沙百四十四評家正義名有二十二實體十七謂男女根不異身根三無漏根不異九根故十七也增上義是根義此於有情本等義增上故故名根也并律中十四合有九對者十誦第四亦言十四種犯非犯等到說皆蘭此律十八不同他部即是律中自具九對也四因具顯者破僧因如上緣起餘三在此釋相中也餘之三重文不在此者破僧犍度明破僧果得蘭在伽耶山也違比丘諫下九十中不受諫戒是也餘六衆諫無文義說吉也其謗僧等因果次比者加先汙家得吉罪等後方違諫也第三羯磨竟僧殘者僧祗第七三諫不止比丘白佛佛言提婆達過去世時已曾如是拒諫遭苦過去有波羅門於曠野中造立義井時日向暮有群野干主不飲他水內頭灌中飲已戴灌高舉撲破灌口貫項以此為樂諸野干輩諫言莫爾野干主言我但快心那知他事如是乃至破十四灌數諫不止井主察見便作木灌竪固難破令入頭易使出頭難持著井邊捉杖伺之向暮如前飲訖便撲不能令破井主執杖打煞野干空中有天說此偈言知識慈心語俍戾不受諫守頑招此禍自亡其身命是故癡野干遭斯木灌苦佛告比丘野干主者調達是群野干者今諸比丘是過去已然今不受諫當墮惡道長夜受苦祇云攬四者彼第七云僧中初諫未竟越毗尼說竟蘭第二未竟竟亦爾第三未竟越說竟殘准此但據三羯磨名為三諫故知四分戒本中云三諫者亦同祇律若兼取自即是四諫也以三羯磨名三諫故戒亦法文云九初犯四乃至三諫也殘罪起已屏處諫多人中諫及僧中諫諸越毗尼論蘭遮一切盡合成一僧殘為是第三未竟即得蘭罪者准祇第三未竟亦是越毗尼也故知破在伽耶者以此未得蘭故今詳未為明證諫之後時猶懸遠寧知要在伽耶也不犯吉蘭殘者唯談不犯殘家眷屬也非法非律即是七中初非非法非毗尼也七非加下瞻波中辨亦可開三者初白即落非從初無吉罪也白王大臣者尼十七殘中度賊女也助破違諫戒梵云僧伽陀阿奴跋陀譯為隨破僧也隨是助義也須意可知者無初二緣即無助破違諫義故故須之也違諫犯中亦三如前者一教諸比丘白四諫法說通四伴助伴者三聞達多等是四伴也五百比丘是助伴也八難者下說戒犍度王賊水火病人非人惡蟲也覺云十云若言莫諫吉若主法語律語喜樂忍可得四蘭今詳彼律第四合樂忍為一即是三蘭更加一種若言知說非不知說蘭方是四蘭也今尋此律文云若未白前一切吉羅故知不同彼律也祇第七云同語非同見者言語相助不同彼見同見不同語者同彼所見而不助說同語同見者助彼言語同其所見非同語非同見者不助彼說亦不同見謗僧違諫戒梵云俱羅度索迦此云汙家也尊者曰應名汙家惡行擯該違諫戒四種污家如廣釋中律文也釋名可解者妄言愛恚名曰謗僧拒勸不從名違諫𨷂二者若𨷂第二由心故闕悔故不須諫也一二三蘭者白竟一蘭等也又得惡果等並多論第四釋也五分為怖者五分但言五百不言怖也准祇第七有為怖義故彼文中佛遣阿難阿難白佛我不敢去六群慘性若聞我往逆來道邊作非法事是故難云佛言汝與三十人俱足能伏彼復有三十比丘聞阿難往自相謂言我未曾聞驅出羯磨當隨往彼并前合有六十比丘大衆而往不走不懺者二人三人與作羯磨下三可知者一違屏諫二僧諫三違而結罪也文言所得物處聞之不喜所與物處思當報恩者且如比丘張家受施遂與王家張聞之心不喜悅云將我物不自受用乃與俗人令我無福故不喜也祇第七若比丘於聚落中作非梵行飲酒時食是不名污他家若聚落中無信心供養衆僧興立塔寺令彼退滅是名汙家多論第四若比丘凡所請求若為三寶若自為己若以種種信物與國王大臣長者居士一切在家出人皆名汙家何以故凡出家人無為無欲清淨自守以道為心若與俗人信使往來廢亂正業非所應為又破前人平等好心於得物者歡喜愛敬不得物者縱使賢無愛敬心又復到亂佛法凡在家人常於三寶求清淨福刺指血肉內以種善根以出家人贈遣緣故反令俗人生悕望心破他前人於三寶中清淨信敬又失一切出家人種種利養若以少物贈遣白衣縱使起七寶塔種種莊嚴不如靜坐清淨持戒即是清淨供養三寶又縱今得四事供養滿閻浮提一切聖衆不如靜坐清淨持戒即是清淨供養一切衆聖如上煞戒亦已引之文言若未白言僧有愛等吉者祇云僧殘起已除四偷蘭非理諦僧諸餘屏諫多人中諫僧中諫等合成一殘准彼律文言僧有愛等別得蘭罪得殘之外仍須別懺開文中父母須養病人濟苦小兒無譏任身恐損并開與物自種華等供養佛法僧者見論十四云不得堀地傷種須作淨語若無蟲水得自溉灌等度河跳躑不犯者大溝渠等斯則可然若小者不許五百問中問比丘得躑過小水小抗不答犯墮昔有優婆塞請一比丘作一好衣欲施比丘比丘隨去路有小水比丘躑渡施主心念我謂好人欲與一衣而乃跳躑當與半衣此比丘是無著人知其心念前行見水故復躑通復念當與一張粗疊前行復躑念與粗布次念頓食亦爾次復見水舉衣涉渡賢者問言何以不躑比丘報言初與一衣次與半衣乃至後與一食今不躑者恐復失食一賢者便懺興大供養以此驗之勿躑坑水唱喚者多論第四五衆不得唱謬語以壞威儀看書持往者見論十四云或白衣使比丘禮佛讚經呪願或使比丘明磬集衆種種法事白衣驅使不犯若為白衣驅使初去出出吉若得飲食咽咽吉不至為白衣傳語隨問答悉得吉罪除為五衆出家人驅使不犯多論又云孤窮乞自憐愍故與一切外道常於佛法作大怨歒伺求長短是故應與香薰衣四衆吉尼得提五種盡不得以香水灑地除為三寶貫華髮者妨廢行道正為三寶亦不得作又華香瓔珞莊嚴之具不得著佛身上但得散地供養不得散華衆僧身上若以華著漿飲上亦不聽飲若令象鬪乃至雞鬪五衆盡不聽啼哭乃至父母喪一切不聽四衆吉比丘尼提以愛戀心深故五百問云師徒父母兄弟死得哭不答一舉聲犯墮可小小啼泣而已惡性拒僧違諫戒二種持戒等者止作二種也文言我聖主得正覺者祇第七云過去曾已持我輕人昔有大學婆羅門常教五百童子婆羅門法下性不聞家生一奴因童子故聞之能持後走他國學無婆羅門法已重聞故聞悉能持其師大喜以女妻之婦為作食恆嫌嗔恚奴主往捉奴密白言我稱大家是我之父願勿鄣我當奉奴直奴主答言汝實我兒早發遣一時其婦密來禮婆羅門足問曰我夫常嫌飲食願授本家何所食噉奴主作念苦他子女臨去教一偈言無親遊他方欺誑天下人粗食是常食但食復何嫌與汝此偈若嫌食時皆面微誦婦後試之奴聞以後常作𣽈語佛告比丘奴主我身是奴者闡陀是彼於爾時恃我陵人今復如是涅槃第十偈云於他諸言隨順不逆亦不觀他作以不作爾時唯為阿闍世而說偈善男子亦謂護持不毀禁戒成就威儀見他過者而說是偈已上經文章引多論文不具足彼論第四云問曰經中說但自觀身行諦視善不善而云展轉相教不相違耶答曰佛因時制教言乖趣令不相違背也佛以前人心有愛憎發言有損是以令彼自觀身行若為慈心有利益者是故勸令苦語相教也若鈍根無智言說無利應自觀身若聰智利根發言有益應轉相教若少聞小見出言無補應自觀身若廣聞博見有所弘益則展轉相教又云若為名利有所言說應自觀身若為利生闡揚佛法應轉相教又云為現法樂應自觀身通相為言為得聖道名眼法樂若別相說四根本將虛名為現法樂住也若欲以法化益衆生令同己證應展轉相教謂己得聖使人同又新出家愛戀父母兄弟妻子是故應令但自觀身若久修學力能兼人是故應令展轉相教已上六復次釋也發菩提心經曰若有少善欲輕夷前人當知是人深鄣佛法廣釋中准戒本中科文曰諫所為事有三今廣釋中比丘義如上者釋第一能拒人也惡性不受已下釋第二諸善比丘如法呵諫先且散釋然後合釋散釋文三一釋惡性不受語二釋於戒法中如文以戒往已下是也三釋如法明合釋文若比丘已下合釋諸善比丘如法諫也自身作不可已下釋第三不受訓導望人師敬上來諫所事訖餘可知文言未自前等吉者有餘引十誦第四以釋此文今詳不同此律不須引之彼云是中犯者若比丘言汝莫語我突吉羅莫語好蘭莫語惡蘭我亦不語汝好蘭不語汝惡蘭若言捨是教我法嫌罵衆故得提先𣽈語移敕捨是事者令作四蘭二吉一提悔過若不捨者應作白四等上來第二篇竟戒本中云九初犯四乃至三諫者瑤云釋疑故來前九屏犯行覆可然後四對僧應不須覆故即釋言若犯一一乃至廣說問尼八夷中亦應說言七初犯一乃至三諫何不爾耶答彼不可治無疑可釋今詳文言應強與波利婆沙者若自心懺不說白成若悔儻不悔僧應舉彼故云強也下文有淨輕重不定不得強逼令其悔者與此全殊有餘為妨令不合理增上與六夜等者前已罰覆今復增上問初二篇下皆有罰法下三篇下何不然耶今詳其義初無還淨故云須簡異下篇易悔全闕其文唯此篇下明其悔法舉難顯易下篇遂略餘釋繁辭故不記也二不定來意門有餘皆言章中乃是安置處所非開來意即引昔光統師云聖禁從緣曲尋萬緒因人興犯制伏塵沙攝修難備若不遞相鑒察容無自礪之心是以可信女人聖開舉罪於屏露二處以存相利之道今詳章云為鄣可信得舉通七五等者即與光統遞相鑒察等義意不殊即以置處釋其來意無勞別敘也釋名中引了論偈云乃至故說不定已上是論文也此論文云意此二不定或名三角或名三道也此角道二種是二不定諸罪三角三道故者偈中不顯三道者以其義同三角故也今於釋中具足廣說以其不通行於三角或行三道故也譬如不定聚者一切有情總有三聚一者正性定聚謂入順決擇分中忍心住已去也二邪性定聚造五無間等決墮惡趣三不定性聚非上二類所餘異生隨善惡緣不決定也今取第三不定性聚喻二不定也三藏釋者即真諦釋也角者聚也以其三隅聚成一角故此三角聚與前所說有情三聚義不同也然釋不定於三角中不取初角以其定故唯取下二以釋不定三道准此應知或不應坐者明了疏云染心若坐提無染心坐吉不覺來坐犯學對二十八罪者於四威儀各容七聚罪也二十四准此應思如似三聚中不定聚人者即譬不定性聚有情也謂說五種說戒者准明了論應略說戒合為五種一者誦序二誦四事三誦至十三四誦至不定五廣誦至經也八緣起者如下增六疏中釋也謂因身口為緣而犯衆罪也有餘師說此二不定似律本義已上是論文也以數少故不得如律本義者疏主釋論中似字也即是此略彼廣已下並是取論文意而釋也三處求者一者緣起二者戒本三者廣釋也多論亦爾者多論第四云不定者佛坐道場即決定五篇戒等如疏後引是也此古師意於三處求及准多論文相但有夷殘提三故知定以三罪二罪為所防也與十律文同者前引十誦可信女人不知犯不犯不知何處犯但是女人是處來去亦與多論文相同也古人云三罪二罪為所防離染清淨為能治非法自言為所明如法自言為能治又以治罪不如為所防如法治罪為能相傳破云非法自言為所明者尼有自言應有不定又復豈容要待自言方犯不定也治罪不如者過在僧衆豈可此戒防治罪僧也首律師言以疑似為體破云疑在女人豈成過體疏主復以屏露二處應須撿審以為所防今詳既釋意義已通猶恐人迷故今更作別語釋之謂二不定在於屏露涉嫌疑處行住坐臥以為所防如人惡子制令離過故不聽其至可疑處設若至者父母必須勘問來由此亦然也崇云撿未實時在不定攝勘撿實已即定聚何須於此明所防體者今許律儀防護為議二百五十戒體須存豈容此中無所防體故以其嫌疑處為所防也問在嫌疑處容犯一切不應唯局愛染諸戒答理實雖通犯一切戒然由愛染過失尤重故立不定以染防之由此亦顯尼有伴故隱而不立不定戒也若唯十誦亦似通防一切戒故立不定戒故十誦第四云三法者四夷十三及九十中趣說一事說一事二法除夷亦爾又十誦云但見處來去坐立不見淫盜煞煞草過中食等彼既文言趣說一事又言不見煞草過中食等故知通為染防一切制不定也故自言是非中無二不定者滅諍揵度末下文明自言是非也及非上三於離見聞屏是者逈遠無人名離見聞也故知即非僧尼俗等所住處也然此後文廣釋中云見屏處即是也若就多少亦有不定即是或有或無者此古師意謂若多犯即有不定以其不知定犯何故若其少犯即無不定准之可知尼及俗男亦或不定者若准真諦云三果優婆夷並得舉罪唯除第四果若第四果必是出家出家尼衆佛制不聽舉罪故也今釋初二異於昔解者昔雲律師有二解一解云是第二我以文驗戒本治罪開餘篇不爾故知無初若爾緣云最初犯戒耶答諸篇最初最初犯略此中最初最初犯廣名同義異不違也問此中夷罪在跋𨷂前以此文言最初犯故問屏不定戒殘若是初露戒中殘應是第二答廢處論罪罪實是定然就處明俱有初也謂屏露處最初犯廣也即是諸篇最初犯略制廣補略二不定中最初犯總廣故制總廣以補別廣也又更解云就處總制立二不定故有別初即是最初就總處以違略也今師前來立所防義既異古師故釋初二亦異古師也如章釋意云若就所撿三罪二罪雖是第二今就應須撿審取實謂於屏露泏嫌礙處即是初也第四門竟云此中白言等義名毗尼理實非是滅諍毗尼也以此比尼與滅諍犍度對辨同意如章可知如自言中但引上三者指此戒文也下自言中者指下滅諍自言毗尼藥病相對中也下是非中具引五篇者應言具引七聚即是指滅諍犍度末下文也通俱相似者理實三處並得引七聚也實覓者謂覓彼犯使至實處即罪處所是也現前毗尼隨配此二者一切毗尼必假現前隨配自言及罪處所即二中攝不可別論也下滅諍自當了知第五門有人言僧與女坐夫容遣婦故文言夫主若見當呵其婦生不信心若尼與男坐婦無遣夫故無不定今詳此為防其患非是為護遣婦之過也尼前二後一者除殘中二粗語及觸也文言即就倚壁而聽者多論第四問曰毗舍佉聰明利根大德重人知比丘與女人屏處坐何故往答曰是人已入道迹深樂佛法常自說言聽法有五自利一得聞未曾聞二清淨堅固三除邪見四得正見五觸甚深法是以毗舍佉樂法清淨不以嫌疑自假見論十四此優婆夷有十男十女男女各有二十兒孫合有四百二十人國中人民見毗舍佉多兒孫男女皆共平論言其是好各來迎取以為法則廣解中初文六句者一比丘義二女人三釋獨四釋屏覆五釋可作淫處六非法語也文言信樂優婆私者信佛法僧等者祇第七云成就十六法名可信優婆夷謂依佛法僧未有稱能令名著僧有惡名能速令滅又四也不隨愛嗔怖癡又四也離欲向成就聖又二也此律文言信佛法僧即是彼律三不壞三不壞信為體故歸佛法僧即同彼律歸依三寶不煞等五即同彼律聖戒成就也得利等四不愛等四即是初六差別也離欲向者顯下三果也謂三界中愛未斷盡令趣向盡故云向也於中分四初六信慙具足次四供養稱揚次四善住平等後二道及道戒文言真實而不虗妄者多論第四云此是成就無漏信人終不故作妄語若人語言汝若妄語不害汝命若不妄語當害汝命即自思惟我不妄語滅此一身若妄者滅無量身兼害法身誓不妄語人復語言汝若妄語活父母兄弟姊妹一切親族若不妄語一切盡煞尋復思惟我不妄語害此一世生死親族若妄語者流轉三惡永失人天纍世親人失賢聖出世眷屬有復語言汝若妄語與汝珍寶種種財利若不爾者則不與汝即便思惟我不妄語失此俗財若妄語者失聖法財疏云若比丘下一句解第三自言不定等者今尋文中若比丘下總有六句於中初句具引四儀及自言作五事之中隨應具引是故章中配解第三自言不定也餘之五句於五事中始從不引後之一事二事三事乃至五事並皆不引合為五句此並須作罪處所治是故章中配解第四治罪不定疏中作此科判竟已且總解云此二不定應對坐中七罪六罪互引不引餘三威儀亦爾然由可信舉坐威儀故還約此總舉一一威儀互引不引理通七罪六罪也者意說理應四儀之中須細分別七罪六罪明引不引以解治罪然由緣起可信女人總舉坐儀以告衆僧不細分別七罪等異乘勢遂約四儀總明互引不引其實理四儀之中七罪六罪互若不引並須罪處所治也釋治罰中昔解初句不舉上四浪引前四等者謂解第四治罪不定中雲律師意云自言作者夷也臥者殘也坐者提也到處趣向即是夷殘等方便罪也有人言古師云自言趣向是吉乃至次第配盡五篇者謬也初句不舉上四浪引上四者謂浪引二因二果也第二句不舉上三浪引上三者謂舉上四浪引上四者謂浪引二因二果也第二句不舉上三浪引上三者謂浪引二因一果也餘句准思今師破云此不必然乃至並含七以說者自顯正義古釋便破也雖文中列引等者意說文中雖自言作或言臥等作通七罪未必即是自言相當故若細論但有不相當未得即定也唯約不引多少有無罪處所治法文中自言作者未必唯作夷事等此言作者通四威儀中各作七罪今總言作者謂指律文釋第四句治罪不定五句之文名為約不引多少有無罪處所治法文也謂五句中前之四句有引自言第五一句全無自言就前四引中有多少故云不引多少有無也此等並須罪處所治故復名為罪處所治法文也於此文中餘趣向等其義易了唯此文中自言作者通作七罪如疏應知下戒無夷即除作者且約夷說此理通七者此釋妨也難曰前來言作七者後戒戒本不說犯或至釋相中遂即除作故知作者唯顯作者夷故今釋云下戒除夷且約一相增勝而說理實亦應有其作文顯作殘等也不應受依止等者十律第四廣辨其事義同此律奪三十五事也五分第三沙彌犯吉不說餘衆見論十四狂等亦開已下疏本第四心事既捨者事即財也捨有三種者崇云古舊諸師依多論釋捨有三義今解論無三義正文據理但捨財故名之為捨若以捨心名為捨者是則單提亦應名捨今詳多論第四卷云依已捨罪已悔次續心未斷若更得衣是後衣於前衣邊得捨墮又云衣已捨續次心斷罪未悔正使日得衣之捨突吉羅懺至後疏中自引此文既准多論心若未斷染後衣犯又罪未悔亦染後衣不同單提心罪未捨無相染義故還依疏捨有三種以之為正問未具同宿心罪未捨無二宿開豈非相染若心罪雖染無財可捨也咸具三義者崇云舊釋凡入捨者咸具三義今解不然但由不捨用則有罪作法捨竟用則無𠎝由此一義入捨不須餘二今詳要須具足三義以非以己財無容捨故財體不在無容用故捨己無𠎝彼我許故須意可知者即向所說以非己財無容故等三義相須也先來相傳於三義外更加兩緣第四輕可隨身謂簡覆屋過三之類第五遍體有過謂簡過量衣等量外有過量內則無也復有人言三義五義並不應理唯有二義以之為正一者貪心尤重取物失方二者妨廢正修譏過處重今詳下九十中二十四戒具有此相故不應理也章云二十四戒者總為頌曰讚一展別足非殘受美藥須蟲水鉢真脫覆白高床七更加用蟲二十五述曰一者受尼讚食二者過受一食三者展轉食四者別衆食五者足食六者非時食七者殘宿食八者不受食九者索美食十者過四月藥請十一飲酒十二飲蟲水十三過三鉢十四真實淨施不問輒著十五坐脫腳床十六看覆過三十七白三衣十八高腳床此下七歲章中名為高床下七十九兜羅紵床二十牙角針筒二十一過量尼師壇二十二過量覆瘡衣二十三過量雨浴衣二十四如來等量衣今詳用蟲水亦應辨異故更加之成二十五也三十捨墮細分有三十二戒章中諸門或依三十或依三十二隨應當知三十者長衣一也離衣二也一月長衣三也從非親尼取衣四也亦名領受戒令非親尼浣衣五也從非親居士乞衣六領受也過知足受衣七也領受一居士辦衣價八也領受二居士辦衣價九也領受王臣送寶十也領受野蠶臥具或名綿褥十一也黑毛臥具十二也白毛臥具十三也減六年依三衣十四也不牒坐具十五也擔羊毛十六也使非親尼劈羊毛十七也畜寶十八也受領貿寶十九也領受販賣二十也領受長鉢二十一乞鉢二十二也領受乞縷二十三也使非親織亦名勸織二十四也領受奪衣二十五也七日長藥二十六也過前求雨衣過前用二十七也此兩戒合制過前求邊名為領受戒過前受急施衣過後長畜二十八也亦兩戒合制過前受邊名為領受蘭若離衣二十九也回僧物三十也領受總為頌曰七言長衣離衣一月衣尼浣衣乞過是一居二居王臣敷擔羊二寶販長鉢縷勸奪藥雨急離回僧物外財淨施者真實淨施也今詳亦可三十之中言具三義或五來者謂要實是屬己財物非由淨施即名屬他由此應知九十之中真實淨施闕第二義何以然者謂由輒取而得提罪非由著用著之有罪豈同三十已犯之物用用吉羅故知闕於非對現在受用有過也此真實戒於三十戒最為大妨今既釋通諸難都息亦有難言聚過三鉢若非己物有人盜取誰邊結罪此難非理如損護主豈由己物耶食味是通者一准人情凡所食噉理須供人二准文驗如一比丘作殘法竟一切共食皆不犯之由此二義故知是通若論鉢衣必是別屬如有一人作淨施竟若與餘人更須作法故知別屬自下章中數有此義唯此應知更不復辨二離者衣戒及第二十九六夜離衣戒也長等五者長戒也謂十日衣長鉢長藥急施過後是也即前所列第一第三第二十一第二十六第二十八戒是也五敷者即前所列第十一第十二第十三第十四第十五戒是也自餘領受者即十四領受即前所列第四第六第七第八第九第十第十八第十九第二十第二十二第二十四第二十七第二十八第三十是也鉢無共用者釋長鉢不共犯也謂若自用即自犯長理無共犯設若共用不犯捨墮以其共乞尚不犯捨況知共畜爾不犯捨故引多論二人共乞一鉢但得吉羅以為證也既不同犯故畜長鉢許對同活作說淨法亦得成就不疏中自釋如是餘者可解者一月六年不祿及藥雨浴衣等皆為己畜各有別為無同犯義若有遠行令在家者說淨乃至是以不犯者問先共畜長令在家者加其淨法而今不加在家者犯既是共畜如何捨之答此依令捨既是同活各遍為主無分義故故得總捨共有一飲長衣未說淨者此中意說言若淨施他三義不具縱使尼浣不得入捨今詳非由淨施即是屬他前已釋訖多論二人共一衣等者多論第五文也為欲辨異故引之也如此說時更有六戒不同犯者不然應言七戒不同犯也謂於外更加長衣章中前來已自分別不共相故餘十五共犯者今詳亦未盡理於十五中畜長衣遠行不犯理須餘之又如取尼衣從非親乞衣擔羊毛等對面共取可言同犯若不共取不共乞擔何容共犯故應思擇且衣十五頌曰長衣取取尼衣乞衣一二居王擔劈二寶財縷勸急回如結集說者七百結集擅行十事於布薩日檀越布施金銀而共分之問言得受不答言不得何處制答因跋難陀制利有共別者於五利中長衣可共自餘離衣展轉別衆不屬等四無共受義如教人乞衣過足等使人為己皆容遂情隨應當知且依章中除十一已束餘十九以為頌曰七言長衣二離一月衣尼衣乞衣及過足一二王擔財二鉢勸織長樂雨急四身口止作業共身犯為身犯者身止不會口止不捨身作離去闕無口作亦得說為身口止作作唯屬身也又身經宿名曰共身餘多釋諸謂初受持名為口作身合掌等名為身作合口不捨名為口止不合掌等名為身止身衣互在是共身犯此釋恐非以其不據犯時說故又闕身去義不具故餘十二領十二領受身口假他身者自口乞求自身領受他身授與故曰也十二領受即後門中十四領受除二實是也六擔用者用謂過前用也浣上犯染打染打亦爾者謂染上犯浣打也打上犯浣染也五過者五長是也六作者五敷乞縷也尊者云應名六成以其作時不犯故也故有二句者奪衣戒云若自奪教人奪取藏舉之尼薩耆奪不藏吉若著樹上攝上乃至地敷上取離處尼薩耆不離處吉古師云我准此文著樹上等重重有犯疏主意云前自奪等是現前奪藏舉方犯後句若著樹上等者不現前奪離處即犯非謂重犯也引文可知者文言此捨墮衣應捨即捨財也捨已當懺悔即捨罪也僧即應還此比丘衣即還衣也若不還轉作淨施等吉即不還結罪也又寶等三者二寶及綿褥也下皆准之十六杖者應須受持外淨施若不淨施犯捨也下文云大釜釜蓋大瓮及杓小釜釜蓋小瓫及杓洗瓶瓶蓋瓮及杓述曰此中總有二釜二瓶四蓋四瓮四杓也有中俗道別辨異可知者謂諸作法辭句對俗對道對僧對別各各不同一一戒中自有明文也或四法如對僧等三人者一集財二所對境集三修威儀四捨辭句如下釋文義自當顯或可無法者尊曰此具二法一集財二斬壞也釋懺罪境中章云寶等三戒專唯對別者問既唯對別得別衆懺不答此三及餘戒並容別衆懺也有人言界內無僧可對別人若有僧者集僧方懺若不爾者受懺單白何所用耶今詳若樂僧中乞懺須白受懺若意不樂僧中懺者別衆亦得上下無文云對首懺別衆不成西方行事亦並許其對首別懺又觀此律說戒犍度僧盡犯罪不不識名相客比丘來知彼比丘易教授者將在屏處令餘比丘眼見耳不聞處立教令如法懺已還至彼比丘所作是言此比丘所犯罪者今已懺悔述曰既言眼見耳不聞處立似是別衆也問所以捨罪還衣有羯磨法捨財中無下自當辨者准下義中應答云懺除往業永非作法又對別人故宜須白還衣有法者僧衆還衣理無自與若不作法事難齊彼論其捨財捨財現事非排往業又作法非永又總對僧故不須白又是別人行施出在彼心非知能決何須作法對僧法六者一乞懺二請懺主三受懺白四正捨罪五呵責治六領受立要也三人下五謂除乞懺又受懺主須白邊替人受懺白故五也一人有四又除白邊人也四者除乞鉢一通餘一切者僧六中除乞及白餘之四法通一切戒也有疏本云餘通一切者誤也五者除寶等三及乞鉢餘二十八戒等是者寶等局四鉢唯局六餘二十八通對僧別於中除對一人已外餘並具五也寶等三局唯四法者今詳捨寶雖不對僧捨已懺罪何妨對僧若許對僧非唯四法也故多論第五畜寶戒云說淨已然後入衆悔過也多論六句者彼論第四卷也五六兩句彼並犯捨突吉羅懺又云言次續者非是曰次續以心多求次續不絶是次續問第三第五義何別耶答第三據懺罪曰得衣然衣久已捨訖第五即於捨衣曰更得衣故不同也雨衣過前受者可爾者謂過前受未令受持容染犯長故經宿還也餘諸戒等若捨即還容為長染者章中且是純據衣說若貿得食七日藥等隨應當知長藥共餘者餘捨者餘並者即還者若貿得七日藥等亦隨應思知上來所辨據其重犯者敘古師義也古師意云販賣等衣已犯捨墮復由犯長染此販財更犯捨墮未捨販財尚自被染若與長財令捨之時若即坐還灼然被染故須相從經宿還也若作不重犯釋者已下疏主破其重犯義也若與長等令捨亦須經宿者疏主意云未捨之前雖不被染不同古釋已捨之後財體既淨若還入手即容被染也其財物不可全別者謂此雖有販長不同而此非如鉢衣性異衣衣相望不全別故故相染也餘釋非理不勞記之任情所尊者此師意言販賣等財捨前捨後俱不被染故唯五長須經宿還今詳取前相從並經宿好昔下文言所有過七日藥蘇塗扃蜜石蜜與守園人古人謂此為初得藥日也若至第七日捨與比丘比丘應取食古謂此是第七日得也若減七日應還此比丘應白二與古謂此是第二日以去至第六日得也言減七日者即是中間五日也今師言言減七日者謂第三日已去至第七日其所得藥也此亦要須經宿方還又文言至第七日捨與比丘者即是第二日藥至第八日滿七日也似不得差互者僧捨僧還別人捨別人還非要本作法人還之也還法或二一者若泛論者有多種二第一即日經宿二第二就即日中直還轉還二第三就經宿中還鉢還鉢還衣二還鉢還藥還衣二今疏意欲談初二也所言一者或相從經宿一或俱即日一也若究竟損減盜門所收者善見十四云若不還得吉若受已知非己物因施方便收匿此物隨直得罪也祇律有五種捨者於中二寶彼律第十卷說也回僧物彼律第十一說也黑毛憍奢者彼律第九卷說也黑毛者即此律中純黑羺是也憍奢耶者即此律野蠶臥具是也黑白毛臥具者即此律二分黑三分白臥具是也對羊者誤彼是䍩也多了羊者誤彼是衆多耳羊也餘三捨同此者一者長衣等諸捨於中長衣如彼第八卷說餘捨不可具敘二者長藥三者乞鉢並如彼律第十卷說已上辨祇律餘二捨同者乞鉢如彼第五卷說也長衣等諸捨於中長衣如彼第四卷說餘捨不可具敘明了論復有不同相者論云財總能成尼薩耆准明了疏中釋者二離一月長衣鉢藥此六並二種用謂捨與僧僧應還問須此物不須者應還若不須者即與僧用於中長藥復有差別有病服蘇二日四日病差應捨滿不捨滿七得尼薩耆應捨與僧比丘有病僧還捨與比丘得已捨與白衣白衣還捨與本比丘比丘得服若主無病不復須者僧欲須用亦須捨與白衣如前廣說奪衣乞衣回僧一二居士過足此六並捨還主比丘不得更取此物若無本主應捨與僧除回僧物餘者本主不肯取者亦捨與僧其回僧其局捨還僧取尼衣還本尼尼身不存者捨與尼僧不得捨與大僧比丘不得却取乞鉢同此所餘諸戒并捨與僧十八戒二人同犯者頌曰五言長離月乞衣過一二王畜畜寶也貿販鉢縷勸乞鉢也奪藥忽回僧十五過除藥者沙彌既與大僧受食故受藥法不同大僧由此應知受戒竟後口受法失口受既失故不犯長也十四戒任運者義猶未盡如取尼衣從非親乞乃至回僧物等教之為己後即受戒豈無任運耶隨義應思坐具臥具等差而生過者差謂差違也謂越二知之如過知足戒律文中說在家人知足出家人知足也長衣戒百一物者百者凡也凡畜助身之物皆一也非謂百枝也有人不達浪為妨難故多論第五畜寶戒云百一物教不須作淨不入百一皆應說淨百一物各得畜一百一之外皆是長物第四人開諸重物者婆沙八十四云曾聞苾芻於日後分來詣佛可求好房舍佛勑阿難與好房舍阿難受敕而授與之彼苾芻言宜淨掃灑懸繒幡蓋燒香散花敷耎床褥安置好枕我乃受之不爾不用阿難於是具以白佛佛言隨索皆應與之爾時阿難具辦授苾芻受已於夜初分起淨解脫因是次第起餘解脫諸漏永盡成阿羅漢復起神通於晨朝時乘通而去阿難於後不見苾芻尋往白佛佛告阿難汝勿輕彼彼於昨夜起淨解脫廣說乃至晨朝已去然苾芻從妙勝解樂淨天沒來生人中彼若不得淨妙房乃至不得極果神通涅槃三十六亦同多論第四云衆生根性唯佛知之不應致難此比丘從第六天來生人間隨本所習而度脫之分別功德論佛藏經經中說有一面王比丘初生有衣隨身長大受此一衣變為道服准此復有一衣比丘即有五種之差也制意者多論第四意也制下二人者第三第四人也財體不同者一月衣者擬替三衣十日衣者泛示長衣也豈可染故在初者昔解長衣由傍通染故在初明言傍通者謂除二離二寶二毛二鉢及藥餘二十一得入手時既犯墮復過十日更犯長𠎝言傍染者先犯長衣以為染從得尼衣即犯二罪被長染故餘准此知彼二說有竪通竪染言竪通者犯長捨懺復不說淨重重有犯言竪染者即初日衣染下九日更有問答既是非理不勞敘之今師意言如是一切豈可染故初明者如淫漏失小妄語等豈染故初耶如此解時長衣得作三衣者伽論第二云問頗有比丘過十夜衣即此衣一夜犯離宿耶答有過十夜已作衣受生界外明相出述曰即犯長衣犯離宿也計理捨時但捨離宿一衣之上無二過故先時犯長直爾懺提也多論指疊者多論第四云令色如法也三擯即三舉也多論第四不離衣宿戒解明相云三色中白色為正此既論曾聞并汾黑相啜粥定犯非時食也故壞及不應量名境差者要初應量後時故壞仍自心録作不壞應量想也被逼說淨者餘皆言上方便中非情除強今被逼者乃是録差今詳非類全不假人以為境者說杌無強不淨施犯由不對人人邊說強是疏意也六群比丘者多論第四一難途二跋難陀三迦留陀夷四闡那五馬宿六滿宿二人得漏盡入無餘涅槃第三第四人是二人生天又云犯重戒又云不若犯重者不得生天初二人是二人墮惡道生龍中五六人是二人善解算數陰陽變運初二人是二人深通射道三四人是二人善於音樂種種喚五六人是二人善於說法論義初二人是二人深解阿毗曇三四人是二人能事事皆一巧說法論議亦解阿毗曇五六人是又云六人無往不通通達三藏十二部經內為法之梁棟外為佛法大護二人多欲初二人是二人多嗔五六人是二人多癡三四人是又云三人多欲初三四人是二人多瞋同前一人多癡第四也是五人是釋種子王種除第三人一人是婆羅門種即第三人六人俱是豪族共相影響相與為友寬通佛教文言迦葉不在者覺支引多論第四離衣戒當時大迦葉經營五大精舍一者耆闍崛山精舍二者竹林餘有二精舍是時經理竹園精舍述曰此不相當彼因經理開離伽梨非此緣起此律文言迦葉不在若准見論十四是舍利弗故彼文云阿難言除佛世尊餘聲聞弟子悉無及舍利弗是故阿難若得袈裟染治好者奉舍利弗若得時食非時七日盡形壽藥於中好者亦奉舍利弗若有諸長者有子欲出家來求阿難阿難教法求舍利弗舍利弗言夫為長子應供養父母是故我應供養世尊然阿難悉作令我今得無為而住是舍利弗恆敬阿難若得衣食於中好者先奉阿難是故律本中說欲奉舍利弗又云問曰阿難何得知十日還答舍利弗欲遊行時來至阿難所語阿難言我欲行某國某國某時當還長老當好供養世尊慎莫懈怠若世尊為四部衆及天龍說法時長老當為我說若世尊覓我時長老當遣人來報我舍利弗在諸國或遣信來問訊世尊問訊世尊已往阿難所問訊阿難問訊阿難言已語阿難言我某日當還是故阿難知舍利弗九日十日當還此律迦葉准彼義思餘戒餘利者此間三戒是德衣中長離二利下皆及別不囑等三是餘三利對辨同異也見論一解三衣具足竟以未足不犯故者計理得衣擬衣作三衣可言未足說為不犯若得擬作裙等餘衣理應成犯也然見論無此正文謂是義准彼十四云衣竟者隨因緣得衣竟蓋是隨施等得三衣也故章云三衣具等論文云或望衣竟或望斷此謂失得衣分齊失德衣已即容犯故故論次文云若迦提月過若出功德衣如是衆因緣名竟也通違非時時利者過前十日即違非時過後是違時也如律說者彼五分第四云一者別衆食二者數數食三者食前食所後行至餘家不白餘比丘四者畜長衣五者別宿不失三衣互說不定可知者由其諸文無有定據故言不定謂若以五事故開受德衣德衣即在迦提之前若准見論云若迦提月過出功德衣如是衆因緣亦名竟即迦提月似有前列故也此三時利者三箇戒各有時利開人解多種者古師意言下皆別不囑等非是專得時衣利故是故彼文不得先除如章次後引之也答此三專得時利等者此即且敘古師義也謂此三戒若在一月五月之中決定即得長離之利下背別等雖在一月五月之中不即得受皆別等利要於一月五月之內復假施食及衣方得皆等也故下文云餘時者有迦絺五月無迦絺一月若復有餘施食及衣今師意言亦可皆別等亦定得時利然下文言有餘施食及衣者謂一月五月外泛爾施衣食亦是開限非謂要在一月等內也祇中即出十捨者祗律第八長衣戒云捨迦絺那衣有十事受衣捨衣竟捨聞捨出去捨失去捨壞捨送衣捨時過捨究竟捨彼律二十八人此十捨見云長二搩手廣一搩手乃至此是最下衣已上並是見論第十四文也與房非類者二房戒中云房是過中制衣是滿中制以過中制故房舉未犯位衣是滿中制故須出犯位所以然者長衣內開外亦開作法外開位故須舉犯以開不犯此出外開極小量房內開外不開無有作法外開者故舉未犯位即是內開極大量所以然者謂徹何以衣房兩位犯不犯殊疏意釋言長衣將法以開過量須舉滿位以開不犯房無用法以開過量故舉如量顯過量犯上來據七搩十二搩為問答也章云若爾若使說淨等已下即續上來釋難之次更為此問也謂將淨法對處分法顯房衣量何等須法也六搩四搩未犯者見論十三說也此即據六搩量作問答也其猶過量者過尚須法免不處分況於減量寧不處分也亦惱施主者互過亦同俱過惱施主也隨財段數者見論十四云若多衣縛束一處過十日得一罪若散衣不縛束計衣多少隨得罪有人存其到句合為七十四者到句二十八帖前轉降合七十四也言到句者諸初日得更無回改以其初日是染本故必不得言初日不得唯約下九將尾鈎頭名為到句此到句要從第三章門起首謂八日得兩日不得且唯轉降作第八句應言一日乃至八日得九日十日不得續此轉降即為到句謂第十日留一空日將一空日鈎第二日為一到句尾後須留一箇空日如是却鈎成一到句第四章門三箇空日初將尾後二箇空日鈎第二日次將尾後兩箇空日却鉤第二第三兩日尾後亦留一箇空日如是却鉤成兩箇到句第五門有三句第六門四句第七門五句第八門六句第九門七句第十門無也如是總計有二十八今師破云以其注中頭尾不似到故者此第九門八箇空日若作到句得成七句且如將尾一箇空日却來鈎頭為初到句即應說言一日得二日不得三日得四日已下一向不得據此三日應言是得注中乃言三日已下一向不得此即頭不似也第七到句尾留一空將七箇空鉤第二日乃至第八此即應言一日得二日三日乃至八日不得九日得十日得不得既作到句九日須得而今注中九日不得此即尾不似也亦藥鉢等戒並有此妨也寧可別義以立到句若似此章義不可也有餘復立二十六起間句亦從第三門起首也此第三門總有八句第一句一日得二日不得三日得四日不得五日已下得第二句一日二日得三日不得四日得五日不得六日已下得以其兩空間於八有降使轉下成七起句第四門三空間七有為五句第五門四空得成一句又有人言第七門已下不得成超尊者曰第七門四有間六空成四句第八門三有間七空成六句第九門無無超句為與到句同故如是總計二十六句帖前七十四合一百句也以初對初所犯是同者若不淨施不遣與人等即是十日得衣義無異也故使有無不同齊少此一者得門有其初門十日並得下之七門齊無初門也故章前云淨不淨但有九門𨷂無初門下六同然等也以九對九為其有無不同及法差別者不得遣與人失等是無壞非衣忌去等是有淨施是法差別也此有無義與前有無義別也不犯不同者有無及法並容不犯也淨施對文者對下真實淨施戒也以其此文雖有淨施之言而無淨施之法此忘財體者今詳實有而迷為無如章所說也若雖知有一向本迷謂作法竟理亦開限若准見論云不以想脫僧祇第八云不作淨謂淨想過十日犯即不開也若知有財都不在開無心謹護故也隨著多少等者見論十四云若犯捨墮衣不捨不懺悔隨著一一突吉羅若一著不脫乃至破一吉祇第八云受用不淨衣故隨用得越毗尼若觀此律文勢義似不然應言若捨墮衣不捨更貿餘衣一提一吉者吉是不應之吉提是本衣之提所貿親衣不犯販者理亦由前非法心染然悲文意也著用之吉乍可別立准自言毗尼者下滅淨法云若欲在僧中懺者應往僧中偏露右肩脫革履禮僧足已右膝著地合掌白如是言大德僧聽我某甲比丘犯甲罪今從僧懺悔如是三說對文可知者至下疏中當次第釋也此等十二須具意者此須說之者今詳先來諸家章抄及講說者多集浮言廣開章段至於行事卒尋難曉今且應依行事所要開為三門一明罪纍多少有無二辨懺罪次第階品第三正辨捨懺還法第一且辨罪多少者如章云凡欲捨時先須知己財事現不現乃至十罪者一長衣等現在有何捨墮二長衣等已用壞盡直懺罪牒訶還須云故畜長衣等犯捨墮此衣等已用壞盡乃至廣說三覆藏提罪犯吉四即此吉罪隨夜展轉覆藏犯吉五著用犯吉六即此覆吉七即此隨覆吉八僧說戒時二處二問犯默妄吉九即此覆吉十即此隨覆吉此十罪中不必具有故章云或一或二乃至十罪第二門懺罪次第階品者如章云先懺輕𠎝後次捨財乃至不同祇律者先明次第章云雖言先懺輕𠎝後次捨財計理本來因財生過應先捨財次懺諸罪明了論云先捨物後方顯說滅罪已上論文也當今行事並皆然也次辨階品者章云以輕重之罪既不合總悔故致階降其位有四等者南山律師但存三位准理應然故下人犍度云時有比丘犯殘若作殘意覆應教作吉懺已後亦覆藏犯提乃至惡說亦如是述曰既文先合懺覆藏吉故知覆藏及隨覆藏義類同故合為一位就根本中提及著默罪性既殊理無一藥能頓除遣故復須分提吉之別故成三位故今行事先懺提下及著默下覆與隨覆六品吉羅次懺著默二品吉羅後方正懺波逸提罪故分三位也計理但有八品吉羅南山復存九品吉羅以其提下親生覆吉義同著默親從提生故存親覆及著默吉以為根本於中各有覆與隨覆故成九品也今且依前八品為正次辨懺法者章云此之三位悔並責心者疏意准下增五文云復有五種犯遂即次第配彼五篇故知吉羅唯責心懺今詳恐違母論明文故今所辨吉羅之中自有責心及有對首欲釋此義應具引下增五律文復以母論隨便注釋律云復有五種犯或有犯自心念懺悔母論第八云有妄誤犯者心念自責滅也心念自責者衆學中不故作者是述曰此顯責心吉也或有犯小罪從他懺悔母論云故作下者一人前悔者是名輕也述曰此顯對首吉也此律亦言以作故犯應懺吉若不故作犯吉即同母論二種吉也或有犯中罪亦從他懺悔母論云故作中者自性蘭提提舍尼是名中犯一人前悔述曰提舍尼既配中罪之中不同疏意也或有犯重罪從他懺悔母云重者十三殘殘邊蘭夷邊蘭此是懺悔中重者述曰易解也或有罪不可懺悔母云不可悔者四重突吉羅波逸提偷蘭此罪不可悔也述曰四重即四夷也吉即滅擯吉也提即打佛提蘭即出血蘭也然疏主意以初心念純配吉羅第二從他以配提舍第三中罪以配提罪餘配同前故立吉羅一向心念今釋既異故存吉羅二種懺異明了論疏云重者獨柯多輕者名學對若不動身口者即輕責心即滅若動身口者即重對人懺方滅此間不解分別其異通名衆學此為謬矣今三藏亦言有兩種吉羅南山律師亦存兩吉故今所辨八品吉羅並對首懺今時行事亦然也若准章中並責心者恐罪不滅行事應知治辨懺法不同祇律如章云不同祇律者彼律第八提吉合懺今三藏亦爾且祇律云長老憶念我某甲比丘尼長衣過十日已於僧中捨此中犯提及受用不淨衣隨用得越毗尼罪是一切罪今向長老誠心悔過不敢覆藏持問言汝自見罪不答言見汝更莫作答言頂戴持如是三說此律人犍度既云七聚並先懺覆藏吉羅故不同祇也第三門正辨捨懺還法者復開二義一者先須緣境立心二者正辨捨懺等法先辨緣境立心者如章所引云凡欲懺者無問重輕依明了論乃至如捨墮別抄所說者真釋云提舍那者翻為顯示亦翻說罪亦翻發露言罪因者或因貪等或因諸見或因忘誤或因放逸或怖畏等作如是罪言緣起者或由非時食或飲酒等故成於罪言體相者此是殘罪或提罪等言過失者有五過失一能障涅槃二障涅槃道三能生他不信敬心四能增長自身惡等業五能感惡道報又應了知作罪處是故言等上來即是緣於罪性可厭之境也言可親信人者彼於我好若向說罪不生惡心不向餘人轉道說我故言可親決知彼人戒行清淨故云可言若對同犯罪人說罪罪即不滅南山云必須根本俗人已來不破十戒具戒及犯已能悔以成清淨者然後受懺昔人妄引五分不同分犯者彼開臨命終時同犯不同犯俱開今是間預必是非法今三藏云初篇若犯事不必可治第二有達人須二十若作輕過對不同犯者而除悔之今詳三藏目囑西方何須不信又不同者律攝要取不同篇犯也上來即是緣證明境言求受對治護者如犯非時食今更求受不非時食護也上來即是立要勘心也章云如捨墮別抄者疏主更有別行捨墮別抄可二十紙許彼吉羅皆責心懺今不依之故不須敘第二正辨捨懺等法者捨還離合上義門中如章已辨今且離明先辨長衣餘可准此於中有四一捨財四一集財二對境三修敬四捨訶也二捨罪六一乞懺二對主三作白四正懺五呵責治六領受立要三還財四不還結罪此之文義隨疏應知今且應依時人行事多在戒場或自然界對一人捨廣敘其義餘對僧等即准此知第一且明捨財法者律既不許別衆作法故須求一清淨比丘共往戒場或自然界若是大者先修威儀偏露右肩脫革履禮足䠒跪手捉衣若是小者恣其禮足口云大德一心念對二人應云二大德一心念二三人准此我比丘某甲故畜一段長衣二三段等准此稱之若物全多不可分得言衆多若但可知即得稱若是帛須言長財過十日下九日染犯者不須此言不淨施犯一捨墮或隨數稱今持此衣或財捨與大德或二人三人等准此應知第二辨捨罪法者前已立義提吉不同分為三位第一先懺覆與隨覆六品吉羅於中復二謂先應請所對懺主具儀口云大德一心念我某甲比丘今請大德為突吉羅懺悔主願大德為我作突吉羅懺悔主慈愍故一說答云可爾次正懺罪具儀口云大德一心念我比丘某甲故畜一段長衣過十日不淨施犯一尼薩耆波逸提罪又因著用犯捨墮衣犯突吉罪不憶數或稱一二等數又經僧說戒二處三問犯默妄突吉羅罪不憶數或隨數稱犯此三位根本罪已各不發露經夜覆藏犯突吉羅罪不憶數或隨數稱展轉徑夜復犯隨䨱突吉羅不憶數或隨數稱此中六品覆藏隨覆藏突吉羅罪今向大德發露懺悔不敢覆藏願大德憶我一說懺主答云自責心生厭離犯者答云爾祗云頂戴持亦好第二位懺兩品著默吉羅更不須請懺主前已請訖故也具儀口云大德一心念我比丘某甲故畜一段長衣過十日不淨施犯一尼薩耆波兔提罪由犯此已著犯捨墮衣或財犯突吉羅罪不憶數或隨數稱又經僧說戒二處三門犯默妄突吉羅罪不憶數或隨數稱今向大德發露懺悔不敢覆藏願大德憶我一說答云自責心生厭離答云爾或云頂戴持也第三位正懺根本波逸提罪於中亦須先請懺主具儀口云大德一心念我某甲比丘今請大德為尼薩耆波逸提懺悔主願大德為我作尼薩耆波逸提懺悔主慈愍故三說或除尼薩耆言亦無妨也答云可爾次正懺悔南山云應略說法告云佛言我為諸弟子結戒寧死不犯比丘之法本無積聚涅槃經云不名為僧若犯離衣應云比丘之法正有三衣鉢盂行必隨身猶如飛鳥羽翮身俱故違佛教豈成佛子如智度論第十五云破戒之人妄食信施所執鉢盂即洋銅器所著衣者是熱䥫鍱乃至由破戒故受無毛蟲或噉糞身隨機三五句而已然或頑鈍雖聞苦語未動其心者不必須示亦勿受其悔過以相續故也又對解法之人自心慚懼者亦不勞為說法也其懺詞者具儀口云大德一心念我某甲比丘故畜一段長衣過十日不淨施犯一尼薩耆波逸提罪此衣已捨與大德或捨與餘人應言已捨與某甲此波逸提今向大德發露懺悔不敢覆藏懺悔則安樂不懺悔不安樂憶念犯發露知而不覆藏願大德憶我清淨戒身具足清淨布薩三說答云自責心生厭離答云爾或言頂戴持第三還財者既對一人但須徑宿直爾手付無別作法詞句也第四不還結罪如文應知上來廣依對一人法具分別訖今律文中是對僧法若欲釋文即以上來捨罪捨財還及不還四位之義對文辨異亦為善好也次當隨疏釋四位文第一捨財於中復四一者財集制捨文云此捨墮衣應捨疏釋云今解捨財文言此捨墮衣者財集應捨廣說乃至人但有情彼容礙此是故不類如疏應知販賣五種者以時易時等四藥及波利迦羅為五也如販賣戒應知第二所對境集文言與僧若衆多人若一人不得別衆捨若捨不成捨突吉羅疏釋云二與僧等者已下乃至非重之謂也者非如僧殘以罪重故制對僧懺今此但欲令生殷愧非謂罪重而令對僧也第三捨之威儀子言捨與僧時往僧中偏露右肩脫等革屣向上坐禮胡跪合掌疏釋云若不謙卑已下乃至闕無禮足者五法謂一露肩二脫屣三禮四胡跪五合掌文雖合掌而今行事合手投衣第四正捨詞句文言當作是語大德僧聽乃至今捨與僧疏釋云對衆捨物理合宣情已下乃至理亦應得者文中出法故不具足理須稱長衣財數及罪數等准前對一人釋之章云餘皆類然者除長衣已餘離宿等亦類此知也第二捨罪六者一乞懺悔二請懺主文云彼捨衣竟當懺悔即對此文疏中釋云次下懺法悔乃至佛開同不同得者謂雖此文略無乞懺及請懺主義應有之章云乞懺之文不須一一牒事周是准而可知者三人已下全無乞詞今辨對僧須有乞詞秉法之人應先索欲問和和訖方令乞法應云大德僧聽我某甲比丘故畜一段長衣或財過十日下九日染犯者煩除此竟不淨施犯一捨墮若合捨者續次即牒離伽梨等犯捨墮乃至二十九戒是衣已捨與僧若云已捨與三比丘某甲等若因緣等應言是衣已壞等此中一尼薩耆波逸提罪若衆多不憶數等隨應稱之准下滅諍提度云若欲在僧中懺悔者應往僧中乞文既文不倒提吉等異故知除其責心吉外餘皆容入僧中乞懺而今行事多不存之設若存者即應續次牒八品吉不須唯同懺中別懺今從衆僧乞懺悔願僧聽我某甲比丘懺悔慈愍故三說前雖已引自言毗尼乞懺之文文既不具故應依此次辨請懺主詞白如上對一人中已具辨說但於此中雖請已訖而受懺者未得即許先須白僧後方許之第三明受懺者作白和僧文云受懺悔人當作白乃至如是疏釋云雖可別請事既經衆乃至故宜須曰者文中不具應先須索欲問和已訖詞句應云大德僧聽此某甲比丘故畜一段長衣過十日不淨施犯一尼薩耆波逸提罪是衣已捨與僧或若與別人者隨別人名字稱之此中一尼薩耆波逸提罪或隨數稱今從衆僧乞懺若僧時到僧忍聽我受某甲比丘懺白如是白已方答請人云可爾准前立義既許吉羅亦入僧懺故今日中亦總牒取義亦無爽然今行事並不存此任情取捨此據對僧故住單白若對二人三人懺者懺主應准滅諍揵度白邊人云若長老聽我受某甲比丘懺者我當受彼第二比丘應言可爾若欲在三比丘邊懺亦如是已上律文第四正捨罪文云作此白已然後受懺疏釋云因緣既備理宜滅罪乃至不煩懸解者今已如上對一人中懸解已訖第五呵責文云當語彼人言自責汝心疏釋云雖對說過若不設治乃至知有罪有五種過失等者五過失如上緣境立心中已辨說第六領受立要文云答言爾疏釋云治於前已下是也第三還財文云若衆僧多難集等疏釋云具前十法即是悔犯清淨已下是也祇第八云律師問此衆中誰是汝知識答言某甲即作白二羯磨付知識比丘如彼文說又云是知識比丘應即日若明日還彼衣亦不得於衆僧前還亦不得停久過半月准祇亦得即日還但相傳要徑宿還之現今西國行事亦令徑宿若即坐二還者一三衣等即座直還二長衣等即座轉付也但七中一法者若別問答即七中二法也如上疏釋云前房戒中作法具緣一假界二秉法人三簡衆四與欲五因起六問答七正作法此中作法既有因起即七中三法也多論計直者謬也如上已引是善見第十四云隨宜也然多論第五擔毛戒云問此是暫捨為根本捨答以罪言之是根本捨以法言之是則暫捨一人但十者復無問邊人故也二寶中捨財三者除威儀也略而不出者指彼戒文不出懺法也謂有捨財二者一集財二者正斬壞捨取尼衣已下次第五戒者誤也即離衣戒已下並言轉作淨施等也多論第四長衣戒云沙彌應畜上下衣一常著當安陀會二當多羅僧今清淨入衆及行來時著得畜泥洹僧一竭支一富羅隨身所著物各聽畜一自外一切盡是長財沙彌若得錢寶亦即說錢寶應捨作突吉羅懺略不舉餘六者不言反上得不失不壞不作非衣不親厚不忌等六門辨不犯也以對下三故言取著者對失燒漂若先自有犯長之財取者不犯著用吉羅持作三衣亦即成就但懺先提也對初奪故他人與我犯長之財我全無犯此顯不同他人長藥若與我者不許服也有餘釋言他與著者先犯長財已失燒漂長本無故不染新財故言所著者不然畜心不斷即得相染何假財在也復有餘釋徒繁其功也他與作被者相傳釋云釋疑故來若他與少財可言不犯他與作被應當是犯釋云亦不犯也今詳失衣他與身著既不成犯他與臥被亦不成犯故著別明也
