body:
  text: 已下疏本第六淨施戒遠同大行者地持第四辨釋此義然與瑜伽同本別譯故今即依瑜伽三十九釋云謂諸菩薩先於一切所畜資具為作淨故以淨意樂捨與十方諸佛菩薩譬如苾芻於己衣物為作淨故捨與親教軌範師等如是菩薩淨施因緣雖復貯畜種種上妙一切資具一切施物猶得名為安住聖謂知足為體也生無量福常於此福多思惟故於一切時隨逐增長恆於一切作淨施物如佛菩薩所寄護持見來求者即應觀察若隨所欲作淨施物惠施彼時稱當正理應作是念諸佛菩薩無有少物於諸衆生而不施者如是知已取淨施物施來求者令所顯滿若觀施時不稱正理即應念先作淨施法告言賢首如是等物是他所有不許施汝耎言曉喻方便發遣或持餘物二倍三倍恭敬施與然後發遣令彼了知菩薩於此非慳貪故章云違同大行者即遠同菩薩為成熟有情而畜財物也其準具戒及當部者當衆也下衆對手理亦同類準足數義既無互足作法之時故應自類然作法時之時故應自類然作法時應稱長老憶念或言具壽或言賢首或言慧命悉得尼下二衆稱大妹大姊也尼加十六牧者謂長十六之類非謂受持十六也故下文云即日受十六物牧餘者當淨施綾羅綺繡等者謂是灼然大文綺綵及人髮等又以義準女人衣服等畜之並不合著用隨應蘭吉既體有過故不合淨施也若堪改作道服者理亦應淨施重物之中除十六牧悉同於上者謂十六牧雖是重物而須作淨故須除之餘外重物同上不須淨也時人相傳大被大氈不須作淨今詳聖開下品受畜故咸須淨䘢衣之綿若應者亦須作淨崇云物者衣藥鉢及十六牧等古舊師云如綾羅錦綺等一切重物不須説淨此義不然比尋諸文皆無開處若以重物不説如十六牧藥豈是輕耶今詳錦等本不開畜何因乃索開無淨文豈可有文云從今已去不聽畜錦等若畜者開無淨施清淨無罪又十六牧開畜故淨寧同錦等故還依舊為正也請施主辭句大德一心念或言老主我比丘某甲今請大德為衣藥鉢展轉淨施主若準實施主應言為真實淨施主願大德為我作衣藥鉢展轉淨施主或言為我作真實淨施主慈愍故三説錢穀米等如上畜實戒辨約物及境作法有差者物已成衣應言長衣若未成者應言長財境唯自類如上已辨作法有差者衣藥鉢等真實展轉有差別也答於五衆中隨意與者準彼五分不請施主任所對人隨與一人也今三藏亦言不應請施主也不應語所稱名比丘者如張比丘對王作法任王處分隨意與人王即施與李姓比丘作法既竟不應語彼李比丘知故云不應語所稱名比丘也釋此四文者前科為五除初一文但釋舉數已下四文也依此文作者今詳依下衣犍度文者好也今謹録下文云真實施者大德一心念我有此長衣未淨施今為淨故捨與大德為真實淨故展轉淨者大德一心念此是我長衣未作淨為淨故施與大德為展轉淨故彼受請者即應言大德一心念汝有長衣未作淨故與我我今受之受已當語言汝施與誰彼應言施與某甲受請者應如是言大德汝是長衣未作淨為淨故與我我今受之受已汝與某甲是衣某甲已有汝為某甲善護持著隨因緣述曰作法之時汝我等言應改者改之不得謹誦也白色衣戒多論第八新衣者不問新故白以初得故名新此律釋相中即同多論多論又云凡五大色若染吉羅若作衣不成受持若作應量不應量衣一切不得著若先得五大色衣後更改作如法即成受持反此則不成受持五大色者青黃赤白黑也一切如法色衣不如法色衣不作淨著者皆提若故點滅猶是淨衣不須更點準此論文亦是不然得提又云除富羅革屣餘一切衣臥具乃至腰帶盡應三點淨著用皆提又云若以新物補衣一處作淨不須一一淨也以皆却刺補故若但直縫應各各點淨又云凡淨法有三種一者如法三點淨衣及一切漿須作淨者比丘得自作二者若果菜五種子應沙彌白衣作淨三者若得革屣新靴應令白衣著行五六七步即是作又云有故作淨謂令人若自作有不故作如隨力等生種之上隨漿中等即名為淨又云若作純青淺青及碧作點淨得作衣裏又云黃是不如法色祇十日衣但吉不點提與此律一倍相翻也僧祗十八云青者銅青長養青石青銅青者持銅器覆苦酒上著器者是也長養青者藍澱青石青者是空青也黑者名字泥不名字泥字名泥者呵梨勒醯勒阿摩勒合鐵一器中是不名字泥者實泥若池泥井泥如是等一切泥也木蘭者若呵梨等三勒如是比生鐵上摩持作點淨亦可重衣者寒衣輕衣者夏衣也此等非三衣故吉煞畜戒鼻奈耶第九云佛及洴沙王迦留陀夷三人無比射也口語者謂或誦呪術或呵比令死不同煞人有謂死也以此若許解人語者得偷蘭故飲蟲水戒鼻奈耶第八云有二比丘未曾見佛便發進路來見世尊春後極熱身體燋渴值曠野中水少蟲多其一比丘語一比丘飲此蟲水得覲世尊一比丘答言受世尊戒云何當壞其不飲者命終生三十三天著百寶冠來詣世尊世尊説法使得見諦其飲水者在後至佛佛遙見來脫優多羅僧示黃金體汝為癡人用觀是四大身為純盛𭊴處其見法者則見我身不同十律者彼律十一及十四並言隨蟲死一一提不言不死吉有餘皆言十律不死言戒本可知者四句一人二知三水有蟲四飲而結罪疑惱戒前四舉受為疑者亦可準下增六文云作疑有六法若以所生年若以臘數等故知臘數是亦通隨也其事實爾自不成等者祇律異此祇十九云若有人來欲受具足若簡二十與受若不滿語言且往待滿若彼便於餘處受具來不得語令疑悔語者越毗尼若受具時羯磨不成應彈指語言長老汝羯磨不成若受時不語後不得語令起疑言汝受時自不成羯磨不成衆不成語者越毗尼以不知言語復粗疏故妄引我言等者疏意釋云謂同法人性粗疏故聞説初禪遂妄引我法師之言而向人云法師令我語得初禪法師為欲誡約彼故以彰總彼故曰如汝所説自稱上人法犯波羅夷餘二禪師等準此應知覆粗戒義同於説者如上文中身子被差説調達過便疑有犯佛即開其除僧羯磨故知説粗若不被差通記二逆亦在犯限今覆粗中義同於説通覆二逆亦應得提有人引多論第八云覆粗有三種一覆夷殘得提二覆出血壞僧得對手蘭三覆下三篇吉故不得云覆逆犯提今詳多論第八説他戒中亦同覆他三種階降此律説他既無三階故異多論也多論覆説結罪既同明知此律覆説亦須相似也減年戒或復體定非可進不者如一臂長一臂短等或即時方便容可如法如負債無衣鉢等或雖不應得戒得罪者如百遮説章云都無所了稱為不知者不然若不知法更結不學無知何容免罪故應準此下開文云若先不知信受戒人語若謗人證若信父母名不知也調心如章釋得也或言滿等五句者一滿二不滿三疑四不知五默然六僧不問若準多論縱滿二十答言不滿亦容不得戒故多論第九云若人滿二十自想滿二十僧中問云不滿有二種一誤若妄此人得戒二意不欲受師僧強與故説不滿此人不得戒年六十不得受大戒故師僧強授亦不得以其人不任堪行道又心智鈍弱唯聽為沙彌七戒已下亦不聽度受戒俱突吉羅又云年未滿二十不聽者以其輕躁不耐寒苦若受大戒人多呵責若是沙彌人則不呵故也尼十二得者為夫家所使任忍衆苦加厭本事也已上論文祇二十九云沙彌有三品一者從七歲至十三名為驅烏沙彌二者從十四至十九是名應法沙彌三者從二十上至七十是名字沙彌已上律文準此七十已上七歲已下不應度出家也僧祗十九云若有人來欲受具足月滿者應與受具足不滿者應語令待滿若人不知者當問其父母親里若復不知當看生年板若復無者當觀其顏狀觀時不得直觀形體或貴樂家子形大年少當觀其手足成就若如是復不知者當問何王何歲國土豐儉旱潦時節已上律文六答者或默然或不此二非答然與餘四相從説答也和上都無所知故無情過者若爾前謂心中答言不滿應有情過和上應犯故不應理今解言不知者決信傍證及信父母故成不犯也驗前成不為犯不犯者此義不然下至若少一日不滿二十令十二月者和上得提其受戒人自戒得戒非由得戒即令和上無罪也猶如百遮雖受得戒僧不免罪問此戒開又應開和上若不開者何用此列答乘言勢便開受得戒其猶輒教誡之中開尼二難等不往禮拜豈是開無輒教罪耶又如尼律度任身者開和上云若不知若信父母等乘勢開母乳餔長養同室抱等豈由開母同宿抱等即令和上亦不犯耶故非誠證也餘之二心本自無罪不須論開者和上無罪理且應然弟子之事豈不須論也隨分結提者疏意釋云且隨分應位以結提罪其實未定此不應理向已破訖依伽論所以有閏月者由十四日布薩故者此故師意云以其閏月由小月中融出而成故文雙舉閏及十四顯其閏月與十四日體一名別也非謂減餘十八大布薩合成十四日也今師破云今解閏者不是專由十四日故數取非妨者意説閏月若專由於十四日成可言體一而名有別閏既不專由十四日與閏月體其義全別且知一年六小布薩三年總計但得閏中成十八日既是更須是十二日方成一月始名一閏明知十二非是由於小月中來故知閏月與小月別故一年內於十八令大布薩中數取十八日非妨也問前言三年有十二日既不由於小月中來者從何處來耶答如章云以其日行周天以十二月乘十一日計於三年有三十三日餘者周易中辨日行周天有三百六十五度四分度之一謂一度分為四分於中取一度故曰之一也且計一年合十二月於中六小通計一年合有三百五十四日然一晝夜行於一度若準周天即是但行三百五十四度以之為歲餘十一度四分之一猶自未行即是一年剝十一度四之一若至三年即剩三十三度四分之三取三十度或二十九度以之為閏猶剩三日四分之三故疏云有三十三日餘也由斯剩日遂使數有兩年一閏也又準九章算法十九周天以之為章謂三年一閏有三謂九年三閏月也五年再閏有四謂十年四閏月也十九周天於中減取十九合十一度四分之一總成二百十三日四分之三且計二百一十日以為七閏猶剩三日四分之三然其章法且舉全數故言七閏理實猶剩三日四分之三也且如十六周天即剩一百八十日謂十年到十個十一度即一百一十日又六年六個十一度復成六十六日又有十六個四分之一即成四日合為一百八十日也此即成六閏也又餘三周天更有三十三日四分之三又為一閏猶剩三日四分之三也尚書云期三百有六旬有六日然實三百六旬五日四分之一而書且舉全數非盡理也若準晝計一年乃剩十二日三年足得閏焉猶剩六日問何不每年皆以三百六十五日四分之一以為一歲何須置閏答以其一年總有四時而或有時春時獨長餘三齊短故於春分置一閏月以合四時夏秋冬等準此應説或復有時四時並齊故一年中總不置閏縱有延促一日之者但須小月大月間頻也此方且然若準西國其義大同故智度論五十三云一月或三十日半或二十九日或二十九日半有四種月一者日月二者世間月三者月月四者星宿月此標四名也日月者三十日半即是期三百有六旬有六日世間月者三十日世間共許三十日為月也月月者二十九日加六十二分之三十謂乘此月十二月為一年也此中通計一年合有三百五十三日加六十二分三五十即是少十二分不滿三百五十四日也星宿月者二十七日加六十七分之二十一謂於每月別有星現徑二十七日六十七分之二十一日即沒不現也制怛羅正月也吠舍佉二月也誓瑟吒三月也阿沙恭四月也室羅伐拏五月也婆達羅跋陀六月也阿濕縛庾闍七月也迦栗底迦舊名迦提者訛八月也末伽姑羅九月也報沙十月也區勒具拏十二月也此等皆據黑前白後也閏月者從四月世間月二事中出是名十三月謂加閏故十三月也或十二月或十三月名一歲是歲三百六十六日周而復如此據三百六十五度四分之一也而言六十六日者不盡理也上來粗文並是論文於中注釋者今詳釋也因此乘辨三百六十五度四分之一中每月但行十三度十九分之七以其月初生時西方才出未至初夜其月即沒是故不得全行一度乃至十五日夜方始全行是故不同日行周天也又詳日行周天者乃是假為節度分限非謂日月實如是行猶如有人往行百里而坐家者量其日影以為百分影移一分知行一里非即行人於影上行也謂繞須彌是實行處而諸賢聖量其遲速以分為度也文同義異者抑斷而無據也理實兩文還開得戒也前已釋訖發諍戒輕重文四中云次犯吉羅者如文云除此諍已等得吉也三種四句者觀作觀想如文已有又解作解想又滅作滅想各四句略也惡見戒五分第九疏引不盡彼律乃至今得須陀洹斯陀含阿那含有諸外道不捨本見於正法出家亦得四沙門果以是故我作是解述曰若言長者得初兩果猶有欲事斯則容然言得那含及不捨本見得四種果則違聖教故須設諫謂十隨眠於中受恚慢及無明通見修斷有身見邊執見戒禁取見取邪見及疑此六唯見道斷若見斷者觀苦法忍展轉乃至道類智時經十六心前十五心名為行向薩婆多宗是見道攝第十六心名為住果薩婆多宗名為修道於此十六不中出觀三界見惑一時斷盡名為初果大乘十六總名見道自此已後入修道位四種隨眠於九地中各分九品謂上上上中乃至下下後初先斷欲界九品斷此總起九無間道九解脫道先斷上上以最粗故起下下道即能斷之次第乃至斷六品盡名斯陀含次第乃至斷下下品起上上道九品惑都盡若阿那含餘之八地九無間等準欲界説然阿那含從欲惑盡乃至非想惑未盡前悉名那含又此一來不還二果依於有宗或用漏或用無漏隨一道斷預流羅漢必用無漏上來且據次第得果若超越者先異生時有漏六行已斷欲界六品惑盡後入見道前十五心名一來向第十六心若一來果若先已斷九品惑盡或復乃至無所有處下八地中七十二品先已斷盡前十五心名不還向第十六心名不還果阿羅漢者無超得義若準大乘雜集唯識先得初果後入修位於九地中八十一品總束為九起九無間九解脫道若斷上上一切地中上上俱斷乃至第九解脫道之時得阿羅漢亦有超得小乘經論無此文也是故利吒不應説欲不鄣那含及阿羅漢以後二果欲界惑盡何容更有淫欲之事前之二果欲惑未除故容自妻斯理無妨若出家人一切皆斷即於淫欲亦鄣初二故智論九十四云白衣弟子以香塗身妻子共臥得初二果是阿利吒比丘聞是事即言雖受五欲而不妨道不知是事佛為誰説然佛本為白衣故説比丘持著出家法中述曰利吒比丘持白衣法著比丘法中也又言外道不捨本見理亦不然若不捨見尚不得初况第四果倚傍初二便謗三四故應設諫次當釋疏上品鄣見諦者謂見道惑粗故易斷名之為上下品鄣思惟者舊名思惟新名修道以修位中數數思惟數出入觀不同見道一人入斷盡故名思惟修道煩惱細故難斷名之為下也治道品殊者謂初見道起能治道但斷見惑後修道中起下下道斷上上惑乃至次第起上上道斷下下惑九地同然各各歒對自斷當品無有異道斷異品惑故章云異則非此所斷等也故有非我鄣非謂不鄣於彼者且如欲事不鄣初二非謂不鄣三四若出家位一切鄣也若生勝解此或斯除者謂修道中數數更生增勝聖解斷欲貪盡故云斯除第三果後無復欲事若超果者先斷欲界九品惑盡在異生位已無欲事具緣中第二屏諫等設無屏諫直爾僧諫亦應犯提然準聖教必先屏諫分釋同上者同上破僧等四諫戒也初至呵責阿利吒比丘已已來正起惡見諫所為事二告諸比丘聽衆僧已下秉法設諫違而成犯前文復二初至其犯淫欲非鄣道法已來正起惡見二時諸比丘聞阿利吒已下呵所不應即此呵中初比丘呵利吒堅執審定而言唯此真實等者章中釋言以心實故故得輕提不同調達以心虗故故得重殘若準多論第八云阿利吒先是外道弟子外道邪師遣入佛法倒亂佛法其人聰明利根不經少時通達三藏即便倒説云行鄣道法不能鄣道盡其智辨不能令成述曰準此論文即心虗也設欲救疏應言部別不勞通釋以此律文有心實相故也次佛呵可知第二秉法諫中復二初教作法二應作如是下奉命設諫得罪之所三諸比丘白佛已下諫法該通戒本文五初諫所為事二彼比丘下諸善比丘屏諫三比丘下拒屏諫四彼比丘下僧諫五不捨者下違諫結犯初文分二初明諫所為人次明諫所為事辨相具釋隨舉戒四種成室相者盡鄣盡覆俱句也盡覆不盡鄣偏句也盡鄣不盡覆偏句也覆障俱不盡俱句也五分第九云隨久近共語語語提共坐坐坐提共宿宿宿提共事事事提九不成室者一盡覆無鄣二盡覆半鄣三盡覆少鄣此上三句以盡覆對鄣無半少為三四盡鄣無覆五盡鄣半覆六盡鄣小覆此三句以盡鄣對覆無半少為三七覆鄣俱半八俱少九俱無此三俱句為三也隨擯沙彌戒沙彌不具見不懺不作擯名俱是義説亦無文也牒上諫五句來者上文諸諫戒皆有五句也即此戒中第二句開為五句者同上文也謂一諫所為事二屏諫三拒屏諫四僧諫五違僧諫具如章釋即牒上擯治者牒上緣起中擯治也辨相中前解初句可知滅擯者下解第三汝出去滅去畜養者下解第四句若比丘下解第五句後釋意者初句可知滅擯者下解第四句中兩句也謂滅擯者解知如是衆中等畜養者下解誘將等第五句可知伽論第二云沙彌言我知佛所説欲不障道衆僧和合已彼若懺悔還淨者當攝受十律十五名為滅擯多論第八亦爾然準多論即是惡耶不捨之異名也拒勸學戒古師意者作犯之中若不倚傍者但不受諫是若倚傍者即諸僧諫是也若論止犯定無倚傍闕無僧諫也毀毗尼戒甄去未誦等者準祇十四未説時呵越説時呵提説已呵越心悔作此釋也彼律要是半月説時得提若尋此律及五分律呵他學誦故知不要半月之時異於祇律也五分第六云若發心念欲令人遠離毗尼不誦不讀而毀呰戒提若發心作念我當毀此令木叉不得久住而毀呰偷蘭多論第六云若凡經中有隨律經時説呵者提謂半月名時説也餘時説隨呵去餘如章釋不攝耳聽戒證其久知結罪屬彼者尋此戒宗由不聽犯即疏中釋深契正理而南山云此是恐舉先言戒也今詳若是恐舉先言戒者理即是彼小妄語攝非此所宗也然起過中藉彼恐舉先言為緣而制不聽以彼言中含兩義故故得為緣謂或實知而言不知便是小妄若實不知而言不知即由不聽然五分律第九卷中恐人疑云若是實知而言不知可得提罪若實不知而言不知應當無罪故彼文中遂雙結云若知若不知不知作是語波逸提然實理推意舉始知及不知之言顯不聽罪也今此律中亦舉無知及始知之語以顯不聽也多論第九意同五分故彼文云實先知言始知犯妄語隨此中正結不專心聽罪也又云輕心聽亂心聽戒故犯突説竟犯墮祇二十一云佛言誦木叉時餘比丘不得坐禪及作餘業皆應專心共聽若四事不聽十三事不聽越乃至中間隨不聽越一切不聽提文言若不與者彼突吉羅者謂善比丘見已應呵也故祇云呵已波逸提悔過又云此罪不得趣向人悔過當衆中持戒有威德人所敬難者於前悔前人應呵長老汝無利乃至廣説章云二罪之外者次前疏云非但無知故犯根本罪此即以無知之言并顯有根本罪即是無知及根本二也亦可通開不攝耳者是戲笑言非實不聽故也同羯磨悔戒駭胡界反驚也十律應分物者彼律第十云長老陀驃力士子多知多識能致供養飲食衣服臥具醫藥資生之具時陀驃比丘衣服故壞諸居士因陀驃故多與衆僧飲食衣服現前僧應分物乃至即衆僧中作羯磨與若準多論第六云此戒體若僧和合作羯磨不作羯磨與知事執勞苦人若僧祇物若自恣物和合與已便呵言隨親厚與波逸提又云若大德及貧遺者若僧和合與盡得與之若與欲和合後呵者提若在當來呵者吉此戒不必言隨親厚與但言不應與盡犯述曰準此文僧祇亦得也仍不問羯磨作不作也不與欲戒僧祇二十云僧欲斷事有二種一者説法毗尼二者作折伏等乃至別住羯磨若僧説法毗尼者應白言離説法坐去答言爾不白與欲者越若聽衆多比丘誦經或聽他讀經不白去並越若作折伏等羯磨白并與欲者提白而不與欲越不白不與欲一提一越與欲已悔戒開文云其事實爾者準多論第八云若僧作一切羯磨事作不如法當時乃不能有所轉易默然而不呵後言不可無罪屏聽戒祇二十云若二比丘在堂私語比丘欲入應彈指動腳作聲若前人默然者應還出若前人故語不止者入無罪二人在外私語一人堂內反説應知若默然堂內人應出若比丘共鬬結恨作是罵詈我要當煞聞已得語彼人長老好自警備我聞有惡聲若知事人聞容比丘作是言我當盜某庫某塔等物聞已應默然還還已應衆僧中唱言諸大德某物等當警備我聞惡聲比丘有多弟子日暮行諸房知如法不若聞説世俗談話若説賊等不得便入呵責待自來已然後誨責汝等信心出家食人信施應坐禪誦經云何論説非法之事此非出家隨順善法若聞論經説義問難答對不得便入讚歎待自來已然後讚美汝等能苦論經説義講佛法事如世尊説比丘集時當行二法一者賢聖默然二者講論法義打比丘戒祗十八云打尼蘭下至俗人越心悔若惡象馬牛羊狗如是種種惡獸來不得打得提杖打木石等作恐怖相若來入塔寺中觸突形像壞華果樹亦得以杖瓦石等打地恐怖令去見論十六云若嗔心打乃至死得提乃至頭破手腳打提若打未受其下至畜生吉羅若欲心打女人得僧伽婆尸沙若難事手打求脫不犯博比丘戒祇十八云六羣以側掌乃擬十六羣言我以掌刀斫墮汝面彼恐怖故即便大啼佛問六羣何故如是答言以戲樂故佛言癡人汝莫輕彼彼若入定能以神力擲汝著他方世界述曰側掌刀者舉手側掌其形似刀即此律中舉手側掌名之為博又若無心擬欲打者擬時因吉著方得提此本欲博故博即提也大集經云若打破戒無戒比丘罪重出萬億佛身血何以故能示人出要乃至涅槃故謗戒犯緣多少者同上大謗戒八緣一大僧二尼想三嗔心四無根五殘事加誣六下至對一人七言辭了了八前人知解突入宮戒僧祇二十云若王信心愛敬手牽比丘入無罪多論第九云門者王宮外門也門閫者宮門前一限木也過此木犯未藏寶者王已出外夫人未起其進行時所著寶衣輕明照徹內身外現以發欲意未藏此衣名未藏寶又女為男寶夫人未以餘衣覆身亦名未藏寶夜未曉者胡本有二義此是牒十誦第十八戒本云若比丘水澆頂剎利王夜未過未藏寶等文也一未曉二夫人未起王及夫人未出藏入限木內犯已出已藏入限不犯及王夫人大臣太子勢力強將入不犯或未藏寶夫人無突有夫人無實突入天龍鬼神宮門突入空宮門不犯王者取聚落主已上也已上論文提寶戒多論第五畜寶戒云是戒體正以畜寶制戒乃至不為畜故若提他寶若自説淨寶但捉得提一切錢若銀錢乃至木錢若自若他但捉吉羅非是此戒體是九十事提寶戒述曰既指此中是提寶戒故章不應專言遺寶但應名為提寶戒也僧祇十八若得衣鉢等物應唱令問是誰物若是主者與若無識者懸著柱上顯現處令人見之若人言是我物問答相應者與若無人識停至三月若塔園中得即作塔用若僧園中得當作四方僧物用若貴物或金銀等不得露現唱令應審看相貌然後舉若問答相應者出寶未不得於一人前與應集多人教言汝歸佛法僧若世尊不制戒者汝眼看猶不可得乃至若無人來者至三年如上隨所得處當界用之若入聚落見遺物不應取若人取與比丘得受與者即是施主故無罪若聚落見遺物或風吹來不得便作糞掃衣取若曠路無人見應取衣上有寶應以腳躡斷棄之持去去時不應隱藏若衣上穢汙為人所賤得覆持去若取時不覺有賓至住處見已應與淨人知醫藥直若掘僧地得寶藏淨人不可信應白王王施比丘即名施主若已用索半還半盡還若無僧物還應乞還塔得物準此應知然言應停三年得作塔用若王問佛法戒律云何比丘應答言佛法中若塔地得即塔用若僧地得即僧用王言從佛法僧用者無罪若寶藏上有鐵秦姓名進不如王中説十律十五若過五六歲無主索應放四方僧物中用若彼有主來索應取四方僧物儻見論十六云若僧坊內若住處得貴為寶為賞護故若去時應付與知法畏罪者付屬言有主來索當還若久久無主索得為房舍用若池井用不得為身已因若後主來索應將示僧房池井此是汝物君乘布施者善若布施者皆比丘應向信心檀越某月某日寺中得遺落寶久無來索以用作僧房等主今來索檀越能贖布施僧不若能者善若無能者比丘應廣教化覓直還非時入聚戒僧祇二十展轉相白彼云若二比丘在阿諫若住若欲俱行展轉相白若一人先行後欲行者應白餘比丘若無餘者應作念若道中見比丘當白然後非時入聚若道邊有塔若天寺當順道直過若下道左旋右旋悉者提此蓋以施塔失囑故若火起等難隨意去無罪若道行日暮欲入聚宿不得荷負囊襆而入應村外息先令二人洗浴著僧伽梨施細展轉相白入求宿處還出語諸比丘已得宿處爾時諸人淨洗手足欲飲非時漿者即於此飲之若入聚落無令人譏沙門夜食入方飲漿招此譏故衣囊襆器分張持去展轉相白然後當入已入須出從本道者無罪若從餘道應白不白提述曰入聚落法依祇甚好展轉相白義即無勞異此律故牒制隨開文言聽諸比丘有緣囑授者祇二十云非時者後食已竟時雖早猶是非時又辭句云長老我非時入聚落前人言可爾已上祇律今詳囑授之法令餘人知即成防過不同自餘對手等法辭句落非不成法事故未必須大德一心念等辭句圓足故伽論第三云若自在地白空中人成白不答成白相違亦如是已上論文但應的囑我向某村某甲家等合善憶持即成白法十誦十八比丘在所住處白已入聚落從聚還至住處即以先日復入聚提高牀戒今三藏云除入陛孔上者謂於陛上聲出高臺或刻為花等雖高不犯以非腳故若準祇二十云入陛者齊孔已下不同三藏釋也祗又云若客比丘次第付床得過量床應語知事備我鋸來問作何等答言此床過量欲截合如法彼言莫截檀越見者或能不喜若不久住鑿地埋腳若久住者應界齊處木筒盛腳勿使爛壞若至俗家高床不得懸腳坐若是知舊應索承足機紵床戒多論第九云兜羅者草木花綿之總稱也以是貴人所畜故又人所嫌喜生蟲故又若臥耎暖上後得寒及粗便時不堪忍故乞時犯突隨貯至成犯墮針筒戒多論第九云以是小物故所以不入三十事又應破故若還主主不受若與他則主物若施僧則非法唯應毀棄尼師檀戒文言當知此汙是有欲人等者謂失不淨汙僧臥是具也故十誦十八云諸比丘精汙臥具也言有欲者謂彼未離欲界也嗔癡亦爾外道離欲者六行能離欲也念不散亂等者縱未離欲由念不亂亦無此事也十誦因此即顯亂眠有五過失也覆臥衣者明了疏釋也五分長二尺者南山云準唐尺則一尺六寸七分強五分是準姬周尺也今詳五分第二云長二尺僧祗第二十云長二尺四寸若欲會同即祗據周尺五分據唐尺也然尋多論第九唯於一頭益一搩手凡長六尺廣三尺廣中不益準據無制但一搩手半故三尺也若準餘之三律五似同多論今準此律文中明言廣長各增是故尺有五四不同也然今三藏云尼師檀形猶如五條然兩條作一長一短帖緣安業并須安裏故云截割也尋諸梵僧將來之者其相亦然此方古來作之法式且將説淨不任受持南山云所制先依初制長二搩手廣一搩手半必作一小坐具已於外周匝更加半搩其相即是兩重安緣名為割截而破諸師但一重緣云此跋闍檀行便集闍浮提僧斷了此應久廢今往往重興則用跋闍妄法也今詳即依三藏割截為正也但因迦留各增半搩等者謂緣起異故戒本中別牒而制非謂先作小坐具已更別增之多論第九云後因難陀聽益縷際從織邊唯於一頭益一搩手十誦十八亦云縷際益一搩手故知不別續也若爾七百結集何故制不割截疏意答云謂若過量須截而應量也理實割截如前已辨文言疊作兩重不犯者元心擬截故非過量創衣戒多論第九云覆創衣者先未開畜涅槃僧有一比丘癰膿血流出汙安多衛佛見聽畜覆創衣乃至創差後十日內畜不犯既聽涅槃僧患創時涅槃僧內著之量如涅槃僧三衣戒祗律十八孫陀羅難陀佛姨母子大愛道所生有三十相少白豪相耳埵相比丘福淺等者智論二十九云復次以細石鉢難得故粗者受膩故不聽用佛鉢四天王四山頭自然生故餘人無此自然鉢若求作甚難多所妨廢是故不聽擔持重者智論云石有粗細細者亦不受膩故佛自畜所以不聽比丘畜者以其重故佛乳餔力勝一萬白鳥是故不以為重慈愍諸比丘故不聽畜問阿難侍從世尊執持應器何以不憐愍答曰以佛威德力故又恭敬尊重佛故不覺為重又阿難身力大故已上智論多論云有三釋子報力能轉四十里大石阿難瞿夷更有一釋述曰故知阿難力大也有人言更有一釋子是調達也以上推山押佛故知調達力亦大也今詳婆沙第三十云佛在世時有三釋種具有鉢羅塞建提力謂阿難陀設摩釋子瞿波釋女述曰瞿波釋女即是瞿夷更有一釋子即是設摩故知不是調達也多論第九云佛身丈六常人半之衣量廣長皆應半也佛弟難陀短佛四指衣應減長中一尺廣中四寸難陀先著上衣佛著中衣今不聽過等聽著下衣常人則下中下也謂下中之最下也又云難陀衣宜當覆沙者言壞色也自下第四篇是舍尼梵云鉢喇底提舍那正翻為對他説也或云鉢唎底提舍尼義是一也第一戒祗律二十一云尸剎摩尼見諸比丘乞食不得便持己食與諸比丘乃至五百比丘盡皆得食然後自求日時已過失食而還乃至第三日供結五百人唯一人未得後入一家已先失食迷悶倒地時諸婦人驚起欲扶已言住住侍我思惟何故倒地便自惟能布施者有上利生歡喜心歡喜心故得清淨三昧見五陰生滅施莊嚴心調伏諸根即入金剛三昧盡一切漏三明作證諸婦人譏沙門無慈因此制也文言病者如上謂如展轉等戒不能一坐上食合飽滿若依祗云阿利吒身體瘡痍人所惡賤每行乞食若未入門閇門不前若得入門驅出不與佛聽尸利摩尼邊乞食故彼律釋相云病謂癩黃爛創痍癰痤人所惡賤是名為病與此律異次論懺悔方法準祗十二即戒本文似是懺法故祇二十一釋相中云是比丘應向餘比丘悔過長老我隨可呵法是法悔過前人應問汝見罪不答言見應語慎莫更作答言頂戴持十誦十九戒本中云長老我隨可呵法不是處不是處者即當此律所不應為也是法可悔我今發露悔過已上論文然疏主下説戒法中云三篇已下及以蘭等並同提罪辭句而懺又有古人云此懺法同波逸提一説為異理應亦得以其下文但言説罪種即廣出懺法故知名種是通也今者且準餘二律義以明作法義亦無爽一先請懺主云大德一心念我比丘某甲今請大德為波羅提提舍尼懺悔主願大德為我作等餘辭準知次正滅罪亦應具論默妄覆藏等隨應知之大德一心念我比丘某甲無病從非親里比丘尼自手受食食大德我犯可呵法所不應為我今向大德悔過一説次準祇律呵治立誓問言汝見罪不答云見語云慎莫更作答言頂戴持餘三戒改名為異南山立義亦依此也多論第九云此戒體無罪名一人邊一説悔過非如惡作等有罪名也謂此但悔過標名也第二戒多論第九若二部僧共坐一部僧中若有一人語比丘尼者二部僧亦名為語若別人別坐別食別出者是中入檀越門比丘應問出比丘何尼教檀越與比丘食若言某應問約勑未答言已約勑是入比丘亦名約勑有比丘出城門入城門者同上十誦十九一同多論也祇云不簡三呵食者越三呵不止食者無罪一人呵已一切無罪五分第十云第一上坐應語若不用語第二上座應語如是轉下乃至新受戒者祇云若檀越未曾請僧不知儀法尼得教安置像教益食法然後應坐第三戒牒制隨開文云先受學家請疑不敢往佛言聽者五分第十云彼瞿師羅財物未盡時別立一出息恐諸僧中病比丘以供養之復有一藥店亦如是諸病比丘不敢受長者言我本為僧若使不受終不持歸佛言是彼財物未竭盡時請施聽隨意受祇云作羯磨者不得如烏避射方施不往時時往看為某説法若欲布施應語且置汝邊我自知時若先諸僧後作羯磨不得取大價物得取少小輕物即如五分中藥店等請也若言尊者不受謂我實耶應語我實耶應語云汝不貧如世尊説須陀洹人成就四法於聲中為最大富南山云今有信家亦五衆繁踐無度供準此自誡豈非明斷第四戒若送食是賊見者謂若非賊雖見無過若其是賊見即須護也疏中義引五分文也五分正文云應藏送食人勿食令賊見若不得藏應與袈裟等廣説如章既二處俱犯者藍外藍內二處也此後釋意云若不約勑內外二處受俱是犯不受俱不犯而今文中藍外偏舉不犯一邊藍內偏舉犯之一邊是故文言藍內受也而以理推藍不受犯藍內不受不犯略不明也疏意且然若尋諸律前解以勝故五分等十緣起云佛言恆遠望若見人來馳往語之有食為取速遣令返既言有食為取故知藍外得受無罪又準多論第九云若比丘受羯磨已是比丘知中有賊入應將淨人是中立若是中見有人似賊者應取是食語諸持食人汝莫來入是中有人似賊若持食人強來不犯律師云所羯磨人必使勇健多力能却賊者若不能却一切僧盡應至有賊處若不能却一切僧盡應至有賊處若後不能應語聚落檀越令多人防護也已上論文既言應取是食故知亦同五分也十誦十九亦同多論又十誦云白二差人往取食故知藍外受不犯也祇二十一義意大同不能繁敘十九云爾時諸女保形而住六羣語言此食與我諸女嗔呵以事白佛佛語阿難取捨衣中各與一衣謂檀越捨施衣與僧也諸女著已持食入藍與僧食分佛前聽法乃至右繞而去去後呵制已下第五篇不可以限數往局者諸律衆學增減不定十誦第十九第二十衆學有一百七戒祇律二十一二十二衆學有六十戒五分第十亦有不同之相不能繁敘二十戒白口作業假他身者頌曰反頸覆頭腰屣跋騎坐臥座高前經道杖劒牟刀蓋餘應身犯者今更細推靜默戲笑含飲語等理通身口犯不局身也據住持三寶者因此略辨三寶差別三門分別一者一體二者別體三辨次第先辨一體自分三釋一者真諦三藏云一切衆生有本覺性即是第九阿摩羅識以方便修令此本覺大隱今顯以為佛寶即本覺上可軌則義以為法寶無違諍義以為僧寶二者唐朝已後新經論師三寶之性不離真如即如為性且佛寶者真如既是學之實性或是覺境名為佛寶智及智處皆名般若故於智處立之為化即軌則性無違諍性皆不離如為法僧寶故涅槃第十云若能計三寶常住同真諦此即是諸佛最上之願又云佛即是法法即是僧僧即是常常即虗空虗空即是佛性佛性即法身述曰此即真如義説三寶以一切法不離真如性故維摩云一切衆生皆如也一切法亦如也衆聖賢亦如也仁王上卷云諸佛法僧亦如也三者即於別體佛寶立為三寶謂三身佛以為佛寶即此三身通名法身可軌則故即是法寶故唯識第十云如是法身有三相別自性受用變化三也又云一切如來身正等法皆滅道攝非苦集故故是法寶如來即是勝義僧攝經説佛是勝道沙門故是僧寶次辨別體者略分四義一局上乘二通三乘三約真實四辨住持局上乘者顯揚論云善逝善説妙三身無畏無流證教法上乘真實牟尼子我今誠先讚禮謂佛善説微妙三身從四無畏所起無漏內證法界所流教法無流即是無漏異名也基法師云言無流者無四暴流今詳此法師不見三藏翻顯揚論謬為此釋也貞觀二十年譯顯揚論基法師猶未出家故不見譯此論也謹尋三藏創翻譯時往往猶置舊法相名真諦三藏名為無流唐三藏意為合聲韻亦即依之名無流也真實牟尼子者即顯登地諸菩薩也通三乘者法僧二寶義通三乘論其佛寶無三乘別若化三乘名三乘佛即唯化身名三乘佛以其化身為化凡夫地前菩薩及二乘故其受用身及以法身名以大乘佛佛然有差別謂佛法身及自受用等覺菩薩猶不能知唯他受用登地菩薩隨勝劣見次法寶者即通三乘理教行果名為法寶次僧寶者菩薩獨覺雖無羯磨事和之義而亦理和及福田攝是故僧寶亦通三乘然獨覺中麟喻獨覺雖一無侶而所證理亦無違諍部行獨覺勝及以菩薩雖多俱出亦唯理和部行者人中俱出如鹿母夫人五百子等也獨勝者如上二界六欲天中盡餘漏也問果是法寶者三寶何別以其果者即佛僧故答問異體同謂軌則門名之為法覺及無上諍并五蘊假者名佛僧寶此依大乘作此解釋若依小宗婆沙三十四釋三歸義云歸依佛者謂佛無覺成菩提法歸依法者唯歸滅諦愛盡涅槃歸依僧謂成僧伽學無學法即滅諦全道諦少分為三寶體謂道諦中除其菩薩二無漏根及除獨覺三無漏根所餘道諦為佛僧寶如來頭頂腹背手等及衆僧中四姓出家威儀相皆是有漏非所歸依此即三寶各有別相若準俱舍二十五釋四證淨中佛僧二寶與此無別就法寶中有通有別別謂三諦全菩薩獨覺道通謂通取道諦以為法寶即四聖諦總名法寶次真實者且約真實可珍貴義即三身佛教證二法四向四果為真三寶菩薩示現其相不定獨覺利生真恩不重次住持者對前真實此門即是假立三寶先明佛寶古人並言佛塔形像及舍利等名住持佛法報恩經等名住持佛在世時升忉利天安居説法時憂填王思慕世尊刻檀為像佛從天下檀像起迎禮拜世尊世尊記言汝於來世廣為佛事名住持佛新經論師依解深密經第五卷説善男子一切如來化身作業如世界起一切種類如來功德衆所莊嚴住持為相當知化身相有生起法身之相無有生起故取化身為住持佛今詳通取前二義好次法寶者古今同説紙葉文字所載三藏名住持法次僧寶者薩婆多論僧有五種一羣羊僧二無慚僧三別衆僧四清淨僧五第一義於中勝義是真實僧自餘四種住持僧攝十輪第五云無慚愧僧於我正法亦名死尸我於彼人不稱大師彼人於我亦非弟子有無慚僧於我舍利及我形像及我法僧聖所愛戒染生敬信自無邪見亦令他無能宣正法讚歎不毀常發正願隨犯數悔業鄣皆除當知是人信三寶為勝諸外道多百千倍輪王不及況餘有情故勸有情作如是説於我法中剃除鬚髮我終不聽毀辱擲罰此出家者三世諸佛慈悲護念是故輕毀諸佛有無慚僧毀破禁戒自起邪見亦令他起非毀三乘五讚一乘如是破戒惡行苾芻誑惑有情令生惡見師及弟子俱斷善根當墮地獄如是死尸膖脹爛臰是故若無初三沙門於行道中求雖破戒不壞正見者親近承事聽聞法要不應親近戒見俱壞惡行苾芻初三沙門者勝道示道命道也準此經文故無慚中亦有一分名住持僧也第三辨次第者先明一體義無先後且隨説次名佛法僧能覺為先方有所覺隨覺修學次第如是於別體中約勝劣門亦同此義二約師資如涅槃云諸佛所師所謂法也明知先法次佛後僧三約生信由住持力必先見僧次樂聞法後方歸佛出家離染如舍利弗先逢馬勝威儀寂靜遂請説法聞法見諦方與目連及二百五十弟子歸佛出家今衆學戒即據斯義以明次第也先釋初戒尊者云四緣成犯一是涅槃僧二知不齊整三無因緣四著便犯文云細攝音輒也十誦十九云佛在王舍諸比丘不周齊著衣佛見已作念我當觀過去諸佛云何著涅洹僧空中淨居天言世尊過去諸佛周齊著佛亦自知復念未來諸佛云何著泥洹僧空中淨居天言未來諸佛周齊著作此觀已方呵而制多論第九云極高著泥洹僧者非是五比丘非是優為迦葉等亦非舍利弗目犍連等又非善來比丘多是白四羯磨受具戒者如釋種千人同時出家者此諸人等多依壞威儀本出高族以先習故下著泥洹僧諸婆羅門外道在佛法中出家高著六羣參差著問五篇中何以止制著泥洹僧著三衣觀去來現佛及淨居天耶答曰佛結五篇皆應觀三世諸佛及淨居天但年歲久遠文字漏落餘篇盡無此中獨有復次結五篇戒此最初結後集藏者詮次在後以此貫初故餘篇不説復次此戒於餘篇是輕者將來弟子不生重心是故如來以佛眼觀去來諸佛及淨居天而後結也便來世衆生不生慢罪復次三世諸佛結戒有同不同於五篇中不必盡同此著泥洹僧袈裟三世諸佛一切盡同是故此觀餘不觀也問此衆學戒結既在初而在後也答佛在初結後集法藏者詮次在後何以故重戒在先輕戒在後故又以實罪在初遮罪在後故又以無殘有殘又以如燋敗種人以如多羅葉是故重者在初輕者在後問曰餘篇不言應當學此戒獨爾答餘戒易持而罪重犯則成罪或衆中悔或對手悔此戒難持而罪輕脫爾有犯心悔念學罪即滅也以戒難持易犯故常慎心念學不結罪名宜言應當學也戒本文云齊整著涅槃僧者唯釋相中不齊整者總有五義一者下著二者高著三象鼻四多羅樹葉五細褶若準十誦薩婆多論開為十二戒彼律一不高著二不下著三不參差四不如釿頭五不如多羅葉六不如象鼻七不如摶八不細褶九不著茸十不并褶兩邊十一不著細縷內衣十二不周齊著彼律著耳及著細縷此律所無餘之十戒即此一戒五義中攝也且如初三及第十二周齊著者即當此律下高義也象鼻一種與此相當細褶及并褶兩邊即此律細褶也餘之三種並是羅葉之差別也多論云高下著內衣者踝上一搩手上下過名高下著比丘及沙彌遠行時應踝上二搩手上至膝尼下三衆一切時踝上一搩手正使行來不得高也此律文言下者繫帶齊下高者上褰齊膝五分第十云高者半脛已上下者從踝已下此等義意並同多論也亦可五分半脛已下仍開至踝不同多論也母論云踝上三指古今來行事意依母論今詳西域以一條㲲為涅槃僧都無裁縫不安腰帶周繞身摩在腰下以條繫上意是其儀又彼方土節氣暄和人多儉約所以衣服不尚褒長此土俗儀人多華飾處居寒雪禮貴衣冠若順彼方反招譏醜故須裁處取其折中隨時量廣不可全同也疏云以故作故者此含二義一者犯根本罪有向上釋文中故作犯應懺吉也二者犯違教吉即向下釋文中非威儀吉也尋文可知母論對首一説懺者母論第八云故作下者一人前懺上長衣戒已引釋之此與立篇義妨者謂恐有妨故不須依母論釋之也以其論文隨人取捨未為定量故也問根本及非威儀既有二罪豈可二百戒耶答罪雖有二事緣一起仍名一戒也疏意雖爾今詳準母論對首懺者好也不爾恐罪不除也五分第十云若不解不問而作此著吉若解不慎作此著吉若解輕戒輕人作此著波逸提尼亦如是疏云不作故違聖教意者即當五分不解不問及解而不慎也著三依戒文言象鼻者下垂一角蓋偏披時角垂左肘之中也多羅樹葉者垂前兩角者蓋籠披時兩角前垂也細褶者褶已安緣不同前戒褶已繫腰也抄衣戒五分抄衣右肩左肩兩肩入白衣舍或坐總成六戒祇二十一云若風雨得抄一邊若偏袒右肩得抄左邊若通肩披得抄右邊不得令肘現乞食時畏汙衣得反抄肘不現無罪覆頭戒祇二十一云若精舍中食上和上闍梨長老比丘前不得覆頭坐若風寒雨時若病若頭患風不得全覆半令一耳現若見長老時當挽却私屏處覆無罪祇三十五云得覆半頭一耳跳行戒五百問云問比丘得躑過小水小坑不答犯墮昔有優婆塞請一比丘欲作一領好衣比丘即隨去中道有一小水比丘便躑渡優婆塞便生嫌心念我謂是好比丘而更跳躑我歸當與半領衣此比丘是無著人知其念前行見水復故躑過賢者復念當與一張粗㲲次與一端粗布次與一頓食廣説應知前行見水便舉衣涉渡賢者問何不躑渡比丘言卿前與我一領以一躑過正得半領復一躑正得一張粗氎復一躑正得一端布復一躑正得一頓食我今所以不躑者恐復失此一頓食賢者乃知是得道人便向懺悔將歸大供養以此驗之不得躑過坑水此律檀臂戒開之闕不犯也叉腰戒律音云脡肘者未詳字出此應俗語禮云並坐不橫肱是也搖身戒下尼律中百七十六戒為好故搖身趍行尼提比丘等四衆吉今此文中尼得吉者非為好故所以犯吉也靜默戒若囑授者謂同赴請至食竟後遂即先起入餘聚落即囑比坐作非時白若高聲施食者謂先受多請即白衣家捨請也此等高聲皆犯此戒下開文中若對聾人高聲囑等即不犯也有人云高聲施食者施食呪願也恐不然也戲笑戒露齒而笑者祇二十一云若精舍內食上和上闍梨長老等前坐不得笑若有可笑事者不得出齗現齒大笑應當忍之起無常苦空無我相思惟死相當自囓舌若復不止者不得現齒大笑當以衣遮口制之用意受食戒五分第十云一心受食者左手一心擎鉢右手扶緣平鉢者十誦溢鉢食吉祗二十二云羮餘等受者不得先取羮後取飯當先取飯索已後取羮若國俗法先行羮後行飯者當取鍵鎡鈎鉢受若後無者得作樹葉碗受復無葉者得以鉢受羮但受飯時應以手遮徐徐下鉢中莫令溢出自為索羮飯開文等中若為他索他為己索他為己等者不同餘三律皆唯開病今此似開為他不病者索也視比丘鉢五分第十初緣宜制不應視比坐鉢中多少後因五百比丘在一家食食已共相語言希有此食下座比丘言上座得好我等不得諸比丘念佛聽我等視他鉢者得知誰得誰不得不得教與佛告比丘聽視比坐鉢不得生嫌心當繫鉢想食者祇二十二端心觀鉢不得放鉢在前共比坐語若有緣須語左手撫鉢上若行食人到第三人時當先牒鉢豫待大張口待飯食者五分諸比丘飯至口猶不敢開佛言不遠不近便應開口含飯語者祇二十二云若食上和上闍梨長老比丘喚時咽未盡能便聲不異者得應若不能得者咽已然後應若前人嫌應答言我口中有食是故不即應五分第十云諸比丘後時白衣益食問須不須不敢答便譏比丘憍慢不共人語佛言以益食時聽語須不須遺落飯食者祇二十二云群比丘嚙半食半還著鉢中為世所譏又云當段段可口食若團大當手中分令可口若食苽昔遮蕪菁根得嚙無罪若餅當手作分齊令可口祇二十二居士云我奪妻子之分布施作福計此一粒百功乃成應當盡食何故棄地頰食者祇二十二不得口中回食口含飯團從一頰回至一頰當一邊嚼即嚼邊作聲祇二十二不得㗘嗔作聲食又復不得全齊食嗗嗗作聲若咽喉病作聲無罪若喉乾當以水通之然後咽吸許及反飯食者祇二十二薄粥乳酪羮餘不得及使作聲當除除咽十誦十九摩呵男自自手下飯與乳諸比丘吸食作聲時有比丘先是伎兒聞是聲即起儛諸比丘大笑笑時口中飯粒出有鼻孔中出者諸居士呵食後佛問汝以何心儛答言欲出諸比丘吸食過罪及戲笑故佛言不吸食應當學又五分十誦不得縮鼻食食手捉飲器者五分告諸比丘食時不應以右手捉淨飯器後時白衣行飲比丘以左手受白衣不與作是言不告佛言應淨洗手捉飲器又云食手者食污具手及肌膩祇二十二云比丘食時應護左手合淨以左手受飲器拄脣而飲不得口深含器緣亦不得令緣觸鼻額不得盡飲當留少許當口處寫棄之更以水滌次行與下座洗鉢水棄白衣舍內五分云諸白衣新作屋得比丘鉢中水灑地以為吉祥佛言聽諸比丘以鉢中無食水用灑地從今是戒應如是説不以鉢中有飯水灑白衣屋內應當學見論十六云若飯粒與衆生餘水棄不犯戒碎令與水合棄不犯開文云或時合器者謂覆器在地水下無犯也生草菜上大小便文云尼乃至沙彌尼吉羅準下律單提之中第七十七戒生草上大小便尼犯提罪相傳釋言下文好草尼提僧吉此上文中以非好草僧尼俱吉是故尼戒及衆學俱合有文若準祇三十云尼衆學廣説如比丘中唯除生草上水中大小便餘者盡同五分第十比丘衆學有生草戒第十三尼衆學中不別生草蓋應不同此律也祇二十二云當在無草地若夏月生草並茂無空缺處當在駱𮪀牛馬等行處若無當瓦石上若無當以木枝承令先墮木上後墮地水中大小便祇二十二云當在陸地若雨時水卒起浮滿當在土塊上若無當於瓦石上若竹木上先墮木上然後墮水掘廁廁底水出比丘不得先上使淨人上後比丘行無罪若溷底有流水當以木承已後墮水中入水浴時不得唾中若遠岸者當唾手中然後棄之見論十六云不犯者若水人所不用或海水不犯水雖中用曠遠無人用不犯五分大同不恭敬人説法五分第十諸比丘為著屐草屣人説法諸居士譏呵言是法尊貴第一微妙而諸比丘為著屐草屣人説輕慢此法乃至反抄衣等皆如上説祇二十二云若比丘為塔事僧事詣王若地主彼言比丘為我説法不得語令起畏彼疑故若邊有立人者即作意為立人説法王雖聽比丘無罪塔中止宿若準五百問云非佛屋佛像在中可前食臥不答得食佛在時猶於前食況像不得但臥須鄣若有燈明不得光中住自有燈得述曰謂僧房中權安佛像也藏財物除為堅窂者相傳云唯開佛物今詳設法僧等物若忽遇難權為堅窂亦應無爽也著草屣母論云彼方國土著草屣者多生慢心故也塔下坐食中文言若施池井者造池井成而施也人持杖等者五分第十諸比丘為捉刀捉弓箭人説地獄苦彼人聞已便大瞋恚斫射比丘比丘即死因此制也衆別有殊者七滅之中多是衆法衆學別人法也已下尼律此之二門已上釋者如上第二卷疏頭釋也可是同戒等者五分且如問初戒云世尊已為諸比丘結淫戒是戒我當云何持為應一部僧持二部僧持佛言應作二部僧持餘一切同戒準説應知十誦三十六乃至長老比丘尼皆言善好偷蘭難陀比丘尼喑嗌不受因制若比丘喑嗌向比丘提喑於禁反嗌乙戒反體作噫作嗌非有學無學異者尼度減年為有二歲學戒者犯大僧度此減年女但吉大僧為沙彌沙彌無學戒也境緣寬狹者疏主上下釋意云僧唯與出家外道犯尼即通在家出家也無有一戒因尼制僧者難同戒也尼不同戒因尼先犯以禁比丘者舉不同戒例破也謂言人等何以尼先犯殘後禁僧吉異於同戒耶餘準應知各別有初者計不應然違二律故又準祇律三十六愛道請聞故彼文言大愛道白佛言世尊已為諸比丘制四墮重法我等得廣聞不佛言得準上三律尼無別初若爾同犯豈無一戒尼先耶答十二年後尼創出家又始情殷多時未犯為斯僧制出在長時制戒以多同者還衆故諸同犯多是僧先故無尼先非即成難若爾望尼應是逆制答二位雖殊戒品無別一人起過教禁普覆轉根既許同修立制如何言逆問尼戒何故有最初開答最初據義非要有人又立初開顯餘第二然此律文言爾時世尊等緣起者準餘三律但諸同戒或告顯二部持今此舉緣顯非逆制諸律各據亦不相違非為與僧同時而制須舉緣也六段者八夷十七殘三十提百七十八提八提舍尼衆學也覆隨三事起成者貪愛前人或欲令損或不了教是也妄語七八口有同異者此且粗判妄是口作七八口止也七八謂覆隨也五戒自重教輕初戒有文得蘭觸八覆三義準初戒隨舉戒中教人違諫若作法教但吉也覆藏局女者義準之言如上九十之初以論也餘之四戒義通男女隨舉少異者殺盜妄三隨對一境隨舉要具男女二境隨男違女諫故也剋心之中有犯不犯者稱尅即犯若不稱尅本境但蘭不犯果罪故云不犯位為四定同比丘説者第一錯誤俱或犯良以患起內情但得正道暢適不殊第二以誤對三戒三戒俱成重以其誤無兩並不得云無心故文言男想盜煞誑女佛言夷第三以錯對三戒三戒俱不犯以望餘境本無心故如墮胎類第四錯誤對妄語所稱法錯誤俱不犯如欲稱聖而錯言凡錯稱境如增上慢人迷凡謂聖誤心非巧故並不犯下之四戒攝同妄語所稱者即同第四斷之也以其觸八覆隨尅本境犯故也亦可觸八容有誤犯者迷此男子為彼染心男子想疑也覆知名種隨親違諫無錯誤義也觸戒有四差別者下觸戒自釋也餘容小罪者入屏共立共行相倚也今詳相倚比丘亦容犯殘也故下文云相倚者身得相及處也淫戒文云二形男黃門亦如是者男根強者名二形男女根強者名二形女也觸戒大善庶樂者五分十一云毗舍佉聟名鹿子敬毗舍佉如母時人遂名為毗舍佉鹿子母其孫名尸利跋蓋即此律鹿樂是也偷蘭難陀即自在寺者五分云訖病不往尸利跋下食已便馳往問何所患共答言骨節皆痛彼即為案摩比丘尼言聽汝處處安摩但不得行欲既安摩已問言汝須何物答言我須乾棗便買與之比丘尼以手捧棗問言汝見乾棗不答言見比丘尼言若人繫心於不可行欲處神明乾縮亦如此也於聖法中制斷欲法名不可行欲處此律云我所欲者謂者謂欲得安摩也而彼不欲者謂鹿樂不欲案摩也分文解釋乃至比知者從初至正法又住已未辨結戒相酬身子第一結戒請第二欲説戒者已下辨説戒酬身子第二請前文復三初至呵責已來起有漏過為制戒緣第二告諸比丘下制廣補略第三集十句已下招生十益下不復論就身中辨分齊者觸戒意也就支中以別分齊者下八事戒意也既下戒文云乃至碗者即是從手至碗得偷蘭遮明知碗已上即是夷境也咸是方便有趣重勢者理恐不然若本意欲無衣相觸忽被有衣作境差等可名方便本期即定是果然雖八事有提衣蘭八中提衣亦不妨果也其間是非廢立多少一一同比丘者古今二釋一是一非非者須廢是者須立故云是非廢立也多少一同比丘者據文雖同然義有別謂除死等故有別也且古師云男來觸尼有四句一動身受樂此二得夷三動身不受樂四不動身不受樂此二不樂得蘭若尼發心觸男四句皆夷今師難云準下吉中六二句既是雙明豈可六中初二復雙此難意云夷中初句若許是雙吉中初二約亦應是雙若吉初二許是雙者五六已雙豈容初二復得是雙故廢古師初之雙句俱應依文初是立位直言受樂義當吉中第一句也文中次句即是雙句義當吉中第六句也理應準吉第四交句云不動身樂今此夷中理亦有之是則夷中總成三句男觸尼三尼觸男三俱設亦三故成九句九業各然即八十一也古師第二句即當今師交句也餘二不樂理但得蘭今欲辨夷故亦廢之並如上大僧中明之也八事戒下六非觸者亦可身相倚亦是觸境也準此律中前七已懺雖犯第八以不成重故文云若於七事中若不發露懺悔等也若準五分十一云若犯七事雖已隨悔後犯一事滿八亦成夷祇二十六云悔已後乃至第七蘭滿八者夷不同此律也覆戒入護心無記心不犯者無記不見諸文有開也祇律二十六乃至行業果報彼自應知喻如失火燒屋但當自救焉知他事得捨心想應者無罪後火字諸疏多作大火字謬覆車之誡者前車已覆須改轍以此為誡也有無窮過者準祗二十六云某甲犯重罪我語入尼僧當驅出是以我覆藏彼比丘尼聞已復作是念我若説者是二人俱驅出即便覆藏俱得夷如是一切展轉覆藏皆夷述曰準此展轉斯亦無爽然展轉犯由有隱心若轉知聞無復隱心計亦不犯若準多論第八尼覆藏七夷提覆藏行淫犯夷異於此律如文言重罪者八夷也又祇律既是展轉犯夷故知亦不局覆淫得夷釋第四句但文五句者有人言兩戒本中比校同異合總五句命終滅殯略廣戒本二處互有即二句也略中僧遮廣中名舉休道外道二戒全同故總五句今詳疏意校量同意可如向釋而言五句蓋謂釋相自有五句也謂一休道二滅殯三遮四外道五重罪者八夷也釋第五結罪一覆尼有二者一覆夷二除夷已外覆餘篇罪也隨舉戒有人言改迷者不然迷心輕故今詳諸違正理即名為迷非是謂心之迷也科文者制戒緣起文分為二初至呵責正明隨舉諫家所為二告諸比丘下秉法設諫違而成犯前文復二初至隨順不止隨須起過二時諸比丘尼下呵所不應第二設諫文三初教作法二比丘尼僧下奉命設諫得夷之所白諸比丘下舉白該通此是總言者意説總就三舉論之尼隨大僧三舉並吉若隨當衆前二舉吉第三犯提即不同也若據此戒闡跎應是前二舉收若隨僧尼前之二舉問犯吉羅故章云同尼犯吉也已下十七殘十誦四十二五分十一並十七殘一同此律也離二謗者發諍謗僧違諫污家被擯謗僧違諫此之二謗離為二戒二十祇中離三獨合二謗加父母夫主不聽輒度故成十九者祇律第三十六獨行獨宿獨度河別為三戒彼無獨入村者獨行中攝行中故也若總説者即是此律九戒初犯八戒三諫至於祇律十二初犯以離三獨即成十一又加父母夫不聽輒度即十二也故祇三十七云十二是初罪七乃至三諫也七三諫者即合此律八戒為七也以其合發諍謗僧及汙家擯謗故也問何以得知發諍汙家二謗合耶答彼律三十七緣起中因偷蘭難陀有鬪諍事僧如法毗尼與羯磨竟嗔恚以非理謗僧而作是言僧隨愛恚怖癡諸尼諫言阿梨耶莫作非理謗僧以事白佛佛呵而制戒云若比丘尼瞋恚非理謗僧作是言僧隨愛隨瞋乃至廣説準彼文意但制非理謗僧愛恚今此律中發諍謗僧汙家謗僧遠緣之中雖因發諍汙家之事正論諫家所為之事同是謗僧即知彼律遠緣雖由諍事而起諫家所為唯諫謗僧故與此律二謗不別尋彼戒本足曉斯理故知彼律合此二謗也然崇乃云此律入諫之中除汙家起諍如一比丘有鬪諍事僧如法毗尼與作羯磨使謗僧言隨愛等彼師意云八諫之中全除汙家起諍兩戒別加尼鬪僧與羯磨今尋彼律戒本之中總無尼鬪僧與羯磨之言何因妄取遠緣為名而不正取諫家所為謗僧為名也又崇云舊解僧祇十九者然僧祇文其在不遠何不暫撿懸作此言祇文二謗不合違諫但七今尋彼意妄謂此間疏主立義合其無根假根二謗故作此言也此等非理廣如破迷記中已破訖此二僧犯不同可知者解舉謂是能秉僧犯助破乃是所為人犯餘釋非理故不記之助破亦別者三人一諫即別人犯由上比丘諫中立義云一解四人一諫一解亦可三人一諫故今亦兩解也人通三位者僧衆多一人也十一別人犯者度賊四獨受漏心食及勸受自習近違諫勸習近發諍捨三寶破僧汙家惡性也同比丘判者自作教人損境處齊一向犯也教人同不同者謂教人不為己義説犯蘭也餘之十二者度賊解舉四獨自受八諫也八諫者二習發捨餘四同大僧也謂覆罪等者等取相親戲笑共相調自種華教人種乃至女人同床坐等廣如汙家戒或犯殘提吉等故云隨所犯也九戒比丘並吉據文餘衆犯中比丘吉羅也問發諍應提如何言吉若據謗僧言有愛恚等比丘既無僧諫可違但有謗僧愛恚等吉故云所以可知也輕重者殘吉也有無者意説四獨尼有僧無今詳四獨比丘亦須有伴者好然獨度時不須同尼俱出也法華經言入里乞食將一比丘今三藏云西方至今無獨行者也言了犯故者文言説而了了犯也言人戒事屬居士者營造修治等事並屬居士也此謂如法人故者謂準十輪經偈云憂博迦華雖萎悴而尚勝彼諸餘華破戒惡行諸苾芻獨勝一切外道衆由勝外道故名如法下文施至回羅云房以施衆僧佛令羅云問本施主我於三業有可呵不世尊方制由其前後俱福田故相傳如是義亦恐難應更思之見論十六言人尼語居士汝先説理居士説時尼犯吉次尼説時蘭後居士復説時得理不得理俱殘至官言人不得道名若教官罰物隨直犯罪若不通名若官後自尋訪知主官自罰不犯若人偷尼衣不得言是賊但言取貧道衣去若人入寺斫伐樹木不得奪刀斧及打壞若壞應還直不還墮直犯度賊戒五分羯磨師一殘者疏主錯引也彼律十一亦是和上殘餘尼師僧蘭破律次後即是輒解舉戒羯磨師犯殘以文相次遂誤引也十誦四十二賊者有二種一者偷奪財物二者偷身五分釋相云有罪者若犯姧若偷盜是名有罪主者煞活所由是為主此律白王等者計理俱須問所由主不勞一切問也諸度人戒者謂單是中諸度人戒也下衆吉者有人言道此人無過堪度故吉也亦下衆與他受五戒等也四獨戒俱入俱上岸者不要並行謂申手內有難得相救名俱也若直過者謂不入村直過也凡伴者入村入水及宿皆應申手內也祇三十六云若到聚落城邑界時當相去在申手內若申手外道一足蘭兩足殘下疏中引是也不同此律已下即是釋不同相也不須準五分解者五分十一水廣十肘深半階殘若減吉此是渡過者謂過至彼岸方犯也故文言命伴不及是也殘法二句者一至村二起村處是也釋一鼓聲準上諸戒無村十里者好若準摩登耆七弓為鼓聲者一弓自是七尺二寸總計一弓但當五十尺四寸是八步二尺四寸豈可得名為一鼓聲蓋是錯説理應八樹樹各七弓名阿蘭若計應七七四十九弓即五十八步四尺八寸是也蘭法二句者一未至二減鼓聲也文言獨行村中一界吉者謂在不出村村中獨行章中不此句也十誦六十云憍薩羅有二落相連是中一比丘尼謂是一聚落入異聚落界諸尼語言汝得獨入異聚落殘是尼心疑白佛佛言汝謂一界是異界耶尼言謂是一界佛言無罪從今聽若有兩聚落界相連應作一界羯磨白二法受染心食戒境想四句撿律本中下之兩句戒有吉文戒有蘭文故作二釋也親撿了記之勸受戒戒本二句初人二勸而結罪釋中二句可知祇三十七屏諫至三方犯習近違諫戒文有五句者下文具釋者一犯人二相親近三惡行四惡聲五覆罪也下三可知者謂第三拒屏諫第四僧諫第五違結罪也文言未白前吉者且結習近若惡行邊種樹同床覆罪等亦應思擇捨三寶戒未白前吉者十誦四十二若言捨佛蘭法僧戒各蘭若言更有餘沙門婆羅門有慚愧善好樂持戒我當從彼修梵行呵衆僧故得提不同此律發諍戒妄引比類者被罪處所治者妄引得憶念者為類相決也諫所為事四句中餘三句文可知第三句文僧一字是也屏諫文三者一諫莫發淨謗僧愛恚二而僧已下衆僧自理無愛恚等三汝自已下推過屬彼未白前一切吉者十誦四十二云若尼言僧隨愛行蘭隨嗔行隨怖行隨癡行廣説亦爾不同此律覺云祇律四蘭者撿祇無文是十誦有也已下三十戒謂僧十三食戒如讚受尼讚食一過受一食背背請食別別衆食二足非非時食殘殘宿食不不受食美索美食藥過四月藥酒蟲水述曰尋上僧戒有十四食戒即於此十三之上加取過三鉢是也但以十三闕第二義取過三鉢闕於初義既闕不同且説十三理實十四也於十三中除讚背足美四者誤也足是二足應言除五也以其尼中無二足故也十三除五加二不同但成其十加過三鉢方成十一也加二不同謂背及食蘇者背與足食尼是合戒前言除背足者今即合為一而説加也如脫看真自者坐脫床看覆過三真實淨施白色三衣也高床下七者誦曰高足紵床針尼師創洛來除三過量者謂尼師檀覆創衣如來衣也理實應言除四過量更加除雨浴衣故也上九十初疏自釋言過量浴衣生犯緣同因緣不同亦可名字不同何得此中名為同戒又尼浴衣別有緣起而制故也若作此釋同戒有六不同有二十一也水扇七十五戒給大僧水扇也生穀七十六戒乞生穀同床第九十戒謂二尼同床也同被蓐九十一戒作衣過五日一百三戒不看大衣一百四戒謂五日不看犯著他衣一百六戒謂不同主輒著他衣紡績一百一十四戒尼自手紡取衣不為受百三十七戒也貯跨衣百五十六戒著此衣犯畜女人嚴具百五十七戒也持蓋百五十八戒著等衣持蓋行不著祇支百六十戒不著入持七塗身香塗百五十使尼塗百五十一胡麻塗百五十二使式叉塗百五十三使沙彌尼塗百五十四使白衣婦女塗百五十五但婦女莊嚴香塗身百七十七使外道母塗百七十八三義入捨一屬己財物二財體現在生罪受用有過三捨已歸主受用無𠎝此六闕初緣者床被且約屬他為語儻若自物計亦是犯此二本由二人同處物若現在數同犯闕第三也餘闕第三或闕初義者如不著大衣等衣若現在數數犯故也或闕初者如水扇若他物亦犯也於十五中者謂大僧有十五戒同活不共犯也六是同戒如章已顯更加九戒僧尼不同謂六夜五敷長鉢浣故雨浴衣等也準大僧中浴衣不共犯尼亦應爾不共之義可知者如離衣等各別自屬何容共犯隨準應知即為二故二十七也四互用者互用説戒堂物回現前食直作五衣互用別房互用現前僧堂許與他病衣合五戒也身口止作業共身犯者身止不會口止不捨身作離去闕無口作亦得説為身口止作作唯屬身不違正理有人云口作者由口受持也任情取捨又身經宿名共身犯也六過非時攝施者六過謂十日一月急施過後長藥長鉢及十六牧也非時攝施理須秉法不秉故口止犯也二奪者與衣還奪貿衣還奪也餘十四領受者理實尼有十五領受謂十四外加受寶也然由受寶前已釋云受寶二奪若語自在作是身業等故今但釋餘十四也言十四者即次疏中不同戒有三及十一同戒是也疏云亦乞重衣輕衣者謂五乞蘇油乞裏衣乞輕衣也十一同戒者大僧亦有十四領受於中十二是同戒於十二中除其受寶以辨訖故今此義中故準明其十一同戒也且僧十四者頌曰取尼乞衣過知足一二居王二寶販乞鉢勸織過前求并過前受回僧等述曰於僧十四中受寶一戒前已辨訖取前求後是不同故今但辨十一同戒是此中義也自口身作業者如自口乞身復領受假他身與隨準應知同戒回僧及四五用者回僧既同即顯四亦是不同也一離一作等者謂一離無量離一作無量作一邊開乃至廣説十五領受無重領受言十五者如前已明尼十四領受更加受寶即十五也又一作無量作者尊者云一成無量成者好次其作時未犯成時方犯故也疏云三異餘同者五輕衣重衣三異也餘同者僧十四領受中十二同也前已明訖此第六門亦據三十一戒辨之以開急施為二戒故具餘四捨者準上大僧總有五捨一壞捨綿褥是也二入僧乞鉢是也三入僧俗捨長藥是也五入僧等三位捨自餘戒是尼除綿褥具餘四也約境物處法等四者一約境唯對捨不同大僧有不對捨綿褥是也對中道俗二寶唯俗餘則唯道道中僧乞鉢唯僧餘通僧別別衆不別衆分別者二寶別衆不對道故餘並盡集第二約物者謂衣鉢藥寶十六牧等唯全無壞捨第三處者自然作法乞鉢一戒唯在作法餘通二界作法大小乞鉢唯大餘通大小大小大中住處非住處乞鉢唯住處餘則不簡也第四約法者總論有二謂羯磨語法羯磨一法捨財中無語中道俗僧別等一一戒中隨應當知因此須知具法多少僧等三人須具四法一集財二所對境集三修威儀四捨辭句若對二俗闕無威儀唯具三法捨罪亦四如上者一捨罪境乞鉢局僧二寶唯別疏意如此理亦通僧餘通三位此據假不假説若正除罪其唯別人二所懺罪極多十罪一長衣等現在有可捨二衣等已用壞盡直懺提罪三覆提得吉四即此提吉隨夜展轉覆藏犯吉五著用犯吉六即此覆吉七即此隨覆吉八僧説戒時默妄吉九即此覆吉十即此隨覆於中隨有懺之三捨罪界乞鉢唯大二實不簡二界大小自餘對僧唯在作法通於大小若對別人同前實釋設與捨財處差在者亦應無失四捨罪法若對僧邊具有二法謂羯磨及語法以有受懺自故語法即通對僧及別因此須明具法多少二寶唯四乞鉢專六餘通六五四也言六者一乞懺二請懺主三受懺白三人二人懺主以語法白邊人也替受懺單白故也四正捨罪五呵責治六領受立要四者除初三也五者謂三人二人即除初也不還結犯如上者二俗不還如文追索餘若不還且結失法言得吉羅若究竟損減見論十四云乘匿此物隨直得罪已上捨懺委細並如大僧中辨病衣説淨不應入捨者由闕初義故不入捨疏意如是若入持者明長不染以各別用故者言別用者義同受持不須説淨也餘二可知者五衣須持乞鉢鉢衣性別也二位須留餘二十三並即還主者以藥及十六牧與衣鉢等性別不相染也準大僧中説者於中有四一能還之境道俗僧別一準於捨不得差在別人中捨亦容差亦僧還盡集別人別衆不要盡集二所還之財位約為四二寶轉體而盡還藥不轉還不盡乞鉢或轉不轉還不盡餘不轉而盡還三還財處準捨財中乞鉢唯作法餘通二界乞鉢唯大餘通大小除寶及鉢餘戒僧還須秉法故界通二作三人已下處通一切四還財法寶無還法鉢唯有法又不同餘餘通有法無法也第八門僧八戒者五過二離六年是也除二六者一者六年二者六夜離衣也但有五同者一離四過四過者十日一月急施過後長藥也六過者於四過上加十六枚及長鉢即是六過也六過等七者等取一離衣也二問者捨不捨異須為二問也餘十輕重比丘並吉也及四教人者謂受寶奪衣乞縷貿衣還奪四也立乞戒若乞得蘇無提舍尼者由提舍尼咽咽得罪今既却還故無提舍也若有病等者意説若無病等直乞之時雖復不犯提舍尼罪而亦容犯突吉羅罪今既有病即無吉罪也辨相中初明成犯二此尼薩耆下捨懺方法於中文四一捨財法於中有四一財集制捨二與尼僧下所對境集三若欲捨時下捨之威儀四作如是言下辭句二捨已應懺下捨罪於中有六一文言捨已應懺悔義含有兩一乞懺悔二請懺主三受懺白四應如是白已已下正懺五呵責治六自畜主要三比丘尼僧已下還財法四捨物竟已下不還結罪説戒堂戒事須合當都浪反文言復問所由不作者誤也應言復問不作所由也僧物者已許僧已捨與僧猶屬本主謂人與爾許少即更添為僧者為僧作而未許僧已捨與僧未定屬僧謂捨爾許物未定何衆屬僧者已許與僧已捨與僧已捨與僧已定屬僧謂用爾許物定與此衆鉢戒制意者鉢為應供之器一實身足今過貯畜長貪妨道招譏醜纍損惱不輕故不聽長是以聖制然以物變無恆容有失奪濟身要用事不可廢施時不受後須難得故開即日説淨而畜違返聖教過則結犯如前所説者如上大僧三十之初十門義中第九門云一者尼是少利既得一鉢宜即受持及以説淨開十日布施人須二者既是有伴即作淨法何開十日大僧及此一為施人二復無伴故開十日若爾尼畜長衣亦有二義何故同開十日答鉢無多用未成無過若其作成以有伴故得即説淨不開十日長衣資寬未成已來亦有長過由斯初緣對不説淨尼故開十日待成説淨又尼同生不得對説長衣之淨以共用故須更覓人故開十日鉢既得對同生説淨故當日説以不共用故也廣如彼説開文云若自取用者謂者以失奪所持之鉢遂取先來犯長之鉢即成受持不犯用不淨鉢過但須懺悔先長過也若他與用者他犯長鉢與我無過也十六牧戒受持辭句諸律無文古來不釋今義立曰大姊一心念我比丘尼某甲此大釜餘者準知作十六牧器受常用故準受鉢十誦文疏響之三説鐺句五分十一文作鎗字攝施戒具緣中入非時分者謂至一月竟後方作時法攝取也覺云準緣起云非時衣受作時衣明知同彼五分十一故不得言一是安居僧施物應準此律釋相中云一是非時得長衣等今準疏意若非時衣十方有分若作時受損界外人理應犯重故應釋云雖是時得留至非時即亦名為非時而得此作時攝方可犯捨故與律文不相違也今詳此釋勝也乞重衣戒文言若我住者足自辦此事者謂先令尼餘處索財今即悔言我若自索足得辦事也文言十六修蓋十六磨沙也譯之為條蓋是失也即四張疊直十六磨沙也後戒十條即十磨沙即兩張半疊直十磨沙也故僧祇三十七重衣戒若過四迦利沙槃十六故錢若過十六故錢取者尼薩耆謂過四分十六故錢也輕衣戒云十六故錢過者尼薩母論第八亦云四相應法者四迦羅沙畔是也天竺國十六調錢是一迦羅沙畔各衣極用四迦羅沙畔是四相應法自下百七十八戒二戒專教人業一教人誦呪術百一十八戒是二以世俗伎術教授白衣百七十戒是僧二十二位者位分為三勸足一戒準教人業第二有十一戒自他俱犯頌曰堀壞牽出房二蟲恐怖燃藏衣并煞畜殘謗并提寶第三有十戒教人同不同頌曰二敷與尼衣屏露二臥具是二敷也高床已下七僧二十二中除六者列名如章謂除初位全第三位除五也高高床是羅兜羅綿紵床五塗身便尼三象并白衣婦女外道女也如次即是百五十一百五十三百五十四百五十五百七十八戒是同戒二十九者大僧有三十性戒頌曰妄毀兩粗異粗謂説粗嫌強牽用譏強敷也用蟲水也識譏教師也驅諫恐煞飲驅他出聚也飲蟲水也疑覆起説隨疑惱也發起四諍也説欲不鄣也隨舉比丘也擯拒毀同欲隨擯沙彌也同羯磨悔也不與欲也悔聽打搏謗與欲已悔也屏聽四諍也洗淨等三者胡膠及相拍也如次即是七十二七十三七十四戒也計理剃三處毛亦應性惡也於十三中者大僧有五雙三隻具二持犯得磨一雙説粗教尼受德衣不犯背別囑授不犯二入聚落作餘法不犯二足七日盡形口法不犯殘宿不受真淨問主無輒知粗發露僧事與欲除四已外餘九頌曰囑授口法粗別真發露欲坐去一對輒坐他床第八十四也白衣家坐已不辭主人去八十三戒也宿去二對白衣家輒宿八十五戒也經宿不辭主人去百一十六也開藍門一對向暮開藍門百六十二也日沒開藍門百六十三也輒著他衣百六也不白大衆破癰百四十七也輒入僧寺百四十四也輒問大僧義百七十二夜入聚落百六十一戒彼名夜入出白衣家戒三時遊行少分謂夏中有受日法故云少分九十五戒不乞畜衆羯磨百四十戒也背請百四十八戒解義可知者作囑授名曰作持身入聚落無其作犯即是止持二犯反此一切應知五十九同者總有六十九同戒於中除十謂二入聚落殘宿不受説粗別衆真實淨施覆粗不與欲此九具兩持不攝耳唯作持也除此十外餘五十九是也與外道食等四者等取餘三合成四種謂背請足食合為一也犯提是同而尼準僧祗四十云無有殘食法開大僧有開即是開緣不同與外道食與緣不同大僧唯與出家外道尼與在家出家俱犯減年一戒受緣不同謂尼與式叉本注大僧即與沙彌受也過量浴衣因緣不同僧開四月十六日後日尼即無時限也或重輕雖等罪名有別者謂剃三處蘭提名別同對手三悔故知輕重等也此等對文者總談緣異輕重等也此九即非者二呪言了五塗塗了二敷暫永永去者去時即犯故並不論任運也蒜戒僧祇三十八種蒜山蒜如是比一切蒜不聽食熟不聽生重亦不聽重煮亦不聽燒作灰亦不聽身有創聽塗塗已當在屏處創差淨洗已聽入祇三十一云痛時醫言服蒜當差不服不差若更無治者聽服服已應七日行隨順法在一邊小房中不得臥僧床蓐不得上僧大小便處行不得在僧洗腳處不得入溫室講堂食屋不得受僧次差會不得入僧中食及禪坊不得入説法布薩僧中若比丘集處一切不得往不應繞塔若塔在露地者得下風遙禮至第八日澡浴浣衣勳已得入僧中患疥用香屑及三十二云頭生瘡須人骨龍骨灰塗大同也水扇戒文言我著道人者謂他同道之人也見論十六云觀伎樂者下至獼猴孔共戲往看得提若寺中伎往看不犯第八十戒云二道男者內道外道男也啼哭戒多論第四五衆盡不聽啼哭乃至父母喪亡一切不聽四衆得吉尼得提以愛戀心深故口業惱他戒文言先住後至者謂他先住遂便後來惱先住者復至先住者謂知有人後當來至遂即先住惱後來者也五分十三云同學病不自看不教人看提同學者同和上阿闍梨及共常伴安居中牽他戒文言懼失宿者恐失安居宿破夏是也三時行戒結有時限吉提有異破無時限一品吉羅安居竟不去戒文言去時而彼即住等者夏滿名為去時母論第八云三月相應法者三月夏安居竟應一宿出外是名三月相應法已上論文此即不簡僧尼也習近居士子戒分文如上初至呵責來諫所為事第二告諸比丘下秉法設諫違而成犯前文復二初習近起過不肯別住二時諸比丘尼下呵責第二文三初明立法二當作如是呵責下奉命設諫得提之所第三佛告下諫法該通戒本五句一諫所為事二屏諫三拒屏諫四僧諫五違僧諫結罪可知觀王宮戒亦二可知者一文言若至僧伽藍中等者謂至受教處藍中翻前觀園林或被請有難亦屬前第一文也二或為僧事等取摸法等露身浴戒上三事得相取與然須鄣身以衣彰身者不懼露身取與出入一切得作縫伽梨戒貪受五利者謂偷蘭難陀亦自受德衣貪受彼尼教他供養故不疾成也除求索僧伽梨者疏意釋言偷蘭難陀若無大衣無受利義開受彼尼教化取衣故云求伽梨也出迦絺者既出時外由無受利故不犯也六難者母論第六云一父母難二兄弟姊妹三云親四國王大臣五盜賊六野獸與白衣外道衣戒具緣云一非親里白衣外道者謂與白衣俗服者開親不犯若與外道沙門衣者縱親不開以沙門衣具相異故外道惡見恐著而謗下文開親異對白衣不對外道也遮分衣戒二四合解者準文合中亦言衆僧如法分衣即是亦更合解第三然以前文別解已訖故不重論也遮出德衣戒二似者誤者有人言時到前後牒事顛倒亦得名為二似所攝若如是者五分律中一切羯磨皆當此律二似攝也遮欲出德衣戒有人言此口業遮故有了了之言有餘共扶後釋今詳依疏者好緣起文中僧欲出衣明是當遮若爾何有五非答了知衆中無知法人必當落非故開無罪也故章云且依前説今又詳曰蓋譯律時錯重譯也外道食戒制意者一異學雖施無恩反謗二邪田施與檀越無福三自與或他謂外道勝多失故制緣六一是白衣及外道大僧唯制外道二知是三非親四是食衣已前制故五自手與置地等不犯故六彼領即犯與白衣作使戒比丘隨所犯者舂磨炒麥或犯壞生火淨即吉尼雖火淨即吉尼亦不免提自餘一向尼提僧吉也僧祇三十八云若檀越欲供養佛故言阿梨耶佐我作供養具者爾時得佐結華䭮得佐研香經宿不辭主人戒制意同前者同前第八十三戒也緣起文云居士謂舍內有物謂人也度任身婦女戒餘非根本者餘師僧也僧祗三十九若生女者出草蓐已與受具足若生男者待兒能離乳然後與受若親里姊妹言取是小兒來我自養活如是應與受具度乳兒婦女戒十律云生男母得自觸宿餘尼觸宿吉若能離母母觸吉餘尼觸蘭宿提減年童女戒辭父母偈若自誦得若傍人教並得也舉其處事者寺內是處制髮是事也如受戒中説者受戒犍度因諸比丘度巧師來覓有言不見巧師謗云比丘妄語由制作白然後剃髮等也供養獲永安者由具五德世人供養獲第一福以此二偈用作梵聲其音長引使終剃髮也見論十六云弟子於和上闍梨便生父想臨剃髮和上應為説五法一髮二毛三爪四齒五皮所以説此五者有人前身曾觀此五今為剃髮即發先業便得羅漢是故先教後為剃髮總解四門分別者總對五衆比挍解釋也一發本戒多少者其所發戒且就力分故説十等理實無表與大僧齊故一一戒結下衆罪不以説十即不分學雖位未滿咸應修習第二對俗罪名有無者俗人外衆故應接俗佛不制名下衆內攝故應禁勒制以名目第三對具戒犯名寬狹者五衆通禁雖俱有名上二滿修名有七聚下三未滿一切吉羅以其惡作義寬通故謂通輕重第四次第者小年之慈宜先禁煞淫惱未發故在第三又制盜戒意為防煞復制淫欲更為防盜通禁前三故制妄語餘是支條不須別辨自重教輕者謂吉羅中亦有輕重也餘二同者妄及提錢也此等皆據吉名雖同事相差別也望不得自畜者既不得言由説淨故身業畜寶無其作犯名曰止持故非雙持也十戒頌曰煞盜淫妄酒香儛床非錢就體説大等者增一含也除者不同大尼者即文言除自手取食受食與他是也尊者云謂得直提授與大尼連讀律文合為一句以其不受食戒結戒又罪故知此云自手取食者非謂不受自噉也戒本三句者一人二知不滿三與受結罪若準釋中兩句者好不與二歲戒具緣一十八已上者但言已上該通一切第三緣滿二十者若二十已上亦名滿也彼非十八者謂年二十已上故云非十八也不與六法戒但缺行法者謂須懺也祇第三十廣釋八敬一禮二戒叉受三不説比丘罪四不先受食房舍等五半月行摩那埵六教授七安八恐第二敬中廣明受法故章引之六尼不得向説篇聚名七得説罪種者得語言不淫不盜等也後四夷謂觸八覆隨也但四缺學異於律者即解八覆隨四也度諸遮童女戒和上容有轉易或先沙彌七戒闍梨今為和上等也佛阿毗曇餘二師亦請也五分十五差教授師竟應往慰勞欲受戒人言汝莫怖懼須臾持汝著高勝處若先不相識不應雲霧暗時授其具戒教師因教著衣時應容如法視無重病不謂恐是黃門等文言此僧祇支此是覆肩衣者蓋譯者之謬應言此僧祇支此厥修羅衣也如上大僧離衣戒辨父母聽不者童女由父母但問父母也夫主聽不者屬夫由夫故也若不雙由必不得雙問也初篇八禁止持行相者謬也以覆藏戒是作持故也總舉標宗文四者一勑令審聽二別標教主三總舉標宗總舉八夷為所説宗故也四犯者非比丘尼下彰作犯之過翻即成持也四依總舉彰益第四文者彰作持行四依者衣食處藥也初結受緣具足者白四是教結緣也得處界緣也和上等僧緣也毗無無遮難緣也度曾嫁百遮戒如前第四者如前百二十四戒也遮具四戒者應具減年不與二歲不説六法并百遮四也以前童女既具斯四今婦女中故亦應四章中亦可已下意云減遮同是受人之遮既開曾嫁不待年滿乘於曾嫁得起減遮二歲六法過唯在僧既無先開與一歲學何得乘勢不與二六百三十一戒比丘吉者謂減十歲吉也百三十三戒無起惡之理者但僧莫共同作受戒惡自不起何勞諫也本法經宿亦應不失故祗三十九云若王賊難不得者停宿無罪百四十一戒佛敬約教自誓據心也此及恣及恣者指後戒也差法有二者羯磨差人二口差伴也不自恣戒不容乖別者儻僧恣竟尼方妨來更為集衆不來與欲不得別衆也比丘吉罪者不恣吉也不依安居戒僧祇三十云尼若親里請安居應語檀越先請上尊若言我亦不去或自請比丘出己衣鉢餘供養若安居中比丘死三由旬有僧伽藍應通結界半月應往問布薩比丘吉羅者三時不依律師吉夏中不依提且結三時吉也突入戒祇三十九云應住門屋下遣淨人女白言和南比丘尼白入願聽比丘當籌量可不聽入罵尼衆戒不犯此戒者罵別人犯毀呰故也破癰戒祇三十九云若隱處有癰者當令可信人若依止弟子若同和上阿闍梨以錐若指押破之以藥塗若使男子提若肩以上膝已下當使婦女急案男子破無罪背請戒俱食正方犯者以其文言若先受請若足食已後食飯等提故作此釋也今謂不然理應犯之通正非正文中雖言後食飯等然以背請食正方犯攝足從背結罪義便故文偏舉食飯理實犯是邊非正亦應犯也九日命終等者上代相傳昔有男女犯王令餓死九七不同故知也理有多妨者意難古師若單背請即是同僧應無別緣直列戒本又戒文句應不異僧又應復言除餘時者作衣時等家慳戒輕心汝師者亦可觀文似是嫉妬激刺師言檀越好施供養於汝豈敬我邪故開文中其事實爾乃至篤信於汝開文言汝既是不犯故知疏釋非也塗身戒一戒落後者指後百七十八戒也胡麻澤澤者油也四緣可知者一是革屣蓋二著持三無因緣四越界犯四緣者一四種乘二乘行三無緣四越界祇三十一云比丘病不得乘雌乘應乘雄若病重不分別者乘無罪若有因緣上下行及直渡應作念我有緣行爾時得乘渡比丘無病乘乘越日沒開藍戒對事不同者前戒對盜此戒因入也誦呪活命戒前戒為棄捨正典者前百一十七戒也教授白衣戒又前開四種者次前活命戒也應準疏中先釋緣文方數具緣也又章云又言已下教其所應者謂彼妄情將為所應而實內教總是不應百七十一戒餘六羯磨呵責依止遮不至三舉也身業惱他戒同前口惱者同前第九十二戒先至惱後住後住惱先至也不禮敬戒不作餘法既開不禮故知尼有作餘食法不同祇律無殘法也亦可八提舍尼尼據一品招譏同犯可呵大僧過有重輕故有提吉祇律四十尼有七滅
