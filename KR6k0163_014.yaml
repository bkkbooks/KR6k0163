body:
  text: 嵩嶽鎮國道場沙門賓作説戒犍度廣明十五種説戒者先來破云若唯略説可言十五今既其明心念等三是故應言廣明三種説戒之法義方周備也文言聽説義時不具説文句者母論第六云從修多羅乃至優波提舍隨意所説佛既聽説十二部經比丘復疑若欲次第具説文句文多衆大恐生疲厭若略撰集好辭要義不知如何佛言聽諸比丘略引經中要言妙辭直顯其義伽論半唄吉羅者表義不周名為半唄也如有三偈歎佛三身此中所言如來妙色身乃至無比不思議者歎佛化身也如來色無盡智慧亦復然者歎佛報身若色若心皆無窮盡也一切法常住者歎佛法身是一切法之所依正常住湛然也今時有人但作一偈故名半唄也一切準知疏云第六若説法人多已下者律文多作説法人少字也蓋作少字者誤也五分十六云白衣欲散華隨意若落比丘頭及衣上應拂去落高座上無苦餘如疏引問所以結戒要待重請等者謂律序中創請結説諸戒緣起舉過重請而今説戒何不重請即便制之先釋第二以是所説宗故者疏雖已釋更助令明謂八章中第二章文云諸大德我今欲説波羅提木叉者戒也疏云此是轉名釋也處處解説者諸有漏中處處離繫即是新雜論中別別解脫也文云自攝持威儀住處行根面首集衆善法三昧成就疏云此歎木叉生善滅惡有大功德也前來轉名顯防護義由防護故生善滅惡戒是防護義也此之兩文釋前章中波羅提木叉戒之言也疏云故曰我今欲説等者疏意引文證能詮教亦名木叉文言我今當説結當發起演布開現反復分別疏云正為比丘結説方軌也文言是故諸大德我今當説戒疏云結説有益也謂佛結其説戒方軌令説戒師告衆當説前來兩文釋前章中我今欲説之言也次釋文者總束疏意以為略義自攝持威儀住處等者守攝住持四儀之相令離七非而戒即是攝持所依故云住處疏云由法如成者由戒法而成也此之住處即是行根亦是面首謂是集善定莊嚴之首道括下三者次下疏中自釋所結三法是也牒結違順者牒四夷名結云已説復問清淨名為順也更云不者名為違也此釋戒文云諸大德我已説四夷乃至是中清淨不下當廣釋者如下雜犍度中有五法應和合以配應來者來等三集也瞻波等中亦釋此義又此説戒中初緣制集一處結説戒堂又因比丘在房中眠制白攝衆又因病比丘不來制與欲等並是集一處義也此義亦如一僧祇二十三云一切露處坐申手不相及一切覆處不得離見聞處離者不名受具述曰古來傳云屏不離見聞露不離申手即此文也此就遠説障者由戒不淨即不發定以無定故聖道不生故云遠也有中之行者非空無相斷惑之法也文言聽歌詠聲説戒者稍引其聲義同歌詠五分不許如章所引故不同此律也文云布薩日説戒者舊名布薩翻為淨住淨三藏云褒灑陀者褒灑是長養義也陀是淨義也即是長深也意明長養善法淨除破戒之過也文中迦賓菟云我常第一清淨者意云本制説戒意令離過我既永斷破戒煩惱故無勞往五分十六劫賓那是也與此律同若準祇二十七尊者阿那律不來諸比丘喚答言世尊説清淨是布薩世間清淨者我即是我不去以是白佛佛言汝往喚來莫用天眼是長老失肉眼故涉山險道極苦乃倒準此律文即是罰不聽乘神足也準文中結説戒堂初緣於自然界秉法也彼傳釋言者即真諦了論疏也十七種別住者束為頌曰圓角水山巖月性圍門土四二尼優牆滿狂等別住了論偈云及四摩失有五種翻別住名及釋義如章也失謂過失論自釋云一破國土謂王不許破國土地結為別住此結不成二破僧伽藍謂若先是淨住或一切淨或聞邊破此三園以結別住結亦不成三園義如上離衣戒三別住相接為一相謂兩界共以一石為相兩邊各結此亦不成若共一山兩邊結成由相大故四別住半過本別住謂相涉入五以別住圍繞別住謂不留自然地釋曰別住有十七種謂逐地形有十七異安標相竟先結布薩界次結攝衣界鎮之十七皆爾一長圓別住中間狹長兩頭形圓相去一丈或五尺地周匝安石以為標相二四角別住形方四角三水波別住地形細曲如水細波四山別住以山為限五巖別住用一山巖以為齊限六半月別住形如半月七自性別住練若有山或水為限八圍輪別住先小別住或三或四外開一步二步為自然地於外別結大界圍繞如鐵圍山繞四天下九一門別住一邊開門猶如門中之地即是自然若門穹過便成兩界但由不過故號一門十方土別住隨方土郭邑併為一界十一四廂別住屋頭相接周匝四廂十二二繩別住郭中結界僧覓難知或復不肯與欲開以繩圍所欲結處結處若欲作大小界須安二標若不結小但須一相繩繞二標引出郭外至半由旬別作小界亦以繩繞還作二標郭中僧盡集外界先解不離衣界次解顛狂界次解尼布薩界次解比丘布薩界恐曾結故先結小界後結大界郭內郭外同時界起界起除繩若郭中集郭外界裏亦須與欲恐破法事故須掘壞郭外界地或種棘刺不令僧入二繩相連因以為號十三比丘尼別住為尼結故又解尼寄僧界作羯磨時須白比丘僧聽方得尼於僧界若自結界後若作法不須復白十四優婆塞別住僧為作羯磨結也若無此結優婆塞來此中受利受八戒布薩須取餘處優婆塞欲若有此界即不須也十五籬牆別住以籬牆為齊限十六滿圓別住形如鏡面也十七癲狂別住癲狂比丘不可制録僧作羯磨若不在衆要在界中若其出界僧作羯磨僧即得罪故狂至處接界結令作法時狂在界中真諦云此不可解此人在界不與僧欲云僧得罪何容出界反得罪耶又界接不應故已上粗者並是論文注並依彼疏義作也餘二小界者難説戒生善也難自恣滅惡也難説結文云大德僧聽今有爾許比丘集若僧時到難恣結文云大德僧聽諸比丘座處已滿齊如是比丘坐處若僧時到立四大界名章中太繁應言人法二同界法食二同界法食別界法別食同界好也受戒結小界者難受戒結文云大德僧聽此僧集一處結小界若僧時到是非如常辨者受戒事大意欲不用也十律優波問者彼二十二諸比丘於無僧坊聚落中初作僧坊等無優婆問之言也祇律八樹間者彼律第八云五肘弓量十弓種一菴波羅樹齊七菴波羅樹相去爾所羯磨者名善作羯磨雖異衆相見無別衆罪章云八樹者蓋以此律衣界八樹欲令會同彼文既明不得輒會南山即以七樹計之尺八為肘弓有九尺六尺為步即一步半七樹總有三十二弓合有六十三步不須依章中計也三千步十里六百步二里也見論蘭若界者彼第十七即是有難集僧如上房戒已辨其義一盤陀羅五十尺四寸也章云令有三百五十二尺八寸者三百尺為五十步復以四十八尺為八步餘有四尺八寸也見論亦然者彼第十七云一切江河水不得結界水中自然界者若擲水若擲沙已外此等水中唯是依自然集也標寬界狹者謂雖標寬集僧容狹以其自然與標差立謂百里標但七樹集或十步標而七樹集也今詳標寬界狹計亦必須盡標集之謂秉結法將成之時標中有僧理成別衆礙法不起猶如遮難礙戒不生之類也衆同之本者制不別衆名為衆同也不礙僧事者既了分齊便曉應集也文言當打犍槌者章云此云打磬者義言也淨三藏云梵云犍椎此無正翻以義為名鳴槌打木或犍椎者所打木也辨其形者如搗練杵長五六尺輕鳴木位盡餝兩頭別為木棒可長一尺柄細頭粗至鳴槌時授事左手於自面前橫執長杵中間細處右手執棒向外打之授事舊名維那也然其打法創踈而輕漸急而重將欲了時漸細漸沒名為一通如是至三名曰三通於最後通聲沒之次大打三下或二或一以表聲絶其三二一使令常定勿數改之疏云如威儀經説者彼經下卷云犍槌有五事一常會二旦食三晝食四暮投盤蓋收盤器五一切非時復有七法乃至第七呼私兒蓋呼淨人小兒而譯時胡語不正筆受者謬抄南山雖引而不能釋又經云常會時者先須從小稍至大大擊二十下稍小小復十下大三下此即同淨三藏説今詳永前不依彼經而而立義云初三下者名警衆鍾謂警徒衆整理衣服次長打者名引衆鍾謂引衆赴也覆生槌者名靜衆鍾赴集已默然靜坐也鍾聲既絶方為法事昔西京東禪定寺有僧名智興每以殷勤淨心扣擊後感鬼神遺絹三十匹打三通者相傳釋云從小至大絶而復打三大下是也準於長打之中自具三通也廣如南山僧圖辨且為此法實非教文也初文義四者次下疏云先加三義故成四也結而後開者結大界後開戒場也除內地者戒場之外留自然地由在大界內相之內故名內地也此集十八十二者此犍度上文中有十八相如彼文云若空處若樹下若山若谷巖窟尋彼文中有十八個若字是也十二者即此文云東方有山稱山等十二也三十稱者一稱十五斤合四百五十斤也才可方圓三尺許除漫石者平漫小石也見論十七云路界者入田路向井取水路向河取水路窮路皆不得作界章云乃至者以隔入田等路故也窮路者三步五步其路即絶是也蟻封者吳地多饒大者如冢十律二十八相者彼云若垣垣牆也若林若樹若山若石若道若河若池水波別住等者等取餘十六也義言自然界相應於圓取者今為圖樣以示未悟今約六十三步為法也南北通計即有兩個六十三步東西等各爾前言三重標者即戒場外相為一標大界內相為一標大界外相為一標即合成三章云圓取七十三步今為六十三步謂僧坐處四面去身各六十三兩邊通計即一百二十六步即上朱圓是也自此之外雖有異僧不破法事然僧先集戒場結時亦須四面各六十三此圖且辨安置處所勿謂即但爾集僧不可分聚既此已明餘蘭若等各隨應準若在空逈圓取如前若近他界不須圓取以其他界不須集故章中雖遣先結大界今時行事必先結小不得依疏固執不改後當更辨五分母論皆先結戒場者五分十六云結戒壇已更結僧坊界母論第二云結界法先結小界後結大界五百問云或先結大界後結戒場於中受戒如卑所云羅什指𢍉摩羅叉也此是羅什本事之師也恐無所獲然云其先不知同於未制賴通此路可有僥幸述曰諸文既爾必須先結戒場也正明唱相者結戒場法雖在後文及論行事須先結小故今且辨唱戒場相先須集僧坐戒場內應一比丘性明了者往往臨事始復回換極不生善應打木合掌立唱言大德僧聽我舊住比丘為僧唱四方小戒場相從此東南角石南面東角尋繩西下至西南角石西面南角從此尋繩此下至西北角石北面西角從東下傍小牆內面至東北內角從此傍牆南下至東南角石東面南角此是戒場外相一周説三説崇云一説今且依舊然戒場門隨屈曲等住情除之次作結戒場羯磨如後文辨次唱大界相須僧集在大界標中若老病者留在戒場即是異界不破法事章云先唱外相次唱內相諸家皆爾但南山云先唱內相理亦無在然先唱外其理稍長標內是界其相顯故應云大德僧聽我舊住比丘為僧唱四方大界相先唱外相從此寺大院牆東南外角傍牆西下至大門東頰土外楞隨屈曲出至門東頰木內楞尋門限內楞西至門西頰木內楞從此隨屈曲出至門西頰土外楞從此傍牆西下至西南外角從此傍牆北下至西北外角從此傍牆東下至東北外角從此傍牆南下還至東南外角此是大界外相次唱內相從此小牆東南外角穿小牆西出傍大院牆內面西至西南內角從此傍牆北出穿小牆至小牆西北外角從此傍小牆東下至小牆東北外角從此傍牆南下還至小牆東南外角此是大界內相此為內相彼為外相此是大界內外相一周説三説南山云內相三周外相三周各各別唱亦得唱相之法有門有巷或諸屈曲宜未唱前僧共看之為僧具説如是諸相諸物既多恐成雜亂僧共籌宜各立名字務在分明令僧易識又若牆外為界外相唱至門時除去屈曲者此意慮恐作羯磨時有僧至門若不除去即是界內便成別衆也儻取牆內為外相者至門亦須除去屈曲慮恐夏中僧早出門下待明儻誤入中即成界外天明破夏也又作法明病人與欲後遊門下還復却來既曾出界便是失欲僧法便破故並須除復有議言取寺大牆外面為相儻有比丘來坐牆上即是界內恐破法事故取大牆內面者好也白中四句者一告衆勑聽二牒因起三作法時至勸衆詳忍四舉其所作結成白辭恐濫為別者濫為別人也結界本為僧故依一文者今行事並不牒名也對二住處者對食法二同界也食法二同結文云大德僧聽如所説界相若僧時到等於此處彼處結同一利養同一説戒白如是異界制同者制喚戒場也所以可知者叛説戒得罪故制令喚羯磨反此也今詳亦可説戒即含同一羯磨羯磨不含同一説戒此亦善通後稱事難若爾恐云何通答如章濫常恣者濫十二月常須也稱事與欲者且如與人作呵責羯磨與欲人言大德僧聽我比丘某甲呵責羯磨與欲先後不同者結界之中先言於此四方相內結大界次方稱事云同一説戒等若與欲中必先稱事云為其因緣某僧事次方云與欲清淨此中意説稱事結界在後稱事與欲在與欲前故不相類今詳説戒雖是稱事和合之義與餘法同稱事與欲本心乖別故簡餘法定不成就又稱事與欲但為一集豈可亦令一度説戒一度結界耶又稱事與欲佛制得罪豈可稱事結界佛制罪耶見論十七水蕩成坑如章所引此門意辨結界之地為有無表相續起不疏云今解不爾者凡言無表是身語業豈得無情成就無表若爾善見云何會釋答此是制限之內非謂後起如衣藥鉢等者物體之上雖無無表其作法人身中亦起持戒無無表其作無表結界亦爾類此應知水蕩成坑窟樹等者成坑如前已引又見論十七云若有石山上廣下小於上結界若有比丘在下不妨此據當結界時界依實地而起故僧在下非是界中又若結界已水穿地為孔不壞界相謂不失界神通比丘在窟裏空中住或在地下不得別作法空中計理亦應無界然由四面及以上下實處是界還是標中故破法事此即不同露地空中四面及上皆無界故破法事若戒場上有大樹枝出界外比丘在上妨作法事應喚下若神足比丘在露地虗空中不妨法事若衣角拄地應喚下章云高下等者樹上為高地下為下窟裏空中或淺或深文殊問經親撿無文然五百問云問大僧盡行唯有沙彌在界為在不答但有一清信士界便不壞況復沙彌盡無一宿界壞述曰以問字同遂疏主錯引也若準見論即似不失者前引文言知其處所竪柱為閣即似曾經人絶也治故伽藍等者下藥法文云時諸比丘不知何處是淨地佛言應結若疑先有淨地應解然結爾時比丘治故僧伽藍不知為得作淨地不佛言得作已上具足謹依文字崇云古舊諸師並皆錯用下文疑有淨處即無故言有故言處不知為得作淨地不佛言得作此當部文尚自錯用況他部文而能具委拾遺云然正文中疑有淨處即無故言廣説乃至佛言得作既故令結明界已無如何妄引證成不失今詳既云不知何處是淨地明知此處曾已絶人足顯故藍何須局執又故藍中比丘不知得作淨不佛直判云得作淨地故知故藍之中界法不失以憑界法方聽結淨故也若言由有愚教得人是故不知何處是淨者何理得知彼宗釋正我宗釋非更有別破如破迷説此不繁述法滅盡經云四僧事緣者此辨戒場理無自恣文言五比丘事起者但據邊方受戒事也然戒場法如善見第八云極小容二十一人淨三藏云其量才可丈餘若其更寬集僧難故本梵音云曼荼羅譯為壇場或云屈達里迦四磨譯為小界當今五天現製此法方可丈餘一丈之外周匝壘磚可二三重寬四五尺以石灰泥擬充人坐圍磚之外接次壘磚高二三丈厚可尺五作牆圍之而於壇中安制底此云聚相也謂壘磚石以為高相也即佛塔是也高一丈許中安設利即是其儀其開門處取便而作上代僧祐律師壘作方壇事藍黃服住住有人衝習其法事令屏除恐為非法之序也五分十六云告諸比丘聽將欲受戒者著戒壇外眼見耳不聞處請十衆在戒壇上單白差教師往教教竟應還述曰準此界外問遮難亦得也戒場無興不為無住處者善見第八問曰何謂為難房答曰有勢力王於他戒場立作故名難房應向住者言莫於此作房乃至故作不正證至三猶不正若衆多比丘有慚愧者剔壞此房唯置佛殿及菩提樹述曰故知戒場無不為住也釋同大界者前釋大界云説戒具二同謂同界異界並制同故也羯磨但有同界同不制異界喚故不須言同一羯磨今結戒場既疑羯磨所以不言同一羯磨也餘三及戒場文並略無者謂食法二同等三及戒場並無解文也大界牒時到下文解之者前結法中時到已下置其同一等言今此解中時到之前牒同一等準知戒場亦如此須解不須解者通辨一切須解義也兩卷羯磨者古羯磨本題云三藏法師集者是也初文有四者一結法食二同二結同食別三結法別食同四舉初二同解為二別謂舉初法食二同界今欲解為法食三別也須結意等者等取釋名也且須意者一處有食無説戒師一有戒師而無有食兩處相須故結二同也釋名者共法共食名曰二同餘類此釋文亦有四者大科既四今是子科四數既同故云亦也結法亦四等者前結大界科為四文一差唱相人二正唱相三差秉法人四正秉法今此亦爾同前以説者一舉昔為二別二顯欲今同等如前文言守護住處者作法之時欲得不集也次下二結類亦應爾者謂法同食別及法別食同類初法食二同亦應解為二別而文略無解法也其文亦四者一舉初二同二時諸比丘下顯欲今別三佛言已下解前昔同四隨彼已下開今別結因辨結竊尋古來行事之家藍大界小及一寺中結多界者從置食界取食將至界外藍內及至寺中別界之內皆言犯盜今詳不然事緣一寺義同一家豈由界隔便為局礙且如食同法界者不解舊界直結食同故知不由界體局食而論法同食別界者須解舊界更結法同故知結界本意為法不為食也以此推求故知不犯若言決定界局食者儻有兩寺同結一界即應食通若許通者反招盜罪此或可爾者今詳不然理應開其如法四人密出界外疾疾結之論其集僧還依常則也若其多人一時俱去惡人便覺故也觸不成觸等者等取惡心解他淨地不成解淨也惡止觸食不成惡觸不知標處遮不成遮今取不成為同喻若將惡心為同喻者應許界內惡心遮説不成遮耶減却一法寄下遮中者下遮犍度聞有異界喜鬪比丘欲來至此佛開減作二三布薩若應十五日説戒減位十四日若應十四減作十三若今日來應疾布薩若已入界應具洗浴令其洗浴舊住比丘密出界外作布薩事若不爾者佛開却作布薩應作單白從白月至黑月若待不去作第二白若故待不去應知法強與和合大小分別可知十四日是小十五日為大須作二數法者上久黑月數法染使黑白月數法染使白也祇律二十七如章所言若有者香汁灑地等者謂若有客皆比丘也義通二界者自然界中但得對手作布薩事不得誦戒也具戒位三者僧位誦戒衆多及一人並不誦戒章中不分其相也僧中四別誦十人二十人四人五人也心念等但得名布薩不得名説戒也章中不分別故唯單白者以制作故事是易和單白即得也自恣亦爾者僧恣差人三説名廣再説一説名之為略四人已下唯對手恣更不論略也不依前準者不須準前四門中辨也章云一一如常可知又下云廢立可知者應先鳴鍾人人各説聞鐘偈如增一含二十三云降伏魔力怨除結無有餘露地擊犍椎比丘聞當集諸欲聞法人度流生死海聞此妙響音盡當運集此次諸比丘攝持威儀徐步進堂禮佛恭敬胡跪合掌口説偈言持戒清淨如滿月身口皎潔無瑕穢大衆和合無違諍爾乃可得同布薩説此偈已依次端坐然其堂中先須灑掃及敷淨席香爐籌案高座燈燭肅然可觀著一年少擬令秉白又令三五年少比丘或復沙彌助辦所須各具威儀無令雜亂維那先取淨水澡手付與餘人令行與僧受淨水時各説偈言八功德水淨諸塵灌掌去塔心無染執持禁戒無缺犯一切衆生亦如是應一人執淨巾左手執上右手持下授與衆僧後香湯巾亦爾維那又以香湯洗手次持香水至上座前灌上座掌付籌令浴各説偈言羅漢聖僧集凡夫衆和合香湯浴淨籌布薩度衆生若上座不能浴者維那自浴籌已餘有香水令餘人行與僧僧受香湯各説偈言香水熏沐浴諸垢法身具足五分充般若圓照解脫滿衆生同會法界融行巾準上然水及湯本擬灌掌勿用漱口其維那浴籌既竟至打靜槌邊左手執籌右手捉槌其柄亦須先用淨香二水浴之令淨打一下口唱云大德僧聽衆中誰小小者收護三説收攝金護故云然也又云并供養收籌準前收護已具其義行來既久故不廢之又打一下唱云大德僧聽外清淨大沙門入三説有言此是喚賓頭盧然準律中怨人不應集及喚戒場上僧不局賢聖有人此中更加一白未受具戒者出四分戒序戒師自驅不勞維那妄令先出若或有人誦餘部戒維那驅出斯即不爽以餘部戒本無驅出文故須維那先白驅出又有人言不清淨者出此亦然戒本文中自有三問故也又打靜云大德僧聽衆中小者已收護外清淨大沙門已入內外寂靜無諸難事堪可行籌廣作布薩僧當一心念作布薩我比丘某甲為布薩故行籌願上中下坐各次第如法籌如法受籌之言三説并受囑授人籌作此唱已來至僧前從上次第胡跪授之上座亦即偏袒右肩胡跪合掌餘僧一時隨上坐儀式然取籌時捉籌頂戴各説偈言金剛無礙解脫籌難得難遇如金果我今頂戴歡喜受一切衆生亦如是後收籌人隨至僧前胡跪承接其還籌者以手還籌口説偈言具足清淨受此籌具足清淨還此籌堅固喜捨無缺犯一切衆生亦如是既還籌訖恐久疲極各聽復坐如是展轉盡於大僧既收得籌至上座所胡跪授與令上座數祇三十四云香湯洗舍羅已行應一人行一人收不得覆頭覆肩行籌應脫革屣偏袒右肩受籌人亦如是先行具足人籌然後行沙彌等行已應白爾許受具足人爾許沙彌令有爾許人五分十六云不知誰行佛言使下座比丘行若不知行應取知者有比丘便擲籌與僧佛言應手授收已不數數已不唱佛言收已應數數已應唱唱云比丘若干沙彌若干出家合若干維那復打靜云大德僧聽次行沙彌籌三説巡僧遍行口唱云沙彌籌恐有大僧受沙彌囑故須遍行行收既訖還付數知維那自來胡跪取數上坐告知復還打靜唱言大德僧聽此一住處一布薩大僧若干人沙彌若干人都合若干人清淨出家和合布薩上順佛教中報四恩下為含識各誦經中清淨妙偈偈云清淨如滿月清淨得布薩身口業清淨是乃應布薩出祗律二十六卷維那次來至上座前禮胡跪合掌請云今白月十五日衆僧和合大德慈悲為衆誦戒上座答云好維那即唱唱法如常若不堪者告云此説戒事某甲應作但為老病氣力不堪應請次座維那次第請二三人若並辭者還上座前白言次座已下並辭不堪取上座進止上座告言任差能者維那還打靜云大德僧聽僧差律師某甲為衆誦戒梵音某甲律師升高座受請者禮佛已胡跪白言比丘某甲稽首和南敬白大衆僧差誦戒恐有錯誤願同誦者指授一禮便起徐徐升座次為梵唄如常可知次誦戒人驅沙彌出沙彌對僧説十數竟還房作業不勞諸師浪𢬵異端祇二十三因有賊住便以十數試驗是非十數者即是十種增數法門亦無次第也所言欲者悕須之名者不然此中欲者欲樂忍可也故伽論云樂隨喜共同也梵云闡陀阿路者耶弭闡陀此云欲也阿路者此云説也耶弭此云我也謂我説欲也謂作法時樂欲忍可也梵云伊上聲呼之此云欲也此即悕須之欲也梵云迦去聲呼之摩此云欲也此五欲之欲也梵音各別其義亦殊也然所應法其唯百四十四或有疏云其唯百一今詳百四十四者意説結界無欲法故也此義不然疏主羯磨疏中自列一百四十五番羯磨於中結界大小成八何因但除一番羯磨故應説言然所應法其唯百三十六也上下疏文數有此失準此應知又更義推行覆藏六夜時容來白者理不集僧若布薩時白及六夜時日日白僧理亦應須索欲問和此白雖非羯磨法攝然亦須欲也已下二位無欲法者謂對首心念二位也一百四十四位三者單白白二白四三也有疏云一白位三也羯磨通三者説恣之中並有羯磨并有羯磨故為三也淨恣二局者説戒不得與自恣自恣不得與清淨也謂前二僧所秉當行者説恣二法佛制常行也隨其前事要有所須者隨其説恣乃至六年杖囊等一切法事有須作者皆開與欲也若須不須並是義兼開制者謂於須中及不須中並開與欲及制不與欲也不與欲犯提故若破戒等事咸悉不成者前人自犯妄語然僧作法得成由前人心不違僧故也其理決然有恆無恆者恆即是常也謂説恣是常行也所餘法名無恆也各對五説者説戒與恣恣與清淨並不成也亦非二十三人僧尼五説足不足故者謂前既言二具非下三理應僧尼並成能與何故今言二十三耶以其二十三中尼等四衆並在其數是則準僧是能與人豈不違前二具皆成能與也故今釋云前言二具意説當衆今言二十三者其中尼衆聖僧不足故非能與尼作法時反此應説故云五説也但二十三除別住等五者意説之數除二十八今與欲中但二十三體非能與也尼等四衆是異衆故舉擯五人及十三難體非僧故所為人者自身至僧明非能與由斯約體並非能與其別住等體是淨僧是故約體並成能與於中差別有其三類一者神足於場儻來入界即成能與二者隱沒離見聞定成能與三者別住若申手外定成能與若在界外容來入界而成能與也尋疏審觀足曉斯意下瞻波中二十八人體不足數束為頌曰餘舉滅難為即二十三也神隱離別場此五兼上即二十八四僧階差相望有攝者此有二義一據相辨義者上能辦下是故二十人僧具攝四僧之欲十人僧中攝三僧欲五人四人準此應知下不辦上是故四人攝淨不攝恣等五人攝恣受不攝出罪等十人唯攝受不攝出罪二十唯攝出罪第二據用分別者二十有出罪之用以恣受等不假此故十有受戒之用以説恣等不假此故五人四人準此應知由此義故望有邊説之為攝望不假邊説為不攝也二十七人頌曰命過餘行罷入外道別部戒場明相出難舉滅神聞章云餘專約人者二十人也頌曰命罷難舉滅舉分三舉足數約體者有人言此釋不然若不自言者與欲足數皆得成就若自言者不成足欲今詳足數約體理決應爾以體不淨和合之義不生故也數有此言宜還依舊如道遠結界等者意難古師離與欲人見開即失故今難言如上文中道遠結界十五日布薩十四日先往不得受欲者但以下文云更無方便可得宿受欲故上文云不得受欲儻若不宿理亦聽與既遠與欲明知已離與欲之人見聞之外故不得言離與欲人見聞即失古師作不送欲意離見聞失者彼又解離見聞有四種一隱沒二到出三隔障四遠坐初受時離病人見聞至中路離同伴見聞此二但有隱沒一種至僧中時具有四種後文云若至中道若至僧中亦如是隨配應知今師若以神足為難理恐不然神足異界故不問心今離見聞不妨同界何得相類然詳此釋亦有斯理今師正解如疏應知崇云離見聞者唯局與時語受不得離見聞故中道僧中設離常道欲亦不失持欲既是使命往來豈可離道即今失欲若爾何故文言亦如是答理實合除且總望前故言亦如是又解三位皆對受明初受既爾中道僧中類亦如是省過順文此釋最勝古師言離見聞有四者亦不然今詳若常道徑過諸處決定失欲如上食前食後詣餘家戒云若比丘囑授欲詣村而中道還或不至所囑處乃更詣餘家或囑至白衣家乃至庫藏處及聚落邊房若尼藍中或即白衣家還出並失前囑授應更囑授囑授小事尚此多失況今持欲寧得徑而離常道也律攝之中登雙踏道尚自失欲故知甚難登雙者越登兩級也一成二不成下文云有三種狂癡一者説戒時憶不憶成不二者憶説戒而來三者不憶説戒不來初三不成持欲第二成疏主是義準釋也二十一人此彼俱同者頌曰場難舉滅神及聞七言也式叉等二者等取沙彌尼也別住等二者等取隱沒也休道可知者準同命終謂若來集即非休道若是休道即無集義入外道等二者等取入別部也由不據往來故若其來集即非入道等也一解此謂覆鄣處作法者即是隔障隱沒也與欲者多集五分病人不能與欲等者意欲證成病多出界等文一準前説者文還為四初至如是善病輕與欲次不能下扶將赴集次時諸下病增圍繞次若有下病多出界初文復三初有緣須集次時有已下舉緣啓佛三佛言下開與清淨於中復三初與成不成次持成不成三説成不成與中復三初聞與二若説下列其五種三若不下反上不成僧家所作者意説清淨應僧常行亦非稱事祇二十七云布薩時與欲者多集者少又與欲比丘與集者等白佛佛言意從今不能與欲者多及等作布薩者越應集者多表無別過者如前已引祇律覆處不離見聞等也文云第二比丘代説者若準五分十九若忘應傍人授三忘應更差人續次誦然祇二十七云誦時忘者餘人得授若令誦作布薩越不同五分及此律也彼律又云從今日後不能逆誦若誦時忘失者得還補逆誦者越謂故作心逆者越又云轉與欲不名與欲不同此律也若準母論第八云七相應法者取欲者語一人如是展轉語第七人皆得所欲取欲清淨是名七相應法準此轉欲得至第七祇律又云布薩日若黑風雨若火若賊諸比丘盡驚散不名持欲到僧中若一人在是名到僧廣而直説者意簡為我説欲等四也不即破夏者相傳云不然理應破夏不同欲法也七個餘緣者又中前四各有若字後三各有或字然覆不同有兩是難無兩非難故合為一也文云布薩多夜已久者謂有罪者半月懺悔增長戒根懺罪既多故夜已久準下自恣法云若布施夜過多相傳釋言謂施主施時為呪願多今詳如五分十九云若説法論議若多偈布施不容説戒皆聽至明日布薩與此律意同也偏舉下四者前七個餘統中下之四種並是夜久恐犯經宿即須略説也廣誦戒毗尼者一卷戒也五分十六五種説戒序至三十捨墮已言餘僧所常聞餘如章中言不同者彼但一五此有三五此律初五中第三誦至十三彼律第三誦至二不定也尼但二五者一序二至八事三至十七殘四至三十五單提第二五至八提舍尼準知若更誦本語越者祇二十七云諸比丘作布薩時説至波逸提截己破已挽出已波逸提當誦時賊成誦人默然賊立須臾便出復重誦如是至三賊作是念此惡沙門作是説正當截我破我挽我等耳便入打諸比丘佛言若更誦本語越五分十八云聽諸比丘遙與作狂白二羯磨本為不集故應遙作有心乞領者不解等者猶是古師義也如離衣六年即不須解捨戒即是有心而解也無心之中如滅擯法闡陀二白諸諫等亦不須解七法治人等須解也類前難提者學悔不得重作也文言衆有不淨乃至無有此理也者五分二十八十律三十三并云佛若不清淨衆中説戒者頭破七分祇二十七闍王作布薩堂種種嚴飾作金蓮華鍱僧坐後等略如章別今詳此中制自言治與下僧八八種惡馬并三十八奇並是連環同是一事即此比丘當時即作惡馬治也然結集者集之不次也準此惡馬治人準是犯重之者古人浪釋下當更辨文言其人及所詣處非者其人者伴也舉伴以取處非故置及言也亦有律文具足八句怛鉢那或為歎波那此云乳粥音義云此云也懺悔發露法者識者懺疑者發也解惑對治同異者謂懺中對治與解惑中對治辨同異也所作事業雖謝在往者加行已息也立對治道者即以懺法為能治道也興善罰惡稱之為懺等者今三藏云梵云痾鉢底鉢喇底提舍那痾鉢底者此之罪過也鉢喇底提舍那即是對他説也説己之非冀令清淨舊云懺悔非關説罪懺摩西音此當忍義悔是東語追悔為名悔之與忍逈不相干若依梵本諸除罪時應云至心説罪西國若有身誤相觸大者垂手撫身小者虔恭執口云懺摩意是請忍願勿嗔責律中就他致謝即説懺摩之言必若自己陳罪乃云提舍那矣雖可習倍久歲而事須依梵本今詳名言通得意之路意既無求滅罪亦可義通也現生後三報等者婆沙百一十四廣釋其相一者順現法受業舊名現報業謂若業此生造作增長則於此生受異熟果是名順現法受業二者順次生受業舊名生報業謂若業此生造作增長於第二生受異熟果是名順次生受業三者順後次受業舊名後報業謂若業此生造作增長隨第三生或第四或復過此受異熟果是名順後次受業問諸順現法受業定於現法受耶順生順後為問亦爾譬喻者説此不決定以一切業皆可轉故乃至無間業亦可轉彼作是説諸順現法受業不定於現法中受異熟果若受者定定於現法非餘故名順現法受業順生順後所説亦爾阿毗達摩諸論師言諸順現法受業定於現法中受異熟果故名順現法受業餘二亦爾更有三釋皆顯有不定義恐繁不録今此章中同譬喻論師釋也言時定者若受決於三時隨應故名時定報不定者未受之間容可改易故也必感善報亦在至時者即生報也薩婆多性有成就者成就即是得之異名不相應行以之為體謂此惡業若表無表常起得得成就在身也曇無德為因成就者成論宗中得無實體亦許假説然無表性即是實有善惡無表是罪福性必有實體如彼論第九無作品廣成立也斥似大乘熏成種子義也懺是有中之業者謂非無滿空慧永斷煩惱也解則不爾者如有漏慧九地別斷一一地中分為九品下解是劣上惑是粗粗故易斷還用劣道以無漏慧斷九地中修道煩惱義亦同爾餘八品廣説應知微惑曀理深者最微者即是下下品惑也大乘實相等者即真如觀也此以觀行滅也或能決心發露即是依大乘事中滅也是以論云者即十住毗婆沙第四卷也三三者身等三業三報及自作教他隨喜也準十住毗婆沙但有五門謂今晨朝十方無量佛所知無不盡等是也今時加發願者計理即上隨喜回向已成發願無勞更作也即懺文中有之者如言發露諸黑惡及決定毗尼經禮三十五佛懺云所作衆罪不自覺知等是也對大具五者一偏露二脫履三向禮四䟡跪五合掌也下當具説者次下釋文即明也多身修道者謂佛要經三無數劫積集萬行也一形交證者謂據一形容從見道至證極果不同大乘第二僧祇即入見道然聲聞極少猶徑三生第一生中種解脫分善根第二生中令其成就或起順決擇分第三生中能入見道或至盡漏諸到究竟聲聞如舍利子等六十劫修也如上初卷記辨及以蘭等咸同此法者多論第九云四悔過法一説悔過此云三説故知不是提舍已下亦可部別不得將多論釋此也五分白二差者但欲辨其不同然自此律但口差二三人諸比丘懺也第二説戒時作白懺悔發露者謂識者懺悔疑者發露也就識中有古師云此懺罪滅今者準文白已當懺蓋謂後時當懺悔也今三藏律攝中令後懺悔也又此白法衆僧都集無與欲者人須同犯除去四夷了了識相方可作白若有與欲與欲之人必言清淨若信清淨僧應就懺不合作白不信者須喚須舉以其有犯不合同説不得妄白今有時人罪離疑忘與欲非一共行此白望得滅罪甚為非理也定知己等有罪者餘僧也事等無罪者且據於有一向謂無作此初釋也若望謂輕或復及此亦是不識如疏後解不識罪名者章中釋意如燃火等自雖了知有燃火事而心一向謂為無罪或心一向謂是吉羅故章釋云不知何罪或有壞地等者且如生地而露燃者亦即壞地又壞生種容有自煮而彼迷心云我犯燃何處更別有壞地等是不識名也體狀者表無表體或性遮等也多小者即迷自體頭數多少及此從生覆藏默妄等也今詳亦可不識名者於有謂無或輕謂重不識相者如犯屏聽自謂兩舌假根謗他謂為無根與女同宿謂為未具同宿等是也章中所釋恐不當理此對執情者如露燃時一云別者壞地之罪一即執無也彼據無諍者指戒本中強與波利婆沙為伏難也釋意云雖身心自懺但望出罪不肯行覆故須強與説戒日同不同等者日同容來亦有少等多不同亦有少等多也界裏藍外者意説界大藍小故也應從不從者且如舊比丘十五日客比丘十四日十四日客來少或等制從舊人十五日説也正以知來為異者謂知決來然而不待速作説戒不同第二十二正説之時總然來也三個十二中初十二頌曰十四客少等制從舊十五客多求舊和不和出界説初三句意十五客少等求舊十四和不和亦出界客多舊從客第二三竟客十六舊時時謂十五日也此中即有三句文中現有然章中名作三誤也以其此三客若少等須制從舊理合同前初三句故客時舊十六此三文略如次同前説此初十二竟客少告清淨等多更為説舊三同客三各望六亦爾此第二十二竟知來十二句同於中十二合三十六句竟五分有文五分十六云客比丘十四日舊比丘十五日佛言客應從舊無舊比丘若客比丘自共作異佛言後來應從先至有客比丘一時來佛言應問近處比丘無近處無比丘應問官日數從之黑月問官理在不或若論白月理應十五日為定祇不聽再説戒者祇二十七云佛言今從日後一住處不得再作布薩若比丘遠行入聚落作布薩已得默去應囑沙彌若園民若放牧者今知此中已作布薩若無人者應書柱戶扇若散華作相若前人不囑不作相後人不問不求相俱得越毗尼十誦二十二五分十六等皆令更説勿使局執祇文亦不得頻日者彼無文也但初四個三者指初十二句也應出不出者諸求和句中不得和合應出界故也不從不集者如十四日客若少若等而不肯從十五日應故名不集餘句類知秉法惡心等者知人不集起破壞心故秉得蘭若無破壞之心但由慢緣故吉計理餘人不集懈怠亦吉文言破壞他者欲使他犯別衆亦欲令僧不和合也餘悉同此者餘三個十句悉同前故此等句法先讀律文即知其相也無比丘無住處者逈地也無比丘有住處者空藍也文言若無僧共去者儻若有僧去云彼處亦當説戒故無罪也有比丘無住者逈處有僧也諸合句者兩處俱主是臣也或破藍亦是也五分十六諸比丘反抄衣或叉腰著革屣覆頭或臥或倚作如是等不恭敬聽説戒佛言宜加恭敬不者吉羅有比丘説戒上眼佛言吉第七簡餘衆者文言瓶沙王遣諸將守藍者五分十六云優陀延王有一夫人王放出家得阿那含生梵天上飛來空中勸王出家即釋王位付太子已出家學道在城左右止林樹下太子見文恆恐還奪時王比丘未曾見佛欲往禮敬念已便行遂忘坐具須臾還取子王見還恐其將悔敕人速煞凡是沙門釋子亦盡煞之使受王命王比丘言我出家所求未有所獲汝小寬我使者聽之即勤思惟得須陀洹如是四反得四沙門果便語使者汝可隨意還語汝王我不貪位行忘坐具所以暫還汝為煞我便是殺父煞阿羅漢念汝長夜受大苦耳言已就死使還白知王聞此語血從口出生身入大地獄時瓶沙王與其鄰國先聞其教盡殺沙門入己界敕人守護祇亦不許王前説戒如前賊中説十誦五十云頗有未受大戒前得説戒不耶佛言有我先説除却波斯匿王眷屬猶為王説令心清淨故第二大段非時和合者文中兩白疏主羯磨疏中前白名為非時和合白後白名為非時説戒白也此中疏意云初明單白和僧者非時和合白也此白意者約僧為彼解舉已了故須作此和合單白及須説戒此説戒時即用常白而説戒也尋疏應知次釋後白如疏云或被舉人別分不同僧法有疏本云別人不聞僧法者誤也此下疏意云此約被舉之人欲得與僧同共法事故直與作文中後白及説戒也此説戒時即用此白替常説之白也下拘睒彌疏中云或可布薩白及布薩此之二法科行一事者布薩即是非時和合白也及布薩者即以非時説戒白而作布薩也二法之中科作一事不勞俱用兩個非時之白也此中疏意人多致惑不尋羯磨疏者難曉其意耳然文中優波離問言為成如法和合不闕無答文準下拘睒中答云佛言不得如法和合已下文方同此處也七文者一説戒如非法二與欲清淨法三廣略説戒法四治人滅罪法五客舊應不法六制叛説戒法七料簡餘衆法安居犍度疏本第八昔言形心寧靜曰安要期此住曰居瑤云若爾心若不靜應不成安故不存之也今詳就勝理亦何爽以成三益者一靜思專修二順於慈道三息世譏論不逮逮及也五事賞勞亦得兩月六月利不者有古師云五月攝閏以下文言聽冬四月竟僧應出功德衣既約冬時故知含閏若論一月局開夏知故不舍閏疏中不存此釋故云今且一釋等如疏應知既知含閏等者自下疏中總約一夏分為三類第一類者如疏云閏五月六月百二十日住閏此兩月一向決定百二十日第二類者如疏云閏四月結位有三一者前四月結定百二十日二者後四月結隨日多水三者五月內決定九十日尋疏應知疏云是中或有安居隔一日等者重分別前第二位也第三類者如疏云若對閏七月結位有五謂前第二類中已閏三位今第三類復開二位故五也又有疏本云若對閏七月結位有二此即直就第三類中開二位也一者五月一日已前結者定九十日謂至閏七月一日去也二者疏云二日已後十四人結者誤也應言十五人也從二日至十六日有十五日故也且如五月二日結者至閏七月一日雖滿九十日而閏中日不數為數要至八月一日方為定數由此定百二十日也餘可知疏云或安居隔一日去時隔一月乃至安居隔十四日去時隔一月等可知者重分別前第三類義也謂五月一日結與五月二日結者雖隔一日而乃前人閏七月一日即得去第二人八月二日方得去也故云去時隔一月乃至安居隔十四日去時隔一月者此言亦誤也應言安居隔十五日也謂五月一日結者與五月十六日結者隔十五日也去時隔一月者此言至閏七月一日即得去亦誤也謂五月一日結者五月十六日結者至八月十六日方得去此乃去時隔可五日何得名為隔一月也若欲救之應言並隔閏月之一月也上來疏義廣已辨訖若準伽論第三云王作閏月數安居日滿自恣已受迦絺那衣述曰此即數日滿九十日今詳若爾迦提亦應受兩月故不應然又功德衣豈容六月冬中有閏應亦六月既有多妨故彼部義不可輒依也淨三藏亦同此論三藏又云必須夏終十四日夜請一經師升座誦經廣為供養明朝過午各取鮮茅可一把許手執足蹈作隨意事舊名自摩事也隨意既訖任各東西即是夏周無勞更宿此即十五日去亦與舊異也文證可知者即此揵度下文云舍利弗目連欲共世尊安居十五日從所住處往十七日乃至不知云何佛言聽後安居有二安居有前安居後安居以三十日六十日並是結時分故者今詳細辨有三十一日六十一日也不同祇律者彼律第二十七未至住處路側安居者謂彼律中不結安居犯越毗尼故且權結也有緣開破故明相出趣所住處破亦不得衣利者非直破夏亦復不得時僧得物也又見論五月十六日為前安居等者彼論第十七云胡本律五月十六日為前安居六月十六日後安居疏中釋意云此國改法應隨王法四月為夏也立世阿毗曇云若五月十六日西國始結夏漢地安居以滿一月至八月十五日西國自恣時漢地已受迦絺那衣一月有古人言我觀此律結安居法唯有前後兩日得成若爾何故增三文云有三種安居前安居中安居後安居答云彼續次文云於聖法律中歌戲猶如笑儛如狂者戲笑似小兒觀此文勢靜緣正念名曰安居初心觀歌中儛後戲故云三安非謂九旬安居法也今亦有人扶此曲見今詳此乃迂會明文妄通己見以觀歌等無有前中後安相故如增一等以攝僧等一一為數乃至正法久住增二三等此觀歌等何以不準汙家惡行歌儛跛行彈鼓簧等作多種數立安居何限三也五百問云問夏中幾日得結坐答從四月十六日盡五月十五日日日可結然尋四分律本元興于闐龜茲國中卑摩羅叉是龜茲人依斯律本故作此説也又若會同他部律者何成諸部各有自宗也故定不然淨三藏云若前安居謂五月中黑月一日後安居者謂六月中黑月一日準斯兩日合作安居於此中間文無許處至八月半是前夏了至九月半後夏方終今詳三藏且執自宗何用總判文無間處又移夏言此彼界僧破者此下文云比丘安居竟見者比丘方便欲破僧自念言破僧事重甚為醜惡莫為我故破僧佛言若如是者即應以此事去若安居竟聞彼界有欲破僧廣説準知祇第八云從今祇桓林至開眼林東坊精舍西坊精舍東林精舍西林精舍王園精舍受籌塔婆羅林精舍婆羅林疏中更加門字者非也問自然安居得結界不等者疏中且是古來共傳所以不聽夏中解結今更詳之此應分別謂下迦絺那犍度云安居竟四事應作及增五文云應作五事者此意本為舍利弗欲益親里及近世尊佛即開聽王園精舍及那羅聚落連結大界及攝衣界安居既竟界若常然若須集僧事多妨難為對此義所以文言安居竟應解結等若無此緣本可藍相而結界者夏中解結何所差違崇云夏中解結並不破夏未竟解結得不應罪今詳為解身子界者何得不破故非盡理又詳結安理由本意若本標心但依藍相解即不破以其安居二界皆成教不遮故又自然中標心局限以為分齊不同集僧空聚等分既知此理若本標心依藍相結縱入戒場及以藍中大界小界並不障往來但不得出藍相之外護衣之法亦各不同謂有衣界即不得入戒場之中若無衣界依藍相護應各別明不應一概判衣夏等應審思之何等人須安居謂五衆者沙彌安居但稱長老餘詞悉同餘下二衆全同大尼不同俗年者且如俗中臘月三十日生至明年正月一日即名兩歲比丘夏法要滿九旬方名一歲也亦可四者為七者或二或三或四並如疏中自己廣釋所言七者即於第四及界之中曲開為四故成七也開為四者一腳及園雙腳及園并入界二即是四也前吉後提者上尼律中不前安居吉不後安提比丘唯吉五分具列威儀者彼律十七云應偏袒右肩脫革屣胡跪合掌向一比丘言長老一心念我某甲於此住處夏安居前三月依某聚落某房舍若房舍壞當補治三説皆不須第五料理句者尋諸律本多言房舍破修治故復有律本無此故字尋其意況無故字者勝也此中意云我此安居本欲修道房舍儻破當修而住若如是者山窟儻破亦須修治而方得住也故五分云當補治也若置故字便是安居本為治房理恐不然也五百問云三月中破即治意亦同五分也若置故字而釋文者夏中正是息心住時兼為時和應修房故五分受安居者答言等者若依此律古來行事由增五中不依第五律師得提罪故故三説竟前人問言依誰持律答言依某甲前人又言有疑當往問次領受云頂戴持今詳此據年夏未滿自行未成須作此説若過十夏行解已成不應問言依誰持律直應答云可爾或同十誦二十四云莫放逸疏中已引此文疏云又須依持律等者意即同前古來行事也下增五云有五種持律誦戒至三十是初持律至九十是第二廣誦戒毗尼是第三廣誦二部戒毗尼是第四若都誦毗尼是第五是中春冬應依上四不依吉夏應依第五不依提上來廣辨疏義訖明了論云由五因緣安居得戒一若處所有覆無屋不可住也二若夏初十六日前後安居並取十六日過此日不成故三若東方已赤白月夜盡東方已赤即名十六日若未赤時猶居十五日故以赤簡之但及十六皆成結法不要十五日界中宿也四若人在別住中起安居心心有三種一自行二利益也三營三寶葺治居舍為此起心一腳及界即成五若此有覆中無五種過失一遠聚落求須難得二大喧鬧妨修三多蚊蟻或被嚙或傷他妨修道故四無命緣謂無施食藥等緣故五無勝人具五德者一未聞令聞二聞已清淨此二並為決疑三四未達文義能令違五正見除邪見無此五失方可安居又結法中昔有人言十七日後應言前三月後安居南山云中三月今此疏中云稱後三月尊者云後釋勝又古人云依皇帝聚落南山云若依藍等隨名牒入不同昔愚皇帝聚落又有人言房舍破隨緣去此非難緣若隨緣去定招過咎疏中引十律七種七念於受衣者持三衣也與一請者背請中捨請也安居局處與作法同者入界之時即稱本期義同作法也忘不發露豈得義同發露耶不無有罪等者説恣時過雖不更作不由不作即是忘成由不記憶説恣日故犯吉羅罪故云不無有罪也分衣義通者通對首心念也及界之中總唱文訖方依疏釋梵云僧伽藍摩此云衆園即寺是也梵云毗訶羅此云遊謂僧遊之處也此亦寺之別名也不同前二者對手心念二也又如受捨者受戒捨戒也位便隔礙等者前安之日不通中後中後相望應知亦爾有不通義可知者望成及界不通中安後當更辨辨教攝者為欲釋疑謂於夏中修通定慧或疑結法應通三藏故即釋言唯毗尼攝離作等者舉餘淫盜煞等為倒以問難也章云但據位判已下答前難也前二是制者對手心念二也戒體中説者作者是色等也餘説恣等準同者彼亦作無作也後二局初後者即前言有不通義可知者是也位法橫竪者橫布三位將法竪通也或四者即對首心念忘成及界直據法説也或八者前後兩安各四法也或十者八外更加中安二法二法者對首心念也以忘成及界不通中安故除之也若離及界為四者離為一腳雙腳等四也兼前對首心念忘成三種故成七也或十四者前後兩安各七法也或十六者加中安對手心念二也瑤云若以七法約春夏冬成二十一若約處別自然作法則三十二謂自然作法各十六也今謂此釋全成妄説春冬住時本不作法何處得有心念等耶又已約園約界離七種訖園界即是自然作法何因都計還復更約自然作法有人浪用故應棄之若以十六對五衆説成八十種此義可爾餘並非理為未故受者下文夏日未了疑不敢受臥具佛言能為未來故受謂是當來須故也舉分房緣中文言客比丘移舊比丘等者意説不應移他舊人自須別受房也差人之初義分別者此中義門即隨文釋文言從今已去聽分房臥具即約此文釋第一第二兩門也第二科文言應差分房分臥具人已下即約此文釋第三門又第二科中文言應如是差堪能羯磨者已下釋第四門也章云其處分之式如文者即釋第三科中文言差分房舍臥具人竟已下文也不得與沙彌房者祇二十七及三十四云不得與沙彌房若和上阿闍梨言但與房舍我自料理得與若房舍多者一人與兩房若不肯取兩我正得一房足爾時應語不為受用故與為治事故與若房少兩三人共與一房乃至復不足上坐立餘者出外樹下若空地謂宦分立處若春冬付房治事故與受用故若上座來隨次第住若安居時付房治事故與受用故與上座來不應次第住謂不得舊不坐夏中房也文言畏慎佛教不聽以僧臥具襯體故不得好覆藏者同前文中敢手腳觸也不應三月未足便數歲者今詳未足理不合言言一夏二夏等而論相禮敬者則未必然故下文云先受戒者不應禮後受戒者五百問云二人同臘小者前坐大者後坐前坐者已受歲後者未受歲於一月中何者應大答先大者故大計本日故已上文依斯義故應問答云頗有夏多者禮夏少者耶答曰有謂同年受戒而先受者坐後安居於一月中受夏多者禮也文言以前未來日未滿故者前在夏初餘人先來已徑一日二日三日四日乃至一月我猶未來今填彼日猶故未滿是其竟也準此文相有中安居若不爾者文中應言後安未滿何用指前未來之數明知由前日或多小故指之也文言臘蜜塗帳坐中安居等者為去風雨故用臘塗之夜則張之在中止宿晝則收牒不令人見意欲令人謂我得通不為風雨之所侵損故作斯計也依二界護夏者自然作法二也自然即是房船等也第二釋緣如不如等者等取離合及受不懸也如下應知夏分非餘二者非春冬二也七日一法應通諸部者準亦似別如十律二十四云有事聽受七夜法此律云及七日還十律七夜即是八日此律即是夜也餘二少別者餘祇十二律也祇有事訖者二十七云若半月若一月若二月乃至後自恣應還不還者越若有難於彼自恣無罪此文是也聽半夏去者今三藏亦云受四十夜然不得過半夏在外而宿為此但聽四十夜矣去亦須白者今三藏亦云下衆有緣囑受而去理但囑知無別辭句祇無求聽者第四十云尼安居中無有求聽羯磨法為塔僧事而遊行已上律文廣説是非可知者次下章中自釋是也謂前總攝列為五緣次即解釋然不次第章言五衆受戒等者釋前第三緣也俗人生福等者釋第四也不同前二者不同大臣及父母也誦六十已下於初緣中略釋法緣佛僧易知故不釋也如祇若於二部木叉等者誤引文也此是十誦二十四為七衆故皆是如法受日之緣彼律前文廣明二俗沙彌尼及沙彌式叉説次文明與學沙彌尼謂是與二歲學法也文云如與學沙彌尼二部波羅提木叉分別謂律中分別罪相等義今欲學之也若未學欲學若學忘欲誦遣使諸比丘所白言大德我二部木叉分別若未學欲學若學忘欲誦大德來教我受學誦問義章中教義受學者義字是我字也傳寫者誤也有如是事聽去者七夜如與學沙彌尼為是多識多知諸大經言為是等者為其此經是具無邊法相經也波羅婆提伽晉言清淨經乃至阿陀婆耶修妒路晉言衆德經也若未學欲學廣説同前若比丘自身病等者釋第五緣也章引五分十七文者泛總證也章略不釋道俗病患緣然是看病事易知故也對難方聽故不得多者不得至四人已上也無覆客呵者人揵度中不憶罪諸比丘與覆藏法有客比丘呵法不成以不憶者非覆故假傍實事者者如麥熟時自欲乞麥受日之時妄云為佛法僧等也除村村體也村外界界勢分也謂同一事者且如本意意莊像面今有殘日更莊像手也立不立門中末後引明了論偈言七日有難隨意行善解三種九品類似有立義此是論文及疏主釋云似有立義也又諸疏本多闕此文也明了疏釋云於安居中三緣得出一七日緣二有難緣三隨意緣初七日緣有五類一文世親里師僧善友若病若餘障礙因緣二自為施利及至應得半呵梨勒三習法未明猶有疑惑四自利化式為自他對治罪行謂懺悔事五為和僧此等受日極得六宿至第七日不還破夏得突吉羅次有難緣即是本安居處水火等難後隨意緣即是安居之處無善知識或傷喧動妨修定慧或為身病無藥食等以此三緣立歷為九論云一有事先成七日緣後更成七日緣雖受七日三日緣盡不還破夏此緣盡竟復有餘緣用後三日是也二有事先成七日緣後成有難緣緣盡欲還住處難起即住餘處三有事先成七日緣後成隨意緣先受七日我有此緣即住餘處四有事先成有難緣後更成有難緣賊難若息應還欲還復火難起五有事先成有難緣後更成七日緣難息欲還有檀越請仍請七日即住界外此真諦云仍請七日者意説界外仍請今理難六有事先成有難緣後成隨意緣可知七先成隨意緣後更成隨意緣為求善友隨意出界未宿即聞有善識來安居處理即應還又為喧動仍住餘處八先成隨意緣後成七日緣緣盡欲還有檀越請九先成隨意緣後成有難緣緣盡欲還聞有難起如與欲事訖不來之類者崇云古舊釋云受日出界事訖須還不還夏亦不破所以爾者以法在故其猶七日藥及與欲類又如癲狂病止法存從僧乞解今解受日不同藥等受本為事無事無不成故今事亡法則隨謝如僧祇事訖與此冥會又受德衣限滿不捨豈言不捨法得在耶失守夏人恆須明察得取他誤言不護自夏云云如彼若更引文多緣事別等者古師云若望作法事雖似重若以事別則不名重數隨前事各受七日等也如受三歸各各對人皆言最初若爾何故十律不得受二七日夜彼律第二十四文解云此謂一事不得一時受二七夜非謂用七日竟不得重也又傷義準略教體一六群數犯不名第二若一事上如為父母受七日往日盡欲還父母留住教中無犯儻勸父母故來受日豈可不如無法留住若言留住是難攝者父母苦逼令受日來又如官事七日未了事須臾去何因非難若其真去能勝受日又律皆言佛未聽我如是事去不言未聽如是重去此意釋云留住等事即是事別若爾何故三十九夜盡聽破夏去十律三十五滅諍法中開和僧受日等文也義言部別此律和僧開不受日不言破夏彼即受日又開破去故知部別又五分受七日問疑豈可前疑聽往後疑不得此有何意五分十九一比丘不知律夏中生疑佛聽移夏就持律處若彼處迮聽近七日得往返處遙依安居又若前請有益聽去後請豈可即非益耶又若前請少益聽去後為大益何意不許南山立義符此古師又云真諦了論疏解受七日出事了來宿至第八日更受七日三藏中國親承此事寧得自執一隅小見通壅三千佛化乎余親聞見中國翻經三藏及中國來者言佛滅度來無有立一夏三度受日法又此古義崇亦扶之更加詰難繁而不敘今詳古師總引二喻一喻三歸二喻略教又引五教以理成立一引為父母教二引官事教三引佛未聽我等四引五分問疑五引有益受請又有古師立喻云如人脫袍著衫不名為重隨多緣事數數受者亦不名重疏主意云此等並違十誦不聽二七及破安等文故云隨時以破等也今詳諸師廣興諍論然未能曉部別崇殊且如僧祇二十七云聽半月一月二月乃至自恣時還者自是一崇所明也十誦但聽三十九夜以其正經四十日故謂一夏中總九十日理應住日多彼出日今三藏律攝中亦云不得過半夏去是其崇也今詳諸部雖各不同且從十誦半夏而住者善本擬安居理應靜息何容竟夏曾不暫隔故不可也既知此理但重受中不過半夏理即開之十誦不聽二七夜者口法勢分但應七日理不應許一受二七也羯磨受法如母論説乃至三品具受者母論第八云安居中所為事七日十五日竟應求一月是名一月相應法準此偈似聽過半夏就時定故者冬四月竟必須捨故又俱五利者迦提德衣開利既同故相攝也一月衣者取衣為準俱開一長者非定冬夏故云取衣為準也若爾時既不定何須一月攝十日耶答俱開一長故更無緣故更無餘開緣也是以此二者德衣及一月衣也法過者謂羯磨法過彼對首也有律師云夏中講律外寺受日來隨講筵得受一月何以然者律中既云不反七日聽受十五不及十五聽受一月今既一夏講席方終故知不及十五日還得受一月也今詳若言不及七日聽受十五日者此不及言為表八日已去乃至夏終耶為但表其十五內耶若詳通表晝夏終者則不應言但受十五若唯表十五日內何因不及十五日還開受一月不唯表其一月內緣由此應知一夏長緣而受一月必定破夏由此先來行事之家期心擬聽一科兩段而作分限開受日聽科盡日剩亦即須還日盡科餘亦須歸宿方剋過谷也十律七日在受七日去六五四三二一亦如是者十律五十三云若比丘自恣七日在受宿出界去無罪若六日五日四日三日二日一日在受宿出界無罪已上律文彼律既無亦如是文何得謬釋但由舊引更不重尋永風釋通故有斯失今以三藏云一宿事至即受一日乃至七日皆對別人儻更有緣律開重受若過七日八日已去至四十夜並羯磨受然不得過半夏在外為此但聽四十夜矣即是釋十誦文此即部別未心須通也有人多釋不煩廣破者古來諸家撰集羯磨雖有多本不過四例第一人者不立乞辭大律無故即疏主所憑羯磨本也第二人者雖置乞辭羯磨前加不入羯磨所以爾者若牒入者恐成文句增減非故即古羯磨本題云三藏法師集也故疏云不得依羯磨本也第三人者牒入羯磨白中牒入時到已前時到已後略而不説次羯磨中牒入忍前忍後略却光律師本是也第四人者時到及前復俱加如下文言不如白法作白等非法若牒事不盡即成增減不煩廣破者即下章中已有破義謂受日法事兼被差故不類餘離衣等事杖囊羯磨中先含乞辭者下離法文云大德僧聽此某甲比丘羸老不能無絡囊無杖而行彼從僧乞杖絡囊若僧時到僧忍聽與某甲比丘杖絡囊白如是羯磨準白成也祇律若二難并和僧前四句者此舉祇律判此律中前來所辨八句和僧之中前四句文非謂祇律亦有八句等一同此律也母論同此者母論云有一比丘獨處安居聞有比丘欲行破僧法此比丘心生疑若往諫恐破安居若不往恐惡法流行佛聞已告此比丘言若為法事不破安居比丘尼亦如是復有比丘聞彼中已破僧竟欲往和之廣説同前五分有因緣等者五分十九云有一比丘安居粗食不足佛言聽以此因緣破安居無罪二難和僧等亦爾廣説如彼見論十七不成安居如章説今詳所引五分善見且辨部別準此律中移夏定是不破安居以後文中有難不失歲故也文中略無不成者應言若父母兄姊等不留而住者佛言失歲也又復對後諸難等者前第三大文有緣出界法中科文為四今此既辨第四段文界外法盡以明開成理亦更應對此最後第四文云有比丘不受日出界外為母所留至意欲還而遂不及即日還佛言不失歲不留而住佛言失歲等文無者略也舉前移夏等者舉前命難等也自以受為妨等者難云三衣既得受後捨前安居亦應後家成就答衣是己物不惱施主安居若背便惱施主若爾背請受食惱施主故應不得成答一食惱微故成受食安居時分故使不同下成安居者六句中二句也次下三句至而破者悉是結竟者謂第二第三第四句並前家結竟也今詳不定三中前二或不結還去去也破有二種者一經宿破二即日後家結竟破也如章具説通論即有三十六十個十一人辨背不背有疏云通論即有三十六十人十一人辨不背誤也自恣犍度梵云鉢利婆蘭拏今三藏翻為隨意舊云自恣也廣明六種自恣者於中一廣五略也謂一者三説二者再説三者一説此三並對五德任五德處分而作也次恐難逼和衆白已或上坐或秉法人作改衆三白如次還成三再一説故云六種尊者云此六皆是僧自恣法衆多一人何因不説故應説言廣明三種自恣非一者好也謂僧衆多一人即三也引證可知者如初戒云捨和上及大妄語戒云隨和上者並是經家以後名前崇云但為一夏行啞不言今安居竟恣情申説故云自恣今詳同住之法取散之時必請説過即名自然恣未得名制自恣法自制已後差具德人秉白事圓故名為制其猶法犍度中佛言自今已去為比丘制乞食法豈可以前未乞食耶祇二十七云欲方便小事不語得半月至布薩日應共語共相問訊問事答事呪願過布薩日續復如前若憍慢若嗔恚不共語者越已上律文謂犯罪比丘求舉己罪者意説六群既是無德不合舉他故知但是求他舉己難曰六群無慚不應求懺故知舉他雖是非法然是緣起因而即制能舉之人不得輒去九文中有三自恣者一時自恣即前四段文明也增上減却第五段明之故章云寄在遮法中辨是也以其恣反生諍等者謂説戒中衆僧鬪諍若得滅已非時説戒今此定無非時自恣以其恣者是相舉法反生諍故時反非時在説戒中明減却一種落下遮法者遮犍度末也不同此自恣法中次前疏云寄在遮法者同在一犍度也恣中增上謂並得果貪樂修道四月滿已方作自恣説戒中無也我亦淨意受者佛自稱我也阿難集僧説二偈者增一含二十三所引如章乃至如今瞿曇法次云阿難聞已手執犍椎復説此偈降伏魔力怨除結無有餘露地擊犍椎比丘聞當集諸欲聞法人度流生死海聞此妙法響盡當運集此擊椎已佛告汝隨次坐是時世尊坐于草坐告諸比丘盡坐草便敕比丘我今受歲我無過咎等如章身子即便讚佛者彼經云舍利弗白世尊言諸比丘衆觀察如來無身口過所以然者世尊今日不度者度不脫者脫不般涅槃者令般涅槃如來無咎於衆人亦無身口過舍利弗白世尊言我今向如來自陳然無咎於如來及比丘僧乎世尊告曰汝今舍利弗都無身口意所作非行汝今知慧無能及者汝今所説常如法義未曾違理時舍利弗白佛此五百比丘盡當受歲此五百人盡無咎於如來乎佛言我亦不責此五百人此衆最小下座得須陀洹以是之故我不怨責母論六事益者彼論第三乃至六者依非無依是故名自恣謂以此自恣法為所依也祇二十七拜五法成就者作自恣人若一若二不得過彼文又云若大衆六千八千畏不竟者應減出界外作自恣已上祇文然今三藏云若其衆大恐延時者應差多人分受隨意今詳此律一時自恣以鬧亂遂差五德令次第受若復還許一時受者違制意故不可云差多人分受也十誦二十三五分十九並不見多差人也一一差之猶是古義疏主未改理實二人合差無妨今詳問曰五人同住差一五德五德復當向誰自恣答四人對此一人自恣竟更作羯磨復差一人對之自恣亦應無妨諸教無文遮再差故準律攝中四人自恣竟五德即對恣竟之人作自恣事不須更差有人言準十律上座是五德者餘人來至上座前自恣者誤也彼律二十三云若作自恣人是上座應從坐起語第二上座今日自恣來第二上座説辭句若下座作自恣人應從坐起語上座今日自恣來述曰文既相似何因謬説祇二十七若二人作自恣人受上座自恣一人應下座前立上座説已下座復説如是展轉到自座處應受自恣不得受僧自恣竟然後自恣十律二十三又云自恣竟應至上座前唱僧一心自恣竟自恣前後事者上座離座餘僧亦爾不得前後也仰則成規者仰謂遵仰也規謂規矩謂法式也長老者梵云阿瑜率滿此云具壽或云有壽或云長壽具足壽命無諸夭橫是其意也長老名異梵本不殊也喚小即為長老喚大便為大德見論有文也理實通喚實亦無傷如此律中十七羣語六羣言長老是我上坐也與律不同者上尼律中僧十四日自恣比丘尼十五日自恣見論第十五如章所引故云不同也非下三衆者今三藏云過午咸集各取鮮茅可一把許手執足蹈作隨意事先乃苾芻後方尼衆次下三衆計理下衆先集一處上衆恣竟方喚下衆入僧自恣辭句同僧義亦無爽多約僧説者文中作白理是僧法也此謂前三者對五德三説再説一説也若下三略但兩白者先作和衆白與常無別次應改衆三説或再説或一説有三個白隨作一種也論云此非法別衆等者義準見論十七非彼正文也彼云非法別衆者有四比丘一人受欲三人説波羅提木叉既一人受欲餘但三人作説戒非法和合衆者四人作對手説法別衆者四比丘或三比丘一人受欲對手説法和合可知也與欲闕少者彼有與欲此亦合有而文闕無又彼有總欲清淨計此合有總欲自恣而文亦略也分文解義者文四初至若能如是作者善病輕與恣次若不能爾者已下決將赴集次彼比丘如是合已下病增圍繞法次若有多比丘病已下病多出界法初文復三初有緣須集次餘比丘白佛下舉緣砳佛言不開與自恣於中復三初與成不次成囑授比丘已下持成不成三若服已下説成不成與成不成中復三初開與次病人言已下列其五種三若不已下反上不成欲雖到僧處同等者謂治已後比未治前到雖是同然持欲恐前成後失也文五可知者一明受多少二年少應教三轉與自恣四事説須還五料簡成不成毗尼折喻者呵責羯磨等是折伏也憶念羯磨等是慰喻也僧殘雖治容有餘犯者意説容更有餘可舉故復須説自恣也謂約盜四方等者可分物望多人結各不滿五故得蘭罪不可分物義同一主滿五即夷今詳此蘭非理如盜戒辨亦可賤處恣物至貴處諍也亦如無主疑想等也應遮故説時等者謂時有二義一應遮故名為時第二時節故名時也下三無舉者謂改衆三略也前所遮事中等者指上文犯殘罪與覆己自恣文也恐濫自恣者若説戒中作三却者謂言自恣亦得三却入冬分中故彼唯二顯此還二也相傳云若三却説戒事當滅法故無也故有前却者惡人未來減作名前已來須却也第七制叛第八簡衆第九説戒自恣不並真諦釋了論云五人自恣先誦木叉竟次第一人起跪請僧説罪展轉乃至五人準此不別差五德並異此律
