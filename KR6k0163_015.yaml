body:
  text: 皮革犍度文言遲欲見之者遲字除致反遲待也有人言守籠那先得初果者不然觀文中意佛先說法餘長者等自得道果籠那不得以極精進無所證獲若先得果已得無漏欲盡餘漏非大艱難又若先得不應世尊更須令其等䇿諸根以自了知故也十律二十五云有善知金相者居士以兒耳示之是兒耳環價直幾許諸人言是耳環非世所作不易乎價意想平之可直純金一億文言所為出家得果不者本出家以得聖為所為也資成六妙行者六識行心成無深行也慧性清虗者無漏聖慧通治三毒而親治癡名慧解脫也此明定解脫者定親治貪即名心解脫也皆是有為解脫者心慧二法並從緣生故是有為而由出障故稱解脫也其因既無苦果亦喪者前來所辨三煩惱盡即是集因無也此義即顯無餘涅槃也今盡受陰即是苦果喪也此義即顯無餘涅槃也斯二不為三相所遷者謂二涅槃體是無為遠離生相及住異相并滅相也住異令說者住是有情生愛著處與異合說眼識之後流至行心者成實論宗識想受行四心次第始從識了乃至行心方生染汙今則不起染也次第緣生三受者識創取相次生三想親想怨想中庸想也次生三受既是相生故云次第緣也新名等不間緣是也此亦成實宗意也第四禪絶諸受者謂彼地中無苦憂樂喜四受非謂無其捨受今且從多說絶彼此相資平等無二者定慧相資力用均平也上半心解脫者息滅是定也已得無觀者觀即是慧果滿息求故云無觀次半誦法合二中住第四禪者文中既云心住解脫見於滅盡即是依禪而得解脫上來疏意雖後且然今詳文相全不如是今解六處初二即資糧道攝次一即加行道及見道攝次二即顯三界愛盡是心解脫末一即是三界癡盡是慧解脫又二解脫即顯修道及無學道也次文即自釋前五道顯六處義謂資糧位創生正信緣於涅槃欣樂出離盡欲無欲等五顯涅槃果體也又既已信次即持戒持戒之本必須無恚盡欲無欲等即持果也資糧既備次修加行加行必由斷利養愛專精修習寂靜作意始從𤏙位學無相觀後入見道是真寂靜曇無德宗無相三摩地入見道如婆沙百八十五說既已見道次斷修惑顯二解脫故云彼盡欲無欲至乃盡癡無癡者舉涅槃果顯修道位及無學位也故云愛盡受陰盡樂於無癡也愛盡也者欲界愛盡也受陰盡者上二界愛盡也樂於無癡者三界癡盡也三界愛盡即心解脫三界癡盡即慧解脫既已廣釋六處義竟次文結云如是比丘心解脫有漏者舉心解脫亦顯慧脫也次文云眼見色等者既得二脫得六恆住見色已不貪不憂心住正捨乃至意亦如是故名六恆住也二俱不染者貪癡不染也第四禪者離貪憂勝聖人多住是梵住攝現法樂攝故偏舉之散即恆住定即入禪是其意也全為一段喻恆住體恆住即以念知為體四方大風即喻六塵乃至偈文之中以正解脫者二解脫也便為息滅者滅愛癡也已得無觀等者即無學道也乃至心住解脫見於滅盡者顯無相解脫門聖所攝也義意已盡細尋應知此釋決定勿懷疑耳各有四行者俱舍二十六兩釋且一釋云待緣故非常逼迫性故苦違我所見故空違我見故非我集四行相者如種理故因等現理故集相續理故生舊名有有亦生義本無而有故也成辦理故緣譬如泥團輪繩水等衆緣和合成辦瓶等滅四者諸蘊盡故滅三火息故靜舊名止也無衆患故妙絶衆灾故離道四者通行義故道契正理故如正趣向故行能永超故出舊名正即如也迹即行也乘即超也文言本何所作者何心而出家也五分二十一云又有比丘寄衣與餘方比丘衣未至有比丘語所與比丘比丘生疑恐犯長願為除此疑佛開云若比丘寄衣與餘處比丘比丘雖先聞知衣未入手不犯長衣見論十七翻革屣如章鹿角者尅皮作鹿角形疏脫皮字富羅跋陀羅者以木綿及諸雜物與皮合縫使中失起疏木綿錯作成等也又脫雜字也真誓梨者以偏革作疏脫革字亦有疏具者餘如章文言四種革跋者即前文中芒革婆婆草舍羅革漠陀羅革也五闍梨第五大段也第六段中文言一切作器不應畜者十誦二十六云告諸比丘從今日五衆不得相教作不淨事得突吉羅前工師時種種作具不應畜若先縫衣人畜針筒不犯先能書人畜筆筒不犯先銅作人畜錯不犯祇律新革屣等釋第六文中阿難得革屣等也衣犍度願衣者蓋求事遂心當施僧衣也六羣比丘畜非衣作鉢囊等者蓋以馬毛人髮等非衣財而作也往還衣者西方送葬持㲲作幡其幡全幅更無裁割便棄冢間不復收取既是無主比丘得取論云離自貪著等者智論七十二云好衣者是未得道者生貪著處好衣因緣招致賊難或至奪命有如是等患故受弊納衣十住婆沙十二云賊物易得無有過患不為人所貪著廣如彼說見論十七云耆婆者外國音漢言活童子無畏王子路見小兒問言死活人答言活故言活童子淫女法若生女教為淫女若生男則擲棄是故生棄路上問何不學餘技術答往昔有佛名曰蓮華時有一醫師恆供養蓮華如來耆婆見已於七日中供養如來白佛言願我未來作大醫師供養如來如今醫師供養無異耆婆命終即生天上天上福盡下生人間如是展轉釋迦出世宿願所牽不學餘技就師學時帝釋觀見此人醫成必供養佛帝釋化入耆婆師身中於七日中得師法盡過七日帝釋所教如是滿七年醫道成就奈女耆域因緣經一卷成云須三十下者下痢也阿難賓坻直飢反此是梵言訛略也正云阿那他賓茶揭利呵跛底阿那他此云無依亦名孤獨賓茶揭利呵跛底此云團施言此長者團命以施無依孤獨人也因此時人號為給孤獨長者也本名須達多章云六羣反𮂨之葉反文無六群字放習恐難者十誦二十七瓶沙王乘象時有外道梵志從道來王徑見謂是沙門便勑住象欲下禮拜大臣言非是佛弟子王羞愧白佛言世尊願令僧衣與外道衣異因此佛告阿難汝見彼福田不等廣如彼說又准此律佛教阿難已後王舍城比丘多著割截衣聖變者希故今初制也割截之意者不為王賊所利是也增三文云復有三賤法刀賤謂截壞衣賤體是糞掃色賤不正色文言五百梨車振手嗔恨者五分二十云若能保我三事無失爾乃相許一者保我身命必無夭奪二者保我財物必無損失三者保佛常住必無餘行諸梨車言財物損失我能相與若佛餘行我能請留汝命危脆誰能保者便嗔恚而去文言摩竭王者梵云摩竭陀或云摩竭提摩竭此云甘露陀此云處西方相傳上古諸天共阿修羅鑽海出甘露安置此國故名甘露處即世尊成道處也鴦伽王者覺云准上降迦葉中云鴦伽摩竭國皆稱為阿羅漢故知名二體一也今詳不然五分二十二食法中云時摩竭國鴦伽國伽夷國等聞佛出世皆來雲集雲集故知非是一國也蓋此二國鄰接親好佛既出中故偏讚美如真諦部執云佛滅第二百年大衆部住鴦掘多羅國在摩竭國北也持珠鎧者即顯國中有此貴寶也疏云施主獲利者意顯二國之中一切施主也薄皮子者見論第十云離車子漢言薄皮亦言同皮子也即當此律離奢是也彼論云往昔波羅奈王夫人生一肉段赤如槿花而生羞恥送放江中有一道士即取將歸過半月已而成二片復經半月各生五胞又後半月一片成男一片成女男色黃金女色白銀道士見已慈心力故手指自然出乳乳入子腹譬如清水入摩尼珠內外明徹道士號為離車子文言施衆以明眼者說法化人令彼身中生聖慧眼故云然前歎外相者即前文云今觀等是也次顯內有智慧者即此觀佛之智慧等文是也念制兩意者如上文中念諸比丘多持衣過又言我今寧可制衣多少即是念意并制意也文言行騰者亦名行纏也字書釋名云言以裏腳可跳騰輕便也前文復三第一受施聽分二人復不知云何已下如來教以墮籌分法此之兩文於義門前先且釋之次第三八句文者至義門下釋之耳如毗蘭若者即此犍度下文云以三衣施世尊比丘僧人與兩端㲲為夏衣佛言聽受若反上說不為夏勞者並名非時者崇云亦同意說夏勞及一日等兩義之中或若亦闕及俱非者並名非時施也今詳此義應廣分別且如冬分或至來春儻施先時夏安居僧計理並名非時現前以其已過受利時故又以施心局故故名非時現前也准善見第十七乃者多種非時現前如彼文云若布施安居竟僧後安居者不得破安居亦不得此謂前安創竟施也既簡後安故不為夏勞故施即名非時現前也若人冬分中布施安居竟僧前後安居悉得破安不得既破安居不名竟故也此既過受利時亦非現前攝也若人布施安居僧前後安居及破皆得直言安居既無竟字故破安亦得也既通破安故知不局夏勞也此亦非時現前若施迦提月後安居人後安居人得前安不得既簡前安故亦不局夏勞也若人春分布施安居僧應問為施安居竟僧為施當來安居僧答言當來即當來安居得計理當來至夏竟方得分之以律不計安居未竟受衣故也既待夏竟此即時僧得也比丘語檀越當來恐賊難不能賞護若檀越教分隨施主得分此即非時分也問此律不許春夏冬一切時求索夏衣亦是亦受何因見論許春冬受答彼據施主自心布施此據比丘自往乞受故不同也亦應囑授後人受夏衣等三句者前一句如章次句未分便去囑後人受分無有為取者佛言成分應待還亦應的囑一人謂是慢囑之過也次句出囑授一人受囑者忘佛言成分是忘者過一部二部者約僧尼說也界得者及界即得下文當釋同羯磨施者一百四十五中隨因秉法有人即施同法之衆下文當釋也興念屬己者崇云此即是法既一人心念明知二人已上對首等法又五分二十云時舍利弗目連自恣竟於左右遊行同安居及近住處諸比丘多有隨從諸白衣見人人各念當為舍利弗目連施僧安居衣即便施之大有所得彼得施處諸比丘語舍利弗目連言共分此衣答言舍利弗等答諸比丘語我等不同安居正可得食無此衣分白佛佛言應盡共分已上律文問既復須作法及法方得如何身不及法開聽屬取答若望局法為正理無屬取義但於此處有安居勞不同外界之人故聽屬取然文此處安居不應餘處受衣者此是時現前非是時僧得有人助此處安居不應餘處受衣者此是時現前非是時僧得有人助此釋云若爾何故時僧得中但出心念無羯磨等且如非時僧得之中檀越施物具有三法已人物中但有羯磨無心念等令時僧得中唯有心念即是上下諸文互舉故也又有人言聽囑取者是時現前今詳諸師意者且如崇意時僧得中定須作法然但及法即開得分故引目連等為證也律中不許異界取分者謂是不許取時現前故無違也若當界人雖不及法然開囑取次又有人云聽囑取者是時現前故時僧中准及法得不及不得然釋不許異處取分義同崇釋今疏主意既文不許異處取分定不須法即由此義故開囑取今詳並是未了文意謂凡立教須制須開謂制貪心故遮異界或順施主亦即須開且如施主但施夏勞此則須制異界無分若其施主心為目連方及餘僧者此即須開目連得分故崇所引須開之教通判一切理不可也此律唯顯須制之教闕須開文理即須依五分開教如前崇引者是也僧祗二十八其意亦同故僧祇云有一比丘安居竟往本生聚落親里以此比丘來故廣設供養布施衣物此聚落中先安居僧以是坐後施故不與是比丘分坐後者坐夏後也以佛不許異處取分故不與也親里問言得衣分不答言不得諸親里言我為汝故設此供養何為不得白佛佛言檀越為此比丘設供養應與分又云若施家欲通與餘比丘隨檀越意應與述曰既本由是坐後施故不與分者即顯須制教復開檀越為故應與分者即顯須開教也若辨作法者理亦不定謂時僧得雖遮異界於作法中以法簡之理亦無爽且如羯磨法者應言大德僧聽此住處比丘大得夏安居衣物此住處安居僧應分若僧時到僧忍聽僧與我某甲某甲當還此有何爽設不作法異界無分直數人分義亦不爽何須廣諍故下文云一比丘安居大得僧夏安居衣物彼比丘應心念言此是我物若受若不受有餘比丘來不得分已上文既云若受若不受餘人無分故知作法及不作法皆悉無爽又作不作皆得囑取以羯磨中但與此處夏勞人故都無妨難何勞疑惑非時僧得義如向辨時僧得者義或不爾者重更分別也謂非時僧得定如向辨分為二分而時僧得或數人分故云不爾也數人分義如下疏中辨也可得言道二衆不合共作法故等者今詳數人分者好也准下僧破非時僧得云分二分時僧得中即言數人類知僧尼時僧得中亦數人好也今詳時僧從作法者數人分已將得歸作法亦得謂得夏衣已破下受云爾時衆僧得夏安居衣僧破為二部白佛佛言應數人多少分破已得下文云若未得安居衣僧破為二部白佛佛言應數人分或得已破破已得下文云若得夏衣若未得夏衣僧破為二部應數人分此上三句將疏合文可知章云次下三句約別人說者下文云時有比丘得夏衣往餘部佛言應與若未得夏衣往餘部佛言應與若未得夏衣若已得夏衣往餘部佛言應與釋可知並與去人分故皆以約時局處受人為定故者此中疏云並與去人分故者謂由文中與故顯下立理也立理云皆以約時局處受人定故謂約五月等時又局此處安人定故故文與也此意欲釋疏中兩個故字前三處法局定者前二是處第三是法也文有七句者下文云異住處二部僧多得可分衣物僧多尼少佛言應分二分無尼純式叉應分二分無尼式叉純沙彌尼應分二分若無沙彌尼比丘應分僧少尼多應分二分無比丘有沙彌應分二分無沙彌比丘尼應分得已破者應分二分下文云爾時諸比丘大得可分衣物僧破為二部白佛佛言應分為二分破已得物須問施主下分云若未得可分衣物僧破為二部佛言應問檀越若破言與某甲某甲上座應隨上座所在處與若言不知若言俱與應分二分第三一句得已破破已得同上二句下文云爾時諸比丘已得衣未得衣僧破為二部已得衣者應分二分未得衣者應問檀越若言與某甲某甲上座應隨上座所在處與若言不知若言俱與應分二分次有三句僧先已破約物故三下文云爾時諸比丘得分衣物者比丘從此部往彼部不應與分若未得衣從此往彼不應與分若得衣未得衣從此往彼不應與分所以須回此義門者前來諸門初明一部次二部三邪正今於此中先明邪正次二後一部一倍相翻也十律五十七有七句者彼云佛在舍婆提跋難陀死衣鉢物直三十萬金波斯匿王言是人無兒物應屬我佛遣使語大王賜城邑聚落等頗少與跋難陀不答言不與佛言誰力故令得生活僧力故得今應取王聞好教便止諸剎利言是人與我同姓同生同種是物屬我佛語汝等作國事官事問跋難陀不答不問佛言跋不在時僧不羯磨是衣屬僧聞好教止諸親族中表內外皆言是人是我伯叔父舅外生兄子是物屬我佛語汝嫁合同取與錢財頗待跋不答言不待佛言與跋衣食者應得僧與故屬僧聞好教止已上一句跋物寄餘處寄物處死處比丘各言應分佛言物處應分二句跋處處出息息處負債處各言應分佛言負債處界內應分三句跋處處出息餘處保任保任處息處各言應分佛言保任處分四句跋異處死質物在異處取錢在異處質物處取錢處各言應分佛言質物處分五句又出息作界作界處取錢處各言應分佛言手執界處應分六句又五十七云牟羅破求那比丘死衣鉢寄長老阿難牟羅在異處死阿難在異處所寄物處死處阿難處各言屬我佛言阿難所在處分七句祇律被舉比丘者彼律二十六病不應看得語親里看若無常者僧不應分衣鉢本不應與燒身取其所眠床以尸著上衣鉢繫咽曳床而出作是言衆僧事淨衆僧事淨於此人不應起惡心何以故乃至燋柱不應起惡應作是念莫令後人習此邪見若放牧人持衣鉢來施者得取即彼為施主已上祇文如文二句背正向耶下文云有比丘從此部往彼部未至便死佛言隨其所欲往處與爾時有比丘從此部往彼部至便死佛言隨所往部應與十律受法者謂受耶法也伽論第七云或破僧一切受法耶答作四句云何破僧非受法答破僧不受十四事十四破僧事法非法律非律等也云何受法非破僧謂受十四事養二俱句可知故受法者受十四破僧法也或可不定者謂准後引受法比丘不受法衆中死喚來取等進不也互背互歸者趣耶名背趣正名歸也第三文者據耶正互在死者此門中引三節文初引此律二句文次引十律求懺文後引十律喚受法比丘文也五衆前來者得輕物即入者時人皆不許今決許之如後當辨互債應同者謂互負物應互債取也若未殯多論云同常判第二已作殯入親里白衣者南山亦云薩婆多滅擯比丘死將衣鉢付生緣此並拾文不獲呵責等四者等取擯依止遮不至也別住之類並同清淨者疏以非邪見不同三舉然尋此犍度下文行波利婆沙摩那埵人同於清淨與其施物若七羯磨開置地與與施物時呵責等四既是不同別住等人故今已後應非一例故應思擇竪義此中懸解講隨文釋者下釋文處疏自辨云從亡人物義同非時施已來講時並隨文中解者意說上來亡人義門與檀越施義類相似且即略釋若欲講者待至下疏科文云第二亡人物義同非時僧得其文有二物至一切屬僧佛判屬僧第二諸比丘已下料簡輕重對彼科前即回上來亡人義門彼處竪之亦好也形前對後者意說作分竟與未擲籌體一名別也形前分時謂未作分始欲分也故名分得名作分竟對後擲時故名未擲也非謂初緣心念受者有人言為對古師也房舍法中俱五法者不愛等四知分未分也十律三十四云佛言應立分衣人立法者一心和合應問言誰能為僧作分衣人若有比丘言我能若成就五法應立作分衣人知衣財知衣色知衣價知衣頭數知與未與又有五法不隨受嗔怖癡知與未與一比丘唱言大德聽某甲比丘能為僧聽作分衣人若僧時到僧忍聽僧立某甲比丘作分作衣人白如是白二羯磨立還通四方等者羯磨文言彼比丘當與僧故知必須還四方僧今若不付別人誰當還僧若不與僧不得分故者不得私共別人分也無別秉法者有古師云其被差人復作白二分之故後文言持衣與一比丘令白二羯磨分今師釋意云後文云若有客比丘來若四人若過四人持衣與一比丘令白二羯磨分者謂須持衣與一比丘令僧作彼前文之中應差一人令分白二而分付之即是舉前白二之言令僧付分非謂此人更作白二也亦可具及兩法者計理不然如擲籌未竟佛令與今雖不及差人一法而分法未竟類亦應與若舉現前對僧得者謂對僧得以辨異也現前即以及施為定不同僧得也此文不言各各三語者文言彼此共三語受似是各各作也辭句如章義即不妨然須各各作者好二種分衣者猶是古義時僧得非時僧得各有法故尊者云准今師義除時僧得就非時中亦得名二種分衣檀越施及亡人物是也所以可知者吉是輕𠎝發恐𠆴衆自餘由無所對可得故並心念多知識者跋難陀者前引十律七句中前六王臣等索物文是也廣如十律者亦是前引七句文也第二料簡等者即是文言諸比丘分僧園田已下文是也謂料簡前十三章文也先須釋義如章四門後方釋文也今設言同活物已分竟餘屬亡人者昔時同活物是共有今死設同物須半分若已分竟餘屬亡人今詳同活自有兩種一者二人有物通畜謂一一人遍為物主二者二人有物共畜得利雖共用即平分若據後人得如章斷若據初人義恐難立謂如章中及以古來大家共許生依僧得死即屬僧亦應生依同活而得死屬同活此人生存於此財物不局攝半何因死後即遣半分若有救言二人同生云何不半應難彼言若局半者此人生存儻有因緣須過半用即應望彼第二人結損財罪耶故應思擇次解重輕有二第一義門分別第二依文料簡者今詳諸教辨亡人物展轉相違難可取定古今諸德無不壞疑釋者雖多疑迷本竟今且應述諸文同異略為四門一者輕重相違文二者分攝相違文三者諸部獨有文四者諸部共有文且辨輕重相違文者伽論第五云云何輕物謂金銀銅鐵床等金銀銅鐵器鉢衣物等是名輕物四分五十四七百結集中耶舍伽那子問離婆多言得受取金銀不答言不應爾問言何處制答言在王舍城因跋難陀制耶舍言毗舍離跋闍子比丘於布薩時勸檀越施衆僧金銀令分物人分離婆多因此廣集七百阿羅漢制為非法廣說如彼此與伽論相違四分四十一云彼分水瓶澡罐錫杖扇佛言不應分十誦二十八云一切石物不應分除瓶受二升已下及水瓶應分一切凡物不應分除分凡受二升已下應分水瓶此即分水瓶與四分相違祇律三十一云澡罐應分此與四分相違也又僧祇四分並不辨量十誦云一切鐵物一切銅物一切石物皆不應分除瓶受二升已下而此辨量而言可分與四分不應分相違十誦云一切竹物不應分除蓋扇僧祇扇應分此與四分相違第二辨分攝相違文者僧祇三十一佛在舍衛城有沙彌無常比丘問佛此衣鉢物應屬誰佛言屬和上十誦二十八憍薩羅有沙彌死佛言所著內外衣應與看病人餘輕物僧應分五分同十誦此與僧祇相違四分四十一有比丘被舉已命過佛言隨所共同羯磨舉偈應與僧祇二十六被舉人死僧不應分衣鉢置尸於所臥床上衣鉢繫咽曳出放牧人持衣鉢來施者得取與此律相違第三諸部獨有文者十誦五十六有為比丘看病人為取飯是比丘死不知云何佛言若病人先死後取飯還歸本處若先取飯後死應同死比丘物分伽論兩處有文同十誦說南山云令現前僧處分入重今詳若爾與還本處有何差別人復常式僧食分餐今令入重欲何所作一部文也五分二十一云有比丘水所漂死衣鉢掛著界內樹枝比丘見謂入僧界內應屬僧佛言聽作糞掃想取二文也第四略辨共有文者諸部皆有獨住死者衣鉢物五衆先來者與此等諸文不可備録為示同異故略録之於中或有作法而分或復直爾開其攝取既有同異乍難得意故欲分別略為三門一敘正義二顯昔非三隨事釋且敘正者通辨法相自有二門一約勝義辨一切法皆無定性二約世俗或有定性或無定性今此應依世俗門中辨定不定謂亡人物入僧輕重或更餘開或有定性或無定性何以然者由其此物性自無主但以五衆義同一家故身亡後判入五衆判入既定屬主性成若盜損者計直成重然於入中復有不定及有定義謂不定者或輕或重成更餘開皆無定性但由佛教立法差別故成不定謂或僧分判成輕重法雖在佛判則由僧臨事量宜重輕不定如或有時判扇入重或復有時判扇入輕義如下辨或有即由佛親自判開與別人無法而取如五分律水漂死者糞掃想取及如僧祇沙彌物等既有多門故知此物無定屬性由無定故判輕重時或輕入重或重入輕但違佛教無大重過若僧判說屬處已定後更互損此即計錢判定已後物物性定故由此應知判入之中復有如是定不定義不同古來諸師立義生存由依二僧得利死後輕物定屬現前所有重物定屬常住僧若互判計直成夷此中過難如後門辨既知物性無有定屬故今正義應開六門合為三對謂由異門說為無主或由異門說為有主復由異門說為輕物復由異門說為重物或復異門聽無法取或復異門制有法取云何異門說為無主謂以理教進退推徵生存既由比丘為主僧若奪取皆犯極刑那忽身亡即令屬衆若言身死為主義亡是故此物即屬衆者俗人死後應亦屬僧何獨比丘專令屬衆若言俗人不得僧利故於死後物不屬僧比丘亦應比丘不得尼利身亡之後物不屬尼何因有時物屬尼衆五分二十一云有住處比丘命過無比丘比丘尼應分若尼命過無尼者比丘應分諸律大同一不可也又生不依耶衆得利身死之後應不屬耶何故有時物屬耶衆如下文云從此部往彼部未至便死佛言隨所欲處與二不可也又生不依四衆得利死後之物不屬四衆何因有時物入五衆此下文云有比丘在拘薩羅人間遊行到無比丘住處到已命過若有五衆出家人前來者應與崇云但已俗人不知內法恐失僧物遣付先來先來得已應須勘問答若是比丘知本寺處送與本寺若不知者入近寺僧尼死亦爾又若取者要須加法既是僧物如何輒入難曰為由佛判以為僧物為由性定自合屬僧若由佛判是僧物者何不佛判即入先來若言性定自合屬僧五分尼分應歸本寺三不可也由斯多義故知此物本性無主故隨有緣隨入隨屬云何異門說為有主謂生既依二僧得利身亡之後不復為主故佛判令入僧受用如十誦五十七云佛在舍婆提城跋難陀死衣鉢物直三十萬兩金臣親族並皆來索佛言與跋難陀衣食者應得僧與故屬僧廣如上引七句文是也此中入僧由佛判入非謂其性本來屬僧佛既判已屬僧性定而於輕重或與與別人有法無法性即不定由定屬僧若盜此物即於僧衆應得不得計直成𠎝故善生經俱舍婆沙等經論皆言盜亡比丘物未羯磨前望十方僧得罪此意乃通十方五衆邊得罪復由重輕或與別人有法無法性不定故故若互判不成重罪何以得知輕重等性而不定也謂如伽論即許分金四分之中便遮不許十誦分扇四分不聽如斯等例並由機別佛本對機有開有制既通開制顯物無恆亦有別開聽無法取況於輕重性定何成輕重本來性無決定設令互斷寧犯夷𠎝古來平判云得重罪如後廣破云何異門判為輕物謂由此物本性不定有時為蓋亦許分金作淨受之方便開許如此律中開受藥錢房錢等類今此亦爾謂於住處儻金窮乏信施全無頓闕資緣因遮聖道故即開許為蓋分之如付法藏有應入聖而資緣闕故不得入對此等緣故應開許撿文續之由此經中不修道者不許飲水地不聽行若為解脫並即開許撿佛藏續之云何異門說為重物謂於住處淨財豐足信施易求受取金銀如日五醫貪心受取非是沙門律有成文涅槃明斷故判為重也云何異門開無法取亦由此物性不定故比丘路亡隨與五衆由本施主擬蓋沙門又衣鉢等非俗所用儻彼即用虗損施心又著用時監為標服由斯多過故與前來前來得已即為恩償謂若不償誰復肯來故此典開翻前多過謂令施福相續常生又遮俗人監為標服亦蓋道衆資道緣須故開之也水漂死者恐枉漂失為令不失亦即開之僧祇沙彌償師恩訓如斯等例隨事通之問比丘身亡亦聽師取答理亦應開且依無教判為不與崇云令和上處分與僧不入和上難曰文屬和上即令與僧糞掃想取應非自入云何異門制有法取謂除說諸無法緣理令僧中均分受用以法表均故須局法前來六門遮開不定隨應順教並悉無𠎝部別文殊雖言違背求其本意趣合無來並是世尊對機別說隨開有異部執便生生故涅槃三十四迦葉菩薩問涅槃後種種異執如來既有具知根力何故今日不決定說佛告迦葉善男子如是之義非眼識知乃至非意識知乃是智慧之所能知若有智者我於是人終不作二是亦謂我不作二說於無智者作不定說如是無智亦復謂我作不定說善男子如來所有一善行悉為調伏諸衆生故乃至善男子如來世尊為國土故為時節故為他語故為人故為衆故於一法中二種說乃至善男子是諸衆生非唯一性一根一種國土一善知識是故如來為彼種種宣說法要彼經第十七云善男子如來普為諸衆生故雖知諸法說言不知雖見諸法說言不見乃至三乘之法說言一乘一乘之法隨宜說三略相說廣廣相說略四重之法說偷蘭遮偷蘭遮法說為四重犯說為非犯非犯說犯輕罪說重重罪說輕何以故如來明見衆生根故述曰教意然根源無二不同諸師偏執一部未融本趣便互相非第二顯昔非者先敘諸師立義意者皆言生存依二僧得故今死後還入二僧故引十誦五十七文如前所辨准此文故應屬二僧輕屬現前重屬常住若其互斷計直成𠎝故下增二文云有二見出家人不應行非法見法法見非法乃至復有二見重見非重非重見重南山輕重儀云倒說輕重即壞二見又云諸律持犯互說是非物類重輕處量者衆但約之受體紛諍自錯即以此律為本搜括諸部成之則何事不詳何義不決又云執物案文不看他面乃至足遣犯罪極刑足除由來深惑又云今有檀行律教依論分全此文出摩得勒伽論也此釋迦葉遺部本律不至於此此由比丘先生天中故人資具非其所安常恩天中所有衆具佛令阿難給之一夕便登無學由此曲開也分全之徒妄行不了之教涅槃有言是為魔說又云何得依此律受戒而用彼部分全捨制而取開未識機教之通塞遍詳諸師皆云互判計錢成重今問諸師入二僧者為由物性重輕性定為性不定由佛僧判若由輕重物性自定則與經律皆悉相違若由佛僧判而定者從何計直而犯夷𠎝且辨性定違經律者十誦判扇何理性輕四分判扇何理性重若彼為是此部犯夷若此為真彼部犯重終無兩是定有一非若爾便違大集經說彼經二十七云如是五部雖各別異而皆不妨諸佛法界及大涅槃大集既明諸部皆是寧容性定合有一非又文殊問經下卷云佛告文殊師利未來我弟子有二十部能令法住二十部並得四果三藏平等無上中下譬如海水味無有異乃至偈云摩訶僧祇部分別出有七乃至無是亦無非我說未來起又南山云約之受體紛諍自銷又云何得依此律受戒而用彼部分全者今亦反難因何彼部開登無學而獨此部遮入聖階又依彼受即許取開何因此受獨令專制又彼受戒即許分全何容此受獨成魔說作淨而受諸文皆許又摩得勒伽論首題云薩婆多摩得勒伽論何因乃判釋迦葉遺故並非理故今詳釋開制即同制但可隨機取捨開制不應約受僻執偏行物性重輕由佛僧判或輕或重臨事商量則遣雙非而成兩是且如判扇不備冬須故四分中令其入重必至夏熱分無亦事故十誦中可分物攝又水瓶澡罐人皆先有故四分律判不應分儻若先無許分受用故十誦律除取二升此例煩多隨應通釋並無違也由此應知判乖教意並不𠎝也第三隨事釋者謂隨物類判成重輕也雖諸部文重輕無定法相理有隱顯別通隱謂曲開顯謂多分通行故簡分全名為曲為令分淨物判作通行無法之開有法之制曲通差別例此應知必有曲緣不應遮止如遮食肉判入五耶下為重輕及屬不定故隨所許並順聖心且就通行制輕重者由性無定應求佛意謂輕物者隨身輕要資道緣須外不招譏皆成輕物除斯以外纍重長貪外招譏醜皆成重物何以然者出家同法義等同生既已身亡資財散與譬以俗家一人捨壽資財衣服現在同分佛意亦然為益弟子但可要用皆遣現分諸不可分貯令衆用由此應知教無賣法今時行事賣而取錢無曲開緣而行此法甚不可也復由此理非由在日得利依僧及至身亡衆僧須奪由此蓋尸亦須准教寧容亦露頓阻人情但以身亡事同瓦木多與無益應少隨宜故五分比丘命過露其身者突吉羅應以衣覆僧祗二十八比丘曠野處行遇尼病應看廣如彼說若尼命終彼有衣鉢應雇人闍維此則理盡無勞卷軸梨樓牛畜穀帛錢財瓦木椽棟盆甕釜護歷物別數積以繁言執物案文其言有失何以然者物無常准畜用不恆筆寫終身未容備盡曾聞京中諸德聚集議判輕重有一鉢中小銅盤子時人號為衆生盤子教既不載章抄復無量久躊躇無人敢定有一師言且斷入輕復有問言准何理教此師答云但使入輕何慮有罪設若有罪某甲自常又有念珠亦懷疑惑如斯物類寧容備載但應求意隨事自通且如盤子畜不招譏儻濟時須入輕無爽必若無用入重無事如是會通一切無擁驗心順教不咎當來必縱貪癡畏途長苦耳既識意已方用諸師記録而判儻彼不載以前意通方為盡理也次隨疏釋六物者若准十律二十八云先與看病比丘六物餘輕物僧應知僧伽梨憂多羅僧安陀會鉢漉水囊尼師檀也若准此律義立六物謂衣鉢坐具針筒盛衣貯器如後常辨六畜者鄭玄曰六畜六性也謂牛馬羊犬豕雞為六畜也俗學者釋雖標六數今此中意通一切性於中若是牛馬之類堪僧驅不涉譏過義得入僧雞犬豕羊鸚鵡之類於僧無益不須籠繫若能飛行自活者放去准祇律三十三不許受此等施故宜放去如上盜戒中引文猫狸之類衆僧共畜共犯煞罪法法有之自招殃咎悉宜放去不得轉施故於此中應細分別不應總判以為入重疏云初六合以為三下九與十合餘五還五總作九門判之亦有疏本云初六合以為三下七還七總作十門作十門判之者是初出疏本也疏主後改不取之也謂溫屬藍為一文也別房房物為一文也斧鑿等及重物為一文也以此六文兩兩相似故合之也第九藍人第十車輿其類相似亦合一文也同前袋具者前言粗障等是但是同前莊具之類皆不應分也十律半升已上者十律二十八一切角物不應分除受半升已下一切皮物不應分除盛蘇油囊受半升已下自餘一切鐵一切銅一切石一切瓦皆言不應分除受二升已下南山云此律言瓶不出升量致令傳習斷入重收宜從下誦准量斷之尼說淨畜僧則任儲今詳若由說淨而畜即分者錢寶亦開說淨應許分之故知意未通也第八伊梨延陀者據十三章即是第八若據九門是第五也南山云伊梨延陀者如來膞相如伊梨延陀鹿王膞故知是此鹿皮也耄羅耄羅者並是獸名狀如虎兕皮厚毛耎西國有之此方既無故存本號古人何為言步障等南山釋古人意云初則伊梨阿陀豈非障相次耄耄諸羅豈非大小帳也帳似於帽故云耄羅用此當司一何可笑南山廣破如輕重儀氍氀者南山云余昔以為量同三衣故入輕收被之屬並皆例此乾封年中冥感天人云是曲開寒雪國服中國不開以其中方自有法衣並入重也今詳彼意此國既有法衣故不開著明須入重也然詳羅漢獨有無知况彼天人智劣人類未足信也覆瘡衣未必須依五分斷之疏云第九門奴婢者據十三章即當第九若據九門應合第九第十兩章為第六門也疏云第十二鐵作者據十三章當第十二據九門當第八也此既無文入重無妨者入輕好也與能供養者意說此人生存若是財物攝者可判入輕若有寶莊入重也若本決定捨擬供養與供養人也下文分俱夜羅器者即次此後文也此母論說者母論第三云有一比丘獨別住處得病命終此比丘所有衣鉢資生之具應屬現前僧已上論文疏主意言私莊亡者屬現前分良由有守護也聚落中者即與五衆故彼論即云若比丘獨在聚落中白衣舍命終後有五衆隨何者先來與之等也文言不敢與比丘尼非衣者有人云上文云以非衣作鉢囊故知非衣不是鉢囊今詳非衣者總含一切不作衣用即鉢囊亦是非衣也文言無恚樹者令人歡喜故名也文言中的的明也謂的然明見也文言摩呵男是外祖父者五分二十一云時舍夷國猶遵舊典不與一切異姓婚姻波斯匿王自恃兵強遣使告言若不與我婚當滅汝國諸釋共議當設何方勉彼凶虎而不違我國之舊典僉曰正當簡一好婢有姿色者極世莊嚴號曰釋種而以與之如議即與波斯匿王備禮娉迎後生一男顏貌殊絶字曰流離已上律文故今文中號摩訶男為外祖父也文言昔日所造定果報者增一含二十六云告諸比丘昔羅閲城有捕魚村時世極飢人民之類往至池中捕魚食之有二魚發願報怨時村中有一小兒年向八歲亦不捕魚復非害命然魚堓上皆悉命終小兒極喜爾時閲城人民今釋種是魚者流離王是小兒佛是我爾時笑之今患頭痛如以石押猶如頭載須彌山五分二十一目連白佛聽我化作鐵籠籠彼大城佛告汝神力何能改此定報佛記琉璃却後七日當受害學人罪眷屬大小亦復并命王聞心念佛無空言餘苦尚可唯畏火燒即與眷屬乘船入河七日期至水漲覆沒一時死盡濫非親故者若許大親取雜碎物恐濫小親聽取小物理實小親全不許取也五百行罰者報恩經云佛見此人病將四部衆放大光明往病人所言我今報汝恩今報汝恩手捉瓶水澆病人身其病隨手即差比丘言身病雖差心病未除佛為說法即得羅漢三明六通具八解脫諸比丘問佛向者何恩言報者佛言昔有一國與一五百深心相知委其治罰其人得物即放不得物者種種苦治或有致死時有一憂婆塞犯小罪令當治罰當時五百見是善人即令放却當時五百今病人是是故告言釋汝重恩撿文勘祇二十八云行至曠野同伴比丘不得相捨應當將去代擔衣鉢若不能行賈借乘馱不得載牸牛車乘草馬等當載特牛父馬等若病篤無所分別者趣乘無罪若乘不可得者應留看病人汝看病人我到聚落當求乘來迎應留糧食使住者不乏若各言誰能棄身命於曠野無肯住者不得便爾捨去應作菴舍草蓐作烟火與取薪水留時藥夜分七日盡刑藥語病者言長老安意住我到前聚落當求乘來迎到聚落中不得繞塔問訊和上阿闍梨應語聚落中諸比丘曠野中有病比共迎去來若言在何處答言某處若言彼處多有虎狼恐當食盡萬無一在雖聞此語不得住要當往看若遙見烏鳥不得便還要到其所若已死者應供養尸若活應將至聚落語舊比丘言長老此是某處病人我於曠野供養已今至此次長老看若不看者越毗尼若無比丘語優婆塞曠野有病比丘借乘往迎迎至檀越家安別障處共勸化衣藥食等若客比丘來不得便語汝看病應言善來代擔衣鉢種種供養已應語此病我已看久汝次看若尼行病不得捨去將接法如上唯除抱撮若須按摩油塗身者應請女人為之若無常者彼有衣鉢應雇人闍維若無者應捨去有俗人嫌者若能作地想應擔著遠處善生第三瞻病之時不應生厭若自無物應四出求求不能得三寶物差已依俗十倍償之如匿王正法若不能償當教言汝多負三寶物不能償當勸修得須得陀洹至四果若能至心發菩提心若教千人於佛法清淨信若壞一人殷重邪見是二人俱得無量利益謂隨一事非是俱作見論云若病無湯藥得以華果飲食餉人求易湯藥不犯文言靜坐止息內心者謂思無常苦空死想等觀不應惶懼專唯畏死也五分二十云不能恆觀無常也竪義總說者定同生義應取上義門屬授取下輕重取上賞分取下皆應了知恭敬受念我者謂生存想愛念也勞不滿者無按摩等勞也俗人無有說與沙彌法勞三分之一等者並五分二十文也祗三十一云若比丘無常若般泥洹不應便閇其戶章云即問非是依文也依止弟子可知應量影並祇三十一文彼云或值死不值羯磨有值羯磨不值死或有值死值羯磨彼無第四句蓋以易故不論對人多少者僧位已上必在作法三人已下通二界也文但有兩者闕差人白二也如僧得施中說者如上應言大德僧聽某甲比丘此住處命過所有若衣若非衣現前僧應分若僧時到僧忍聽此住處現前僧應分白如是羯磨准白成隨作三法者四人一羯磨法三人二人兩對手法也然以衣賞者和取賞也由不得作羯磨故物有好惡者如下文上看與上三衣中下准知故也第二文對物於中五門者此之五門即是上義門中第三物分別也以第四門釋文好第三約德者文是第三也即是上義門中第四義門也邪命悕望者謂因此望衣食等也樂福自是求福故不應取取不成求福義故五分二十云有諸看病人或為病人或為私行乃至疏釋云上言具五法者是有謂究竟看病者方具五法也彼律五法與此大同不繁録之囑授三門釋義門說方隨文釋授而不須囑者謂不要假囑也又此門中總有三句一囑二授三囑復授闕第四句尋之可見不可移轉者不同絹布手付擎將又無改變者令決定故名無改變也若以第二等者於三句中以第二驗餘兩句也次句與如未說淨者如是而也並祗三十一也五分白二與之者彼二十云大德僧聽某甲比丘於此命過生存時所有若衣若非衣現前僧應分今與某甲若僧時到僧忍聽白如是羯磨准白成不同祇律者不同作淨方得也五分以衣覆之者二十一文也今詳決用亡人衣覆不得用袈裟也不須和僧今三藏亦聽以亡者物葬送文言結縙而容反毛罽也字正體㲨也罽是毛布也五納衣者五色納成也販賣乞得者非親居士邊乞得也文中先明犯捨第二明波利迦羅不現前第三明不敢以捨墮衣與人等章云不犯小罪者著用小罪第四明奪衣等聽著疏云無長過者若先未滿十日取著更不須說淨縱先犯長衣取著捨墮衣小罪第五明買易章云亦可前不聽者前第三文也後聽著同者指第四文也第六明淨施等章中不釋章中最後釋婆利迦羅不現前者次第也同五事之疑上皮革法中開受戒重革屐數洗浴皮臥具有比丘異方聞後住處得衣不肯受恐犯捨佛聽得衣入手數滿十日若過應捨已懺悔述曰身去之後有人與衣或付弟子或付同房從付日後縱經多日理不犯長初緣未曉請問世尊佛遂為決得入手已方數十日今此文中疑不現前得尼薩不佛亦為判言是不犯同上文也第六愛護臥具法中律文云移臥具時畏儲體等者謂以國亂恐人見故衣十覆之或復衣下坐之餘人不應驅起尋文可見此文開受夏衣應最前明者謂意云初緣總開方因此故有現前僧得之別是故開文應最在初也十誦二十七云跋難陀夏後月案行諸精舍欲知何處安居比丘多得衣物布施有二老比丘遙見來起迎問訊小默然問言是中僧得衣物不答言得分未答未分二老比丘問汝能分不答言能是中應作羯磨即持衣分作三聚是二比丘間著一聚自於二聚間立言汝聽羯磨汝二人一聚如是汝有三兩聚并及我如是我有三問是羯磨好不答言善彼言上坐我等諸衣物未分跋言我與汝分知法人應與一好衣彼言當與跋於聚中取大價衣著一處餘與分作二已自擔多衣入祇林佛乃至呵已告諸比丘過去一河曲中有二獺河中得大鯉魚不能分有野干來見言外甥是中作何等獺言舅此鯉魚不能分不野干言能是中應說偈野干分作三分問汝誰喜入淺答言是獺謂指某甲獺也誰能入深答言是獺野干言聽我說偈入淺應與尾入深應與頭中間身肉分應與知法者佛言二獺者二老比丘是野干者跋是呵已制言不應餘處受衣分得突吉羅文聽囑取等者有人言有三義故一無是施物界內人二身同受施三有安居勞若爾界外有勞亦應囑等答闕餘二義故不得囑取等也此同祇律者祇二十八云無常者死不應得分安居衣已集雖未分命垂終時囑與某甲死已應與是名無常彼律別無常破安居等章門云不應得得此是釋無常章門也五分二十云有諸比丘得安居施未分或有命過者佛言若生時已與人應白二與之若生時不已與人現前應分已上二律文章云五分應取一分等者誤也祇五意同謂不成囑並應僧分若其成囑自與所囑人也文言若受若不受等者釋成無作法義也直是刀刀者古云文云心念故知作法若爾何故文言不應異處受衣分答此對時現前故制不聽也若爾何故囑取答如祇分亡人物時不值羯磨或俱不值不應得若為病人求醫藥若為塔事去應與出三十一卷文也亡人之物既不值法而彼聽與何妨時僧不值聽囑若爾何故但有心念法耶答如上非時僧得之中具有三法亡人物中准有羯磨今此唯有心念法影略五舉故也言刀刀者祇為看病雖出得賞餘非看病出即不得今時僧得一切僧中隨人出去即聽囑取何得相類亦是斷簡前施法者謂是斷簡上來兩大段文也體唯是一者唯是心所法中無貪一也隨施具者諸身口業具也不論內者非捨身肉等施也即是攝施不盡義也約第二門釋文也後二僧得者時僧非時僧得也前二數人者時現非時現也義收下三者下三衆也見論十七云受施有十五處一者戒場者前已說論中自指上說戒法中已釋極小容二十一人等結法也若人言布施戒場布薩界不得二者境界者或在講堂或在食堂分衣健人二擲石以還隨界大小皆有擲石界比丘及擲石處皆得分三者布薩界者若人布薩界者皆應得分同利養界亦得是名布薩界四者不失衣界者入不失衣界內皆應得分布薩界利養界俱得唯除布薩界中有聚落界不得是名不失衣界五者羅婆界者若王或大臣為比丘作住止意或十由旬若竪柱若作標相齊此標相若有布施皆屬我寺是名羅婆界六者聚落界者有市故名聚落界聚落界中有布薩界大小皆得七者村界者無市名為村界村界中有布薩界大小皆得八者國土界者有城邑名為國土界國土界盡得九者阿槃陀羅界者阿蘭若處界也阿蘭若處得餘處不得十者擲水界者是船界入擲水界內得餘處處不得十一者鄉居界者隨城東西名鄉居界鄉居界中有界亦得十二者那羅界者是國土界也施那羅一國土界亦得十三者阿羅闍界者一王所領一國土衆僧皆得是名阿羅闍界阿剌闍此翻為王也十四者洲界者海中一洲是名洲界若言布施師子洲閻浮利地洲二洲衆僧隨有多少應中半分閻浮洲五人師子洲百千人亦中半分十五者鐵圍山界者是鐵圍山界又云鳴磬集衆外比丘來相連臂入乃至百由旬前者入界內最後者亦得何以故以相連不斷故束為頌曰場境布衣與羅婆聚落村國阿槃陀擲水鄉居那羅界阿羅闍洲及鐵圍或一部界得或二部界得者若二部僧於十五中皆分二分若唯約僧或唯尼衆入洲界中應分二分如論明文以望洲故自餘計理並數人分同羯磨者百一之中隨同秉法而得物也二部者如尼二部受戒因即得施也計理亦是數人分也第五大段淨施法者上科文云第五冬月已下如法受用淨施之執最後六中章云前三成受下三不成受者誤應言前三不成下三成也藥楗度第二衣者一糞掃衣二乞食三樹下坐四腐爛藥第四此犍度明之也修步等並見論十七翻名也蔓菟者見云那㝹者此是外國藥無解佉闍尼者見云一切果名佉闍尼呵梨勒者見云大如棗其味酢苦服便利醘勒者其形如桃子其味甜服能治漱阿摩勒者此是餘甘子也廣州土地有其形如子大已上並見論文質多羅者是外國藥罽沙者見云加婆藥者是外國藥論言芥子並見論也式渠者見云外國藥能治毒漢地無有帝兔注中底吐反音者傳寫之誤直是底兔之音非是翻音也見云烟藥等如章又云陀婆闍那者陸地生耆羅闍那者水中生五不淨肉者象馬龍狗人也犢唌疑者初文但言聽食種種乳此中恐有犢唌故疑不食此同罽尼之疑也伽尼者見云此是蜜也此蓋謬翻伽尼即罽尼是罽尼米末也五分二十二云阿那律見作石蜜時搗米著中佛言作法應爾也餘翻並見論也此文若見已腐爛藥墮地者受服未墮地不須受明知是大小便崇不許也祇三十四若祇毒賢言應服大便汁若自已許不須復受若他許者當受又云比丘病賢教言當服小便者不得取初後應取中若自已許承取即名受若在地及地許當受已上律文與此律義同也見十七云閻浮子者其形如笊大紫色酢甜章云婆師者律文云波樓師漿見云波漏師者此似菴羅果一切木果得作非時漿唯除七種穀不得一切葉得非時服唯除菜不得一切諸華得作非時漿唯除摩頭華計一切果中唯除多羅樹果椰子果波羅捺子甜瓠冬爪甜𦬔此六種果不得非時服一切豆不得非時服十誦二十六云若蒲桃不作火淨若汁不以水作淨若汁作淨蒲桃不作淨並不應飲俱淨應飲祇二十九若漿來者應作淨若器底有殘水即名作淨若天雨墮中即名作淨若與時食雜應記識云此中淨物生我當受伽論云要澄清除滓如水若有濁汁咽咽提並如上七日藥戒詳說文言盧夷者即是衣犍度中樓延也計理彼處阿難作親厚意取衣是此文之後也往作錢處者謂客作也別定上二者一經行處等定處也衆中已下定法也上文因諸比丘持食著露地牧牛羊人持去聽在邊房靜處結作淨厨又即此處前文聽在藍內結淨地也䊩正體應作潘敷煩反字林術米汁也江南名潘關中名泔律文作䊩非也引證可知者即上文不應界內宿煮次此前文藍內白二也久居譏過者久居對作法界譏過對藍也結淨意等等取釋名也有疏本云食不生罪稱之為淨中二自然體無二內意說他處及籬牆不同既無結法故別論也此之四種從處障名又有疏云食不生罪稱之為淨從處障名義並得也淨種有四如文所引謂一者處分淨二者他處淨三者籬牆不周淨四者羯磨淨已上兩本疏檀越意受者上文旻荼居士持食與比丘佛言自今已去聽作檀越食受令淨人儻舉如送食者下文客比丘來覓淨地安食未至明相出佛言淨欲遠行亦如是遠行者謂行求出界也勿使過初夜者此律護明相祇護初夜故不同也道俗不同處分通道俗衆有多少處分通僧衆多一人僧別處分通僧別也羯磨必唯局僧第二淨周而非自者疏意云若不周者即是第三攝故故必須周也第三自而非周者疏意云若是他處即第二攝故必須自也此中決無作法界若有界者逈處向須結法初一俱是者疏意云若周若自隨闕一者必非此攝故要俱是也第四不定者或周或不周或自或非自以其比處但由有作法界故須結淨不由周不周等也如文比丘房等者次下文也二是他物者理有三他謂他處他食及俱他也初四作法有彼此之別者淨三藏釋不周此也彼云未作淨前周界宿者或有煮宿既其加法共宿無宿總唱一寺以為淨厨房房之內生熟皆貯僧不護宿無貯畜𠎝西國相承皆結一寺為淨厨也若欲局取一邊並在開限對北東為下者古人意言西國多有北東二風即南西為下風也今詳西方寺門多有南東二開既取下風故南開者厨在門西其東開者厨在門南也第二結法門中先解諸部疏引五分初至此等謂淨地法者辨結法也又言比丘已下辨甄淨法也又言新作住處已下處分淨也若未羯磨比丘不得入已下又辨甄淨也今恐不然此蓋同淨三藏許遍寺結然言除某處者謂一寺中除去少許不擬作淨設若總取即不須除某處也此文出五分二十二文次辨祇律且疏意者若不作甄淨法者僧於中宿過初夜即犯宿也今觀亦須同淨三藏謂未結淨僧不得宿結淨之後雖宿遇然言爾許作僧淨住處者僧意不欲作食厨故若儻總作不須此言然上代來多不許也次辨母論疏引彼論第八及第二文也且隨疏釋者以有此法宿無宿過故名淨處等者意欲會釋母論第解界已後先結淨處此淨處言由宿無過故名淨處然體即是甄淨法也疏意雖爾彼文言羯磨淨厨處既有厨故知非理復以安僧處故等者意欲會釋母論第八名淨地與第二卷名為淨處體正是一而名有異也亦順四分等者欲意云順四分結界之後有宿煮過故須結淨也聽結淨地者由有淨宿過所以聽之釋疏既訖詳此母論文某難識今且略辨母論第八六種法中處有同別一不淨地謂是廁屋等處也二僧房舍唯擬止宿三大界唯擬秉法此處蓋除淨厨之外與餘五同一處也四淨厨似在界外五布薩處即說戒堂六不失衣界必須大界上結也彼論淨厨許自然界中秉結法也彼論第二文者蓋應先留淨厨之處已外方結僧房處等若忘不留復無別地故宜須解大小界已先結淨厨淨厨外方結諸界也必應如此非謂甄淨也先後俱得者初造寺時或復後時結法皆成不同餘部要未經宿故下文云若疑應解然後結故知許數解結也淨三藏亦不許經宿必是部別也先問除一處今復除者先已僧宿者謂如先除東南淨地今即除其西南淨地其西南地先已僧宿也答中意云以前東南既被除故當時西南有法處宿今解法訖故更得立淨厨也處分及結法如文者顯自部法若是單藍唯有第三者此應四句分別有藍非第三藍周者是有第三非藍文言無籬障是有俱是易知有俱非逈界中結淨地是也今疏取第三句釋前問也此中意辨用藍力作而說為有故云若是單藍唯有第三也不遮不用藍力作者在藍上有也如處分淨非藍力作豈遮藍上有也若當單界唯作者在藍上有也如第四而無力作第三也餘可思知若通辨者通據有力無力說也初二淨地通兩處者亦應言第三局自然第四局作法也十律俱第二者但地處也利昌梨車是也非時雲起即過午時也瓶王為寺主死即世王為也五分二十二諸比丘得秋時病為合湯藥作隨病食故時非時皆入聚落遭難有一織師中路起屋於中織作見諸比丘便語言若有所作可於此作欲有所留此佛聽白衣舍作淨屋遂傷兩亂主人妨其織作織師念言我本為織今既不得織便當施僧作淨屋即以施僧佛言聽於施僧淨屋中作食以望僧等者一向唯於淨地中辦也謂於淨也取食成淨僧宿成過非於淨地攝僧秉法僧來成過此意云望食成攝故是故復成障望僧無攝義障義自然無也時人多解唐費功勞並宜云二十之釋文中處分淨者見論十七云若初堅柱時比丘捧柱而說為衆僧作淨屋如是若說一柱亦成淨屋若已成屋應喚屋主語言此屋未淨汝為衆僧作淨檀越作是言此淨屋布施衆僧隨意受用即成淨屋若先作屋無屋主者聚落中有老宿應喚此屋未作淨請為淨主檀越不解應教作是淨此是淨屋布施衆僧隨意受用即得無內宿無內煮罪未滿不是應羯磨結者細觀五分二十二若年未滿亦不得羯磨結不能繁敘轉易不等物廣說如常者如一住處先不護淨律師至已為結淨地教作換淨十誦第六十云諸比丘徑過大澤從價客乞食客言汝知此間食難得何不自擔白佛佛言從今日聽自擔糧從他易淨食乃聽噉不易不聽噉諸比丘欲易他不與言汝食中有何不可故易白佛佛言從今日清淨故與與竟不還白佛佛言當從乞取見論十六云若衆多比丘共行唯有一少沙彌比丘容自擔糧至食時容自分分沙彌得分已言比丘言今持沙彌分已復持與第二上座如是展轉食皆無罪若沙彌不解法比丘自持食分與沙彌易如是展轉皆得換易不犯共宿惡觸若比丘擔米行沙彌小不能作食比丘得自作唯除不得燃火教沙彌然食熟如前展轉換食不犯自作食若佛湧出比丘不得用氣吹持物挍皆犯吉已上論文蓋以氣吹等是惡觸若換淨亦應得唯此律論既聽換淨尼與比丘既云非觸若有殘觸米麵醬等斛升相當展轉相貿並得成淨瓦器應承令其膩出銅石更磨澡豆洗之木器刎削倉窖更泥鐵器燒之並得成淨罪名位等者同犯吉羅齊等也此意說言此一犍度大分明四上文阿難自煮此六段中段明觸第四明二內也餘段即是相須故舉也身作業體謂作無作也食體謂四大四塵等中以何為體也故今直約人具非其人處淨不淨地類觸爾者下文比丘移菜以重生故佛聽食之故知長未足時運運更生即無惡觸長足無生即是觸也宿亦應爾須知合結者臨未熟前結而成淨若已熟竟結不成淨已犯宿故結法自成物已犯宿祇四句中三俱不淨不淨不得食者應言成淨不得食好也今詳但使變生為熟即名自煮非由有生性也且如米麵雖無生性而不許煮也此以營造招譏故也故文言觸者是不淨者下文有比丘先相嫌觸他食作如是意令得不淨等也懸置等類下文蓋蘇油瓶無無淨人聽懸放蓋也對上二觸者一不受而捉二失受也廣說可知者既言對事分別食中器具事有無量廣說准知也對戶鈎等者下房舍法云彼比丘疑不取捉衆僧戶鈎籥若環若朼角勾若銅勾若浴床佛言聽捉者謂據無食膩者若有食膩即成相染也始終俱有四過者若無法藥理即同食時與非時皆容起四今時法藥以對食辨故即不同也生相生者如果菜等生熟生者如米麵等果須火淨不犯壞生米麵須火淨不犯壞生故別論之應同自煮者若據造作應同自煮唯是局生然以聖教一切不開自手觸故故通生熟即不同也局生生盡者於生中生相生熟總禁盡也若任運手口者約任運失受為語也宿自局具者自是自煮也淨不淨相望者淨地不淨地也二作淨中者處分羯磨二作法也淨地不攝人者不攝得成別處也然宿不定可知者償人食俱在二作淨地亦成宿過食在二作人在淨外方無內宿也二自然淨人食俱在尚無宿過食淨人外理即無疑也此三義者一別罪釋名二辨體相三明通塞也次釋文者取上六科來釋之義同從他新得者是不覺墮忽然見在淨地也若反前說俱成不淨者謂反前句即是作意欲使墮故不淨也若反第二句即是樹根在不淨地果墮淨地復有心同宿雖果墮淨地即是不淨也若順文說得成兩句若反說者阻是以句義相似故初句據熟故不淨者若其未熟全在不淨地猶尚是淨況論相入耶次句熟生者若熟竟隨淨不淨地分齊成淨不淨也此文創淨即五分淨傷淨也不中種淨即五分未成種也謂未熟未堪為種子也但淨一即得者要聚一處相連不斷淨一即得絶者須別別淨也文言食不破果等者謂先火淨食而更生雖復更生不破生法此釋疑故來也遇緣非觸意說先雖曾受以未作淨令淨即是遇緣失受得更受取不成惡觸文聽食故水洗連根菜章釋意者先曾火淨今更水況恐水滅火比丘生疑等今謂不然水洗者即是五分水洗也謂水中揉之故得成淨也文言雖小離食器草者暫縮鉢離受食淨草也縱己多著成受非觸也釋有多種者古師一解宿相是共謂人食共同一處但有界壞其淨地無界攝食是以犯煮相是別謂煮人白別我但看之故不犯煮有界攝食便無內煮是以不犯又一解云宿是人食同處招譏過重故即犯宿看煮事不經久生過處微是故不犯更兩解如章此謂不淨處無比丘無宿過者對煮辨異也比丘難信者恐犯非時食也恐有譏嫌者恐外謗非時食也不對造作等者對煮辨異然言無證者不同煮中決定別有淨人者火食煮即有證宿中不得定有淨人故言無證然而縱證豈即免過且約不定以說無證煮及看煮俱不成內煮緣也此之二句重料簡觸者錯受油等三句合為一不成句并忘受句為二也事八種五者合四種餘食法為一故成五也義兼惡觸者不數在數也殘先不淨者意說開不重開也對外失食者內宿對非內乃至不作餘食法對作餘法皆容他損食也恐濫外壞者恐不為食而外用中犯壞生也計理欲食生菜自以火淨方免壞生也淨不淨間者食壓兩界亦得名間何勞別釋第四文中一客比丘從外來二行求出界也濩大便道母論云得蘭往往間之理須慎之內舟之類斯亦是犯若餘藥不治即開也迦絺那衣犍度迦絺那者明了論疏翻云此名堅實作此衣時多所成故言堅實一切堅物皆稱迦絺那如人煩惱強盛名此人為迦絺那心人也言難活者如有貧人資生短𨷂取活極難貧人若能施物入此迦絺那衣功德果報勝以衣聚如須彌山作餘種彌佛別貧人令行此施故偏就貧名為難活也章云賞善等相傳義言非正翻也罰謂後安者以文言有迦絺那五月後安無五月故知不獲利也南山云前安人七月十六日受故文言冬四月捨後安人從七月十七日已去至八月十五日日得受故文言即日來不經宿若爾何故文言有迦絺五月有古人釋云月雖不滿何妨得受謂後安人但得四月利之今詳見論十八後安不得伽論第七無臘破安後安餘處安擯人並不名受且依伽見論好也五事中不失衣者唯許離伽梨不許離餘二也其伽見二論亦有疏云但伽見二論相似並得也十誦三十九亦云餘處安居不得此處受德衣行別住人尚不得受餘羯磨決不得也然須五人者一人被差是所斯量不入僧數故也如四僧中者如下瞻波四種僧義中辨也祇律不別差守衣人故一人得獨受求得分別如文者謂邪命等也見論十八云僧持迦絺那衣與誰應與衣壞者衣壞者多乃至又云不得與慳貪者准此是持衣人非是分衣與衣壞者等此律但言羯磨差人者如下文云若得未成衣應衆僧中羯磨差丘令作見論十八云昔蓮華如來與一萬六比丘圍繞共作迦絺那衣謂敬重此衣故十律六第二十九云與四了了能作比丘令浣二也裁割一也染三也簪刺四也安隱五也量度六也一一生念我以此衣作迦絺那衣受不生此六心不名善受十律五十四優波問難事中云浣時染割截時簪綴時連縫時量度時此六心中連縫即是安隱也覺云彼律無安隱即是五十四文然二十九文有也故應是撿知之體如者非生疏考布等舒張等六文言應白浣一也染二也舒張三也輾治四也截作十隔五也縫治六也示納褋之方者觀文以是檀越施衣須褋作淨若糞掃衣浣已納淨也以持開故者開中之重故曰持開也五邪命者智論二十二云一為求利養故常威儀詐現異相二為求利故自說己德三為求利養強占他吉凶四為求利養高聲現威令人敬畏五為求利故稱昔取得以動人心激發令施餘可知者前科為七事五事並釋訖尋之可見即指第六第七為餘也餘二可知者於上義門之前衣體亦三初衣財體如二衣財體不如三舉前體如應法合受初既釋竟下二略指故云餘二也餘釋並尋上科可見也文言界外住自受衣者自受檀越施衣等也正受衣文四者若欲行事者若得未成衣有人言准見論十八一切僧共作不然准此律中羯磨差人豈合羯磨衆也故不須准見論也應僧中羯磨差人令作羯磨文如後當辨差已令即日作成若得已成者應取橫遂長牒二尺一綴如是五綴四牒置好箱中放上座前或放能作羯磨人前祇云應劈牒箱中衆華散上次作和僧單白先應鳴鐘集衆令坐一處被羯磨治人等自合別處坐破安等類離復亂坐但不發言即是不受無勞別坐離復不受亦須盡集或復與欲不爾不成索欲問和應答云受迦絺那衣羯磨作羯磨者即作單白如初文是作白已應問僧言誰能為僧持功德衣能者答云某甲能持次作白二差持若別問答應答言差持功德衣人羯磨白二法如第二文是章云十律簡德者十律二十九先立五德者不愛等知受為僧受迦絺那衣唱此兩段大竟章中即作問答云問自恣所以差先等彼受差竟從座起至僧前禮之已於羯磨師前互跪合掌聽受羯磨僧即羯磨以衣付之若別問答者答云付功德衣羯磨其羯磨文即第三文是然文中誰諸長老忍已下一少句文謂少於此住處持古羯磨本有之結中雖少義即可通成可足之亦好次第四文章中分三三中初文者此人既已僧付衣竟即應起手執衣箱至上座前互跪頂戴已授與上座上座亦頂戴還授與彼如是至三置箱在上座前手撥華開右手執衣四牒頓取置在左手來上座前上座見來即須胡跪餘僧亦爾上座舒手其人即取衣疊一領授與上座又却行一疊付第二上座亦如是展轉至第四座還來却至第二座下第三座上於其中間手執衣口云此衣衆僧受作功德衣等如文即釋初文竟次第二文既開彼人作此說竟此四上座即應同聲云其受者已善受等第二文竟次第三文彼持衣人即答言爾其持衣人即起至第四座前取衣一領還作四疊次至第五上座之前展轉更行還如前法乃至下座僧並受衣竟其持衣人來至上座前執衣胡跪告僧云今僧和合受功德衣竟此釋第三文竟三世各三者章中前判為未來文有三當今是現在復有三現已過去復有三過以三現句成受德衣然為滿足故說九句也略無羯磨差調者五分二十二云持衣人得已應即日浣染打縫若獨不能辦者僧應白二羯磨差一二三乃至衆多比丘助之唱言大德僧聽今差某甲某甲比丘作衣若僧時到僧忍聽白如是羯磨准白成若准此律於時到可方云差某甲某甲比丘助某甲比丘作衣白如是以彼五分一切羯磨時到已可更無餘辭即云白如是故知不同此律羯磨也人以義准若總都差不論助者應云大德僧聽若僧時到僧忍聽衣白如是羯磨准白成用此後解者好欲釋僧集作法方便且應了知此律之中瞻波等文釋和合義有其三種謂應來者來應與欲者與欲現前應呵者不呵下雜法又云有五事應和合何等五若如法應和合若默然住之若與欲若從可信人聞若先在衆中默然而坐如是五事應和合前僧集中非不攝欲等者謂集和合之中三集五和義雖已具然彼且顯持欲之欲今說辨說欲故於僧集和合二義之外更重明之疏云亦可僧集謂是初三今此與欲唯心集亦有疏本無此後解此意謂顯前僧集中但於三集五和之中唯攝三集及以四和今此與欲即是三五之中與欲也下二但一者此犍度末有二種捨一持衣人出宿二衆僧和合共出彼文共出與此上文八中共出體無別故故云但一也欲自釋云以共出者同前義也復有疏本云此二文中謂有四捨前八分二上六要心捨次二作法捨下二即二故總作四捨今詳四捨雖是初出疏本而義乃勝以其八中言共出者是中間捨末下共出是四月滿故不同也離別而說即十者下二此八合十也隨事乃多者由起要心多少不定是故錯互以成多句也八中前六論云要心失者遍尋見論十四世論第三及了論並有八捨總無文判前六要心也然尋其義自是要心何用論判有人云此是誦字謂十誦也而錯為論字也今尋十誦二十九云八捨一衣成二要成三云四聞五失字發心七過限八捨時彼雖列八亦無文言六是要心但是疏家錯引也然欲釋文先應了知諸要心皆由發心云我若住或未作竟可須五利我若決心永出界去或作衣竟不復須利而於後時果然永去或作衣竟既遂要心爾時即失餘不竟等准此應知若無諸要直至限滿方失也謂無下二衣者疏意云若無伽梨本不成受明知作竟是作下衣今詳亦通作餘長衣得有竟捨不局下二衣無也下皆類也聞捨者疏釋易知今更一釋此云為釋疑云界內共僧集出可言失衣我既界外不共僧出應得限滿故即釋云聞出即失第二文五初有二六等者有古律本但有八捨闕此二六已下文也遂相傳云上代諸德取十誦律六句已下捨此安置今尋十誦六已下文不同此不應謬傳然四律初是姚秦弘始五年佛䭾耶舍翻後至弘始十一年支法領從西還更復重挍後挍本中出此已下文也文中二六於初六中廣出一切謂出云要餘略指上第二六中廣出竟要餘略指上尋文可見舉聖斷一對可有五六等者前未得即求而未果有望斷要今已得即求而已遂更不希望從何說斷是故不得作望斷要既不得作即是一向須除望斷故對更除去等五要可有五六也此則望斷既不得存若去為頭二二除者亦即必須除其望斷便是三三除者但成四五一去竟望斷理無二去不竟望斷理無三去失望斷理無四去聞望斷理無是故疏云若以去為頭但可成四五等有此義即是也義中擁故者問得未得合應有望斷以未得邊說今說疏意雖且如此而速下文十五句中具約得等三門義辨彼三門中疏並自許存望斷故若欲救疏者此中且約已得衣邊必無別望下文約其受衣之時已得未得而於後時別自起望問此三六中文中何故忽然除其失望斷等而無次第耶答且示方隅不須通釋十五句中疏云界外唯一故但十五者崇釋亦同今詳難曰共出句中若本不出是界內句暫出還來是界外句界外句中亦應許彼本住界外是界外句暫入還出是界內句若言界內違界外名亦應界外違界內名何內即許界內共出得成兩句而界外句准一句耶又文現云錯互上八何因今乃離合上八為十五耶處合錯互其相全別故非應理今詳上文二六之中共除三要謂初六中除失望斷第二六中除去望斷二六今除失去望斷即是八捨除三殘五乘此五數以為三五即成十五此謂准下十二句中三四十二亦應類此許乘三五以為十五且初五者得所望衣次五不得所望衣乃得所望合也約未得等三門辨之即全十五也問三個五中得所望等皆是已得如何許有未得衣門答未得等三據初受時從已後更起別求遂有得所望等也若作此釋即顯上文二六之中二二除之次十五中三三除之次十二中四四除之次九句中五五除之此義必然尋文可見上來純是約要心除次二五中除一作法義既異前故不乘前作六六除也除三得衣故有望斷據得得不得合故有此四者謂十二中一一四句各須具約得未得等三門辨之方得具等二四也謂竟不竟不竟及失等三約得衣門而有也故疏云餘三得衣故有也望斷據不得合者望斷一句通不得及得二門有之也若爾文中初四云得望衣如何乃言約不得門方有望斷答謂初受時望於張家未得衣故希必當得後時不得名不得門以為望斷然望受從於王家處更起別求而果然得遂有得所望也此十二句為約多人答但約一人起要增減若約多人有何道理但明十二人也故約一人求三類衣謂如求布求絹求紬或望一家三類衣上各起四要故成十二也說望三家理亦無爽疏中具約一家作之餘二類爾者餘已須衣等二門也二五句中文言界外亦如是者即出界句也彼專約求衣者此是辨界也謂前十二句文相亦是餘方起要計理亦應有界外失然彼且約求衣明之拘睒彌揵度見論寄律師者第十八云拘睒彌住處有二比丘一是律師一是修多羅師修多羅師入廁用洗盆竟不去水覆盆律師入廁見問言誰入廁不去水修多羅師答言是我律師言汝知罪不答實不知律師言汝得吉羅修多師言若犯我應懺悔律師言汝故作不修多師言不故律師言若不故者無罪律師還房語弟子言修多師不知犯不犯弟子聞已語修多師弟子汝師不知犯不犯聞已向師說修多師語弟子此律師先言無罪今言有罪律師妄語律師弟子聞已向師說如是展轉成大鬪諍具約不剃髮等者多論第三云犯不犯者不制剃髮剪爪佛說犯戒而言爪髮有命不剃剪不犯已上論文事一見異者同於不剃等事一見犯一見不犯也言諍中事作事作即是羯磨諍羯磨者即是事諍事諍更無別體即言諍中攝謂諍餘道理名為言諍諍羯磨者名為事諍謂如於一稱教羯磨一人言成一言不成亦是事一見異也廣如下減法辨之故佛勸言彼汝若如我所說等者彼汝即是能所二人也文中一個何以故義含兩種是故事中分兩個以釋也謂此何以故貫通不同住及同住二文各三可知者舉釋結三文也釋後能所成就義故等者後謂勸門也恐不類此文等者若爾五分此妨彼云何通豈容有得破律文耶然觀五分二十三云高聲犯者吉羅等諸比丘雖聞佛語猶諍不息便於界內別作僧事佛復告言若僧已破於界內別羯磨如法如律者亦名羯磨成就所以者何二部異見不同住有二種有自作不同住有僧羯磨與作不同住諸比丘雖聞佛語猶諍不息已上律文既雖聞猶諍不息明知前言如法成者是如法部人即顯佛呵非法部謂於二部決有一非非是俱讚之辭故也若作此釋亦順此釋亦是不類也三四二文可知者第三重以白佛第四教安置處也亦五可知者一至外道勸莫舉他二勸彼思念犯罪之人有大威勢恐須舉治三我等若與已下三文同上前科得也文言是長生王伴者五分云先是長生王臣也洗刀汁者此是兒欲令母欲也是凶猛性所感動也文言微眼尋父母後者字林微隱行也爾雅匿竄微也次偈如是知非見者稱正理知故曰如知亦可如是如知者古人以而字作如字也應言如是而知如非見也亦有疏本云如是如知非見此脫一個如字也秉三毒在懷者瑜伽等論三毒亦名三箭也能破三善者貪等也縱放身口者謂從三毒起身口業也垢從心生者害是六垢之一數也俱舍二十一頌云煩惱恬六惱害恨諂誑憍述曰意欲害他乃是自與害恬相應便為自損也或可依大乘雜集第七恬有三種謂貪瞋癡能現犯戒不淨相故善自良合上箭執急者具足應言合上善執箭執急五字也由兆國語注云兆見也反前緣說可知者前緣起中一犯戒今即佛為刊定三和合作舉今即教僧觸舉四不肯伏罪今即作自和令問其前後者若未料理在後和合為得以不佛答不得若已料理反此應知科行一事者作前文中非時和合單白竟後次即說戒說戒或可即用常白如常不異或可即用後文之中非時說戒白贊常說白作說戒事故云或可布薩白者即非持說戒白也或可布薩者即用常白作布薩也此之二法科行一事阿㝹婆陀者相傳云問婆羅門是威儀戒也今詳阿㝹翻為隨鉢陀翻為句也謂不得隨善比丘語言之後言句問答也惡馬者事罷俱不別者今詳若化僧殘已下事不別者如闡陀類但梵法治要犯夷罪事罪不別方惡罵治如下增八當辨能持來所說料理法也獨絶於彼者彼即是彼世間倫返也二種犯相者止作二犯也二牒前不犯句者意說犯為第一不犯為第二也謂前三人也上文列五種犯人配釋可知文言有信則能受者衆主有德令信心者受其言教也為僧故而遣能用語者僧中善人意為僧故勸遣衆主衆主受遣能用僧語也瞻波揵度啓請上三者請上疑中三事也一請知犯不犯二請知是舉非舉三請知羯磨成不也昔來科分文為兩者彼願律師云初略明人法是非即是對緣立宗此師意說此揵度中宗明七非至下七非之中云此改宗本彼意說云攝七為四故云對緣立宗也七非之中者即指六群作非法非毗尼一段文也第八第九乃至解不解驅中者第八臨事難成第九衆共諍非也乃至解不解等者第十第十二文也此中意辨第八難成理定落在人法二非第九衆諍定即諍人法如非十及十僧若不作即是人非或不應作而輒治人亦是人非明知並有人非或可當分自有略廣者三四八段單辨其名當分略餘八段文如非雙辨名當分廣又四非中初非容攝二似不止名合故略七中初非不攝下三離出故廣也更含多種如非者古師但七七即遇人之與法今既十五於中即有互秉重秉傍不驅及事人立界非然雖文中不辨界非以義傍通故亦有之故此揵度含非甚多不專人法也以為兩個二法者如文非法羯磨別衆羯磨一個二也法羯磨和合羯磨兩個二也及對衆秉法臨事難成者磨言及至脫至害也自外六文如非相顯者五六七九十十一文也七見不同者下文有住處非法別衆羯磨皆共諍言或言非法別或言非法和或言似法別或言似法和或言成或言不成初七二人是法語上下撿勘有十四種非者今詳且據現文之中而言十四若更理推十及十一解驅二法既開兩非亦應廣對百一羯磨各有應作而不作非便為無量思之可知問七非之中已有呵不止者指下第六段文名為七非也善比丘等六翻前二十八人者指下第二段文中律文釋不得滿數亦不得呵列二十八人又釋得滿數亦得呵中列善比丘等六人也二十八人束為頌曰餘舉滅難為神隱離別場至下第二段文尋律自見善比丘等六人者一善比丘二同一界住三不以神足在空四不隱沒五不離見聞六乃至語傍人亦至下第二段文中尋律自當見之答下四僧中正取少滅不足設明二十三人者此中攝也今此滿呵文中專列二十八人體不足者為此文中不言少一人故不足也者下第五段明僧中約其所滿四僧體邊正取少滅名為不足說二十三來無數者與少無異故亦即在此少約彼所滿僧邊言二十一人故名不足也問上下二文何意須約能滿所滿辨義不同答下文為明四僧體異故約所滿以明義儻約能滿以明義者寧得了知四僧體具今上文中為明能滿能呵之中有成能滿能呵之人或有不成能滿能呵若約所滿以明義者寧得了知能滿呵成不成義故疏次云以滿不滿對呵應不應義說亦異於可者謂以得或能滿等義望下為異也向來六文所列七種非法者謂向疏中辨十四非除其第五非法毗尼等七非之外自餘所列七種非法出在第二三四七十十一六段文也且從起說者且從六辟起過而說也體不異七者不異七段文中非也然疏中云以其第五段文直明用僧者意欲不辨第五中非今尋文中言少一人非法非毗尼者即是不異第六段中七中初非也然此十五非應說一切科落一非者謂隨所應科落一非非謂一切具十五且如不滿人呵不正非但受威有餘法定無解驅二法唯在治擯受日杖囊離衣等類亦決定無應隨思之身口業殊者僧尼制戒防護不同也身口止作業者通僧尼說四夷唯身口作尼覆藏及隨舉口止業也尼縱不豈得足僧數答此滅擯中通二衆釋之神足等五身之業色者此應分別神足若由通果心發唯有表業無記不能引無表故隱沒離見別住戒場理通三性若異熟心在此四處全無二業如理應思同七非中說也者若約呵辨呵通如非並名不止謂所呵羯磨名不止若約業性業通三性謂以口業聲性為體如下應知口業聲性名味句為體者謂依成實口業即是聲性聲性即是名味句名味句既有表彰故名口業若薩婆多口業聲名等即是聲上作用作用離聲自別有體復著互不應故非者如在戒場說恣分衣等名為著互非也
