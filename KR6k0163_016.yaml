body:
  text: 嵩嶽鎮國道場沙門賓作尼揵度初明愛道涕泣流淚者五分二十九云瞿曇彌白佛言願聽女人出家佛言止止往古諸佛皆不聽女人出家諸女輩自依於佛在家剃髮著袈裟勤行精進得獲道果未來諸佛亦復如是我今聽汝以此為法三請不許瞿曇彌便大啼哭禮足而歸因此五百釋女自共剃髮啼泣隨世尊後恆於世尊宿處而宿佛遊至祇桓五百涕泣在門廣如彼說祇律愛道五百並羯磨受者不然如上章中云八敬一受懸指綖經何因此中乃云羯磨也懸指之相如祇三十及三十六上已引說此事殆盡者殆免殆也母論十事者母論第三卷也然第三事彼云三者若女人求沙門蹈而過不出家者諸檀越常應乘象馬車在於路側以五體投地謂檀越乘乘至路不同疏中引第九事論云女人不出家者沙門威德過於日月況諸外道豈能正觀於沙門乎第十事論云乃至今減五百年一百年中得堅固解脫一百年得堅固定一百年得堅固持戒一百年得堅固多聞一百年得堅固布施被論偈云解脫定持戒多聞及布施見論十八云世尊制比丘尼八敬正法還得千年摩耶經五百歲正法便滅六百歲已九十六種外道邪見競馬鳴說法降伏外道七百歲已龍樹出世八百歲已諸比丘等樂好衣衣服縱逸嬉戲百人中或有一兩得道果者九百歲已奴為比丘婢為比丘尼一千歲已諸比丘等聞不淨觀阿那波那嗔恚不欲無量比丘若一若兩思惟正受千一百歲已諸比丘等於大衆中毀謗毗尼千二百歲已是諸比丘及比丘尼作非梵行若有子息男為比丘女為比丘尼千三百歲已袈裟變白不受染色千四百歲已時諸四衆猶如獵師好樂殺生費三寶物千五百歲已俱睒彌國十五日夜因布薩時世間唯有一阿羅漢被煞法滅廣如彼說文言我阿夷某甲歸依佛等者有人釋云以愛道尼是佛夷故還效世尊喚言阿夷又語中到也正應言言阿夷我某甲也今詳梵云尊者或翻聖者今言阿夷者略也僧祇律中阿梨耶僧聽即其事也亦有九文者一請和上二安置處所三差教師四奉命撿問五喚入衆六教乞戒七戒師白八撿問九正作本法文言上坐八比丘尼次第坐者大僧准此母論第八祇二十七五分二十九並同若房舍中不聽賣買等者非為僧故者如此律前文云尼在別住處沽酒安淫女等五分二十九云尼沽酒多人譏呵佛言犯蘭畜田梨牛奴自看耕佛言應使淨人知犯者吉羅尼出息犯蘭畜淫女坐肆債之犯蘭此等賣如耕地出息等為僧得作准此等文故云非為僧也隨應當知詭謂詐也廣雅詭欺也古師解意直爾不差教人往教今師意言白二羯磨但治犯者餘無犯尼差人往教被治之尼不得來聽也又言有比丘二人共戲等者十律三十九云佛在舍衛有那羅比丘及施羅比丘章中脫尼字二人共戲乃至白二云大德僧德是那羅比丘施羅比丘尼共戲笑言語惱亂諸比丘若僧時到僧忍聽是那羅比丘施羅比丘尼共戲笑言語惱亂諸比丘是所噉食如偷盜如是白白二羯磨與那羅比丘施羅比丘尼作不清淨羯磨竟僧忍默然故是事如是持已上謹録彼文既言不清淨故食如偷盜謂是呵辭不即犯盜說八相竟者彼五分二十九八相者淫盜煞妄觸八隨覆次說四喻如針鼻決如死人不更生如多羅樹心斷不生不長如石破不還合八不可越者請安恣罵舉懺百也四依者糞掃衣乞食粗弊臥具下賤藥隨意食者即等共義也謂遍說隨意食也此等並五分二十九卷文也法揵度七種行法者即下七段也科文中第六第七並是世尊在舍衛國章言王舍者誤也十誦五十六阿蘭若比丘應善知道徑善知日數善知夜善知夜知分善知星宿讀誦星宿經善知修妬路毗尼阿毗曇善知初禪二三四禪善知四果等近聚落住比丘廣說亦同祇三十四云有人請明日飯僧僧上座不得即受應知前人姓名巷陌處所恐有人試弄比丘故不應即受至明旦應遣直月若園民若沙彌往看或遭縣官水火盜賊等不能得辦若有此難僧應自辦食若無者語令乞食上座當知誰看房誰病應語與食若檀越惜者應語言長壽法應與不得不與若檀越行食多與上座上座應問一切僧盡得爾許不答言止上座得耳應語言一切平等與若言盡得若須少取少下座應語多與好食盡應語平等與僧上座法不得隨下便食應待行遍唱等供已然後得食上座法當徐徐食不得速食意住看令年少狼狽貝音食不飽應相望者不得食竟便在前出去應待行水隨順呪願已然後乃出若為亡人施福者不應作吉祥呪願等廣如破說廣有呪願文不録一切食上若不如是知者越威儀法文殊問經上卷云文殊師利白佛言於何時不得作聲或身口木石及諸餘聲佛告文殊於六時不得禮佛時聽法時衆和合時乞食時正食時大小便時於是時有諸天來彼諸天常清淨以彼聲故令心不定悉皆還去以諸天去故諸惡鬼來作不饒益事偈曰不作身口聲木石餘音聲寂靜禮佛者如來所讚歎十誦五十九僧上座法若僧唱時到若打犍椎時應疾到坐已看上中下座莫令失次乃至若飯食時上座應教一切等與應待唱僧跋一切衆僧應隨順上座文中達嚫偈者案西域記正云達襯拏或云䭾器尼此云財施報施之法也以用右手受他所施為其生福因以為名也文中梨滿即銛錛也以音相近譯律時人不達字義謬為此名也房舍犍度成三學行初一句戒學也次一句顯修無倦次一句顯三學功能為堅者顯持戒為樂者顯定慧相應樂受次一句禪定者定學分別觀者慧學也文言忽然暗冥者涅槃三十云佛神力故門自開闢既出門已路有天祠須達經過禮拜供養尋還黑暗心生惶怖復欲還返時彼城門有一天神告須達多言汝今若往如來所者多獲善利乃至須達多言汝是誰也天言長者我是勝相婆羅門子是汝往昔善知識也我因往日見舍利弗大目犍連捨身得作北方天王毗沙門子專知守護此王舍城我因禮拜舍利弗等生歡喜心尚如妙是好之身況當得見如來大師禮拜供養修道證滅者梵行是修得涅槃是證滅也前三句斷集第四句除苦五盛𭏚苦名為熱惱故也祇云十八億金錢買園十八億金錢造房金十八億金錢作飲食供養衆僧合用五十四億金錢十誦云獼者舍利弗是象者目連是人塔各六故十二者兼佛故成十二也餘准知之祇三十五云受禮人不得如啞羊不語當相問訊少病少惱安樂不等次應有五大者各作頭辨應禮皆除當位小故者不禮下衆不待言成復於當位皆除小者故所禮狹如疏自辨云大比丘應禮人塔有二等也大尼有四大式叉六大沙彌八疏云大沙彌尼應有禮十者今詳大沙彌尼若與大沙彌年等者不應相禮故同沙彌應有八也增一含二十七有五時不應禮若在偷婆中在大衆中在道路病著床飲食時不應向禮五分云若人多別禮師總餘人而去此律下第五十九增五文中廣明應禮不應禮文虬令繫著床腳裏決須時時與食不爾死者一一提罪文言若出井泥器破聽以木押四邊持器著中者出井謂汲水也泥器謂瓦罐也如上泥鉢非即是泥也木押四邊者謂作木袴內罐在中也是以次文云若故破作毛囊盛也文言竈中薪墮應上者繩薪墮下合火不燃更正令上使之燃也各作四句合二十句者前既釋云三業不淨轉施於後不名非法亦應僧破分為二部奪耶與正不名非法何成二十句也故知前文今撿三業但欲微其施主奪意非謂施已反還奪與得名如法也私種所得是非可知祇三十三有比丘僧地中種菴羅果長養成樹自取諸比丘白佛佛言此種植有功聽一年與若僧地種菴婆羅閻浮如是比果樹應一年取若樹大不欲一年并取者聽年年取一枝枝遍則止若種一園樹應與一年年取一樹亦聽若種蕪菁如是比菜應與一剪若種瓜應與一番取其再生者可取一剪其不再生理應思擇章引伽論乞物不作房者此律文意賞營事房即是僧房伽論第八是二房戒即是私房全不相當何用引來伽第八云若比丘自乞作房不從僧乞僧伽婆尸沙謂不處分乞物作房不作偷蘭遮從僧乞已不作偷蘭遮已作不成偷蘭遮此並據損施物罪成他房自住偷蘭遮未覆為覆偷蘭遮謂成他過量房作未成自然若自言我沙彌黃門二根廣說如捨戒皆偷蘭此則通不處分及過量也大房亦如是謂隨所應解亦知是理實須除過量一邊已上謹寫論文文言可取者為僧受利須知可取如先施一人後回施僧等類即不可取也可與者客比丘來與房舍臥具等類隨應當知又祇林中等者十誦三十四祇陀林中僧坊中無比丘知時等也五法者十六不隨愛嗔怖癡知淨不淨應立維那白二差之言維那者梵云羯磨施那此云授事謂於諸事指授於他舊言維者是綱紀義那者梵漢合說故言維那也雜犍度下文云迦羅黑鉢破應綴又准上長鉢戒及此犍度下文云鉢有六種鐵鉢蘇摩國鉢烏伽羅國鉢憂伽賖國鉢黑鉢赤鉢彼文六中四是約體後二是色彼文無迦羅鉢故知此二即是梵語黑赤二色也下文既迦羅是黑故知舍羅是赤也十誦三十九六羣守僧坊十七群次與迎食從守僧坊比丘索鉢與汝請食彼比丘言無鉢問言汝無鉢出家耶答言如是時十七群作是言汝是大德人無鉢便得受戒佛言從今無鉢與受者吉羅眼瞼謂目外皮文中目連言我未曾白衣前現神足者如汙家戒廣現通豈不相違答目連意言我未曾不為教化衆生令信悟入而白衣前輒現神足也若有盆者即亦現也餘同十律者餘金鉢等亦吉故也文言外道婆伽婆者外道亦稱自師為婆伽婆也遍六大城者文中但五一王舍城瓶沙二憂禪城波羅珠提三拘睒彌國憂陀延四迦維衛國梵施五舍衛國波斯匿也今言六城者涅槃第三十云有六大城所謂舍婆提城婆枳多城瞻婆城毗舍離城婆羅奈城王舍城如是六城世中最大已上經文文言無塵穢者即濡也成論第四四大假名品云八功德水輕冷濡美淨清不臰飲時調適飲已無患是中若輕冷濡是觸入美是味入清淨是色入不臰香入調適無患是勢力已上論文俱舍十一云一甘二冷三耎四輕五清淨六不臭七飲時不損喉八飲已不傷腹同成論也第五日水流聲說三法印可知一切無能知世尊所依禪者凡欲起通心依定起世尊神通所依之定餘聲聞獨覺等皆不能知也文言十八震動者大般若第八帙華嚴第二上說戒犍度彌劫摩納移十二醜中已釋訖文中鉢有六種然列名中蘇摩鉢下脫憂伽羅但有五名也亦有律本文具足也文言宏郭應作橫郭字橫者說文云是蘭大也郭者恢廓也謂在外廓落之稱時諸外道大繩床作小繩床畜者大高廣床作卑人坐用也祇燃燈者祇三十五云六羣當直燃燈以口吹滅以手扇滅以衣扇滅因此佛制燃燈法滅禪房中燈時不得卒滅當言諸大德敷蓐欲滅燈便以手遮唱言燈欲滅燈欲滅不聽用口吹滅手扇及衣扇滅當折頭燋去燃禪房中時不得卒入燃當唱言諸大德燈欲入燈欲入曉欲滅時當先滅閣道頭次滅行處次滅廁屋中次滅禪房中此章中云當以衣扇等者誤也如目連五百問中說者先明五百問云問人續佛光明盡可滅不答不得若滅犯墮卑云佛無明暗施者得福故滅有罪𢍉云者𢍉摩羅叉三藏也據此得罪諸德義釋是長明燈也目連問經及闍王受法決經云闍王問耆婆言作何供養得功德多耆婆教燈供養闍王遂用一百斛油燃燈供養隨燃之時即有滅者有貧女客作得兩錢即便沽油油主傷慜遂與五錢價油燃燈供養竟夜不滅目連次當滅燈滅貧女燈滅之不得乃作神通引旋嵐猛風滅亦不得其明轉盛上徹梵天傍照三千佛言此是菩薩燈非汝聲聞力所能滅准此即似得滅佛燈諸德義釋是續明燈故異五百問也母論第八有二比丘一名烏嗟羅二名三摩陀來到佛所自言諸比丘有種種姓國土人出家用不正音懷佛經義等如章所引闡提之論者西方有四陀論舊名韋陀毗陀等並訛也此云知也是明義也謂四明論也亦云分也一名阿由陀謂醫方諸事二名夜殊謂祭祀也三名娑磨此云等謂國儀卜相音樂戰法諸事四呪術陀此四並是梵天所說若是婆羅門種年滿七歲就師學之學成即作國師為人主所重其四陀可十萬頌口相傳授不書紙葉於娑磨中自有六支一式叉論此云學二毗羅論此云記論三劫波論四樹提論五闡提論此云詞論謂善釋訓達諸方音也六尼祿多論文言六羣共他䞈物廣雅䞈賭也十律貸白衣債者彼三十九也投竄者有餘釋云投匿名書也此蓋不尋根本妄為此釋也十律三十九云六羣誘他弟子佛言犯吉因此六羣各呪誓言我若誘汝弟子者作佛呪法呪僧呪蓋謂令佛證知我等也佛言從今比丘不得自呪不得呪他犯吉後文即言爾時六群比丘失衣鉢語諸比丘言我失衣鉢當共作投竄諸比丘各各思惟不知云何白佛佛言從今比丘法不得自投竄亦不得令他投竄若自作令他作者突吉羅何以故呪與投竄一種故已上律文故知但是作呪之類不勞異釋文言彼不洗大小便處持世尊塔佛言不應爾令清淨者持類餘禮佛誦經等並須洗淨也不爾皆吉祇三十一法豫羅漢鹽義答言我知汝是法豫輕慢諸比丘僧已與汝作覆鉢羯磨故不足耶復來惱我鹽正是鹽法豫至佛所言是比丘少聞未從師學問鹽故言鹽有一法師名弗絺盧佛令問義比丘言此是好問令為汝解鹽義二種一味二性味者如海水同一醎味性者黑鹽赤鹽等略說二種若生若煮是名鹽義聞已白佛是比丘善解分別廣略鹽義隨順能答佛言此是凡夫於我法中未得法味前是羅漢而汝慢不識真僞長夜作不饒益事聞已恐怖求悔文言野火蔓筵來若逆燒者謂先放火燒却火野火後時無由得來也杖囊羯磨三律並有乞辭者祇三十一十誦三十八五分二十六並有乞辭崇云三律亦無乞詞者謬也且祇云佛言從今日病比丘聽從僧乞畜杖絡囊乞法者具儀合掌言大德僧聽我某甲痏手應作疚字于救反謂手戰搖動不安也故破鉢今從僧乞畜杖絡囊羯磨唯願僧與我羯磨第二第三亦如是白一羯磨如彼廣說十律等乞辭亦云三乞不繁録之中三非法境有是非者若得同意伴名為境是餘二名非也見他如法宜默情和而心不同自己得罪者謂實如法心迷謂非名為不同心既不同應發言呵以定是非由不言呵自己得罪此謂不呵邊得罪也有人釋言而心不同者謂不欲和合也不問邊而得罪也此釋違理此中為明不應默然本不為辨不同也以證邪義者古師云一僧集如應來者來二和五法應和合如上迦絺那中已辨增三知而默然等者知者善解是非不知者未學不達癡者學而不解在此三心並默忍可故云三默然故云廣說可知也大小持戒犍度文中聞摩竭國有出水珠往王舍城圍城而住等者見論十七云羅閲城王舍城摩竭國此三義一名異羅者言王閲者言舍故言羅閲城也摩竭者外國音也摩竭者初國名耳文中令蓮花孔中生出竹上者意令高聳使外遙見表此城中泉池甚衆亦可位別聖凡具不具異故言大小者今詳准瑜伽二十一乃至二十五廣釋此文總說名為二道資糧故知即以世出世道名為大小持戒即是二道之因故云大小持戒也自下且隨疏釋後當略辨正義相心持戒者准成實宗見道已前𤏙位已去雖學法空被有相心之所陵雜故名相心也無相已去者即入見道也上已數辨若就內外二凡者就見道前復分二位一者外凡聞思之位唯學生空二者內凡𤏙位已去漸學法空此亦依成實宗也離受畜刀杖是煞生因也略無果行離者作文應言不煞生放捨刀杖此上兩句如章已釋捨煞生常有慚愧等捨煞生者即果行離也文無無理有問前言不煞生豈非果行離耶答疏意判為舉制也謂是世尊言教也理實無多相貌大比丘持戒者疏意云初明十七事以明雜行第二彼於此事修集聖戒已下正辨大持戒法昔為七文者即於今師五段之中於第四段開出一段謂從云何比丘一心已下正明常爾一心復於第五段開出一段謂從彼乞食還已下正明靜心發智斷除諸蓋科段雖爾名字亦別是故雲律師云次釋第二大持戒就中有七種行法第一從初至止息來正明守護根門清淨無染義第二從得聖眼已下正明節量飲食修知足行第三從有如是聖戒已下正明䇿勵修道精進之行第四從有如是聖戒已下正明念觀身心止令不錯亂第五從云何已下正明常爾一心第六從有如是聖戒已下正明阿蘭若處寂靜第七從彼乞食還已下正明靜心發知斷除諸蓋牒前起後者且如第二文初之彼有如是聖戒即是牒前也又云食知止足等即起後也故知餘文亦須准此也崇云古舊諸師判此五文唯是聖行故是聖行故是聖人大持戒法今釋不然豈可世尊說此行時唯為聖人不修凡衆又復聖人證理恆自䇿勵豈對事爾許丁寧又若是聖如何教修念住又就聖中位分次是何為唯無為亦通有學爾者如何文言修集聖戒得聖根等答此是勸修聖戒非即空今詳疏主前已釋云有相無相內凡具等故知不唯局判為聖又此聖戒之言古今諸師未曉其意至下當辨又此五行當分成就漸次未窮者雖望一行當分已成進求後位即未窮盡也疏云故下文自見未斷諸蓋者意欲證成未窮義也彼文既明自知未斷故知前來進求未盡也疏云又前斷蓋示斷方法者謂彼文中自見未斷已前文雖明斷蓋但是世尊示斷方法未即是斷也疏云又可斷故次下得禪者謂前文中即是已斷自見已下斷故得禪也善學成就止觀兩行者准經論中止即是定觀即是慧然疏中意止謂止惡通於戒學如下釋云復離意地三不善根等意辨止惡也觀謂觀行通於定慧故下疏釋止息者修禪習慧也意明止息即是定慧止息煩惱也然此不順經論也六觸入處古譯名為十二入雜心第一釋云煞義是入處心心所法於中滅述曰謂內六根及外六境心心所法於中生滅滅即煞義也新俱舍第一云心心所法生長門義是處義述曰新翻十二處處是生門義也言觸入者謂心心所中觸能長養心心所法其力最強故內六處正發識時觸依根生名為觸處若不發識但名為處不名觸處也如雜心第一釋之婆沙等亦爾繁廣敘疏中釋善學為一句護持調伏為第二句今得止息為第三句今詳喻合二文之中善學護持為第一句善學調伏為第二句善學止息為第三句故知不應理也第二段文言得聖眼章云諸根善譯者之謬依章中好也正事觀者若或飢渴若食過度離此不平名為正事正事功德者梵行即是所生功德也此三觀法出明了論疏第三卷法合可知者謂是總合無勞別配略無晝日中夜二時者如經汝等比丘晝則勤修無令失時初夜後夜勿有廢中夜誦經以自消息無以睡眠因緣令一生空過無所得也當念無常之火燒諸世間早求自度勿睡眠也文云若行若坐等祇三十五云不得作駱駝坐應結跏趺坐若坐久虗極者當互舒一腳不得頓舒兩腳又云仰臥者阿修羅臥覆地者餓鬼臥左脅臥者貪欲人臥皆悉不聽比丘應如師子獸王傾身臥應向衣架不得以腳向和上闍梨不得初夜便言虗極而臥當正思惟自業至中夜乃臥以右脅著下如師子王纍兩腳合口舌柱上𮭯枕右手舒左手順身上不捨念慧思惟起想不得眠至日出至後夜當起正思惟己業不如是越威儀法已上律文此律云繫想在明者謂於隨一觀行在前名為在明或取珠輪日月等明繫想在前此亦即是修觀方便也此是四念處觀觀五陰故者謂觀色蘊即受念處若觀識蘊即心念處除三蘊已觀餘二蘊及無為法名法念處四念處觀以慧為體慧由念力令住於境故云念住以念與慧相應而起故云念住理實自性以慧為體也大乘即以念慧為體斷蓋方便者婆沙三十九云又世尊說結跏趺坐端身正願住對面念律云結跏趺坐直身正意即端身正願也繫念在前即住對面念也前是面也彼論云問諸威中皆得修善何故但說結跏趺坐有多復次且敘一二而已彼云復次如是威儀生人天等敬信心故謂餘威儀不能發起人天龍鬼阿素洛等敬信之心如結跏趺坐威儀者故設此威儀生惡尋伺為生他善尚應住之況自順生殊勝善品謂若行住身速疲勞若倚臥時便增昏睡唯結跏坐無斯過失名順善品也復次住此威儀怖魔軍故謂佛昔於菩提樹下結跏趺坐破二魔軍謂自在天及諸煩惱故今魔衆見此威儀即便驚恐多分退散復次此是不共外道法故謂餘威儀外道亦有唯結跏趺坐外道無故問結跏趺坐義何謂耶答是相周圓而安坐義聲論者曰以兩足趺跏致兩䏶如龍盤結端坐思惟是故名為結跏趺坐脅尊者言重疊兩足左右交盤正觀境界名結跏趺坐問端身者是何義答是身正直而安坐義問住對面念是何義答面謂定境對謂現矚此念令心現矚定境無倒明了名對面念復次面謂煩惱對謂對治此念對治能為生死上首煩惱名對面念乃至亦有說為住背面念對背二義俱理無違所以者何由此念力棄背雜染對向清淨故棄背生死對向涅槃故棄背流轉對向還滅故棄背五欲對向定境故棄背薩迦耶見對向空解脫故棄背我執對向無我故棄背邪法對向正法故由是對背俱理無違安住此念者名住對面念五蓋列名如章一貪應名貪欲也貪通三界以欲簡之二嗔恚三睡眠應名惛沈睡眠也舊云睡者即惛沈也舊云眠者即睡眠也四掉悔應名掉舉惡作也掉即掉舉也悔即惡作也五疑婆沙三十八云耽求諸欲貪欲相憎恚有情是嗔恚相身心沈沒惛沈相身心躁動是掉舉相令心昧略是睡眠相令心變悔是惡作相猶豫不決是疑相亦以對治同故者婆沙三十八一釋云復次以三事故各念嗔癡也共餘兩二二合立蓋謂一食故一對治故等荷擔故此中一食一對治者謂貪欲蓋以淨妙相為食不淨觀為對治由此一食一對治故別立一蓋嗔恚以可憎相為食慈觀為對治廣說同前疑蓋以三世相為食緣起觀為對治廣說同前惛說睡眠蓋以五法為食一瞢憒二不樂三煩缺四食不平性五心羸劣性以毗鉢舍那對治由此食同同對治故共立一蓋掉舉惡作以四法為食一親里尋二國土尋三不死尋四念昔樂事尋以奢摩他為對治由此同食同對治共立一蓋章中但辨同對治義不論同食義等荷擔義也等荷擔者貪欲嗔恚疑一一能荷一蓋重擔故別立蓋惛沈膽眠二二能荷一蓋重擔故共立蓋如城邑中一人能辦一所作者則令別辦若二能辦一所作者則令共辦俱舍二十一頌云蓋五唯在故食治用同故雖二立一蓋障蘊故唯五長行云何故惛沈掉悔二蓋各有二體合立一耶答云食治用困同故述曰食治二義如婆沙釋言用同者謂惛眠二俱能令其心性沈昧掉悔二種俱能令其心不寂靜由事用同故合立也俱舍障蘊故者如下疏中釋云蓋三行是也如下辨次辨體性合用三十煩性以為蓋體者婆沙云問何故唯立不善為蓋非無記耶答障善法聚故名為蓋以此蓋者唯是不蓋故述曰既不善性立之為蓋故欲界也以上界中無不善故應知此中貪欲嗔恚局在欲界遍於五部唯不善性若沈言貪即通三界亦遍五部惛沈掉舉各通五部亦遍三界不善無記今亦唯取不善性者立之為蓋睡眠在欲通五部三性亦取不善立之為蓋惡作在欲唯修所斷通善不善疑通三界四部通不善無記亦並唯取不善性者以之為蓋此五覆障故名為蓋謂蓋三行者婆沙四十八亦同此釋謂障戒蘊定蘊慧蘊也不能繁敘耳俱舍云障五蘊前之四蓋能障三蘊同前婆沙復由疑故能障解脫解脫智見二蘊不起自見未斷也能治之行不所治同體者應更釋云心與無貪善根相應既即不與貪惑相應名不與俱也隨應准知次喻亦五者疏中雖釋今詳其意由貪欲故驅俱有情受三惡趣故名為怒嗔令破戒惡趣債償今由賖債暫得生人人中還畢復於人中進修聖道惛沈睡眠無堪任性猶如久病疏中喻掉悔者不然掉舉惡作令心不安憂惱故喻閇獄疏中喻睡眠者非也疑令有情常妄積度如行曠野常㺓賊盜隨配應知上來隨疏且已釋記今詳從初如來出世已下至此斷蓋合十四門分為九段總為頌曰他自圓滿善法欲戒根律儀食知量性窹正知住善友聞思無障捨莊嚴述曰下修四禪是世間道三明五勝頭出世道此之二道由備資糧故得成就二道資糧合十四門一者他圓滿謂由如來出現世間演說妙法二者自圓滿謂生中國若居士子若復諸餘種姓生者三者有善法欲謂彼聞法便生信樂四者捨家出家持戒律儀謂於異時錢財若多若少皆悉捨棄親屬若多若少皆亦捨離剃除鬢髮與諸比丘同戒五者既已持戒須守根門修根律儀謂於此事中修集聖戒內無所著其心安樂眠雖色而不取相無所貪欲而無憂患六者既已具修戒根律儀為於聖道有所堪能於食知量七者既已知量應於晝夜常修悎窹繫想在明八者為令善品增長若行若住常念知正知而住謂於住時念無錯亂觀於內外身受心法復於行時左右視瞻屈申俯仰常修正知廣說乃至如衆學法九者住於阿蘭若處自有六門謂即第九有善友者此善友德或能授人無常等想廣說乃至有二十想或授八定四無量等第十復由聞正教法廣說乃至十二分教第十一法能思惟籌慮四種道理觀待道理作用道理證成道理法爾道理第十二復須住無障處即蘭若處增長善品不障善品第十三為莊嚴心恆修惠捨如法行施第十四須具沙門莊嚴一有正信二無諂三少病四精進五慧六少欲七喜足八易養九易滿十具十三杜多舊云十二頭陀十一端嚴十二知量十三善士一法十四具聰慧相十五堪忍十六柔和十七賢善束為頌曰正信而無諂少病精進慧具少欲喜足易養及易滿杜多德端嚴知量善士法具聰慧者相忍柔和賢善述曰具此諸緣蓋障輕微次修靜慮引出世道四禪喻中且初禪者如人巧浴喻修觀人也器者喻得教授師也盛細沫藥者喻出離尋起善尋伺也以水漬之者喻尋伺相應喜樂受也第二禪喻者猶如山頂者喻無尋伺無四識身唯一門轉也泉者此高頂上內淨喻泉也水自中者喻定生喜樂也第三禪喻者四種華者喻意身也潤漬水中者喻澄定樂與意相應也第四禪喻者無有不覆之處者謂蚊虻等不能浸損喻捨念清淨故不為三灾所壞也第二喻者喻不被欲恚等尋及出入息之所動也文言沾定而然有律本云憺定而然復有本云恬定而然今詳初本誤也五種勝法及以三明者總束即是六通也五勝法中前三合為神足智證通次一天耳智證通次一他心智證通三明中初明即是宿命智證通次明即是天眼智證通次一即是漏盡智證通總攝功德不過此六也文中彼得定心乃至住無動地者且就勝說言無動地表第四禪也理實起通通四靜慮皆容得起然所依定通四靜慮若所化事通欲色界無色無色不可論化故婆娑百三十五云然所化身差別有八謂生欲界作欲界化有二種一似自身二似他身作色界化亦有此二生色界作色界化有二種一似自身二似他身化欲界化亦有此二又云諸變化心總有二種一欲界繫謂欲化作欲界事者此化心名欲界繫也二色界繫准欲界釋或為五謂欲及四靜慮此約地分五也又云諸作欲界化彼身還似欲界有情諸作色界化彼身還似色界有情次無化心者文三者一牒前定心依定得法二約數次結三釋得所由化色無別心依於實報色心者謂所化身從實報身中出也婆沙百三十五云問化當言有大種無大種耶若當言有大種無有現色離大種故問化當言有所造色問化當言有心無心耶答當言無心此中說他身化非心依故等廣如彼說文言通意所造自在成之者如或一時身上出水身下出火等婆沙云問經說一時作雙示道謂身下出火身上出水或時反此為一心為二心作若一心作云何一心有相違二果若二心作云何一時有二心俱起有說一心所作謂先二心別祈水火復住一心令其俱發前二心是轉後一心隨轉有說二心所作由勝定力水火二心速疾回轉似俱時發如物犢子律中沓婆是左手放光右手隨言分僧臥具若時發表無容放光發言處分即語表業故云發表若時放光無容發表由勝定力光表二心速莊回轉似俱時發水火二心應知亦爾他心智中十對二十心如瑜伽二十八釋之廣如瑜伽注辨之漏盡明中初一往緣顯諦見道智次如實如有漏漏集已下更緣諦理顯斷修惑三彼如是知者牒前見道如是見者牒前修道由具見修得盡三漏便得解脫以成四智亦可根本後得二智別也五百結集章中判此已下為流通者恐違佛地論說上以已辨五分律末明二結第三十卷末也十誦五十五題云五百比丘集三藏毗尼序品第一崇云古舊解云蓋是集法者意情見不同廣敘乃至義勢之便故在此說斯釋不然十誦此序自是第九誦中序品卷當第五十不得見有序言將為部初總序今詳章中但顯三分流演於世不言彼律結集在初但釋序名有發起義然斯發起初後皆成非謂要在部初發起也五百為止傍等者等取下釋名中順舍利弗請等五義也順佛付囑意者出曜論第一云佛涅槃時告大迦葉及阿那律汝等比丘當承受我教敬事佛語汝等二人莫取滅度先集契經戒律阿毗曇及雜藏然後當取滅度故知佛付囑也下文跋難陀聞佛涅槃便言我等於彼摩訶羅得解脫彼在時數教我等是應是不應等我等今者便得自住欲便作欲不作便不作等摩訶羅者此翻無知或云老也迦葉聞之不悅者迦葉是大羅漢心無煩惱相應憂喜但以慈心傷慜世間故云不悅此不悅由是所知障也超哉三界乘者謂佛乘超過三界也寂然者顯空解脫門無相無願可知足跡尋求者以教為足跡也十律五十五云佛初般涅槃後十塔自是以後起無量塔祇三十二云闍維已迦葉語諸比丘言長老尊舍利非我等事國王長者婆羅門居士衆求福之人自當供養我等事者應先集法藏勿令佛速滅又云世尊先讚尊者阿那律言如來般泥洹汝應守舍利勿使諸天持去所以然者過去世時如來般泥洹諸天持舍利去世人不能得往失諸功德諸天能來人間供養世人不能往除其神足是故應好守護第二文料理房舍資道之緣中有一單白上百四十五法數中為差衆白也阿難有欲者謂初果人未斷欲愛故也文言頭未至枕等者見論第一云阿難從初夜觀身已過中夜未有所得阿難思惟世尊昔有如是言汝已修功德若入禪定速得羅漢佛言無虗當由我心精進太過令當籌量取其中適於是阿難從經行處下至洗腳處洗腳已入房却坐床上欲少時消息倚身欲臥腳已離地頭未至枕於此中間便得羅漢若有人問於佛法中離行住坐臥而得道者阿難是也單白和僧者上法數中名正結集白也事已先有者此謂迦葉立制意云今已後當起之事佛未制者並不應制為遮未來達理者輒立制故其已起事迦葉親自量宜輕重雖非佛制制亦無爽也恆據教相等者謂外相似犯由心迷故理實無犯也五分三十云阿難言我非欲使女人先禮舍利恐其日暮不得入城是以聽之我於此中亦不見罪相敬信大德今當悔過智論但列五吉而總結云六吉也無雜碎戒蓋即譯家脫也五罪貫通四部者一請度女人二躡僧伽梨三不請住世四不與水五不問雜碎戒祇即六同者加汙足也頌曰女梨世水碎蓋應律主譯律之家不能繁文者謂或律主或譯律家略指也有難無難繫相應等者崇云假立賓主往復擊揚名為有難直辨真理顯法正邪稱為無難義味屬著名理互從名繫顯宗由致教理會符稱曰相應共相詰問各有旨歸名為作處今詳此是光統之意光統釋云假作賓主往復者明有義故言有難無難者直辨法相明無義故言無難繫者義味遞相屬者名繫相應者義味相攝故言相應作處者遞相難問各有之詣故言作處詳此諸釋並無典據故今釋云或𢇛外宗彈因破喻名為有難即因明等也闡揚自義辨釋法門名為無難即集法相辨蘊界等諸法門如俱舍論界品中明及雜集三法品也有漏諸法界繫不同名之為繫猶如世品隨眠品等也集修五位定智相應名曰相應即如定智賢聖品等也辨身語意作業之處名為作處如業品等也七百結集十非三門分別中第一門即釋文也四種多食者一揣一坐作餘法不作餘法也滅言諍中驅出三人者一不誦戒不知戒毗尼便捨正義二誦戒不誦戒毗尼彼捨正義說少許文三法師在坐彼捨正義以言辭強說常法者准五分三十云問習先所習淨不上座問云何名習先所習離波多言習白衣時所作上座言或有可習或不可習准此釋常法者好即是此和也者謂上文不作餘食戒中佉闍尼令作餘法中有油石蜜等並是和時食故須作餘法如上已辨若准五分三十云問蘇油蜜石蜜和酪淨不上座問云何離波多言非時飲之答言不淨准此即是非時食罪也如藥犍度中制者盡形藥要加法方得共宿故也五分三十云問飲闍樓羅酒淨不上座問云何名離波多言釀酒未熟者准益縷之相不截不犯過量坐具不截而畜亦應無罪者謂起過人倚傍益縷既聽不截是為不犯我今若得過量坐具不截而畜亦應無罪如上第十九卷中六羣廣長作尼師檀佛即制量後因迦留陀夷手挽坐具佛即開云自今已去聽諸比丘更益廣長各半磔手既言更益故知縷際益之不同南山截己別益也十誦第十八亦云長佛二磔手廣一磔手半及縷際益一磔手多論第九云本佛在時不臥故小作後因難陀聽益縷際從織邊唯於一頭益一磔手凡六尺廣三尺令比丘臥故不同此律廣長各益也既准此文益而不截我今過量不截應得故即制云要須截令應量不截應得故即制云要須截令應量也若准不褋亦得起非者謂倚傍云不褋戒中既不制量故我過量不截無罪上第八卷中不褋戒亦是六羣起過故此文云因六羣制也有餘妄釋全不堪記且順疏釋應求別理假評被治羯磨者如上遮不至治及不見治理實不成若有諍言成不成者亦是言諍中事作也十事頌曰指聞寺後常和鹽酒截金謂唯逸提吉羅者謂寺內後聽常法及鹽並得吉羅餘六犯提也常法八事者上藥法中內宿內煮自煮自手取食并四種餘法也早起受食從彼持來若雜果若水所生可食物疏云自有其四者謂八事中內煮自煮及自手取自手取中開出惡觸合為四種加前成十也於八事中餘之五事無別種故故不復論之也且如內宿攝入鹽中四餘食法攝入二指村聞和中故不別論也第二正滅中分三者即文言一切去上座為第一上座已下文是也文言阿難皆為其和上者謂並是阿難弟子也明作白簡人取欲者於此文中兩令單白初名欲結集白次名差衆白也第二文中正結集白問答兩白可知隨羯摩事者有餘釋言隨羯磨事犯別衆也今詳謂同一界若俱時秉犯破僧蘭若不俱時犯別衆吉分衣羯磨私情別分計直犯重若迷心秉不成無罪重輕犯不既是無准故云隨羯磨事共還都集僧於大衆中斷也一一如上問答下一籌已者彼律云下一籌乃至第十籌於是離波多唱言等也彼律云一切去上座百三十六臘也疏脫六字條部咨問犯等者等取不犯輕重也條牒上部者尋諸律文多調字則義不通也今詳世尊在日星罪別制波離律匠調和部類决問疑滯故云調部也學悔集三十五事中文言不應助他語者即是不應證他事也君持口中行淫等言得蘭者並是前方便闕緣蘭也若了心知是非道即得殘故也亦應更別釋之盜戒此亦緣名想差者心緣此女彼女名也文中先明他盜取物第二到易他分物籌第三盜他分物籌第四轉側他籌第五再盜不滿章中釋不次第也物先我邊籌在他邊而盜取籌也非謂墮籌分物等者如兩人分即為兩分擲籌既竟見他物勝遂舉已籌置他物上或復反此當舉離時未名為犯以容未定故如記數多取令使少者謂受物也即上二事未故蘭者謂方便蘭也大妄具八緣一境是人二人想三境虗四知境虛五說過人法六自言已得七言辭了了八前人知解亦同闕二緣者亦同闕了了知解二緣也問皮肉骨血既是都無云何目連而得眼見答幻化之色似皮肉等而無實體故說言無空慧定者四無色中空處定也文言有是定不清淨者十誦第二云善取入定相不善取出定相從三昧起聞聲已還疾入定諸比丘言入無色定破壞色相捨離聲相何有入無色定當見色聞聲耶大乘宗意目連定勝故得聞聲也阿耨達池者此云無熱惱池也問文中諸比丘既語目連言汝是阿羅漢或能化作蓮華何因復言虗稱得聖答准如小妄實見言聞即成妄語類知大妄實得天眼而言天耳亦成夷罪儻若目連實化作華而誑人言非我化作我乘神足北方見有遂即取來亦得夷罪故諸比丘作此語也然實聖者性戒已成決無妄語嚴好比丘者十誦第二云輸毗陀比丘佛言是人前身從無想天命終來生此間無想天上受五百劫是故自說我一念中能知五百劫事隨心想說無犯驗斯文等者意說上文戒本釋相中略無境想也漏失戒中情其有十事末一云審定作者蓋於七精中審定是何精也文言消蘇者意名女根為消蘇也餘准此知此中四句如上粗語說者上文若言看言似何等已下即有四句是也又准上第三句應言汝不應一切與第四句汝一切應與此事不應與彼問言何等不一切與比丘默然故殘女隨却問然女實人解意也准此四句前兩句約能與不能與後兩句約應與不應與章中稍違文也增一言增一者若以通名論之初段之文是增之一已下諸文以增之故云增一也餘如章釋先就增一中分文解釋者尋此已下一事一經一一經中各判三分如常所辨先釋序文七門分別第一辨文開合第二釋名不同餘之五門如章中敘第一辨文開合者依諸聖教及諸傳記總為四釋一者依法華論於序品中有七種成就一序分成就謂從如是乃至耆闍崛山中二衆成就謂與大比丘等三如來欲說法時至成就謂為諸菩薩說大乘經名無量義等四所依說法隨順威儀成就謂說此經已結跏趺坐入於無量義處三昧等五依止說因成就謂爾時佛放眉間白毫等六大衆欲聞現前成就謂爾時彌勒作是念今者世尊現神變相以何因緣乃至而問文殊等七文殊師利答成就謂爾時文殊師利語彌勒菩薩及諸大士善男子等如我惟忖等也今此律文唯有第一序分成就第二依佛地論於序分中開為五義即當法華初二成就一總顯己聞二說教時三說教主四說教處五所被機今此律文但有前四第三依智度論開為六義一信二聞三時四主五處六衆今此律文唯有前五世親燈論亦說六義同智度論如彼偈云前三明弟子後三證師說一切修多羅其事皆如是第四依真諦三藏金剛般若記中開為七事一如是者標所聞法文理具足決定可信二我者辨能聞人受持具足謂阿難等三聞者親受聖言稟承不謬四一時者顯所聞法契合時機五佛者辨能說師六舍衛國等者顯說有處七與大比丘衆等者非獨聞今此律文但有前六第二釋名不同者略有三釋一者遠法師已前諸法師云從如是我聞乃至處衆六句經文名為經後證信序說經之後教阿難置故名經後也智度論云說時方人欲令生信故名證信也放光等者名為經前發起序延法師等釋也復有釋云除佛一句餘之五句名為經後大同延法師二者遠法師云初如是我聞者證信別序唯是證信非發起序故一時已下名為發起通序亦證信發起故破古釋云一時佛等若是經後經前無佛誰之說經無時無處說何所說經前無衆說何所被賴藉此等起所說何得一向判為經後今詳經後佛令安置應名經後者非佛令安何得相例三者唐朝已來諸法師等亦立二名且如法華七成就中初二成就名為通序一切諸經皆通有故亦名證信序證所聞法定耳信故餘五成就以放光等各別發起名為別序隨諸部別相各異故亦名發起序以此發起正宗義故今此律文若依遠法師釋具二序若依初後兩釋唯有經後及唯通序又後釋意大同初釋是故諸師辨釋二序差別相云如放光等如來發起是經前序若言如是我聞等者阿難所請是經後序基測法師等釋也餘之五門隨疏助釋且第一門有之所由者疏引智度論第二卷說阿㝹樓豆教阿難問大悲經說是憂波離教阿難問大術經說憂波離及阿菟樓陀教阿難問故諸經中互舉不同也所問四事如集法經涅槃後分等大同智論也智論第二云我三阿僧祇劫所集法寶藏初應作是說如是我聞一時佛在某方某國土處林中應如是說第二門須有意者自有三義一者如真諦七事記中云微細律說阿難比丘當高坐出法藏時身即如佛具諸相好若下高坐還復本形衆見此瑞便起三疑一疑大師釋迦牟尼以慈悲故從涅槃起更宣深法二疑諸佛從他方來三疑阿難既是佛弟堪代佛處轉身成佛今欲遣此三種疑故故說如是我聞等語明阿難親從佛聞非佛慈悲從涅槃起亦非餘佛從他方來人非阿難轉身成佛微細律者即犍度中辨微細罪也諸師未曉第二義者如章廣敘章云故經論中說信為手者遠法師云華嚴經中說信為手如人有手入寶山中自在取寶等又智度云說時方人欲令衆生心生信故基法師以十義釋信一趣極果之初因大乘四十心中信為初也二入諦理之基漸信等五根在忍位勝也三通妙真之證淨通妙真者證諦也理得四不壞信四荷至德之嘉依如婆沙說舉佛法者如大龍象以信為手述曰象自鼻名手也五聖七財之元胎七聖財者信戒聞捨慧慚愧也元胎者始也六善九因之𠈞落瑜伽云入諸善法者以信為依欲為根本作意所生觸所集起受所引攝定為增上慧為最勝解脫為堅固出離為後邊述曰受解脫樂名為善法始依於信次起希望次數驚覺次和心取令緣勝境次領於心次令心寂次擇善惡次脫纏縛得決定故次覺道滿此九能令受解脫樂故名因也𠈞樂者亦是始也七稽機門之勝手佛垂教手以接信手出生死也八堪心水水清珠信性澄清如水清殊能治不信渾濁性故九建名道之良資論語云食兵可去信不可去也自古皆有死人無不可立十疑裏誠之佳待左傳言苟有明信𡼏溪沼沚之毛蘋蘩蘊藻之可薦鬼神可羞王公而況君子結二國之信也今詳俗事意辨實語謂之為信不同佛法忍為信因欲為信果望名謬引甚不可也極果初因辨入僧祇聞經生信未必如此復不可也由此即破第二第三也聖七財中為明發心趣出家道亦與聞經理不相當故亦謬也餘之四種影嚮相當仍須辨相浪引繁言虗陳別理引誤新學轉益迷愚耳今釋信者由光於人忍實德能故次聽法既聞證據令心澄淨樂欲修行通名為信故智度論云不信者言是事不如是信者言是事如是第三門如章廣敘疏云又可依大毗尼藏及以別傳皆戒戒有如是之證者謂准十誦五百結集中云摩訶迦葉語阿難言從今日一切修妬路一切毗尼一切阿毗曇初皆稱如是我聞一時阿難言爾智度第二云長老憂波離受僧教師子座處坐如是我聞一時佛在毗舍離爾時須憐耶迦蘭陀長者子初作淫欲以是因緣故結初大羅二百五十戒義作三部七法八法比丘尼增一憂波離問雜部善部如是等八十部作毗尼藏今此疏云大毗尼藏者即指智度論八十誦律也疏意云准智度論大毗尼藏戒戒皆有如是我聞又准十誦故知五部別傳之者亦應戒戒皆云如是我聞也以迦葉云一切毗尼皆稱如是故也但今後代恐繁故略也第四門疏云大化得既流通由如是義故略之也第五門疏云次釋語辭今詳且依佛地論等如是我聞合為一義而總釋之然後方復六義七事等各各別釋且總釋者先釋經文後辨差別且釋文者文云如是我聞佛地論第一云如是總言依四義轉一依譬喻如有說言如是富貴如毗沙門此譬意云比故名如似故名是謂當所說如是文句如我昔聞以當比昔似故名是二依教誨如有說言汝當如是讀誦經論順教名如奉行名是謂昔時衆如當聽我昔所聞三依問答謂有問言汝當所說昔定聞耶答言如是我聞順問名如遣疑名是四依許可如有說言我當為汝如是而思如是而作如是而說順求名如稱願名是謂結集時諸菩薩衆咸共請言如汝所聞當如是說傳法菩薩便許彼言如是當說如我所聞於此四中彼論三釋一云四中唯依第四一云依後二又云總依四如彼廣說上來正辨如是兩字於所聞中譬答許差別之相亦即兼顯我聞之義故是物釋也若依菩提留支金剛仙論泛爾總明四種如是而意唯取第四如是兼顯我聞故彼論云一者發心如是如自念言我當如是發菩提心修諸善行二者教他如是教前人言汝當如是發菩提心修諸善行三者譬喻如是如言是人威德如日光明面貌端正如滿月等四者決定如是如言我如是見聞等今言如是但取第四明須菩提云我從佛聞所說理教我之所說不多不少不錯不謬決定如是無所傳之失故曰如是量等名如不錯名是此亦即同佛地論說應知此說如是我聞意避增減異分過失增減非如異分非是謂如是法我從佛聞非他展轉此釋我聞顯示聞者有所堪能諸有所聞皆離增減異分過失非如愚夫無堪能諸有所聞或不能離增減異分結集法時傳佛教者依如來教初說此言為令衆生恭敬信受尋諸師釋言多雜亂無分總別次辨差別者真諦云親聞曰如是我聞傳聞曰我聞如是又部執疏云親聞傳聞曰所聞准報恩經第六及薩婆多論第一云佛二十年中說法阿難不聞何得言我聞佛成道日阿難方生至二十年出家聞經律文憂婆離與阿難同時出家答諸天語阿難此即傳聞又云從諸比丘邊聞此亦傳聞又云佛入世俗心令阿難知此即佛加令知他心又云阿難從佛請願二十年中說法盡為我說佛善巧力於一句中演無量法能以無量法為一句義佛粗示其端阿難盡已得知速利強持力故此即親聞若准金剛華經云阿難得法性覺自在王三昧以三昧力故前所說經皆能憶持與親聞無異如宿命通見過去事無不明了准此唯是親聞問諸教何故如此不同答就宜聞者如此異說理實阿難應化聲聞實常聞法如大乘集法經云阿難有三一者阿難陀持聲聞法二者阿難賢持緣覺法三者阿難海持摩訶衍法金剛仙論亦同此說故知阿難示化如是也次依六義七事別釋者一釋如是略敘此方古來諸師合十家釋一者肇公云如是者信順之辭也夫信則所言之理順順則師資之道成經無豐約非信不傳故建言如是注維摩釋也詳此依智度論云信者言此事如是也阿難信也二者智者禪師云以文為如以理為是文以斷詮為如理以無非為是維摩疏中釋也三者真不違俗名之為如俗順於真稱之為是上代相傳釋也此不顯經義稍疏遠四者遠法師自為兩釋一阿難所說如於佛語故名為如欲簡去相似之如故稱是此謂所如之中是佛語也二如過去佛所說不異故名為如如諸佛說正是非邪故復言是五者寶公云以離五謗名為如是第一如是此經離執有增益謗第二句如是此經離執無損減謗第三如是此經離亦有亦無相違謗第四如是此經離執非有非無愚癡謗謂有外道他問法時以愚癡故作此言答也第五如是此經離執非非有非非無戲論謗謂佛經中通達法相他問法時依經通釋既離五謗故名如是六者古注法華釋云如是者感應之瑞也如以順機受名是以無非立稱衆生以無非為感如來以順機為應傳經者以名教出於感應故言如是謂無非故感應也七者光宅法師云如是將傳所聞前題舉一部也如是一部經義親從佛聞即為我聞作呼轍耳八者梁武帝云言如是者如斯之言是佛所說故言如是九者注無量義經云聖人說法但為顯如唯如是此唯就真今此疏中復有二釋一釋意云即佛語體名為如是次釋意者同上遠法師初釋也次敘西來梵僧異釋一者長耳三藏約三寶釋先約佛者三世諸佛所說無異故名為如以同說故稱之為是二者約法諸法實相故名為如如如而說故稱為是三者約僧阿難所傳不異佛說故名為如來永離過非稱之為是二者真諦三藏云如是者是決定義有其二種一文二理文是能詮理即所詮阿難所傳文理定決如佛所說故曰如是詳此意同金剛仙論次釋我聞且釋我次別釋聞後方合釋我聞二字且釋我者古人云有三種一者如來八自在我涅槃經第二十三涅槃大我具八自在二者凡夫妄相顛倒我如外道等計如微塵或周遍等三者世流布我如五蘊中假立天授佛得等瑜伽第六顯揚第九雜集十三同釋其義且瑜伽云薄伽梵說苾芻當知由四因故假說有情一世間言說易故雜集釋意云於無量差別色等法中總立一我即呼召易二欲隨順世間故雜集釋意云世間不於名別法中而起言說今為化彼故同世說三為斷除決定無我諸怖畏故謂未達知緣起法性便怖畏其決定無我四為宣說自他得失令生決定信解心故謂若不立此彼有情即不能知凡聖差別等今阿難等傳法之人依世流布及由四因故稱曰我聞章中依智度論意可知次釋聞者自有兩門一依事釋二依理釋於此二門各有能所且依事釋先解能聞且能聞者先敘小宗薩婆多云耳聞非識如俱舍第二釋之成實論宗云識聞非耳如彼論第十六說譬喻論師和合能聞如婆沙十三敘之大乘之中智度論第一云和合能聞依彌勒等亦有兩說一云耳聞如雜集第二云耳界何相謂能聞聲瑜伽第三云數數於此聲至能聞若爾何故佛地論第一云聞謂耳根發識聽受答發識耳根是聞體性非謂識聞一云和合能聞如雜集第二云問為眼見色為識等耶答非眼見色亦非識等以一切法無作用故謂無此法能取彼法故由有和合假立為見耳等亦爾述曰就勝而說云是耳聞據無作用故須和合次辨所聞謂即隨聞十二分教然十二分如上已釋略辨體者准薩婆多雜心俱舍及婆沙等皆有二說或說音聲以為教體或說名等以為教體故俱舍頌云牟尼說法薀數有八十千彼體類或名此色行蘊攝然婆沙百二十六正義唯以音聲為體如常所辨依經部宗聲有表彰說為教體謂離聲外無別名等即聲為體故順正理第十四卷破經部云汝不應說名句文身即聲為體然於聲中分為三釋一云十二處中聲處為體離聲無別名句文故此即攝假歸實也二云法處之中表彰屈曲假聲為體識尋名而得義故此即廢實談假也三云通以實假二聲以為教體據前二故雖同經量取解成三依大乘宗亦有三說一者以聲為體如維摩經或有佛土以音聲為佛事若餘佛土亦以色香味等為體如彼經說二云名等如唯識第二云名詮自性句詮差別文即是字為二所依此三離聲雖無別體而假實異亦不即聲由此法詞二無礙解境有差別述曰法無礙解既緣十二分教能詮之名能詮即教故為教體彼論又云且依此土說名句文依聲假立諸餘佛土亦依光明妙香味等此即餘土亦名為體三云如十地論第一云說者以此二事說聞者以此二事聞謂說者亦說聲及名等聽者亦說聲及名等西明法師云有處合說文義為體如瑜伽八十一云謂契經體略有二種一文二義今詳不爾尋教得義總說為經依義立言但名為教今辨教體何論經體故不然也約略如是不能繁具次依理釋能所合辨謂依大乘唯識理釋也尋諸教文兩途說異由此諸師上分兩說一者那伽犀那此云龍軍舊三身論主是也彼云佛果位中唯有真如及真智獨存無色聲等粗相功德述曰寶性論堅慧論師亦同此義所憑經文具如涅槃經中金剛身品仁王上卷云第一義諦常安隱窮原盡性妙智存即其義也既於佛果寂住無為是故諸佛都不說法故楞伽第六云大慧復白佛言如世尊所說我從某夜得最正覺乃至某夜入般涅槃於其中間不說一字亦不已說當說此辨佛果無粗功德不說是佛說此辨雖不說而衆生自心變謂緣自得法及本住法故上句顯真如下句顯真智若依此釋但由如來本行菩薩行時悲願力今雖處寂願力難思法爾能令應化有情自心識上現似聲名文義等相若無如來本願力緣終不能聞故名佛說而實不說此則以自耳意二識為其能聞自所變相為所聞也二者若依護法親光等說佛果位中具有三身如唯識第十卷末釋之即顯前說若依法身可有斯理依受用身為彼登地及變化身為彼地前及餘凡夫二乘人等示現種種色聲等法而為利益是故如來實轉法輪衆生雖復不能親取如來聲等而以如來所說聲等以為本質依附彼質自心變現文義等相故名為聞如來實聲為疏所緣自心所變為親所緣故曰聞也護法等宗釋楞伽云言不說者自有三義一依真如以一切法不離如故如中無說無不說故故楞伽云緣自得法故二依諸法說無異故故楞伽云緣本住法故緣生性同是本住義三者不說墮文字法離執故取龍軍釋意與此不同如上略辨佛地論中敘前二釋云有義如來慈悲本願增上緣力聞者識上文義相生此文義相雖親依自善根力起而就強緣名為佛說由耳根力自心變現故名我聞言識上有顯不離識也理實妄心亦謂遠聞如來聲也有義聞者善根本願增上緣力如來識上文義相生此文義相是佛利他善根所起名為佛說聞者識心雖不取得然似彼相分明顯現故名我聞次辨合釋我聞二字者前依理中雖已合釋而未辨事故今辨之佛地論云我謂諸蘊世俗假者聞謂耳根發識聽受廢別就總故言我聞述曰若依大乘耳意二識同緣聽受縱依小宗亦從耳識流至意識簡釋文義總名為聞也
