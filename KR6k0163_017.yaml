body:
  text: 次釋一時開為三門一敘人釋二依論釋三出體性且人釋者此方諸師雖有多釋總束為四一云佛成道已五十時此全非理二云說一部時三云機感熟時四云說聽冥符不差機會名曰一時第二約教第三約機第四合說尋之可見西來梵僧有三師釋一者菩提留支云言一時者自有多義謂或一念日月時年今言一時非此等正是如來說此經時此意同前第二釋也二長耳三藏云時有兩種一者半音時對緣不遍二圓音時對緣即普從初得道終訖雙林二音普行半隔俱說見少分者為半音時見滿分者為圓音時今准此律即半音時又云劫波自有三種一迦羅時此翻別相時也二三摩耶時此翻破邪見時也三世流布時相續時也迦羅時者如佛制戒見戒者聞未具不聞准律即當此時義也三摩耶時者謂五部阿含如此律五百結集中立阿含九分阿毗曇不簡黑白一切得聞九分阿毗曇如真諦部執疏第一明之也准經即置三摩耶時也世流布得者在申恐迦林一時在恆河岸等雖經春夏仍名一時也於經顯中不說此時也三者真諦三歲七事記中以十義釋一時一者佛出世時二者說正法時三者聽正法時四者持正法時五者思正法時六修正法時七下善種時謂發三乘菩提心時八成熟善根時得生中國修四念等九解脫善根時由前第二乃至第六五因緣故得解脫十平等捨心時謂心浮沈不入正法離此名平也次依諸論略敘三論一依功德施譯般若論云一時餘時復說無量經故意簡餘時唯取此時同上說一部時也二衣龍樹智度論第一意說經初說三摩耶時為破外道執時論故若說迦羅時者增彼執故准前長耳釋意律中即置迦羅時也無外可破故三依佛地論有四釋一言一時者謂說聽時此就剎那相續無斷說聽究竟總名一時若不爾者字名句等聽說時異云何言一同上人釋中第四也二者或能說者得陀羅尼於一字中一剎那頃能持能說一切法門此約大地菩薩非此律辨三者或能聽者得淨耳根一剎那頃聞一字時於餘一切皆無障礙悉能領受故名一時此亦登地非律所辨四者或相會遇時分無別故名一時即是說聽共相會遇同一時義初釋意辨相續此釋意辨相感故不同也次辨體者一者是數時者是時即大乘二十四不相應中二法為體若依薩婆多不離五蘊即五蘊為體如上劫義中辨次釋佛者先辨經文差互不同後方釋文或有經中單置佛字如法華等或有經文置薄伽梵如佛地經等菩提留支金剛般若婆伽婆亦是也或有經文雙置二名如無上依經等真諦所譯多分雙置次釋文者即釋三文且單佛者七事記云大師十號經中何故不列餘九而獨稱佛答有十義一覺勝天鼓帝釋有鼓怨來即鳴佛應機宜勝彼天鼓二不由他誤三離二無知染不染無知四已過睡眠五譬如蓮華六自性無染七具足三義三身八具於三德法身般若解脫三德九具三寶性十自知令他知述曰佛者佛地論云具一切智根本智也一切種智後得智也能自開覺亦能開覺一切有情二智各具此二利德基法師如次配本後者謬如睡夢覺喻本智也如蓮華開故名為師佛喻後智也從此流出戒定慧香以熏機感信心之鼻薩婆多論第一云佛馱者秦言覺覺了一切法相故復次一切衆生長眠三界佛道眼既聞自覺覺彼故名為佛前釋約知德後淨約斷思二德次釋薄伽梵者佛地論云謂薄伽聲依六義轉一自在義二熾盛義三端嚴義四名稱義五吉祥義六尊貴義如有頌言自在熾盛與端嚴名稱吉祥及尊貴如是六種義差別應知總名薄伽梵長行釋云謂諸如來永不繫諸煩惱故具自在義炎猛智火所燒練故具熾盛義妙三十二大士相等所在飾故具端嚴義一切殊勝功德圓滿無不知故具名稱義一切世間親近供養咸稱讚故具吉祥義具一切德常起方便利益安樂一切有情無懈廢故具尊貴義或能破壞四魔怨者謂煩惱魔蘊魔死魔自在天魔佛具十種功德名號何故如來教傳法者一切經首但置如是薄伽梵名謂此一名世咸尊重故諸外道皆稱本師名薄伽梵又此一名總攝衆德餘名不爾是故經首皆置此名或云婆伽婆婆伽畔皆梵音之轉也崇云梵音不正者謬也次釋雙置二名者真諦云佛婆伽婆有其四句一是佛非婆伽婆即二乘無學證二涅槃故名為佛不修功德故非婆伽婆二是婆伽婆非佛即大菩薩修功德故未涅槃故三俱非二種即凡夫人若單言佛即濫二乘若單婆伽婆即濫菩薩若雙置者無前二濫然唐三藏及淨三藏地婆訶等並云梵本經中皆單婆伽婆譯者就省故置佛名真諦立理以義加之也次釋舍衛國等者或云舍婆提並訛略也十二遊經云無物不有國法鏡經云聞物國正梵音云室羅伐卒覩此云聞者城一名多有諸國珍奇皆歸此國故也祇桓精舍或云祇樹正梵音云誓多飯那誓多此云勝氏飯那此云林謂勝氏林也言樹者以樹代林也勝氏即是憍薩國波斯匿王之子也給孤獨食園梵云阿那他賓荼䭾寫耶囉磨阿那他此云無依義翻為孤獨是也賓荼䭾寫耶此云團旋謂以摶食施無依怙人因行立名故云給孤獨食囉磨此云園也此長者本名蘇達多也此云善與也如涅槃第三十須達買園祇陀造立是故文中雙舉二人名也二三衆多和上者意執云一人和上尚得成受二三衆多亦應得戒七非羯磨似他如法也各四如前類而說之者一到損勸捨二順益令欣三舉益勸修四聞已欣奉事未必盡者如尼律受說等類並不明差別故也並是略舉亦上如已謂亦上而已也古人而字多作如字也有疏本云亦如上已自恣亦爾者制自恣即二三人自恣也制自恣羯磨即僧自恣也阿㝹婆陀者相傳云此云威儀法也又有云此云隨問答分別也疏云三十法者有律本具足三十謂自恣辨自恣辨自恣羯磨為二故三十也或有律本脫自恣單有自恣羯磨即但二十九也有餘釋言制戒者對略興廣也說戒者半月一說也布薩者別人懺法也布薩羯磨僧懺法也自恣即別人恣法自恣羯磨衆法差舉也增二上來邪解之人者即初文中邪正之解也餘文雖亦有邪解不過初文攝盡邪正之境者謂緣此境起解也到說上二處二事兩文也於罪諍者起第四文也善果有餘等者謂有餘善能招善果有餘善法能離惡果也法闍尼者非正食不犯足也不破見破如瞻波中不供給客比丘便被治罰滅諍犍度夢見行淫自謂犯夷也實是生種說非生種實非生種說為生種也五邪不可行四依是可行也已解義等者應言前人已解而言未解此是謗他也前人未解言已解竟此是讚己門人也章中筆誤宜改從正也文言見世間常等者文有五個二法計理更應有兩箇二應言復有二見見世間亦常亦無常非常非無常復有二見見世界亦有際亦無際非有際非無際合有七箇二即成十四不可記事文無者略亦可釋家脫漏此十四不可記如俱舍第十九廣釋若依智度論第十七開此十四為六十二見章云斷常見據現在者依智度云世間常世間無常世間亦常亦無常非常非無常四句依現在五蘊起計即成二十句也章云此據未來者智論云世間有邊無邊亦有亦無邊非有非無邊依未來五陰合二十句也是身是命者即蘊計我也瑜伽第六云若計命即是身者彼計我是色身異命異者瑜伽云若計命異於身者彼計我色章中云此二是斷常之本者婆沙第二百云諸惡見趣無不皆入斷常品中一切如來應正等覺對治彼故宣說中道有如來滅度等兩箇二依智論即是四句應過去五蘊復成二十句上來三箇二十并命者即身身異命異合成六十二見章云非有無如來滅度是空見者不然此亦計我差別也瑜伽婆沙意並云但由文異不由義異為對治前第三計故以異句異文計非有無如來滅度章云離陰計我等者唯識第一云又所執我略有三種一者即蘊即是智度論所明六十二見中命者即身也且如新經論中六十二見中我有色我無色等也我無色者四蘊也或二二合等可知二者離蘊謂離蘊外執有別我住在蘊中或言我量微塵或邊等三者與蘊非即離離非即離然住蘊中配疏可知然諸外道或執我為知者見者命者士夫或名如來或名如去或名阿羅漢等也上來所辨六十二見依智度論今新經論六十二見謂四遍常論四一分常二無因論四有邊等四不死矯亂此十八論依前際計復有四十四論依後際謂十六有想論八無想論八非有想無想論七斷滅論五現涅槃合六十二廣如婆沙百九十八百九十九及二百瑜伽八十七及第六第七顯揚第九長含第十四梵動品今略以四門分別一總列論數二約世辨計三別辨其相四五見相攝總列論數者如瑜伽八十七云謂四遍常論四一分常論二無因論四有邊無邊論四不死矯亂論如是十八是計前際計我論者前際計合有五論也又有十六有想論八無想論八俱非論七斷滅論五現法涅槃論此四十四諸惡見趣是計後際計我論者後際計亦有五論也合成六十二見也第二約世辨計者大小乘論分前後際其數即同而釋其義即有差別且大乘瑜伽八十七云諸見依世者謂依過去及現在世起分別故名計前際依未來世起分別故名計後際今詳論意尋求果前起妄分別名計前際尋求果後起妄分別名計後除謂或現在已受異熟即尋過去起妄分別若據當來方受異熟即尋現在起妄分別是故前際計者過計現也且如四遍常中如瑜伽第六顯揚第九並云依下中上靜慮起宿住隨念故計前際常謂憶二十六十八十劫為前三論也或依天眼計現在世以為前際謂觀應從此死而生彼也凡是觀未來今名前際者以尋未受異熟之前故名前際也若准四有邊勿過宿命天眼及妄計四不死計得生天並是前際計也言後際者即如五現涅槃中名後際論者如瑜伽第七顯揚第十以天妙欲為一以四靜慮為四既稱現法而言後際者以現受樂自後永寂故名後際自餘有想等論計死後事故並後際攝也若作此分前後際者一向決定若依小宗婆沙論意就多分說前際十八後際四十四若細分別者依過去世起分別者定名前際依未來世起分別者定名後際若依現在起分別者義即不定且如四遍常中一由宿命能憶一劫或二或三乃至八十劫二者憶生一生或經百千生三由天眼見諸有情死時生時諸蘊相續是故計常四由非理尋思計常就中第三以天眼計云是前際者以見現在死時之相是未來前故名前際若據是過去後亦是際或約過去果未來因亦不定也四有邊論依天眼等准此應知五現涅槃亦准此釋故不同大乘釋也第三別辨其相者前際十八合有五論後際四十四亦有五論且前際五者先明四遍常論謂遍計度我及世間一切皆常婆沙說四初明憶劫第三天眼以此兩論即攝瑜伽等中四數義盡也更加第二第四兩論瑜伽不說如前應知第二辨四一分常者准長含第十四梵動品說劫初成時有餘衆生從極光淨天沒生大梵處𨒬分獨住後更作念願餘衆生來生梵宮應念之間有梵子生梵王更念是我所化後梵衆天福命盡故來生人間修得宿通便見梵王猶在梵宮即作是念大梵是常我等無常第二亦由宿命聞梵王說四大是常心是無常或翻此說第三由宿命智從戲妄天沒來生人間便念戲妄者無常餘不戲妄者常第四意憤天沒准前而說婆沙云此二天住妙高層級或住三十三天此准婆沙若准長含無第二見加一以疾智觀察我及世間半常半無常為四也良以妄執不同所以經論互舉也次辨二無因論者一者無想天沒來生人中得宿命智見昔出心不見已前故謂無因瑜伽婆沙並同說云生無想天初後有心中間五百劫無心也二者以妄尋思不憶前生便謂無因次辨三有邊等論者准瑜伽論自有兩釋一者依瑜伽第七及顯揚第十同云依止世間諸靜慮故謂宿住天眼隨應起計於彼世間住有邊想無邊想俱想廣說如經論自釋云若依斷邊際求世邊時若憶壞劫即起有邊想見斷絶故起此妄計若憶成劫即起無邊想以見微風等漸成之相即計世間展轉有因故無邊若依方域周廣求世邊時上下周求傍以廣求若下過無間更無所得上過第四靜慮更無所得起有邊想傍一切處不得其邊起無邊想此即亦有邊亦無邊也若為治此執作異文句即於世間起有邊非無邊想為避第三句過矯為此第四句也慈恩法師釋憶壞劫有邊者以空劫為邊限故憶成劫無邊者以去壞劫遠故難曰成前亦空何不亦以空劫為限名曰有邊故非理也若依瑜伽八十七釋由憶念器世間成壞兩劫出現方便起邊等四執且由憶成劫故起三種想一者憶念下至無間上至第四靜慮故住有邊想二者傍憶無邊故住無邊想三者二種俱行故住二俱想四者憶念壞劫分位爾時便生非有邊非無邊想釋曰觀已壞時無器像故觀未壞時有可壞故是故合計非有邊非無邊也准此四句中第四句義與前三別然三句但是第七卷中第三句攝義即盡也於中隨應觀前是宿通觀現及後是天眼也此謂外道執我所居之器作此四計也若依婆沙前之二句同瑜伽八十七第三句者以天眼見上下邊以神通傍無邊即以二通合計第三句也第四句者遮第三句此等雖有種種異說莫不皆據我所居器世間也若約器世有邊等四對十六有想等中執我有邊等四合計者即諸經論中辨合計云我及世間邊無邊等是也次辨四不死矯亂論者先且釋名准婆沙意計天常住名為不死計不亂答得生彼天若實不知而輒答者恐成矯亂故得問時答云祕密言詞不應皆說佛法呵云此即真成矯亂之者故云不死矯亂也若准瑜伽顯揚等釋意云諸可謂境名為不死故是經中呼證涅槃為不死句即內外道同詳此名也而證說名為無亂今諸外道自稱得證不死之境而得他問乃妄計云我是不死亂者謂我實證不死之境而於言中不應分明顯說其事故稱亂者故瑜伽顯揚云若有人來依世間道問善不善依出世間道問苦集滅道爾時便自稱言我是不死亂者然准瑜伽第七及八十七兩處文釋且第七卷云四不死矯亂外道如經廣說尋彼論文即是指長阿含第七四梵動品文也略敘彼經文云有諸沙門或婆羅門依本劫本見異問異答攝四見中齊是不過前際名本劫後際名末劫第一或有沙門婆羅門經如是見云我不善惡有報無報耶若有沙門婆羅門聰明智慧設當問我不能答有愧有畏彼若問我當以此答此事如是總指答詞此事異此事不異此事異不異此事非異非不異此四句正是以言矯亂之詞是為初見結成初計或有作如是論我不見知他世有無諸有沙門婆羅門以天眼知他心能達見事能知他世世無他世彼設問者當如上答是第二見或有問何者是善何者不善當如上答是第三見或有愚冥暗鈍他有問者彼隨他言當如上答是第四見尋彼經文正與瑜伽第七卷中義意相當對此應以二門分別一者所問事寬狹二者起計不同且所問事寬狹者如瑜伽云依世間道問善不善依出世道問苦集滅道即是具以世出世法為所問事而經唯言善惡有報無報耶即唯問世間道也雖有寬狹莫不皆是外道不曉之處也第二起計不同者謂依此不曉之處有四種人矯生四計作四矯亂就中即作三門分別一者辨四計人二者辨四矯法諸文寬狹三者辨四計意且四人者瑜伽釋云是中第一不死亂者覺未聞悟第二於證法起增上慢第三覺已開悟而未決定第四羸劣愚鈍今詳論意第一外道於世出世雖有智慧力堪得證而未聞未解若據經中但據善惡兩報世間之法而未開解也此便他已知解人也第二外道於少劣證五通等法自謂最勝及其遇他得證勝者詰問之時而更怖他勝證之人是故經中懼他有天眼等者也第三外道於所學法已聞已解但有聞思未有修慧故於所證之境未得決定是故經中但懼他問善不善等意說怖他於善不善決定證者也第四一向是愚鈍者無有力能生解得證者也總相說者第一人怖勝已解第二怖勝已證第三自身未證怖他得證第四怖知我愚故成四也第二矯亂法寬狹者若如經中前三並是以言矯亂謂得問時答言此事異不異第四句也第四反問而即并以言矯亂通說便是二種矯亂法也且如有問蘊有幾種彼反問言汝意謂五彼即答言此事異不異等也若准婆沙唯是假託餘事謂答他言祕密義等不應皆說若准瑜伽合前經中及婆沙中二計故彼論云如是三種假託餘事以言矯亂第四唯懼他詰問於世間道及出世道皆不了達謂不多不死法於世文字亦不善知謂不了不亂法而不分明說言我是愚鈍都無所了但反問彼隨彼言詞而轉以矯亂彼准此論文但明及問闕無此事異不異等以言矯亂而經有之也第三所計意者婆沙論意計不亂答得生彼無然計不亂自有四種第一人計若勝我解而問我者我實不知輒與他說恐成妄語便不生天故託餘事以避妄語謂為不亂第二人計若勝我證而問我者而我不證便撥為無恐成邪見便不生天故託餘事以避邪見謂為不亂第三人計我未定證若他定證而問我者若我輒說他便詰我知我無知我若無知恐不生天故託餘事以避無知謂為不亂第四人計我實愚鈍他問我法我若不說便違他意恐不生天故反問彼而印順之以避違他謂為無亂若准瑜伽云又復第一怖畏妄語及怖畏他人知其無智故不分明答言我無所知第二於自所證未得無畏懼他詰問怖畏妄語怖畏邪見知不分明說我有所證第三怖畏邪見怖畏妄語懼他詰問故不分明說我不決定如是三種假託餘事以言矯亂第四唯懼他詰問於世間道及出世道皆不了達於世文字亦不善知而不分明說言我是愚鈍都無所了但反問彼隨彼言詞而轉以矯亂准此論文一一皆有二意一者作藏拙意二者作妄計意且如第一怖妄語故恐不生天人藏拙意云怖他知其無智故不分明言我無知即免二過也第二勝已證者儻問之時不知而說恐成妄語若撥他問恐成撥實事之邪見恐不生此是妄計意也餘是藏拙意冀免其過尋文可知第三他有决定證者儻問我時准第二釋之第四藏拙即是計意謂計不能為他說即不生天也若准瑜伽八十七死得天自有二種一者善清淨謂證諦理心得解脫二者不善清淨天謂得世俗定彼論意說善清淨者必無矯亂不善清淨者容有矯亂故彼文云已得善巧彼所成得望我為勝彼若於中詰問於我我若記別或為異記恐妄語也或撥實有或許非有恐撥實有邪見妄許非有亦是邪見故彼於記別見如是等諸過失已作是思惟我於一切所詰問皆不應記以不明記為避過也廣如彼論不能繁敘慈恩法師法菀中及西明法師等釋義並朧尋求者自當見之上來五論前際計訖次辨後五際五論者第一明十六有想論者一執我有色等四論二執我有邊等四論三執我一想等四論四執我有樂等四論合十六論也先辨有色等四者略准三文然後釋義且三文者准梵動品云我此終後有色有想二我此終後無色有想三我此終後有色無色有想四我此終後非有色非無色有想准此皆說死後我有色等二者准婆沙意云我有色死後有想等為四句三者准瑜伽第六顯揚第九同說依於三見起此四句故彼文云又若依命者即身者彼計我是色謂執我為色若計命異於身者彼見我非色謂執我為非色若計我俱遍無二無缺者彼見我亦非色謂執我總遍色非色若為對治故此即於此義由異文句而起執者彼見我非色非非色體同第三句而文有異准此即通現後二世並有色等故瑜伽八十七云由依初見於見於現法中計我有色後或有色有想等廣說如彼然准彼文以其有想十六無想八論非有想非無想八論中並有有色等四句故彼論文合解三個四句今當廣引彼論文云由依初見於現法中計我有色後或有色有想或無有想或非有想非無想此三個四句中各初四句也依第二見於現法中計我無色於後所計如前應知三個各第二句依第三見我論有二種一者說我有色無色二者說我非有色非無色餘如前說三個各第三第四句也詳此有色等四依命者即身異身及但遍等三見立同瑜伽第六顯揚第九等然加後或有想等文以成三個四句也言後有想者如婆沙釋義意應同婆沙意云初句我色為性故名有色取諸法想名為有想謂欲界全及色界中除無想天或有計無色界中亦有色者前三無色亦名有色有想除非想處以彼是非有想非無想攝故第二句我無為性名為無色取諸法相名為有想謂若四蘊之中執想為我即是有想用故名為有想若執受行識三蘊為我即是有彼想故名為有想以想為我所故此中有想界繫同前第三句我如諦語外道總計五蘊起一我想由其各別求我不得是故總執亦有色亦有色亦無色以為其性言有想者若望想蘊有想用故名為有想若望餘四體者有彼想故名為有想於中總我並名有想此計即以自身蘊為我他身非情等為所也界繫同前第四句即第三句無別依見上來釋有色有想四句訖第二釋我有邊等四句者謂執我有邊等與執外器世間有邊等四不同也梵動品云一我此終後生有邊有想二我此終後生無邊有想三我此終後生有邊無邊有想四我此終後生非有邊非無邊有想若准婆沙云執我有邊死後有想等以作四句准此即是有邊等四並通現後二世且釋第一句者婆沙意云或執色為我或執非色為我並容有邊謂執我體有分限或在心中如指節量故有分限若執非色為我者所依所緣有分限故並名有邊此依尋伺起如是見若依等至未必得遍處定此二種有邊我死後有想此欲界全等界繫義亦同前釋第二句者或執色及非色並容無邊且色無邊者如明論說我量廣大邊際難測要知此我方廣生死或執地即是我其量無邊若執非色為我者彼作是念若不至火終不能燒故知若不至我終不能取無邊分量既有所緣無量故知我無邊際此依尋伺若依等至起此執者必得遍處定此二種無邊我死後有想界繫同前第三句者亦通執色非色若執色我隨所依身卷舒不定若時身有量者我即有邊若時身無量者我即無邊故成俱句若執非色者約所依所緣准前應知第四者即第三句同前准知瑜伽第六卷顯揚第九前兩句同後兩句異故彼文云若見少色少非色者彼見有邊若見彼無量者彼見無邊此二句同若復遍見而色分少非色分無量或色無量非色分少者彼見亦有邊亦無邊若對治此者彼見非有邊非無邊此二句異或計解脫我為第四句廣說如彼第三執我一想等四句者婆沙意就得定及尋伺者說第一句有一想者謂前三無色彼想唯一門轉故謂唯意識一門轉也若得非想定者死後便生非想地中即名無後非有想非無想故所以際之也第二句我有種種者謂欲色界除無想天彼想六門轉或四門轉故上三靜慮借初定識故亦有四門轉此之二句據得定者作如是計若依尋伺亦成二句謂有一種工智者名有一想若有種種工巧智者名有種種想第三句我有小想者謂執小色或執小無色為我彼想與此小我合故名我有小想界繫同前亦唯欲界於色界中除無想天或計三無色等並同上釋第四句我有無量想者謂執無量色或執無量無色為我彼想與此無量我合故名我有無量想界繫亦同前若准瑜伽八十七由生處差別故立一想等四句如彼論云有一想者謂在無色空無邊處識無邊處有種種想者謂在下地即如所說隨其次第應知識有狹小想有無量想尋此論文由修無所有定時除遣所緣既不在識故無相應之想故一想中除之也慈恩法師意准婆沙前三無色皆是一想然瑜伽即就除所遣義故各別也其非想處死後必是非有想非無想故論不說其義易了又論文言隨其次第應知狹小想無量想者謂在下地依緣狹小在空識地依緣無量即是逆次釋次第也此四句皆是死後有想也第四執我有樂等四句者亦皆死後有想也瑜伽八十七云一向有樂者謂在下三靜慮一向有苦者謂在捺落迦有苦者謂在鬼傍生人欲界天有不苦樂者謂第四靜慮已上乃至非想處婆沙意我與樂具樂受合等以為四句可知上來十六有想論說次釋無想八論中先解有色等四句者有色等義如上所引瑜伽八十七三個四句同依命者即身異身俱遍等三見立色等四而言死後無想者婆沙意云得無想定及見他得者從此死後生於無想天中若尋伺者見有風癎熟眠悶絶等似全無想便作是念如於此世既是無想他世亦爾故亦無想婆沙廣文意亦不殊瑜伽略釋也次釋有邊等四死後無想者婆沙論意辨有邊等義並同上有想十六中第二四句釋有邊義若論死後無想者同向有色等四死後無想中釋之謂或悶絶等也准瑜伽八十七亦釋三個有邊等四句故彼文中先釋有色等三個四句訖續次文云我有邊我無邊我亦有邊亦無邊我非有邊非無邊隨其次第如前應知准此故知如前有色等中死後有想無想等應知也若比婆沙亦是前兩句同後兩句異如上已釋次釋非有想非無想八論者亦有有色等四有邊等四同向無想八論但知死後非有想非無想且釋有色四句者第一句我有色死後非有想非無想者若依尋伺執色為我彼見有情心不明了便作是念此世既爾他世亦然若依得定彼不可執非想諸蘊為我有色但可執今欲色界身得非想定無色之我與今色合名我有色此即必執色為我所也若許無色亦有色者即執非想諸蘊亦名我有色此即執色或我所也彼地想不明了故云死後非有想非無想第二句執我無色通尋伺得定准而可知第三句尋伺者執其義易知若得定者通執欲色方名亦有色亦無色等如前准知第四句即第三句亦准上釋次釋有邊四句者若執色法為我者以所緣境狹廣及不定可成四句或約時分短長不定以成四句若亦執色者即唯尋伺者執以得定者不執非想為有色故或許無色有色者執亦云無色之我得與色合比於婆沙瑜伽亦是二同二異也問何以兩八論中各無一想及有樂等四答既言一想及樂即非無想及非非有想非無想故闕之也次釋七斷滅論者瑜伽第七顯揚第十云謂如有一立如是論我有粗色四大所造之身住持未壞爾時有病有㿈有箭若我死後斷壞無有爾時我善斷滅如是欲界諸天色界諸天若無色界空無邊處所攝乃至非想非非想處所攝廣說如經謂說十種斷見論者作如是計梵動品云一者我身四大六入從父母乳餔長養然是無常必當歸滅二者此我不得名斷滅我欲界天斷滅三者此非斷滅色界化生諸根具足斷滅無餘四者此非斷滅我無色空處斷滅餘廣如彼次釋五現涅槃論者瑜伽第七顯揚第十並云謂如有一立如是論若我解脫心得自在瑜伽自在名為清淨謂於諸天微妙五欲隨意受用是則名為得現法涅槃第一清淨又若離欲惡不善法於初靜慮得具足住乃至第四靜慮得具足住亦得名現法涅槃第一清淨婆沙二百亦說受五欲及四靜慮為五涅槃然言五欲者一釋通人及欲天一釋唯欲天今瑜伽等同後釋也四靜慮者外道多執依多分說而少執無色故此不說又說執無色為究竟涅槃此中說現法涅槃廣釋如婆沙上來廣釋後際五論總辨六十二見說第四五見相攝者謂邊邪兩見攝准唯識第六釋於邊見中攝四十七論如彼文云此邊見差別諸見趣中有執前際四遍常論一分常論及計後際有想十六無想俱非各有八論七斷滅論等分別起攝准瑜伽五十六七斷見攝餘皆常見攝故知四十七論並是邊見攝也次約邪見攝十五論故唯識論云此見差別諸見趣中有執前際二無因論四有邊等四不死矯亂及計後際五現涅槃論瑜伽五十八文意亦同次略問答者問曰一分常中有執一分無常應是正見何名邊見答此無常解藉常而起望無常應邪見攝且望常解是邊見攝問五現涅槃准顯揚等是妄計清淨中攝應是見戒取攝婆沙二百云五現涅槃以執劣法為勝是見取攝見若所斷大乘何故邪見攝耶答大乘意說要緣於見以執勝淨是見戒取既緣欲等五境故是邪見以其四見不攝者皆邪見故小乘宗中邪見唯說撥無實事但執最勝即是見取若執得淨即是戒取故不同也四一分無常者小宗云非見攝但是邪智也上來即攝六十二見之自性若據眷屬依於身以起邊邪復執三見為勝得淨及由此見受持戒禁故具五見也故雜集第一云或二或一切覺師子釋云謂邊執見及邪見自相故一切者謂五見眷屬故也犯毗尼者五篇犯相也諍者言等四諍此就所滅也又犯毗尼者從惑起業結使毗尼者三界五部惑此一對約所滅煩惱也比丘者如故意出不淨等比丘尼者如獨行等此對約學毗尼人也方者如輸奴國聽五事等遍者煞盜等此對約方及遍制也戒品清淨發生三昧尅理觀在心者謂初起五停心觀觀五陰中都無實我即生空也𤏙等修慧無常苦空漸破陰相漸悟法空故云理解轉深也心冥無相者謂入見道現觀滅諦名為無相見道惑盡即名初果進斷餘結始從欲界乃至非想最後品或解脫道時即具心慧二俱解脫成無學果故總說云心無相乃至具二解脫也若鈍根者唯得慧脫不具心脫此並成實宗也結益等可知者即前科文名舉益初修是也從粗至細者從欲界心入初靜慮次第漸入非想滅盡從細至粗謂從滅定次第還至欲界散心善修斯二者入定出定二也亦獲三益者一生空二法空三入聖道無相已去也即是文云未得令得未入令入未證令證是也偏舉如人者謂清淨人名如人也脫不脫中有六個二初三五明不脫二四六明解脫章云犯不能見見不懺洗即是展轉釋初三五也犯不見釋初見不懺釋三不懺而彼不受也謂所對懺境不為受也釋第六也三文同前者謂前六二是非相對如其次第即為三文也謗不謗中有五一總明謗不謗者文但有謗也初舉增一三對六者上增一文離明邪正中有三謂一法非法二毗尼三制各有到順即成六也今此增二十八法中分二初至是制不斷謂是重舉上增一三對六也第二有二法謗如來一非法言法已下謂是重舉增二上文二見之初十八法也增二四對八者第一對者謂十八法此十八法亦名二見然下章中自名二法也即是上文二見之中除去須見非酒等已下文但取初十八法文來也第二對者謂是二處即增二最初文也第三對者謂是二事即增二初第二文也第四對者謂是二見即增二初第三二見文中除十八法但取酒見非酒已下是也由其十八前別明訖故須除之此之四對各二故八即是總說此中文盡故云四對八也作文不異前者且如十八法中文中但舉法非法一對餘之八對及二處二事等並即是指上文也初文總解二謗下之到說即前二謗等者前辨謗不謗中科文為五即指初段以為總解故云初文也下之到說者謂下之四段別解二謗也謂十八法及二處二事二見也邪解差修者謂不順教修即是不修不必要須不見佛色身也各有總別三對六等者謂此六文各各分五初文總解下四別解也人言有六種等不等者畢吝陀也願律師是各對三句法有行滅者謂將斯六准如前文非法衆中一作法羯磨二非毗尼羯磨三非法便行如法衆亦三反說可知恐人未悟且將初句具足作文應言有二衆如法衆不如法衆何等不如法衆衆中非法衆如法衆數齊非法法者有力如法者無力非法者得伴如法者不得伴作非法羯磨不作法羯磨非毗尼羯磨不作毗尼羯磨非法便行是法不行是為非法衆何等如法衆衆中法衆非法衆二衆數齊如法者有力廣說應知第二句乃至應言何等不如法衆衆中非法衆多如法衆少非法者有力如法者亦有力非法者得伴如法者不得伴如法衆反說應知餘句准知總喻上二衆謂八對二衆者謂等衆及不等衆即有是非二對等不等衆自有六對故成八對也亦有疏本無謂八對二衆一句語也觀過文三中科文云第三佛說已下者文中舍利弗說亦有疏本作舍利弗說也餘四合辨者一自破二犯罪三智者呵四多得衆罪文中合作一門理實應開即為四也漏增中位分為三者慙無慙二者淨不淨即是上文二見酒見非酒等十七對中略舉此一上已釋言衣藥等物應法受畜不生罪過名之為淨畜不應法名為不淨也三者犯不犯等即十八法中略舉五對也攝取略尼即是第二合僧歡喜以其略尼能滅罪諍故歡喜也言不善者現在業因者問文中現言現在不善及未來不善何因乃言唯現在耶答此中意辨今世造因及後世造因皆名現在也重罪准知二百八十戒者廣文准上增一中第二大段辨戒利處說也增三文言根本不現者無三根我根本罪外相不現即是無罪也三非法與憶念者一實犯言不憶犯二言犯小罪當懺三言犯小罪已懺也諍輕重生覓者實犯小罪未懺須懺後與憶念若其已懺清淨直與憶念三滅法者以多人滅言諍也罪處滅覓諍也草布滅犯諍也即此三中一一隨用滅事諍也受戒師德如非有兩個三亦可觀文似是所為受戒人也沙彌據名雖犯皆吉若其據事亦得名為破戒破威儀等故也若以犯殘事故罵謗白衣者謂實自犯將謗白衣云白衣犯事相關即是也如上受戒犍度中被舉比丘休道後還出家與受具竟語言汝能懺悔不若言能當與解羯磨與解羯磨已當言語汝懺悔即有人釋若不先解共他對懺即犯隨舉又准此文應懺懺懺已為解故先懺理亦非妨故懺解先後皆得也准上下文故也應信不信與舉治者謂到說十八等者十八非一故云等也上呵責犍度疏自釋言言不信者不信善招勝報不信聖教是非者不過十八咸初舉中攝以第三舉局故此中疏言寬通諸法謂通十八咸名不信乃至言以其不局順情等者謂第三舉局是順情說欲不障故此信理不得言是第三舉也文中言應信不應為解章云應信不信與舉治者既不為解故知本由不信故治也篤信隆殷具於五法者上呵責犍度文云白衣家有五法應為作遮不至白衣家羯磨恭敬父母沙門婆羅門所應持者堅持不捨有是五法應為作也章云第三稱量白衣同上以釋者即文言應與作遮不至不應與作遮不至是也謂五法具闕也僧殘中三者一憶念二稱三失諸句皆然即成多三為樂故亦成多三乃至風空等各成多三也妄語所稱者唯上增二中疏釋云不得言得謂生空不入謂法空不語謂無相已去也身犯口犯等者觀文似通一切戒說不局妄語也文言恚癡亦如是者謂身恚害口恚害身口恚害為一三乃至身癡害等復為一三也舉上起諍三人者即上僧衆多人一人起也覓諍須以憶念等三個白四滅故局對僧也餘之三諍通三人彌者言諍中現前通三人多人唯是僧二者犯諍中自言通三人草布唯局僧三者事諍中若是覓諍中事作即是局僧若言中事作犯中事作即通三如前准知現前自言通三人秉者現前之中諧和進不等易知自言之中懺殘僧秉提下通三也於戒學中約行以辨者不約定慧唯約戒行以辨也三學除得者除煩惑得四果也始於外凡專似護持等者此依成實宗釋也上代成實諸師云外凡位中名乾慧地始從凡夫慧信佛法歸依三寶受持禁戒戒生定定生慧能觀衆生空未善明了理水不沾故名乾慧地心在理外故名外凡即是從初乃至五停心位也次入𤏙等四善根位觀實法空而有相心數數陵雜為內凡即是章中云四現理靜絶去紛動定品成就之始也謂四善根現前忍許實法皆空故云現也次入見道無相決定即是章云入無相已去也上已數數辨訖第四時迦葉禮佛足已下分為兩文一約人明如非二約喻明如非尋疏可知二種衆法俱集一處者一說戒二羯磨也純修滿學者一純修戒二純修戒及兼純定三滿學三學也兼修滿學者第一戒滿兼餘二學第二戒定滿兼餘一第三具滿三學也問前文既云以戒為主不以定為主等故知亦是兼修定慧二文何別答疏意云前文是不了教後文是了教理實相似今詳前文據彼祈求後文辨三學滿未滿也根跱跱立也成實論二十一初五定具品云又道品樓觀以戒為柱乃至入善人衆以戒為即印八直聖田戒為壃一畔如田無畔水則不住如是若無淨戒則定水不住已上論文第三折伏煩惱者即破戒煩惱與惡覺俱也五下使者新經論中名五順下分結也准婆沙四十九列名者一貪欲順下分結二嗔恚三有身見四戒禁取五疑俱舍二十一頌云由二不超欲由三復下還然俱舍中列名次第與此疏中同也彼論長行釋云謂唯欲界得下分名此五於彼能為順益由後二種不超欲界設有能超由前三種復令還下下如守獄九十防邏人故婆沙四十九釋云謂初二結猶如獄九十後之三結如防邏者如有罪人禁在窂獄有二獄卒恆守御之不令輒出復有三人常為防邏彼人設以親友則力傷害獄卒走出遠去三防邏者還執將來閇置窂獄此中窂獄即喻欲界罪人即喻愚夫異生二獄卒者喻初二結三防邏人喻後三結若有異生以不淨觀傷害欲貪復以慈觀傷害嗔恚離欲乃至無所有處生初靜慮乃至有頂彼有身見戒禁取疑還執將來置在欲界此上論意局據異生釋之俱舍又云有餘師說言下分者謂下有情即諸異生及下界即欲界此釋順下義也前三能障超下有情列名次第與婆沙異前已訖此中意辨由前三結不超超凡入聖也後二能令不超下界故五皆得順下分名此中意說初二果人亦名下界章云一下人心中起乃至廣說者同餘師義也二潤下生三障下果者並是初義之中差別也謂由不超下有有情故必定三界生等也尋之可曉然章中貪嗔二結是欲界修道惑者且據下果唯有修惑理實而言五部貪嗔並名順下結也故婆沙云三十一事為五順下體也為欲界貪嗔各五部故即十也三界身見見苦所斷即三也三界戒取各通苦道二諦所斷即六也三界疑各通四部即十二也通前總計合三十一也瑜伽十四立義稍別不能繁敘第二人如上者欲作文可得同前而義有別謂前不得根本靜慮今此第二即得之也文言所作已辦不復還此者不還三界受生即不受後生是也不了教說者意說前來云不重於定不重於慧等者是不了義理實亦須少分修定慧也問何以重於戒者得不還果答不還果人永斷一切破戒煩惱顯持最勝故明之也戒定俱重准亦同之答以十使為根本等者此下答中略敘二釋且第一釋云十中六使唯見道斷三轉三隨轉等者且辨十使者貪嗔慢無明五見及疑合十也於中前四通見修斷後之六種唯見道斷且約後六以釋三轉三隨轉者此意即依婆沙四十六俱舍二十一雜心第七釋也所言轉者如手轉輪名能轉也言隨轉者如輪隨轉也且如先起有身見故方始執我是斷是常由斯身見即為能轉其邊執見即是隨轉又如先起戒禁取故於戒取上方執最勝由斯戒取即是能轉其見取者即是隨轉又如先疑諦寶有無從此引起決定無見由斯即說疑為能轉耶見隨轉既知隨轉由轉而生故斷轉時隨轉亦斷問集滅諦下既無戒取而彼見取隨誰而斷答即隨苦下戒取而斷由彼戒取是遍行因因既已斷果亦隨斷由此應知不必要須同時而斷名隨斷也以見諦時次第觀故思之可解上來且知總相如是若別分別即顯八十八結斷也且如身見三界苦斷即三也戒取三界苦道所斷即六也疑三界四諦所斷即十二也已上合二十一也上五順下分中已辨訖邊見三界苦斷復三也見取邪見三界四諦所斷合二十四兼前邊見即二十七并前二十一合四十八也已上即開五見及疑為四十八也貪恚慢無明除修所斷局取見斷復有四十且如貪慢及以無明三界四部合三十六嗔唯欲界四部所斷故成四十通前四十八合八十八也問若計三轉及三隨轉但四十八如何能顯貪等四十答此亦許在三隨轉中且如有人執身見已貪愛此見復於他見而生憎疾即恃此見而生高慢復此等惑皆與癡俱故貪等四即隨身見轉也亦於見取邪見之上起此貪等准前應知然其邊見見取邪見一向定是親隨轉攝而論貪等即不定親且廢不論理實亦是隨轉攝也故章云即是八十八也論云一種等者婆沙俱舍並有此文然章所引意依心論且婆沙云復次此經略現門梯蹬故謂說三結斷結也謂見所斷諸煩惱中有唯一部有通二部有通四部若說有身見當知總說唯一部者即攝邊見三界合六若說戒取當知總說通二部者雖更無別通二部惑而戒禁取則名通二部三界合六戒復說彼相應俱有謂與戒取相應心聚若說疑當知總說通四部者即攝邪見見取及貪嗔慢無明於中除嗔餘通三界合七十二并嗔有四合七十六并前二六合八十八也上來並是薩婆多義也然准大瑜瑜伽二十九云薄伽梵說永斷三結立初果者謂依三品有三種結障礙聖道令不得生一在品有有身見由此見故怖畏涅槃不趣聖道二依惡法毗奈耶品有戒禁取由此取故雖已發趣而行邪僻不生聖道三依善說法毗奈耶品有戒禁取由此取故雖已發趣而行邪僻不生聖道三依善說法毗奈耶品有疑煩惱由此故雖已發趣不行耶僻而於正道未串習故於如實見所知諦境猶豫疑惑障道不生廣如彼說俱舍論中有一異釋意同大乘不能繁敘文中明學云若比丘具持木叉等者崇云即將此文用釋上文云何學戒增戒學等是故言學又云舊解如於外凡專加護持乃至廣說此解不然正違明誥次下文中即自分別如斯猛浪上下非一久無悟人流之遂遠今詳立破如破迷記此不繁論然彼崇師雖作此言而亦未曉立三學意此義具如瑜伽十六十七中釋總相意者學之所依別解為首既依淨戒次修定學然四靜慮是諸功德最勝所依偏立為學由依勝定發無漏永盡諸惑故唯無漏立為慧學立雖就勝不遮定道俱生律儀在戒學攝亦復不遮無漏定等在定學攝又亦不遮有漏等在慧學攝故唯識論第九卷中三聚淨戒以為戒學大乘光明等四種勝定以為定學加行根本後得三智以為慧學豈唯要局此文釋耶良由未曉通局勝劣故自取耳然就聲聞據勝建立如律者好修二正勤者或名四正斷或名四正勝廣如婆沙四十一瑜伽二十九顯揚第二雜集第十今且略引婆沙論云一於已生惡不善法為令斷故生欲發勤䇿心持心二於未生惡不善法為不生故餘說如前三於未生善為令生故餘如前說四於已生善法為令安住不忘倍修增廣故餘說如前此四即是心所法中一精進體於剎那中作用不同建立四種如燈一念四用差別謂燒炷盡油然器破暗配疏應知先約貪蓋有六句者今尋文意有無一對為觀現行別也未生及後生一對約永斷與伏不同也次二正斷也略無喜覺支者有律本具有也然尋其意依初二禪有喜覺若意若在上地即無喜支非謂略無也又尋此文意者於慧學中初明五蓋修四正斷即顯初果先入見道後方進修斷欲界惑即經論中依毗鉢舍那修奢摩他是也次文修七覺意起四正斷即顯超證第三果人先即已得四靜慮定今斷餘結修七覺意即經論中依奢摩他修毗鉢舍那是也略無第五者謂此文中應有六句已生念覺理當第六而少第五未生令生故五也亦有律本具六句者今推其義有無一對亦觀現行不現行別也未生及生約未修已修別也已生修滿未生令生約廣現行及令種起也智度論七十六云復次經中說有三種子一者不隨順生二者隨順生三者勝生世人皆願二種子隨順子勝子佛法中唯欲一種隨順生以無有勝律佛故佛子有五從佛口生須陀洹乃至阿羅漢人法位菩薩謂初地已上也辟支不得從佛口生無佛時得道故故諸漏盡者是隨順生也今詳文意舉世三子意觀佛法之中令求等子也諸無學人與佛解脫身等故也准智度論意如此三種病人章中所釋取涅槃第二十六意作此釋也彼經云一者若有病人得良醫藥及瞻病者病則易差如其不得則不可愈二者若得不得悉不可差三者若得不得悉皆可差一切衆生亦復如是若遇善友能發阿耨菩提心如其不遇則不能發所謂須陀洹乃至羅漢辟支二者雖遇善友亦不能發謂一闡提三者若遇不遇一切能發取謂菩薩今觀此律未必同經以其律中制看病法故列此三非謂對機教授義也上衣法中亦有此文已辨意也文中三安居續次即云歌戲如哭等即有人言靜緣正念名曰安居初心觀歌次儛伎笑非謂夏中安居法也然五百問中從四月十六日盡五月十五日日日可結明知夏法有三安居觀歌等文自是別三不須配屬三安之上上母論第五直言比丘法自不得儛亦不得教人儛佛所不聽何犯祇富那婆蘇六羣比丘等自歌儛作伎佛聞之制一切比丘不得歌儛作伎也有六羣比丘如狗槃走法佛不聽也儛法是童蒙小兒所作歌者似哭音此法比丘皆不應作露齒笑者狂人相貌亦不聽也已上論文彼無三安不相配屬故別自是一個三也謂隨戒中序者意說謂隨一一戒緣起名序也隨結等者取釋相也與尼露坐者上九十中第二十六戒緣起之中與尼露坐至戒本及釋相中即云屏坐也急施過後畜戒緣起中但明過前受無過後畜本釋二中具有過前受過後畜也淫戒中釋相中有死尸上犯緣本無也刀賤割裁也衣賤糞掃色賤不正色文云復有三辨蒲㵎反疏中作此釋也今謂三辨皮勉反比丘辨者聞所成慧也聽聞究竟是比丘故不放逸辨者獨處空間精勤思擇即思慧也清淨行辨者即修慧也得入現觀乃至盡漏名為清淨也然實修慧通於有漏今且就勝故取無漏從此三慧發言辨說故云辨也婆沙四十二云又契經說有三種慧一言說究竟慧即是聞慧二思慮究竟慧即是修慧句句皆云即是等者以論釋經也彼契經義與此律文意同也增四破戒配暗經文者一破戒不暗二破戒暗三不破不暗四不破暗餘皆准此下三同爾故有五個四者然文現有六個四也一宣聞無慙四二無慙不暗四三破戒四破見五破命六破威儀也准此應言五位四好也以初位中含兩四故也一雜明衆行者於中初有四個四章中不釋一䩭連分物二破戒三和僧四見僧破歡喜第五四種作法已下章中釋之犯者結第二段者文言智人見已已下是第二段也身現惡等四句中第二句亦應言與同見以其身現亦得同見故也然文言不與同見者且據言中不同也成論聞思二慧悟遠生空修慧即是𤏙位已去故第十五立假名品云假名心或以多聞因緣智滅或以思惟因緣智滅已上論文忍是聞慧忍領聖教也親近者思惟近理也四信法疏中配自心教化等者不然今詳即翻四種汙家令生四種平等信也增五三師能者和上依止教尼也有二十六五正明和上中第十二五但四闕一德也對增心增慧總言者謂增戒是總句也以上文言云何學戒增戒學增心學等是名學戒故知是總也人言四十三德者畢吝陀及首二師同說也然彼但有此言不別列出四十三數今師言五十七者初五自有五分法身第二五教人具五分法身第三五中不信其一也無慙二也無愧三也懈四也多妄五也第四五中自增戒其一也心二也慧三也白四也羯磨五也第五五中不知威儀戒其一也增淨行二也不知木叉三也第六五中不知犯其一也犯懺二也懺淨三也第七五中不知有難其一也無難其二也不十歲三也第八五中教人增戒其一也心二也慧三也瞻病四也第九五中教威儀戒其一也增淨行二也增木叉三也教捨惡見四也第十五中知不犯其一也輕二也重三也廣誦毗尼四也第十一五中具持木叉其一也多聞二也教毗尼三也毗曇四也第十三五中移至樂處其一也弟子有疑如聞解二也第十五五中不能說木叉其一也布薩二也布薩羯磨三也第十六五中善入定其一也出定二也第十九五中善誦毗尼據此善誦與前第十中廣誦不同然觀疏意將為同故不取此一也第二十五中堅住毗尼其一也第一五中具持二百五十其一也不決淨二也上來總數有五十六若除第十九善誦毗尼即五十五今章中言五十七者蓋以第十二中不具持木叉不教弟子毗尼及毗曇若弟子有惡見不能教令捨惡見住善見中據此但四前三同第十一中不須別論觀疏主意欲開為五謂捨惡時未必住善住善之時未必捨惡應開為兩加前五十五即五十七也何以得知疏意如此以其章中但言十四十七十八十九及末五略全同故也當若不開捨惡為兩即是同他同第九五中教捨惡等具木叉等復同第十一中即是十二亦是全同何因不言十二十四十七等同以此准之疏意可顯又若不開捨惡為兩取第十九善誦毗尼非直數不相當亦違疏中云第十九全同也疏意且然若欲別解任違疏釋也增數五十體有二十七者蓋傳寫者謬也三十七為正也初三個五全第一無戒等第二不勤修第三可知第四五中不滿五歲其一也第五五中不移至樂處其一也有疑不能開解二也第六五中修增戒其一也心二也慧三也不能自將養四也第七五中修威儀戒其一也增淨行二也增木叉三也第八五中不知諍其一也不知諍起二也不知諍滅三也不知向滅四也第九五中不知犯其一也不知懺二也不善入定三也出定四也第十五中不知不犯其一也輕二也重三也廣誦四也上來合三十七言第八少一者謂少第一不知諍也親撿古律少此一種今時律本多皆具五也除弟子命終休道二五者上受戒法中第五第七兩個五准此間第四第五兩五作之謂若死若去若休道若不與依止若弟子休道為第五也第七五准可知之八五所呵之病者文有九五疏意准上受戒犍度式叉沙彌尼合為一故八五也體有十四初五全第二五有二即七也婦女家等又有七種合十四也多論第二云和上者四種和上一有法無衣食二有衣食無法三有法有衣食四無法無衣食今捨和上者一切捨之此論明捨戒事也此律和上五法是彼二四句也盡七百來是戒之宗本者准上所論正宗分者應除二種結集屬下者好五種賊心觀文似是盜心差別非謂煩惱差別相也如黑暗心即如祇律摩訶羅與他守門令他盜物自謂無罪及互用謂無罪等如上盜戒廣釋其相遇於前三以興七患者一五犯二五制三五犯聚故名前三也有犯自心念懺等者如上長衣戒也釋不同章中也文中子注云如呵責犍度中說者謂奪七五三十五事也總名界外違於七五中事者若其不束以為總者如受禮受養在無比丘處便成三事今束為總即名一種也舉他亦以五事自觀者謂應自觀我舉他者即不與彼羯磨說戒乃至廣說是故不應無善伴輒舉也今詳或是以七五觀察文中略舉總相也如死尸處恐惡鬼得人便也今見惡人亦恐惡人得便也言令惡鬼便者恐令得便也留雨浴衣若病施食者謂由此故力所不能也六損減中文言喜嗔恚為一也不放捨者謂復堅執為一也如上拘睒彌犍度中說者一比丘犯罪餘比丘語言汝見罪不若言不見語言若見罪應懺二廣說乃至汝若見罪應僧中懺三乃至此僧中懺四惡罵治五乃至應作不見舉治廣說如彼不知修多羅即生彼問長老此事云何此有何義便不能分別者如有問言經中善說罪性皆空今舉我罪此有何義令我懺耶應為分別經說性空是談理觀汝未除妄如何說空又法性空但應除病豈當廢事方始談空若空廢事空應礙有故即不成空由不成空理應須懺若不礙有應不礙懺既不礙懺亦應須懺進退為難犯過無逃若復難言空不礙有亦不礙空不須不懺亦不須不懺何須執我今我要懺復為分別汝不懺空違我懺空是故僧衆要須治汝若生經第二說法聽法各有十六事彼經云凡所說法具十六事瑜伽四十八說法有二十種初之十五種名依隨順說後有五種淨說謂前十五隨法隨人後之五種自他無染然經十六種與彼二十開合不同又次第亦少差異次下可見一者時說瑜伽意云善住威儀名為以時謂人在高已在下不應為說法廣如別解脫經何以然者諸佛菩薩敬重法故二者至心說瑜伽名為重法彼釋意云前人令他於法起極珍貴三次等說瑜伽意云說一切法無間而說彼意云前人聞法已得𤏙法而欲更進欲求頂法便不為進令其間斷今即令無間也四和合說瑜伽名相續釋云又於正法不生慳吝不作師拳彼意云續授與隨求與說終不乖違故經名為和合也前依觀次今據隨求五隨義說瑜伽名隨順彼釋云如其文句次第標釋如其次第分別其義經意可知六喜樂說謂得法故能引現後歡喜悅樂也瑜伽名歡喜彼釋云又若引攝義利法義應標應釋應分別非不引攝義利法義述曰現益名義後益名利也若引益者即為說之不引益者不說也七隨意說瑜伽名愛樂彼釋云又應示現所應示現述曰如多貪為樂不淨得觀成治本貪心故生愛樂經意云隨彼意樂也八不輕衆說瑜伽名悅預彼釋云又應教導所應教導彼意云如有違犯便方令悔使其悅預不應輕呵也九不呵衆說瑜伽名欣勇彼釋云又應讚勵所應讚勵述曰已生少善讚勵令進令生欣勇不應呵其此善下劣令生退心十如法說瑜伽當第十四事彼釋云又所宣說應四聖諦述曰為說四諦如法無虧十一自他利說此含瑜伽中三事彼第十六事名為慈心十七利益十八哀愍彼釋慈心者於己有怨諸有情類應住慈心為說正法利益者於諸惡行諸有情類住利益心為說正法哀愍者於諸有苦有樂放逸下劣有情應當安住利益安樂哀愍之心為說正法述曰樂苦雜受如生人中其中放逸意樂下劣不求正法者應授利樂此三並是利他利他即是自利故云自他利說也十二不散亂說瑜伽當第十三彼論釋云又所宣說無亂易入而不隱密述曰好作迷言恐他速解名亂也十三合義說瑜伽當第十一然彼名為應理謂應三量道理也三量者現量比量至教量也十四真說此含瑜伽中二事彼第十二名為稱順第十五名為順衆彼釋云稱順往善趣順衆者隨衆所應而為宣說述曰非如外道求生天等而說受持雞狗等戒以之為因非順善趣非真正說即由此故不稱物機非是順衆為簡此失經名真正說也十五說已不生憍慢瑜伽云十九者不自讚毀他彼論釋云不以嫉纏增上力故自讚毀他述曰如外道輩嫉佛法故自讚毀佛也十六說已不求世報瑜伽云二十者不依利養恭敬讚頌彼釋云以無染心不希利養恭敬讚頌述曰若以淨心得利無爽彼經次云如是之人能從他聽法從他聽法時具十六事瑜伽三十八聽法亦有十六種束為四義一者遠離貢高雜染自有六種相二者遠離輕慢雜染自有四種相三者遠離怯弱雜染有一種相四者無散亂心有五種相合有十六種也一時聽自下六種遠離貢高也此即第一瑜伽名為應時而聽謂不非時觸悟說也二樂聽瑜伽名殷重而聽述曰專求遣病三至心聽瑜伽名不為隨順述曰離諂詐心也四恭敬聽瑜伽名同也善住威儀不身在坐說者在非坐等五不求過聽瑜伽名同此謂不求法師過六不為論義聽瑜伽名不為損害述曰不欲折辱法師此上六種離貢高也七不為勝聽自下四種遠離輕慢文中間隔如應當知此即第一瑜伽名恭敬正法敬法力勝為自身得勝也八聽時不輕說者此當第二瑜伽名恭敬說法補特伽羅前第四據善住威儀此約走使供給九者聽時不輕於法此當第三瑜伽名不輕正法前言恭敬正法與此何別答前據敬法有力今據於法子知能有種種功德心不生輕云無多益十者聽時終不自輕瑜伽云聽時不自輕蔑此之一種是劣三遠離怯弱相也經久越來入此遠離輕慢遠離輕慢中第四相者義當遠離五蓋也次當辨之十一聽時遠離五蓋此即當前遠離輕慢中第四相也然瑜伽名為不輕說法補特伽羅述曰此義即是遠離五蓋謂不於法師生貪嗔疑即由敬心心離沈掉十二聽時為受持讀自下五種無散亂心也瑜伽名為求悟解心與經意同十三聽時為除五欲瑜伽名為專一趣心述曰得心一趣即是得定入初禪等故名離五敬十四聽時為具信心瑜伽名為聆音屬耳述曰其心證淨是其信相由信故專心聽也十五聽時為調衆生瑜伽名為攝一切心述曰攝受一切衆生心也十六聽時為斷聞根瑜伽名為掃滌其心述曰聞慧由根之所引其相粗淺今發思修二慧斷彼聞根故名掃潑其心也說法十六種總為頌曰時重次和隨喜意輕呵法利散合真慢報為第十六聽法十六種總為頌曰時重諂恭求論勝輕輕自蓋持欲信調斷聞第十六有經本云聽時為斷暗根蓋應是錯也且為釋之即斷愚暗也章云聽者亦爾者謂亦不得悕名利等緣於財色者顯第一色心也起於三想者謂心安布怨親違順等想顯第二想心也而生三受者違相生苦順想生樂中想生捨顯第三受心也此成實宗心心所法次第而起非一時俱又離心外無別心所也章云起於重貪即第四行心也此二因於財色起煩惱染也者即第三有欲第四有結為二也因前三根發生思業者謂由貪嗔癡三不善根以發身語業也上來疏意雖且如此竊尋律本多言若知有受不能越度亦有本云若知有愛不能越度計理有愛以之為正然多為受也尋此即是顯五出界也如上文妄戒尋之又釋若知有受者三受皆苦也貪中分二嗔亦二者崇釋亦同今詳五十前四並是貪之差別一者多欲新經論中亦名多欲二者不知足新經論中名不喜足此二意辨除餘食已於餘資具多欲不喜足也婆沙四十一正義家云應作是說此二俱是欲界一切貪不善根俱通六識謂於己得色等境界不喜足義名不喜足於未得色等境界多希求義名為多欲上四聖種義中已辨此二說第三難護第四難養發智論第二名為難滿難養彼論云云何難滿即律中難護也答諸重食重噉大食大噉非少能濟是謂難滿婆沙四十二釋發智論云諸重食等名雖有異而體無別皆為顯示難滿義故發智又云云何難養答諸叨極叨餮極餮耽極耽嗜極嗜好咀嚼好𭋌啜選擇而食選擇而噉非趣能濟是謂難養婆沙叨極叨等名雖有異而體無別皆為顯示難養義故問難滿難養有何差別答即前所說是謂差別乃至謂即前說重食噉等非少能濟是難滿叨極叨等非趣能濟是難養非少能濟是多貪也非趣能濟是選擇也復次多欲是難滿希多食故不喜足是難養選擇食故即上多欲不喜足中一分義也此中文略但依食說應知衣等亦有二義述曰婆沙謂彼發智論不明衣等亦有多欲不喜足義也今准律文即是具明故知前言多欲不足顯緣資具今言難護及難養者即緣食貪也發智又云云何易滿答諸不重食不重噉不大食不大噉少便能濟是謂易滿釋云不重食等名雖有異而體無別皆為顯示易滿義故云何易養諸不叨不極叨乃至廣說趣便能濟是謂易養諸不叨等名雖有異而體無別皆為顯示易養義故易滿易養有何差別答即前所說是謂差別乃至謂即前不重食等少便能濟是滿易諸不叨等趣便得濟是易養復次少欲即易滿不希食故喜足是易養不選擇而食故此中文略但依食說應知衣等亦有二義又云應知此中有少食而名難滿如食一團即得充濟而食二團等有多食而名易滿如食一斛方得充濟但食爾所更不多食昔有羅漢宿習力故日食一斛乃得充濟將般涅槃集曾供覲苾芻尼曰當為汝等說我勝法尼衆誚言尊既易滿誠有勝法阿羅漢曰汝勿相輕吾實易滿苾芻尼言日食一斛如何易滿阿羅漢曰汝等不知我此前生曾為牝脾盡脾死二反畜母也雌也象載佛䭾都此云堅實此亦如來體骨舍利之異名來入此園由斯善業今得為人出家修道成阿羅漢餘習力故日應食一斛五升恆自節量但食一斛如斯易滿非我而誰時苾芻尼頂禮悔謝有選擇食名為難養如食粗食足得充濟而叨䬸故選擇食之有選擇而名易養如食粗食不得柢支音身選擇食之方可充濟而於美食心不耽嗜又云難滿難養俱是欲界通於六識貪不善根易滿易養俱是三界繫及不繫通於六識無貪善根已上論文准此足知前四是貪第五一種如文易了章云無明八使者於十使中貪嗔二使前已明訖故今但八八使但是無明差別以成實宗諸惑皆是癡之差別離心之外無別心所是故無明亦即是心也文言波陀舍等者章中是傳畢吝陀釋今詳波陀舍者此翻為句也此是義翻若正翻者翻之為迹如象四跡句亦同彼四句成頌故也阿菟波陀舍此云隨句也上文遮阿菟婆陀亦是也前是標句此是釋句故云隨句也又前標句今更分別問答決擇故名隨句也應云鉢陀阿奴鉢陀者好也便闍那此云文也阿菟便闍那此云隨文也謂即名句所依之文於中亦有標釋不同故云文隨文也應云便繕那阿奴便繕那者好也崇云闍字不正者彼亦未曉而實梵書但有闍字而上聲呼即似繕聲也惡叉羅此云字阿惡叉羅此云隨字也亦是名句所依之字於中亦有標釋不同也應云惡剎羅阿奴惡剎羅者好崇云西方俗語名惡叉羅典語名便繕那者謬也如論中云文即是字為二所依但知文者是其顯義如壃顯味扇顯風等惡叉羅者是無異轉義也此即體同而義異也文言舍利弗與五百比丘俱等者蓋取五百為五數也此中意欲記憶瞻待諍比丘法也三令增長者增長善法也遮法中七種五法者上章中釋云初之二五立如非章門次有三五慰喻呵責次有二五呵責讚美先釋如門即上文言若比丘欲舉他者內有五種法應舉他何等五以時不以非時真實不以不實有益以損減柔𤏙不以粗獷慈心不以嗔恚比丘有此五法應舉他次釋非門五者續次文云何以故我見比丘舉他以非時不以時廣說反前廣知次有三三五慰喻呵責於中前二慰喻所舉即上文云彼餘比丘言舉汝非時不以時廣說應知莫以此語嗔恚此即慰喻剛強人也若比丘被他不實舉者應以五事解喻舉汝非時等乃至廣說莫以是愁憂被不實舉者應以此五事解喻此即慰喻善𣽈人也次第三五呵責能舉即上文言彼不實舉他者應與五事呵責汝舉他非時不以時乃至廣說可慚愧以不實舉他者應以此五事呵責次有兩五呵責讚美前五呵責所舉之人文言被真實舉比丘應以五事呵責舉汝得時不以非時莫生嗔恨真實不以不實乃至廣說莫生嗔恨被真實舉他者應以此五事呵責呵責已如法治次五讚美能舉之人文言真實舉他者應以五事讚美舉他得時不以非時莫生悔恨真實不以不實乃至廣說莫生悔恨應以此五事讚美何以故後若復舉他者當以真實問曰准上文中雖有七五此處文中已有二五如文言有五非法舉非時不以時等故知上文如非二章也但此文中先非後如不同上文故於七五應除前二何故章中總取七五答此文重舉非如二章為與次下不善善等以為句本故與上文其意各別何以知然以此文云欲舉他罪者應有五法如上遮中是故不得將次文中有五非法釋前欲舉欲舉顯如豈將非釋是故上文與此各別故須重取上文七五也崇云不同舊解更取遮中七位五德直見文言如上遮犍度中說故作此言若牽說字屬下即無疑惑應言說有五非法舉謂非時等若作此釋即此文中但有三五謂前具持二百五十等二五并說有五非法舉一五合三也不善善等即是釋前非是五數也今詳違理以其前標有五欲舉何將次五非釋之如前已辨故違理也又如上來病人有五法易看如衣法說有五棄捨如拘睒彌說此中六經如上自損減中說鬪諍六根如中阿含說有八不可過法如尼法說斯等說字豈可並須牽向下耶故定違理也合十四五者前說具持二百五十等兩五并遮中七五及不善善等五五合十四也然此不善善等如非別分自成十個五而言五五且據合說也但有十個五法也者疏主正釋也謂前十四中除不善善等四也有餘皆言十四者勝以其前文無損益義何得文言亦如是說故知前釋勝也今詳前文明言五非法舉五如法舉何因乃云無損益義通論上下有十一個五者疏主正釋十個五辨上文中有一五文云佛告憂婆離汝等莫數數舉他何以故舉他者身威儀不清淨即生彼語長老先自令身清淨第二言清淨第三命清淨亦如是第四宣聞不誦修多羅生彼語多聞誦不生彼語第五宣聞不誦毗尼生彼語多聞誦不生彼語此中疏云上文身清淨五即此是也合成十一也及此初五者即前文具持二百五十等兩個五中前一五也智慧知毗曇藏多聞之類者以其上身清淨五中闕知毗曇但有多聞故將智慧等會同彼多聞也下之四法總是利益等者如前文言有欲利益其一也令增長二也懺悔三也清淨四也此之下四並是利益也增十及十七二門至下文中自見其相也無第三句言等以簡之者謂亦實亦非實等顯成多句故置等言也增六業具境緣所稱者六犯所起及以盜業名為業具重物是境盜心等六鬪根等是緣生年等六是所稱也了論八緣起者如上釋偈序辨毗尼義中已釋訖謂於此六更加兩句如彼論云有從意生不從身口如心地諸罪又一句云有不從身口意生如先對人說大妄語彼人不解此人已對治三方便後時彼人若追解其語此人即得波羅夷罪已上論文嶽寺律師云若先對治三方便時必須止事若不止事即非斷續懺法不成後得夷時即從口等何得俱非律師意云欲懺悔時要語前人云我先妄語今欲懺悔即是止事也今詳不然豈容懺悔小妄之時一一須報所誑人也凡言止事加行已息即名止事豈要報知名止事也且如教人煞盜未成使人去後即懺悔者此即加行未名為息可須止事今既不同何得謬例又是論文何容妄破故依論者善也鬪淨六根上滅諍犍度已釋訖增八總合有十個八者若離八馬八人及火聚等八喻為三即十合為一即八八也依制舉罪者不然此是目連初緣舉罪以天眼舉便是違制上說戒犍度制自言訖續次即合有此間文乃至廣明下八喻訖次方合有次八奇文又此增八亦應有彼八奇之文此結集家集之不次或傳久遠梵葉翻覆致合上下如斯遺漏說戒應淨須明治罰闕惡罵文理不應爾增明數闕八奇文亦不應爾又古來釋事罪不引以惡罵治義亦有餘今釋不引對僧作罪僧悉了知若犯初篇韁杙俱棄以彼惡人不得秉法作滅擯故若犯下篇自有梵法默擯治之如闡陀類異語是也當時目連所舉比丘祇云犯盜緣起既是犯重之人如何古來妄釋斯義又須撿驗上下兩文世尊住處白月黑月說戒時節露地坐等及云舉罪足曉兩文本來相續四親近行者涅槃二十八師子吼白佛言世尊如先所說菴羅果喻四種人等有人行細心不正實外熟內生有人心細行不正實外生內熟有人心細行亦正實有人心不細行不正實是初二種云何可知佛言善男子菴羅果喻二種人等實難可知以難知故我經中說當與共住住若不知當與久處久處不知當以智慧智慧不知當深觀察以觀察故則知持戒及以破戒善男子具是四事共住久處智慧觀察然後得知將戒破戒已上經文共護佛法故曰以作井蘭者今詳於彼犯人身上行治罰法即將此法以喻井蘭不望人說為井蘭也第五惡罵即是初緣者亦可總是如上文言作餘語答何所不該但應除第八以其當時未必即有捨戒事也便起嗔恚即默然等也文言既傷其膝者謂己犯竟復更謗他也合喻可知者謂是總合故文言亦如是也沸血面出自知有犯故捨戒休道自恐不終故無漏心脫聖人進道故遠塵難垢從凡人聖故增十文言隨如法僧要既隨故不應遮如法僧要不呵上遮犍度中云如法僧要不違逆不墮如法僧要呵說中上文云如法僧要不違逆說中更有三個增十者此古師取上增五中五種持律中廣誦毗尼及住毗尼而不動并善能除諍三個不同者以釋此文也自須遠難嫌呵指前身清淨五復利益所舉指後常五德也增十二或可有三者如下勸學十二古無今有至下當知諍根非諍根者如中出離無嗔恚等非諍根也反說是諍根也辨中先非後如者尋章中意意欲說言辨諍根中先非後如即次下文言若比丘所在之處不共鬪諍反上句是者即是如句若不爾者三滅三增一向名非何處有如也言宣聞不見修多羅者不見修多羅即是宜聞疏意如此也又文云不多聞不知毗尼者疏中離出不知毗尼為第五也又有說者上來事諍者畢吝陀及首二師同說也取憶念者等取不癡罪處所也次第二十二有敬等六合之為一次破戒等三次三根次五德即十二也有恭敬無愛此句文錯者亦有律本云無恭敬有愛不錯者也親撿有此兩律之異也有說但是量宜者雲律師也前應舉中且作兩句者如上一句於七中闕第一第五復第二句闕第一第三並應舉也如數胎潤等月者滅年戒本有開胎潤等文受戒犍度亦有開文兩文雖同其義各異滅年未為開和上受法為開弟子得戒疏意且然人法中了中等者多罪多得法中文有七句初四顯是後三明非就初四中前三不了第四了教然不了中且如初句犯二僧殘二俱覆藏彼憶一罪不憶一罪隨所憶者從僧乞行行時復更憶第二犯佛聽隨憶與第二覆然此文意從犯已後二俱成覆臨至乞時遂便妄一是故二罪並得與覆下之三句生非之中初句文言犯二僧殘憶一罪不憶一罪二俱從僧乞僧俱與覆有客比丘遂即呵云憶者與覆善不憶者與覆不善僧應作吉懺然此非中憶一忘一是從本來犯意即爾何得同前乞時憶妄但以衆僧不了教意妄執上文憶一不憶一佛聽隨憶二俱與法我今復文亦是憶一及不憶一文既相似應俱與覆增十七利益損減者下增十七中應舉之德第十二利益復以常五德配之於中亦有利益有何差別復有兩個實不實兩個慈心等並如下辨增十七各自觀身者由無德故但應自觀如上惡性違諫戒中引多論釋增二十二文言後來後坐者雲首同說先集起諍比然後來坐為之判滅要具此德方能處衆斷理也今詳文既明言不與此部彼部同事由此故知於一切時後來來後坐表不相隨也宗理幽玄近情難測且隨拙見纂述已終所益雖微希成二利願於長夜轉熾千明矣
