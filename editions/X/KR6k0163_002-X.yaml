body:
  text: 嵩缶鎮國道場沙門賓作將解本文仰依先章著述凡欲開發經題須為三要言三要者第一舉宗攝教第二知教旨歸第三正釋律初題目然以文義星羅卒尋難曉自非束攬詮旨難通故欲釋文先為三要是則三要以束攬為義也疏釋三要初略後廣就略釋中第一言舉宗攝教者復開為三第一立藏差別第二翻名釋義第三正辨相攝問依義立三藏別耶答舉宗攝教立藏差別謂於此中聖教雖眾略要三種第一修多羅藏第二毗尼藏第三阿毗曇藏故成三藏言舉宗攝教者經律論文各詮三學隨文釋藏混雜無分故舉正宗攝為藏教以兼從正相別歷然故即章云此律所明兼詮定慧今以宗求其唯戒學由此准知經唯定學兼詮戒慧論唯慧學兼詮戒定此即義同婆沙第一如彼文云如是三藏有何差別或有說者無有差別所以者何一切佛教從一智海之所生故隨一覺池之所出故等力無畏所攝受故同一大悲所等起故復有說者亦有差別且名即差別謂此名素怛纜此名毗柰耶此名阿毗達磨復次依處亦有差別謂若依增上心論道是素怛纜若依增上戒論道是毗柰耶若依增上慧論道是阿毗達磨問於一切中一切可得謂素怛纜中亦有增上戒增上慧論道餘二亦爾如是三藏應無差別答依增勝說謂素怛中依增上心論道勝餘二准說有作是說素怛纜中依增上心論道是素怛依增上戒論道即毗奈耶依增上慧論道即阿毗達磨餘二准說故由依處亦有差別更有多釋不繁具之今此章中舉宗攝教立藏差別即同婆沙依增勝說宗者尊也勝也主也即是婆沙增勝義也攝有二義一自性攝如俱舍第一云攝自性非餘以離他性故如以眼根攝色薀等雜集第五名為相攝謂薀界處一一自相即體自攝如色薀攝色薀等二者他性攝如俱舍云就世俗說應知亦以餘法攝如四攝事攝徒眾等雜集名為攝受攝如世間說主能攝錄自僕使等依此二攝且約經藏辨攝教者若詮定學即自性攝以其經藏定為正宗故詮定處是自性攝若詮戒慧即他性攝謂經藏中正明定學兼明戒慧以兼從正名契經藏故明戒慧是他性攝此之二攝義可俱明舉宗攝教餘之二藏准此應知故章略言舉宗攝教廣釋攝義如婆沙五十九俱舍第一瑜伽十三雜集第五第二翻名釋義者先釋總名藏是攝義謂能詮教契經等三皆能攝藏所詮諸義故名為藏故莊嚴論第四卷云彼三及二云何名藏答由攝故謂攝一切所應知義三即是藏持業釋也六釋義如前卷記釋別名者第一修多羅別藏或名素怛梵音轉也翻為契經章云所謂教諸經者略釋也契者是契合義謂能詮教契所詮理合有情機故名為契經者是貫攝義故佛地論第一卷云能貫能攝故名為經以佛以聖教貫穿攝持所應說義所化生故正翻為綖綖能貫華風吹不散契經亦爾攝所說義攝化生義同向說又無性攝論第一卷云貫穿縫綴故名為經此等皆據能詮為經契經即藏持業釋也今三藏云素怛纜者此云略詮此乃是其一枝別義未為通悟第二毗尼藏者或言毗奈耶或云毗那那音之轉也此含多義如下當釋且略說者貫論第一云毗尼名滅滅諸惡法故名毗尼或翻調伏天親攝論第一卷云調者和御伏者制滅調和控御身語等業制依除滅諸惡行故此通調伏身等三業離三惡行善見第四云如來哀愍眾生三業不善是故說毗尼藏以制伏身口意業俱舍十五云言調伏者意顯律儀由此能令命根調伏故此即約根律儀釋調伏也謂以正念正知二法為體防護諸根名根律儀非表無表律儀戒體也然調伏者所詮行調伏之藏依主釋也第三阿毗曇者或云阿毗達摩此云對法俱舍第一頌云淨慧隨行名對法及能得此諸慧論此兩句中上句即是勝義對法下句即是世俗對法且勝義者尅性唯取淨慧為體兼眷屬說即通隨行故云淨慧隨行名對法也法謂涅槃或四聖諦淨慧即是無漏淨慧以無漏慧對向涅槃對觀四諦故名對法此無漏慧義中勝故故名勝義婆沙第一據尅性說故彼文云然阿毗達磨勝義自性唯無漏慧根俱舍即兼淨慧眷屬是故復說隨行為體言隨行者謂此慧俱相應四薀及隨轉色是則無漏四薀五薀為對法體此等隨彼無漏慧行故曰隨行色界六地具有五薀前三無色無道俱戒故但四薀無色無道俱戒如婆沙百三十釋次辨世俗者除無漏慧所餘修慧思慧聞慧及生得慧并相應四薀及五薀隨其所應以之為性飲界有聞思色界有聞修無色唯修慧於中唯有色界修慧具足五薀所餘諸慧無隨轉色故俱四薀及取能詮無漏慧等所有教法亦名對法故云及能得此諸慧論諸慧即是修等諸慧論者是教故彼論中長行釋曰論曰慧謂釋法淨謂無漏淨慧眷屬名曰隨行如是總說無漏五薀名為對法此則勝義阿毗達磨若說世俗阿毗達磨即能得此諸慧及論謂能得此有漏修慧思聞生得及隨彼行論謂傳生無漏慧教此諸慧論是彼資粮故亦得名阿毗達磨釋此名者能持自相故名為法若勝義法唯是涅槃若法相法通四聖諦四聖諦總攝一切法盡是法之相故名法相此能對向或能對向觀故稱對法已上論文此中諸慧名之為對涅槃四諦名之為法對彼法故名為對法有財釋也先來諸師將為依主釋者謬也順正理第一及顯宗第一釋有為法亦名有離離謂永離即是涅槃有彼離故名為有離如有財者名曰有財今准彼文故對法名是有財釋也教能詮慧名對法者全取他名亦是有財若經名法論教能對名對法者亦准知之若將對法望藏為名者教名對法對法即藏是持業釋自餘約慧名對法者對法之藏依主釋也釋對法名略尋諸論有三十六釋婆沙第一有二十四釋雜心俱舍分別功德論無性攝論各有兩釋世親攝論四釋合三十六釋也釋第三正辨相攝者如章今茲律典三藏之中乃是第二毗尼藏攝典者即是經之異名外學者釋典者常也言可為百代常行之道也由依戒論道是毗奈耶雖兼定慧然是第二毗尼藏攝第二門辨教宗者前列名云知教旨歸旨者意也至也歸者趣也向也謂造釋者知教意趣意趣即是宗之異名故云知教旨歸也若作指歸字非此義意也此中章云辨教宗者語雖異前而義無別增戒學等者通相為言一切戒一切定一切慧如次應知立為三學然經論中就漸次修故立木叉以為戒學四靜慮定以為心學得無漏慧入見道等以為慧學故下律文云若比丘具持波羅提木叉成就威儀畏慎輕戒重若金剛等學諸戒是為增戒學何等增心學若捨欲惡乃至得入第四禪是為增心學何等增慧學若比丘如實知苦集盡道是為增慧學瑜伽第十七意亦同此所言增者是增者是增勝義謂戒定慧能有勝德及有勝用名增戒等第十疏中釋三學義至彼當知止作俱戒者大聖制戒不越二門一者止持離惡門離婬等是二者作持䇿進門修定等是然則止作圓戒學滿俱能防過並戒門收故言俱戒問三學應成雜亂答毗尼藏中戒論道勝以宗往攝無雜亂失創發要期斷惡修善者發心盡名曰創發要期誓學二持故稱斷惡修善也建志成就納法在心者勇銳無屈名為盡建志成就聽聞白等如法羯磨發表無表流入身中故名納法在心也義順受體說之為隨者問犯非順受應不名隨答悔以成隨爾者若犯初篇如何得悔答學悔故隨若爾覆無學悔應不成隨通律師云隨有二義一順受義二後起義故並名隨今解犯在隨位相從名隨若約剋性犯實非隨然此章中或尅性說義順受體或相從說即通持犯理並無失戒法有為等者功德法中或有有為功德或有無為功德今此戒法有為德攝續眾緣所作生滅相名曰有為故俱舍第一云如是五薀具攝有為眾緣聚集共所作故無有少法一緣所生為破外道執一因生故云無有少法一緣所生能發之緣者通於因緣及增上緣至下當釋寔實也位皆凡聖等如下廣辨中第四教所被者聖不等門釋備如常者如廣辨中釋名門辨一者作戒二無作戒者下受體門自當廣釋今且略解方便身口等者現緣動發稱為方便簡酬往業報色體也婆沙百一十七云然身業定非異熟加行起故是此義也雖諸有為剎那生滅無容從此轉至餘方然相相續假言造趣營為也一發續現四心三性始末恒有者一發已去相續現行故云一發續現也言四心者疏主多依成實宗義故准成實第九卷無作品云若人在不善心無記心亦名持戒故知爾時有無作善心有戒相續不論不善律亦如是已上論文此論文意即三性心及以無心為四心也問於四心中以論三性何須更別說三性耶答四心門中雖復已說於三性門重說非然二門既別法相無違或復通收色等三性故復別說問無心非心何名四心答從多分名理亦無失復有人釋准成實宗識想受行四心恒有復有人引俱舍第一頌云亂心無心等隨流淨不淨大種所造性由此說無表述曰一者亂心二者無心次言等者等不亂心及以有心故成四心也光法師釋意云無表二性一善二惡心通三性善惡無記亂不亂者惡無記心望善無表以性別故名為亂心若以善心望善無表以性同故名不亂心由此准知善無記心望惡無表名為亂心若不善心望惡無表名不亂心若准順正理第二釋此頌文真言不善及無記心名為亂心餘名不亂不同俱舍約性同異名亂不亂也無心即是二無心定翻此二位即是有心問此中無心亦應通攝無相異熟答彼雖無心都無無表故此無心不攝於彼謂色界中無散無表復由無心無定無表故也色界必無散位無表如婆沙百二十二釋之順正理論破此頌意云亂不亂心攝心已盡何須復說有心位耶或應但說有心無心何用復說亂不亂心光法師敘安慧救云亂不亂心是據散位有心無心是據定位故無有失若准真諦舊俱舍疏云染汙心名亂心餘名不亂心入定心名有心二無心定名無心此四位中無教恒生無教即無表是也今詳此等似乖文意觀世親意云亂不亂心雖是有心為對無心復說有心凡諸法相或由體別而更別說或由義別而亦別說今由義別別說無失故俱舍長行釋曰亂心者謂此餘心無心者謂入無想及滅盡定等言顯示不亂有心相似相續說亦隨流善與不善名淨不淨上來三家釋四心義若望順疏初說為勝俱有懸防者通律師云無作懸防義容可爾作已落謝如何懸防答作生無作故並懸防或人破云上法得戒不從作生故知表戒不生無表今釋別解脫戒無表必從表生故婆沙一百十九云別解脫律儀依表是表隨心轉律儀依心是心果百二十二云欲界必無隨心轉無表色界必無依表發無表已上論文若爾上法得戒應有表業答據根本位雖無有表然從加行表生無表謂加行中所有無表善而非戒至根本位方立為戒故無有失無作非色非心者至下受體當廣釋之惡離善行者如次即是止作二持也念智捨等護防身口者此根律儀三門分別一釋名二出體三明差別言釋名者新譯經論名根律儀亦名為護舊譯經論但有護名所言根者眼等六根言律儀者是防護義謂念智捨防護六根名根律儀舊名護者真諦釋云能障惡事攝善事故能守護六根門令惑業不入故能防守行人令不墮四惡道故又能防守行人令出凡位入聖位故由斯多義故名為護今助一釋護六根不流泄故次出體者先辨位次出體言辨位者始從初業持戒護根乃至無學若定若散有漏無漏一切位中但使根門不漏諸惡皆悉得立為根律儀瑜伽二十一二十三廣明聲聞戒根律儀是世出世二道資粮故知即是通初業位婆沙四十四云云何護圓滿答無學根律儀應知此中根是所護由念慧力護眼等根不合於境起諸過患如鈎制象不令奔逸是故無學正念正知名護圓滿謂根律義如從初業至無學位方圓滿也正量部宗明了論云由對治上心惑應說諸護數量即是通明對治道義歷尋諸部義意並通一切諸位次出體者准正量部正念正知正捨三法為體念謂於緣明記為性謂能憶持本所受等慧謂簡擇功德過失捨謂遠離貪憂二品心平等性無警覺性故明了論偈曰毗尼曇略文所顯與戒及護相應人釋曰由對治上心惑應說諸護數量三界上心惑有二百九十四是彼所起非護亦有二百九十四為對治彼有善及無覆無記諸護合有五百八十八是人與此能對治護相應論更一釋恐繁不敘偈中意云理實毗尼具含多義略而言之身論善戒及護根義皆是毗尼而於律中但明於戒而不明護故今毗曇具顯戒護方令律藏義理周足故云毗尼毗曇文所顯與戒及護相應人也戒即身語律儀也護即根律儀也諸聖弟子與此相應故云相應人也次釋長行意云偈中雖言戒護戒護必有所治之過故云由對治上心惑此即略標所治過也以理而推所治有三一者上心惑即發惡業遠因心也二者非護即發惡業近因心也三者非戒即所發惡業也今此略標遠因心也應護說諸數量者略標能治也復以義推能治亦三一者聖道治上心惑二者護能治非護三者戒能治非戒今且略舉護體一門也言數量者顯頭數也問能治所治既各有三何以所治略標遠因正治之中略標護體答所治就本故舉遠因能治舉兼故舉護體故真諦云此但說護即兼收戒故但應說諸護數量彼釋意云護是能發心戒是所發善業故說能發即收所發問後何不言能治聖道答護體之中既有正智即顯聖道故亦不明論云三界上心惑有二百九十四是彼所起非護亦有二百九十四者此即別明能發業心遠近二因也上心惑是遠因也非護是近因也前略標中就本而說故舉遠因今意正明護家所治故明非護真諦疏云上心惑者惑有二種一者隨眠部執疏解意云恒隨眾生如眠不覺此惑亦有貪等執之異縱入無心猶恒相續即當大乘種子義也二者上心隨眠真諦意云上心即是起心義也為簡無心等位此惑不行故云上心也雖非恒續亦隨眾生而無覺悟故云隨眠即當大乘現行煩惱也隨眠不能生非護及非戒唯上心惑能生非後及非戒然非護者從上心惑之所發生謂由此惑能令失正念起耶念失正智起邪失捨心起意憂喜嗔恚忿恨嫉等類總名為憂貪慳覆憍等並名為喜也故名非護此唯意地未動身口也若動身口即名非戒此應二句分別謂非戒必是非護非護未必非戒非戒必從非護心發故云非戒必護也然未動業但名非護以未動故故云未必非戒也翻此而說戒護相望亦戒二句戒必是護護未必戒戒是善業必從護發故云戒必護也然未發業但名為護以未發故故云未必戒也先來諸人解云如有俗人雖起善心而無有戒故云護未必戒者甚未識意且上心惑三界總有二百九十四者真諦釋云正量部說欲界大小惑有一百三十七大惑即是貪嗔癡等根本煩惱小惑即是忿恨惱等餘隨煩惱大意如是色界大小惑八十六無色界大小惑合七十一都合二百九十四一惑能生一種非護非護頭數故亦同也論云為對治彼有善及無覆無記者謂念慧捨以為護體各通善性及無覆性不同大乘念慧並是五別境數其體並通善等三性捨是善性十一善収若薩婆多念慧並是十八地攝亦通三性捨唯是善十善數攝何以不同者真諦釋意云正量部宗圓安名善言圓安者謂強勝心因時無悔果時離苦故名圓安論其無覆無記者善雖昧弱猶能遮惑令不覆心故稱無覆安不圓滿故名無記釋無覆無記與餘宗不同准此部宗勝劣二善分為二性是故二性皆為護體若薩婆多有漏善法由感愛果故名為善是則通收正量部宗二性名善准此唯善以為護體然薩婆多復是念慧二法為體故俱舍云正知正念合名意根律儀述曰謂以二法合為護體或名意律儀或名根律儀故云名意根律儀也若准婆沙百九十七云復次釋衍彼文云有作是說根律儀以正念正知為自性有說不放逸為自性有說六恒住法為自性謂眼見色已遠離貪憂恒住正捨乃至意知法已亦爾所餘次不繁敘若准瑜伽二十三云常委正念防護六根合行平等或是善捨或無記捨故唯正念以為護體由護根故或行善捨即十一善數中捨也或行無記捨位四無記心離染義邊假說為捨理無別體論云諸護合有五百八十八者非護既二百九十四各有善性及無覆性以為能護故成五百八十八也總述意者非護既從破戒煩惱之所生起此即是親發業心也故以念等防護此惑令於六根不復流漏即令身口離過行成也第三辨差別者總說律儀名雖是同然根律儀是心所法身語律儀是表故不同也婆沙百九十七有兩句彼云諸業彼不律儀邪答應作四句有業非不律儀謂身語律儀有不律儀非業謂根不律儀即明了論非護是也有業亦不律儀謂身語不律儀有非業非不律儀謂根律儀第二四句者諸業彼律儀邪答應作四句有業非律儀謂身語不律儀有律儀非業謂根律儀有業亦律儀謂身語律儀有非業亦非律儀謂根不律儀作法作事有離有合離者一者作法謂誦戒羯磨等二作事謂受食不安坐受食等合者假作法而作事如得法造房等類對事作法者如先畜長後方說淨之類也第二白法者善法名白昔未犯時名為為初白今犯已悔名第二白第三門通標一部名之為想四分別論名為別舉也隨根制戒輕重差殊緩急有異者先來諸人種種解釋或以僧祇四錢三角餘律五錢以配輕重輙度殘提以配緩急結淨開制配犯不犯今詳本意輕重緩急等體同義異謂隨諸部根性不同於一事中犯相昇降名為輕重如四錢三角五錢等事反輙度等義亦是同據為誘進及為遠防於一事中制相差別名為緩急謂誘進故且制輕罪或復全聞如據力分制殺畜提及開結淨等類為遠防故制犯制重名之為急遠防妨道煞草制犯遠防犯重制觸夷等類是則輕重約犯相門緩急之異緩約誘防門二十部師未通此意故各偏執分成別部也曇無德者部執疏中曇摩毱多翻為法護宗輪論中名法藏部舊人亦翻法敬法密並是一也然部執疏云法上部舊名曇無德者盖似不然至下當辨言四分者古來傳說律儀主四度昇坐誦出名為四分淨三藏云良以梵本四夾成部故云四分豈容四誦便終一部十誦五分並由夾數立名不同然夾亦有大小之異今更助詳如智度論第一百云摩偷羅國毗尼舍阿波陀那此云譬喻經本生有八十部罽賓毗尼除却本生但取要用作十部古來傳云八十部即八十誦律也十部者即十誦律也十誦彼既名為十部故知未必由昇座誦故應譯人約夾名誦或名部也行用差別分者覺云一往分判戒用律行下二俱用細論行用四並通有今詳本意云所詮之行約用差分有此四種何容外防即詳是用及其內伏即非是用據果望因者謂以果名於因上立也業結無處逍然無為者斷惑盡處證無為理也此亦因上立果名也蘊積眾旨者先來皆云三十七法以為眾旨謂僧戒八段尼戒六段二十揵度結集調部及增一也今詳一戒一經以為眾旨也共成一部者能成之因即是分義自下廣解此中亦應廣釋前中舉宗攝教由於律相非所要故但廣釋後之二門第二宗歸門此門意者前略辨云今以宗求其唯戒學分別戒學兩番料簡第一受戒法門第二隨戒行相今度建立故立此門建立意者一為破古二為顯今三引教證四釋名義五辨相須六明教行一為破古者昔解開宗五門分別乃至方可就總開別者破古開宗義也且如曇律師云然戒不孤起藉因詑緣然後方發故第一明受戒方法既有能發之緣必有所發體狀是以第二所發戒體既受得戒豈可端拱而住必須方便正念護本所受是以第三次明持戒然上行之徒一往善成中下之人捉心不固遇緣憙犯是以第四次明其犯持犯既不頓成故第五番還料簡上持之與犯漸頓之義今師意云第五漸頓乃是隨中別義故癈不論就前四門緣體相須合為受門持犯後起合為隨門且束此四以為受隨方可就總曲開別義若如舊解便開總門義乖學路也後有更助五門立義作問答云問緣體就受門持犯約隨行者受中有能所此懸明受緣持犯既隨狀具緣亦懸解答隨行具緣約戒文辨無勞預解若爾受戒法門下有揵度應對彼釋何假預明答將欲釋隨應先明受欲使識緣知體戒法居身故先明也若爾何不最先結集受戒揵度答各據義別亦不相違然先結集戒本文者略有二義一者欲令能秉行成二者欲令觀過興猒戒行圓滿方可秉法度生欲令䇿進防德為斯先集戒本若論受法損益義後與隨不同故宜後辨又問持法是順犯是違對持以明犯受法是順捨是違應對受明捨答隨含持犯可相對明受非通相故不相對尊者云上來且助古人立義然今師解懸明捨法故不勞此問答也上問答尊者每敘又難持犯漸頓在此預明受捨漸頓亦應懸說故今章中翻昔師義捨之漸頓義便懸明犯漸頓對文方辨故來前四以為受隨總標之後方可別釋第二顯今者章云故今解有戒宗有二等三引教證者如章云故地持云等也地持第四戒品云受戒隨戒當知無量攝受菩薩無量淨戒既引教證四釋名義者如章云受以要期創發等也此中兩釋前約受心持心不同後約緣如受成隨立五辨相須者章云若無其受等也六明教行者章云若釋受隨可為兩門第一約筌即是總別一部教文也二就行辨者謂就一身起行次第也且判文者章云言約筌者已下是也尼聚少法旨歸彰受等者尼揵度文從初不得受二根者戒明尼受法第二諸比丘尼聚在一處已下明尼雜行既半明受故云少法問受法等中呵責弟子七法相瞻依止等德應行是隨何容名受答師有此德方堪度人以隨資受即受門攝故云旨歸也意辨其隨者問二部戒中減年受戒度諸遮女即是受法何以言隨答不應度故令師得罪以受結隨行攝故云意辨也次約行中第一總解緣體者相對辨別也第二別解緣體者由細別解也相對辨中章有兩釋初約作法而明後通得戒體說且初釋意訖至在前而去是其受門者壇場作法受門畢故所以名受也餘可解後釋意者說相等事義通受隨者作法未畢在受門收在辨體後故是隨行有斯兩濫故通受隨也約五受說可以准知者上法一受唯得無表餘四具得表無表也論其緣者具如第五藉緣門辨護體為因緣者如上已辨護是發業近因心故是同類因也能生作行者作持行也永斷相續還受持清淨對治護者謂念智捨以為護體此與永斷還持之心相應報也還成二戒者表無表二還成清淨勢用增長也於犯位中戒體雖在勢用不增大小乘大意同也癈立門癈四及六唯立五受故也一以義求者謂以別解脫義求要從他故心為第四頌云受別解脫戒當知從他教隨心上中下得三品律儀無上法人無上法教者二義證知無人無法一者以有證無謂異陳如善來人等復殊羯磨受戒之教二者以無證無謂尋律文都無上法人之與教也勅聽者與佛論議因勅比丘聽受戒故後當廣辨故不相類者此律受後之開緣不類彼律受前之常行教也豈容逆數者理應受竟後疑方開不應逆數也曾嫁十二論議沙彌亦應持滿者難此二受未滿二十何以逆開然依十律有論議無曾嫁此律有曾嫁無論議也女以仗人建志故與二十者同者姑夫教勅故曰仗人逕歷若事遂能建志理堪持戒與二十同也難曰建志尚許與二十同羅漢豈容不如曾嫁故使章中後釋云亦可胎閏等也今詳亦應更破云曾嫁別立不類胎等就年數者羅漢亦應別立不補滅年故知古師徒煩言論也胎閏等三者一胎二閏三十四日布薩也闕於戒本者意說戒文本欲結罪若羅漢闕即必得戒由得戒故師僧無罪故滅年戒闕文不立至彼戒文當辨是非有則定滿者喻同年滿也何故母經是名第一者撿彼無文彼文但言建立善根上受具而無第一之言也然五分云童迦葉不滿二十受具佛問諸比丘童迦葉有所得不答得初果佛言此人是第一受具不名白四羯磨如法受戒已上律文彼雖文有第一之言而是初果或可略無者其猶滅法之中夢中行婬憂波離言乃至不犯突吉羅罪然婬戒中戒本及釋並略無開其例大有也五分法身者新譯經論名無漏五蘊也設得木叉仍非戒薀今雖不得何成難詞由戒名濫於戒薀故汎難之言五薀者廣如婆沙第三十三然略辨者無學身中正語業命以為戒薀三三摩地以為定薀無學正見以為慧蘊除盡無生餘無漏慧盡無生智無學正見相應勝解名解脫薀即盡無生名解脫智見薀創初證得此解脫智見諦理故雜集第十卷中無學支攝為五薀彼云無學正語業命是戒薀正念正定是定薀無學正見正思惟正精進是慧薀無學正解脫是解脫薀無學正智是解脫智見蘊基法師云正見是緣事慧正智是緣無為慧今詳彼釋定為謬說謂無學身諸無漏慧別簡盡智及無生智立為正智即由創初證解脫故復即名為解脫智見除此二智餘無漏慧名為正見豈容一向判為緣事又言事者說何為事若變相緣名為事者即盡無生亦通緣事若緣事相說名事者即聲聞人無漏聖慧不能緣事何容得有緣事智耶據佛菩薩可通緣事耳第二解者今師意存母論上法文相甚多今且略引要而明者彼論第一有三節文且第一節僧尼各有五受文言五者上受具何故名上受具佛在世時受不戒直在佛邊聽法得阿羅漢名上受具第二節云云何上受具如有一人盡一切滿未滿二十已受具足即於比丘中自生疑心同住比丘白世尊世尊語比丘汝數胎閏滿不答不滿佛即問諸比丘得羅漢耶白佛言得佛言此是上受具第三節云佛告諸比丘從今已去聽汝建立善根上受具佛告諸比丘過去諸佛未來諸佛皆立善根上受具我今亦復如是是名立善根上受具第二卷云上受具中除尊者摩訶迦葉蘇陀婆具餘一切不得建立善根上受具問引彼證此為應理不此何所疑以其嵩云夫論立義依宗正之豈取僻文依他部立且如上法無替減年胎等不滿更開羅漢若道成名受胎等應同胎非受緣羅漢寧是又准母論亦羯磨開故彼文云廣如前引第一卷中第二節文又母論第二上受具中除尊者磨訶迦葉蘇陀波廣如前引又立上法應無應無羅漢沙彌若據祈心准憑何教彼又總非云如斯之義應熟思尋又云立者不能熟詳文義既無的據難可依憑又云是力力無勞廣述今詳彼難若道成名受胎等應同者今應反難胎中九月羅漢幾年故不例也若言道力義同二十者三果何容劣於二十又復羅漢何理劣於曾嫁之人准羯磨前方開補年其曾嫁者何理勝於羅漢極果開羯磨前逆數十二又云母論亦羯磨開者何不審尋彼論第一佛在世時不受戒文也故知彼論第二節云如有一人盡一切漏未滿二十已受具足者望曾作法即名已受然法不成復名不受故荷初節佛在世時不受文也若不爾者豈容一論二說相違故不應爾即由此理此理律下文因明羯磨乘說羅漢名受具者亦望羯磨法定不成也又嵩復引母論第二除迦葉等欲何所說今詳除者由迦葉等上法所收故須除之其餘不詳此則上法文甚分明也若言除已其餘不聽故無上法者八年之後不聽三歸亦應三歸不立為受又難祈心准憑何教者智人咸許推理歸文何用滯文而迷正理又三世佛論說皆同寧執自心違三世佛又尋諸部皆有此受但名不同且俱舍十四立有十受第四受云四由信受佛為大師謂大迦葉雜心第四十受亦同十中第三名為受師多論第二七受之中第五自誓十誦五十八十受之中第三自誓見論第三受教既通諸部此何獨違故此律受戒㨖度云爾時有年不滿二十者受具足已後便生疑諸比丘往問佛佛言自今已去若受具足已有如是疑聽數胎月若數閏若數十四日說戒日若得阿羅漢即名為出家受具足造論本欲釋律本文母論既明此文甚顯又責祈心憑何教故者多論十誦皆名自誓誓即祈心寧非明教問前來上法雖已善成瑜伽決擇分如何會釋彼論五十三云或有一類唯自然受除苾芻律儀何以故由苾芻律儀非一切堪受故若苾芻律儀非要從他受者若堪出家若不堪出家但欲出家便應一切隨其所欲自然出家如是聖教便無軌範亦無善說法毗柰耶而可了知是故苾芻律儀無自然受已上論文答彼據制後滿足教說即符母論除迦葉等其餘不得建立善根上受具也多子塔者佛本行三十六迦葉因緣品云佛在一樹下爾時是神名曰多子偈中云佛在多子樹母論云迦葉白佛言我初到多子塔林中見世尊述曰因多子神以目林塔林中有樹復云佛在樹下辟支佛因緣論中亦說多子塔事羣品者覺有二解一云羣者眾品者別即別眾是也又云群者眾多義品者品類義謂於四年不同大僧護持律相何得不犯眾多品類微細惑也今詳母論第二卷云法業羣品業不應作法業齊集業應作述曰梵本之中名為羯磨此翻為業所言法業羣品業者是別眾也復言法業齊集業者是法和眾也謂於界內別為群品也付法藏第四云憂留陀山有一老虎生於二子飢窮困極便命終二子失母憂婆毱多日日與食為說諸行無常偈命終生摩突羅國至年八歲出家得道即便使之採瞻匐花答言大師此樹高峻毱多言曰汝等是天神用名天豈無神足時即昇空採花奉獻諸人同見歎未曾育王傳第四亦同育王經降伏外道撿彼無文應撿賢愚賢愚第十五尊者舍利弗晝夜三時天眼觀世應度度之爾時有諸商人共將一狗至於中路眾賈頓息狗便盜取還賈人內於時眾人便共打狗棄置空野捨之而去舍利弗頓息狗便以天眼見以食施與即為解說微妙之法命終生舍衛國婆羅門家字曰均提至年七歲付舍利弗令使出家得羅漢果自以智力觀過去世作一飢狗蒙我和上舍利弗恩今當盡身供給所須永作沙彌不受大戒摩夷者正梵音云摩怛理迦翻為本母既有母義古人遂稱毗尼母論為摩夷也盡智現前即發具足者至下第六發戒時節門當辨釋之上法三緣至第五藉緣門釋一假佛教授二有祈夷心三盡智現起至文釋者下婬戒中釋准十誦是賊住人也古人有立自然受戒謂佛是也故下文云自然得解悟云何從人學者彼為憂陀邪梵志問佛為從誰學佛即答解悟非答受戒也釋名門善來兩釋覺云前釋意者由此律中要得初果方命善來後釋即准五分第一善來通凡故除契證句也以五分律須提善來而犯初戒故知通凡由其初果性離五邪必不犯重故也今詳前據受戒揵度文中但言來比丘而無善字釋也後解即依八比丘中具有善來兩字釋也是則解善是求戒行者來謂如來教章云故曰善來即據能所合結律單言來據所對教也後解或據能所合說文具兩字義如前釋或以行者善心而受佛遂雙讚即二字俱為佛教也上法兩釋先來諸釋不復堪記今詳前釋約聖智境名為上法論其後釋即能證智名為上法且前釋云性空之理超出相有者先來復言相謂十相有即三有今詳生空即是無為成實論宗言不可得如衣壞已都無所有龍樹宗中亦同此義薩婆多宗釋滅即以離繫為體實有非無天親無著護法等宗二空所顯之實性名曰真如是聖智境非無實體諸宗雖復諍體有無莫不皆稱性空之理性違於相故言超相空違於有復言超有此超相有意顯涅槃涅槃之性遠十相故俱舍二十八云涅槃離十相故名無相十相者何謂色等五男女二種三有為相述曰色等者等取聲香味觸也三有為者一生有為相二住異有為相三滅有為相也住異合說者俱舍第五一釋云住是有情所受著處為令猒捨與異合說如示黑甘與吉祥俱是故定有四有為相開即四相合即三相涅槃經第三十離十相亦同此說涅槃既是法中之上故名上法上法即是聖智所緣內證境界修道進德或盡解滿會增上法者謂數勤修聖道力故進證智斷二種圓滿所言或盡即顯斷德言解滿者即顯智德斷德即是擇滅無為智德即是盡無生智無學正見也於斯二德成就之時正契無為會增上法亦可盡無生智超學表者即是第二約智釋也表者外也謂超三果四向之外故云上法智是有為可建立故故引母論證成釋也俱舍二十四頌云第九無間道名金剛喻定盡得俱盡智成無學應果此頌意云斷非想地九品或時第九無間道相應定數名金剛喻定次解脫道即超盡智此之盡智與盡得俱故云盡得俱盡智也盡得即是擇滅得也既得盡智即成無學應供等果理實鈍根唯得盡智若其利根亦得無生二人俱得無學正見故婆沙一百二云時解脫阿羅漢金剛喻定唯一剎那盡智流注長時相續從盡智出或起無學正見或起世俗心不動阿羅漢金剛喻定後盡智唯一剎那無生智流注長時相續從無生智出或起無學正見或起世俗心一切阿羅漢皆修無學正見圓滿而非一切皆現在前未來無量無學正見不可頓起俱舍二十四正理六十五義亦同此然正理論說無生智及無學正見或亦一那剎或亦相續婆沙文云或解脫道或勝進道攝是盡智唯勝進道是無生智因此略釋金剛喻定盡無生智無學正見略作三門分別一釋名二出體三辨相且釋名者問何故名為金剛喻定答婆沙二十八云無有煩惱不斷不破譬如金剛無有鐵等不穿不碎故名金剛喻定問何故名盡智答俱舍二十四云盡智是斷或中最後解脫道由解脫道與諸漏盡得最初俱生故名盡智正理六十五一釋大同又云有餘師說惑盡身中此最初生故名盡智問何故名無生智答正理意云言無生者謂未來生得非擇滅智託無生名無生智若爾豈可無漏聖慧緣非擇滅答理實根本無生智體但緣諦理而由後得緣非擇滅故無漏智從後得智得無生名於理無失問何故名無學正見答推度性故名之為見此見真實故名為正若據照矚名之為見則盡無生亦名為見今據推度故盡無生非是見性由此二智已息求心不推度故若准大乘一剎那智義說為二謂由有彼集因盡義故名盡智復由有彼苦果不生義故名無生智除此二智餘無漏慧照理明了名為正見雜集第十略釋盡無生智瑜伽六十九有出世盡智無生智復有世出世盡智無生智如彼應知次辨體者金剛喻定六智相應定數為體故婆沙二十八云此有六智謂四類智及滅道法智此即苦集唯是類滅道即通法智類智若約行相四諦各通四諦各通四種行相廣如俱舍二十四婆沙二十八釋之盡無生智者六智為性謂法及類並四諦智若細分別四法四類以之為性然此二智最初生時唯苦集類自後相續方通六智緣苦集類金剛喻定亦與此同滅道法類金剛喻定即不同此也謂此定後必定故為苦集類智不得同前滅類道法類也若論行相初盡無生唯六行相謂苦集類除空非我後相續位十四行相亦除空非我行由此二智於出觀時作如是言我生已盡等涉世俗故故除空非我行無學正見法類四諦六智為性通十六行或以七智為性加他心智次辨相者金剛喻定勢能摧破三界一切所有煩惱但由前時煩惱已破是故不破理實有能如俱舍二十四釋盡無生智如俱舍二十六云謂無學位若正自知我已知苦我已斷集我已證滅我已修道由此所有眼智明覺解慧光觀是名盡智云何無生智謂正自知我已知苦不應更知廣說乃至我已修道不應更修由此所有眼智明覺等是名無生智如何無漏智可作如是知迦葉彌羅國諸論師說從二智出後智中作如是知故無有失無學正見准而可知不繁廣辨未感如來玄悟見道者簡異善來善來諸人感佛說法復悟見道得初果已方命善來今此三歸都無二義故云未感上法既非言教下發以非類故不須簡之三語三歸唯此律中體同義異望三寶境名曰三歸望羅漢教名曰三語不同多論分為二受至下當知了論瞿婁達摩者了論疏中作此名字非論文也論文但多尊法受緣開合門猥多者字林猥者眾也僧得可呵者以違教故應可呵責得吉羅罪非謂提舍尼也覺云梁朝時白木調國從西進馬來故知此國在白木調來也若一比丘尼往大僧中代乞戒者准下尼法但差一人若准五分二十九十尼俱往如下當辨因辨遣信得戒時節者章中三釋初釋先且依教立宗章云乃至已與汝受戒竟次當引喻以立道理章云又准媒業乃至便義不具次釋妨難章云若爾何故教人盜乃至不同殺盜謂有別義不類殺等言別義者當知年夏媒須和合二處二處者男女也次第二釋初破前宗章云若爾戒非羯磨緣生乃至何容使報方始得戒次申自宗章云故有異釋乃至事成得罪次釋妨難且先立難章云若爾何不類媒耶假述前師舉媒為難媒戒文云受語往彼還報僧伽婆尸沙亦應殺盜受語往盜還報方成犯限也次答非例章云答如媒報所媒乃至何得以所類能顯媒類受若並令報於中即有能所不同且如媒中如有和上教一弟子男家受語往語女家女家受語還報男家此則男女俱是所媒此則報時但能所媒能教和上已得罪竟論其殺盜若令還報即是義邊受語往彼事成我已罪竟若復還報便是能報非是罪時故不相類次准例立理章云如此解時乃至非謂報竟方始得戒謂類媒殺並不報能即例受門以受戒人為能教者使尼往受羯磨纔成即得律儀不須還報或曰今應更難此第二釋謂立能所與前義別男作能教令為己媒所教比丘須還男准此例受理應還報應答難云此媒雖復要須報能而不得結能教男罪亦應受戒雖要報能而亦不令能教得戒復曰能教比丘令為己媒既要報能受亦應爾答汝若類媒須結媒罪今為己媒既要報能受亦應爾答汝若類媒須結媒罪今為己媒乃是婬因豈令受具而發五戒復曰尼僧十眾並作能教受戒行者及大僧眾並作所教此則所教預喻如所媒所媒既須往彼還報受戒亦應往大僧處還報受戒行者答媒報令能得罪豈受還報而令能教尼眾得戒耶此等既並立難不成還歸初門能所類相並不報能得戒得罪也次第三釋先且總非前釋章云雖有此釋乃至不了說故次依教立理章云如餘三律乃至明因使得理應受戒要聞羯磨故知使傳大僧羯磨方始得戒次例此律亦應具傳大僧羯磨章云此律文略直言汝已受具足竟下尼法云能使應還比丘尼寺內語言大妹汝已受大戒竟述曰疏意說比尼法文略也謂准尼法雖差一尼並二三伴異於餘律十尼俱徃然亦應理還來集尼對大僧中所作羯磨令具聽訖方可語言大妹汝已受戒竟以受要須聞羯應故次辨具緣章云應具六法等也然文亦不具者略者准尼法中全無第三戒師白緣於第四緣但問名字及和上名并學戒不而略不問十三難等雖問少分而亦是略今更詳之應具十緣一端正女人尼法文云小小類貌不應遣信母論第二云若有如是比者得遣信受五分半迦尸十誦四十一云婆羅門生女端正姝好價直半迦尸國二有難緣三本法成就四白二差使口差伴尼准尼揵度若准餘律十尼俱往五義加使尼為請師設無此緣亦應得戒六使尼為乞七戒師作白八撿問遮難九白四成就十使還報知若依餘律白四具足或恐轉變更應撿難更加撿緣使十一緣上來立義雖已善成就崇復云遣信受戒得在大僧言下報表事終非為發戒故報文云已與汝受戒竟報有已言明知先得若在報發便違已言難曰俱舍第九云開口已眠應先開口又云若使言下生戒法者便有三過一有秉法雜亂過二尼有一部發戒過三違見論八語過今略詳之尼傳僧教本非雜亂故五分二十九云羯磨師為說僧所作白四羯磨令聽已又凡受戒理須聽聞大僧白四若不許尼傳僧白四僧教未成則崇自招一部之失又見論八語者善見第七八種得戒八語之外別有遣使如彼論云遣使如彼論云遣使受具足戒者半迦尸尼遣信八語得具足者從比丘尼得白四法比丘僧復白四法是名八語已上論文八語遣使論既別設違八語何成有過況復使尼傳僧白四並其本法成八語此等立破具如破述記中已廣辨說受有作法者尼往僧中或須結界或相撿問隨時變動不同隨中異緣無作唯隨非受者窮尋疏意略有三門一者異緣能發無作如欲殺人不執刀仗乃用指印相書而煞雖同身業而事有異故曰異緣者互緣如以指印或以相盡作大妄語是即身業以成語業或如讚殺以語成身業既互造故名互緣三者助緣如以他人身語等業用成我身身語等業即如遣使名曰助緣先來諸人不違異緣互緣別相遂妄破疏且如覺云受中理亦通於異緣如語乞戒發身戒故此將互緣以破異緣是故非理通律師云問此人亦應遣使依止答成若有難開無依止而住豈可有難開不受而得戒故不相類也又以依是憑義理不合遙也總發假緣者情非情等一切境上總頓發故要假緣也今取面化者謂便捨時未說成捨者留待後時容親面化使不捨戒以其捨戒如死故也不假餘緣者若當有便隨便對捨何須遣往也十人二十足為良驗者十人受戒二十出罪是表難易也受本不得請僧就己者上代僧祐律師云遍尋諸律有難尚令遣使往受豈容無難輙受尼請來就尼寺往往有人輕藻無識往赴尼寺與受戒者深違教意今詳教意但由大僧取靜息緣不肯來赴故開使受也請而赴者理非輕藻然今疏意同僧祐說故云不得也伽論第一及第七並云百一羯磨一切經中亦別有一卷百一羯磨即薩婆多宗所弘也數有人言毗尼母百一羯磨者誤邊無十僧誰足二十故應同開邊尼十眾雖有多釋義等為可者一解羯磨中攝故不別論若爾遣使亦羯磨攝何以別明答端正女人開中之勝而論曾嫁名中鄙惡不類端正故不別論雖有此理然十二開異常二十應分兩別答以十誦中無開十二有遣信故今據彼說故有隱顯章中破云以其文無定數者諸部受數或多或少豈專十誦以妨此律又解違於五受亦同此破故依下文立曾嫁受女婦二受者婦受有一曾嫁是也女受有三二十眾遣使並義立邊尼十眾也更加大僧十人五眾即是羯磨離六也合即唯五者謂合前六總名羯磨辨餘善來上法等四受故五也引伽論者證成羯磨應離成由也並餘二受者一者義立邊尼二者曾嫁二僧攝者義立邊尼及邊僧並五人僧攝餘並十人僧攝得名門善來兩釋准上釋名門中如次配之謂有一學兩學異上法兩釋亦准釋名約境約智如次配之約數就心即帶數釋也通局門多論對七受以說此約五受者多論第二見諦善來三語三歸自誓八法白四八法即八敬也於此七中義攝為五與此律同故相對辨謂彼七中善來三歸八法白四即與此律四受全同三語攝入三歸之中見諦自誓自義同上法是故攝之以為五受也但知七中有見諦無上法者見諦雖可義同上法論其尅性此律所無也此律有上法無見諦者上法雖可義同彼論見諦自誓然據名字彼無上法也今詳上法是母論名仍非此律有也八敬專尼餘三比丘者應云八敬專尼餘五比丘何故言三答合五為三故也謂三語三歸合為一見諦自誓合為一善來復一故三成也若謹依文者多論第二云問七種受幾是比丘不共尼答曰五是比丘一見諦二善來三者三語四者三歸五者自誓問幾是尼不共比丘答曰一謂八法受戒問幾二眾共答曰一謂白四羯磨也為止誹謗故者多論第二佛不自度尼家三眾作此釋也多論局者偏就愛道等為言者問多論第二云八法受戒唯大愛道更無得者既唯一人何用言等答理實多論唯望愛道善來是局復置等等言良以母經及此律等敬通五百是則善來總望五百亦名為局總收義盡須置等言亦同此局者重釋此律望五百局十誦五分望愛道局故云亦同此中多論說局也舉此五受受隨分別者此律善來唯受非隨唯佛秉故若准祇律第三佛與比丘俱秉善來即是義通受隨二法謂自得戒即屬受門復以度他即隨行攝次辨上法若據母論唯二人得唯受非隨通律師云自因祈心果戒俱得即是攝復教他得即隨行攝此義即是自部所宗以其破結不遮簡故次辨三歸多論第二云佛成道後八年之中得三歸受故八年中理有自得教他之義便通受隨八年之後非受非隨次辨八敬若准自律五百釋女因此得戒名之為受隨中行敬復即是隨然此隨義異前說除五百已約餘女邊唯隨非受次辨羯磨義准應知今此古人受隨分別既說五百故通受隨自餘諸尼敬不通受明知五百以敬為受是故善來不度五百故說善來局也叔𨤲尼者賢愚第五云其初生時細濡白㲲裹身而生父母恠之相師言古因為作字名曰叔釐秦言白也叔釐長大㲲隨身大女白父母我欲出家將往佛所佛言善來頭髮自墮所著白氎尋成五衣精進不久成阿羅漢摩登耆女者經無文說善來受母論第一摩登祈撿多論自誓唯大迦葉者彼論第二云自誓唯大迦葉一人更無得者述曰意說當時更無人得非是佛制餘不復聽作自誓受也故章中云一多少為言等也多論第二云問佛在世幾年便聽白四羯磨受戒答曰有言佛初得道一年後聽白四受有言四年有言八年以義而推八年者是正義也又云佛遣阿難與大愛道八法受戒十四年後聽白四受又云三語三歸佛成道已八年中得八年已後更無得者已上論文結集毗尼序者十誦五十五明五百結集彼文名為五百結集毗尼序也一為敬要即是釋前不善來度二須和上即是釋前不羯磨度多論俱局離羯磨故者多論雖言羯磨是通餘皆是局若如向來離羯磨受便合多論一切俱局謂據總名羯磨便通論其別體亦即是局數齊有五者頌曰僧五謂來上三歸十及五尼五謂敬遣邊十常行嫁又准多論更加三語及以見諦便為僧七今言僧五謂攝此二人三歸上法中也局中三僧五專尼眾者前齊五中除來上已餘三局僧也即齊五中尼眾有五是專局尼也諸部同異十誦五十八種得戒頌曰然見誓論邊重信來歸羯六同四分者十中後六義攝為四便同此律來歸敬羯也謂邊五遣信羯磨合之為一餘三還三即是攝為四也善來是同者同此律中要得初果也不須善來者謂彼復有直爾見諦即發戒品不須更加善來受法餘二即異者一者所秉法二所被行者故言二也四句分別者即釋名等四門是也智論云非佛聲聞等所告者智論九十五云無性可見住是性中得耨菩提何故無性相是阿耨菩提非諸佛所作非辟支非羅漢非向道非得果亦非菩薩所作眾生不知諸法實相是故菩薩行般若彼羅蜜以方便力為之說法述曰無法性者是所證理阿耨菩提是能證智而今論云無性相即是阿耨菩提者菩提菩提斷皆名為菩提智及智處皆名為般若故說無性即是菩提此之性空不為因造然十誦中雖不說辟支是自然得以其多論七受之外有佛辟支並無師得義准成立辟支自然也四分等中者母論也大盡智者多宗餘論與此大名准此多論第二卷中云大盡智先來諸人云約人名大今詳論意已前有學煩惱分盡今成無學煩惱大盡故名之也道未知智者即道類智也何以知然雜心第六釋九遍知四類忍四類智皆名未知且如彼云集智忍未得一斷知如彼廣說然婆沙六十二云集類智忍滅集類智生時得一遍知文相不同也然雜心論上下文中有處亦名比忍比智良以觀上二界不現前境名為未知餘釋非理不勞敘破又覺云若准俱舍苦忍初心得者彼以俱舍第十四十受文云二由得入正性離生即作此說理實初入苦法忍時名入離生而論得戒要至第十六心得也見諦周故順多論故建立果故然俱舍云得入離生顯初入道由此為緣而得戒品不必即說得戒剎那也多論假身口教者准章中釋似約言教之教今詳多論表名教無教彼論第二問曰佛與辟支云何得戒答無師得問從教得不從教得答曰不從教得有言從教得如佛在樹下結跏趺坐言我要不解此坐而得漏盡即身教成就口教成就然後得漏盡戒亦俱得是謂身教得戒辟支亦爾乃至見諦或言從教得或言不從教得言從教者安居一時乞食聽法身口二教亦俱成就然後見諦戒亦俱得是名從教得戒已上論文若是言教者見諦既因佛教何故乃言安居乞食等為身口教又彼論第一云若口說三歸是身口教若淳重心有身口無教故知是表無表也問木叉戒是無漏戒禪戒不者多語第一問答也佛在世有者法未滅來總名佛在此約制立七眾木叉要佛出世若約獨覺出無佛世五戒性成名木叉者不假佛世問聖者皆得五不作戒若是木叉應命終捨何因經生仍成五戒答理實命終五戒隨捨由此五戒感當勝果故非不捨然隨生處五戒性成者理是新成非成前生故無有失餘二人天俱有等者約趣辨依身也於中禪戒通欲色界容成容現而名為有若無漏戒欲色二天亦是容成容現於無色天唯成非現亦得名有也今言人天俱有者天名是通理應分別也餘二通二界等者約界辨依身也謂禪無漏通二界中容成容現其無漏戒無色界中唯成非現婆沙二十八云無有聖者不成就無漏戒是故聖者生彼界唯成就造色於中學成就學隨轉色無學成就無學隨轉色問此諸隨轉色何大造耶答依次前身隨所應戒欲界或色界大造述曰婆沙百四十云無漏戒不墮界地隨所依身大種所造若現有色可如百四十說今既生於無色界中無色身故故以前身大造也若如十誦證下三果亦得戒品如見諦是者初果見諦義即決定斯陀那含義即不定若先世道斷欲六品後入見道超證一來大乘世道是伏非斷而論超證亦得同此或先世道斷欲九品後入見道超證不還此二超證得名見諦而亦得戒若先初果漸次證得一來不還即非見諦理不得戒問證下果時為一切得耶等者此問答中敘古人釋略顯其非且古意云以下三果或未盡故假有祈心即略非云若第四果雖或已盡亦非一切得如沓婆等故知不由或未盡者即假祈心若爾今師云何答如前已釋以其戒是從緣得故不由或盡不盡也或有疏本云若第四果雖或盡解滿一切得戒者傳寫者謬若言一切得者何得指同沓婆也何得判言經中不得三四者是其在家者意破前師五戒一向判為在家八戒一向判為出家而言在家不得三四是望經文有大寬失以經但言唯不得四非不得三故也章云若在家者以五戒人不斷自妻豈得三果者此意難云若復用汝五戒在家可經釋者有違理失以有自妻何得三果三果必斷欲界或盡何有自妻章云既言得三道果明亦出家者此顯正釋正釋意云既言在家得三道明亦出家即是亦在家亦出家也以其著俗即名在家斷非梵行復是出家由名在家順經文相復由出家故不違理即破前師八戒一向唯是出家無在家義也頻婆娑羅等者觀經云佛口放光照頻婆娑羅頂爾時大王雖在幽閇心眼無障遙見世尊頭面作禮自然增進成阿那含經就道俗多少者緇服出家得道者多白衣在俗得道者少故下律云以信樂心而作是念我今在家妻子繫縛不能純修梵行我今寧可剃除鬢髮被袈裟以信捨家入非家道善生經說在家菩薩修道難如陸路牽般出家菩薩修道易如水路乘船等瑜伽四十七云出家菩薩一向能行鉤鏁梵行在家菩薩則不如是廣如彼論非謂不得第四果耳者若准多宗定不得四故婆沙四十六釋初果云問若滿七有無佛出世在家得阿羅漢耶正義家釋云如是說者彼法爾成佛弟子相乃得極果如五百仙人在伊師迦山中修道本是聲聞出無佛世獼猴為現佛弟子相彼皆學之證獨覺果無學不受外道相故今五分律化地部宗俗得羅漢不須會釋見論第七教授迦葉詞句具如彼論不繁敘之然章中不具也明智現前者無漏聖智稱之為明也如增一阿含廣說者彼二十一云佛在摩羯國波沙山世尊清旦從靜室起在外經行須陀沙彌在世尊後世尊顧曰今問卿義諦聽善思對曰如是世尊告曰有常色及無常色為一義為若干須陀白佛言此義若干非一義也所以然者有常色者是內如來常身非諸凡夫六根所取無常色者是外外色聲等六根所行以是故義者若干也世尊告曰善哉復云有漏無漏義為一為若干對曰若干所以然者有漏義是生死結無漏義是涅槃故是若干也告曰善哉復云聚法散法為一為若干白言若干所以然者聚法之色者四大形也極微聚故散法之色苦盡諦也謂滅諦體散滅有漏色身也故有若干告曰善哉復云受義陰為一義若干乎白言若干所以然者受者無形不可見陰者有色可見故若干也諸心心所領受境界故言無形也色可聚集故名陰也告曰善哉復云有學義無學義為一為若干對曰若干所以然者有學義是生死結無學義是涅槃故若干謂名有無名也復告曰云何有學是生死無學是涅槃白言有字有生有死有終有始無字無生無死無終無始世尊告曰善哉快說此言今即聽汝為大比丘告諸比丘摩羯國界快得善利便此沙彌此境界今總頌曰常色無常色漏無漏聚散受陰字無字如次義應知多論舉羯磨攝十誦中三者謂中三者謂攝五眾遣信論義以其多論是有部宗釋十誦義故相攝也問樂者樂謂意樂意樂清淨發言亦善故俱舍云謂由善巧酬答所問如蘇陀夷是也亦有釋言問其樂受戒不者今恐不然也僧祇二十三四種受具頌曰自寬來中邊不能如法者彼律云諸比丘亦欲如來善來度人威儀進止左右顧視著衣持鉢皆不如法廣列善來者佛善來度三千二百九十一人諸比丘度不列其數廣說如彼羯磨替善來者但替諸比丘非替如來也訖至雙林皆是善來故也所以可知者牒入羯磨眾所斟量故不足數也八敬懸指者向來並是二十三文此云懸指者是彼第三十六五百釋女往詣佛所却住一面愛道白佛言佛世難值今遭如來出世說法令諸眾生成寂滅證如大愛道綖經中說經中有愛道比丘尼經兩卷是然彼文中愛道言佛為尼制法者祇律三十云佛住迦維羅衛爾時大愛道與五百釋女求佛出家如綖經中廣說乃至愛道白言世尊為比丘尼制八敬法我等得廣聞不佛言得因此即廣說八敬也五分五受頌曰自來三八羯剃髮之初故名為因祇律可知一二三歸者覺云或據境說一二三歸或可約一二三遍今詳前釋好也與此律中度俗二歸相相順故若爾何故五分十五云諸比丘一語受戒言汝歸依佛又二語受言汝歸依佛歸依法又三語受言歸依佛法僧以是白佛佛言不應答謂制後不應也若不爾者豈可三語亦不應也母論第一二眾各五頌曰來上羯離六勑三師遣使伽論十受頌曰無見問歸誓邊中重遣常謂迦葉及三說者律師云此准母論佛告迦葉聽汝建立上受具足即是一說又復告曰過未諸佛皆爾即是二說我爾亦然即是三說或可約三世佛說以為三覺云似有人名三說今復詳之迦葉顯人三說顯法謂三遍說自誓法也但同歸敬此二種受令同此律故不須辨異羯磨細論同異可知者謂彼論中問答五眾十眾遣信及二部僧此五種受雖可總入羯磨中收然彼問答此律中無十二曾嫁彼論非有此彼雖復俱有遣信而此復無已後之制故有同異也對十誦者並以同是薩婆多宗故對辨之後多論中亦同此釋善見第七八種受具頌曰善歸授答問重使語羯磨多論第二七種受戒見來三語歸自誓八白四問此論三語與三歸何別尊者云三歸有結詞三語無結詞據根鈍利故受亦別故多論第二云以眾生宿業力故若應三語得戒者三語則止若應三歸得戒者三歸便止以業力故自然便爾今詳或據羅漢教其歸三寶者名曰三歸若無人教自歸三寶者名曰三語如此律中俗受五戒多是自歸也又此三語由無人教自能說故亦名自誓如伽論十受釋自誓中語迦葉及三說彼文意云迦葉自誓即當多論佛為我師我為弟子故俱舍第十四云四由信受佛為大師謂大迦葉伽論又云及三說者謂無人教自歸三寶亦自誓攝而名三說也即當多論三語是也若作此釋前釋伽論三說之義宜改就此見諦攝自然者准論見諦不攝自然以其自然是佛辟支彼既以佛辟支對見諦受辨其同異又復見諦與盡智異故不應攝也若爾七受應義不同答七受唯約弟子得戒故實不同了論九受頌曰僧來肆歸略廣尼來遣使廣獨覺有量德如來無量德擇二圓德了別相者擇謂簡擇直辨體也相對而明即是了別九相之異也言圓德者真諦釋云圓德至得是比丘性得戒之時即得四萬二千正法名為圓德復有至德德此圓德此中意說圓滿功德名為圓德復至身中得獲成就故名至得聲聞七種必依他德佛及獨覺唯是自得言善來者真諦云若諸行人善根強勝智慧聦利戒善易生聖道易得此必聖人猶是白衣佛呼云善來比丘修行清淨梵行正說正法此是善來詞句也鬢髮自墮衣鉢自然即得具足此辨相儀并仍戒時前云佛呼善來比丘者是許出家及與具戒謂從白衣來出家位從無戒位來具戒位故曰善既無具戒復言比丘也修行清淨梵行者與具戒已勑令起行離惡行善名為梵行令其修學故曰修行若欲別論戒定慧品名為梵行合學此三故曰修行正說正法者說謂佛教法謂三藏十二分教差別法門不妄倒故稱為正正說正法即是梵行之所依止佛唱此言名善來受言三歸者從此已去三種得戒非皆是聖又非佛與善根漸薄戒往難生後後轉難故有三別且三歸者善來未得更說三歸三歸之前須誦佛語謂呼善來比丘等詞句前次說三歸方始得戒次略羯磨者須立師僧問遮法等羯磨之前與廣無別但說單白便能得戒又不要須十人五眾四人亦得以此為異次廣羯磨如今常法尼無三歸及略羯磨以根鈍故若是聖人佛命善來故立善來也大瞿躭教是遣使受故有八尊法也自餘咸是廣白四受故有羯磨也獨覺有量功德至得者先於多劫已修戒行最後生身五戒性成後入見道苦忍初心得出家戒鬢髮自落衣鉢自然爾時具有木叉定生及無流戒雖具三戒若類佛德猶是有量論云諸佛無量功德波羅蜜至得者行菩薩道第三劫中分分割截能忍不嗔爾時戒忍波羅蜜多悉圓滿波羅蜜者翻為到彼岸也謂佛萬行實盡邊際悉到彼岸也即簡二乘未能永斷不染無知非到彼岸也至最後身釋菩薩戒亦是性得後入苦忍得出家戒乃至盡智無生智時一切佛法一時圓滿木叉定生無流戒等無有邊量也心論第四十受頌曰起超善師樂重信歸中邊律毗婆者此總意云隨逐律文分別解釋故云律毗婆沙也此方律疏是也梵云毗婆沙此云逐分別或名廣解釋也故俱舍十四云諸毗奈耶毗婆沙師十種得戒等義同心論也捨寶衣等者非是論文義亦有失謂此自起即自然之異名也唯多論釋盡智時得非發願時得也超昇離生者俱舍云二由得入正性離生婆沙第三云論不正見要由見道能畢竟斷故名正性世第一法無間別起故說能入令言超昇者超不正見昇正性中即是入正性義也言離生者婆沙第三多復次釋而總意云見所斷惑名之為生惑如生食久在身中作極苦事惑如生狩籠戾難伏見道能滅故云離生三歸三說者准多論與此心論同是薩婆多宗即應三說是彼三語三語三歸合為一故若准俱舍十四云十由三說歸佛法僧即似三遍口說三歸若准十誦五十三辨十受三歸已自說誓言我今隨佛出家以為三說任依一釋辨異可知者既同十誦即上誦已辨異說故云可知也見諦得戒共無漏戒問答者見諦必有道俱無表道俱之外復得木叉此二何別廣釋如章得果捨因者且如初果後證一來捨前劣道更得勝道道俱無表隨道轉增故言捨因中戒也餘果准知總別門如昔所論善來羯磨說之為總餘三是別者此敘昔律師義也然尋彼師云來上羯磨名之為總且善來總者一者見諦謂陳如等二者呵欲入道如婆提婆敷等三者因緣入道如舍利弗初時雖別後悉佛命善來得戒次上法者或名自誓或名教授並未發戒後得盡總名上法問前呵欲等是得道緣如何名別答如論義時未欲求戒而請經論名論議受來上亦爾已上敘訖章云今解善來亦非是總等者將古人且應先識總別之相且如論議一人身上有論議開異曾嫁等名之為別復加羯磨同曾嫁等名之為總曾嫁亦然謂亦一人有曾嫁開異論議等名之為別復有羯磨同論議等名之為總由准此理今解善來亦非是總以呵欲等非受名故即不成別以其別者須是別開遍尋律論不見呵欲是即開故別義不成總亦不立故知非總不同論議有多多為論議有多受名名為論議勑聽問答答問羯磨然人唯一故得說為從遠緣彰名為論議顯是別開既是別開復加羯磨亦得成總章雖不破上法是總准例以破其義已成謂將教授以望自誓體不成別別既不成總亦不立應開合中分十二受者上辨受緣開合門中羯磨離云來上歸敬復成四受合成十數今若更分善來為三應彼開合立十二受今詳此難深為無用設開十二違何理教故非理也舉七毗尼七種非法總別為妨釋不類之義可知者問七種毗尼總名現前然而離憶念等六仍自別有現前毗尼又如七非總名非法非毗尼然而離出非法別等仍有非法非毗尼在今羯磨中十眾五眾遣信二十邊十曾嫁總名羯磨亦應離出十眾等六仍更別有羯磨體在答七滅七非是通局門如眼等根及色等境辨法處色通名為色雖復離出五根四境及法處已仍更別有色處體存今言羯磨是總別門如世軍林離人樹已無軍林體故不類也如界內不別眾中亦有不定者尊者曰亦應說言結界成就亦是不定大界界場亦不定故二十八人頌曰餘舉滅難為神隱離別場第三能秉人門多論見諦自得者此不盡理如彼論第二云六從他得一須分別因佛說法名曰從他自見諦發即名自得如彼廣說論云以根本而言等者此將上法准他多論分別見諦文也非謂彼論有此正文分別見諦如向所引多論第二也塵習雙亡者若准深密瑜伽等宗塵謂塵染即煩惱障也習有三種一者一切善染種子名為習氣今言習者煩惱種也二者煩惱雖斷仍有依附所依身中無堪任雖無堪任而無別體三者諸所知障亦名習氣故經說為無明習他也若准涅槃等佛性宗中諸經論意塵即煩惱障也通收種現總名塵染也習即所知障也通收無堪任性總名習也唐朝已來不諳彼宗者將謂習名古人錯譯甚踈失也今章疏意即是佛性宗義也此釋決定物懷疑耳轉緣入道者轉變俗服以成法衣等如僧祇云善來言下鬢髮自落袈裟著身等付法藏阿難善來如付法藏第一卷說阿難乘船在河中流入般涅槃時雪山中有五百仙阿難度已同時涅槃准彼即是善來度之至下第三卷記中當具別之舍利弗金師之子教不淨觀者撿涅槃二十六緣不在佛如文可知者下文佛今百一十一羅漢遊行說法時有聞法得信欲受具足戒時諸比丘將欲受戒者詣如來所未至中道失本信竟不得受具以事白佛因開三歸多論十義廣如彼論第二卷說四不壞信者新譯經論名四證淨若准大乘以信為體謂無漏信緣佛法僧及戒為境信不可壞名不壞信或復由證得淨故名證淨戒證即是淨故名證淨理並無失若薩婆多無漏信戒二法為體婆沙一百三云淨謂信戒離垢穢故於四聖諦別別覺證而得此淨故名證淨又云此中佛者謂佛身中諸無學法緣彼無漏信名佛證淨此中法者謂獨覺身中三無漏根等學無學法菩薩身中二無漏根等諸學法及苦集滅三諦緣彼無漏信名法證淨此中僧者謂聲聞身中學無學法緣彼無漏信名僧證淨諸無漏戒名戒證淨自性淨故依證起故亦名證淨俱舍二十五云信戒二為體四皆唯無漏廣釋如彼一正富羅者多云如昔一時有一比丘應得羅漢有輪王鄣不得漏盡佛欲除障為正富羅輪王福滅即得無著唯羯磨通局可知者覺云五百年前通凡及聖五百年後既無聖僧故局凡也今詳賓頭盧向來應供何以言無聖僧設聖僧來秉豈可不成何以言局尊者云唯羯磨通者即通凡聖也局可知者即餘四局秉也第四所門至順之極者有餘所釋全不堪記今詳此依成實論宗唯觀滅諦達無相理得入見道如從內凡覺觀滅諦數數觀察然初學時被有相心之所間雜爾時猶非至順之極久學純熟見五陰滅不為相間名入見道至此名為至順之極謂至順無相之極也若薩婆多唯空無願得入見道定不許以無相三摩地入見道正違成實宗也多論云此二受法不羸不捨者問若言內凡不羸不捨何故俱舍二十三云若得𤏙法退斷善根等答彼據退𤏙容斷善根而今意說不退𤏙位定不羸捨故無違失羯磨無與為起過人者如受戒揵度未制羯磨之前諸比丘等著衣不齊整乞食不如法此等並是三歸之人既曰此人起過之後方制羯磨故知三歸並是外凡今詳下二果人容犯夷罪況復著衣不齊而能證成是外凡也故應還依多論第二云三歸受不羸不捨判為內凡者好三人通被者一外凡二內凡三聖者也涅槃經淨梵志者彼經第三十九淨梵志白佛云我已得正法淨眼歸依三寶唯願如來聽我出家佛告憍陳如聽是梵志出家受戒時憍陳如將至僧中為作羯磨令得出家十五日後得阿羅漢蓮華色尼下文得初果付波闍度之
