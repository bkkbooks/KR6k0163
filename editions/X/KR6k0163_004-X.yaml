body:
  text: 嵩岳鎮國道場沙門賓作第三解律題名者此下廣解三要之中第三正釋律初題目然而四分名生章中雖辨被機承稟今復應明若欲釋者略開二門第一戒法相傳第二翻譯時代言相傳者昔後漢明帝莊永平元年戊午歲即位至永平五年夜夢丈六金人至十年丁卯之歲有西域僧迦葉摩騰遊化至于漢地又至十一年歲次戊辰復有竺蘭來至此土此土人請曰我欲如師法出家受戒即與剃髮披著縵牒與受三歸五戒准薩婆多論佛成道八年止三歸與羯磨受中國十人邊方五眾由此摩騰正有二人不得受具如是乃至第十桓帝志丁亥即位逕二十一年至丁未之歲永康元年從前明帝戊辰之歲至此丁未總一百年唯用三歸五戒共相傳受桓帝既崩第十一靈帝閎立戊申即位自建寧年已後北天竺有五沙門支法領支謙竺法護竺道生支樓讖等五人來到此土與大僧受戒即五人受也自爾已來始有戒法相傳其時大律未到此土支法領口誦戒本一卷羯磨本一卷在此流行今時古羯磨戒本者是並出曇無德部自爾已後復逕五十五年至魏文帝丕曹操子也黃初三年歲次壬寅有中天竺沙門曇摩迦羅或云柯羅此云法時遊至許昌黃初二年改許縣為許昌其人幼而聰敏質像瓖瑋尋讀一覽文義悉通善四韋陀妙五明論圖讖運變靡所不該自謂在世無過乃入僧坊過見法勝毘曇慇勤尋省莫知旨趣乃深歎曰佛法釣深因即出家誦大小乘經及諸毗尼來至許昌觀魏境僧眾全無律範自來之後又逕二十八年兼前五十五年合八十三年至魏廢帝齊王芳嘉平二年歲次庚午於雒陽更集梵僧以羯磨法與大僧重更受戒准用十僧并翻僧祇戒本一卷又安息國沙門曇諦亦善律學出曇無德羯磨以用受戒之由略如邁法師譯經圖紀即是大僧受戒之由也次明尼眾者靈帝之後亦從大僧求受大戒支法領語曰依如佛教唯開邊地五人大僧受戒不開尼眾尼眾泣淚而退又從靈帝已後逕五十三年至漢末魏初東天竺國有二比丘尼到長安見此土尼眾問曰汝誰邊受大戒尼眾答曰我至大僧所受三歸五戒二尼歎曰邊地比丘尼未有具戒遂還中國化得十五人三人在雪山凍死二人墮黑𡼏死屆至此土唯有十人自爾已前尼悉赴京與受具足後到吳地與彼尼眾受戒自爾已來尼眾始有戒法相傳受戒竟後三人命終唯七人在來逕十七年思憶本鄉即附南海商人而還本國一去已來更不委耳此初受戒但在魏初未詳定是何年月日又從魏初黃初元年庚子歲後計有二百一十一年至宋第二文帝義隆元嘉七年歲次庚午有罽賓沙門求那䟦摩此言功德鎧即其國王之少子至于楊州譯善戒等經又復有師子國尼八人來至宋地云此地未曾有尼何得二眾受戒功德鎧云尼無本法者得戒而僧有罪尋佛制意先令作本法者政欲生其善心為受戒方便論其得戒法出大僧但使羯磨法成自然得戒今詳魏初尼已受戒而功德鎧既西域人不練根由而言無本法也當時尼眾苦求更受功德鎧云善哉隨喜且令兩尼學語更往西國請尼令足十數而功德鎧雖先許尼重受大戒但譯比丘尼羯磨一卷譯經圖紀云四分羯磨一卷是也而受戒事未遂而終俄然遂至元嘉十年歲次癸酉有印度沙門僧伽䟦摩此云眾鎧戒德清峻道俗敬異自流沙至楊州復有師子國尼鐵索羅等三人至京足前十數便請眾鎧為師於壇上與尼重受大戒齊末梁初鍾山定林寺僧祐律師記云最初為影福寺慧果淨音僧要智景等二十三人受戒自後不能繁記自爾已來將為善受問有何證驗知得戒耶答南山律師記云昔魏文帝三年內作無遮大會文帝問曰此土僧尼得戒原由云何可知諸大德悉皆不答于時即有比丘請向西國問得戒所由到北天竺遇見一羅漢啟問曰振旦僧尼受得戒不答曰我之小聖不知得不又語比丘曰汝且住此吾今為汝往問彌勒得不來報於是即入禪定向兜率天問曰我是小聖不知邊地為得戒不故來問尊彌勒答言邊地得戒遂請證驗即取金華而願言曰若邊地僧尼得戒者願金華入羅漢手若不得者金華莫入願訖金華即入掌中一尺影現奇徵既爾內懷歡喜彌勒語曰汝下至振旦比丘所亦當發願若使振旦僧尼得戒不虗唯願金華入比丘手當即如教發已訖以手案華華入比丘掌中一尺影現瑞應既爾欲來還國有迦羅神現身語曰道路懸遠多諸嶮難弟子送師令達彼國未至之間魏文帝殿前先有金華空中影現文帝問太史曰何變恠也太史答曰西國有佛法來此于時不盈一月比丘掌中有一金華來到之日空裏金華即滅不現當發漢境總有八十餘人或有慕聖情深即住彼方或有逢難命謝正有一身從其大菀博尋舊跡來達秦地今詳魏文帝三年內作無遮大會者若是前魏文帝即是黃初三年壬寅之歲計其年月稍不相當且如唐靜邁法師翻譯圖紀云沙門釋智嚴凉州人也弱冠出家納衣宴座分衛自資于時晉安帝義熈十三年滅後秦代姚泓還泓是姚萇孫也八月為東晉劉裕所擒於建康市斬之始興公王從駕觀山見嚴禪思即請還都然嚴先西域得經梵本未譯後至晉末宋興東晉太尉劉裕以晉恭帝元熙二年十月受晉禪改為宋朝至宋文帝元嘉四年此從義熙十三年至元嘉四年合十一年歲次丁卯於楊都枳園寺譯普曜經等合三十六卷然嚴未出家前曾受五戒有所犯後受大戒疑不得戒遂汎海至印度諮問羅漢羅漢不決為請彌勒彌勒答云得戒嚴甚喜焉若據前魏黃初三年壬寅之歲至宋文帝元嘉四年丁卯之歲智嚴翻譯之時計當二百六年豈容有人二百餘歲若言後魏道武皇帝創都北代皇始三年歲次戊戌于時彼未敬信佛法誰復詰問得戒根由況復皇始之與黃初文帝武帝並皆有異何得成證故知南山錯記也今詳此是後秦姚興諡文桓帝皇初三年歲次景申皇初字與前魏曹氏黃初字不同也至元嘉四年合三十二年也義准智嚴創往西域猶應少年往返遷延更逕三十二載即與譯經圖紀相符會也宜勘秦魏史傳問智嚴法師初在秦朝何得宋代翻譯今詳後秦為宋劉裕所滅所以智嚴破秦入宋又出家之道遊化諸方故無傷也當元嘉年嚴翻譯時總有六國一西秦二夏國三北凉四北燕五後魏六宋國此中總計大僧初受戒從漢靈帝戊申已來至今大周長安三年歲次癸卯當五百三十六年已還大僧第二重受戒從魏芳帝嘉平二年庚午已來至今大周長安三年歲次癸卯總計四百五十四年比丘尼最初受戒從前魏黃初元年歲次庚子至今大周長安三年歲次癸卯當四百八十四年已還比丘尼第二重受戒從宋元嘉十年癸酉已來至今大周長安三年歲次癸卯當二百七十一年中間逕周武帝滅佛法有靈裕法師等十八藏在勒摩提將軍家大隨創興纔得九人與人受具戒第二翻譯時代者謹案靜邁法師慈恩寺翻譯圖紀并撿秦朝支法領譯律序又驗律文此律前後合有兩譯初即覺鳴創譯後即法領重翻故譯圖云姚秦世沙門佛䭾邪舍此云覺名或名覺鳴罽賓國人操行貞白戒節堅固儀止祥淑視瞻不凡五明四韋之論三藏十二之典持悟深致流辨無滯以姚秦弘始年達于姑臧羅什法師先師事之遂勸秦主姚興往迎即勅迎之并有贈遺辭而不受重使敦喻方至長安秦主出迎列立新省於逍遙園四事四時供養並皆不受時至分衛一食而已邪舍赤髭善毗婆沙時人號為赤髭毗婆沙秦主供養滿三間屋不以關心遂為貨之造寺自弘始五年歲次壬寅譯四分律四十五卷并四分戒本一卷及餘雜經竺佛念等筆受准法領律序云壬辰之年有晉國沙門支法領感邊土之乖聖慨正化之末夷乃西越流沙路逕于闐遇曇無德部體解大乘三藏沙門佛駄邪舍才豔博聞明練經律三藏方等皆諷誦通利法領即於其國廣集異經以歲在戊申始達秦國晉往秦還良由並治也即以至年重請出律藏時集持律沙門三百餘人於長安中寺出之領弟子慧辨為譯校定陶練反覆務存無朴本末精悉若都初制謹案姚秦壬寅之歲覺鳴譯時即是弘始五年至戊申之歲法領譯時即當弘始十一年此即晉國義巳四年計壬寅去戊申相計合七年又律序云重請出律藏以此驗之足委前後問法領西遇覺鳴何以覺鳴先至翻譯答案法領晉世西往壬辰之年至於還秦戊申之歲合十七年法領西域廣集異經遂使後至故不疑也又准律文眾覺之初有律本題云尸叉罽賴尼法胡音不正應言式叉迦羅尼法有續寫者書應正從此式叉迦羅尼不能一一就文治故班辯之耳巳上并注並是律載唯知即是覺鳴本譯度語之人以音不正故至法領自達方言遂正之也又覺鳴本云如破伊蘭葉法領本云如破伊蘭葉又律文中列三僧物初三兩物文互顛倒及餘諸文屢有差互者並以兩譯之異譯經圖紀但載初譯不譯後出者葢疎略也又細詳察有三本律一者覺鳴初本二者法領改本令改尸又仍存未改三者已改從叉本又從大唐中興應天皇帝神龍元年乙巳歲即位之後有洛陽崇先寺僧道林其本湖洲之人以義淨三藏自撰四分律頌加於律中妄稱譯出最初於崇先寺割破律本中間加之又寫兩本一本置在崇先一本置在大聖善寺恐後代不委故紀之也輕重緩急前卷已辨謂輕即是緩重即為急但義門異故別論之然望性惡稱輕制輕稱重制重但名輕重而非緩急故應釋云若是緩急即是輕重自有輕重而非緩急思之可見四錢三角者祇律第三佛告諸比丘從今當知十九故錢名一罽利沙槃分一罽利沙槃為四分若盜一分若一分直犯波羅夷因此古來計此以為四錢三角謂分十九以為四分且四四十六餘有三錢各為四角三四十二即十二角分十二角以為四分分各三角故言四錢三角也此是古來謬傳後盜戒中當辨也二眾俱互者當眾相謗名之為俱異眾相謗名之為互犯不犯者十誦律中若結淨地得突吉羅祇律不捨淨作三衣犯提此律並無犯也遺教三昧經五部僧分別服飾品云佛在世時有比丘羅旬每行分衛輙空而還佛知宿行欲現殃禍并正明戒佛使眾僧分為五部著五色衣令其日隨一部乞食於是隨其制儀至於度世後立號稱各各奉其所著服色薩婆多部者博通敏達智導法化應著絳袈裟曇無德部者奉執重戒斷當法律應著皂袈裟迦葉惟部者精勤勇決救護眾生應著木蘭袈裟彌沙塞部禪思入微究暢幽玄應著青袈裟摩訶僧祇部者勤學眾經敷演義理應著黃袈裟佛因羅旬乞食不得使諸比丘知有報應還分五部使日隨一一部部求食即皆不得乃至五部隨者並然佛令羅旬寺內灑掃餘人請食於一日中不作其事舍利弗為其請食在道遂翻鉢中食盡內不得食遂云我既薄福何須久住遂飡沙飲水而入涅槃此經疑偽威儀經下卷舍利弗問經五種服色大同此經舍利弗問經亦疑也問先有五意何以不分答以二義故如章所論若爾三乘有三意如來現在分五意對五機佛在何無別答三乘為漸誘別說易脩成五意總防非問說合無諍若爾佛現不分者何為方等經云五部僧中學何毘尼又方廣經云互用五部僧物又如羅旬分衛隨五部僧此等並似現分寧言無別答此蓋僧分五服學戒猶同又闍王十夢經夢見白㲲從天飛下至地分為五段王時憂惱來問世尊佛言非王之事是我法中我滅之後諸弟子眾分我毗尼以為五部既言滅後故現不分已上尊者問答五種眾生者五部機別崇云佛滅百年猶為一部未有五卷如何在日始十二年云有五機今詳豈由分部方有五機故有五機無妨同學也若為說廣利益不普者豈付弟子利益普耶故應更釋律中自言若使如來不淨眾中而說戒者無有是處是其意也見論第五教授木叉也依祇五年者祇二十三云世尊成道五年比丘僧清淨自是已後漸漸為非世尊隨事為制戒立說波羅提木叉二十言是到者不然見論第六云佛成道十二年後須提那出家在他國八年學道後還迦蘭陀村佛成道已二十年故不應言到也故今詳之諸部違文其類非一如涅槃經二月十五日如來涅槃薩婆多論婆沙等論八月八日佛般涅槃何得相會祇律五年亦應准此如來正說者尊者云是止說言正者譔說戒揵度阿難請佛說戒世尊不說目連觀見有一比丘行不清淨目連牽出明知即是第二犯也五師住持廣如付法藏傳及阿育王傳也立誓入滅盡定者薩婆多宗婆沙百三十五云大迦葉波入王舍城乞食食已未久登鷄足山山有三峯如仰鷄足尊者入中結跏趺坐作誠言曰願我此身并納鉢杖久住不壞乃至經於五十七俱胝六百千歲慈氏如來出現世時施作佛事正義家釋云入般涅槃非是入定慈氏出世現神變者是留化事餘部之中有許此是入滅盡定也在恒水中船上入滅者如付法藏第一卷說阿闍世王請阿難曰如來迦葉入般涅槃自我多殃悉不都見尊若滅度唯願垂告阿難曰善阿難後至一竹林中聞有比丘誦法句偈若人生百歲不見水老鶴不如生一日而得都見之阿難聞已便語比丘此非佛語不可修行汝今當聽我演佛偈若人生百歲不解生滅法不如生一日而得解了之爾時比丘白其師說師告之曰阿難老朽智慧衰劣言多錯謬不可信矣汝今但當如前而誦阿難後聞猶誦前偈即問其意答言尊者吾師告我阿難老朽言多虗妄但依前誦阿難思惟彼輕我言或受餘教即入三昧推求勝德不見有人能迴彼意便作是言世間眾苦甚難久居我於今日宜入涅槃復作是念阿闍世王與吾有要我應語之即詣王宮告守門者為我白王門人答曰王今眠睡若設覺悟罪我不少阿難語言王若覺者可宣我意阿闍世王夢蓋莖折表失覆蔭即便驚悟門人具宣王聞悶絕良久乃蘇園神白王阿難今已向毗舍離即嚴四兵往恒河側阿難乘船在河中流於時大地六種震動時雪山中有五百仙人見斯相已飛空往詣求哀出家即化恒河變成金地為諸仙人如應說法鬚髮自落成阿羅漢咸悉俱時入般涅槃阿難昇空作十八變入風奮迅三昧分身為四一分向忉利天與釋提桓因一分與大海娑伽龍王一分與彼毗舍離王一分授與阿闍世王如是四處各起寶塔阿難在河中流入涅槃者為護阿闍世王及毗舍離玉意故所以不進不退也有人言不見水潦涸者非也三藏傳云者尊者云是真諦也釋論者古人以智論釋大品般若故號為釋論也然彼第一百卷但言罽賓毗尼除却本生但取要用作十部亦毱多受持之言也大集經者章中引經加減其文今者謹錄仍為注釋彼經第七云我涅槃後我諸弟子受持如來十二部經書寫讀誦顛倒解義顛倒宣流以倒說故覆隱法藏以覆法故名曇摩毱多此法密部也經言覆隱即密義也或名法藏藏亦密義也而復讀誦書寫外典受有三世及以內外破壞外道善解論義說一切性悉得受戒凡所問難悉能答對是故名為薩婆帝婆受者執也此部執有三世實體一切性者三性心中悉得戒也說無有我及以受者轉諸煩惱猶若死屍是故名為迦葉毗數論外道執有實我受用塵境名為受者轉諸煩惱者轉者捨也海不宿屍故為喻也不作地相水火風相虗空識相是故名為彌沙塞而此六界並說為空故云不作相也皆說有我不說空相猶如小兒是故名為婆蹉富羅婆蹉者此翻為犢富多羅者此翻為子言富羅者略也正是犢子部也此部計我非是即薀亦非離薀而有實我梵云婆羅必栗託仡那此云愚異生舊譯為小兒凡夫准此經中應言猶如異生以其異生計有實我指之為喻經言小兒意取愚義也廣博遍覽五部經書是故名為摩訶僧祇善男子如是五部雖各別異而皆不妨諸佛法界及大涅槃已上經文易解章云受後三世錯也問列六部名何因但有五部此中十二部十八部二說未曾見有經論正文傳記又失難可依信文殊問經下卷中說二十部者如章所引稍與宗輪同今且敘宗輪論說隨便會釋宗輪論云如是傳聞薄伽梵般涅槃後百有餘年去聖時淹如日久沒摩揭陀國俱蘇摩城王號無憂統攝贍部感一白蓋化洽人神是時佛法大眾初破謂因四眾共議大天五事不同分為兩部一大眾部二上座部文殊問經體毗履者此翻上座也言四眾者一龍象眾律師眾也二邊鄙眾大天眾也三多聞眾經師眾也四大德眾論師眾也又釋初是大天如象難制二是大天弟子三凡夫持戒四是聖眾也諍五事者婆沙九十九有此緣起然與真諦部執疏說少少不同不可具敘今略論者然此大天未出家前與母私通遂殺其父耻人所知將母逃隱波吃梨城遇逢本國曾所供養羅漢苾蒭復恐彰露因遂殺之後見其母與餘私通復煞其母造三逆罪深生憂悔欲求滅罪因即出家未久便能誦持三藏王聞數請入宮供養真諦又云王妃遂與大天私通然彼復稱我是羅漢後於寺中夢失不淨而令弟子浣所汙衣弟子白言師煩惱盡何容斯事彼言漏失略有二種一者煩惱羅漢已無二者不淨羅漢未免煩惱雖盡豈無便利涕唾等耶然我漏失為魔嬈故汝不應恠此意說云身中不淨如有涕唾為魔嬈故即便漏失真諦敘云此是魔女欲毀我故而以不淨汙我衣也又自作經佛語諸比丘魔王天女毀無學人故以不淨染汙其衣部執疏中五事皆云自作經下不重論也此第一事又欲令諸弟子親侍次第記得四沙門果弟子問言阿羅漢等應有證智如何我等都不自知彼言羅漢亦有無知無知有兩一者染汙羅漢已無二者不染羅漢猶有第二事弟子復言曾聞聖者已度疑惑四諦三寶我猶懷疑彼言羅漢亦有疑惑疑惑有兩一者隨眠懷疑羅漢已無二者處非處疑羅漢猶有述曰稱理名處不稱理者名為非處於諸稱理不稱理事猶豫不決名處非處疑也此第三事也弟子又言我是羅漢應自證知如何但由師之濟度都無現智能自證知彼言羅漢有由他度舍利目連慧通第一佛若未記彼不自知況汝鈍根要由他度而能自了真諦云亦有聖人依他斷疑是也第四事然彼大天雖造眾惡未斷善根後於中夜自惟重罪當於何處受諸劇苦憂惶所逼高聲唱言苦哉苦哉弟子尋白大師若言所作已辦何故唱苦彼遂告言我呼聖道謂諸聖道五事而作頌言無學漏失因魔引無知疑惑由他度聖道現起假聲呼是謂如來真淨教宗輪頌云餘所誘無知謂羅漢被魔所誘也猶豫他令入道因聲故起是名真佛教爾時眾中有學無學多聞持戒脩靜慮者聞彼所說翻彼頌言前三句同前第四句云是汝狂言非佛教於是竟夜鬪諍紛紜乃至終朝城中士庶乃至國王來自和諍僻用律文行籌滅諍用多人語賢聖眾中耆年雖多而僧數少大天孕內耆年雖少而眾數多遂分二部一上座部二大眾部王聞既瞋送諸善眾於恒河中載以破船中流墜溺聖眾登空并攝同見不得通者西北而去往迦濕彌羅國王聞悔謝如論中說准部執疏却請還國大天改經不復如本諸阿羅漢還復結集至即是第三結集一七葉巖二因十惡法三即此時也又言五事有虗有實實者一者天女必不能嬈二者有習氣無知三者三解脫門無不自證四者鈍根初果不定自知問善知識知識為說有不壞淨因更觀察自審知得五者如舍利弗口誦偈時即得聖道因此思擇分成兩部不同婆沙一往即分也論云後即於此第二百年大眾部中流出三部真諦云第二百年大眾部住央堀多羅國此國在王舍城北此部弘華嚴涅槃勝鬘維摩金光般若等經於此部中有信者有不信者不信者言是自作經四阿含中無此經故因遂分部一一說部此部執世出世法皆無實體同一假名文殊問經名執一語言經注云所執與祗同者譯經時人為此釋也二說出世部此執世間從顛倒起但有假名出世非倒皆是真實經注云稱讚辭盖亦謬也又經中已下諸部後後諸部從前前出不同宗輪下不復論也三鷄胤部本音憍矩胝迦真諦名灰出此山石堪作灰基法師云本音及義皆無此釋也正翻鷄胤上古有仙染鷄生子是此之族文殊問經云律主姓是也此部不弘經律云經與律是方便教佛自有處破經律故唯弘對法坐禪斷惑次後於此第二百年大眾部中復出一部名多聞部真諦云佛在世時有一羅漢名祠皮衣昔作仙人披樹皮衣以祠天故後出家已隨佛說法皆能誦持佛未涅槃遂住雪山坐禪不覺佛已涅槃至佛滅後第二百年從雪山出見大眾部所弘義淺其甚驚恠更為具足誦出淺義及以深義深義中有大乘義也其中有不信者其有信者即別成部名多聞部成實論從此部出故參涉大乘義也次後於此第二百年更出一部名說假部基法師云世出世法皆通假名及以真實不同一說部及說出世部也真諦名分別說部大迦旃延佛在作論分別解說佛滅之後來至大眾部中分別三藏此佛假說此真實說此是真諦此是俗諦此是因果有不信者別為此部經中脫此一部也第二百年滿時有一出家外道捨邪歸正亦名大天大眾部中出家受具多聞精進居制多山與彼部僧重詳五事因茲乖諍分為三部此言出家受具不同部執疏云摩伽陀王感弘佛法外道失利遂自剃髮賊住出家王聞遂遣聽慧比丘沙汰幾盡猶餘數百真不分王復令人再三推問彼有弟子依眾出家推問其師即是賊住因此諍論或言師若破戒無戒餘僧清淨自然得戒薩婆多等悉用此解或言師若破戒無戒弟子亦無戒大眾部用此義也大天即是賊住之首不為眾許因而分部一制多山部制多翻為靈廟也佛於一世初生成道法輪涅槃四處皆有靈廟供養此山即靈廟處也經名只底柯注云山名律主居之也只底柯即制多也二西山住部三北山住部制多西山名西山住北山同爾此三皆住處也經名東山維也如是大眾部四破或五破本末別說合成九部一大眾部二一說部三說出世部四鷄胤部五多聞部六說假部七制多山部八西山住部九北山住部并根本說即五度破若除根本即四度也准經脫假一部也其上座部經爾所時一味和合三百年初有少乖諍分為兩部一說一切有部亦名說因部二即本上座部轉名雪山部上座部盛弘經藏少弘律論至此時中迦多衍尼子造發智論盛弘對法故乖諍也說一切有者有有二種一有為三世實有二無為離世實有說因者此部立義廣出所因故也文殊問經名一切語言注云一切可措語言也語言即是說也雪山者上座徒眾為說因所伏移入雪山又釋既為他伏師宗冷弱乍比雪風論中即是上座部轉名雪山經中乃於體毗履外更數雪謬也後即於此第三百年從說一切有部流出一部名犢子部上古有仙染犢生子此之種也真諦云可住子部基法師云此理難解幸願詳諸今詳云梵音長短故也若長音呼婆私弗多羅即是可住子若短聲呼䟦私弗多羅即是犢子真諦云羅怙羅是舍利子弟子可住子羅怙羅弟子弘舍利弗阿毗曇智論第二亦云犢子道人等讀誦舍利弗阿毗曇次後於此第三百年從犢子部流出四部一法上部經名法勝一也有法可上故名焉二賢胄部盖部主是賢從眾是胄胄尚族也三正量部刊正無謬故也經名一切所貴也四密林山部山有密林部主居之經名芿山也真諦云此四部釋舍利弗阿毗曇義有少者以經義足之故分異部也次後於此第三百年從說一切有部復出一部名化地部部主昔日曾作國王化霑地上後捨出家從本為名部執云正地部真諦云是王師匡正土境也經名大不可棄注釋如章經注文云名能射也次後於此第三百年從化地部流出一部名法藏部自稱我習林菽氏師或名法密基法師云是部主名者非也前大集經以隱密故是法名也菽者豆也上古有仙採綠豆為食目連是彼種故名採菽氏師也此部立五藏三藏如常第四呪藏第五藏由他不信引目連為證故柾為師也經名法護注云律主名亦譯者謬釋也至三百年末從說一切有部出一部名飲光部亦名善哉部梵云迦葉波翻飲光上古有仙身光極盛飲蔽餘光是此之裔也又云此部主身光飲餘光也又約有賢德義其年小而有賢德故云善哉至第四百年初從一切有部復出一部名經量部亦名說轉部自稱我以慶喜為師立義依經故執有種子墮在相續轉至後世故名說轉經名脩妬路即契經也如是上座部七破或八破本末別說成十一部一說一切有部二雪山部三犢子部四法上部五賢胄部六正量部七密林山部八化地部九法藏部十飲光部十一經量部七破八破義准前釋次依舍利弗問經二十部同宗輪說又云如是眾多久後流傳若是若非唯餘五部各舉所長名其服色祇著黃曇無屈多迦赤薩婆多著皂迦葉遺木蘭彌沙塞青衣大集五部如前引無五服之別遺教三昧如前引三千威儀經下卷薩和多絳曇無德皂迦舍惟木蘭彌沙塞青摩僧部著黃此同遺教三昧也上來略引經論不同或言五部或言二十者准如舍利弗問經五部者據其久後流行為語二十部者據實分而說准宗輪論二十部本宗同義有十二例無暇繁敘然相傳云四分律序云是曇無德部者即是大集經中曇摩毱多部也然譯此名兩說不同一者先來相傳云是法藏部二者若准真諦部執疏中云四分律是法上部今詳二說法藏為正何以知然且准大集經舍利弗問經遺經三昧經三千威儀經四文列五部名字然准三千威儀及遺教三昧五部之中並云曇無德部至於大集經中名為曇摩毱多舍利弗問經名為曇摩屈多迦部故知此等名本是一而翻譯者文有差殊遂令語異也准舍利弗問經列二十部中復有曇摩屈多迦部勘宗輪論正當法藏部處故知法藏為正也崇云四分律者是法密部古來諸人不尋分部依成實宗理不然也彼即自解云今解並依一切有部今為重詳如雜心第十五云薩婆多及婆蹉部說次第諦無間等曇無德說一無間等述曰等是遍知義也謂薩婆多等宗中於四聖諦次第無間現觀遍知得入見道曇無德宗唯於滅諦一諦之境無聞現觀而入見道故婆沙百八十云或復有報唯無相三摩地能入正性離生如達磨毱多部彼說以無相三摩地於涅槃起寂靜作意入正性離生述曰達磨毱多即是雜心中曇無德也成實論中廣有成立唯觀滅諦得入見道故知同宗也而崇不詳依成實宗豈容得依一切有部故今且取章中為正又復古來但言迦葉及阿難等五師相傳今詳五師但為眾主而誦律藏自有別人故律初云優波離為首及餘身證者且如結集之時雖言迦葉秉知僧事及至結集自有阿難優波離等誦出佛語故知相承並自別有誦持之者故應別顯傳律藏人如善見論第一卷云今次第說師名字優波離駄寫拘蘇那拘悉伽符目揵連子帝須五人次第閻浮利地持律不斷優波離從金口聞駄寫拘是優波離弟子從優波離聞蘇那拘是駄寫拘弟子從師口受悉伽符是蘇那拘弟子從師口受又如彼論第二卷說佛後百年七百結集須那拘即在其數出毗尼藏當時有二羅漢不及滅諍諸餘羅漢罸其令度目揵連子帝須付其法藏至二百一十八年育王出世昇位九年遂弘佛法外道失利賊住出家欲以己典雜亂佛法七年之中不得說戒阿育王請目揵連子帝須滅諍更集千人於波吒梨弗國第三結集准此二百一十八年育王登位九年已後外道失利又經七年不得布薩都合二百三十四年第三結集育王出世雖與付法傳等年月不同然望已前亦有五師故知迦葉乃至毱多五師之時自別有此優波離等誦持律藏又第三結集既因賊住即應准同部執疏中第三結集之時因分二部然由此論但欲自辨一支相傳故略不說分部差別也從此已後付摩哂陀此即育王之子也摩哂陀付阿栗吒阿栗吒付弟子帝須達多次伽羅須末那次地伽那次須末那次伽羅須末那次專那伽次曇無波離次企摩次優婆帝須次法叵次阿婆耶次提婆次私婆合二十四人如此諸律師皆是阿羅漢師師相承至今不絕論中更說付諸大德諸國流傳摩訶勒棄多曾至漢地流行律教師子國等各有別人如彼論第一第二第三第四廣說不可具敘即准此文驗律偈云優波離為首及餘身證者是其事也又祇三十二五百結集中亦言佛授優波離優波離授陀婆婆羅陀婆婆羅授樹提陀娑乃至最後授尊者道力彼律合有二十七人展轉相付又准見論二十四人之中第十三人名曇無德者竊尋彼論勘其始末其與四分科段相當故知彼論釋四分律其曇無德即是此律主也彼論復說摩訶曇無德至阿波蘭多國流通律藏此即非是律主名也以其無文云是摩訶曇無德故也問前已成立曇無德者乃是法名何故今言是人名也答此盖就所弘法以號其人如即今人號禪師等今且分三者准佛地論第一卷云於此經中總有三分一教起因緣分二聖教所說分三依教奉行分總顯己聞及教起時別顯教主及教起處教所被機即是教起所因所緣故名教起因緣分正顯聖教所說法門品類差別故名聖教所說分顯彼時眾聞佛聖教歡喜奉行故名依教奉行分然崇亦判律為三分同此疏說今詳且除二種結集以其通集三藏教故就餘文中教故就餘文中教有三周三分隨准謂戒本犍度及修部并增一即為三周尋之可悉謂或唯有序及正宗或復單有正宗之文准而可知經體不同者遠法師涅槃疏意也彼云經體是一就人分二一如來所說經二阿難所傳經如來所說蓋在當時阿難所傳傳之末代對斯二經故立兩序對佛所說立發起序對阿難說立證信序准彼釋此義意可知長行是總等者由請制故諸部總興由偈故偏行四分也勸信不具者勸信若前兼勸發起勸信若後門勸發起故不具也是云何敬者文外徵問云何設敬也敬之儀式者正舉文中稽首來答以其稽首是敬儀式故也餘皆准此若局明敬體其唯信數者今詳若唯辨敬體者理即是慚若敬而復愛者即通信慚也章中辨敬唯言是信稍乖法相也應准婆沙第二十九愛敬納意云愛俱行名善十一法若有此法增上圓滿應知即是廣大有情是大菩薩今詳律主雖非增上圓滿然亦一分名為圓滿故欲傳法先起愛敬即彼論云問愛以何為自性答愛有二種一染汙謂貪二不染汙謂信故今愛者以信為體又復問云敬以何為自性答敬以慚為自性而今律主信慚具足故云稽首理而言之有敬非愛如怖彼威雖復設敬而心不愛故今律主必具愛敬彼論又云前雖別說愛敬自性而未總說於一境轉如有一類於佛法僧親教軌範及餘隨一有智尊重同梵行者愛樂心悅恭敬而住若於是處有愛及敬是謂愛敬此中一類者謂異生或聖者彼二於佛俱作是念佛為法主最初開示無上正法令諸有情無到了達雜染清淨繫縛解脫流轉還滅生死涅槃餘無此能故應敬愛彼二於法敬愛住者謂作是念我依此法解脫一切心身苦惱究竟安樂彼二於僧愛敬住者謂作是念僧威力故我於正法毗奈耶中淨信出家受具足戒得苾蒭性能正受持百一羯磨無所毀犯安樂而住廣說如彼俱舍第四亦云愛謂愛樂體即是信敬謂敬重體即是慚崇云准婆沙三十四出三皈體云應作是說身語業及能起彼心心所法并諸隨行如是善五薀是能皈依體又釋准俱舍敬以慚為自性今詳律主必具愛敬若局論敬理有闕少又詳皈依與敬禮別略有六重一者歸依必具三寶敬禮一寶是別則無遮二者歸依必具三業而論敬禮一業亦成三者歸依要期立限而論敬禮事即無期四者歸依具表無表而論敬禮容唯有表五者歸依必具三業局欲色界敬禮一業亦可得成故通三界六者歸依理非佛果自德既立何用捉誠論其敬禮既慚為性故通佛果既有此異不可即以歸依為體然尋諸教或有唯以身業敬禮如俱舍云稽首接足故稱敬禮或唯語禮如維摩經導眾已寂故稽首有唯意禮如法華云以深心念佛修持淨戒故或通身語或唯身意業尋之可見或具三禮世親攝論云故我至誠身語思頻修無倒歸命禮今此律主理具三業故云稽首具一切智通達諸法自覺覺人故名為佛者此地諸師相傳釋云緣真名一切智緣俗名一切種智真諦三藏云緣空名一切種智緣有名一切智真諦自釋云種智是空慧空慧能生有解故一切智是有解有解差別故言一切章中意取真諦釋也以緣空智是真斷障初成佛故其後得智通達一切差別法門安立名言化有情類是故必須本後二智既能自覺簡異凡愚復能覺人異二乘類故稱為佛佛地論云具一切智一切種智離煩惱障及所智障於一切法一切種相能自開覺亦能開覺一切有情如睡夢覺如蓮華開故名為佛就體解法者持自相故名之為法且如涅槃能持常住自相有為諸法准此就用解法者軌生物解名之為法即如涅槃可以證智證生常解餘有為法准此知之世所珍貴者總釋寶名如寶性論第二卷云問曰以何義故佛法眾僧說名為寶答曰偈言真寶世希有明淨及勢力能莊嚴世間最上不變等長行釋云依彼六種相似相對法故說名為寶一者世間難得相似相對法以無善根諸眾生等百千萬劫不能得故偈言真寶世希法以無善根諸眾生等百千萬劫不有故二者無垢相似相對法以離一切有漏法故偈言明淨故三者威德相似相對法以具足六通不可思議威德自在故偈言勢力故四者莊嚴世間相似相對法以能莊嚴出世間故偈言能莊嚴世間故五者勝妙相似相對法以出世間法故偈言最上故六者不可改異相似相對法以得無漏法世間八法不能動故偈言不變故別相一體之異者一體三寶真如為體以一切法如為性故即如性中所有覺義名之為佛有軌持義名之為法無違諍義名之為僧故維摩云佛即是法法即是眾是三寶皆無為相又云一切眾生皆如也一切法亦如也眾聖賢亦如也至於彌勒亦如也仁王經下卷云諸佛如來乃至一切法如故備如經論不可繁言別相者佛法及僧三體別說如來三身謂自性受用及變化身說為佛寶大乘教法及理行果說為法寶諸菩薩僧或通聲聞四向四果說為僧寶問法身與理法及受用身中所有菩提與果法寶何別答體同門異立為佛法二寶也若依小宗別相說者如上四證淨中出體者是真如法界者真謂真實如謂如常故雜集云無我實性無改轉故言法界雜集云一切聲聞獨覺諸佛妙法所依相故謂與諸法為界性故名為法界成佛四階者準婆沙論迦濕彌羅國諸論師唯立四波羅蜜謂施戒精進慧戒即攝忍慧攝靜慮外國師說六波羅蜜謂於前四加忍靜慮俱舍十八亦開為六雖有開合義實無殊第一三僧祇劫者劫義如下破僧犍度辨婆沙百七十八云於初劫中逢事七萬五千佛最初名釋迦牟尼最後名寶髻第二劫中七萬六千初即寶髻最後然燈第三劫中七萬七千劫即然燈後即勝觀俱舍十八頌云三無數劫滿逆次逢勝觀然燈寶髻佛初釋迦牟尼易解耳修有漏四波羅蜜者俱舍頌云但由悲普施被折身無忿讚歎底沙佛次無上菩提述曰此中四句即具足六波羅蜜章言修有漏四者即是前三句也謂以悲心施一切物乃至身命都無變著名施波羅蜜滿若被折身乃至無完如芥子許心無少忿名戒及忍二種圓滿若能專誠經七晝夜忘下一足以妙伽他讚底沙佛名精進滿讚云天地此界多聞室逝宮天處十方無丈夫牛王大沙門尋地山林遍無等由此讚故釋迦便超彌勒九劫述曰天地此界者總指天地此娑婆界也毗沙門者此云多聞四天王中北方王勝舉彼王處名多聞室即欲界初天也逝宮者謂梵王宮色界初天也逝是死義外道妄計梵王為常故呼彼處名曰逝宮也天處者無色界天也上來即是明此娑婆三千界無也非但此無十方三千亦復更無故曰十方無也次嘆佛有丈夫德牛王德沙門德尋地無等德也除禪定般若者即釋俱舍第四句也禪慧二種後金剛座方得圓滿故前三劫除之不取故俱舍云住金剛喻定齊此定慧波羅蜜多脩習圓滿故頌中云次無上菩提是也婆沙云此等所說皆依一時一行增上說為圓滿如實義者得盡智時四波羅蜜方得圓滿四即六是為種智因者既除禪慧以餘四種為種智因也即依真諦釋云種智是空慧如前已辨以其此知創初證故故偏舉之第二百劫中修相好因者三十二相八十種好受戒揵度當分別之婆沙百七十八云於修相異熟業九十一劫中逢事六佛初即勝觀後名迦葉當知此依釋迦菩薩說若餘菩薩不定如是百七十七云多分經百大劫唯除釋迦菩薩以極精進超九大劫但經九十一劫脩習圓滿又以欲界上品思所成慧緣佛相好起勝思願而成此業彼評家正義云三十二思引三十二大丈夫相一一復以多業圓滿廣如彼說第三最後身修有漏四禪四無色定等者一切菩薩必定先離下八地染後必定依第四靜慮三十四心一坐成佛如俱舍二十四云諸無間道緣次下地諸有漏法作麤苦障三行相中隨一行相若諸解脫道緣彼次上地諸有漏行作靜妙理三行相中隨一行相所言麤者非寂靜故說名為麤由大劬勞方能越故次言苦者非美妙故說名為苦由多麤重能違害故所言障者非出離故說名為障由此能礙越自地故如獄厚壁能障出離靜妙離三翻此應釋餘如章辨第四菩提樹下修三十四心次第成佛者若獨覺人亦有先離下八地染一座證覺而於九地必須次第更起無間解脫二道下八地中雖不斷惑觀行法爾須次第起九地通計無間解脫便有一百六十二心并見道中有十六心合有一百七十八心方得證覺今依菩薩由根勝故見道之後越次即起非想地中九無間道九解脫道故成三十四心也此如順正理應知比忍比智者比是類義也謂法智後起種類智觀上二界故云類忍等也非謂比度下界既苦比上亦苦以其此智是現量證非比度智也故新經論名類忍等是也最後一種佛無學心者即盡智也五分法身如上受緣廢立門中已辨具如婆沙三十三釋父母生身者顯色薀也報生四薀者顯餘四薀也合成五薀耳大乘三佛者若約通相總名法身若據別相自有三別於中復有五姓宗中所明三佛亦有一性佛性宗中所明三佛且五姓宗如唯識論云如是法身有三相別一者自性身即是法身體是無為二者受用身於中復二一者自受用身唯居報土舊名報身二者他受用身居他受用土為住十地諸菩薩等現身士相作利益事三者變化身居變化土為未登地諸菩薩眾及諸凡夫二乘人等現身隨居淨穢二土作利益事應知此中離為四身謂二受用并法化故合為三身合二受用但名受用并法化故於中法及自用俱無邊量他用及化大小勝劣隨現不定此即五姓宗義也今章中義當一性宗章云金剛心後頓得常住五陰者顯不斷常即當法華論報佛菩提十地行滿足得常涅槃證故如經我實成佛已來無量無邊百千萬億那由他劫故章云真如法界第九淨識者真諦三藏說有九識即當密嚴經云心者八種或復有九也真諦云六識如常第七阿陀那識此云執識以是惑性常有執故唐三藏云阿陀那者此云執持執持諸法種子故及是第八之異名真諦謬釋也其第七識應名末那此翻為意也真諦又云第八名阿梨耶識第九名阿摩羅識唐三藏云此翻無垢亦是第八之異名也成佛之時轉第八識以成無垢無別第九廣如唯識攝大乘等唐朝已來並偏執此良由不尋一性宗故也其第七識葢是真諦誦文之忘可如前破真諦所譯多是誦出無梵本故其第九識如密嚴經下卷云如來清淨藏亦名無垢智故知不謬也或佛性宗第七即從阿陀那識妄執種生從彼彼為名故密嚴偈云譬如天宮殿眾星及日月依止須彌山風力所持運以山為依以風為持也七識亦如是通說七種依於阿賴耶習氣氣所持處處恒流轉已上經文真諦三藏云阿摩羅識有二種一者所緣即是真如二者本覺即真如智能緣即不空如來藏所緣即空如來藏若據通論此二并以真如為體即當金光明經法如如慧如如是也二如來藏本隱在纏客塵所覆今得出纏是真法身即當法華論法佛菩提謂如來藏性淨涅槃常恒清凉不變故如經如來如實知見三界之相等又尋彼宗法身亦得開為二身謂名法身及名智身良由二如來藏出纏成二故也如以報化亦有四身然與五姓宗中四身差互也其化身義如章中釋即當法華論應化佛菩提隨所應見而為示現如經出釋氏宮去伽耶城不遠坐於道場等其三身義具如如來藏經疏稽首者尚書云稽首首至地也崇云稽者考也將頭考地故名稽首今詳尚書第一卷稽鷄音訓為考也謂堯有聖德順考古道而行之而崇妄用釋稽首者慎勿依之論有多義者智度論第四也下口等者智度論第四云有出家人合藥種穀植樹等不淨活命是名下口食有出家人觀視星宿日月風雨雷電霹𮦷不淨活命是名仰口食有出家人曲媚豪勢通使四方巧言多求不淨活命是名方口食有出家人學種種呪術下筭吉凶小術不正如是等不淨活命者是四維口食偈序總有四十六行半判釋如章崇捨遺抄大有破斥無暇繁言尅滅由於行教者滅是擇滅也如三藏義說者真諦五義以釋毗尼章中不具也第一能將引生種種勝利是毗尼義謂能引生出世善於中有兩一能引生四萬二千功德正法二能引生不悔之心由不悔故心喜得定乃至解脫第二者能教身語清淨正真是毗尼義由遮身語不令起惡名之為教不被業濁及煩惱濁所染污故身語清淨不為見濁之所染故名為正真五見名見濁由清淨故得趣善道由正真故能證涅槃第三能滅罪障是毗尼義於中復兩一滅方便二正滅罪正滅謂得擇滅涅槃章中但取滅方便者下自當知由戒能遮諸罪鄣故名滅方便由鄣不生故得罪滅此兩俱得稱為毗尼第四能引勝是毗尼義能引在家人令得出家引未離欲令得梵住從梵住得聖住從聖住得有餘涅槃從有餘入無餘後後轉勝故名引勝第五勝人所行是毗尼義佛是最勝次獨覺次聲聞是此等勝人所行事故又凡夫中亦是勝者方能行故然此五中前二後兩就學處釋中通學處及以釋滅若說擇滅即兼學處若約學處即不得以擇滅釋之學處戒是此律八毗尼者實體唯七一犯二諍三犯四結使五比丘六比丘尼七方八遍總為頌曰犯諍犯結使丘及方遍夷論五毗尼者第七卷云毗尼者凡有五義一懺悔如七篇中所犯應懺懺悔能滅名為毗尼二隨順者七部眾隨佛所制所教受用而行無有違逆三者滅謂滅七諍四者斷謂能令煩惱滅除不起五者捨捨有二種一者捨所作謂作十三僧殘是也就十三事九事作者即成不得諫謂初九殘無諫也四事三諫不受僧為作白四罪成若白三事不成此十三名捨所作二者捨所見如利吒說欲捨此見故名為捨也頌曰懺七篇隨教七懺斷煩惱捨所作惡見如次五毗尼八緣起所生者彼論云罪生起因有八種一有罪從身生不從口意如不閇戶共非大戒人眠等二從口生不從身意如善心為如人說法過五六語等有三從意生不從身口如心地說罪盖謂決意擬煞等得吉羅四從身口不從意如善心作媒使等五從身意不從口如故出不淨等六從口意不從身如染心對女人婬欲語等七從身口意如染心作媒使等八有俱不從如先對人說大妄語彼人未解此人已懺三方便罪彼人後時若追解其語此人即得夷罪明了疏問云若先對人作大妄語其人未解此人已懺三方便罪此人既未犯重脩可得聖不答彼人後解此人即犯無有聖人犯重罪義既不可懺必入惡道聖人復無生惡道義故彼未死此人決定不得聖果若彼人死此方可得彼設後身解亦無障受身異故下增六文更當辨此三界五部惑九永斷智及滅已上了論文九永斷智者能證智也及滅所證滅也准新經論唯約所證至九遍知遍知即是煩惱斷之異名也若具分別非可輙盡但可配屬而已約斷三界五部惑盡於中差別有九遍智俱舍二十一頌云斷遍智有九欲初二斷一二各一合三上界三亦爾餘五順下分色一切斷三述曰謂斷欲界苦集惑盡法智忍滅集法智生時此所得斷名第一欲界見苦集所斷結盡遍知故頌言欲初二斷一也第二欲界見滅所斷結盡遍智第三欲界見道所斷結盡遍智故頌云二名一合三第四色無色界見苦集所斷結盡遍智第五色無色界見滅所斷結盡遍智第六色無色界見道所斷結盡遍得此遍知非名預流果故頌云上界三立爾頌中言餘見諦餘即脩道是於中差別復有三種謂第七五順下分結盡遍知得此遍知亦名不還果五順下分者一者有身見二者戒禁取三者疑四者欲貪五者瞋恚由後二種不超欲界不得上生設有能斷欲貪瞋恚得生上界由前三種還復下生婆沙三十九作喻云後二種結如二獄卒防守罪人不得出獄前三種結如三還人設有罪人以親友力或以財力傷害獄卒走出遠去三防邏人還執將來閉置窂獄獄喻欲界罪人即喻愚夫異生異生設能以不淨觀或慈愍觀傷害貪瞋乃至得至無所有處彼有身見戒禁取疑還執來置在欲界故名五順下分結斷此五盡即第七遍知也故頌云餘五順下文第八色愛結盡遍知須中言色是也第九一切結盡遍知得此遍知亦名阿羅漢果頌云一切斷三是四緣具故立前六遍知一滅雙因二離俱繫三得無漏離繫得四缺有頂諸遍知行由具五緣立後三遍知謂即前四加永度界俱舍論中三緣立前六四緣立後三於前四緣五緣之中各除離俱繫以滅雙因必離俱繫故不別說世若廣分別如婆沙六十二俱舍二十一上來並約所證擇滅立九遍知隨應亦有能證智起薩婆多宗唯約所證立九遍知今正量部并顯能證故云九永斷智及滅也洗浴亦約國土明處邊方是也伽論十毗尼彼論第七如章引者是也具毗尼者義當了論二部見論第四持律五事利如章所引彼論第十六亦有五事利改第四建立正法為能伏諸怨即與前文義同文異也亦同此說者同祇五利隨應配之憂波為首如前分部義已略釋之章中所釋恐不應理崇云佛本結戒皆集僧眾波離預集在會之初故稱為首眾內同聞名曰及餘亦可波離在結集初餘是同會亦可波離承律名之為首迦葉等傳稱餘身證拾遺云古人宜識不了是非天愛使然至死不悟今詳崇釋全乖文意何用發此麤惡言耶文言身證者那含若得滅盡定者名為身證此律文中顯傳法人理非那含故如章釋羅漢若得滅盡定者名心解脫亦名身證慧盡諸漏名慧解脫故言具二解脫五師傳持無憂波離名者不然前分部中已言傳律有名也崇云憂波以與眾生無緣故無名者不然也二行具足以成耆舊者諸自利利他二行也智度論二十五頌云所謂長老相不必在年耆形瘦鬚髮白空老內無德即是其義涅槃十七云山能持地令無傾動欲求前行中第一最者尊者云不然以前行中戒為第一最今此復言非持戒不尅求戒復言持戒便無能所差別也應言第一最者三乘菩提也以其持戒是解脫遠因故也終身莫毀犯者立期限也能生二善者謂身口各有止作二持善也如持犯所說意成身口等者復第二疏持犯義中意無獨犯有助身語犯義也輕義婆羅門者義字誤應言輕薄也羅云經云鶖鷺子與羅云分衛時有輕薄者興毒意取沙土著鶖子鉢中擊羅云頭出血污面鶖子告羅云當起慈心羅云臨水洗血而自說曰余痛斯須臾那彼長苦彼廣說眾人之所舉言是舉過白佛崇釋亦同此不應理舉是發覺義此中舉王是推舉義故不相當今應更釋所以立王者喻法王出世由世諍訟故喻見眾生起有漏過故佛出世眾人之所舉古昔之常法舉謂推舉喻出世脩善者敬順佛教三世道同犯罪者知法順法者成就喻脩善者順行之相戒律亦如是如王治正法此即總合法王出世由見漏過令脩行者敬順佛教善識持犯母經四不可治者彼論第三云波羅夷者不生善根永不可懺亦無羯磨可除罪也有如提婆達多出佛身血此偷蘭遮永不生無漏善根亦無羯摩可除罪有波逸提不生善根亦無羯磨可除罪如嗔心欲斷佛命打佛得提不可懺也有突吉羅不生善根亦無除罪羯磨如沙彌沙彌尼式叉摩尼四波羅夷中若犯一罪不可懺也述曰即簡提吉者謂此四事依制教相制四夷名其打佛提及下眾吉是性罪中辨不可治故於教門簡之也有疏本云即蘭提吉者剩蘭字也除二逆者以其破僧決順次生受一劫報五逆之中破僧最重論中出血即言不治義准破僧亦決如是故言二逆其實論文但言出血一逆不可治也此即簡蘭故知前剩蘭字也如四犯畏者下增四文一者如有男子犯斷頭罪譬波羅夷二者如有男子犯刀打罪譬僧殘罪三者如有男子犯杖打罪譬波逸提四者如有男子犯呵責罪譬提舍尼名四犯畏也同多中具對別人者改為俱有時限者好屍有五義者增五文云一不淨二臰三有恐畏四令人恐畏惡鬼得便五惡獸非人所住處犯戒人亦如是一者三業不淨如屍不淨二者惡聲流布如屍臰氣三者諸善比丘畏避四者善人見之生污惡心此謂近惡知識增人惡業如人見屍懼鬼得便五者自既不淨亦與惡人共住如次配前五喻可知如颷火者有四事不可輕如增一阿含二十四云佛丘舍衛月光長者生兒尼揵相已言兒薄福令取煞之長者未可欲問如來中道作念瞿曇年少將恐不解吾疑時有天神空中告曰有四事不可輕國王雖小最不可輕火雖小亦不可輕龍雖小復不可輕學道之人雖復年幼亦不可輕便說此偈國主雖復小斬害由其法小火雖未熾焚燒山艸木神龍雖現小降雨隨時宜學者年幼稚度人無有量長者聞已歡喜詣佛佛為說法得法眼淨如破伊羅葉者於迦葉佛時有一比丘作是念言栴檀香葉壞容有罪伊羅臰葉壞有何事乘此業報生在龍中頂上生一伊羅鉢樹根入龍頭為風所皷濃血四出甚大苦惱至慈氏出方脫龍身即下文伊羅鉢龍王是也問壞生犯提不應喻吉答且據輕心不遵佛教未必輕重要假相當也九十八使者此依薩婆多宗根本隨眠有十謂貪恚無明慢疑有身見邊執見戒禁取見取邪見約見脩斷有九十八且見道所斷有八十八雜心頌云若不具一切若下者謂欲界苦是下界故具一切者具十隨眠也集滅離三見於五見中名除前三見也道除於二見五見中除前二見也上來據欲界四諦合有三十二使也上界不行恚謂上二界四諦各除恚也以其上界必無嗔故合成兩令二十八兼前欲界總八十八也貪恚無明慢此四隨眠通見脩斷見所斷者如向所論次脩所斷欲界具四上二界各除嗔三界合論復成十種兼前八十八即九十八也涅槃淨天者涅槃即淨天持業釋也故章云出生死之表表者外也若准合中即不應然如言求天若涅槃天即欲界天是正所求色無色天戒能發趣也以一終不括下二句者謂終不廻耶流合前雖深無沒憂終不沒溺生死海合前便能到彼岸也三十七品者三四二五單七隻八合三十七也謂四念住一觀身不淨二觀受是苦三觀心無常四觀法無我此之四境由慧觀察名四念住婆沙百四十一云問此體是慧何故世尊說為念住答慧由念力得住所緣故名念住此即念之住故依主釋也或此慧力令念住境故名念住此即慧上立念住名是有財釋四正勤亦名四正斷亦名四正勝一於已生惡不善法為令斷故生欲發勤攝心持心二於未生惡不善法為不生故生欲發勤等如前說三於未生善法為令生故生欲等前說四於已生善法為令安住不妄倍脩增廣故生欲發勤等如前說婆沙云一精進體於一剎那作用不同建立四種如燈一念四用差別謂燒炷盡油熱器破闇言正斷者諸由勤力能斷懈怠言正勝者於正持業身語意中此最勝故四神足一欲三摩地斷行成就神足二勤三摩地斷行成就神足三心三摩地斷行成神足四觀三摩地斷行成就神足謂加行時或由欲力引發等持乃至或由觀力引發等持既由加行四法隨增令等持起故得定位於一等持建立四種婆沙一釋云三摩地名神欲等四法名足又釋三摩地是神亦足欲等四唯足非神前釋意顯神有四足故名四神足後釋意顯神足有四足故名神足俱舍二十五破云彼應覺分事有十三增欲心故婆沙十九六云覺分三十七實體有十一謂七覺支有七實體一念二慧三進四喜五安六定七捨并根力中信為八又加八道中正思為九正語為十正業為十一正命之體不離語業故不別說其四念住并根力中慧八道中正見并七覺中擇法所攝次四正斷及根力中精進及八道中正勤并七覺中進覺支攝次四神足并根力中定八道中正定并七覺中定覺支攝次根力中念并八道中正念并七覺中念覺支攝俱舍論立實體唯十語業命三合為戒故理既如是若加欲心便成十三便違自宗正義俱舍論主遂正釋云定果名神欲等所生業持名足述曰定果者謂神通等此定果神從足而生足即是定是神之足故名神足足從欲等四因而生故復名四此即從因及果并自體用以立名也今詳婆沙神有四足故名神足世親何意妄破使令加五根者一信根二精進根三念根四定根五慧根五力亦爾此五即是心所法中各一為體婆沙云能生善根故名為根能破惡法故名為力有說勢用增上是根不可屈伏是力七覺支一念覺支二擇法覺支三精進覺支四喜覺支五輕安覺支六定覺支七捨覺支此中擇法以慧為體善即喜根捨謂行捨餘四如名心所法中各一為體盡無生智是究竟覺以七為分故名覺支或無漏慧是如實以七為分名七覺支於中擇法亦覺亦覺支餘六是覺支非覺八道支者一正見二正思惟三正語四正業五正命六正精進七正念八正定於中正見體即是慧正思即尋語業命三即隨心轉餘三如名心所法中三法為體所履通達故名為道以八為分名八道支正見亦道亦道支餘七是道支非道問前言三摩地是神亦足欲等唯足非神即救云神有四足故覺分中不攝欲心今七覺中亦應擇法是覺亦支念等餘六是支非覺亦應念等非覺分攝道支為難應知亦爾答擇法即入念等數中相合成七神體不入欲等四中故不例也婆沙九十六問何故先說四念住乃至後說八道支耶答隨順文辭巧妙次第故復次四念住從初業地乃至盡無生智勢用常勝是故初說四正勤從煗乃至盡無生智勢用常勝是故次說四神足從頂至盡無生五根從忍至盡無生五力從世第一法至盡無生八道支見道中勝七覺支脩道中勝問何故八道支見道中勝七覺支脩道中勝耶答求趣義是道支義見道速疾不越期心順求趣義故見道中八道支勝覺悟義是覺支義脩道九品數數覺悟順覺悟義故脩道中七覺支勝若准大乘覺支在見道道支在脩道今且據小律文但舉七覺者舉勝顯劣明知亦有念住正斷神足根力及道支等故章總舉三十七品也上半到而別者謂第二句合前第一句第一句合前第二句也增一含五戰夫者第二十五說也沒死不顧命者婆沙百一十九云已受別解律儀復如理作意思擇乃至為命亦不故犯如聞昔日乞食苾芻至珠師舍苾芻衣赤映珠似肉鵝便謂肉遂吞此珠珠師取食授與苾芻交謝已去後覺少珠奔逐考楚觸處血流鵝來食血其人恚憤打鵝復死比丘便請看鵝死活彼尋叱言且理出珠何預鵝事苾芻固諸彼言已死苾芻告曰鵝吞汝珠其人持刀以割鵝腹乃於腹內得所失珠彼生慚愧白言尊者何不早示苾芻告言我受禁戒寧捨身命不傷蟻卵若先示汝必定害鵝不護眾生豈名持戒猶如鴦䠇摩者崇云諸師共引住住大沙門等偈謂並不識文意故作斯引其事在增一含第三十一今詳說處非唯一文應善護言勿傷人意且如賢愚十三云鴦䠇欲煞其母佛知可度化作比丘於彼邊行鴦䠇見佛捨母走趣規欲煞佛佛見其來徐行捨去指鬘極力走不能及便遙喚言比丘小住佛遙答言我常自住而汝不住便問云何汝住我不住耶佛言我諸根寂定而得自在汝從惡師稟受耶到變易汝心不得停住因而生信佛即度之得阿羅漢爾時國中人民之類聞指鬘聲皆各驚怖人畜懷任怖不能生時有一鳥不能生子佛勅指鬘往說誠言我生已來不煞一人指鬘白佛我曾煞多云何不煞佛告之曰於聖法中是為始生指鬘受教往說如語尋生皆得安穩不慚愧如婆沙三十四無慙納息廣釋也第三結竟可知者律主意云引發勝果以戒為因開導律梁寄言方委雖復德超塵筭不可廣事傍談略述既用故言已說今將正闡重禮大師自下長行首律師判此猶是勸信彼說從初至未來世云何律主敬歎勸信奉脩就中前明偈者是應機之藥後明長行辨應藥之機謂彼意言偈中但是律主直勸長行佛言未來云何乃是律主引證勸也若不引證末代比丘應作是念佛應上時上機相感教容可行今既末代未必須行故佛說言未來云何謂是律主引下急施衣戒緣起來為此證也或曰若此非是勸信序者佛在五年已制初戒阿難乃是得道日生至制戒時纔年五歲如何緣起有阿難名故是引證即無此妨登云若有阿難即非制緣者煞戒緣起亦有阿難六年冬分如何通釋今詳此等諸說不勞起諍異部相望年歲何定且如佛涅槃日便有二月八月之異諸部異說非可輙通也還依先章是發起序為定耳見論功德大者彼論第四云大者因小有大所以比丘僧功德極大也果大者彼論云最小者得須陀洹道徒眾大者論云五百大眾集故此既論文或有人破須審知之此中已下所有引見論者多是第四卷見論多義者此四義中初之兩義論文似是後二義非論正文也若總說者並非正文也賓者水涯等者此釋不然論文直云賓洲曼陀羅者此是練木樹也是故不應別釋賓字然撿梵本云賓洲曼陀羅乃是梵語故不得以漢語釋之淨三藏云善見云練樹者此亦不然此似練樹非即是練蓋由梵漢不相領解翻譯之時指練示之遂不領意即言是練也倣佛成規等者並義引論文非謹文也沙門者見論第四云沙門者伏煩惱又言却煩惱又云息心易解前五自利後五利他崇云此為不識宗詮卒爾判釋有何義趣前不利他後非自利復有引誠實證者義亦不然彼論一一釋十號竟然後總云自利利人是故應禮本不約號別有科分今詳彼論第一卷十號品中次第釋如來應供正智明行足善逝五號竟論即結云得此五法如來自己功德具足又更次第釋餘五訖復更總結云佛十號具足故自身具足他亦具足自利利人是故應禮准此足顯前五自利後五利他論作斯判不勞彈斥龍樹論云者智論二十七云如實道來故名如來章中所引乃同成論第一也滅經云者涅槃十八云乘六波羅蜜三十七品十一空來至大涅槃已上論文不住道者行六度故不住空邊達空性故不住有邊故云不住也十一空者涅槃十六云內空外空內外空有為空無為空無始空性空無所有空第一義空空空大空如彼經中次第解釋此不錄也故言滅極者意說地持既云得一切義即是滅極義也何以名為滅極以是大般涅槃故故言滅極也案地持論第三云得一切義故無上福田故應供養故故名為應瑜伽三十八云已得一切所應得義應作世間無上福田應為一切恭敬供養是故名應此與地持同本別譯也此第二號或名為應或名應供或名無所著皆是譯者取義差互也絕二縛者謂以無住涅槃釋此名也等正覺者瑜伽云如其勝義覺諸法故名等正覺或名正遍知瑜伽云上勝最極永不退還故名善逝進達窮原者於十地中進斷二障至佛地中方達窮原伏從聖化故曰無上士等者瑜伽云一切世間唯一丈夫善知最勝調心方便是故說名無上丈夫調御士或名無上士調御丈夫一也三聚法者瑜伽云於能引攝義利法聚於能引攝非義利法聚於能引攝非義利非非義利法聚遍一切種現前等覺故名為佛謂諸善法引攝義利若不善法引非義利若無記法二俱不引現蓋名義後蓋名利也本音薄伽梵此方義譯為世尊或名婆伽婆音之轉也此十號如涅槃十八瑜伽三十八及八十三地持第三智論第三及二十七品類足第成論第一菩薩瓔珞本業經下卷見論第四並釋不可繁敘也三輪即新經論名三示導示導即輪義也以能摧破彼惑障故一神變示導即六通中神境智通是二記心示導即是他心智通三教誡示導即是漏盡智通三輪者獲神通作證即神變示導也常說正法等者即是教誡示導說法必觀彼之根性即顯亦有記心示導下受戒犍度中更辨見論多解一謂初中後言說契群心等者並是義引非謹錄文彼論第四云初善中善後善其義巧妙純一無雜一切具足皆是一味述曰純一無雜者純引義利也一切具足者眾行具也皆是一味者一味無我理也二謂戒定慧等者論云又言戒者初善三昧得道者中善道即無漏道也唯此定慧合為中善涅槃者後善章言等者即等涅槃也三種菩提者佛辟支聲聞如次上中下善也論中更有數釋不繁敘之尊者更引成論第一三善品釋云初中後善者佛法無時不善於少壯老三時皆善佛之言教少壯老年皆宜諷誦非如世俗所有歌詠少壯所應老即非宜也入時行時出時亦善謂佛教行法住出入一切皆善非如世俗歌詠等事入衰喪處所不應作等又初止善中捨福後一切捨是名三善乃至又於三時一切甚深不如餘經初麤中細後則微末餘經者外道經也至止善等者止息有相取著心也亦應禮敬者若准見論此釋不然彼論第四婆羅門至佛所望佛作禮佛言若人受我禮者頭即墮地彼便以八事譏佛一者彼言若爾色無味述曰謂色應無有耆宿之味佛言實無味何以故世人以色聲香味觸以此為味如來於此已斷二者彼言若如是者便為貴高述曰既不許色有耆宿味故是貢高佛言因汝語故我實貢高三世諸佛皆不為人作禮故三者彼言若爾便無所作述曰謂不行敬便不作善佛言我實不作盜等惡業及善業等四者彼言此人便自斷種意云既無業種應無後報佛言實爾三界煩惱我皆斷故婆羅門罔然不解更故語云五者此人可薄不淨佛言實有不淨有人為惡此是可薄六者彼恚言此人聞我語隨事而滅佛言三界煩惱我實已滅七者彼言此人可念不堪共語佛言實爾有人愚癡恒為惡業甚可憐愍八者彼便恚言此人當是日夜不眠思求文章窮世間人佛言實爾我不入胎眠不天上眠故名不眠因此方生信心故章中不應言應敬禮也避六法者見論云坐避六法一者極遠若欲共語言聲不及二者極近觸忤宿德三者上風身氣臰故四者高處不恭敬故五者當眠前視瞻難故六者在後宿德共語迴顧難故見云佛已應世間人者見論第五也已上引見論並第五藥樹喻非論文也多云止誹謗者第五卷也彼論云若佛於食發言許可外道果見當言瞿曇沙門自言超過三界而故於食有貪等也寄興常理者涅槃第二佛說純陀施食有二果報無差一者受已得阿耨菩提二者受已入於涅槃我今受汝最後供養令汝具足檀波羅蜜爾時純陀即白佛言如佛所言二施果報無差別者是義不然何以故先受施者煩惱未盡未得成就一切種智後受施者煩惱已盡等云何而言二施無差乃至先受施者受已食噉入腹消化得命得色得力得安得無礙辨後受施者不食不消無五事果云何而言二施無差佛言善男子如來已於無量無邊阿僧祇劫無有食身煩惱之身非後邊身常身法身金剛之身觀佛怡悅者見論云世尊默然顏色怡悅是故知佛受請也遶已而去者多論第五云若外道異見但遶而去若有信者禮足遶已而去佛身清淨喻如明鏡天神龍宮山林河海一切器像於身中現見者信敬心生是故頭面禮足右遶者順法故所以右遶又密迹力若有左遶者即以金剛杵碎之又佛世世已來常順三寶父母師長一切教誡無違無逆今得果報無有逆者又佛身淨眾生於中各見所事或天或神莫不見者是以敬畏右遶而去見云一為度國主二請制戒者並非謹文彼論第五云因欲制戒說法故准配前兩稍似是也三設往餘方等者論云正使往到單越或上忉利天魔王亦當來蔽不可得避何以故此年魔王大忿如來已自遍觀唯有毗蘭若販馬人可依安居大乘方便經下卷云爾時佛神力故令惡魔波旬䨱蔽彼城中人非是惡魔力之所能我於爾時都無業鄣為化彼眾故示現空鉢而還等又准彼經下卷中欲度彼馬如來受請彼云此五百馬於先世中已學大乘曾近惡友故墮畜生五百馬中有一大馬名為日藏是大菩薩曾人道中勸諸小馬發菩提心為度餘馬現生馬中由大馬故令五百馬自識宿命因施食分悔過於佛不久命終生兜率天來至佛所發心供養乃至善男子是故當知如來方便非是業鄣如彼廣說不能謹錄也世尊一計等者多論第八凡馬食麥二計一計與馬一計與比丘中有良馬食麥四計二計與佛問佛法平等何以一多一少答曰僧祈物者法應平等此檀越物隨施主意又佛身大比丘身小各量腹食不失平等義也已上論文十中以殘食等者十誦十四云阿難取佛分及自分入聚落一女人前讚歎佛功德已令作飯是女言我家多事不能得作時有一女聞佛功德語阿難言我與作飯女即作飯持與阿難阿難深心敬佛如是思惟佛為王種常御餚饍如此麤惡何能蓋身念已授飯見佛食之悲哽情塞佛欲釋之曰汝能噉此飯不答言能受而食之滋味非常實以諸天以味加之悲塞即除乃至佛言其作飯女應作輪王第一夫人准斯佛與比丘味亦異也毗沙門天王釋夫人者不然彼律十四云是時舍利弗獨住不空道中受天王釋夫人阿須輪女請四月安居此是帝釋夫人何關毗沙之事第五文四者初至當往是立請次佛告目連下縱答第三目連白佛下兼請謂以神力兼接餘人第四佛告目連下抑答也闕無制教者前文一一列十二部亦應文中續次即言不結戒不說戒文無者略故言闕也此十二部經者舊名十二部新名十二分教廣釋如涅槃十五瑜伽二十五八十一顯揚十六雜集十一智度論三十七婆沙百二十六順正理三十四成實第一今略五門分別一辨相釋名二總明體性三展轉相攝四配入三藏五隱顯有無初門者若准涅槃及瑜伽等論名字次第者一契經二應頌三記別四諷頌五自說六因緣亦名緣起七譬喻八本事九本生十方廣十一希法舊名未曾有十二論議今律文譬喻乃當第十一數本生在前本事在後餘者次第同瑜伽等今且依律次第辨相先且翻名束為頌曰修契夜應和授記伽諷憂白尼因緣闍生帝事略方廣浮希阿波譬提論述曰一者修多羅此云契經略尋諸教有二種相一者總相通收十二總名契經故涅槃云從如是我聞至歡喜奉行如是一切名修多羅瑜伽二十五顯揚第六其意同此故彼論云云何契經云薄伽梵於彼彼方依種種所化有情調伏行差別宣說無量蘊相應語界處緣起食諦相應語聲聞獨覺如來乘相應語念住正斷神足根力覺支道支不淨息念諸學證淨相應語如來說已諸結集者歡喜敬受為令聖教得住故以諸義妙名句文身如其所應次第結集次第安布謂能貫穿縫綴種種能引義利能引梵行種善種善義故名契經二者別相唯攝長行名為契經故瑜伽八十一云契經者謂貫穿義長行宣說多分攝受意趣體性雜集十一云謂以長行綴緝略說所應說義述曰瑜伽既言攝受意趣謂即纔明意趣而已即當雜集略說義也婆沙百二十六云謂諸經中散說文句如說諸行無常諸法無我涅槃寂靜散說即是長行言釋名者即能詮教契所詮理及有情機契即是經持業釋也二者祇夜此云應頌舊名重頌偈也此有二相一為利益後來之往應為重頌二為長行義不了故應更頌釋瑜伽雜集並顯兩義故八十一云謂長行後宣說伽他此即為後來者又略標所說不了義經故名應頌謂長行標不了故應更頌釋准下離集知之雜集十一云即諸經中或中或後以頌重頌此為後來又不了義經應更頌釋故名應頌准此知故長行不了應更頌釋即說長行名為應頌泰法師即以長行為應頌體西明法師釋雜集云言應頌者為欲顯前不了義經即以頌文為應頌經復即應頌體是了義此即濫下記別之相如雜集云又了義經說名記別故知違理故取泰法師釋以之為正涅槃十五唯辨為後來者故彼經說佛告諸比丘昔我與汝等愚無智慧不能如實見四真諦是故流轉久處生死為諸比丘說契經竟爾時復有利根眾生為聽法故後至佛所即因本經以偈頌曰我昔與汝等不見四真諦是故久流轉生死大苦海廣說如彼言釋名者若據前義應即是頌持業釋若據後義應有彼頌即有財釋也三者和羅那此云記別舊名授記此有三相一者記別弟子生處二者記別深密之義三者記別當成佛事故雜集云謂於是處聖弟子等謝往過去記別得失生處差別謂生善趣由功德故若生惡趣由過失故又了義經說名記別記別開示深密意故八十一意亦同雜集此上即成兩種相別第三相者涅槃云何等名為授記經如有經律如來說時為諸人天受佛記別汝阿逸多未來有王名曰蠰佉當於是世而成佛道號曰彌勒是名受記經婆沙意同雜集說釋名可知第四伽陀正梵音云伽他律中訛略單名為偈此云諷頌舊云不重頌偈此有一相顯揚云諸經中非長行直說然以句結成或二句或三句或四句或五句或六句問何故不言一句答一句非頌復濫長行問何不言七句答且略舉其一頌之半以示其相理實更容加七八等涅槃全舉一偈為法故彼云伽陀經者除修多羅及諸戒律其餘有說四句之偈所謂諸惡莫作諸善奉行自淨其意是諸佛教西明法師云此經意說非長行直說非因緣為他說唯以偈說故名諷頌言釋名結頌諷誦故名諷頌第五憂陀那正梵云嗢柂南此云自說舊名無問自說然嗢柂南亦含集施之義謂集散文以成句頌用施有情故律文中就此義說名為句經既有施義即當自說此亦唯有一相謂無請者如來自說故瑜伽二十五云謂於是中不顯請者為令當來正法久住行久住也聖教久住教久住也不請而說是名自說涅槃云如來明旦從禪定起無有人問即自說言比丘當知一切諸天壽命極長汝等比丘善哉為他不求己利善哉少欲善哉知足善哉寂靜如是諸經無問自說讚天福二讚利他三讚自利少欲等法雜集一云謂諸經中或時如來悅意自說如伽他曰若於如是法發勇猛精進靜慮諦思惟爾時名梵志此涅槃等皆為令其正行久住指事雖別理趣終同釋名者由佛自說故名自說第六尼陀那此云因緣瑜伽八十一有三種相故彼文言謂依有請而說諸法如經說言世尊一時依里麤子為諸比丘宣說法要此即第一依請因緣而說諸法又依別解脫因起之道毗奈那攝所有言說此即釋二因犯為緣而制戒律也又於是處依如是如是因緣依如是如是事說如是如是語此即第三因事說法如下律文世尊因見有大火聚便告比丘汝等寧當捫摸火聚不應貪欲等也瑜伽五十五顯揚及雜集等並顯前二不繁敘之涅槃經中但顯第三故涅槃云如諸經偈所因根本如舍衛國有一丈夫羅網鳥已隨與水糓而復還放世尊因此而說偈言莫輕小惡以為無殃水渧雖微漸盈大器釋名者有因有緣故名因緣有財釋也因緣之經依主釋也第七闍陀伽此云本生此有二相謂說菩薩過去受身及所行行故顯揚第六云謂於是中宣說世尊在過去世彼彼方所若死若生行菩薩行行難行行是名本生此顯過去受生死身及難行行也涅槃但顯過去受身故後文云諸比丘當知我於過去作鹿作羆作麞作兔作粟散王轉輪聖王龍金翅鳥諸如是等行菩薩道時所可受身是名闍陀伽釋名者顯佛過去本生之事名本生經第八伊帝曰多伽此云本事律名善道經略有二相一者約人以辨本事二者約法以辨本事故雜集十一云所謂宣說聖弟子等前世相應事此即顯諸弟子過去本事也涅槃云比丘當知我出世時所說法者名曰界經由於經中出生無量差別義故也鳩留秦佛出世之時名甘露皷擊佛教皷飲甘露法拘那含牟尼佛名曰法鏡照了無量法門義趣迦葉佛名各分別空對彼執有故分別空是名伊帝曰多加此即顯佛法門本事瑜伽八十一云謂除本生宣說前際諸所有事准此即通人之與法婆沙百二十六云謂諸經中宣說前際所見聞事如說過去有大王都名有香茅王名善見過去有佛名毗鉢尸為諸弟子說如是法過去有佛名曰式企乃至名迦葉波為諸弟子說如是法准彼約人通其餘人及以餘佛約法之中但言說法理亦無簡釋名者除本生外若人若法所有本事故名本事律名善道者謂除本生餘人過去行善道事故名善道第九毗佛略此云方廣律云方等此有二相一不共相二者共相且不共者唯局大乘故瑜伽八十一云謂說七地四菩薩行百四十不共法又復此法廣故多故極高大故時長遠故名為方廣言七地者瑜伽四十九云一種姓地未發心位已有種姓二勝解行地謂是地前一無數劫三淨勝意樂地即是初地四行正行地從二地至七地五決定地即是八地六決定行地即第九地七到究竟地十地及佛地也四菩薩行者一波羅蜜行即十度行謂六度外加方便願力智二菩提分法行菩薩所有三十七覺分三神通行謂六通等是也四成熟有情行以無量調伏方便調伏無量所化有情也百四十不共法者三十二相八十隨好四一切種清淨所依清淨所緣清淨心清淨知清淨十力四無所畏三念住三不護大悲無忘失法永害習氣一切種妙智已上合一百四十不共法此等法門唯局大乘極廣甚深故云廣故也無邊法門故云多故也果超眾聖故云極高大故也經三無數故云時長遠故也所依名方法大名廣謂諸有情安樂所依又是甚深廣大法故名為方廣方即是廣持業釋也第二共相者瑜伽二十一云哀愍一切諸聲聞故依四聖諦宣說真實苦集滅道無量法教所謂契經乃至廣說十二分教既為聲聞亦說方廣故應釋云聲聞教法諦理所依名之為方凡愚不測所以名廣方即是廣亦持業釋也西明釋云理正名方廣陳名廣任情存之此律亦是為聲聞說故是共相涅槃十五亦據不共故彼文云所謂大乘方等經典其義廣大猶如虗空是名毗佛經婆沙百二十六亦據共相故彼文云謂諸經中廣說種種甚深法義此意但顯聲聞深義第十阿浮陀達磨此云希法舊名未曾有此中略辨人法二種並有希奇皆名希法故顯揚第六云謂諸經中宣說諸法及諸弟子比丘比丘尼等七眾所有共不共德及諸最勝殊特驚異其深之法是名希法此說弟子及深法也涅槃云如彼菩薩初生之時無人扶持即行七步放大光明遍照十方亦如獼猴手捧蜜器以獻如來如白項狗佛聽能法如魔波旬變為青牛行凡鉢間令互當觸無所傷損如佛初生入天廟時天像禮敬等此說菩薩及餘趣生希奇之事雜集云若於是處宣說聲聞諸大菩薩及如來等最極希有甚奇特法此即通說三乘聖者雖有多文類攝莫過人法之別言人者兼顯餘趣言釋名者希即是法持業釋也十一阿波陀那此云譬喻涅槃云如戒律中所說譬喻雜集云謂諸經中有比況說雖指經律出處不同莫不皆取有譬喻說釋名可知第十二優波提舍正梵音云鄔波希爍此云論議此有二相一者佛自分別法相二者弟子分別法相八十一云論議者謂諸經典循環研覈磨呾履迦且如一切了義經皆名磨呾履迦謂於是處世處尊自廣分別諸法體相此即佛自分別法相又於是處諸聖弟子已見諦迹依自所證無倒分別諸法體相此亦名為磨呾履迦即此磨呾履迦亦名阿毗達磨此即弟子分別法相也磨呾履迦此云本母此謂諸論與種種義為本為母也涅槃但顯佛說法相故彼文云如佛世尊所說諸經若作義論分別廣說辨其相貌是名優波提舍瑜伽二十五等但明弟子論義故彼云云何論議所謂一切磨呾履迦阿毗達磨研究甚深素怛纜義宣揚一契經宗要是名論義既言研究素怛纜義故知准約弟子釋經名論議經言釋名者談論評議故名論議上來廣辨相訖
