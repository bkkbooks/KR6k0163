body:
  text: 嵩岳鎮國道場沙門賓作結戒六門義止觀者止即是定觀即是慧也若成實宗止觀二法定不同時若薩婆多及大乘等於一心中止觀二法同時相應雖許同時然或有時止用力強即說為觀如無色定等或復一時觀用力強即名為觀如未至定等或時止觀平等俱轉如四根本靜慮等今配屬者是應念者即是止門應思應斷即是觀門也諸惡莫作等者一釋云諸惡莫作是學戒諸善奉行是定學自淨其意是慧學若准瑜伽第十九釋諸惡莫作是定學諸善奉行者通明三學自淨其意是三學果是諸佛教結成不共也問即初句中所明戒學與第二句戒學何別基法師及量法師釋云戒學有二義一者防非止惡即是初句二者戒體是善即第二句今詳初句顯初業地唯能持戒次句三學顯道中三學俱時故不同也如瑜伽注廣釋應知首律師云善調三業唯是制教餘三通於化制二教提二十億六十千者誤也彼經是二十億四千也有無作戒可違者問未制之前未有人犯若犯即制佛復開初今據何義說違無作答未結未開是違無作結開之後方為不犯第三判兩教不同者略是根本故得直陳廣是枝條壞略方補根條既別制法不同第四制廣補略者缺根違略合略教缺汙本所受復合行缺故今制廣合曉是非教益還生名為補教即由示過令悔前非已赴因天當果不受還令戒淨復名補行故云制廣補略也並如前卷疏未釋之論云十善舊戒等者智論五十一云十善道為舊戒律儀為容也位言興結者亦有不具八緣而結者如怖佛提無舉過及撿問自言與外道食亦爾故云位言也指文可知者一一戒中先結五眾犯云比丘尼波羅夷戒叉等吉羅即是犯文也不犯者睡眠無所學知乃至痛惱所纏即不犯文也就前犯文之中如言成者波羅夷等即重文也劣弱方便者有合有離且合辨者劣弱之體即是方便二者劣弱之體意顯下篇方便之言因諸因罪也增施究竟翻上應釋不犯法以生作持者前言不犯法有三一止持何故今言生作持也答作持必從不犯法生而不犯法未必一切皆生作持故無失也三就具二持以明不犯者乞法稱量名不犯法而生順違二行准前思知媒等亦爾者媒雖制重招報輕也深厚纏者成實第九卷故不知品云如人以深厚纏殺害虫蟻重於殺人二眾初戒者入如毛頭犯不得受樂也聲聞不制二聚者瑜伽三十九地持第四廣釋三聚戒瑜伽云又即依此在家出家二分淨戒略說三種一律儀戒二攝善法戒三饒益有情戒律儀戒者謂諸菩薩所受七眾別解脫律儀即是苾蒭乃至近事女戒等也攝善法戒者謂諸菩薩受律儀戒後所有一切為大菩提由身語意積集諸善總說名為攝善法戒廣說如彼云何菩薩饒益有情戒略有十一相廣說如彼大況能助有情有義利事及瞻病事能為宣說世出世利王賊等畏能殺合離失財裘親能勸離惱施與資具篇揚實德慈心責過知恩令猒惡法等也又就身口除夢中者問眠時若有身口二業可簡二業說除夢中眠中既無身口二業何須簡夢答與女同宿隨轉得罪由前方便今結眠中故須簡此有身業眠顯其單夢開之不犯也二眾漏失尼提僧殘約力分限也衣食將補者上行三衣不開畜長僧食乞食一揣等異時處事者時藥等四約時也受戒洗等約處也四錢三角尺量等約事也形相者十五種者二處二處非極大極小等也餘可知者示相如調達破僧差人說過須有十過入宮十過等也心境者約境想論也內外者一者有情為境名之為內非情為境名之為外二者自身名內他身名外餘釋從煩其希數譏過或從境緣並六所收者或可別論亦好尼取僧衣希故但吉僧與尼衣譏故得提僧取尼衣譏故犯提尼與僧衣無譏故吉境緣者即內外中取容不別辨十種勝利戒學之所獲也故瑜伽九十九攝事分中云如來觀十種勝利於毗奈耶中為諸弟子制立學處謂攝受僧伽令僧精懇乃至廣說律攝云觀十利制初他勝等章中分三初有三利能生眾法功德等若准瑜伽九十九攝事分中亦分為三而不同此彼云如是十種勝利略攝為三即此三種廣開為十何等為三一者令僧無染汙住二者令僧得安樂住三者令佛聖教長時隨轉今詳理實前九並是令僧無染汙住及安樂住且據別相前之二利令僧無染汙住次有七利令僧安樂後之一利令教長時次當別釋律云攝取於僧疏中所釋非無有據見論第六云若少欲知足人者即能受持是故佛為說戒本如五色花次第貫穿亦如七寶珠貫之次第若准如是瑜伽八十二云問攝受於僧等諸句有何義耶答攝受於僧者是總句九十九云若能攝受四大姓等正信出家趣非家眾當知說名攝受僧伽述曰前文總相後文別相也律攝云一為攝取僧伽謂於剎帝利婆羅門薜舍戍達羅家有善男女人正法中深生敬信而作苾芻以成眾故與瑜伽九十九同令僧歡喜者或可如八十二云令僧精懇者令離受用欲樂邊故准此為治染樂而得法樂也律攝云二為僧伽極善者既入善說法律之中能令善法極增盛故令僧安樂者八十二云令離受用自苦邊故律攝云三為僧伽樂住者說斯善法還淨施債故九十九云由五種相應知說名令僧安樂一者令順道具無所遺乏二者令擯異法補特伽羅三者令善除遣所生惡作四者令善降伏諸煩惱纏五者令善永滅隨眠煩惱應知此中最初安樂增上力故未信者令生淨信已信者令其增長第二安樂增上力故調極鄙惡補特伽羅第三安樂增上力故令慚愧者得安樂住第四安樂增上力故令善防護現法諸漏第五安樂增上力故能令永滅當來諸漏已上論文准此即從未信者已下六利通名令僧安樂此亦是總前八十二令離受用自苦邊者即據別相亦不相違令未信者信章十中准善見論第六釋也八十二云未入正法者令入正法故已信者令增長見云若有信心出家脩學禁戒等如章八十二云已入正法者令成熟故律攝云善護彼心故難調者令調順者章中所釋取見論意八十二云犯尸羅者善駈擯故律攝云折伏惡人者犯重之人由不護戒以折伏法而駈擯故慚愧者得安樂者疏釋亦准善見意也八十二云淨持戒者令無悔故攝云為懷慚樂住者謂凡夫極淳善人為令此人無有鬪諍安樂住故斷現在有漏者疏亦善見意也八十二云防現法漏者隨順摧伏煩惱纏故謂順生有漏伏道也攝云斷現法漏者謂是現纏令不行故意同瑜伽斷未來有漏者善見云為不斷五情故而行惡法後墮地獄中受諸種種苦毒非直一受而已輪轉在中無央數劫八十二云害後法漏者止息邪願順梵行故隨順永斷惑隨眠故言邪願者九十二云謂有一類補特伽羅先求涅槃而樂已後為天妙欲愛味所漂所受持戒迴向善趣准護尸羅便生喜足是名外結補特伽羅於增上戒第一耶行已上論文惑隨眠者即是種子種子唯是無漏道斷故言害也今此持戒順生彼道故云隨順也攝云謂是煩惱業種令永斷故正法得久住者疏亦善見意也彼文云問曰何謂學正法久住答曰學三藏一切久住佛所說是名正法於三藏中十二頭陀十四威儀八十二大威儀戒禪定三昧是名住受正法久住四沙門道果及涅槃者是名得道正法久住八十二云為令多人梵行住轉得增廣乃至為諸天人正善開示道者為令聖教長時相續無斷絕故攝云謂如法宣說廣利人天展轉相教令法久住故犯等四句一犯二不犯三輕四重也初制異語後制惱僧初制嫌後制罵也異語嫌罵無別初者此應思擇多論第二云得犯惡行罪婬是法故無業道罪自己妻故無犯戒罪佛未結戒故林中比丘得二罪不得犯戒罪佛未結戒故不同疏釋惡行者別有失威儀故也出家人一切邪者成論十二十不善業道品云問曰若出家人取婦免邪婬不答曰不免所以者何無此法故出家法當離婬欲但罪輕於犯他人婦增一含二十六告諸比丘僧伽摩比丘七變往降魔今方成道自今已後聽七變作道過此限者則為非法總明受法行者是唯釋相作此名字如釋相中釋八比丘亦明諸受行離明受法共者亦准釋相如云是中比丘者餘比丘眾受大戒等如疏釋云人殊報別假緣義一是離明行法同者亦准釋相如云我為諸弟子結戒寧死不犯是也又此別出境界者前言不淨行何境起犯者舉前略戒本難也尊者曰為九者好准釋相中各別釋故若爾前難云何通答前略戒本亦已含有當若無此廣戒本者亦須離出境界別釋故為九好義五文四者第五篇無若比丘句也以不對之開捨戒者問為以緣起不在下三而不對開為有別理對下三戒不開捨耶答具由二緣言別理者佛具正知義無相反若開捨戒行盜煞妄事即招譏又設劫來佛亦遮斷如下文中不許度賊及曾煞人妄語得利盜聖人物亦在賊攝雖容得或要自佛遮也假教者謂假廣教示相分明也祇律第二有一比丘謂羯磨比丘也十律第一有四一名字比丘者以名稱二自言比丘者用白四羯磨受戒又復賊住比丘剃除鬢髮披著袈裟自言我是比丘三為乞比丘從他乞食故如婆羅門從他乞時亦言我是比丘是名為乞比丘四破煩惱比丘諸漏結纏畢竟不生是名破煩惱比丘五分第一有十一比丘乞比丘持壞截衣比丘破惡比丘實比丘堅固比丘見過比丘一語受戒比丘二語三語復為兩種善來受戒比丘如法白四羯磨受戒比丘然五分十五云諸比丘一語受戒言汝歸依佛有二語受言汝歸依佛歸依法又三語受可知以是白佛佛言不應一語二語三語受戒述曰蓋制後不應也多論第二若比丘如章引之見論名為比丘含下七種者彼論第七八種得戒即解釋戒本之下若比丘義八種得戒上受緣中已具列訖八中既無名為比丘何容說有含下七種今詳疏意義准彼論非謂有文也謂彼論第七云律本所說能著割截衣者是名比丘沙彌亦名比丘如有檀越請比丘沙彌雖未受具亦入比丘數是名字比丘准此論文名字比丘即當此間名為比丘既言沙彌亦是比丘故知此中定含下七又准下文中未度陳如佛即告言比丘應捨離二邊等故知並據通名比丘也相似比丘者見論第七云法師曰云何名假名比丘如長老阿難夜行見一犯戒比丘問咄此為是誰犯戒比丘應言我是比丘此是假名比丘無堅實也此有多妨者謂違十誦又此八中已有破結何須別立自誓比丘又此律中上下無文說有自誓又稱之與誓其義全別不得妄通也五邪命智度第二十二文也是中比丘者還牒第八者首律師云此是簡濫前列八種或時名濫如沙彌陳如等但有名字或時相濫如割截等或復行濫如乞求破結等或言說濫如自稱等或有躰濫如善來羯磨等自餘七種或時少分或時全非共比丘義此師意說此中所辨共比丘者意取犯人若如善來全非犯者名為比丘既通一切於中聖者即非犯人餘亦准此故有一分非是此中共比丘義故今簡取羯磨之中共比丘義不舉前二者前言善來羯磨此二唯受破結通兩即是此中具有三受何故但舉羯磨不舉前二也以對上二總舉列者前許略釋戒本八句一一皆有舉釋結三上來總舉若比丘句復已總列八比丘此舉及列名為上二也今詳不許是釋羯磨具緣之義如上第二卷記中辨同戒者多論第二云同入舉法者初受具比丘所學百歲比丘亦如是學十誦亦爾多論又云問若百歲比丘同初受戒比丘所學者初受戒比丘掃地塗地取水種種使亦應同不答百歲比丘亦從少至長是故說同文言不靜者謂有所對人也濫此所對故略者如文已有兩个偏句若據更出一个俱句靜作靜想不成捨者人便生疑亦應對此更明俱句云不靜不靜想不成捨戒理實不靜作不靜想即成捨戒今恐濫前靜作靜想由是相從二俱不出今詳或可偏句尚不成捨第三俱句理在妄言故略也十誦云獨作獨想等見論第七遣使若書若作手印向人說此不成捨三捨戒等心謂有欣厭心等者如此處文辨欣厭心下尼犍度比丘尼直心捨戒不成捨故知須有捨戒心也決定心者即如此文戲笑等不擬定捨祇律第二云我當作沙彌作俗人作外道彼心念口言未決定向他人說是名戒羸若說戒羸事者語語蘭罪又云若嗔恚若九十說若獨說若不了說若因諍說若獨想說若說前人不解若向眠者說向狂人說向苦惱者說向孾兒說是名不捨戒尊者云一五分自心捨成捨強逼不成二祇律久思心捨成捨平捨不成三歡喜心成如祇律及此法尼四寂靜心祇云因諍說不成五決定心如祗不決定不成六欣厭心可知前境領解者見論第七云若發言向一人說若此人解者即成捨戒若此不解有邊人解者亦不成捨若向兩人說一人解一人不解成捨若悉解者成捨若向百千人說解者成捨若為婬欲所惱向同學說者復自忘畏因在屏處作大聲而言我今捨佛隨有解者忽有邊人解此比丘即成捨戒若此比丘語已未即時解久思然後解欲捨戒者不成捨廣說可知者如見論第七祇律第二五分第一十律第一必也臨事可驗多久若欲無過而成捨法如多論第二彼云問曰捨佛者是根本棄皆三寶更得出家不答曰有論者言更不得出家又云故得出家以不隨百遮故又云然捨佛已現在無吉祥事所作無吉無利灾禍歸身欲捨戒無過者若捨具戒當言我捨具戒當言我捨具戒我是沙彌若捨出家戒者當言我捨出家戒是優沙塞若捨五戒當言我是歸依優婆塞如是則成捨戒亦無過咎又言若以著白衣被服有人問言汝何故爾答曰我罷道我作白衣亦名捨或時都無出家人若得白衣不問佛弟子非佛弟子但使言音相聞解人情去就亦得捨戒捨戒一說便捨不須三說若准伽論第五云何非捨戒若狂屏處自說沙彌所外道白衣所不於住性比丘所說不名捨戒與多論相違任情通釋又伽論第九云問若比丘作外道服或捨戒不答不捨戒犯蘭若人問汝是誰答是外道故妄語波夜提問若比丘作居士形捨戒不答不捨戒犯突吉羅若人問汝是誰答是居士故妄語提不同祇律者彼律第二云若言捨過去未來佛不名捨戒得偷蘭罪若不言捨過去未來佛直言作佛者是名捨戒覺云祇律過未得蘭此律不言得蘭故云不同祇律也祇律文中唯捨和上即成捨戒捨阿闍梨不名捨戒得蘭罪以此准知捨同和上等彼雖無文亦非捨戒不同此律也作佛捨者祇云捨正覺捨最勝捨一切智乃至捨羅睺羅文捨金色身捨圓光三十二相八十隨好若捨一一佛名號皆名捨戒見云佛有一百名法亦如是餘諸句亦如是乃至如是隨號皆成捨戒捨法者祇云無為涅槃離眾煩惱一切苦患永盡無餘是名捨戒又云捨九部經論善見意同捨僧者見云捨四雙八輩無上福田等捨戒者見云捨比丘戒比丘尼戒比丘毗尼比丘尼毗尼初彼羅夷第二第三第四夷乃至吉羅亦成捨然見論中乃至捨受戒弟子依止弟子亦成捨戒如彼廣說多云捨和上阿闍梨者以因得戒故捨比丘乃至優婆夷乃至不與汝作同學戒捨戒者以本同歸向一味一道今若捨之則佛法義斷以是背佛法故戒則失也祇律捨一比丘及眾多比丘不成捨要捨僧方成不同多見二論也除大小者祇云象身大雞身小得蘭若象身小雞身大得夷又云若彼身大雖入不觸其邊者蘭有眾生一道是處食是處大小便若婬此眾生夷正法念經云繫縛諸天子莫過諸女色女人縛諸天將墜於惡趣優填王經云女人最為惡難以為因緣恩愛一種縛牽人入罪門內病及樹界者別眾食戒云病者下至足跟劈洗浴戒云下至身體臭穢燃火戒云須火便身也樹者離衣宿戒云樹者與人等足蔭覆跏趺坐不共住多論四義錄也息外道謗者論云若與惡人同事外道邪見及以世人咸生誹謗當言佛法有何可貴不問善惡一切共事已上論文口中行欲見論第八有文應撿之伽論第三大便道過收夷小便道過節夷口道過齒夷不同此律入如毛頭也下文嗔恚女醉女狂等三女合五者條部文中有五種女謂眠醉狂嗔及苦痛女於中眠女此上文中已是有竟應言狂等四女疏言三女誤也言合五女者謂彼三女并此婦童女合五也應言共女各有覺不覺新死少分壞應作如此分別文無者文中但有樂等六句初句三時俱樂第二第三第五二時樂一時不樂第四第六一時樂二時不樂理有三句文中俱二謂更加始入不樂入己樂出時不樂合七句也計算准知祇第二云受樂者譬如飢人得種種美食彼以食為樂又如渴人得種種好飲彼以飲為樂受欲樂者亦復如是不受樂者譬如好淨之人以種種死屍繫其頸上又如破癰熱鐵燒身不受樂者亦復如是見論第七不樂者如內毒蛇口如內火聚乃至於五欲中如五拔刀賊傷害無異若如此者即無罪九境逼己者男黃門二形三趣分故九也道非道者見云非道者水道邊有瘡從瘡入水道出等是也若語不語者防巧情也見論第七云若諸長老聞說此不淨行慎勿驚恠應生慚愧至心於佛何以故如來為欲慈悲我等為愍我等為結戒故說此惡言若人如是觀如來德便無嫌心若佛不說如此事者我等云何知彼波羅夷偷蘭遮吉羅若有法師為人講時聽者說者以扇遮面慎勿輕笑若有笑者即應駈出何以故三藐三佛陀憐愍眾生金口所說汝應慚愧至心而聽何以乃笑故應駈出未必有初犯不成者此中意言制夷之時對之制輕縱有後犯而不成者即當第二不開最初無文開故如調達出血即是第二以煞戒中不成蘭名先已有故尊者曰不然一代之中亦應有人犯不成蘭但結集家集之一處未必即是相對制也准斯即應別開最初任情取捨耳含五方便者此戒無想疑故也能所以顯教人者能所義如上十門中已辨上明比丘自作教人者指已上文是辨比丘自作教人二業也下四眾犯尼之自作者於下文中比丘尼波羅夷式叉摩那沙彌沙彌尼突吉羅即是四眾犯於中尼犯即是尼自作業也故此文中但明尼教人業也除比丘比丘尼者瑤云此有三義一能中說除謂下二眾教上二眾若作不作下唯犯吉羅二者所中說除若上二眾教下三眾若作不作下眾唯吉三能所合除上二眾下三相教若作不作能所俱吉擯不擯異也即出犯主者以想疑故而得蘭罪想疑之心是主也執此半壞謂為重境等者不然不由妄執得免僧殘今且兩釋一者即與境想無異謂於此中散文解釋至境想中來入境想故無失也又釋想有二種一者迷想即境想攝二者故起假想之心想彼半壞以為正道暢情處重故結偷蘭蘭名雖輕業道實重不比僧殘也後釋好式叉摩那或式叉摩拏唐翻正學沙彌者舊言息慈理實沙彌片有息除之義所言慈者以其經云沙彌救蟻故然也淨三藏云室羅末尼羅翻為求寂釋言謂欲求趣涅槃圓寂之處言息慈者意准而無據也唐三藏云室羅摩拏洛迦翻為勤䇿男勤謂苾芻勤人所䇿故曰也室羅摩拏理迦翻為勤䇿女釋義同上或局尼三如洗淨過分戒唯結僧二如蘭若六夜及四提舍尼或獨結尼如尼本法經宿或專二具如減年受戒等或專比丘輒教等也犯有六義理須思擇此律初三有文者初即可知第三失威儀者如眾學中以故作故犯非威儀是也然彼但言失威儀吉不簡不故作應不同彼也尊也為命難故開不以梵行難故開以此即是梵行難故下三篇事輕故者理亦須簡諸性罪戒如煞畜等不以二難開使煞畜餘類准知餘三別開事義俱局者或可睡眠無所覺知不受樂一切無有婬意者摩觸等戒亦有開義要須於三時中不憶識是比丘者此准十誦五十九為言也彼云若自知我是比丘作婬得夷若不自知不犯若准此律片似不同此下文言如從高墜下攬小草木即應片有憶識癡心多了心少即應開也次明盜戒非盜之濫者敬云初句是不與取然而非盜又攝損財義不盡者第二句非不與取然是損他是盜所攝於闕緣義不便者若立緣言有主有主想闕緣得云有主物作無主想若立緣言知有主闕緣不得言知無主以其容實有主故故不便也然此具緣有餘共評加重物想及與方便七緣者好今詳若重物作輕物想雖當盜時不成夷罪入手之後知是重物即須還主若必不還即成夷罪有此不定章中不言也興方便者或如寄物先在箱筐後主來索率爾不還即無方便猶不定故故亦除之闕緣准此亦應思釋具七方便者𨷂通緣闕緣闕緣方便若別緣中闕初緣者即境差方便若闕第二即想疑方便若闕第五即餘三方便一切諸戒皆准此知下別不更論科文悉同可以比知者應比前戒中科文義云從初至正法久住辨結戒相以明行法酬身子結戒請第二欲說已下辨說戒相以明教法傳通之益酬身子說戒請就前文三初至呵責正明比丘壞略制緣第二告諸比丘已下制廣補略第三集十句下招生十利第二大段酬說戒請於中有二初明戒本說之儀則第二比丘義已下廣釋戒本犯等四句於中復二初至沙彌尼突吉羅明成犯相次不犯相前中復二初大僧犯相第二比丘尼已下四眾犯相已下諸戒皆准此知五分第一作箜篌音僧祇第二作完成瓦屋種種尅𦘕安施戶牖唯除戶扉戶籥衣架餘者一時燒成見論第八唯戶扉是木以赤正汁塗外燒之孰已色赤打之鳴喚狀如鈴聲風吹窻牖猶如音樂文云慈愍眾生者見論第八掘土蹹泥火燒多諸眾生因此死故無損物之咎者見論第八云法師曰檀尼迦用物作屋如來何故而打破答曰此屋不淨是外道法又云若比丘多聞知律者見餘比丘所用不淨法即取打破無罪物主不得作是言大德已破我物應還我直論中廣明作應法物等不錄之論雖說此亦須知時若准祇律亦愍比丘故破其屋祇第二云是達尼迦羅得出家猶故不能猒本所習工巧伎術猶未能捨而復焚燒傷煞眾生又此瓦屋寒則大寒熱則大熱能壞人眼令人多病有是諸患汝等當壞此屋莫令當來諸比丘習此屋法十云摩竭國韋提希子等者彼律第一從守材人索材故之言也文四可知者初王斷應死二覆念不應首云貴財薄道招譏不輕王法之體深非所宜設王自念不殺沙門三呵以放去四不平王意則眾生心伏等者並多論第二意也為遮惡比丘故兩言之論第九文也隨國所用八種錢者資寶戒云金銀鐵銅鑞錫木膠也今詳西方市易本用貝珠或名貝齒大如中指即小螺皷也彼出南方大損生命貝齒二十名一迦枳你四迦枳你成一磨灑也然垂磨灑更成總數許似此方垂百成貫謂二十磨灑為一迦利沙波拏即一千六百貝齒也若盜一迦利沙波拏四分之一佛判成夷即五磨灑合有四百貝齒以成重罪舊言五錢其義失也此據佛在制時國法故見論第八云爾時王舍城二十摩娑迦成一迦利沙槃分迦利沙槃為四分一分是五摩沙迦已上論文若據現今西方國治十六磨沙為一迦利沙波拏若盜四分之一即四磨沙而得夷羅又且八十貝齒為一磨灑此數揩定古今無異若迦利沙波拏隨王改法增減無定儻若十二磨沙為一迦利沙波拏若四分之一即盜三磨沙而得重罪或更增減隨應准知故伽論第一云問頗有取三錢犯夷耶答有若迦利仙直十二錢問頗有取十錢或取五錢犯波羅夷耶答有若迦梨仙直四十錢或直二十錢已上論文西方諸師今時斷事皆亦同爾又議用錢亦准貝齒以論其直金銀疋帛咸准成科西方且然若依此地古來翻譯多翻為錢深乖本意且如僧祇第三云十九故錢為一罽利沙槃此即分部之後隨王減數十九磨沙而成總數翻之為錢譯者之過非謂或說偷蘭以為四重亦非四錢三角也十誦五十一云云何是五錢答若一銅錢直十六小銅錢者是已上律文蓋是翻譯之家准吳主孫權嘉禾五年鑄大銅錢一當五百又至赤烏元年鑄大銅錢一以當千至赤烏九年並廢之由此譯家准此義翻故當謬矣今詳即是十六磨沙為一迦利沙波拏非謂十六小錢當一銅錢也故知十誦即是四分之一者四磨沙成重也古來共斷言大錢滿五小錢八十謬之甚也然准此地用錢市易錢替貝齒即應四百成夷古來乃以錢替磨沙五錢成重行事務急也行雖務急枉斷還損故不然也又准多論第二云盜至五錢者或言金錢或言銀錢或言銅錢或言鑯錢無有定也盜至五錢得夷者閻浮提現有佛處及二天下唯王舍國法以五錢為限又言佛依王舍國法結戒故至五錢如是名隨國法依而制罪觀律師意欲以後義為定而難不欲廣已上第二卷文第三卷云王舍國法五錢已上入重罪中佛依此法至五得夷如是閻浮有佛法處限五得罪若國不用錢准五錢成罪律師云更有一義秘不欲廣已上論文遍觀此論乃有譯時詳議之語寫入論文此所引文即其事也又如此論第三下文云若國禁物持出王界入死罪中比丘持出律師初言得重後更問之似不入重然違王教突吉羅已上論文述曰律師者執梵本人也後更問之者即此方人問也觀此等文咸是譯時平章語也前文云各隨國法律師意以為定者意說隨國所用之錢滿五成重又言難不欲廣及云秘不欲廣者即是磨沙之義難可會通也今三藏別撰一卷律攝注云又亦不可取其死罪以斷神州世尊不遣依方國法河圖云崐崘山東南方五千里號曰神州亦稱赤縣又云南海用金當此方一兩名一迦利沙波拏分為十六分名十六磨沙盜四磨沙南海斷重北方都貨羅國十箇銀錢名劫婆吒即當此方一兩彼方律師以劫婆吒替迦利沙婆拏四中盜一即判成重今准神州將貫作總四中之一即二百五十以結夷𠎝今詳南海北方雖有此斷彼方何必即契佛心又貫成總非佛誠言百與萬等何非是總總既不定四一何成三藏初來又作一斷西方米價非貴非賤直五磨沙此方米價非貴非賤直二十五即二十五以判夷𠎝數年之後三藏自改以無總別之名故今復為詳彼方此國貴賤難知中庸之價理亦難定且如蒲州乾米中價七文將至洛陽中價十五江南粟子升三十文若處中庸義雖以等至在西京中價百半兩論實理錢數懸殊故難取定也今詳佛意欲使通行以盜難知故准俗制緣起所顯論有明文世尊不遣依方國法未知何據言准俗者佛制四戒輕重必同三俗入科例知成盜謂世共稱為大過者制之為重未必要須至死成夷故律文云若煞若縛若駈出等蓋隨方之意也戒本中若捉是王祖治法等者義准言也准祇第三瓶沙先祖時治罪人法本有作賊者以手拍頭以為嚴教賊大慚愧與死無異後更不作至祖治賊以灰圍之須臾去父王治賊駈令出城瓶沙王法駈令出國時有一賊七反駈出猶故來還劫煞村城爾時有人捉送與王具白其事王告大臣以罪治之臣言大王莫付臣下何有捨王臣下專輙王言將去截其小指有司急截恐王有悔時王即自試嚙指有痛殊難忍勑遣莫截臣言已截王甚愁悔即自念言我今便為法王之末非法王始何有人王傷截人指瓶沙嚴駕往白世尊我之曾祖唯有拍頭及至我身傷截人體自惟無道愧懼實深世尊為王示教利喜禮已而去佛告比丘瓶沙過去亦曾畏罪過去為王號曰名稱有人作賊縛送與王王便思惟自昔以來始有一愚癡人是愚癡人不能滿千我便命終即將愚人付一大臣我須千愚用作大會數滿白我臣持愚人繫在一處王念愚人將無飢死告臣曰此人莫令羸瘦合著我無憂園中五欲娛樂復有愚人聞王此教便自送身詣臣所言我是愚人如是不久數滿白王聞甚憂勑與愚人恣其財寶復勑還家供養父母莫復作賊愚人聞教歡喜奉行王以國位授與太子出家學道而說偈言本求千愚人作會謂難得如何未幾時千數忽已滿惡法日夜增大會於是止欲離世惡人宜時當出家述曰既准祇文拍頭等異故知此律言提明是祖王乃至廣說祇律雖無闍王煞法闍王嚴惡煞義自成五分第一亦云佛問比丘阿闍世王人盜齊幾便得死罪比丘白佛五錢已上便與死罪十誦第一鼻奈耶第一皆是闍王南山律師撰戒本云若捉若縛若駈出國若煞崇云迴喚聖言事不輕爾所以爾者以制時戒瓶沙身在子未登位如何懸知後三治法牒入戒本今詳佛在闍王已崩隨結隨牒竟有何違崇又云若捉與結若是先王王既久崩法不施行如何今復牒入戒本今詳此是徵責大師先王既崩僧祇何用說過去等今牒意隨王治異以制夷𠎝故也廣如破迷記中釋之見論十七云有市故名聚落界無市名村界第八云聚落者一家一屋如摩羅村此是一屋亦名聚落五分第一云若城塹籬柵周迴圍遶三由旬乃至一屋是名聚落六蘭若者一盜戒蘭若如此戒村外空地二頭陀蘭若如謗戒云阿練若阿練若共同三攝衣蘭若如離衣戒八樹護衣四六夜蘭若如六夜離衣戒五安坐蘭若女不安座受食戒此第四第五律中並云去村五百弓六攝僧蘭若依十誦律拘盧舍見論八槃陀羅等說戒犍度辨也十誦第一有四主彼律廣釋不能錄然彼律中但有三句第一句己物自護或使人護是也第二句如田土穀無人守護有我所心第三句者如知事人守僧物等此句律中無第四句彼律意云如比丘失衣有知識餘處見即便奪取失衣比丘其衣已失故無我心賊復奪彼亦無我心衣主及賊既並不守然奪得者守護此衣也問諸律通論立二主望本主結其義容成若望護主違婆沙論百一十三云問若盜如來兜堵婆物於誰處得根本業道有說亦於國王處得有說於施主處得有說於守護人處得有說於能護彼天龍藥叉非人處得如是說者於佛處得所以者何如世尊言阿難當知若我住世有於我所恭敬供養乃涅槃後乃至千歲於我駄都此謂堅實如來體骨舍利之異名也如芥子許恭敬供養我說若住平等之心感異熟果平等平等由此言故世尊滅度雖經千歲一切世間恭敬供養佛皆攝受述曰論中正義既不許於護主邊結何非違律答經論多說業道之相戒律結罪差互不同故成論第十二云得罪福異結戒法異古來多引經斷律不應不思也且大意者身語意業皆成業道戒律獨意是污非犯身語二中業道有犯戒律必犯論其輕重未必稱業如煞畜等若戒律犯不必業道如煞草等今准婆沙但判業道望佛成業其義已成儻全無護應無業道今律中意欲判夷等儻若了知此物有護若其盜取護人酬還既損護人寧容不犯故不違論也或若有護始終迷心決謂無護於此心中盜塔物者准論即於佛邊得罪後儻了知護主已位應還護主可免夷罪故斷事應審問心也比丘寄鉢四十七文也又一比丘寄居士物亦爾者彼十律第六十優波問中云一比丘衣鉢寄居士居士受是比丘往索答言失比丘言汝自失我不失汝自償白佛佛言好看失不應償賈客寄比丘亦爾見論第九廣明應不償應之相第二別解有主者前門總解不過正護此門就前正護別開故云別解章中略辨人及三寶四主之異今更委說未為四門開為六主又復古來五義正護雜論今論正主斷之令定其損護主一准正知無勞煩雜且四門者一者人主二非人主三畜生主四三寶主開為六主者三寶分三故六也且第一門辨人主者於中分三一者直損正主易知二者賊為物主物人賊手已作捨心賊即是主如下奪賊得不得門疏中略辨迴彼義門於此中解亦為大善三者北方人物十誦五十一云問取拘耶尼人物齊幾答計彼物直五錢夷弗于逮亦爾問單越齊幾答彼國人無我無所屬故無罪第二非人物者此律無文多五十蘭善見無犯多論第三取非人五錢已上重蘭四錢輕蘭天與畜生盡名非人述曰准此畜生蓋能變畜也五分云非人物不與取比丘比丘尼蘭餘眾吉十誦第一云取非人重物蘭又云取非輕物吉又五十七曰阿難取天神像衣蘭善見第十云餓鬼物者四天王為初亦入其中若比丘取諸鬼神物無罪若天帝云店販賣比丘天眼觀見而取帝釋恡惜還不無罪以是應物故若世間人以物繫樹無守護者無罪南山云謂都無鬼神人等一切守護也今詳部別不須會之且依多論等上來多見天並攝在非人位中第三畜生主者五十多吉鼻奈耶夷善見無罪五分第一云畜生物不與取皆吉皆者五眾也十誦五十七取虎殘吉由不斷望故師子殘可取以斷望故已上律文多論第二云一切鳥獸殘取吉師子殘無罪此律條部文云於鼠穴中得藥醉帛佛言畜生無用無犯而不應受如是物蓋不應者吉也鼻奈耶第一云師子竹園外煞鹿而食飲血而眠餘殘若比丘取食乃至下直五錢而食為成棄損不受虎如是棄損者夷名棄也不受者僧不共住也盜餘鳥獸物亦爾不錄善見第十云畜生物者迦樓羅龍王為初若其化作人形如帝釋所說無異若師子若虎煞鹿而食不得奪取恐煞比丘若食竟比丘駈去然後取食無罪無罪者亦是部別也上來三趣若作護主其有損者正主無異隨應准知第四三寶主者章中三門一辨盜二互用三出貸且辨盜者謂正於三寶結犯復開三門一者正盜結犯二者辨營事人三者處分受用言正盜者三寶即三第一佛物祇夷損正十據護夷涅槃雖蘭義准應吉多盜像蘭奈耶亦棄如章列祇第三云摩摩帝用佛物重此據佛在示同人趣南州所攝故同人夷若言無我應同北方亦應許偷羅漢等物法相便亂理不應然無我據方不得別判且如北方衣食自然豈同三方功力方得佛既受施示攝財物義同功力何類北方故盜成重章中復別十誦五十一有護計直滿夷減蘭五十七亦云有一比丘盜佛圖物佛言有守護者計直具足夷然章云不定屬佛者意說由其護主處分擬與佛用故云不定若定屬佛即同祇夷何須據護既言據護故言不定此未必然但文且據損護非正如論損正還同祇判若涅槃後定無夷罪以佛在日有人主義滅後但有福田攝受無人主義佛攝受者如前已引婆沙證也然南山云正望佛物無其盜罪無我所故但得蘭罪同非人物今詳望佛無罪違背婆沙言同非人自乖無我南山又引涅槃第七若有長者造立佛寺以諸華鬘用供養佛有比丘見華貫中縷不問輙取犯偷蘭遮若知不知亦如是犯已上經文崇亦引此證佛物蘭此義不然經中蘭罪與律不同故彼經云若有比丘犯突吉羅忉利天上日月歲數八百萬歲墮地獄中何況故犯偷蘭遮罪此大乘比丘犯蘭不應親近何等名為大乘經中偷蘭遮罪若有長者造立佛等乃至廣說既言犯吉忉利天上歲數如前目連問經即不同此又經說言何況犯蘭故知蘭罪歲數更多亦不同律又言何等名為大乘蘭罪故知非律相也又言若知不知亦如是犯豈容律判不知成犯若而正盜佛邊當言何罪答且准多論盜像得蘭今盜佛物理應輕罪且如多論第二云若盜佛像為供養故無罪若為得錢轉賣得錢蘭盜經不問供養不供計錢得罪若盜舍利蘭損重讀習者疏家解釋非論文也十誦五十一亦云問若盜佛舍利何罪答蘭罪若尊敬心作是念佛亦我師清淨心取無罪已上律文今詳此文言盜像等定無護主若不爾者縱取供養損他護主寧容無罪既是無主由賣得蘭此蘭定望佛邊以結由佛攝受像舍利等利益眾生故造像經及報恩經第三說優填造像佛摩像頂讚益未來今由無慚賣而得直故得蘭罪五百問比丘賣佛像有何罪答同賣父母問無主可然有護何罪答像舍利等不可論價但可望彼造作之功方求之費計直而結也上來且辨盜像等蘭無護佛物理不同此謂佛像等佛本攝受末代師輕心轉賣故得蘭罪論其佛物佛但攝受為供具等設若盜取其過稍輕佛雖無損不應故吉然諸不應是律相故見論第九云突吉羅者不用佛語突者惡吉羅者作惡作義也涅槃華縷異相如前故非成證然鼻奈耶宗途異此彼律第一云若佛塔寺取者為成棄損不受聲聞塔亦爾謂檀越施斷彼施福為成棄損不受已上律文此即異宗之義也婆沙不許施福邊斷理實施已檀越非主塔邊豈夷又不應言此是望護護即損護文中何用論其斷福第二法物者章引修部文云時有比丘取他經作是念佛語無價應計紙直彼疑佛言取五錢夷多論第二盜經不問供養不供養計錢犯罪已如前引此據護主如章已論儻若無護理應損正應言亦望佛邊結罪以法及物三世諸佛同所攝受儻盜亦吉上來佛法二物雖吉業報極重故涅槃經若知不知亦如是犯不知尚犯良由極重第三僧物南山分四一者常住常住謂眾僧廚庫房舍眾具僕畜園田華菓林樹體通十方定不可分故盜滿得夷故祇律云僧物者縱一切比丘僧集亦不得分今詳僧物諸部兩斷然章中引下文惡心蘭者即不入此兩斷之中此下文中碍僧受用非盜攝故五分二十七亦云不可護不可責不可分云何護僧住處不與後來比丘若護若分皆偷蘭遮十律三十四羯磨與四比丘不成分突吉羅已上律文准此等文並是暫時遮是故不入兩例之中第一例者章引祇第三僧物佛用佛言得夷五分二十八亦云有比丘盜心貿僧好物佛言直五錢犯准此兩文據損正主此物乃是十方共畜義同一主一一比丘各各遍攝十方僧物以彼所有同我有故展轉相望無非主是其猶一家同居有物父攝一家一切財物子兄弟各皆遍攝僧物亦爾同一家有故但一五即得夷𠎝第二例者如章所引十誦僧物五錢重蘭四錢輕蘭多論第三亦云若盜僧物五錢已上重蘭四錢已上輕蘭而報甚重已上論文章云隨機之教不得知通今詳多論意同善見故善見第九云若房舍施與四方僧若比丘欲諍取此房不成諍取無讁主故不犯重罪此論前文云諍園得勝園主作失想比丘波羅夷諍即盜也又第十云盜戒有五事謂五緣是若一事二事不犯重若具二事蘭吉准此文意由無的主是闕緣蘭然崇判云多論直言僧物不定色類或是十方現前者非也見論十二云復有比丘取僧物如己物無異行用與人得蘭若以偷心取者隨直多少結罪准此見論望無的主判無重罪復望損僧云計錢犯故見論中即有兩斷此即證成二例義也上來二例望義不同據理推覈祇五為勝第二十方常住如僧熟食也但使及時悉皆得分故名十方不許將至異界而食名為常言異界者今詳謂異住處也若一伽藍縱結多界不由此界名為異界若食差之定無所犯此住處僧為僧經營將食分去亦應無爽下當更辨若偷此食古來共評望十方僧皆各有分必不滿五得多蘭罪今詳不然分食雖然唯得一分望為食主寶得遮為盜此食時如侵一主但計滿五即夷𠎝猶如一家共營一食分時雖復人得一分未分之間為主理同即盜此食滿五即犯僧食同爾若許十方僧皆有分必不滿五者此言何據若不別分為眾多分即不應說不滿之言若許別分云不滿者且如有人准盜一食其所屬僧既如塵筭分塵等分人無一毫此中如何論其不滿猶如唯識論中於麤色相漸次除折至不可折名曰極微若更折之便似空現今此亦爾更何所直世尊但言下至草葉是有所直而不許盜若更分之便無所直如何結蘭問若未分前各遍為主應盜一五望多主故亦得多夷答由物同攝義同一主他有自有無差別故但唯一罪問若遍為主應得獨用答但使依時如法受用實無所遮何以然者十方凡聖於同梵行同許受用故得無罪由此善通諸犯戒者名盜僧食十方凡聖不與用故非時打鐘及全不打益名盜食計直成𠎝明相前打鐘縱待天明義同不打非今日故亦可但使打鐘表無私曲待明而食亦是無𠍴由此見論十五云若比丘無戒依僧次受施飲食是名盜用母論第二云比丘受人施不如法為施所墮乃至若無三塗受報此身即腹壞食出所著衣服即應離身多論第七若僧祇食時應作四種相一打楗椎二吹貝三打皷四唱令此四種相使有常限不得或時打楗椎或皷等令事相亂不作四相而食僧食名為盜食見論等十若寺舍空癈無人比丘來去見有菓樹應打楗槌若無楗槌下至三拍手然後取食無罪又云有客比丘來入寺見飲食及菓以盜心而食隨直多少結罪第三現前現前者謂有施主以物施僧不假作法而分者也此類大多略論三例一者已捨與僧猶屬本主人與爾許少即更添二者已捨與僧未定屬僧捨爾許物未定何眾三者已捨與僧已定屬僧用爾許物定與此眾即是律云僧物為僧故與僧立章也僧物者已許僧初物為僧者為僧故作未許僧次物已與僧者已許僧已捨與僧後物此三僧物復由施心以分現前常住之別且如初物寺別爾許少則更添豈不通常住也然今且辨現前義也此釋雖與章疏不同今詳其致理應如是此中後物若已作分計僧多少各望結之問如有千人施主但以十錢布施若分千分應無所直盜得何罪答未分之前義同一主滿五成夷僧若處分從上座行隨僧處分望人別結也其第二物既無定屬盜應得吉若有主想即應結蘭其最初望施主結以若不足施主添故第四十方現前謂亡五眾輕物及非時僧得物也及施之人皆悉得分名曰十方作法受分名為現前善生第六云若取命過比丘財物誰邊得罪若羯磨已從羯磨僧得若未羯磨從十方僧得若臨終時隨所與處因之得罪婆沙百一十三亦同也俱舍十六云若有盜取諸逈轉物已作羯磨於界內僧若羯磨未成普於一切佛弟子得已上論文僧施一人一人還僧名為迴轉分竟易知若未分前古來共許得多蘭罪故章中引戒場分衣等既不成分望十方結蘭崇釋亦爾今詳經論望十方結十方法謂一一人各為物主是以望之非十方計分多分以結多蘭也難釋同前如應思擇上來四例崇但分兩一者但立十方常住即攝初二除其第三以是別屬非是眾物此義不然亦是眾物二者十方現前即是第四今詳南山分為四例其義無違有別相故若論斷理恐不可已如前辨第二辨營事人者大集二十八云佛言有二種人堪作僧事何等為二一者具八解脫阿羅漢人二者須陀洹等三果人堪知僧事供養眾僧諸餘比丘戒不具足心不平等不令是人為僧知事寶梁上卷營事比丘品云佛告迦葉我聽二人得營眾事一者能淨持戒二者畏於後世喻若金剛復有二種一者識知業報二者有諸慚愧及以悔心後有二種一者阿羅漢二者能脩八背捨如是二人我聽營事自無創疣何以故護他人意此事難故又云若有比丘善持戒律善毗尼義營事比丘應往其所數數問義云何營事不令得罪自無所損不害於他持律比丘應觀其心隨所營事而為說法所謂是應作是不應作營事比丘於律人一心生信禮敬供養第三處分受用者三第一瞻待俗侶二者開比丘用三者與尼食得不初瞻待俗侶者如章問盜損可爾乃至引祇第三若損若益事十日王來索好食已下並第三十四文也多論益不應與損即應與故彼第四卷汙家戒中廣明應不且略引者彼云若以少物贈遣白衣縱使起七寶塔種種莊嚴不如靜坐清淨持戒即是供養如來真實法身立精舍如祇桓又四事供養滿閻浮聖眾亦不如靜坐等若其強力欲破塔像贈遣得全當賣塔地華花若塔有錢若餘緣得物隨宜消息已上論文往僧准之大集四十二云但是眾僧所食之物不得輙與一切俗人善見十五云淨人番上等五百問云問白衣投比丘為道未度得食僧食不答曰眾聖得不白犯墮又母論第二若父母貧苦應先受三歸五戒十善然後施與若不貧雖受三歸五戒不中施與多論第四父母是福田則聽供養若僧祇人為僧祇故此則應與一切孤窮乞匃憐愍故應與一切外道常於佛法作大怨敵伺求長短是亦應與五分二十畢陵伽婆蹉父母貧窮欲以衣供養而不敢與白佛佛告諸比丘若人百年之中右肩擔父左肩擔母於上大小便利極世珍奇衣食供養不能報須臾之恩從今聽比丘盡心壽供養父母若不供養得重罪述曰亦應分別自物可知第二門者五百問云問比丘為僧乞道路己身得僧食不答先白僧聽得若去時不白還白聽亦得若不聽還償不償犯棄下文一住處眾多癡比丘集在一處優婆離至都不瞻視優婆離以是即去比丘白佛佛言若有三藏比丘來當往半由旬迎逆承事安處洗浴給其所須飲食若不如法治他皆傳云准知事人衣是十方現前物亦有云用常住物如知事人與福饒類今詳後解亦好見論第九若比丘若於讀誦教化說法能得利供眾僧眾僧不得差知僧事有房舍衣鉢應先以好者與之飲食菓木得加分與述曰要實有德方可受供故多論第三云若學不根本如學問法者取學問臘則不清淨又章引十誦三十四病人索藥事又五分二十一有比丘有物攝四方僧有僧加梨佛言聽貿若價多少應互倍若貧無物而必是少欲知足者亦聽與之餘衣亦爾已上律文下文與營事房祇三十二僧地種菓菜等下當辨之第三與尼食者多論第七與尼衣戒云乃至一餅一菓皆突吉羅除打犍稚眾中次第與食述曰既打楗椎明是僧食又應暫時非是常與也第二門章云互用者今開為四一者受施差別二者得物處異三者通用通畜共畜等相四者正明互用初門復三一者受施問心二者施主差別三者施物不同言問心者謂應審施主口語恐彼不解浪標施物故十誦第六十云祇桓中四方國主不知法人皆來大會有布施者比丘呪願時讚佛法僧舍利目連那律金毗羅如是三寶無數無量阿僧祇是中或有持佛名持法名乃至持阿僧祇名大會既散還田舍聚落餘時諸比丘出諸國乞有持佛名字者言佛來與持法名者言法來與乃至持阿僧祇言僧祇來與比丘不受白佛佛言是邊國人不知為是比丘故與食而名與佛法等自在應受已上律文多論第五云凡為施法應令心定口定施福既深又易分別若施佛者定言與佛若施法者應好分別若施法寶口必令定若施經書口亦令定若定施法師讀誦經人口亦使定若施眾僧亦有三種若僧祇臘若自恣臘若面門臘於此三種應好分別已上論文十誦三十七云佛言與物時使一比丘在彼立者知別是塔物四方僧物食物應分物第二施主差別者汎施三寶無濫不論或有濫相恐虧違者略論六種一者還人施主十誦六十守還人與比丘衣比丘不取作是念是中誰是檀越白佛佛言但隨施者受此律下文守視人與比丘佉闍尼比丘念言此非彼食白佛佛言此即是檀越聽洗手受食述曰應任其施不令從乞若從乞者墮在教盜若必迷心不知非主理亦不遮二者賊為施主伽論第四云有諸賊施比丘疑故敢取乃至佛言作施主意取此律下文賊施比丘佉闍尼亦爾十誦六十云諸賊破城邑已後宮力來圍是賊怖畏急故持物施諸比丘施已便去諸白衣見物從比丘索白佛佛言莫從賊取物若賊主與當取取已染壞色著若壞色已主故索者當還三者因為施主祇三十槃云若有犯官事未被收錄又未藉其財爾時寄者得取若王收攝又藉其財應語言世尊制戒不得受謂受寄也若言我與塔與僧施汝得取得已不得覆上而去當露持去若有問者當言塔物僧物我物若聽去者不聽去者當還四者狂人施主伽論第七云狂人邊得取衣不或得或不得云何得不知父母所在兄弟姉妹自持物施比丘得取云何不得取父母等可知不自手與不可取十律五十四亦爾五者非人施主五分第八云釋提桓因作是念今大迦葉從貧家乞我當方便使我食即於迦葉也食之次作一貧織師在機上織迦葉從乞即取鉢盛百味飲食與之迦葉得已觀是帝釋白佛佛言聽諸比丘天邊受食又云世尊行至曠野鬼村鬼神設供佛聽比丘從鬼受食六者畜生施主五分第八有一獼猴從樹上下取佛鉢欲持去比丘不聽佛告比丘聽獼猴取即持鉢到一樹上取滿鉢蜜上佛佛為之受佛持此蜜與諸比丘告言聽食十誦五十七一比丘在房中臥夜鼠持食來著牀下比丘起添手從淨人受食諸比丘言長老得夷佛語比丘是鼠前世是比丘父愛念子故見便心愛持食牀下比丘無罪上來三趣儻若隨施三寶福田皆應量直可受應受或有立掌護損失主等非主義故此不立也第三施物不同者大約而論略有四種一者三寶各有世俗勝義多論第五云問曰佛在世時何以但取一人分滅後取三寶一分答曰佛在世時供養色身是故但取一分滅後供養法身法身功德勝於僧寶是以於三中取一分也佛在施主言供養佛色身受用若言供養佛寶則色身不得受用應著爪髮塔中施心供養法身法身長在故若施法寶應懸著塔中不得作經不得與說法誦經人若直言施法分作二分一分與經一分與讀誦經人不與法寶又施眾僧復有二種一施僧寶二但施僧若施僧寶凡夫僧聖人僧不得取分以施僧寶故若施眾僧者聖僧凡夫僧俱取分以言無當故若言施三寶應分三分一分與佛寶一分與法寶一分與僧寶眾僧不得取此物應還付施主若無施主應著塔中供養第一義諦僧述曰論文雖言三寶之物是不可取未必即以寶言簡別謂應問本施主之心若言施與勝義三寶是不可取若不別標勝義之意不分可取如論所判故婆沙第三十云問諸施法物誰應受之答施世俗法物說法師應受或應以此書寫正法施勝義法物應勤加守護猶如守護窣堵波物二者遠方寄施即多論云如秦地寄物來與法豐僧祇若自恣若面門隨語分處述曰法豐盖西方寺名也僧祗即是四方僧物常住是也自恣者謂時僧得物時自恣分論且言此儻非時得即非時分也面門者即十方現前僧食是也若直言與法豐僧應分作三分一分與僧祗一分與自恣臘即自恣時分一分與面門隨取飲食若法豐無僧乃至有一沙彌沙彌應分作三分僧祇面門自恣時取面門臘隨取食若取自恣臘時若食面門臘時應打揵椎若有比丘共食共分無者自食自取如法清淨若無沙彌應入近住僧若無近住僧應入近住尼僧尼僧應好思量若法豐僧有還理者應舉一處還則與僧若無還期應分三分如前受用若遠方送物與尼僧如前僧法無異也述曰波演者梵言波演那此云周廓舍院也論中益謂是空住處無常住物若遠處以罽賓佛法熾盜送物供養者此物正應與佛以法不離佛僧故應分二分一分入佛一分入僧罽賓有二部一薩婆多二曇無德隨意供養無過若送物與五法僧若無五法僧即入五法尼若無尼僧若始終永無五法人者此五法物應分三分僧祇自恣面門於中二種得入僧祇用不得分也面門還置本處不得取也述曰五法者盖天授部受邪五法也此方儻有三階物准此斷之三者經律論中有招提僧物及僧鬘物古來相承不了其相南山云中阿含經阿難受別房用施招提僧菴婆羅女以園施佛為首及招提僧文中不了准此房宇等是招提僧物華菓等是僧鬘物唐三藏云招提者訛誤也正言拓鬪提奢此云四方譯者去鬪去奢招拓二聲復相濫故有斯誤也又准五分第十捉遺寶戒毗舍法母所遺寶持施四方僧白舍利弗可以作招提僧堂佛言聽受此即四方僧堂也問若言招提即是四方僧物者何故寶梁上卷云常住僧物不與招提僧物雜以其常住即四方故答先來有言寶梁經篤而實非篤也然言招提先來傳釋謂世通路置一院舍看待客僧名招提者謂據招引提接之義非有典據今應義准十誦三十七云四種物塔物四方僧物食物應分物得錯互用不佛言不得佛語憂婆離塔物不得與四方僧不得作食不得分四方僧物不得作三食物亦不得作餘三僧應分物糓米豈非常住良由常住雖則是通而本施心欲令作房不欲令食故即互用者不得罪也見論十云若檀越為作房舍眾僧迴食得蘭應還直又云若檀越布施重物作房舍若飢儉時眾僧飲食難得或病或值國土荒亂比丘捨寺餘方寺舍菓樹無人主領若如此者重物得作食用為護住處故又寺中房舍多無人脩治敗壞應留好者餘麤敗得壞賣為食用為護住處故已上律論准上來言四方僧物與食物別食物即當寶梁常住四方即當寶梁招提故知四方僧物之中亦遮互用也如此解釋不違五分施四方僧作招提堂南山所釋局言房宇亦應太狹以除食物之外永久畜者皆四方故也人言賣房許作僧食非因荒亂亦招盜罪若如先來相釋云招引提接其物乃當薩多論波演物也僧鬘物者供養僧華鬘也故十誦三十九佛在舍衛國有人施僧華鬘諸比丘不受不知用華鬘作何物佛言聽受應以針釘著壁上房舍得香施者得福今詳一切僧供養具並此收也四者此方施聖僧物崇云盜聖僧錢必得重罪以上座身現在自為物主若盜餘般圓寂者財非親局主但獲業罪今詳西方本無此施教𨷂明文難為裁斷又准崇斷理復不然本施聖僧非專上座又施雖捨聖未必來以錢並是不淨物故若當受者自付檀越或須說淨荒客冥攝得了耶又彼物相但施聖僧聖僧誰當即來專攝今詳此物猶無定主聖未親受欲定望誰而結罪也若當盜者並得吉羅若有主想即得蘭吉業甚深重由於聖境起偷心故又此施物施心無當十方聖眾數等塵沙既未定屬一箇聖僧可買供具供養聖僧或復起立聖僧塔廟於聖僧境福用皆通不同昔來唯在僧座又不許以錦綺等物為聖僧座者恐不然也又此施法傳來尚矣不得於今令其頓廢故受施時應告施主云此物應為聖僧起塔或造形像種種供具供養聖僧檀越云何答言任意一切無過又崇判云般圓寂者盜得業報今詳雖般圓寂非但業報於律亦違諸所不應皆吉羅故前勝義物盜並吉羅由勝義性無攝物義然此吉羅極深極重波羅夷罪猶不可比下雜法中舍利目連檀越起塔種種供養佛皆聽詳供養塔食若沙彌若優婆塞若經營作者應食然餘食供具理應不得迴易餘用第二得物處異者略有四例一者增祇十八若故壞僧坊欲更治掘地起基得寶藏者若淨人不可信者當應白王王言此物應入我我今施比丘作功德即名施主若已用半王言若用者止在者送來比丘應送在者還王若言何以用我物盡送來比丘已用物者應用僧物還若僧無物應乞物還若言已用者止功德屬我即名彼用若治故塔得金銀寶藏若淨人不可信者當白王淨人可信者得取停三年已應用作塔事種種用若王家覺問比丘得寶藏不應答言得若已用者應答言得已用作此塔王言已作者止功德屬我用事索半准前應知若言汝不知地中答言得已用作此塔王言已作者止功德屬我用半索半准前應知寶藏應屬我耶盡還我耶盡還我來比丘爾時應塔物還若塔無物應乞還若王問言佛法戒律中云何比丘應答言佛法中若塔地得物即作塔用若僧地得物即作僧用若從佛法佛用者無罪若寶藏上有䥫蒙姓名若主問言見姓名不答言見已用作塔進不同前王法上來律文但論塔僧義唯或若說法堂中於法處得即緣法用理亦無失或於地上施主捨去既無問處亦准前判其遺忘物如祇律云諸人若忘衣及嚴身具種種諸物比丘忘衣鉢等物見者當取應唱令問此是誰物若是主者與若無識者應懸柱上顯令人見若有人言此是我物言相應者應與若無識者停至三月已若園中得即作塔用僧園中得四方僧用若貴寶物不得露現得寶比丘應審諦數看有何相貌然後歷舉若人來問言不相應者應言此僧伽藍廣大汝可廣求若相應者不得於一人前與應集眾多人教受三歸與之乃至若無人來至三年如上隨所得處當界用之若入聚落見他遺物不應取若有人取與比丘得受與者即是施主故無罪上來諸物教理判定儻若恣者即令三寶應得不得隨應損三而得罪也然伏藏物諸宗不同故婆沙百一十三云問若得伏藏作盜想而自明者彼於誰處得根本業道答於王處得大地所有皆屬王故復有說者於其田宅所屬處得所以者何彼於此中被稅利故如是說者於王處得大地所有王為主故其田宅主唯稅地利非伏藏利成實不許故彼第十二十不善業道品云問曰有人言伏藏屬王若取此物則於王處得罪是事云何答不論地中物但地上物應屬王所以者何給孤獨等聖人亦取此物故知無罪又若自然得物不名劫盜述曰律論雖殊理據王教王若無教隨得處王教若攝理同婆沙盜必計直故下二十六章中初章云地中所須之物屬主者等二者或有寺中於池井上有人施物今三藏云作非時漿眾僧共飲今詳儻或贖水水無所直同三藏判儻貴水處有所直者隨本主用或有俗人觀樹華等輙華樹下而施物者隨三寶界當分用之同祇無爽若樹有神為神故施是非人物三者或於寺中有諸神像俗人乞福所施之物即屬非人其事不可寺中縱作教未見開作墮邪命亦有人言於三寶處若有所須擲卜卦乞得便聽用今詳三寶不應在此邪命求物不取者好四者竪牌提名所乞得物以牌名定亦莫佛前為僧竪牌令施者誤亦招互罪第三通用等相者言通用者如有施物隨於三寶可用處用縱偏用盡但使如法並悉無𠎝此不令分違本施故又此但於福處說通若設酒肉雖為三寶有所緣託或將買杖以打淨人此損施福還招盜過若盜此物由於三寶是通屬故理應得蘭言通畜者如十方常住十方現前未分之前及常住常住等物展轉各為一切物主亦如俗家同居有物盜如前斷言共畜者雖物共有不許偏小其如三寶共畜莊碾得利平分或多人共畜平分之物若盜此物計分而斷各望本主隨應得罪第四正明互用如章若三寶相望等下文竹園是通用相通用相者如前以釋寶梁上卷佛物餘二不得用經云何以故於此物中應生世尊相佛所有物乃至一綖皆是施主信心施佛是故諸天世人於此物中生佛塔想而況寶物若似寶物若於佛塔先以衣施此衣於佛塔中寧令風吹雨爛破盡不應以此衣貿易寶物何以故如來塔物無人能與作價者又佛無所須故已上經文法物義准非經文也但經云三寶之物不應令雜章云僧物作白羯磨者經若如來塔或有所須若欲敗壞者若常住僧物若招提僧物多營事比丘應集僧行籌索欲作如是言是佛塔壞今有所須此常住僧物招提僧物多大德僧聽若僧聽若僧時到僧忍聽若僧不惜所得施物若常住僧物若招提僧物我今持用脩治佛塔已上是羯磨文也又云若僧和合營事比丘應以僧物脩治佛塔若僧不和合營事比丘應餘勸化在家人輩求索財物脩治佛塔已上經文上來且是依章物辨今經更委說略分七例一者三寶房宇五百問云問人施佛屋宅未用可寄住不答不得便是佛物今詳佛法二屋不可寄住僧房容可經僧暫寄若永互用准祇摩摩帝應結重罪五百問又云非佛屋佛像在中可前食臥不答得食佛在時猶於前食況像不得但臥須鄣須若有燈明不得光中住自有燈得二者三寶人畜祇三十三眾生者象馬牛水牛驢羊麞鹿豬奴婢如是一切眾生不應受若人言我施僧婢不聽受施園民婦不聽受若言施僧奴不聽受施僧使人不應受若言供給男淨人聽受施一人亦爾然言淨人為斷理僧故得受施尼反說謂但得受女淨人也又云檀越信心歡喜莊嚴象馬布施眾僧者不聽受若持鸚鵡孔雞羊麞鹿與不聽受若言不受者我煞之應語言汝自放已應與水食守護勿令眾生傷害不得攝翅籠繫若能飛行自活放法若受眾生越毗尼若准十律五十五云佛言聽僧坊使人佛圖使人聽象馬駱駝牛羊驢騾屬佛圖屬僧五百問亦云問人施佛牛馬奴造佛牛馬奴事法事可受不答得受使用不得賣此之兩文許受畜生若論互使者准多論第三似當塔人不得僧使僧人容得塔家暫使論云若屬塔水以供塔用設用有殘若致功力是塔人者應賣此水錢屬塔不得餘用用則計錢若塔無人致水功力一由僧人殘水多少善好籌量述曰除互使時容得牛食若非互使若互與食定應不通三者三寶華菓母論第五比丘為三寶種三種樹三葉樹有福無過已上論文僧華分用塔華供塔故多論第三若僧地中有種種華淨人取次第與僧隨意供養不得私自供養三寶若犯多僧取不盡若僧和合聽隨意又云若塔地華不得供養僧法正應供養佛此華亦得賣取錢以供養塔祇三十三五法白一羯磨拜作分華人若華小者應量分若手作准大者數分若佛華者應上佛若僧華者隨意供養若轉易若華多者賣得意已得作別房衣前食後食猶多者著無盡財中菓法者如上華中說已上律文然准佛菓雖言如上其義未顯准獻佛食獻佛已竟塔𪜰人食又准前多論佛華許賣菓應准同又祗律云有比丘僧地中種菴婆羅菓長養成樹佛言此種植有功如是比菓樹應與一年若不欲一年并取者聽年年取一枝枝遍則止若種一園應與一年若欲年取一樹亦聽若蕪菁若䓗如是比菜與一攝若𦬔瓠與一番熟已上律文一攝者再生可然不生理推善見十七云若自有種子眾僧地應半與僧若自有地眾僧種子半與僧四者三寶樵木祇云主人比丘不得自取遮他容亦當護不得乾生令斫應供溫室食厨浴室別房當分依限不得過取若燃無定限者多亦無罪不聽斫濕樹應取乾者僧坊內樹木觀望好者不得斫山林無主守護斫者無罪又云一切華菓樹不聽斫作房若樹老無華菓者應語檀越主聽得取若必須木復妨地者使淨人以魚骨㓨若灰汁洗若樹已死語檀越言此樹已乾聽取得用斫華菓樹越毗尼母論第五若僧地樹枯不得獨取燃火以屬四方僧故有好樹眾和合得作塔僧房不知不得若眾中三四人別作房共住作房地中先有樹眾僧處分與得用不與不得用若作房者此地中自種得樹得用若本作房者無有後僧住不須白僧得用此樹若所住房處有空地房主為此房故種得樹得用治房若本主不在有餘僧住不須白僧亦得用此樹也華樹菓樹眾僧和合用治塔作房私不得斫十誦僧園中樹華聽取供養佛塔有果者使人取噉大木供僧椽梁等用樹皮葉隨比丘用五者三寶物類曲分四例一者受用物謂佛堂宇衣服床帳案机等物若經箱簾巾帊之屬此等並據無心施者若經受用未經受用不問暫永不得餘用二物相望暫借互用理亦應得永互亦犯五百問云問得買佛上繒作衣不答不得次僧物者永互不得蹔通三寶上來言暫並須籌量物無所損事無所妨者得二者屬三寶物謂莊碾等資生之具可出息者此可廻易得利各供三者供養雜物南山釋云華多許賣等今詳應分兩例一者擬供養華如南山釋二者已供養物佛法華幡不可改易下文園物房舍物園物房舍物皆如塔故二乘起塔華幡准同五百問先佛上繒得取作佛事得用若檀越不聽不得也准不變本體方得也萎華應棄淨地之中法准佛判現在眾僧或有檀越幡華供養任僧處分四者獻三寶物下雜法中舍利目連及以佛塔聽種種供養所獻之食塔作者應食見論十七佛飯誰得食若有侍佛比丘得食若無侍佛比丘白衣侍佛亦得食述曰他皆引此今觀彼文是檀越物儻是僧物准同無爽也又將僧食持用獻佛佛是法主比丘尚得佛准自成不同餘物不通互用檀越獻法義同佛說僧食無分不勞用獻也獻聖僧食猶是僧物任僧處分六者三寶局處下文定臥具不許移設因荒亂但許暫移國王還安應還本處不定臥具據本心通容可移轉二處常住若欲同食羯磨和通人既尚然淨人畜等若僧不使義無互食等伽論第四共住比丘盜心取四方僧物度與餘寺尋便生悔乃至佛言不犯夷犯吉七者三寶難辨多論第三若荒餓後三寶園田無有分別先舊比丘及以白衣一切盡無問定無處若眾僧和合隨意分處第三大門出貸得不如章引寶梁上卷塔物無人能與作價者等如前已引是足文章中略引經意也章引祇律第三文也彼又云知事人若交貸時應僧中讀疏分明付授若不讀疏得越毗尼章引十律五十五塔物也無盡物者即十誦云毗舍離諸估客用塔物欲番轉得利供養塔是人求利故到遠處持此物與比丘言長老是塔物汝當出息令得利供養塔比丘白佛佛言聽僧坊淨人若優婆塞出息得利養塔章引伽論同十誦上來三問義竟次下釋文下三物上何不結罪者此即舉物以廣顯屬主是故於上義門之前疏中解此後三三句云次解不與物有三三句並是有主既言有主明是舉物以顯屬主非謂直辨物體也崇云舊將第三句是物體者義亦不然又云舊以不善文意等者屢出刀劒也業心五中但有二緣者但有重物離處二緣也若至增六但有三緣者於前二上加盜也何故不至增八者何故不於前增六中三緣之上更加有主有主想使滿五緣耶文言非己物非己物想有六種亦如是者應言一非己物非己物想二不暫想三非親友想四重物五盜心六移離處此准下文增六中釋是故章中引增六文以釋此文也二十六章章中分三崇云此且浪作異同未順文意今詳順文故僧祇第三云有物分齊如時等四藥淨物不淨物等有處分齊如地地中物水水中物船船中物等故知與此律文意同三明盜心者五分第一四種盜心彼云又以諂心曲心嗔恚心恐怖心取他物亦名盜心十誦五十六云問六種取他物苦切取輕慢取以他名字取強奪取受寄取出息取何等得夷答除出息取餘者夷伽論第七有五種劫謂強奪取耎語取苦切取受寄取施已還取此律下文云有五種賊心第十疏中雖有兩解觀文但是盜物賊心非關業煩惱賊也黑闇心謂愚心迷教祇律摩摩帝即其事也此律亦云愚癡夷等邪心邪命說法等得財也曲戾心方便侵人口言不取不善心即苦切他取也常有盜他物心恒懷規奪是為五復有五種賊決定取倒易物籌決令屬己恐怯取非理恐稱令懼輸財寄物取如律第十四章釋見便便取伺他漫藏而便往取倚託取因官貴勢傍附得財是為五南山云以此諸文證知心業其相略顯足得垣牆防擬妄境也甌盛匱盛等者見論第九十誦第一多論第三祇律第三並云甌中瓶中篋中有寶有蛇欲盜此物恐其主覺合瓶持去若近若遠得輕蘭舉出瓶底得夷祇云若𣐍上懸酥油瓶盜心取者若繩軟𣐍直雖舉未夷離𣐍夷若繩堅勁𣐍曲取問前繩軟𣐍曲亦同前繩堅勁𣐍𣐍直舉則夷二文書成者南山云如律師跡判以重入輕今詳不然至下衣犍度當辨應見論第九云若言官行貨諍園得勝園主作失想夷若僧中判事僧知故違理判者判主得夷若僧中詳依理判諍者不如蘭又云若𦘕地作字初𦘕一頭蘭兩頭夷十誦第一云言他得勝夷不如蘭三言教者如下文若以言辭辨說誑惑而取一切准知見論十七若比丘寶一臘妄言二臘依二臘次受利計錢犯重此則偷夏唱大四移標相者見論第九若地有二標舉一蘭舉二夷三標一吉一蘭一夷多標多吉一蘭一夷又云若偷地乃至一髮夷何以故深無價故祇第三云一麥夷五異色明離處者十誦第一云一色名一處異色名異處多論云移在異色即離本處十云重閣陛一桄名一處乃至舍未泥一塹名一處草覆舍一重名一處若木覆舍一木名一處仰泥舍一𦘕色名一處等六墮籌者下文盜他分物籌等是也七轉齒者十誦五十一云問有比丘非錢非衣物不䨱藏取以盜心移置異處得夷不答得樗蒱以盜心轉齒是已上章中義竟今更義加之八無離處以明離處如攻擊破村等九雖復離處義同不離如祇第三盜馬乘走主覺逐之未作失想比丘未作得想未夷十雜明離處如律二十六章廣論也亦如了論章中略引然論云偈曰依入及界所生罪長行釋云釋曰世間所立法爾道理入及界有屬自有屬他有輕有重若比丘約眼耳鼻舌身心因緣於六塵起不如理行或犯重罪或犯輕罪若人食毒或為虵螫犯如此罪已上論文此即約十二入辨也或犯重或犯輕者夷蘭之別也明了疏云先約十二入判罪有夷有蘭如有仙人名阿嵐婆也那是諸𮌎行虵等師胷行者腹行是也復有仙人名阿耶底顛履反柯是諸毒藥等師若人為虵所螫𦘕仙人身心上書字字是呪語唯有一字眼見即差食毒亦爾偷看者犯眼偷色竟有誦秘呪得直直方傳比丘詐病從他乞呪呪師為呪密聽誦取計直犯罪耳偷聲竟有作臭藥病者臭差得直方聽盜臭計直甞藥觸藥類說應知若有法術心病差得直方聽偷緣計直十二入竟論云若人偷地界火界風界空界等亦犯波羅夷已上論文明了疏云前三界易解四者有師呪扇引風觸身病即得差五者如起樓閣或復種樹侵他空界六者論文言等等取識界識屬於智智相應故人有伎能得直教人偷此六界並不與直計成重罪然此六界攝十八界前之四大即攝五攝五境等十以五四大造此十故空即法界識即七心界故成十八界也成論十不善業品云問曰若一切萬物皆共業所生何故得罪答曰雖從共業因生因有強弱若人業因力強又勤加功此物即屬次二句亦同者祇第三云諸比丘失衣鉢已入林中藏時賊即藏衣鉢䨱著一處更劫餘人比丘見藏伺賊去後是比丘若先不作失想還取無罪若作失想便為賊復劫賊此上即一句也第二句云又比丘被劫賊將衣鉢順道而去諸比丘隨後遙望追之不止漸近取聚落便語賊言出家人仰他活命汝等何用此衣鉢為如是得者無罪若賊罵言已乞汝今何敢復來比丘念言已近聚落必不害我當恐怖之語賊言我當白王及諸大臣得者無罪賊復嗔言欲去任意若告捉賊若縛若欲不應告若語聚落主方便慰喻得者無罪餘文可知者多論第三若先失物作心來捨還取此物若己物外更取他物計錢成罪若先心已捨正使己物亦不得取取亦計錢崇敘此門義訖乃云上來二釋各據一邊猶未能通諸教本意然今會釋須為四句一者比丘未捨賊未得想奪無罪二者主已捨心賊未得想奪定成重三者主未捨心賊決得想奪亦得夷前人攝物屬己已作得心離處業成何容更取此若取者深違正理故見論云園主捨心比丘夷等四者主捨賊得理無奪義今詳第三若賊業成今我不奪必不應理彼自業成關我何事而不得奪如後文中使人取物而其使人謂遺盜物使者犯已豈即今主不得還取僧祇藏物伺去取來賊豈當時不作得想若未得想寧肯舉藏餘親亦應如是者應追贖也然五百問云問比丘知其父母兄弟破落屬人而不搆贖有罪不答若為行道不贖無罪僧物得奪不成自入者一者以見下文不成買賣自入等二者又無人決作捨心今詳若是出家人取強奪無爽若俗人盜應須和喻令還者好南山云若盜僧物云不成盜便即奪取此未見諸部明文若奪成重崇云舊二解但違正理學者於中理應思擇僧物亦據得捨二心僧物若其不成自入盜者則應不成業道盜者既許業成奪者何容無罪今詳律云不成自入豈是人解也今詳僧物諸出家人有共用分無獨用分故獨入已佛判不成意令奪取還作共用其別人物全無共義不可相比教理分明也又亦取者之意者為取者意欲從道至道等取也今詳亦可從道至道等隨得處則犯也謂或道中得或非道中得也文言空處者十誦第一有主鳥䘖物去比丘以偷心奪取夷得鳥時蘭鳥隨比丘所欲至處夷若至餘處蘭若野鳥䘖物奪取蘭待鳥吉隨所欲至處蘭至餘處吉若野鳥䘖物有主鳥奪取比丘奪是有主鳥物同初句說野鳥奪有主鳥物同後句說此等皆為偷有主人物也多論第三若移鳥令離周員邊際名離本處若流水中捉鳥令後水過前頭亦名離本處不輸稅者祇第三云何等物不應稅何等物應稅世尊弟子比丘尼一切外道出家人物是名不應稅若賣買者應輸稅廣如彼說十誦第一比丘度關應輸稅物而不輸稅稅直五錢夷多論第三比丘亦有稅法此等部別親見三藏不信四分無輸稅法遂撿梵本果然無稅也二足中鳥者若在空中如前多論若在地上如祇律第三駈舉一足蘭兩足夷四足多足並皆最後一足夷也同財業者祇第三有二教化比丘得物當共後時一人得好衣段便語伴言從今日始各任相祿是中半滿者夷次句受施呪願已語施主言且置汝邊我後當取還語伴言各任相祿者蘭次句聞欲施衣便豫語伴各任相祿得越毗尼有二糞掃衣比丘三句同前但第二句菓石䨱之解要第三句不取不䨱解要也共要者共得一五俱得夷也見論第九相要者某時共去或中前中後等名不從教教中前取而中後取教初夜取而後夜取白月黑月此年後年亦爾教者犯小罪取者犯夷守者為其賞物者謂守物人為求物人守物也在外推求得財共分者求物人許共物人分也私隱五錢者即求物人隱也今詳或可如祇第三云有比丘摩訶羅出家不善戒行有比丘語言長老共作賊來摩訶羅言我今出家云何作賊彼比丘言汝不能者汝但守門當與汝分摩訶羅言我不作賊與我等分何以不去答言可爾即俱共去彼比丘入觸物時二俱越動時二俱蘭離處二俱夷此律守者即同祇律與他守也看道准知初句是尅下三通慢者崇釋亦同今詳唯尅故有求五過五之別若言漫者何成求減求過之別諸句通漫皆同斯破准教人位中所教容漫也雖知非理且隨疏釋具三同登者一者過五五錢同是一主二者過五五錢果罪同夷三者過五五錢因罪同蘭今詳疏中自具此相豈勞登釋取減五邊究竟偷蘭者謂臨盜時別起心取也不得相成過五因蘭不成減五果蘭蘭不成蘭故也又解先求過五方便是蘭後減五方便是吉彼先因蘭不得成後減五因吉也先取重心後取減五因果顛倒者先取重心即是因蘭後取減五即是因吉蘭若成吉即顛倒故減五能所前已別故者如前方便教人求減五錢得過五錢等四句也見論就尅有四比丘者彼論第十卷說也人若別主可言教人之業與自作不相成若同一主理應思擇當宗理盡者盜戒宗明夷罪也直疑有三者實是人物向彼非人畜生無主起三直疑為人非人為人畜生為人無主也橫疑有三者實是人物起三橫疑一者為非人為畜生二者為非人為無主三者為畜生為無主此是雲律師義疏主不存以無文故若爾章云但三亦不合理謂此文中有主無主唯兩相對但合一句若開三句即應許是重輕相對亦違此文也有主犯不犯門五過五重輕門豈容合說者今詳設使有主之中人非人物是重輕門五與過五亦是重輕門亦必不得合且如說云人主想五錢若過豈得即名重物重物想已合說訖若作文云人主非人主想重物非重物想偷蘭此方是合故今直破應云四句之中律文並云五過五錢何得說言重物重物想已合說訖然崇亦云已合說訖者不應理也犯不犯門重輕門者如下第三疏境想義也上問緣中對重物須有心差單雙者今詳何但闕緣須辨單雙亦應具緣云重物重物想若問緣今詳何但闕緣須辨云重物非重物想及疑即是心差也非重重想即單闕也非重疑即雙闕也然前具緣不立重物想者義如上辨戒本總句者戒本云不與即是初句也故釋相中開此總句為語三中後三三句戒本合說故云物也
