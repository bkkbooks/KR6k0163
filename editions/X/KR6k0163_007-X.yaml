body:
  text: 已下疏本第三制戒竟中人趣報勝者崇云人趣報勝天亦應然乃至形心俱是受道之器者崇云天有聖道煞不成夷北州得夷非由道器黃門二形類北洲難今詳章中先簡非畜是故說云人趣報勝顯果勝也善因所招顯因勝也若爾天勝應殺成夷為除此疑故簡曰形心俱是受道之器一者形是道器之類如北洲而彼洲人心多放逸故心非器二者心是道器之類如黃門等唯在南洲南洲猒猛心是道器而由形缺故形非器三者俱是道器之類如三洲中具根之者此之三句煞並得夷即簡諸天俱非道器形非人類心闕猒欣故彼形心俱非道器即由此理兼顯北洲及黃門等並即攝在道器類中故薩婆多論第三卷云問曰何以但害人得波羅夷答人有三歸五戒波羅提木叉多在人中得沙門四果又佛辟支人中盡漏是以害人得波羅夷餘道不得准此論文故顯北洲及黃門等是道器類問天能入聖何非道器答天無木叉又得道少故論說言多在人中得沙門果又解脫分在人三洲北洲難無以類攝相故所立義非不善成然北洲人定壽千歲必不可殺無中夭故應壞四等者舊名四等新名四無量也謂平等緣一切有情脩慈等行故云四等俱舍二十九云言無量者無量有情為所緣故引無量福生無量果故崇云此四無量無學故成就非是學人及異生得如何乃云應壞四等又成四等者必不行煞之人定無四等今詳四等必不行煞理則相符而言無學方壞四等違大小教且違小教者婆娑八十一云一切聖者及內法異生皆通二種謂曾得未曾得二種外法異生唯是曾得外法異生即外道也又瑜伽四十四云菩薩略有三種脩四無量一者有情緣無量普緣十方安住無倒有情勝解脩慈俱心二者法緣無量住唯法想增上上意樂正觀唯法假說有有情脩慈俱心三者無緣無量復於法遠離分別脩慈俱心悲喜捨三當知亦爾有情緣者與外道共名法緣者與諸聲聞及獨覺共不共外道若無緣者不共一切准此等文外道尚得豈得唯說無學成就也釋名者梵云末奴䟦沙柂譯為人煞也崇云舊解不然今解息風名生隔斷不續名為煞生或復生者命根名生隔斷名煞今詳涅槃第二十卷為闍王說息風名生闍王俗人不違法相謂言息風名之為生世尊遂依隨轉理門作如是說若據實理羯邏藍等根未滿時息風不轉豈不名生若不名生煞應無罪故婆沙二十六說羯邏藍等根未滿時息風不轉也又說命根名為生者違婆沙論百一十八害生納息云問唯法無眾生云何而有煞生罪尊者世友說曰如雖無眾生而有眾生想如是雖無眾生而有煞生罪述曰問意云唯有色等五蘊實法無別眾生何故乃有煞生之罪世友答意云雖無眾生而諸愚夫於五蘊中有眾生想今斷五蘊妄謂煞生故得煞罪論既明言無有眾生何因定執有實眾生大小乘宗同無眾生若執有生便同外道豈順正理故還依疏斷壞陰境以之為正故即婆沙百一十八云問諸蘊中何蘊可煞有說色蘊色蘊可為刀杖觸故有說五蘊謂色蘊壞餘之四蘊亦不轉故如破瓶時乳等亦失即疏所引雜心第五亦是明證然薩婆多及大乘等一剎那中具足五蘊若成實宗十不善業道品云五陰相續中有眾生名壞此相續故名煞生已上論文此謂識想受行次第而生由壞色蘊令識想等不相續生名為煞生也境用作名者通律師云煞者是用生者是境也若依多論者多論無文此是雜心第五及婆沙害生納息中說也四陰及命根者理實四陰攝命根何用及字也而今意說命為報主故別說也命根是不相應行蘊攝也以現在受刀杖使未來不續者此合婆沙及雜心論兩釋為一也婆沙一說云煞未來蘊問未來未至云何可煞答彼住現在遮未來世諸和合說名為煞由遮他蘊和合生緣故得煞罪有說煞現未蘊問未來可爾現在不住設彼不煞亦自然滅云何煞耶答斷彼勢用說名為煞先現在蘊雖不住而滅然不能合後蘊不續今現在蘊不住而滅則能令其後蘊不續故於現在亦得煞罪已上論文雜心兩說亦同但殺報色不煞餘三者汎論無記總有四種一者異熟舊名報也二者威儀路三工巧四變化亦名通異也此四無記皆通色心二聚不相引發各別而起不同餘三發身語色且如內起威儀路心發起身業在路而行是故威儀從為名又工巧心發身語業於壁等處彫𦘕工巧是故工巧從處為名又變化心發身語業昇空變化及化金石等故名變化四並是無覆無記唯起表業不發無表大乘異熟唯是無記威儀工巧即通三性變化即通善及無記不同小宗但煞觸塵不煞餘八者十二處中十種色處於中除聲皆是報色聲非報法上已數明也然尋俱舍頌云謂唯外四界能斫及所斫故知十八界中色香味觸四種外界皆是所煞不唯觸塵蓋由婆沙等云色蘊可為刀杖所觸即執觸為所煞然刀杖所觸者謂相對礙名之為觸未必即是觸塵也或可觸塵能出告受偏說觸塵斷頭腰二處者婆沙二十七云問何故斷頭及腰便死斷手足等而不死耶答頭腰二處是大死節故斷便死手等不然復次欲界有情依段食住喉通段食腹為食依故斷二處命根便斷復次頭是眼等多根依處章中多人住處是也謂於頭中具五色根此五色根即十二入中五入是也斷之使壞眼等諸根腹是息風所依止處斷腰腹壞息無所依故斷二處命根便斷章云腰是出入息住處即是論云息風所依也一念實法無煞生者此宗一念不具五蘊要由識想受行四心次第而生并所依色具五蘊於斯五蘊假立眾生離蘊更無別體如林離樹無別林體也此亦如是故陰是實眾生無假也業煩惱為命根者由業煩惱招一期報故立為根也然此命根離色心外更無別體不同有宗離色心外有別實物為命根體迷法想闕當法想者有餘皆言迷五緣犯法也今詳即說五陰實法名之為法若轉想心迷法想若疑心闕當此法想故下疏云闕決正心也非人人想有前心吉者古師但見非人之文在人想前不了煞心方便前後也比於轉想等者舉喻也如轉想云人非人想即是舉其後非人想以結前時人上因蘭今非人人想亦是舉其後非人境以結前人上因蘭後相後境二門皆有本異兩殊皆是舉後結前因罪即此文是者非人人想文是也闕決正者猶豫義也次雙闕者由有異境替本人境即五緣中闕第一緣復於異境疑猶豫是問第二故名雙闕下諸戒類准不同闕初緣者若闕初緣要於異趣境起本境想也別前闕第二者前闕第二疑當本境今則不然故有別也若單雙俱闕境一六者謂雙闕中具有闕境闕心之義故望闕心即須配在闕第二緣闕心中辨若望闕境復須配在闕第一緣闕境中明然闕境中單雙各含非畜杌木以為異境故成六也想疑並闕心一六者對本人境轉想向外緣為非畜及以杌木疑心亦爾故成六也此止兩種一六之言意除人趣以為異境以人異境煞不免夷故且除之也單雙二闕廣各十九者此即總說人等四境以差大境緣異本想既有十九緣異本疑故亦十九言十九者人與非畜三異境上各含闕緣差心息不強而煞即成十五杌木除強有餘四種便成十九想疑各然即是境差三十八也下諸戒首准此應知更不煩辨章云此二闕者單雙二闕也即下文更不煩辨也容得提吉者不煞而打若大比丘即得提罪餘眾即吉也輕重二蘭者遠近因別也具七方便者闕通緣中初三兩緣即闕方便也闕別緣中第一緣即境差也闕第二即想疑也闕第五即境強緣差心息也由有此三不得煞故下諸戒類知餘二類然輕重為別者皆須制意釋名具緣闕緣也非人變畜同入非人煞之得蘭不變畜提並如下文也雜寶藏憂陀美王緣起如彼經第十卷說無別二逆者俱舍十八云若有害父父是阿羅漢得一逆罪以依止一故若爾喻說當云何通去告失欠持汝已造二逆所謂害父煞阿羅漢彼顯一逆由二緣成以二門呵責彼罪喻說者謂有喻說契經也婆沙百一十九亦同伽論第一問頗有煞比丘尼非母非阿羅漢犯波羅夷得逆罪耶答有若父出家受具足戒戒轉根作尼打尼得吉打具戒父提餘文皆吉也父實變者者已命終竟此謂剎那中陰即受畜報者疏意云父之假者實已轉變成畜生身謂父命終受中身但一剎那即受畜報時中迅速故不覺知理實中間已逕生死故婆沙第七十說劫初時人忽變為虵有一釋云有餘師說彼逕死生若爾死生必受中有如何眾人不見間斷答中有迅速時人不知如彼廣說此餘師義婆沙雖復詳為不正餘師何必肯伏婆沙更有別釋如破迷記今不敘者彼欲且昭崇師高慢而亦不將以為實理然崇破此舊義十六條云轉根者本生死故婆沙釋劫初時人云忽有腹行者共號為虵問云何人趣即作傍生答非即人趣轉作傍生但彼身形前後有異於中有說彼恒是人然宿業緣興衰不定初福業勝故作人形後時食惡諂曲增故人形相滅變似傍生如或有人被他呪術變似驢等而實是人復有說云彼是傍生然彼遍從極光淨歿乘宿惡業受傍生趣前福餘勢初時似人後時食惡惡諂曲增故人形相滅復傍生形乃至則知舊解其失四也曾聞崇師以此疏中陰問寶法師此法師後入東部住佛授記寺法師數年未能決斷後時因撿婆沙論文遇見此文方為斷決以為不正今詳法師亦是未曉婆沙宗意此婆沙宗一剎那思造牽引業多剎那思造圓滿業既從一思無差別因所感總報故盡一形必不可轉其圓滿業既有多思所感別報故容轉變是故婆沙兩釋意云或造一思感畜生報而由多思圓滿此業故初似人後復本形或造一思感人總報亦由多思圓滿此業故初是人後似畜報今准大乘多思牽引多思圓滿故由多思牽引總報亦可改轉由藏識中人畜差別名言種子為親因緣由其造業時業增上力故令人與畜親生種子雜起現行豈同婆沙五百羅漢不染無知並未能斷妄釋一思為牽引業而現是畜云實是人或現是人云實是畜云實是人深為謬矣若爾大乘人變為畜有中有不答為往餘方故有中有即本處生何用中有良由造業萬類差殊故使難思色類報別唯佛具足自業智力方能了知豈羅漢等而能通釋故今疏中依餘師義論其實理應依大乘問婆沙後釋云本是畜初時似人即煞此人為得何罪今詳婆沙雖是謬釋且應為釋煞得𠎝夷害心重故人相在故實人似畜反此應釋勞不滿者他皆釋言有生身恩無養身思故勞不滿今詳生恩重於養恩故婆沙百一十九云如有女人羯剌藍隨有餘女人收置身中後所生子以誰為母煞害何者得無間罪答前為生母後為養母唯害生母得無間罪以羯剌藍依前生故諸有所作應諮養母俱舍十八亦有四文准此論文俱生非養煞之得逆故不得言生而非養名勞不滿也應言勞不滿者父母於子恩愛情微畜無智故名勞不滿子於父母害心不重以報劣故故章云又報劣故也初緣四蘭者若據異境有一句夷也易想四句者謂轉易異想即轉想是也降斯已還者謂餘有學人也如婆沙百一十九云問如害阿羅漢得無間罪害諸有學亦得是罪耶答不得所以者何前說無間由二緣得一背恩養二壞德田害諸有學非壞德田以彼有功德亦有過失有妙行行亦有惡行有善根亦有不善根故問退阿羅漢害之得無間耶答不得還是有學故如前說問此於最後命將斷時必住無學云何不得無間耶答於無學身無惡故心故謂彼但於學者身中起煞意及加行非於無學由無無間因故不得無間罪背恩者釋父母逆也地藏經者十輪經也漫心成逆者婆沙一百一十八亦云問彼不了知是阿羅漢何故得無間罪答不以了知故得罪以壞德田故得罪彼於苾芻眾中起無簡擇等煞意樂由此極惡之心害及羅漢是故得逆古師意言下文價人漫心供佛今師破云樹神告知故不須引浪判尅漫也得逆罪者謂不欲煞作打佛心是逆之類非正逆也故俱舍十八云要以煞心方成逆罪打心出血無間則無然母無論第三云有波逸提不生善根亦無羯磨可得除罪也何者如比丘瞋心欲斷佛命打佛得提不可懺也已上論文欲煞而打但合得蘭是煞因緣故不欲煞打方可言提也佛或闕二者一理二教也被異來替故不成逆即闕理也本期成夷今但得蘭即闕教也本蘭今蘭故者佛必不由外緣所加煞行雖然唯應得蘭今事異時縱異境替還得蘭罪故云本蘭今蘭也本謂加行今謂事停也父等唯一者此前害佛被異來替有二門義一者望本期說於佛境理教但闕二者望不可害於本佛境闕理不闕教而今害父被異來替唯一門義謂於父上夷逆俱無即是理教俱闕也又言父等者等取母及羅漢也對佛想疑不簡趣之同異或二或一者先釋或二者由實是佛佛無害義決不得夷即是闕教損由向外緣同異趣相或疑以心輕故復闕理也次釋或一者闕理同前而不闕教者本蘭今蘭故也父等同趣相疑唯一闕理不闕教以本夷今夷故者唯一義也本夷今夷者是容有義亦非決定也且如經文作餘人想疑先結想疑二因罪訖儻不斷命不必今夷教名該三人者不煞而打佛及羅漢并父為三打並提也在家父打得吉故言全異打在家父及出家父並無逆罪故言皆無違理也人緣合辨者此人即是制戒緣也五停心中多貪欲故不淨對治者一切有情煩惱偏增不過五種為治此五脩五停心涅槃三十六具說五停瑜伽二十六聲聞地中亦具足說如彼論中引經文云云何苾芻勤脩觀行是瑜伽師於相稱緣安住其心謂彼心比丘若唯有貪行應於不淨緣安住於心若唯有嗔行應於慈愍安住其心若唯有癡行於緣性緣起安住其心若唯有慢行應於界差別安住其心若唯有尋思行應於阿那波那念安住其心如是名為於相稱緣安住其心述曰謂或有人貪欲偏增由有貪增之行相故名為貪行此貪行者要須緣境作不淨想心息貪增方能入道舊名停心即停息義也或有瞋行令脩慈愍或有癡行迷於緣性遂妄執有冥諦梵王等以為緣起此應觀察十二緣生正緣起性以除癡行或有是我而起慢行應觀身中六界差別了達無我以除慢行四大及空識為六界或尋思行掉散心多令緣息風止散動行此並世尊稱機設藥而崇乃云然五停心亦不遍脩於中要者唯有二門謂不淨觀及持息念今詳貪尋理須此二儻愚緣性等豈得同然此出小宗俱舍中偏僻之教豈能遍達有情機緣又云貪有四種一顯色貪緣青瘀等二形色貪緣被食等三妙觸貪緣蟲胆等四供奉貪緣屍不動等此貪雖骨鏁能除以骨鏁中無四貪境故教比丘脩骨鏁觀即能除彼四貪不生故涅槃云貪欲病者教觀骨相若作骨觀釋此文者非直即與此文相應亦復不乖入道次第若取智度論中五種不淨釋者非直不應趣入之門亦為一切聖教相害諸師不知旨趣直見不淨名同引來釋遂成大妨以此即是念處位收如何至後中却脩持息今詳骨鏁是緣外身謂貪欲者貪他身顯形等相故脩骨觀以除四貪今觀律文乃是自緣內身不淨觀成自猒何得妄判若作骨觀與律相應問准何教文脩不淨觀緣他緣自有差別耶答瑜伽二十六聲聞地中不淨觀門總有六種以除五貪破迷記中已廣釋訖今不具陳但述要者謂貪有兩一於內身欲欲色欲貪二於外人婬欲婬貪不淨亦有二一者依內汙穢不淨謂內身中髮毛爪齒等三十六物二者依外汙穢不淨謂或青瘀或復膿爛廣說乃至或復骨鏁或便穢等此二種中由內污穢不淨所緣令於內身欲欲欲貪心得清淨此則緣於自內身中三十六物不淨充滿以用對治希外欲境之欲貪也由外汙穢不淨所緣令於外身婬欲婬貪心得清淨婬相應貪復有四種一者顯色緣青瘀等二者形色緣變赤等三者妙觸緣於骨鏁四者承事緣於散壞准此論判足彰內外故知所引五種不淨是緣內身與律符會以律文中猒內報故已辨正理次述崇意云五種不淨是念處位凡脩觀法要從五停次入念處今五不淨既是身念如何後文却教持息以其息是五停故若從念處却脩五停故知乖理今詳智度論二十一釋身念中明此五種不淨彼意欲辨三十七覺道品法中四念處位通初習業若五停心若總別念皆是道品之中四念處攝如何但見四念名同即浪判為七方便中四念處住位又教持息為尋思行教脩不淨乃為貪行所為全殊何名趣次又准智論息念亦是念處所收寧得局判為五停位故彼智度論五十三云復次須菩提內身中脩身觀時一心念入息時知入息出息時知出息廣如彼說此等並約通名四念但緣色法以之為境即名身念緣受心等准此亦然是故有漏無漏觀門無不皆收入四念住何得五停不入念住也經論法相甚深甚深或合或離乍通乍局願除滯執審察真詮身貪有五種者此乃古德搜括經論立斯五種也一者財貪少欲來治者諸論皆言小欲喜足舊名少欲知足俱舍二十二云言喜足者無不喜足言少欲者諸無大欲問所無二種差別云何謂於己得妙衣服等更多求者名不喜足若於未得妙衣服等多希求者名為大欲世親破云豈不更求亦緣未得此二差別便應不成故應說言若於己得不妙不多悵望不歡名不喜足若於未得求妙求多名為大欲與此相違能治之法名為喜足乃以少欲二者色貪說不淨行三者婬貪捨無量治俱舍二十九云毗婆沙說欲貪有二一色二婬不淨與捨如次能治色謂顯形等可意也婬謂婬欲也有人言非婬欲者謬也雜心第九亦同俱舍世親復別釋云理實不淨能治婬貪餘親友貪捨能對治此是捨即是四無量中捨無量也此二皆以無貪喜根為答性四者名貪示眾生空者成實論於五陰中假名眾生執此假名為實生而生貪愛名曰名貪故成論十三貪因品云染著假名則貪欲生第二十三智相品云如瓶中無外名曰空瓶如是五陰中無神我故名為空五者法貪空治者既達生空復觀五陰實為空故第十四身見品云復以空相滅五陰相又云五陰散滅是為法空廣說如彼能變除不淨者彼論長行云食以上饌眾味餚饍經宿之間皆為不淨假令衣以天衣食以天食以身性故亦為不淨况人衣食述曰四大合成此身形質名為身性身性能變食為糞除也智論二十六云或作猪狗常噉糞除故知除即糞也初舉前第二等也者如上科文為四一依病設藥二比丘默念三順教尅獲四方求捨命今此第二大文亦四初有三文如次重舉前大段中後三文也見論鹿杖沙門作沙門形相者見論第十云作沙門形剃頭留少周羅髮著壞色衣所䨱身一以置肩上入寺依止皆比丘拾取殘食以自生活已上論文見論第十婆裘河者世間有人言此河能洗除人罪鹿杖沙門念言我當往婆裘河洗除我罪已上論文此外道執也文言杖如塚間等者多論第三問佛一切智何故教諸比丘令得衰惱若不知者非一切智答曰爾時不但教六十人佛教無偏但受得利有多有少故無咎也佛知眾生根業始終必以此緣後得大利見論第十云語比丘我入樂靜半月獨住勿令人來至我所唯聽一人送食何以如來作如是勅以觀往昔五百獵師煞諸羣鹿因墮惡道經久得出得生人間出家為道五百比丘宿殃未盡於半月中更相煞害此惡業至佛所不救是故如來半月入靜於五百中有凡夫人是故如來為說不淨因觀不淨猒離愛欲得生天上若不離愛生不善處是故為說令生善處佛為說已復作是念若比丘死來向我言一比丘死或三四死乃至七死非可以我神力救護是故入靜欲息諸譏使人言佛一切知而不能斷弟子相煞其中有人答言世尊入定是故不知若佛知者必當制斷更說法中文兩者前科文言第二唯願下請更改觀今此言更說法者即是其科也貪患者顯煩惱也從煩惱發業業與煩惱是集諦體也次第反對前煞緣中四句之文者前說不淨觀中文四一依病設藥今此文亦爾二比丘默念此云亦爾三順教尅獲此文亦爾四方求捨命此文第四即是獲果故知前三是獲果咀不同前文為煞因果故云反對也從伴作名者理實此觀以慧為體今言念者由念能令專住一境念慧想應俱是心所故是伴也俱舍二十二云契經中說阿那波那念言阿那者謂持息入是引外風令入身義阿波那者謂持息出是引內風令出身義慧由念力觀此為境境謂息風故名阿那波那念以慧為性而說念者念力持故於境分明乃至此相圓滿由具六因一數二隨三止四觀五轉六淨數謂繫心緣入出息從一至十不減不增恐心於境極聚散故減十心聚謂十心散然於此中容有三失一數減失於二謂一二數增失於一謂二三雜亂失於入謂出於出謂入離是三失名為正數若十間心散亂者復應從一次第數之經而復始乃至得定先從入數五入五出以之為十隨謂繫心緣入出息不作加行隨息而行息而行息入出時各遠至何所謂念息入為行遍身為行一分隨彼息入行至喉心臍髖髀脛乃至足指念恒隨逐若念息出離身為至一磔一尋隨所至方念恒隨逐有餘師說息極遠乃至風轉或吠嵐婆此不應理吠嵐婆此云迅猛風此念真實作意俱故若假想者名勝解作意如觀自身為白骨等若稱境者名真實作意止謂繫念唯在鼻端或在眉間乃至足指隨所樂處安止其心觀息住身如珠中縷為冷為𤏙為損為益觀謂觀察此息風已兼觀息俱大種造色及依色住心及心所具觀五蘊以為境界准觀五蘊是四念住位以其四念攝五蘊故轉謂移轉緣息風覺安置後後勝善根中乃至世間第一法位謂從四念引起緣四諦觀從𤏙漸至世第一法等也淨謂升進入見道等等取無學道有餘師說念住為初金剛喻定為後名轉從此已前有煩惱故未名為淨盡智等方名為淨等取無生智也婆沙二十六釋息念不繫具敘思覺者新名尋思也戒本中持刀與人者安煞具煞崇云此釋不然彼自解云此牒緣中持刀讚勸今詳五分第一初緣自手煞人制一戒本又因眾多比丘得病語諸比丘與我刀繩與我毒藥與增病食將至高堓時諸比丘皆隨與之佛即呵制汝等愚癡自斷人命與刀令死有何等異即制第二戒本云若比丘自斷人命持刀授與得夷不共住又因住病人索刀繩等諸比丘言佛不聽我與人煞具遂教人煞即觀制第三戒本故知持刀是安煞具此律文言安煞具者先知彼人猒患身命即持刀毒若繩及餘支具置之於前乃至廣說故知即是五分緣起勿謬破之讚勸等煞五分律中皆緣起也一念識支託父母胎者且准薩婆多十二有支分為三際無明與行立為前際次有八支立為中際理實中有即屬中際然約增勝約入胎時中有後心緣於父母生顛倒心最後一念結生染識立為識支從此續生生有初位名羯邏藍從羯邏藍次第乃至鉢羅奢佉五位之中未生眼耳鼻舌四根總名名色即鉢羅奢法六處已滿名為六處出胎已去根境識三雖復和合而名為觸然未了知苦樂差別故或有時觸火觸刀但名觸位此意顯三五歲來理實胎中亦有三和而今勝顯故獨標名次了苦樂避損害緣名為受位此即意顯十四十五已來次起婬愛名為愛位次廣追求名之為取取即是愛然極增廣別立取名次因追求積集當業名之為有此之八支名為中際從此後生如今時識名為生支此後次第至當來受總名老死此之二支名為後際此三際中前際即是過去煩惱并所發行以之為因感得中際前之五支以之為果即中際中愛取煩惱復發者業以之為因招於後際生與老死未來之果彼宗亦名三世二際謂前七支以為前際後五支名後際也廣如俱舍第九順正理二十七二十八二十九婆沙二十三釋之今云一念識支託父母胎者辨取中有末心也俱舍正理並有兩釋一釋即取中有末心同時精血生次後念羯邏藍等一釋即是中有之末一念根大依精血生此精血中有根大以生次念羯邏藍等順正理師取後為正然雖中有是不可煞今且通取入胎位故故言初識也或可此律准同大乘生支即是識支現行即是創依羯邏藍識為識支也大乘正義尅性分別無明與行及愛取支通於現行及以種子識等五支以有支唯是種子生與老死唯是現行略分為四一者能引支謂由無明發福等云行引本識中識名色六處觸受五果種子令生現行故名能引二者所引支即此識等五果種子名所引支三者能生支謂由愛取潤前識等五果種子及福等行所有業種轉名為有此之三支親生當來生與老死名能生支即五果種生現行時名生老死由此應知識支現行即名生支故瑜伽第九所有福非福不動行所熏發種子識及彼種子所生果識立為識支復應知了無明與行及愛取有以之為因識等五支是果種子生與老死是果現行故唯識論破論小宗云一重因果足顯輪迴施設兩重實為無用等也廣釋如唯識第八五分似人者謂四十九日即是胎中五位初之四位如次即為四七日也次三七日總名鉢羅奢佉鉢羅奢佉此翻枝枝此謂第五七日止有形相第六七日生眼等根第七七日髮毛等現總名枝枝也自業為四者一自煞二身現相三口說四身口俱相也然尋文相坑塪倚撥與藥安具亦是自業然不親為是故且寄教人中辨故首律師云八是自業也彼有遣使書故者謂下釋中遣使為一遣書開二合有三遣也然今列章但列彼二云若遣書若教遣使書略無初遣使也下釋第十四章云遣使者若遣使往彼汝所作善惡廣說如上承此口歎死自煞者夷方便不死蘭今此列章中無也問此第十四云遣使者與前第三遣使何別答前是遣使直煞後是遣使口歎令其自煞也餘遣書尋文自曉餘釋非理見論十一若教今日煞受教明日煞或復反此中前後亦爾煞者得夷教者脫重罪已上論文多論第三大同也境想釋名者識謂內心取境像別問何不名境疑答文中雖言人疑蘭等而亦由想取像不決通名境想亦可得名境疑而且從初受稱也境有優劣是非者總談上下諸篇故云優劣各有本異之別名是非也心有濃淡謬悞者上下諸篇境想五句於中初句名為濃淡下之四句名為謬悞犯齊一品者初句齊果罪也一一果罪約八業明亦是犯齊犯等四句者一犯二不犯三輕四重也俗者如販者謂販賣戒唯二俗犯五眾不犯也謗大二小謗覆覆麤罪說說麤罪疑疑惱藏藏衣鉢二宿未具女人同宿外局衣食取衣浣衣讚食指授尋此衣食既是外事不應在此內報門辨也又尋奪者理通內外應別立門不應唯就內報中辨如謗覆說義該兩眾者且謗與說尼戒本文無別緣起直列出之故知大小二謗俱五殘提也說麤俱五提也論其覆麤尼八夷中覆麤夷戒及大僧覆麤戒並云除餘人告故知尼覆四夷八夷並得夷罪僧覆四八但犯提罪然尼單提復有覆麤戒直列戒本故知僧殘已下覆之俱五犯提也餘通可知者謂此既辨形報通局前門復辨道俗通局其內外門及大小門雖已辨局而未辨通故今須辨通內外者如後當知通大小者准多論說取浣通望尼三眾犯准祗取尼下眾衣不犯如是等類隨應當知通四趣者人天非畜也境仍是寬者加水風空故不同犯婬也如觀許等想者發諍戒境想云觀作觀想廻僧物戒境想云許作許想也染心衣食者尼受染心男子衣食犯僧殘境想云染汙心染汙心想也盜奪虫水等者通損內外也如虫是內水為外也第三有無者謂諸戒中何戒有境想何戒無境想也二六者第二篇六戒有也頌曰摩麤媒兩房謂摩觸二麤媒及兩房三十有一迴僧物是九十十五頌曰說地生虫水說麤堀地壞生用虫水日暮讚兩足足初足也非殘不受酒非時殘寶不受飲酒也飲虫并覆觀覆麤發諍二房舍七者前房四重一過量二不處分三有妨四有難後房三重除其過量也盜媒麤壞生各有二重者盜中一者有主有主想五錢過五錢二者有主有主想減五錢過五錢三者有主有主想減五錢媒中一者媒嫁媒嫁想二者人女人女想麤語者初麤戒中一者麤語麤語想二者人女人女想壞生中一者種子生作生想二者草木生作生想也除十者頌曰婬觸并三二二麤二房二足合為三二也讚暮想為十除十六戒同頌曰三夷媒廻說堀壞非殘受二虫酒覆麤發諍等十六略出戒本者尼律中直列戒本無別緣起也摩觸五句人男人男想染心四句染汙心染汙心想也對便二十一者盜媒壞各二也局此境犯者此等皆局大僧尼犯餘眾則輕應言比丘比丘想隨應知之如祇二隨咸有境想者祇律十八隨舉比丘戒云舉不舉相越毗尼不舉舉想越舉舉想提不舉不舉想無犯隨擯沙彌戒云駈想等准前應知媒麤等反此者前言以無所對法故今媒麤等有所對法可為境想故云反此也尼覆戒應言麤罪麤罪想等也第四門多小者欲辨此門要知兩義一者了知三重相對二者懸談此門意趣且三重相對者一者重輕二境相對且如人境望非人境望非人境二境相對為境想者煞皆有罪名曰重輕門也人對畜生道對非道應知亦爾二者犯二境相對且如有主對無主物不與而取名犯不犯門也不處分等應知亦爾三者本異二境相對於中有兩一者望戒以說本異如煞人戒人為本境縱使始終迷人為畜雖望本期畜是本境今由望戒即人為本與上相違名為異境二者望本期心以說本異如本期心欲煞人境今還對人趣煞方便稱之為本起方便後有境差來始名異境故應了知本期望戒二種本異第二懸談此門意趣者古師一向定判煞婬觸麤語等為重輕門盜覆說等為犯不犯然覆說中麤非麤想者非麤一向謂全非罪故知亦是犯不犯門今師破彼定判之失且如殺人人對畜等可是重輕若對杌木即犯不犯故知不定也盜對無主是犯不犯對非畜物即是重輕亦是不定也或有唯是犯不犯門如處分非時等又應了知據律現文境想唯據本期本異結罪亦是唯結本境疏中所辨古今意者欲攝多義通據本期及以望戒兩種本異既明本罪亦兼異罪隨應當知次當釋疏古師釋中轉想及本迷並得夷蘭罪者並釋五中第三句也轉想意顯本期本異本迷意顯望戒本異兩本並夷兩異俱蘭故云並得夷蘭也汎論諸戒第三句者婬酒兩本皆犯究竟所餘諸戒元期本犯犯因罪望戒本者一向不犯疏意且然義實不盡如上方便義中破之若煞妄摩觸及二麤等者二麤謂是二麤語也此等並約有情之中重輕門并也本迷二境者謂迷犯境為不犯境此即緣二境迷也何以覆說第三麤非麤想落聞通者此難意中含有兩勢一者汝言輕重定有第三何以說麤非麤想是重輕門第三落開二者以彼二戒麤非麤想是輕重故者汝莫定言麤非麤想是犯不犯上篇相對即是重輕門故為如此好者定判即妨也重輕之中位有其三者先且總述疏中意者重輕門中進入不犯便具二門一重輕門二犯不犯門又辨犯不犯門退就重輕亦具二門一犯不犯門二重輕門就前重輕具二門中位即成三謂將定五以為一位以戒四五復為兩位故合三也就犯不犯門位亦成亦謂定五及戒四五合成三也然尋疏中兩處三位名雖是同而於重輕門中釋或四五純就本迷釋之於犯不犯門中釋或四五乃即雙就轉想本迷兩義而釋由此故令讀誦之者心生迷亂也先辨重輕進入不犯三位義者疏云若轉想定五者轉想本迷一向定五然易解故疏中不重釋也次釋或四五以其難曉是故疏中重釋云云何或五若想對二趣已下是約重輕門本迷為五也又云若想對無情已下約犯不犯門本迷為四也此即先約重輕通入犯不犯門純約本迷釋或四五訖也如似覆說類前亦爾已下正破古人所辨覆說一向唯就犯不犯門本迷局四今師意云若對下三篇亦是重輕門攝即本迷應五故疏云若對下三輕重應五也又亦得就犯不犯門本迷為四是以疏云然落開通此是全謂非罪而說者無犯故然即是破古本迷局四而顯今師本迷通或五四也次辨犯不犯門退就重輕三位義者疏云若准此義犯不犯位亦有三已下是也此門戒四五即是雙就轉想本迷釋也疏云作想轉迷者如次即是本迷轉想之異名也犯中無重輕者謂不處分一向殘罪不同煞等人畜夷提也餘准可知者下篇類准也謂如學家受食高下著衣等並犯中無等並犯中無重輕也通約本異二境者據義非文文唯辨其本境罪故名據本境四即齊四等據文非義也然婬酒戒本迷本境亦有五句今言迷四且談餘戒也崇師廣敘此門義說彼即破云若言相對三趣犯境起迷以吉羅故為斯具五者如似始終迷人作非人想煞人無罪非人有吉此吉乃是異境上吉何開境想第三句事斯既非本不合預入境想階次今詳此據望戒本異故無失也又云煞中亦有非畜為重輕門亦有非情為犯不犯門何須先約重輕作三位也次犯次犯不犯更作三位今詳煞中須進盜中須退故亦無失也又敘此疏中若據大境四即齊四節遂即破云又此境想位通本異如何局言若據本境今詳境想境雖本異而論結罪唯結本境故言若據本境故亦無失也更有多言准例應故五等之差餘亦類然者餘戒類然也上文兩戒雖有境想然其初戒境想義異盜戒之中復但四句故並不對以釋義門也大妄語戒聖人有正語業命故決不妄語也空慧定者准此律中即是無色定中空處定也然准十律第二卷云目連入無所有處定與此不同也目連語濫者濫似妄語也以出世間法誑他得罪者不然應言以過人法誑也以其有漏定等誑人亦夷而非出世法也下准應知餘吉是凡者謗妄兩提之下因吉也蘭吉二妄通誑三趣者妄謗因蘭即是誑人若稱勝法對非人蘭即誑非人若對變畜稱聖得蘭即是誑畜故知蘭妄通誑三趣也次論吉羅提下因吉即是誑人對非人妄蘭下之吉即誑非人對不變畜大妄得吉即是誑畜故吉亦通誑三趣也第三虗實者謂境虗實也如妄語時身中實無勝法可緣名為境虗由實不得聖知在身故心既知無勝法可緣而口違心復是心虗故俱虗也蘭吉兩妄義同上二者三趣蘭吉隨其所應若稱聖法即是俱虗若稱凡法唯取心虗犯也殘提二妄境難是事通於內外非是聖法無問境之虗實但使心虗皆成妄語者意說大妄約理而成頗有約事亦成妄不故今釋云境雖是事等也首律師云自三根名內他三根名外也彼人不清淨者境實心虗者如下文言若彼人不清淨不見聞疑彼犯波羅夷便言見犯僧殘此即顯其境實心虗也有想不妄可得出者是境虗心實者儻若出者作文應言若彼人不清淨不見聞疑彼犯波羅夷是中有見聞疑想便言見聞疑犯若作此說便稱實心不成謗罪是故謗戒不得出也今詳此句名境虗心實者無實三根不稱口說名境虗也心中橫想謂有三根口說稱心名心實也疏意雖亦然有違妨前句既約彼人不淨名為境實何故此中不約不淨名為境實人此既約無實三根名為境虗前句何不約無三名境虗也今且為救汎論境界或二或三所言二者一是心內所現想境如實無三橫想謂有當橫想心有三相現二是心外實事之境曲開為兩一約實行彼人不淨二約實相彼人身上實無三根即以無三名為實相今者為成句數差別所以前句境實心虗即取實行以為境實今此所論境虗心實即取實相以為境虗後諸違妨咸准此通也殘提義同者謗殘妄提也離為六心者謗殘妄提各離六心也下雖有文今欲辨異故須懸敘且謗六心者第一句云彼人不清淨不見聞疑彼犯夷便言見聞疑犯得殘第二句云彼人不淨不見聞疑彼犯夷生見聞疑想後妄此想便言見聞疑犯得殘第三句云彼人不淨不見聞疑彼犯夷是中有疑便言無疑見聞疑犯得殘第四句云彼人不淨不見聞疑彼夷是中生疑後便妄疑便言見聞疑犯得殘第五句云彼人不淨不見聞疑彼犯夷見中無疑便言有疑見聞疑見聞疑犯得殘第六句云彼人不淨不見聞疑彼犯是中無疑後疑妄無疑便言見聞疑犯得殘次辨小妄六心者第一句云不見聞觸知言見聞觸知言提第二句云不見聞觸知有見聞觸知想便言不見聞觸知提第三句云不見聞觸知意中生疑便言無疑見聞觸知提第四句云不見聞觸知無疑便言不疑不見聞觸知提第五句云不見聞觸知無疑便言有疑見聞觸知提第六句云不見聞觸知無疑便言疑不見聞觸知提復有一六第一句者見聞觸知言不見聞觸知反前廣說此二六中若境若心隨其所應稱口所說名之為實不稱口說名之為虗然就境中有三重境如前已辨隨應決了如應當知對小妄辨異者謂舉謗六對小妄六以辨異也此中辨異境虗實並約實相境判也咸是境心俱到者即是虗也謂境心俱虗也前辨四句云彼人不清淨者境實心虗今此復言六心皆是境心俱到者前據實行境說此據實相境說故不同也如自言毗尼者下滅諍犍度制自言治法文中但言自今已去與諸比丘制自言治法既不簡別故一切犯皆問自言也解有多說者即古今說不同也章中兩說前說即是雲遵同說故云多說須有自言者謂律文中就易治者說故須有自言也僧尼二覆不同者尼覆夷戒由罪重故須眾治罸故戒本云若比丘尼知比丘尼犯波羅夷不自發露不語眾人不白大眾若於異時彼比丘尼或命終或眾中舉或休道入或外道眾後作是言我先知有如是如是罪是比丘尼夷不共住述曰既云彼作是言我前知有罪即是不問白言也大僧覆麤戒中既無自言良以非壞眾故故不同也今此戒中有不問自言者緣中根本慰問比丘汝等以何方便不以飲食為苦本不問犯彼即自言也實得道戒下開文中增上慢人亦是不犯以無緣起不牒入戒本也除夢亦爾者漏失緣有即牒入戒夢婬亦開緣無不牒也然不要緣有即牒故章云雲沓婆等相差別也制意應云勝過人法非是愚夫之所能契以未得故已下如章諸言聖法皆改為勝者好也或如瑜伽論云善故名聖無漏故名聖義即通也作境實或提吉者向未具說提不同意比丘說吉也或全無犯者向同意說也闕五作非過人法蘭者多論第三若實不誦自言誦阿含毗曇自言毗曇師律師坐禪阿練若盡蘭闕六或得蘭虗稱他聖或教他自稱也具七方便者闕通有一闕別有六言六者闕初境差闕二想疑闕七八即餘三也下諸戒更不辨也反名前事者意說六年未羯磨受但可相依說為師弟後結集家名前相依以為和上捨和上等義亦同爾者初戒中捨和上文亦同此釋也尊者曰此義不然五年未制羯磨受戒明知未有捨和上事事既未有云何反名若但相依說名和上捨此和上應不失戒故知初戒結集之家集一代事本自無妨此戒和上可如前釋通名和上和上此翻學故未曾有經諸天稱野干為和上也今詳未曾有經是為經也文三可知者一禮覲二慰問三實答也文言或有實或無實者祇第四云佛問為實爾不答云世尊我讚三寶舍利弗等是實自讚不實佛言寧散灰土利刀破腹不妄稱聖而得供養說戒文二者初戒科文云初明戒本說之儀則比丘義已下廣解戒本四句之相章引十律蹔伏煩惱者彼律第二云因別相觀定故貪嗔不起戒本中配生法二空及初果者准成實宗創學生空觀五陰中不見眾生次學法空觀陰體空得空解時名入𤏙等然猶有相之所間雜後觀純熟無相決定不被相間名入見道得初果等如初卷記以廣分別崇云此生法空言深違理教者成實理教現有明文何因說違也疏意雖爾今更別解實無所知者下自言之中不知不見是也准下釋相云不知不見者實無知見也諸無間道說之為知諸解脫道名之為見或可創達名知重推名見此之知見通攝一切有漏無漏脩慧所攝一切觀門實不知見故云實無所知也自稱言我得上人法者總顯違心妄說勝法也准下釋中有總有別且總釋者信戒施聞智慧辨才名上人法且人法者謂人身中陰界入法今上人法超過人法即是信戒乃至辨才此是出要名上人法信為初入戒為法器施為資粮引聞思脩律云智慧即思修也修慧既滿依證分別為人宣說故須辨才問信戒施聞及以思慧既非過人何用明之答得脩慧者信等方滿自顯己滿故成夷罪非謂直稱信等而已次別釋者如後律文即於脩慧相應隨轉開十四章如後應知我已入聖智者別顯無漏過人法也勝法者者別顯有漏過人法也餘文易了文言信戒者章云理解之信者意顯緣三寶得無漏信也戒即無漏道俱戒也此二即是四證淨體亦名四不壞淨如上受緣中已略分別文言施者疏主意說無貪善根與勝法應也辨才即四無礙解至下受戒犍度明之法義詞辨身念處等如上偈序中略釋三十七品中辨之不放逸者善大地十數之中不放逸數也然此意顯與勝法相應心所數也精進者章云正對今詳且可五根五力覺支中進根進力進力覺支進道支也此亦善大地中精進也初門有三者謂依成論入道次第初得生空次得法空後入見道斷見道或得初果等也謂從五停心位乃至念住學觀生空如章云從身念觀得生空之解此顯五停心位觀身不淨與念住位以為加行觀境雖同對治有異謂五停位對治貪行身念位中對治例然此二位俱緣於身以之為境觀為不淨或苦空等通名身念也故成論十四身見品云初教觀身破男女相故次以髮毛等分別身相但有五陰又第十七滅法品云觀空者不見假名眾生如人見瓶以無水故空如是五陰中無人故空已上證生空越度生死者當越度之非謂生空位中已得越度也次入法空者如章配脩習已下文也即滅法品云有實五陰心名為法心善脩空智見五陰空法心即滅又云若證諸陰滅則五陰不復現前成假名因緣又云若破壞色是名法空且舉滅色陰身見品云五陰散滅是為法空且舉五陰滅也然詳創入法空位中名入𤏙位乃至次第入世第一故第三卷四法品云又以無常等行觀五陰時謂無常苦空行以觀陰滅生順泥洹下𤏙善根能令心熱名為𤏙法𤏙法增長成中善根名為頂法頂法增長成上善根名為忍法忍法增長成上上善根名世第一已上論文然此四位雖觀法空猶被有相之所陵雜故滅法品引法印經說行者見色等無常敗壞虗誑厭離之相是亦名空但未是清淨是人於後見五陰滅是觀乃淨故知諸陰滅述曰𤏙等位中用無常觀引起空觀故觀無常以知虗誑然雖觀空而未決定見諸陰滅後決滅時觀得清淨方名入道如章意顯入見道後配守護已下文也故彼第三卷四諦品云見五陰滅名初入道從是次得七菩提分已上論文解融莫二者能觀智解融會空理平等無二也問所緣空理即是滅諦為有體不答准彼宗中空無有體故二十四五智品云問曰泥洹非真實有耶答曰陰滅無餘故稱泥洹何所有耶又云以盡滅故名為泥洹猶如衣盡更無別法又云問曰令無泥洹耶答曰非無泥洹無實法見或永移者入見道永斷見惑故稱永移謂離身中也問彼宗初果已證無相後後諸果更何所作答雖證無相有時還生故須數脩令相永滅故五智品云問曰以無我智能滅諸相第二智等更何所用答曰諸相雖滅還生是故須第二等乃至隨於何時諸相滅盡更無相生爾時名阿羅漢已上論文上來成立雖已備陳然崇破云尋破云尋此妄情轉違理教豈有念位中已得二空無相夫人空者聲聞所行法空觀門菩薩位有如何忽以此言配文解釋此違入道次第亦乖經論宗途此尋舊疏數本皆然如是重抄獲何福利唯顯造者不善宗文復益學人妄傳無義故今改蹤聊申正解依前重寫恐轉成非冀諸智人思文察義希弘聖旨永播真詮拾遺抄云夫論二空無相非凡所尅豈有身念位中已得成就又人空者聲聞所脩廣說乃至此違入道次第亦乖大小宗途今詳身念引起無相誰言身念即是無相又復法空出自成實龍猛菩薩亦有明言故智度論第四十云佛後五百歲分為二分有信法空有但信眾生空言陰是定有法但受五陰者空述曰世間執我能受五陰之身此則空也又云復次我空易知法空難見所以者何我以五情求之不可得但身見力故境想分別為我若法空者色可眼見聲可耳聞是故難知述曰既言有信有不信者明是聲聞之所諍論不應云是菩薩所諍以其菩薩必信法空故也問聲聞若許證法空者與菩薩何別答聲聞但了五陰身空未必了知不離唯識豈同菩薩遍達法空了唯有識若爾何故唯識等論唯證生空答不能盡證一切法空故隱不說猶如聲聞亦能少分斷所知障而非全斷故但說其斷煩惱障故不相違上來雖且順疏消釋竊尋文相應須更釋今暇論也究尋道理位應局定者謂且竪通諸門之義故云類然一一門中約位橫尅則不如是故云位應局定也且如文言自言持戒若無漏戒見道初起守護觀察名初入道故守護前諸文應劫即非一向始終相似不得定言餘皆類然也空無相等者薩婆多宗四諦各四行相苦四行相者俱舍二十六且一釋云待緣故非常逼迫性故苦違我所見故空違我見故我集四行相者如種理故因等現理故集相續理故生成辦理故緣譬如泥團轉繩水等眾緣和合成辦瓶等滅四者諸薀盡故滅三火息故靜無眾患故妙絕眾灾故離道四者通行義故道契正理故如正趣向故行能永超故出空無相等三三摩地隨配如章俱舍二十八云無相三摩地謂緣滅諦四行相應等持涅槃無十相故名無相緣彼三摩地得無相名十相者謂色等五男女二種三有為相無願三摩地謂緣餘諦十種相應等持非常苦因可厭患故道如船筏必應捨故能緣彼定得無願名皆為超過現所對故空非我相非所厭捨以與涅槃相相似故因言正受者崇云梵云奢摩他此翻云止止者是定言正受者譯者謬矣今詳梵云三摩鉢底此云等至謂離沈掉平等而至故云等至此即定之異名舊制正受即離沈掉故名為止領受至身復名為受處處經論皆言無想等至未曾見名無想止也八背捨或名八解脫對此略以六門分別一辨差別二釋通名三明相別便釋別名四出體性五依身依地六相生次第且初門者總尋一切大小教文有五差別一有對治障門二引神通門三斷煩惱門四不共德門五轉棄背門小宗多明轉棄背門大宗多明對治障不共德門小宗全闕引通斷或小隱大顯然上來伐諸家章疏偏通雜引譏不可依如瑜伽注已廣分別今且略依棄背一門以示其相或因義便少顯餘門第二釋通名者婆沙八十四云問何故名解脫解脫是何義答棄背義是解脫義問若棄背故名解脫者何等解脫棄背何心答初二解脫棄背色貪心第三解脫棄背不淨觀心四無色處解脫各自棄背次下地心相受滅棄背一切有所緣心故棄背義是解脫義此即釋棄背門尊者世友作如是說心於煩惱解脫清淨故名解脫准此示顯斷煩惱門大德說曰由解脫力而得解脫故名解脫准此亦顯引勝德門脇尊者曰有所背捨故名解脫背即棄背捨即捨煩惱也此即二門合辨第三明其別相便釋別名者先列名次方辨釋且列名者八十四云一有色觀諸色解脫俱舍二十九云內有色想觀外色解脫二內無色想觀外色解脫三淨解脫身作證具足住四超諸色想滅有對想不思惟種種想入無邊空空無邊處具足住解脫此顯棄背門若約餘門但應云空無邊處解脫下准此知五超一切空無邊處入無邊識識無邊處具足住解脫六超一切識無邊處入無所有處具足住解脫七超一切無所有處入非想非非想具足住解脫八超一切非想非非想處入想受滅身作證具足住解脫次辨釋者初二解脫其相稍隱今以理推自有二門一者初脩二者後起且初脩者婆沙八十四云有色觀諸色者謂內各別色想未離未捨未除觀諸色者謂為離捨除內各別色想由勝解作意觀外諸色若青瘀若膿爛若膖脹若骨鏁是初解脫述曰若已離欲雖於欲境無有貪愛然亦見其青黃赤白等可意之相於斯可意色境之中未能觀為青瘀等相由別色想未捨未除也今為捨除內色想故故脩勝解觀外諸色作青瘀等次辨第二解脫且諸初脩者八十四云內無色想觀外色者謂內各別色想已離捨已除觀外色者謂不為離捨除內各別色想而勝解作意觀外諸色若青瘀等述曰謂已能觀作青瘀等故名已除內別色想而復欲令觀用轉勝更觀外色作青瘀等上來已辨初脩義訖次辨後起者問既是後起必知內色已捨已除是則應名內無色想何得復名內有色想觀外諸色名初解脫答有二義故名為內有色想觀外諸色一者定前加行不起分別我今此身內無色想而直作心觀外諸色名初解脫若於加行先起分別我今當作內無色想觀外諸色此即名為第二解脫觀麤而復劣第二解脫細而復妙故不同也故婆沙云復次加行由無色想究竟時觀外色故名內無色想觀外諸色大乘宗中具有初修及有後起如雜集論今不暇論第三淨解脫婆沙八十四意說第三解脫亦是內無色想觀外色然第二觀緣不淨境若第三觀緣淨色境何以然者謂觀行者為試善根若觀不淨不起煩惱未知觀淨起煩惱不又觀不淨令心沈蹙今令蹔悅故復觀淨俱舍二十九兩義同此然此但能總觀淨相不同勝處能別分別青黃赤白也身作證言後當解釋第四超諸色想滅有對想不思惟種種想入無邊空空無邊處具足住解脫者八十四意云超諸色想者謂眼識相應想滅有對想者謂滅耳鼻舌身識相應想理實離欲界染時已超鼻舌二識相應想離初慮時離餘三識相應想今者復離第四靜慮染起彼所依是故說言超諸色想滅有對不思惟種種想者謂不現起第四靜慮意識相應諸雜亂想入無邊空者脩此觀時於加行位思惟墻上樹上舍上諸虗空相取此想已假想勝解觀察空相展轉引起初無色定今詳若以六行離染即猒下地為苦麤障緣空相為靜妙離故從加行以為其名名空無邊處也既脩成滿亦能遍緣四聖諦境及以虗空非擇滅境復於空處善四薀法得獲成就名具足住第五超一切空無邊處入無邊識識無邊處具足住解脫者謂加行時思惟清淨眼等六識取此想已假想勝解觀察廣識展轉引起第二無色此即名為超於空處餘義准前第六超一切識無邊處入無所有處具足住解脫者謂脩此時棄捨下地緣於廣識無邊行相假想之心名無所有餘義准前第七超一切無處有處入非想非非想處具足住解脫者謂復止息無所有處麤心心所非如七地有想定故名為非想非如無想及滅盡定故非非想餘義准前第八超一切非想非非想處入想受滅身作證具足住解脫者脩此之時如婆沙百五十二意說云若入無想定作出離想計為涅槃若入滅盡定由猒想受作止息想先起欲界善心次入初靜慮次入第二靜慮如是乃至入無所有處次入非想非非想處於非想非非想處上中下心從上入中從中入下下品斷入滅盡定譬如女人續毛為縷除去麤者縎繢細者乃至將盡以手繩之入滅盡定俱舍二十九意說定前有三種心一者想心二微細心三微微心從微微心後方入此定又俱舍云何故經中第三第八說身作證非餘六耶以於八中此二勝故於二界中各在邊故述曰一由勝故謂實八種皆依身證而三八勝獨得其名二由邊故第三唯依第四禪故第八唯依非想地故順正理第八十有一釋云唯第三八說身證者舉二邊際類顯所餘色解脫中淨為邊際於諸無色滅定為邊此意義同對法第十三云謂由第三於有色中障斷盡故各證轉依名身作證謂轉依名身也上來既已廣辨相訖其差別名隨義自顯第四出體性者俱舍云八中前三無貪為性近治貪故并其助伴五薀為性次四解脫以四無色定善為性此簡無記染及散善一釋通取近分地中諸解脫一釋唯取根本地中立為解脫順正理意將後為正婆沙八十四以四薀為性者通眷屬說也第八解脫即滅定為體婆沙云以不相應行薀為性是也第五依身他地者先辨依身者婆沙八十四云初三解脫依欲界身起想受滅解脫依欲色界身起餘四解脫依三界身起大乘宗義如瑜伽注此無暇辨次依地者婆沙俱舍意云初二解脫能治欲界及初定中顯色貪故依初二定第三解脫依第四定以第三空勝樂所迷故依第四棄不淨觀四無色解脫各依自地滅定解脫依非想地唯大乘宗初二解脫各依四定餘同小乘亦如瑜伽注釋第六相生次第者婆沙八十五云從解脫入勝處從勝處入遍處又云小善根名解脫大善根名勝處無量善根名遍處此同瑜伽第十二云脩觀行者先於前緣思惟勝此顯解脫次能制伏此顯勝處既於制伏得自在已後即於此遍一切處如其所欲而作勝解此顯遍處又云譬如世間瓦金䥫師和泥等未善調練解脫位亦爾如善調練勝處位亦爾如調練已隨欲轉變遍處位亦爾所餘廣義如瑜伽注上來略辨解脫義訖勝處遍處准此應知謂八勝處即從初三解脫流出遍處即從後四勝處之所流出加觀四大及以空識義准解脫不復繁論也次隨疏釋滅二十一心心所法等者有宗諸心於一切時必與通大地十法相應今欲入定加行必善復與善大地十法相應即是二十并第六識為二十一餘識不能隣次入定故不說之然滅一心起一定體定體即是不應行別有實物能遮於心令其不起或有欲令滅二十二心心所法謂隨忻厭二心加行入定隨滅忻厭中即二十二也然忻厭心若心所中別建立者可作此說若或不立即前說為足也除入正受者或名勝處章云除猶捨入者解意顯捨者勝煩惱故解即悟入義也理實入者處也古譯為入誤也婆沙八十五問何故名勝處勝處是何義答勝所緣境故名勝處復次勝諸煩惱故名勝處已上論文言制入者入即是處處謂外境勝解作意制伏境故名為制入初二勝處即初解脫次二即是第二解脫後四即是第三解脫有差別者解脫是劣勝處是勝又前棄背今即制伏也一切入正受者亦名遍處一切是遍入即處也婆沙八十五云問何故名遍處遍處是何義答由二緣故名為遍處一由無間謂託青等勝解作意不相間雜故名無間二由廣大謂緣青等勝解作意境相無邊故名廣大大德說曰所緣竟廣無有間隙故名遍處又云從淨解脫入後四勝處從此入前八遍此中解脫唯於所緣總取淨相未能分別青黃赤白後四勝處雖能分別青黃赤白而未能作無邊行相前四遍處非唯分別青黃赤白而亦能作無邊行相謂觀青等一一無邊復思青等為何所依知依大種故次觀地等一一無邊復思此所覺色由何廣大知由虗空故次起空無邊處復思此能覺誰為所依知依廣識故次復起識無邊處此所依識無別所依故更不立上為遍處論文云問解脫勝處遍處有何差別答名即差別可知復次下品善根名解脫中品善根名勝處上品善根名遍處等如彼廣解自言有道者古師依成論十一定具者不然此中意明成大妄語答言持戒餘食知量減損睡眠豈成大妄故依舍利毗曇解者為正或有疏本闕者是前出疏本宜寫足之也次當配釋成論二十一遍釋其相彼論初五定具品中列名者章中不次彼論云七具善信解八具行者分餘同章中也一清淨持戒者論曰問云何名淨持戒答若行者深心不樂為惡非謂畏後世及惡名等名淨持戒又說戒為平地能觀四諦又法應爾若無持戒則無禪定猶如治病藥法所須如是治煩惱病若無持戒則法藥不具二得善知識者論云問曰何故但說善知識耶答經中說阿難問佛我曰安座一處作如是念遇善知識則為得道半因緣也佛言莫作是語善知識者則為得道具足因緣所以者何生老病病死眾生得我為善知識則皆解脫三守護根門者論云行者不可閇目不視但應一心正念現前此即根律儀四飲食知量者論云問曰飲食以何為量答曰隨能濟身若食不增冷熱等身病貪恚等心病是則應食五損於睡眠者論云問睡眠強來云何除遣答行者見得人身諸根具足得俱佛法能別好醜是為甚難今不求度何當得脫故勤精進以除睡眠六具足善覺者論云若人雖不睡眠而起不善覺所謂欲覺瞋覺惱覺若親里覺國土覺不死覺利他覺等寧當睡眠勿起此等諸不善覺者於非親里中欲令得利令其實貴安樂能行布施不應起如是覺何以故不以念故令他得樂俱自以此壞亂定心利少過多故七具善信解論云行者若能好樂泥洹憎惡生死名善信解八具行者分論云如經中說五行者分一謂有信於諦寶心無疑悔二不諂曲以質直心是則易度如人向醫具說病狀則易救療三少病若多疾病則妨行道四精進為求道故常勤精進五智慧以有智故得果此第七八疏中翻倒也九具解脫處論云五解脫處一者佛及尊勝比丘為之說法隨其所聞則能通達語言義趣以通達故心生歡喜故身猗身猗故受樂受樂則心攝是初觸解脫二者善諷誦經三者為他說法四者獨處思量諸法五者善取定相謂九相等皆如上說取定相者先至塚間取青瘀等相明記在心還至住處一心等想此五之中前三顯聞慧第四思慧第五脩慧也能生解脫之處處是生長門也如瑜伽第十四應知十無障者無三障若離諸障則堪受道十一不著者不著此岸彼岸木淡中流此岸謂內六入彼岸謂外六入中流謂貪喜等次述正義依舍利弗阿毗曇解十一支道者問寧知此論與律相應答今推律此律是法藏部如上分部義中略已辨說然佛滅後三百年餘犢子部法上部賢胄部正量部密林山部五部皆弘舍利弗阿毗曇如部執疏及智度論第二說然法藏部雖無文說云弘此論此部亦是三百年後興於世舍利弗既是法輪大將諸部欽重何所復疑故集律時指同論說又此律說又五百結智度論第八云犢子部說五百纏故示義同犢子部義故所弘論亦應是同又准僧祇第四大妄戒從三法數增至十其中亦有四念處等五解脫處六出界六念六通九想九次第定十無學等相亦似同舍利弗論十一支道也若准真諦部執疏說四分律即是法上部舊雲律師等亦云此律是法敦部其是一也准即正弘舍利弗論以此推徵故依舍利弗論以為正義崇云古舊皆取成論十一定具或依舍利弗阿毗曇取十一種集數法門此等並非今解謂是逆觀十二緣起以老死支由生故有乃至行支由無明有不應復責最初無明以誰為因故但十一乃至此解順理不違法相往哲不識此文錯作異釋拾遺抄云斯等皆欲配數相當而不究尋是非道理然十一支道義旨全殊謂是逆觀十二緣起等今詳若言逆觀十一何因不說順觀十二竊尋經論大小乘宗逆順觀法總十餘門或有逆觀五支或十六或復十一或觀十二寧知逆觀十二緣起即為正義然破云斯等並欲配數相當等者今尋崇釋亦是以其支名相似若支名同即是正義今應示彼多十一支且婆沙八十云四靜慮支名有十八實體十一俱舍二十八亦同此說又婆沙九十六云尊者達羅達多作如是說世尊有時說一支道有時說二乃至有時說三十七即三十七菩提分法即准此中復有一種十一支道也又云問菩提分法名有三十七實體有幾耶答此實體有十一或十二上偈序中已述其義俱舍二十五亦云毗婆師說有十一上來既有多十一支何理定知逆觀為正尋諸觀門數有無量此戒理合攝法寬多由妄語時並容說故何意要使取少遮多獨取逆觀令義不足故依舍利弗論深契正理義方圓備耳問舍利弗論十一支中云有六念豈稱六念即犯夷𠎝答僧祇文中說有六念良以修定若心沈蹙欲䇿令欣故脩六念也或在散位或在定中並六念理俱無失瑜伽十四分判六念前三名為歸依具足後三名為得證具足如彼廣說次當釋疏十一支道者釋名應云趣向涅槃名之為道支分故支道支道不同有十一數故云十一支道也彼論十三十四兩卷廣釋十一支道不可具敘今略逐難屬當而已四向道者向苦道難行向苦道速行向樂道難行向樂道速行婆沙九十三名四通行一苦遲通行二苦速通行三樂遲通行四樂速通行謂未至定靜慮中間三無色定諸鈍根者所有聖道名苦遲通行即此諸地諸利根者所有聖道名苦速通行四根本靜慮諸鈍根者所有聖道名樂遲通行即此諸地諸利根者所有聖道名樂速通行問何故名通行通行是何義答能正通達趣向涅槃是通行義近分無色難成辦故所起聖道說名為苦根本靜慮易成辦故所起聖道說名為樂由鈍根者所起聖道不能速趣究竟涅槃故說名遲諸利根者所起聖道疾趣涅槃故說名速四修定者一者有脩定親近多脩學得現世樂二者得知見三者得慧分四者得漏盡多脩亦爾得世樂者如比丘離欲惡不善法乃至成四禪得知見者如比丘善取明相若晝若夜以心開悟不䨱盖心得慧分者如比丘知受想覺若生若住若滅得漏盡者知五陰集知五陰滅述曰此中意顯四禪方便天眼方便初果方便漏盡方便以立四脩謂欲離故見生死過故入聖中初勝後極故立四脩也四斷者戒斷微護斷脩斷知緣斷戒斷者謂防護六根微護斷者謂分別身青瘀膖脹等善取其相是微護斷脩斷者脩七覺分離欲無染知緣斷者如比丘如是思身不善行口意亦爾斷三惡行脩三善行述曰瑜伽二十九釋四正斷中分為四斷一律儀斷謂花已生惡法修律儀斷即此戒斷也二斷斷於未生惡為令不現行故修斷斷即此文中節四知緣斷也四防護斷於已生善修令不妄即此文微護斷也瑜伽六十六復以四正斷配四種脩一者得脩謂未生善法令生即是脩斷二者習脩即已生善令增即當防護斷三除去脩即已生惡令其斷滅義當律儀斷四對治脩即未生惡令不生謂即斷斷也今釋此文大意者律儀斷者謂根律儀於生已惡速起正念及以正知守護根門名為戒斷非謂身語表無表戒此但伏現行也言微諸者防護力微未能永斷煩惱種子但於不淨觀等已生少分善根脩令增廣微護貪心不令現行名微護斷言脩斷者未生善根七覺支等欲令現起引入現觀故名脩斷此意將入現觀脩七覺支不同薩婆多覺支負在脩道位也言知緣斷者謂以聖道遍知所緣四聖諦理令未生滅種永更不生名知經緣斷四種皆名斷者斷障也五解脫入者第十四釋云五解脫處者同前定具是中成論說也五出界者彼論第七卷釋謂比丘念欲時心不向念出時善調善脩心是名出欲界復次念嗔恚時心不向念不嗔恚善調善脩心是名出嗔恚界念害時心不向念不害善調善脩心是名出害界念色時心不向念無色善調善脩心是名出色界念自身心不向念自身滅善調善脩心是名出身界准瑜伽第十四約斷三界煩惱立五出界彼云脩觀行者有五種觀察作意能令三界煩惱永斷究竟決定廣說如彼意云於欲無欲自試觀察若或未斷心臨趣入若已斷訖任運棄捨恚害等准知於中前三出欲界第四出色界第五出無色界由此應知出欲色界顯有學人或通凡夫出無色界局是無學然基法師云凡夫有學學觀出離非能出離今作五觀是無學人已能出離名順出離觀故不說凡夫有學也今詳法師不尋瑜伽第十四直見瑜伽第十一文懸作此釋故違彼論下文也具如瑜伽注釋五觀定者觀足至頂乃至薄皮皆是不淨是名初入定觀不觀皮血肉骨但觀人識識住此世亦住他世是名第三入定觀乃至復觀人識不住此世而住他世言乃至者謂以觀人骨也等為加行復唯觀識是第四入定觀乃至觀識不住此世亦不住他世是第五入定觀乃至言准前應知今略述意如婆沙第四十名五現見等至彼意初二觀法異生聖者皆得第三是預流一來者所有第四不還所有第五羅漢所有世尊此五說為無上瑜伽十二名五現見三摩鉢底此翻為等至也意說五種皆是己見諦者所有故名現見謂現見諦理已後而脩此觀故受因名也婆沙意說現見現謂由眼見色引生此觀故云現見後三觀識亦由見色展轉引生故名現見與瑜伽不同也於此五中若是羅漢作觀者初二隨應通自身他身不淨第三觀預流一來身中識法俱住二世謂住現所居世應更受生及亦應往二界受生故云此世他世也第四觀不還人身中識法唯往他世第五觀羅漢識一切生書大分為知不淨無常也餘人起觀准此應知廣如瑜伽注釋五生解脫法者身不淨想食不淨想無常想世間不可樂想死想如是五法法親近多脩能得解脫今詳前二是離欲界染而觀欲界身食二相以為不淨以除婬愛并段食貪次脩聖道觀無常行以入見道次觀色界為不可樂離色界染而諸愚夫樂三禪樂今觀可猒故不可樂復觀無色雖復長壽而必歸無離無色染由此五種離三界染故云生解脫法也六向者應言六空傳寫論者錯為向字也前第十三卷列名中云六向此第十四釋云六空者如空三昧說即前第十三卷釋空三昧云內空外空內外空空空大空第一義空述曰略辨相者內空除遣緣內六處貪也內外雙遣也空空遣前空相也涅槃意說空及空性也大空遣三千世界大相也涅槃十六釋大空者般若波羅蜜是名大空即約空慧名空也第一義空除遣執第一義相也廣解空義如大般若五十一釋二十空四百八十八釋十六空涅槃十六釋十一空智度論四十六釋十八空瑜伽七十七解深密第三同釋十七空並不可繁敘廣如瑜伽注釋六出界者第七卷意說四無量出欲恚害不樂界此意說欲界此四種所治性無相定出相界謂一切有相相斷我慢出疑惑界總述意者初四有漏後二無漏無漏之中無相三摩地學人亦得斷我慢者就勝即空解脫門理實亦通三解脫門唯無學人得亦如瑜伽注釋出疑惑者昔見道時斷非想疑今得解脫并昔合說也瑜伽十一云復有六種順出界如經廣說乃至慈對治恚無損行轉故悲對治害為除他苦勝樂行轉故謂與眾生勝樂行解心也餘皆准此喜治不樂於他樂事隨喜行轉故捨治貪恚俱捨行轉故大乘捨無量雙治貪恚小宗但治貪無相對治一切眾相相相違故若離我慢於自解脫或所證中定無疑惑故乃至前之四種梵住所攝第五第六聖住所攝今詳瑜伽下文第十四云有三處諸脩行者難可超越一者超越欲貪恚害不樂所攝下界二者超越一切行行相現三者超越有頂為超此三五六出界廣說如彼謂超前四立四無量治下欲界為超第五一切眾相立無相相三摩地為超第六立斷我慢人即第十一文云觀察聖住得道理建立無相觀察究竟正道理故建立第六此意說言創得無相理故立無相三摩地顯初見道即通有學故言得道理也後盡惑時建立第六故云究竟即顯無學也無學既斷我慢即顯得空解脫門也答言三三摩地通有學無學若言三解脫門唯論無學以其有學未永解脫故不立為解脫門也准此前四超越欲界即不還人亦通凡夫第五無相雖顯見道理亦得通四向四果第六唯是無學人不同基法師總判為無學者不審尋文故也廣如瑜伽注釋六明分法者食不淨想無常想苦想無想世間不可樂想死想釋義准前五生解脫法六悅因法者如比丘悅已心喜喜已得身除除已受樂受樂已心定心定已如實知見是名六悅因法身除者除麤重顯得輕安也餘經論中云輕安是也意說㝡初由持戒故自思無過心生喜悅悅已漸次引起定心進入見道如實知見初之一種悅即是因後之五種悅因所生總名六悅因也六無喜正覺者七覺支除喜覺支也此意說依第三靜慮已上起覺支時須除喜支以彼地中無喜根故若依有宗未至定中亦須除喜大乘未至定中亦有喜樂也七想者如世尊說七想親近得大功德至甘露門謂不淨想餘六同前六明分法釋義亦應准前而知七定因緣法者謂正見正思惟正語正業正命正精進正念集異門論名為七定具此意說以七為因緣能生定體也瑜伽十一釋有因有具聖正三摩地彼云前七道支與聖正三摩地為因為具謂正見思惟語業命三此五道支與定為因也正精進正念此三為謂正見一種亦能為因亦能為具也今言七定因緣者即五因三緣也准瑜伽應知此總意者創生正見了生死過患次復思惟居家迫迮次即出家受將禁戒即正語業及正命也從此已後復起聞思正見發正精進及以正念以入定心言聖正三摩地者善故名聖無漏故名聖即通有漏無漏定也廣說如瑜伽論具如瑜伽注釋章云八解脫入者論中言八解脫入勝入也即是解脫及勝處兩法門也九滅者若入初禪語言判滅尋伺能起語言名語言行初靜慮中有尋有伺即是定心相應無欲恚等出離善尋伺也此善尋伺能滅欲界欲應恚害等故云滅也入二禪覺觀判滅第二禪中全無尋伺故也入第三禪善判滅第三禪離喜妙樂故也入第四禪出入息判滅若入空處色相判滅若入識處空處判滅若入無所有處識處判滅若入非想非非想處無所有處判滅若入滅盡定受想判滅是名九滅九次第定者四禪四無色及滅盡定九想者於前七想加斷想離想也釋義准前然斷與離意顯滅諦離欲界繫名之為斷離色界繫名之為離離無色繫名之為滅今由脩前不淨想等離染道時或證下之二界釋滅故故加斷離二想也問若修死想離無色染何故但證下二界滅答死想具有加行究竟或未究竟故未能證無色釋滅也若順瑜伽二十七見道所得一切行道斷名為斷界修道所斷一切行斷名離欲界一切依滅界隨應准知即是二涅槃也十相者即九想外加滅想也義准前知瑜伽第二十婆沙百六十六百六十七廣釋十相前來且據一切釋之後有一切無常苦無我及死想意顯聖道死想究竟即是無明不淨食猒世不可樂意顯聖道加行斷離滅三意顯道果復約一切辨轉隨轉謂十相中三想是轉七是隨轉且如不淨想轉之時四想隨轉謂世不樂及斷離滅其義云何謂修行者先往塚間觀死屍相青瘀乃至骨鏁連接取此相已至一近處閉目諦思若不明了往觀之既善取已疾還所止調滑身心令離諸蓋取先外相以方己身謂我此身具有如前諸不淨相因於足骨以柱踝骨乃至髑髏㝡後繫念在於眉間即從眉間入身念處次第乃至入法念處或復若樂廣觀察者却從眉間次第乃至却觀足骨如是次第或觀一具二具三具一床一房次第觀至海際周迊遍滿皆是白骨從此漸略乃至還來却觀眉間至此觀察不淨想已作是思惟生死諸行何可欣樂爾時便於三界諸行都不貪樂由此先脩世不可樂亦得圓滿由不樂故故欣樂涅槃故先所脩斷離滅想皆得圓滿次辨食猒想轉之時亦四隨轉其數同前謂脩行者起猒食時觀手中食知從糓等糓等復從田中種子種子復從泥土糞穢展轉既從不淨而生誰有智者於中貪着又乞食時晨朝澡漱嚼楊枝時水作尿想楊枝作指骨想着衣入聚落時衣作濕人波想腰縉作人膓想鉢作髑髏想錫杖作脛骨想於道見礫石作骨想至聚落見城壁作塚墓想見男女等作骨鏁想入乞食得解餅作人肚想若作骨粖想得鹽作人齒想得飯作蛆虫想得飯菜作人髮想得羮臛作下汁想得乳作人腦想得蘇蜜作人脂想得魚及肉作人肉想得飯作人血想得歡喜丸作乾糞想若僧中食得淨草作死人髮想坐床作骨聚想所得餘食如前廣說問何須於飲食等作不淨想答應作是思無如生死由於不淨作淨想故輪迴五趣今欲違彼趣涅槃樂故復次勿令生淨想故增益貪心鄣碍聖道故須生猒彼既猒已生死諸行何可欣樂廣說如前次辨想轉時七想隨轉謂脩行者觀察諸法念念生滅彼於春時見諸卉木生花生葉鮮榮紅紺如妙寶色河池津液魚鳥宣戲便作是念今外物生彼入聚落見諸男女歌儛跳躍飲食喜慶即前向之此何故爾答曰此處生男生女便作是念今內法生夏時後見花葉茂盛河池汎溢復念外法今已興盛入聚落已見諸男女擊皷吹貝歡笑雜沓即前問之知有嫁娶便念此中內法興盛復於秋時葉皆黃悴河池漸滅便念外物今已衰悴彼入聚落見諸髮白枎杖而行身形曲僂便念內法今已衰老復於冬時霜風飄擊葉皆在地河池皆渴便念外法今已滅沒彼入聚落見諸男女被髮搥𮌎問知此處父母死喪便念內法今已復滅彼於內外善取相已還其所止調滑身心脩於無想謂如所見諸無常相觀察內身一期諸薀有爾許位諸蘊各異捨餘隨觀一位諸薀前生後滅如是一歲一時一月一晝一夜展轉乃至㝡後二剎那生二剎那滅爾時即名加行圓滿從此無間能觀諸薀一剎生一剎滅爾時名為死想圓滿以諸位滅即是死故彼觀是已便作是念世尊所說諸行無常誠為善說爾時先脩諸無常想皆得圓滿復觀剎那所逼迫故便念世尊所說苦想誠為善說即苦想滿即不自在故念世尊所說無我誠為善說即無我滿既不自在於空行聚不生貪樂便於三界不生樂着即前脩世不可樂而得圓滿既由不樂涅槃如是廣說上來略敘婆沙解釋樂廣慧者應自披尋十直法者即十無學人身中十無漏法攝為五薀如上受緣癈立中略已辨訖此十數中彼論釋諸十遍處也十一解脫入者謂依四禪四無量前三無色心未解脫得解脫乃至盡漏今詳四禪顯所依定四無量者顯能離欲前三無色顯無漏道最後邊際也五分法身如受緣辨等知者新經論中名世俗良以俗智遍緣諸法故立等名然此四智開法類為四諦智由對治故立法類智由所緣故立四諦智二門通辨即成六智此六隨應攝盡無生并世俗智及以他心即十智也各有四法者自身遣使等易知遣使之中更遣使故亦為四也亦可五法自兼使等四也望所稱說類非類等者將實得道對虗說根力覺竟語雖相類得罪非類如文可知法想者應言勝法勝法想等也文言自言是業報因緣者如下下文嚴好比正憶五百劫事十律第二是人前身從無想天命終來生此間無想天上受五百劫隨心想說不犯上來初篇已說然戒本中云不得共住如前後亦如是等者瑤云謂未犯前以人淨故得於二種法中共住若一往犯不得如昔與比丘住故云如前若更重犯亦不預前共住之例故云後亦等又云昔未具位不預僧流今犯如昔故云如前復重犯故云後亦崇義同此也今詳若曾未犯望前與後共住義成今者若犯前共義斷後共更無故云不得如前後亦如是多論第一重犯夷吉更無道器可破故古來共引此律中夷重重犯如尼觸戒一一觸一一夷今詳尼是深防轉根罪滅何得相類若犯尼中後四其義可然若犯四重應准論斷也已下第二篇二謗自在作教人彼我同犯斯亦應言教人同不同也何以然者若定標名汝謗某甲可說同犯若但汎教汝宜謗人應不同犯媒等亦應爾結殘提時不時不得事氏者調達得殘破僧未就也如觸等二者一觸二漏失也緣具者教人謗他損境事成即是緣具八緣也若論懺罪要湏自為業累方遣若當使他緣即不具律文懺法要脩威儀故也污家戒殺種類者如緣中溉灌壞地等也四餘之戒等妄語種類者此第四位中三諫二謗也品別階降已如上辨者䨱律師作持止犯於此中明也多緣多力者假藉多緣多力也壞眾行法者犯已壞行於僧用中非全淨因也事和者羯磨名曰事和也事和為門約以辨遮情和准釋可知壞時者時人住敬心也漏失戒正誹謗者多論第三云世人外道當言沙門釋子作不淨行與俗無異生天龍善神信心者多云若作此事雖復私屏天龍善神一切見之闕此境緣者若將正道闕此非道境緣也緣文三如常者一佛住處二至損瘦已來犯違緣三近緣也名為非因者非樂因也文言此正法中說欲除者集諦斷也說慢者於苦諦中持我起慢也滅除渴愛斷諸結使者顯道諦也愛盡等者滅諦也乱意眼有五過者五分第二云若散乱心眠犯吉見論十二云佛告諸比丘若洗浴意欲眠當作是念我髮未燥當起若夜亦應知時月至某處當起若星至某處念佛為初於十善中隨心所念有人引見論十二夢有四種於此義中全成無用不錄之也祇第五云夢者虛妄不實若夢真實於我法中脩梵行者無有解脫以一切夢皆不真實諸脩梵行者於我法中得盡苦除祇等亦同可知者祇有七色蘇油乳青黃赤白也五分十色於祇七外加紅黑蜜三也十律五色青黃赤白薄也青者輪王及輪王受職太子等也彼經所說等者外道計也婆羅門出家等者信外道故也心心所法領納苦樂者為依於色有心心所領受苦樂安危同故也第六若於內色下舉第四第五者謂舉前四五兩段文也覺云應言舉第三第四者好言四五者錯下准應知覺云疏云三千三百者錯前第三錯前第三錯互成五十句不約情十一事說直爾約內色第六五六三十更有三百句合有三千六百今詳不然無有出精不情者期如為樂故豈非情期故疏已足不不勞更加也教人亦三者一比丘教尼二教二一教餘人見論十二云舉體有情唯除髮爪及燥皮無精若精離本處至道不至道及出及至餘一蠅得僧殘罪久中夢中等者見論云若比丘心想而眠先作方便脚狹手握作想而眠夜夢精出得殘罪准此不開夢也不先方便不作想可如文說也若以欲想出不淨者見云比丘欲起而捉女人精出無罪何以故為婬事故得吉若至境界夷若觸女身或抱或摩精出不犯以摩觸故得殘文言若見好色者善見云或見女根根起視精出不犯殘得吉若見已動根精出得殘共女人坐亦准此俱驅文中一切不作出意足知犯不也摩觸戒息婬疑者多云人見不謂直捉而已等女異男等者簡異男也又通道俗親疎廣說可知者祇第五云女人者母姉妹親里非親里若大若小在家出家見十二云以念故觸母身突吉羅女姉妹亦如是何以故女人是出家人怨家若母溺水中不得以手勞取若有智慧比丘以船接取若竹木繩杖乃至袈裟若母捉袈裟比丘以相牽袈裟而已若至岸母怖畏應向母言檀越莫畏一切無常今已得活何足追怖若母因此溺勢遂死比丘得以手捉殯𣫍無罪不得棄擲若母於泥井中亦如是祇第五云有女人落水中作哀苦聲求比丘救者比丘作虵想捉出不犯若授竹木繩牽出不犯若比丘言知汝雖苦當任宿命者無罪又云母姉妹親里等文別相見歡喜抱捉比丘比丘當正念住若有異心者殘非畜各四者變作畜女來替作男等三准前應釋五十四者至下釋文其義自顯也九十蘭亦爾觸若得殘不名鄰不名重非重因故盜五得四鄰重是因非因別隣不隣殊故此問答非理也理實擬婬觸但蘭罪本疑盜四得四果蘭非方便也內外境別者身內起染身外不同也再盜不滿相續成盜者下文雖爾非盡理說若同一主盜心未息可言相續同一主一盜一息縱滿百千亦不犯重故亦不定呵辭文三者初俗女二僧三佛俗女初一往宜呵二顯己呵意多論第三婬欲偏多問若欲心多何不作大事破戒答此人根熟應得漏盡又應度此舍衛城中具足千家正少一人是故不作大事諸女人何以來看一以世間多事多諸忩務出家人所住處寂靜安樂故二親近善知識欲聞法故三眾僧房中種種嚴飾彩畵床㯓臥具觸目可樂是故來看何故正食後來又言不必須通一切疑故又云俗人食前多事多緣或作飲食處分奴婢各隨緣已然後相隨登山遊澤或詣僧房又云為聞法故若食前來比丘乞食不在僧坊故諸女人何以入房答謂出家人斷欲清淨信故隨入問曰何故有默有不默者有云欲心多者默然欲心少者不默有云若知識者默然非知識者不默又云人性不同有樂覆罪過者默然不樂藏過者不默有云無有父母兄弟夫聟兒女無所畏難故默有畏難故不嘿十誦第三云不喜者即出房外語諸比丘言大德法應爾耶種種可已諸比丘種種因緣為眾女人說法作禮還去多云為說法者為說佛法眾僧是良祐福田可信可敬莫以小緣故自破善根又云讚歎迦留陀夷種種功德當得漏盡度千家作大利盡莫見小緣自失敬也如上婬戒中說者謂睡眠新死少分壞等亦准調部文故作此釋下文云有比丘與死女身未壞者身相觸多不壞者身相觸佛並言殘半壞多壞者蘭不以有智未命終等者下露坐戒云人女者有智命根不斷此即不用彼也髮髮相觸等如見論若身觸髮即犯殘也既五六雙明此二豈可復得是雙者舉此後文吉羅六句例難古師無文妄立初句為雙也謂昔覆律師云若女來觸有四句一動身受樂此是雙句二不動身受樂此二句得殘復有二句一動身不受樂二不動身不受樂此二不樂故犯蘭罪若比丘有染心發心觸女四句皆殘律文但出女來二殘餘二句蘭并比丘往四句僧殘此六並略今師意云下吉羅中律文六句一樂二不樂此名五位句也三不受樂動身四不動身受樂此二名交絡句五不受樂不動身六受樂動身此二名雙頭亦名雙明句也章中先敘三四交結五六雙頭後方敘其初二立位乘即難云文既五六已是雙明此初二句豈可復得是其雙句此難意云殘中初句若許是雙吉中初二亦應是雙若吉初二許是雙者五六也雙豈容初二復得是雙此反難記次順成云故知初二立位等如章廣說此順成意云准吉六句以釋此中故云今解此中等也謂女觸比丘文中初句義當吉中第一立位直言受樂也文中次句義當吉中第六雙句動身受樂也理應准吉第四交句云不動身受樂今此殘中應有之由此殘中即成三句廣釋如章乃至計為十八句也問吉中六句何意但准三受樂句而不明彼三不樂句章中釋云此是殘位不須不受樂蘭也下八亦爾者今詳不然若提捺等容不動身儻逆摩等云何不動故隨所應更須除之各立位四者女來二句比丘往二句故四也餘皆准此本作重意此三位但蘭乃至如媒三位等者謂本自身擬犯婬過而觸女者有衣等位未成重來一類蘭罪不分殘蘭吉等三罪也如媒亦有吉簡殘位而若擬犯婬欲過失為身媒者亦皆蘭罪不分吉蘭罪不分吉殘等之別也祇云若女人捉足禮者應語言小遠住或時白齒舌令痛不令覺女人細滑又云與女共床非威儀起欲心越動床不相觸蘭一切同木石等准此若女擔重不能上肩請比丘扶不應扶應教餘男子女人佑扶若無餘人比丘應舉者高處令其就擔又云共行水中比丘在後脚蹴水灒女人非威儀若有欲心越欲心蹴水着人者蘭又云乞食時端正女人與比丘食見已起欲想者應放鉢着地令餘人授又云使道巷中與女相逢比丘應住若競行非威儀若欲心乃至觸殘女人捉足下境心有無者女人捉足有境無心謂無前方便心也觸衣鉢等有心無境衣等不是染觸境故戲笑相觸者無染心而因戲笑誤觸也鹿語戒五分云一切天神證知我心者意說天神願知我心從汝乞願此律即是教他作願理准五分義釋之不是全同也如消蘇等者下文有女人消蘇形露比丘見已言汝消蘇彼言大德我消蘇佛言不了了蘭又云時有着赤以女人形露見已語言汝著赤衣乃至不了了蘭述曰比丘意欲名彼女形為消蘇等然不了了故蘭彼若了知即得殘也然今三藏攝法云葉薄即是此方正目男女交會之事極不遜語也古來譯為鹿惡語戒惡罵語等亦是其鹿究尋道理未犯斯戒若的不遜說不軌言方犯此戒縱言交會非鄙惡収然梵本中為諱葉薄遂言葉縛葉縛此云糠麥雖言葉縛意言葉薄欲使聽後無羞愧也今詳此宗定不同彼如文中云若現如相豈得陳說不遜語耶約葉者謂隨一一語葉結也媒嫁戒具緣中計理不用顯事了了也祇律十七二十念為一瞬等若如婆沙百三十六云百二十剎那成一怛剎那六十怛剎那成臘縛此有七千二百剎那三十臘縛成一牟呼栗多此有二百一十六剎那三十牟呼栗多成一晝夜此有小二十不滿六千五百十剎那此五蘊身一晝一夜經爾所生滅無常又云晝夜增減各一臘縛月則各一牟呼栗多三十牟呼栗多成一晝夜於中晝夜多少四類不同增位極長不過十八減位極短唯有十二晝夜停位有十五謂羯栗底迦月白半第八日晝夜停從此已後晝減增各一臘縛至末迦始羅月白半八日夜有十六牟呼栗多晝有十四餘准可知羯栗底月者八月也並西方法黑先白後故知羯栗底迦白半者即九月十五日也末但始羅即九月半已後也黑白准前牟呼栗多者翻為須臾也四類不同者一年之中九月八日已去一白夜增三月八日已去一向晝增即三月八日及九月八日晝夜停故成四類也俱舍十二頌云百二十剎那為一怛剎那臘縛此云十此三十須臾此三十晝夜三十晝夜月十二月為年於中半減夜述曰此薩婆宗義不可會同祇律也女人有二十種者列名中但有十九准釋中間放去婢也成前四事者餘破云理應言於一念或須臾中成前二事也今詳疏意云上二據長時作夫婦事下二約暫時作夫婦事故成四事也諸四句初句皆是三時俱自第二並是前二自後一使第三並是中間使兩頭自第四並是前一自後兩使也語書相參中四句並是前一語後兩書也餘句准此或一法或二法相參作六十四句者謂語書即相各為十六即六十四也今欲辨釋且依疏義廣演其文方明是非也且廣演者諸十六中初四即是純一法作餘之三四即二法作故云或一法或二法相參也且語為頭為十六者純語一四語書一四文已廣出也語即一四語相一四文俱略云指即現相亦如是也次書為頭十六句者純書一四書印一四文中廣出書相一四書語一四文略出也餘兩十六並文略出也章中廣出初十六訖餘三箇十六但言餘三各爾也次辨三法相參章云四十八句者謂語書印相各作十二故四十八然今現文但有十六句也且初十二者語書印為一四文廣出也語書相為一四文中廣出一句餘三略出也已上合初位十二句訖次第二位十二句者書印為一四文廣一句餘三句略出書印語為一四文略無也書相語為一四文略無也次第三位十二句者文並略無一者即相語二者即相書三者即語書次第四位十二句者文亦並無一者相語書二者相語即三者相書即章中釋後三箇十二云但文一四下之二四及餘二頭悉略不辨者如向廣辨尋之可見次辨是非者問此諸句法為據自使相參作之為據三時隨用何法相參作之為據三時尅用何法相參作之為總據前三義作之設爾何失四俱有過一者若據自使相參但應一四更不應多二者若據三時之中隨用何法相參作者即章中釋下之二四及餘二頭悉略不應道理且如與使共詳議云我等但於三法遍用不須尅定初時用語中時用書後時用即應如文三法參中十六已足何須更辨下之二四及餘二頭若更辨者且如第二位中第二四云書即語三以為一四此與初位第一四中諸書即三為四何別以其三法不局用時故無別也如是准知第二位中第三四句與初位中第二四同第三位中第一四句與諸位中第一四句與初位中第三四同第三位中第二四句與第二位第一四同第三位中第三四句與第二位第三四同第四位中第二四句與第三位第一四同第四位中第三四句與第三位第二四同故不應理也三者若據三時之中尅用何法為諸句者謂初用語中必用晝夜後定用即如是展轉為四十八雖理無違何因一法二法參中不辨三時俱語為第一句前二語後一書為第二句中間語前後書為第三句前一語後二書為第四句餘語即等相參亦然不爾耶而文一向純語為四并初時語後二時書為第二四乃至語即相參亦然耶四者若許據三義為句法者一法二法之中闕前所辨四句之法三法參中法復闕前說三時隨用十六句義何但下之二四及下二頭略也據斯理趣盖譯律者不善譯文致義不足也始終互對其文甚多者崇云數過四萬今詳但以計句顯德而實推尋應如前辨方盡理也計句多少此為小事任諸學者耳蘭吉二位各三文者一受語二聞語三不受語也各帶斯闕者本期一法二法三法相參作媒及至臨時三時隨闕也乃至廣句者謂以一女始終互對本期擬媒而至臨時隨闕也媒嫁想者男女未通作已通想和合是也有人云如夫婦已與離書今還和合謂為無罪者是今詳此乃迷教而犯理應殘外更獲無知何因望斷過量房戒四依依樹下依糞掃衣依乞食依腐爛藥若違初作房得殘若違餘之三依如長衣別眾展轉非時不受等及過七日藥並提也牒事相違有主無主有量不量不得同入一翻羯磨也前異語後惱僧前嫌後罵並同一戒也古首律師言前房不處分是第二者彼自問言若爾列文何以在先答煞人戒中云煞畜提㝡初下九十中彼方言初故此亦爾或三二一罪者雖犯後戒然後戒中亦有不處分殘妨難二吉隨事有無故或三二一也然詳疏中作此釋者白乞過量並不得存何名唯闕初緣也若闕第五應有六蘭者雙闕寄在第五闕心中辨故六也末後二團者多論也壞鬼神村提吉者後戒斫樹得吉對神勸忍者見論十五因斫樹故傷鬼子臂樹神白佛佛為說偈若人嗔心起譬如車奔逸車士能制止不足以為難人能制嗔心此事㝡為難樹神聞法得須陀洹神得道者謂須會通也十誦第十樹神云我兒子幼少冬八夜時寒風破竹冰凍寒甚我當於何安隱兒子佛勑餘鬼汝當安止諸鬼以佛語故即與住處多論第三迦葉名多以大辨之一大富貴長者所生故二能捨大富貴高族出家故三能行頭陀少欲知足大法故四國王帝王龍鬼神多知多識所供養故五捨世間大利養小欲知足行乞故如舍利弗目連成就大智慧神通故以成就大功德故名大迦葉作房者多者祇第六云作五百私房也從鳥乞中僧祗第六云暮鳥集時比丘言汝釋軍多鳥各乞一毛我今須用眾鳥少時無聲寂然然不得已各拔一毛着地晨朝復乞爾時眾鳥即便移去異處一宿不樂彼處尋復來還比丘復與眾鳥念言今此沙門奇異喜乞恐我不久定衣都盡段肉在地不能復飛當如之何便共議言我等當去不復宜還賴吒和羅經五分第二偈云賢人不言乞言乞必不賢默然不有求是謂為大人五耶四耶者五耶如智論二十二上婬戒中已引四耶者如智論第二如上第一卷疏釋比丘義中已辨祇第六云屋高下量者邊壁一丈二尺非謂開無過量者古師云下開文中小容身屋但開過量亦須處分也業一緣異或多者章中自釋謂不淨食等言或一者通律師云如三根謗是緣一業異或多者章云五過房是亦如摩觸等言或一者通云再盜滿五成一夷是緣業俱同或多者有餘引伽論第十若比丘大眾中嗔恚手犯沙豆等擲諸比丘隨所着得爾所提覺云如本加行作虗誑心不應時心分離心毀辱心後發一言成口四過謂所欺境及發一言並是一也言或一者一切戒中隨應即是緣業俱異或多者作煞盜等前後不同也言或一者八事成重是今詳所言緣業緣是增上理且應然所言業者加行根本後起為是何業若言隨應皆說為業一咽多罪由加行心多業而實咽者翻令是緣由此一緣暢思故何得判為業一緣異也若言唯取根本業者再盜滿五應是業一何意復名緣一業異故此四句並無異據又五過房言是緣一業異故此四句並無典據又五過房言是緣一業異者理不可據一房為緣若據兩房何非二緣乃言緣一若言房事是一名為緣一何故不言兩業造房業事是一名為業一前後兩房許名緣一何妨兩業名為業名為業一同一罪相故須知乞不乞如下辨者次下義門云順精加法別所為故等也夷論即局謂作四位者母論第六從無臘乃至九臘是名下坐從十臘至十九臘是名中坐從二十臘至四十九臘是名上坐過五十臘已上國王長者出家人所重是名耆舊長宿心念三語者尊者云應言對手若言三語不攝諸有一說者故下皆類此二種分衣者古師云一時僧得二非僧得尊者云准今疏主時僧得者不須作法即無二種應言非時之中一者檀越施物二者亡人物義同非時僧得還成二種也如七非者下瞻波中辨七非義也自然及大小此三各三者自然一者蘭若拘盧舍集僧相傳言准雜寶藏五里俱舍明文二十四指肘四肘為弓量五百俱盧舍故依俱舍者好計有二里也二者可分別聚落盡聚落集三不可分別聚落疏主云八樹間集即七十三步半不可分別依祇律立餘依十律立也尊者云准見論十七阿蘭若界者極小方圓七槃陀羅一槃陀羅二十八肘若不同意者二十八肘外得作往事已上論文准此言不同意者即是蘭若有難集僧應加此一自然為四也肘長尺八六尺為步合有五十八步四尺八寸大界三者一人法二同界二法同食別界三食法二同界小界三者一戒場二難說戒三難自恣准尊者義即十界也大小二界各四者前九界外加食同法別前不取者此但食同作法和通無別界體不解本界故加難受戒前不取者疏主意云此界難用不知分齊故四法現前即人法處事也不在三小者說恣受戒本為集僧結此三故也制所常行者癡狂本為說戒說戒即是制常行也餘二准知者單白局大界者疏主羯磨疏中自解云如說恣德衣鉢異語觸惱白等通者易知如差威儀師喚入眾戒師單白受懺白業是也白四通者如受戒悔殘等類白四局者如滅擯學悔罪處所七羯磨作解念不癡及諸諫等以其違情行罸故僧眾諫勸故並專大界也因起有無者有餘皆言如羯磨中時到已前牒所為事名有因起言無者反此應知若爾章云一切差人無因起者差威儀師豈非是有又此即應第七正辨作法中論何用此辨然疏主羯磨疏中自釋云無者一切差人以非自心但是眾遣故觀此釋意若作法前先有事起依先有事而作法者名有因起所言無者法前無事卒爾而作名無因起即下章中亦言因起問答即是上事又云白中第二牒因起也若時到即是因起何須言牒雖爾亦妨如差教授即先問言誰能教授單白之中文復牒入故有因緣也交治者為道治俗如覆鉢也為俗治道如遮不至也互在眾集前後者如本集僧無為受戒不妨受前作治罸等諸餘法事或復受後亦作不遮也祇律第六路遠雨雪大寒大熱白二差人往指授云僧已示作房處如是三說非容等者使律云非他界僧指授非先年指授也越年者祇云先年也㝡後泥治訖者章中問答可知若准祇律作房疊塼一一得越等亦可與造塔義相似也有經亦同者一僧不處分過量二殘二僧不處分不過量一殘二僧不處分不過量一殘三僧處分過量一殘諸古律本但有第三闕前二句今時律本多具三句故言同也房主得殘巧師得蘭者疏意云文中雖言作者犯而犯名中意含房主罪也次句准同疏意且然而乘文相也此二句亦通結兩者謂不報中亦含不問不問之中亦含不報也今詳此亦不順文相也後釋意云初自作自犯二教人作犯此亦不順文相也以其文中結作者犯何意乃論自他之業故不然也不如前解者今觀兩釋總非應作是說初三並結所教正犯而起方便有遠有近故容犯吉或復犯蘭犯既不定故總云犯也然能教人現前忍可即說有犯不現不現不忍全是無犯不定故闕而不結然初二句有差別者初句自案繩墨令人作次句教他案繩及作三不報結所教四不問結能教也不犯中為僧作者見論十三作說戒堂溫室食堂如此作不為自己住無罪善兼為自己住僧伽婆尸沙多人住屋者見云若二人三人共作屋若一比丘一沙彌悉不犯何以故人無一屋分故若數人分得一屋分僧伽婆尸沙有主房戒多論第三闡陀者是佛異母弟優填王妹兒生大高族出家為道伐樹者祇云與五百金錢尋便安處欲作大房盡五百金錢正得起基起少墻壁錢物已盡復與五百金錢作墻壁竟安施戶牖錢物復盡主人生不信心語心言阿闍梨是出家人用大房為用于金錢可起樓閣而作一房云何不足尊者且還不能復與有薩羅林樹闡陀便斫持用成房母論第五有五種樹不得斫一菩提樹二神樹三路中大樹四尸陀林中樹五尼拘陀樹若佛塔壞僧伽藍壞為水火燒得斫四種除菩提樹若斫得吉者壞威儀吉下壞生戒是此緣起故令得提也
