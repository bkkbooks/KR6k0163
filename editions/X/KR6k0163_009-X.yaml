body:
  text: 離衣宿戒釋名中人衣異處者尊者云人衣異礙者好以其染礙非異處故十一界者藍樹場車船村舍堂庫倉并蘭若處也礙文自見須意可知者若不具六緣或得小罪或全無犯故必須之無正翻者今三藏云一僧伽知譯為複衣二嗢呾羅僧伽譯為上衣三安呾婆沙譯為內衣此三皆名支伐羅譯之為衣言袈裟者乃是赤色之義以乾陀不正染也唐三藏云僧伽致或僧伽胝譯為合或為重謂割之合成又重作也郁多羅僧伽譯云上著衣也言於常所服中最在其上故也安多婆裟或安陀䟦薩譯云中宿衣或裏衣也制五衣多論第四離衣戒云制五衣者為威儀故三衣不成威儀如前說已上論文觀此言餘如前說者蓋是還其前之五義兼此為六章中謬也五百問小衣得著燒香上諜不答無中衣得若不近身淨潔亦得問大衣得著上講禮拜不答無中衣得生疎者五百問云問三衣得用生絹作不答一切生絹衣不見身者乃得著讚歎等者讚歎等讚歎一居士二居士得衣等也多論第四長衣戒云下僧伽梨下者九條中者十一條上者十三條中僧伽梨下者十五條中十七條上者十九條上僧伽梨下者二十一條中二十三條上者二十五條餘如章中五分十八云左葉左靡右葉右靡中葉兩向靡作竟著之極是所宜重數中五百問問三衣應施裏不答不施裏亦得今詳大衣安裏者諸律皆然也今三藏云西方四角無帖南海始見帖之六物者准十誦律二十八云與看病六物觀彼文勢似是三衣乃鉢流漉囊尼師檀也此下衣法自釋六物至彼可見鉢亦正制離何以輕者義准餘衣離而得吉又以佛教如鳥二翼違教故吉也尼不安居得提破夏得吉也此律有受捨之言者下衣法云時諸比丘不知持三衣佛言應受持若疑應捨已更受若有三衣不受持突吉羅上伐受持突衣依僧祇律近代諸德以祇護衣通於一夜與四分異故取十律十律第四長衣戒中亦有受三衣文然准第三十五文具足好故彼律受戒前羯磨師教受衣鉢語言應效我語我某甲是衣僧伽梨若干條受割截衣持三說彼律二十一云若割截若未割截是持我某甲是多羅僧七條受兩長一短割截衣持三說我某甲是衣安陀會五條受一長一短割截衣持三說若僧伽梨漫是僧伽梨漫衣受持若多羅僧漫衣受持安陀會云是衣漫安陀會受持此衣覆肩衣受長四肘廣二肘半是覆肩衣持三說此衣厥脩羅受長四肘廣二肘半此衣厥脩羅衣持三說我某甲此鉢多羅應量受長用故三說已上並是謹錄律文章中所引是彼律第二十一文也此等且據現如法作割截衣說若或受持七條以為安陀會者應言此安多會七條受兩長一短割截衣持大衣中衣並准可知若牒葉者亦即須言牒葉衣持攝葉亦爾不得還言割截衣也漫衣如文可知沙彌受上下衣者應對一受戒沙彌云長老一心念我某甲沙彌此多羅僧五條衣受一長一短割截衣持此安陀會詞句同上覆肩衣者梵云僧脚崎此云掩腋衣即僧祇支翻為覆肩衣是也量如前說舊作祇支偏安左袖下作連裙復祇支外別立覆肩衣者誤也厥脩羅者正言厥蘇落迦此是篅義像其形也其量如前兩頭相對全使令身入其中牽使至臍反襵兩邊令其向後腰條急繫即是其像尼舊五衣宜改就此十誦三十八云六群比丘不著袈裟食佛言突吉羅尊者曰多論見論五有緩急如見論十四問曰袈裟背處欲破欲轉中著兩邊云何轉而不失受答曰先取兩邊合㓨相著然後以刀破背處開然後㓨緣不失受持已上論文准此即緣斷不失緣於多論多論第四云不問孔大小即緣於見論也上色不失受持等並多論文也尊者言若全變白亦應失受一月衣戒但言故壞故知極破同多論也文言有一比丘乾消病者多論第四佛弟子中多病無過舍利弗常患風冷又病熱血問舍利弗有大功德智慧何以有如是病耶文言前世業緣故以過去惱亂父母及以師僧是故有病又云舍利弗智慧利根染染法味常脩智慧及論義法又樂禪定勸作眾事精勤三業無時暫懈臥起不時故有此病有緣眾生應受化故者多論云如佛一日六時常觀眾生隨應度者不失時宜舍利弗第二轉法輪師亦一日六時常觀眾生應度者度宜於遊行自苦病則折損已上並多論文多云問舍利弗有四如意足能以三千世界手中迴轉何以乃言衣重答所應度者不以神通而諸論師可以理屈若現神通長彼憍心乃至又為將來老病比丘作開通緣作一月不離衣法老者三十已上名為老蓋三十夏也憍心者當謗云呪術藥力亦有此能何有可貴也多論九月者多云以因緣故結一月以一月因緣故結九月謂初緣開一月一月中緣事未了業開九月問為一羯磨為九羯磨答曰一羯磨見論十四隨病未差得離宿若往餘方病差欲還道路嶮難恒作還意雖差不失衣若決作還意失衣過十日犯長真諦釋了論云極至八月得離衣宿非安居月佛許作此羯磨夏中非遊行時故十多二文三衣之中俱有離義者多論第四以因緣故聽僧伽梨因僧伽梨聽多羅僧安陀會釋義易知正離一衣不得離二亦多論文也一月等三事通開制者若前安居開受一月等無緣不開故制也文言衣竟者亦受持竟故見論十四云此戒衣已受持離宿得罪定別所釋者定其差別以為所釋也二內內宿內煑也或假僧界而成者或依僧界護衣故也或有村起非全得護以不定故故言或也自然有三尊者言四如上無主房戒已辨之也大小八界亦如彼辨下說戒揵度復當廣釋不可分別聚落依祇律立餘二義十律也隨事故多者由作法故得成大小八界也然望今集互有寬狹者若百里竪標五里集僧或一里竪標五里集僧餘皆准知然今詳之若百里標還百里集恐羯磨時僧在標中如十三難礙羯磨而不成也若望初集亦無強弱者初盡一化爾時自然一切法事皆悉得作與今作法即無強弱也僧法事等並挾者以今自然望今作法自然即弱僧狹唯四人法狹唯白二事狹唯非情也勢分有無中十誦三十七增一序中問若比丘聚落中初造僧坊齊幾許作界佛言隨聚落隨聚落界齊行來處已上律文言通行處古來相傳云百步許謂聚落外又取通行往來之處以為勢分自餘諸文即無勢分也有勢分故制寬令集故名制也若無勢分開狹令集故也問答亦如上者謂師問弟子於何處待若言在二十五肘內即不犯然以祇律通於一夜隨於何時會衣即得也露地直身申臂等者覆地疏皆作露者誤也如下六憐愍中釋之蘭若是弱者由於蘭若是弱者由於蘭若有十界起即不成蘭若故也村強濫弱者濫中若有俗男女來即是村起也各對前人辨者對俗名村對僧名藍義無優劣也使無破離之𠎝者尊者云亦可但無離衣之𠎝以無衣界亦不破憂故也今詳章中意者准祗律第八佛在王舍竹園舍利弗為饒益親里故詣那羅聚落安居復不欲離世尊以恭故佛言聽竹園精舍那羅聚落共結一布薩界令舍利弗安樂住將欲安居開結此界使無破𠍴爾時舍利弗於那羅聚落結安居日日詣竹園禮世尊足值但七日連雨念僧伽重佛知故問乃至告諸比丘從今王舍竹園那羅聚落作不離衣界令諸比丘得安樂住述曰此即復無離衣過也僧衣二界要必相假於安居前使無破離故聖先開結此二界故言使無破離也安居之後常集恐難應解此界還依舊結故下迦絺那楗度及增五文云安居竟應結界是此竟也上代已來不曉此理而依常藍有僧界者而於夏中不敢解界者恐破夏故此為謬矣多論答羯磨法爾者彼論第四有兩解前解云若有聚落言除聚落若無聚落不須言除後解如章除村村外者謂除村及村外勢分也取空地及住處故者疏意釋云取村外空及樹下住處也若准新翻律攝云從阿蘭若至斯住處准彼即是取等外空及寺中住處以為衣界但須除村也若作此解不復須言現結現除懸取等也又若准此亦與四分不殊也若准多論第四即似前解為正故彼論第四卷云若本結時無聚落者結衣界已後聚落來入界中不須更結已先結故謂雖新來不破前結前已懸除故也若本有聚落結衣界已移出界去此即空處名不離衣界若聚落先本小後轉大隨聚落所及盡非衣界述曰准此明知取村外空及村下住處即是現結現除懸聚取等也多論五義者彼第四云聚落散亂不定衣界是定又為除誹謗故又為除鬪諍故又為護梵行故又為除嫌疑故已上論文可使藍外之村等者顯其藍相外大界內村也異餘八界者如文中列藍等十界結衣界時但言除村村外界而不言除樹樹外界除場場外界等也是故以村望樹等八村即須除樹等不須甚義不同也故下強問云以除村故作法即弱收餘八故便即是強今詳此理應言異餘九界謂亦不言除藍藍外故也強弱門中亦應言以除村故作法即弱收餘九故便即是強好也亦可更加阿蘭若界應言異餘十界等也僧界開不重開者初緣制一化集今已開其局法若復更開除村村外便有重開之失也衣界亦是開不重開者本制隨身已開衣界復不除村亦有重開之失也六種不離三衣利益者明了疏釋云佛愍比丘有六因故雖離衣宿而不得罪即是利益此有二種者明了疏云此二並由僧和合作羯磨同許故合為一疏云一得迦絺那衣者誤也論文云約迦絺那也二為行路人及病人僧和合所作者明了疏云若比丘或羊老或羸有緣須行或身有病不堪持衣僧羯磨許三衣中隨離一衣二衣極至八月不許夏中作此羯磨非行時故事竟須還隨事大小一月二月十日五日悉同此例依地所作等者明了疏云結界有二先結布薩界後結衣界領之結界極大得三由旬於此界內衣在東邊身在西邊宿亦不失衣言布薩相應學處者其猶此律說戒犍度明了疏釋云此亦是戒故言學處此學處中明結界法故指彼說三不離所作乃至及剡浮樹等所已上論文明了疏云皮闍延多翻為勝德是帝釋樓高一千由旬章云二千誤也樹高如章若置三衣樓上樓樹上身在下宿許不失衣雨滴及處是樓樹界在此界宿許不失衣出界宿者即是失衣也若衣在下身在上宿此即失衣上容墮下下不落上容為人偷失不失異也四垣墻所作謂僧伽藍摩及寺舍中如轉車方便所顯已上論文章中不具明了疏云僧伽是眾藍摩是園四周圍繞故云垣墻眾園有三第一淨住二者一切淨三者聞邊言淨住者別立眾園中起屋宇為僧住處行住臥脩定論誦念一切飯食不得置中慮恐經營驚動僧眾別作此處名為淨住言一切淨者既許僧住復安飲食倉庫菓菜故言一切淨土此二園皆須羯磨結之若宿此園身東衣西亦是不失亦得結此為布薩界言聞邊者檀越起屋宇擬作淨住處或作一切淨僧未結界一有比丘來入此界宿檀越明日問比丘言昨夜是淨住處為當謂是一切淨住比丘答言我不分別從此檀越聞語竟邊不復得結作淨住處及一切淨後若此處為王所奪或火所燒或無此緣別一處壞通人出入亦得更結為淨住等宿聞邊園衣東身西則失衣也此中意取前二眾園名垣墻所作非第三也言及寺舍中者寺謂檀越借地起寺與僧令住別有垣墻在中宿者身東衣西亦不失衣也言舍者檀越白於住處別分三五間屋供養眾僧比丘於此屋舍界內身東衣西亦不失衣言轉車方便所顯者衣在界內比丘外宿若垣墻有壍壍若廣而淺度廣為量壍若狹而深度深為量取此量度壍外地若量內宿則不失衣若外無壍界側有樹或籬墻提或有竹等隨度高下取此度物一頭在車一頭出外轉車令物外際著墻復更轉車外撥著人則不失衣五約露地所作乃至覆地直身等並是論文疏中云露地直身露字誤也明了論疏云兩人夜行一人擔衣在前或後忽覺夜曉見擔衣遠心疑失衣即令擔人記其住處一尋一搩名曰一弓量地既滿四十九弓復取三衣中最長者斜索兩角露地直身申臂捉衣各令脚際及弓及配則不失衣六住處時節等者練若安居餘處聽法以衣寄他得逕六夜至第七夜取衣共宿復得更寄展轉事終夏中既非受德衣時又非羯磨離衣宿時別立此法故云時節也復次乃至加行難所作者第六段中復開此二謂為小便大便病怖難等所逼出外未及還來忽然界外而曉亦不失衣人有二人共宿一處各持三衣置在同處一人有急事須夜行不將自衣誤將他衣住者不失衣去人失衣去人將衣於住人是難佛許此難開不失衣然彼去人行意盛故於我住人加此作事名為加行互有寬狹者彼無蘭若八樹及船車場等故也局不局者有餘釋言自然名局以狹小故又解作法要假僧界故名為局也不局翻前應知今詳疏意後釋為正局之與假門異義同也對辨約為三位者自下釋第三大門兩界同異也於中復開三門一者對辨總有十三種異二者相可不相可三者勢分有無應作此開方隨疏釋以二自然五句不同者僧衣二自然也今約第二第三等者即向六蘭若中攝僧蘭若約拘盧舍雜寶藏五里攝衣蘭若八樹中間五十八步四尺八寸故言第二第三也集僧八樹者准僧祇第八憂波離問若有處所城邑聚落界分不可知若欲羯磨應齊幾許名為善作羯磨使今眾僧各各相見而得成就羯磨不犯別眾耶佛告言五時弓量七弓種一菴婆羅樹齊七菴婆羅樹相去爾許作羯磨者雖異眾相見無別眾罪已上律文祇云七樹章云八樹者以其此律護衣蘭若言有八樹影帶此文即言八樹然疏意云僧祇數間云七樹間即七間也此律數樹故云八樹理實二律實同八樹一弓九尺合七十三步半也疏意雖然應言七樹六間六十三步者好問既云藍寬云何名為界分不可知答藍雖寬廣然在聚落之中既非蘭若之處是故不可五里集僧復由聚落不可分別不得盡集故唯八樹間集也如藍勢分與八樹齊者亦是集僧八樹非護衣八樹也八樹內有眾多家者亦爾也如大伽藍有眾多七十三步半者覺云於此藍內雖此聚落以藍大故不可分別有僧無僧義同不可分別聚落故有多七十三步半也今詳不然藍雖寬廣然在聚落之中如前已釋然此藍中欲結多界或對首法等各得七十三步半集僧也如界寬藍小等者等取場車船等也此謂逈處結界但得依場車等護衣不得依界也以無攝衣作作法界故既依場車等復無藍相相故餘皆准此無戒場故僧一藍有若干故衣多者一大界內多藍院相無攝衣界故也有戒場故僧二結衣時無村故衣界一者問戒場之上衣界不起何非衣二答戒場既非作法衣界今辨二作故望衣邊不說戒場也場與大界既相假成故辨僧界論戒場也有人作十六句者第二位中更加一句僧二衣多有戒場故多男女故尊者曰此句更加者好疏中不許者誤也第三位中更加兩句一僧二衣多多男女故二僧一衣多多男女故今師意言多男女者是衣自然何成二作緩急翻到者前門之中僧寬衣狹約二蘭若今不相可亦依此義儻約藍相與五里等亦應相可今且一相云不相可也第二不相假第三定不定異者通約十界辨之第四勢分有無通約十一界辨此等並是就一相說故不相可也二俱是定者僧衣二作必互相依翻前應知理實除村亦不相可今亦且一相說也又准五分可分別聚落亦有勢分者先來相傳云此指五分者誤也應言十誦也十誦第四十七云初造僧坊齊幾許作界佛言隨聚落聚落齊行來處五十八亦同如前已引義唯應百步也若爾有則僧寬衣界勢分中人擲石古來議云可十三步故僧寬衣狹也今詳二律對辨可然若直就彼十誦之中僧衣勢分寬狹無異故彼第五離衣戒云聚落界者若難飛所及處若慚愧人大小便處若箭所及處准此亦是可百步許故知僧衣二勢無異也僧本急今急有則須寬者本急謂集一化也今急謂勢分寬也故有勢分須斯二急故須寬也衣本意今急有而便狹者本急謂制隨身也今急謂勢分狹也須斯二急有勢須狹也開不重開故者本制隨身已開衣界若復開勢便有重開之失也或若大無擁鄣者尊者云若大無擁鄣則不成藍故律云籬墻不周者但可少分不同也多論云王來入界等者彼論第四云又如王來入界內施帳幕住近左右作飲食處大小行來處盡非衣界有作幻人呪術人作樂人來入界內所住止處亦如王法盡非衣界又五分一界者彼律第四云同界者於中得自在若取若舉異界者於中不得自在若取若舉文言樹若干者見論十四云日正中時影所䨱所若枝葉疎蔭不相接衣在日中比丘在樹下失衣若枝偏長衣在枝蔭下比丘在樹根下不失衣十律第五相接界者若是諸樹枝葉相接乃至一拘盧舍是中隨所着衣至他了時無犯祇律第八連蔓界者若蒲桃蔓架等如是一切蔓架外各二十五肘外犯此律應取擲石處餘皆准此有人言二十五肘非勢分不然車者十誦第五車行有一界前車向中車杖所及處中車向前及後車杖所及處後車向中車杖所及處村者十誦云相接聚落界者若容十二桄梯謂中間容此梯相及出入即是一界故名相接故多論第四云相接界者四邊有聚落以十二桄梯四向到墻得登出入身在梯根下臥置衣在四聚落則不離衣船者祇律第八若比丘浣衣於船上曬風皼盡向外者犯若半船內半在船外者尼薩耆不可截故盡捨是名船界祇第八云作兄分齊等如章又言若兄弟語比丘言俗人自相違於法不礙任意住心隨意置衣無犯古來相傳有四種礙一者情礙如王來等情不與比丘和同二者染礙如對女人脫着形露三者隔礙如來水陸道斷或衣寄他不得戶鑰取不自在等四者界礙可知章中意顯祇據情礙與此律別章云相觸壞者壞即是惱謂相觸惱也文言樹者與人等者謂高下也足蔭䨱跏趺坐者枝葉傍布足得蔭人也村者四種與藍四種相並無別但對僧俗以為兩名並指上文盜戒中釋也文言中人即顯非強非弱不同見論十七釋分衣界云健人二擲石已還也以有若干界故須手捉衣者謂樹下等有男女來要手捉方成會衣也若無俗男女來但至石處即不犯也祇律第八復有會衣之相彼云比丘着上下衣入聚落有女人語比丘言我今夜欲供養形像當助我料理比丘即助日沒欲還慇懃留宿若彼比丘住處諸比丘有長衣者應蹔借受持若無者若隨近有亦應從借若無比丘有比丘尼亦從彼借若無者俗人有衣被應從借作淨女鈎紉然後受持若無是事後夜分城門開者當疾還寺莫踰城出到精舍門猶未開者當索開門若不得開應住門屋底若無門屋應內手着孔有二種門孔若水瀆孔水瀆孔中莫先內手脚脫有虵蝮應先以杖驚之然後內手與衣合若無孔者應踰垣墻入應作相令內人識莫令內人疑是賊相驚動也若不得入者當疾捨衣寧無衣犯越毗尼以輕易重故僧衣受持理亦先捨然後持也一門但九者闕無單衣在此藍乃在餘藍宿一句故但九句樹下宿類然一肘一尺八寸謂中庸人肘也祇又云若比丘道中臥持三衣枕頭離者尼薩耆以不可截故一切應捨已上律文有人云准此故知祇律二十五肘自是樹下界等體非是勢分若是勢分者道亦應有何因離頭即云是犯今詳彼持衣道行尚許出道二十五肘况今枕頭而言犯捨十律第五云有比丘二界中臥衣離身乃至半寸墮他界中得羅罪若衣一角在身上無犯准祇亦應由墮他界若不墮者亦有二十五肘勢也祇云若畏賊故藏衣井半堪中於井上宿明相出犯若連衣着身宿者不犯捨衣文言我某甲比丘離衣宿犯捨墮我今捨與僧者應言離僧伽梨或離鬱多羅等隨名稱之懺悔等法皆須然也不得依文直言離衣宿一切准知不犯中一者別開二者通開四想者文有五想加壞想故一月衣戒若衣財不同者或絹布不同麤細或異所言同者反上應知不問有知望無望斷以不斷者如五分第四十誦第五祇律第八善見十四並得衣財擬贊三衣而財不足若一月來望得處為欲足滿隨得成衣佛開待足若十日已來望若斷者自是常開未是犯長十誦律中若過十日即日望斷即日須淨施作衣或與人等不爾經宿即犯長𠎝從十一日展轉乃至三十日准而應知五分似同十誦然章中意若衣未足縱無望處得停一月不同餘律祇云若比丘前十日得衣即前十日作中十日得即中一日作後十日得即後十日作若前十日五日已過得所望衣即前十日取後五日并取中十前之五日此十日中應作衣若中十日前五已過得所望衣即取中十後之五日并取後十前之五日此十日中應作衣若後十日前五已過得所望衣即應此五日中應作衣如是四日三日二日一日應作衣皆准知准此即與十誦不同見論云望得者或於僧中望得或於眾中望得或於親友望得或於重糞掃處望得或自物望得若二十九日得所望衣細先衣麤先麤衣應說淨新得衣復得一月為望故若望得衣麤復得停一月如是展轉隨意所樂為欲同故莫過一月准此論文最寬也又言同者不足謂與先得衣那同者猶是不足未得成衣起過者不足可爾而有同衣足者何不作衣者前二種中各雖不足二種併取同細同麤理即應足何不作衣尊者云亦可此開上行之人不擬說淨而贊三衣故聽待足六群既非上行効他待足而起過也今詳文意本開待足不制時限六群因此奢慢經文因制一月也理通三品為替三衣不局上行也故多論第四云必使一月勤求成衣令念不斷文言即十一日應裁割縫作衣者祇云應餘人相助浣染乃至迸替却刺作淨已受持若一日恐不竟麤行隱令受持後更却細刺准此要亦即日受持多論第四云十日內若不作淨不與人不受持至十一日犯等今疏中云要成衣相始得不犯者不辨須受持章云不同衣謂餘長財無三十日開故捨懺牒辭應言我某甲比丘有若干段非時衣過若干日犯捨一引應知取尼衣戒祇下二眾衣不犯者不然祇第八云沙彌尼親里比丘尼非親里沙彌尼非親里比丘尼親里是中得衣犯離此二眾無罪虗心施與者謂虗太歡心有人言虗心謂不實心者非也多論第五取應量鉢捨墮祇第八不犯也章云能與衣人出家得道者於中文四一與母同夫呵猒女身捨女而去二後於異時下與女同夫復自呵猒捨之而去三往至已下詣佛得果四佛告已下出家盡漏五分第四云花色驚恐者昔與母共夫今與女同聟生死迷亂乃至於此不斷受欲出家學道如此倒惑何由得息便委而去即往祇桓見諦漏盡如彼廣說多論第五云華色比丘尼者容貌端正作優鉢羅華色此人前世久遠劫時作一婆羅門女父母家人入海採寶是女在後不能自活便與諸婬女共在一處賣色自供此女色貌不豐無人往來常自各責何以獨爾時有辟支佛一切敬仰有人語言汝能供養辟支佛者隨心所欲世世如願時彼女人即隨其語辦美飲食以優鉢華䨱上奉辟支佛即發願言令我世世常作女人端正無雙為人所敬無能過此又願得如沙門所得功德令我得之是故今世猶作女人顏貌第一以本願故今得漏盡已上論文多云問設有人取此疊肉誰邊得罪為賊邊為尼邊得答尼邊得罪文言盡法故弊壞耳者有為之法速滅盡故名盡法別房中住故與者尼作施主別造僧房請比丘住於此房中種種供給因此故與無犯西方多有此施多論第五除貿易者令行道者得安樂故又使弟子無苦惱故若比丘得尼所宜衣尼得比丘所宜衣貿易者以衣因緣故種種馳求妨廢行道得諸惱害是故聽之父母親里乃至七世者見論十四云父母親七世者父祖高祖曾祖如是乃至七世母七世亦如是此即從曾祖為一高祖二曾三父四身五兒六孫七故云乃至也父親者伯叔兄弟乃至兒孫言父親者即是父親伯叔稱入父世中兄弟入身世兒孫可知母親者舅姨乃至兒孫七世悉是母親此釋母親舅姨入母世也計理更有兄弟即身世也兒孫即入自兒孫世也若兒女乃至孫悉是親也此釋自己兒女孫也了論偈云四親應取長行釋云親相應有四餘文如章明了疏云父父親者祖父也父母親者祖母也外母准知雖言四親攝一切親皆盡如外祖母父母伯叔兄弟子姪中表屬外祖母攝以為一親餘相攝亦爾此律云乃至一丸藥貿衣即是問也不同祗第八云得彼全衣已與減小衣是不名與應與全足衣又云取彼衣已與鉢小鉢鍵𨩲飲食及餘物不名貿准此須價相當也文言比丘尼突吉羅章云問尼取僧衣等者釋此文也使尼浣衣戒如前無異者前戒制意第三疏涉世譏義是也戒本第三句中有浣第四句中唯有染打今准釋浣染打三並迴入第四句是故章中依釋中以桝戒本也下文更有此例准而可知不復論之祇第九云故衣者乃至一更枕頭名為故衣又云若母姉妹出家比丘持衣令浣尼言我羸病比丘言汝有弟子強徤者應使浣浣已尼薩耆不教自使浣者無罪又云若着垢膩衣詣尼精舍非親尼禮足問言衣何以垢膩答言無人浣尼信心故留衣與浣染打無罪若於捨時作意故着垢膩衣去尼薩耆又云若入聚落車馬讚衣即往尼寺令尼湔者犯以不可截故都捨又云尼齋日遊禮精舍見比丘浣衣尼信心故語比丘言止我當為浣者無罪若比丘於齋日故浣衣作念者犯又云若比丘多尼弟子雖不得令浣染打得令拾薪取水煑染取食行水持扇扇食竟収鉢一切事得作見論十四云若尼從尼僧得具戒不從大僧得戒如五百釋女使此尼浣吉述曰謂依尼僧例行八敬也若准此律下擗羊毛使愛道犯即應不同見論也愛道是不從大僧得戒故乞衣戒見論第十四釋子出家有八萬人憂波難陀最為輕薄而性聰明音聲絕好文言俱不能見與者謂須與不須俱不能與也文言汝等何時者問本受戒朝中等時也文言當以濡草等者見論第十四云若比丘道路行見賊持衣鉢與年少令走避若賊逐年少失衣上座若下座隨得一人折取草及樹葉付與餘人使得遮身向寺白衣見比丘裸形持白衣與或五大色衣得者無罪是故律本中說有比丘着白衣上色衣不割縷衣無罪此是遭賊失衣比丘若得外道鳥毛衣木板衣得着無罪然不得轉受邪見法着僧衣等破壞不須償祇律第九若共估客道行若賊從一方二方三方來隨便離賊走若四方俱來不應走應當正身住不得捨賊若賊言取僧伽梨來答言與長壽一一隨索與之不得高聲大喚瞋罵賊與已除去入林草中若賊去後餘有不受持衣應受持若無乃至樹葉前後而去若無是事不得如尼乾子掉臂當以手鄣形體在道行莫入染榛中行士巾反說文藂木曰榛廣雅木藂生曰榛也令賊謂是伺捕者應在道邊淺草中行若逢人來當於淺草行小現處坐今行人見之若人問言是何人裸形答言釋子被賊若不乞自多與衣取者無罪若不與應從乞乞時多與應取二三領三肘五肘衣文言居士居士婦如上者尊者曰應言如下六嘿戒中以其上來求有釋處故十誦第六奪衣者若官奪若賊若怨家若怨黨失者若失不知所在若朽爛若虫囓燒者若為火燒日煑漂衣者若水漂風漂過足受衣戒自受方捨者若為他受但須懺提無可捨故祇律第九憂波難陀語失衣比丘言汝若不能乞者我當為汝乞即持紙筆語諸優婆塞言助我乞以有比丘從北方來過賊失衣故即至肆上乞得多衣難陀復言猶故未足優婆塞言有幾人耶答言多人復問為有幾人長引聲言乃至有六十人優婆塞言此衣可供五百比丘何況六十欲坐疊肆耶即擲紙筆瞋恚言何處生是不知足人文言知足謂知三衣足也失一失二乃至失三受四並是足而更受者謂准此律失二都不聽受失三受三名為知足若受四者亦不可也祇律第九失三但許受二見論十五失三衣得受上下衣餘一衣餘處乞若失二衣得受一若失一不得受尼失五衣得受二失四得受一失三不得受勸一居士戒生像者應言生色寶有二種一者生色二者可染且如黃金不可變色天生然也白銀等類其色可變名為可染像即色義故云生像也文言一錢十六分之一者即十六磨沙為一迦利沙波拏也一分即四磨沙也言錢者謬也乞衣一脩者以其多論第五云此中衣者限應量衣古德依此遂云一條也勸二居士戒勸三惱微者覺云文增一絁應亦惱微故知勸二以之為法准知三四亦是犯限亦可章中義得理實惱微故也文增一綖乃是染防豈可勸時唯增一綖今詳儻增一綖欲結何𠎝故依前解好忩切戒若無鉢多索無罪者多謂多往返索也一索即犯落乞鉢中者不然彼是淨生非是鉢主何成乞鉢今解准下開文若為作波利迦羅故與以時𣽈語得者無犯故知索鉢亦同波利迦羅若不以時但應犯吉不同多論者見論十五若一語索破二嘿然此律釋中即同見論然多論第五云此戒體正在三索三嘿無過若七返得衣成罪不得吉羅准解初二等者謂前戒本六句之中但解初二及下二句也文言有生婆羅門者謂無生在淨行族中或有生於餘下姓中學淨行法即非生波羅門也即相施者祇律第九云更得三返六嘿索此律蓋應不同但言以時索故也不必唯限六嘿等也野蠶綿臥具戒梵云高世耶僧悉哩唎譯為野蠶臥具祇律第九比丘乞憍奢耶主人言小待即坐小待復起以指內釜中看湯熱不即言湯已熱等今三藏云高世耶者即是野蠶之名此虫不養自生山澤西國無桑多於果樹上而食其葉其形皓白麤如拇指長二三寸月餘便老以葉自褁內成其蠒大如足指極為堅硬屠人採之取熟成絹其絹極窂體不細滑若此虫不被収者經一月許蠒中出蛾其翅兩開如大張手文璋煥爛如紅錦色每至霄中雄雌相偶還於食樹復生其卵總名此虫為高世耶也西國屠兒方為此業勝人上姓極污其流乞食僧尼佛遮至宅或在作衣者祇律第九若憍舍耶作僧伽梨羊毛作多羅僧若羊毛作僧伽梨憍舍耶作多羅章云及緣者祇云若中是羊毛邊是憍舍或反此說相亦難識者今三藏云言敷具者即是臥褥有其二別一是織成二是衦作織成即是氍氀之類衦作乃是氈褥之流謂即取其高世耶絲織為敷具也或高世耶用絹縫之作㑘內貯羊毛及樹華絮以為敷具本是臥具不具三衣其有將作三衣者寔亦全成疎略也今詳至後戒辨之央堀魔羅經云綿絹帛皮革等展轉離煞者手不受是比丘法受者不名大悲亦非破戒捨懺牒辭云此臥具已斬壞餘准應知黑毛戒出四大國者僧祇第九云又毛大貴或一金錢得一兩乃至二三四金錢得一兩然此毛極細濡觸眼精不淚出者甚為難得出四大國毗舍離國弗迦羅國得剎尸羅國難提䟦國求是毛故或時得還或死不還章云重疊者意說餘衣若細薄者以此毛旃疊作兩重旃成之時不犯也以本期心不獨用故文言作蓐作臥旃不犯即與三三藏臥蓐相違今詳准此非是氈蓐又准後戒復非三衣正是臥帔也白毛戒十律此非純白者彼第七云六群作念佛結戒不聽純黑羊毛作敷具我當以少白羺羊毛雜黑羺羊毛作敷具因之呵制分二分黑第三分白等兩種具緣依自他部也多論第五四兩立世阿毗曇云南稱一兩名一鉢羅蓋多論約少稱毗曇就大稱說之也今解鉢羅翻為分也如鉢羅奢佉翻為支支豈是四兩也六年戒文五如上者如上離衣戒中一身病衣重須有遊行二內自思念已下念開通之分三語諸已下杖託陳疑四諸比丘聞已下為申請決五世尊已下正開作法文言減六年捨故更作新者不犯豈可三衣者捨而更作一月衣戒既不捨故即應是犯故知非三衣也多論第五以乞物作故犯若不乞自與或自有衣財若買衣財作不犯不牒戒一解二罪者且敘云釋疏主意欲不尊也南山亦同古釋相對以為四句一作新不牒如量唯犯此戒二作故過量唯犯過量二俱犯二俱不犯准知今詳如犯過量復犯不處分此亦然也不受請五緣多論第五說也五分佛搩手二尺者第五卷也開文若自無得處若准祇第九云等正覺一手者長二尺四寸取故旃時不得從少聞者犯戒者無聞者住壞房不補治者惡名人斷成見人遠離和上阿闍梨不告諮問者不能破魔人不分別魔事者如是人邊不應取應多聞乃至分別魔事人邊取准此自無須從人求不同此律自無開作新也擔毛戒毳者字林細羊毛也尚書云鳥獸皆生濡毳細毛是也祇律第九乃至遶塔過三由延亦犯乃至齊塞針筒毛亦犯若擔駝毛蘭若成器無罪畜寶戒出善生經者彼無正文但是延遠二法師涅槃疏中相傳如是有一卷脩多羅般若波羅蜜經列八不淨然尋彼經似是為經不可依之善見十五云若有人布施眾僧奴不得受若言施淨人或言執事人得受為僧尚爾若為別人理不應受說淨付俗人作淨而畜者多論第四長衣戒云淨施法者如錢一切寶物應先求一知法白衣淨人語意令解我比丘之法不畜錢寶今以檀越為淨主後得錢寶盡施檀越得淨主已後得錢寶盡比丘邊說淨不須說淨主名此簡長衣須說淨主名也說淨已後得錢寶盡隨久近畜若淨主遠出異國應更求淨主文云說淨有二種若白衣持錢寶來與比丘但言此不淨物我不應畜若淨當受即是淨法若白衣言與比丘寶比丘言我不應畜淨人言易淨物畜比丘自不說淨直置地去若有比丘應從說淨隨久近畜若無比丘不得取取得捨墮已上並是論文第四門以八不淨貿十種衣捨墮者此謂容犯販賣捨也眾生邊貿即不犯販佛邊十問容犯罪也六七二種犯捨者第六犯畜寶也第七之中金銀亦爾氍氀犯長也餘六不淨但得吉羅者畜餘無應說不說之過故但吉也此並麤相分別若細分別如理應知問寶衣藥三各有畜貿鉢畜而無貿食貿而畜者此中據義作此問答非據戒文作此問也且如畜中總有六戒謂戒文中寶為一畜衣為三畜謂十日一月急施過後藥為一畜鉢復一畜今此問中但言寶衣藥三并言畜鉢合為四畜而問也論其貿戒總有二貿謂戒文中寶為一貿衣藥與食合為一貿如後第二十賣買戒中時等四藥以辨貿也彼利迦羅即是納衣以辨貿也今此問中寶衣藥食開為貿而問也由此開合故知據義而不據戒文也更分為七者准後戒中金銀各三并錢為七也餘是為寶者如王鍮石珂貝等類非真實也多論第五云此戒體以畜寶制戒捉寶提寶得提是九十事捉寶戒也十律七寶者彼律第七但言寶者名為金銀取者尼薩取䥫銅錢乃至木錢者彼無七寶名也多論第五寶者重寶金銀摩尼真珠珊瑚車渠馬惱畜如是寶捨墮取錢吉此論既是釋十誦律故今疏中云十誦有七寶也此是資要無過聽受者疏意云為作房故聽受寶物蓋次下律文中開受房錢藥錢故作此釋也南山意云文言求材木等得受材木也不應自為身者不應受寶物也今觀文相釋為勝謂作受淨物意不同七百結集中直受起非故七百文中為房故許受寶彼文分明也日月四患者今觀文中列其五患義合為四以沙門四患也婆沙二十七云此日月輪五翳所翳不明不照不廣不淨何等五一雲二烟三塵四霧五曷邏呼阿素洛手此中雲者如盛夏時有少雲起須臾增長遍覆虗空障日月輪俱令不現烟者如林野中焚燒草木率爾烟起遍覆虗空障日月輪俱令不現塵者如抗旱時大風旋擊囂塵卒起遍覆虗空障日月輪俱令不現霧者如秋冬時山河霧起又開外國雨初晴時日照川原地氣騰踴雰霏布散遍覆虗空餘如前說曷邏呼阿素洛手者謂阿素洛與天鬪時天用日月以為旗懺由日月威天常勝彼時曷邏呼阿素洛事心忿日月欲摧滅之由諸有情業增上力盡其智術不能摧壞遂以手障令暫隱沒如契經說苾蒭當知無大身形如阿素洛此說變化非謂實身邪見壞善根者尋律文中邪命自活是第四患言邪見者謬也應言邪命障善根好也大位應四者一捨財二懺罪三還財四不還追索也恐濫捨法也文中捨法即是說淨有差別者若本受時作此法已犯畜寶今作此法即是捨法准前所引多論第四足知此理又准開文亦有此語此是牒捨明開者不然也此是根本說淨法也作此捨已次當懺悔但除著用有餘六品還分三位謂先懺提及嘿妄各覆隨覆四品吉也次懺嘿妄次懺提罪牒辭云我某甲比丘故犯畜某寶犯若干尼薩耆波逸提罪此寶已捨若已用盡應云此寶已用盡捨等牒辭並隨知失法之𠎝者謂一切時有所取與皆應言知是等也開文云與本施主者即上文汝還取莫使失也貿寶戒戒本云種種賣買也下貿者次後戒也後戒謂以餘財相貿此貿唯以寶物相實多論第五云此戒體應言種種用寶不得言賣買此戒一往成罪不同販買販買戒為利故買已還賣成罪已上論文此自他俱犯販唯自犯者後戒若自作者不問求利及不求利一向犯捨若使淨人不求利者一向無犯設若求利多論亦犯今准此律不言求利設使淨人令求利者但出家人不應不應為故故但得吉亦非犯捨財境法等別者財謂寶物境唯對俗捨法如文也及得別懺者前已詳之亦許對僧故十誦第七云應入僧中言大德我種種用物得波逸提我今發露悔過僧問言見罪後更莫作等及境法等異者後戒境法有羯磨還此戒一向無法以是俗人故販開外須者開塗足等用如後應知餘三律及多論並言以作易不作不作易作見論十五云作者或已成器或未成器已成器易未成器未成器易已成器此律已成金等蓋即已成器等也賣買戒戒本云種種販賣也今章中乃取前戒律文之名為此戒名也如是廣說者多論第五設與僧作食僧不應食乃至作像不應向禮又云但作佛意禮凡作持戒比丘不應用此物若此比丘死眾僧應羯磨死後已斷相續故不同在日五百問云問比丘治生施人衣食得受不答取衣犯捨墮窮厄無食處彼使白衣作食可食治生道人若白眾此物非我物是使人物若爾可食若主不眾食犯墮二三人亦可白若道人施使人言是我物此可食此謂道人施時使人言是我物比丘得食也多論第五若販賣物作食口口提作衣著著提牀蓐臥上轉轉提祇律第十五云肆上衣先已有定價比丘持價來買衣置地時應語物主言此直知是衣若不語嘿然持去犯越有國主市法賷價來者物邊物主搖頭當知相與比丘亦應語言此直知是前人若解要作是語不作犯越乃至不淨語分別價淨語取者問前人此物賣索幾許我欲知此物淨語分別價不淨語取者如是物分別實索幾許我與如是買不淨語分別價不淨語取者如是分別賣索幾許我如是買淨語分別價淨語取者如是價知如是知取初二句犯越第三句捨墮第四無罪多論第五販賣戒云買已還賣成罪或有方便有罪果頭無罪如為利故糴穀居鹽後得好心即施僧作福是方便吉罪果頭無罪或方便無罪果頭有罪如為畜故糴米後見利故便賣以自入是方便無罪果頭得吉犯如此比可以類解已上論文謂類知餘二句也即是十誦第七云為利故買已不賣吉為利故賣不買亦吉為利故買已還賣提開無第四句疏主意言買時亦提不同僧祇及多十也文言數數上下者多論第五云眾僧衣未三唱得益價三唱已不應益眾僧亦不應與衣已屬他故三唱得衣不應悔設悔眾僧莫還僧祇第十僧中賣物得上價取若和上闍梨欲取不得抄文言買亦如是者十律第七言有賣衣人六群以價求貴衣佛言減價索他貴衣得吉羅若須是物審思量言我爾所買若彼不與應再語若復不與應三語三語不與急須是物者應覓淨人使買若淨人不知市買當先教祇律第十應直五十而索百錢比丘言我以五十知是不犯不得抄市應問言汝正來若言來正抄者犯越若言我牀者得取五分第五應使淨人語言為我以此物易彼物應心念寧使彼得我利我不得彼利僧祇第十雇人治革屣治經行處等作不淨語犯越買中亦應三句等者尊者云准前賣中但應言買減買重減買釋此三名如章不異也今詳文意賣中三者賣者謂直一錢數數上下且如賣物本索一錢買人還一復索三錢買者遂言我不復買其賣人云若不買者還一錢得名為數數上下也增賣者本索一錢既還一錢即索三錢即三錢賣名為增賣也重增賣也者本索一錢及與一錢即索三錢即與三錢復索五錢五錢而賣名重增賣也買中三者一者買本還五錢及至欲與即還三錢物主遂言我今不賣遂却還五錢而取名為數數上下也二者減買本還五錢及至欲與即還三錢三錢而得名為減買三者重減買本還五錢及至欲與即還三錢三錢復與復還一錢一錢而得名重減買也開文言以蘇易油等章中釋言為外用故者以前釋相中云以七日故知前是內用內用資強長貪故犯外用反上無過故開亦可前自為者前以七日易七日即是自受今以蘇易油等是供養也長鉢戒見論第十五云一鉢二熏不言三也僧祇二十九云值三種色一者孔咽色綠光也二者如毗陵伽鳥色相傳云不知似何今詳蓋赤色也三者如鴿色即灰青色也佛言熏時使作如是色尊者云更加第四相如以相不似鉢不任受持也得鉢五日等多論第五文也見論第十五破穿如粟大失受持若以鐵屑補得受持又云尼薩者鉢不捨不懺悔若用突吉羅又云若買他鉢米還直不得受持若買鉢度直已鉢主為薰竟報比丘比丘不取過十日犯捨墮此是宗別四分不須依之以其彼論三衣不持亦言犯長現闕衣理何成長乞鉢戒五綴者母論第四云若鉢破作五段綴此鉢法應相去二指安一綴律攝意同然今三藏云五綴者即以五種綴物而連綴之非五處綴也今詳自違律攝也四法同上者同上長衣等戒即次下科文者是也第二懺罪中先乞懺法次請懺主次受懺白次正懺悔亦有八品吉羅罪故祇第十云此中用不淨鉢得無量越毗尼罪牒辭應云受用尼薩耆鉢得突吉羅罪又憶數等餘辭准知必復從他長鉢並經宿還者是既令捨若即直還恐長鉢邊畜心未斷染此乞鉢亦成犯長故逕宿還祇律第十是鉢大貴應賣取十鉢直餘如章說鉢若不貴事即易知如律文中既還下鉢作白二竟仍取此鉢從上座換乃至下座若准三律十律第八祗第十五分第五也若行八人五分云大德僧聽此某甲比丘鉢未滿五綴更乞新鉢今捨與僧僧今差某甲比丘作行鉢人若僧時到僧忍聽白如是羯磨准白可知疏主欲令准餘三律差行鉢人令准此律不須差法何以然者餘之三律捨懺既竟即差行鉢行鉢據理即是還法三律無別還鉢白二故但差行此律既有還鉢白二是故但須秉羯磨師作白行鉢無五事者五分云若太大若太小若穿缺若唱邪不應與若無五事應與章云若過量引文誤也祇諸比丘盡盛滿水行之者誤祇律無文十誦第八云是鉢應眾中捨者是鉢應盛滿中水僧中行之乃至諸比丘應即時各自持先所受用鉢集在一處准彼律文即是本主鉢中盛水行之意表不漏不淨徒眾或即與亦得者蓋以不然准文似是換上座鉢方得與之若准多論第五云僧中行若都不取者還與此比丘五分亦同文言不應護眾僧故不取者釋上應取之義也如疏應知文云亦不應受持下鉢等者章中約鉢主釋也此恐不然祇云諸比丘應各各賷己所受持鉢來若有比丘捨先所受鉢更受下鉢來者越毗尼牒前二下行者一者轉得下鉢二者直還下鉢如文可知母論第八云若鉢破過五綴更求新鉢受持者要四人中白二羯磨受持三人已下不得已上論文此蓋持行名持也多論第五云前所受持鉢如法受持後鉢不受直令常畜餘如章說此蓋加受持法法名持也祇云綴鉢比丘乞食食已應綴若灰若土淨洗不得堅物刺孔中令破當以鳥翮刺不得以沙灰令脫色當用無沙拒摩牛糞是也根汁葉汁等不得臨坑岸上危處不得熟菓樹下若石上甎上當平地洗若無坐處當瘻身去地一磔手洗已曬令燥還綴舉著一處以物遮口不得以食巾等觸物遮口也若有事忩忩不得好洗當以根汁等塗拭事訖當洗明日洗已持用乞食設難綴用一日乃了要當洗淨若故打破提若和上闍梨知識作是念此賢善比丘恐妨禪誦打破若藏去不見已更乞無罪准此即是汎教綴鉢洗鉢法非謂己犯人作教也伽論第十云問若鉢極膩用瞿摩土屑極用意三洗故去得食不答得何以故非食膩故祇三十一云應先洗和上闍梨鉢然後自洗不得持自鉢中殘水寫和上闍梨鉢中殘水寫和上闍梨鉢中當持師鉢中殘水寫己鉢中十誦三十七離越比丘洗瓦鉢置日中炙津出疑不應用食佛言中炙犯吉祇二十七有上座來不肯與房嗔恚斵破佛言破六種得蘭破鉢破衣破塔破房破僧破界並以嗔心是故得罪若非嗔心須改換者無罪破界者若嗔恚過界作不名作得蘭得捨與更羯磨界乞縷戒以憑世貴強逼織師者十律第八云六群乞縷持到富貴人舍作是言諸聚落主令織師為我織衣是諸貴人即語令織織師畏故不能違逆但織衣時呵言沙門使我虗作無食無價尼不得自織者此戒下文自織吉羅准知尼犯自縷應輕者此戒既許損織師犯自縷應犯十誦第八云從親里乞不犯令非親織尼薩此律亦言非親里者犯等故知但約織邊犯提縷邊或吉一向無提也多論第五云若不憑勢力理求之織師與織無罪多論織師三句者彼無三句文疏意但欲以多論損織師義釋此律中三句也勸織戒准祇第十一亦損織師彼云鹿母為作衣屏勸令好織㲲未成時日日到織師家既得氎已遠離其舍異巷而行織師禮足欲索織直彼陽不識問言得㲲未反問言何等氎答言我為鹿母織者答言得問稱意不答言為復可耳便言與我織價師嗔恚言如是如是賜糓物汝織我不欲拔汝眼𥇒取虗空中烟我欲五指撮取淨洗釜已欲望故得多食裸形外道猶欲剝取兩張㲲乾死鳥足上望剝五百兩肉以一把糠散恒水旋淵中欲収𣫍取如是等處求物況汝望得我物即言取我僧伽梨來縛取此人付官織師念此沙門有大身力又出入王家必能為我作不饒益用作直為但得活命怖畏却行出房走去奪衣戒此非重犯者古師云我准文中墻上一一離處重重是犯今師云此是不現前奪非重犯文舉借他衣者意欲證成捨與方犯也不同十律者無文然多論第五云若奪不見擯惡邪不除擯盡尼薩耆四羯磨等者多論云若奪得戒沙彌行波利婆沙摩那埵犯准知本日出罪亦犯故言四羯磨又滅擯人者多云若奪任心乱心病壞心犯四重出血破僧五法人盡吉羅今解此三破者是舉家取治等者謂犯殘等雖名破戒威儀等而若見罪奪亦犯捨今開不犯者但由犯已不見罪等此應治舉奪而非犯今詳或可破戒等復破見者奪之無犯不破見者理即奪犯多云若和上為折伏弟子令離惡法故蹔奪衣取無罪祇律十一亦同畜藥戒如非時食戒說者下文云時者明相出乃至日中案此時為法四天下食亦爾非時者從日中乃至明相未出多論四義者第七卷云非時者從中至夜後分名為非時從旦至日中名時何以故日初出乃至日中其明轉盛中則滿足故名為時從中至夜後分明轉滅沒故名非時又從晨至日中世人營救事作飲食是故名為時從中至夜後分燕會嬉戲自娛樂時比丘遊行有所觸惱故名非時又從晨至日中俗人種種事務婬惱不發故名為時從中至夜後分事務休息嬉戲言笑若比丘出入遊行或時初被誹謗受諸惱害名為非時又比丘從晨至中乞食時應入聚落往來遊行故名為時從中至夜後分應靜拱端坐誦經坐禪各當所業非是行來入聚落時故名非時出於時家非時規圓者謂從午後越明相也從受法者盡形也日限者七日也了論者彼論疏云一者甜味初中除甘草蜜沙糖油餘甜味物皆是時食如是酸味物中除呵梨勒阿摩勒辛味中除薑彌梨遮畢鉢梨亦爾一切苦澁味物皆非時食除終身藥七日藥已外一切可食名依時量從旦至中得食過則不得二者依更量藥如耳遮蒲桃等漿是更量如此間清飯為漿此屬時食若炒米令燋黑以餘藥投中釀以為漿亦是更量准此茶湯即是更量収也一日一夜分為五分從平旦分至夜二更此七分中飲則無過如是輪轉恒經七分三者蘇油沙糖等名依七日量四者甘菓等名依一期量從受戒後訖一報終無間晝夜恒得服之五者灰土水屎尿此五物名大開量不須受取隨意服由此世間非所惜故此律頂受如下楗度應知一總約聚辨體是色法乃至八微為體者謂五聚五聚中唯是色聚也言八微者能造四大及所造四塵八類極微為諸藥體也又疏云前二色収者色是可見有對香味觸三即不可見有對也此等並據必同一聚體不相離故云八微理實藥體唯是段食於八微中七微為體除其色微也觸中即攝能造四大故段食特唯香味觸也又疏云色等非也者等取聲也因此略解四食之義三門分別一釋名二體相三廢立言釋名者且釋總名如婆沙百二十九云牽有義希望於有即顯思食續有義識能結生即是續有即顯識食持有義任持於身即顯段食生有義觸能順生喜樂等受令樂生有即顯觸食養有義物顯四食皆養有身是食義瑜伽六十六云任持有情身命令不壞斷故名為食此大乘論就總相說意同婆沙次釋別名者食義不同有其四種一段二觸三思四識如下辨相其名自顯第二體相者先體後相且體者婆沙百二十九云問食體是何答十六事是段食體即十一觸及香味處今詳飢渴二觸名為食者如消食藥等也此段食體唯欲界繫上界有觸不立為食觸思識三是餘三食三食並通三界繫也雜集第五云三蘊段食是色薀觸思是行薀識食是識薀五處段食是三處觸思是法處識食是意處十一界攝段食是三界觸思是法界識食是七心界婆沙亦同次辨相者先辨總相婆沙一百二十九意云段觸思識以之為緣長養諸根增益大種是其食相次辨別相者且辨段食如俱舍第十云謂以口鼻分分受之故名段食舊名摶食者則漿飲等既不可摶應不名食故有失也若爾光影炎涼如何成食答傳說此語從多分又釋雖非飲噉亦細食攝如塗洗等䥫丸洋銅雖為損害暫除飢渴亦名為食如俱舍婆沙等說觸食相者謂心所觸此能長養心心所法增益根大思食相者謂由希望命得久延增益根大識食相者由識依身增益根大若准大乘辨段食相如瑜伽六十六云若正消變便能長養不正消變乃為損減又云若受用已安隱消變增長喜樂於消變時乃名段食既言消變便能長養於消變時方名段食意顯消時內資粮大即由消故有食欲生聞香味觸便欲噉食此即簡除光影炎涼雖益根大而非消變更發食欲先來法師不尋同異不分宗別甚為謬也即由此理亦簡䥫丸既不消變不名為食餘三食相大同前相然唯識云此觸雖與諸識相應屬第六者食義偏勝此思雖與諸識相應屬意識者食義偏勝此識雖通諸自體而第八識食義偏勝一類相續執持勝故述曰若就勝立如論所辨若通假說即通一切第三廢立者俱舍第十云色亦可成段別飲噉何緣非食答云此不能益自所對根解脫者故述曰一不能益自所對根二不能益解脫者故且不益根者光法師一釋意云雖復見色不除飢渴故色非食此即正當婆沙所破破曰嗅香覺觸亦不除飢應不名食故今解云養瘦令肥名益自根色不能養故非食也不益解脫者俱舍云又不還者及阿羅漢解脫食貪雖見種種上妙飲食而無益故述曰尋諸法師未曉此意為釋外難也難云見色之時心生喜悅由此展轉亦益根大色應名食故今釋云不還羅漢見食不貪故色非食不同香味等雖斷食貪仍得其美也大乘廢立如瑜伽六十六不能繁敘十五種者古來相傳准義立有五種蒲闍尼此云正食謂飯乾飯魚肉五種佉闍尼此云不正食謂枝葉華菓細末磨食五種奢耶尼謂蘇油生蘇蜜石蜜若准五百問中有三五一者種食根莖葉菓磨食五種噉食乾飯魚肉脯五種名噉食糜黍粟麥術准此三五悉是時食今三藏云第一半者蒲膳尼蒲膳尼者以含噉為義言半者此翻為五謂五噉食舊云五正准義翻也一飯二麥豆飯三四肉五餅第二半者珂俱尼珂俱尼即嚼齧受名謂五嚼食也一根二莖三葉四華五果此唯二五也諸律亦多說二五也今章中意且取初說以釋義也謂豆豉乳酪等者昔有人妄以豆豉乳酪為非時食故須翻之也四藥相和從強服者時及非時辨七日藥其相易了唯盡形藥或由自體即是盡形或由相和從強而服其相難識故略釋之且如時人多執藥揵度初文云病比丘醫教服菓藥佛言若非是當食者聽盡形服又末後文云佛語優波離不任為食者盡形壽應服遂妄立云可得飽者即非藥攝又如南山云今有愚夫非時妄噉謂杏子湯乾米汁菓漿含滓藕根米汁乾地黃茯苓味諸藥酒煎非醎苦格口者非時噉之並出自心妄憑聖教不如噉飯未必長惡引誤後生罪流長世又如崇云如蜜煎杏人等藥亦以名定終身藥服因此相傳食藥蒸署預槐牙枯鼠松脯等類又立理云如僧祇律時根者䓗根藕根蘿蔔等根於中既無署預之名故許為藥今詳此等並皆理擁且煎杏人意以下文藥揵度中杏子人聽受作盡形藥遂即執云以名是定終身服之計其實理體若不變可是藥收若體轉變事即不定故涅槃第四十云善男子若一切法有定性者聖人何故飲甘蔗漿石蜜黑蜜酒特不飲後為苦酒復還得飲是故當知無有定性又僧祇第十云得甘食殘苲作漿得夜分受若飲不盡得煎作石蜜七日受石蜜不盡燒作灰終身受述曰甘時食轉成四藥涅槃酒變還復得飲何容杏人許依名定然准薩婆多論云若分數勢力等者隨名所定者不言體變亦隨名定如何謬執故應思擇又如南山執格口者方名為藥茯苓地黃並不聽服此違聖意處處教文勸行中道但遮譏過有益咸開茯苓地黃世咸共了若遮服食病苦難除身既不安道從何進故不然也然藥揵度非當食者意顯非如𦬔采之類世皆共了是食非藥非謂食之要不飽滿方名為藥且如葶藶擣簁為丸多食充飢豈即時食又文但言不任為食聽盡形服不言盡形要不任食何成明證故執格口其言大狹也故今詳之凡盡形藥必具四義一者身有客病如飢渴等自是尋常主病非客故律云盡形壽藥無病因緣服者吉羅七日等開咸因有病真諦云蘇等無病服者犯非時食二者醫方所要謂藥方中要須時食尚開入分況其餘者故律云乞食比丘見作石蜜罽尼和之有疑不食佛言作法應爾又如多論第六卷云或以時藥或七日藥以成終身服無過三者世共了知體性是藥即如茯苓乾地黃等世無不了此體是藥亦無一方不須此藥若不許服恐違聖意且如七日藥緣起云有五種藥世人所識蘇油生蘇蜜石蜜當食藥不令麤現彼兼當食佛尚開之此唯當藥佛何不許四者離時食相此准七日不令麤現況今盡形何容不爾曾聞有人過中已後粉署預以為餺飥沃茶湯以之為臛復以薑酢以為冷渄者此實不如噉飯此即為縱無明本非為治道器故不開也又前所說世共了知體性是藥者若入藥分理在絕言設欲單服亦開無過然有病中設有全日失食之人飢渴過常恐生客病並許服藥以此方隅理無不盡也次隨疏釋言四藥相和從強服者尋律論文應開兩義一者醫方要相假藉合成一藥而有增強者從強而服如薩婆多論第六所說若以時藥終身藥助成七日作七日服無過以七日藥勢力多故又助成七日故如以蘇煑肉此蘇九汁得作七日服如石蜜或時藥或終身藥以成石蜜得作七日服此即助成七日如是或以時藥或七日藥以成終身作終身服無過此即助成終身或以終身七日以成時藥作時服隨勢力多故相助成故此即助成時藥若分數勢力等者隨名取定如石蜜丸雖勢力等以定住七日藥服如五石散隨石作名作終身服此謂隨本方名以定藥體第二義者各不相假非成一藥而相和者四藥之中時藥最強非時為次七日第三盡形最劣以長從短從前前服是故下藥揵度文云時藥非時七日盡形相和應受作時藥若非時七日盡形相和應受作非時藥乃至廣說然有時人不曉律論兩義意異遂執律文而令合藥者四等丸中以生地黃汁之意恐蜜和成七日服者染為謬矣五石者紫石白石石脂石留黃樊石也義汁者菓體中自有汁也不同外水投飯成漿也多論五義者彼第八云一為斷竊盜因緣故二為作證明故從非人受食得成受食不成證明所以聽非人邊受食者曠絕之處無人授食是故聽之若在人中非人畜生及無智小兒一切不聽也又為止誹謗故為少欲知足故生他信敬心故如昔有一比丘與外道共止一樹下樹上有菓外道語比丘言上樹取菓比丘言我比丘法樹過人頭不應上又言搖樹取菓比丘言我法不得搖樹落果外道上樹取菓擲地語言取食比丘言我法不得不受而食外道生信出家漏盡獨住等五人者十誦四十七云問心念得受七日法不佛言不得除五種人所謂阿練兒獨住人遠行人長病人飢餓時親里邊住人第六十云阿難先受他請忘不憶復受王請共佛入宮以食著口中是時乃憶知有二請佛知心悔告言心念與他已便食優波離問佛若餘人心念與他亦得食不佛言不得除五人一坐禪人二獨處三遠行四長病五飢餓時依親里住坐禪人者即是阿練兒餘四同前彼律更攝文云優波離問佛阿蘭若比丘獨處一身云何說戒自恣受衣受七日受七日藥與一請云何衣物以清淨故施佛言若獨處一身聽一心念今日布薩說戒自恣受衣乃至及淨施衣物亦爾下安居犍度即是引此三處文也受貧女食者如上盜戒記中引五分第八也形報者比丘屬對比丘尼對尼乃至五眾各局也時中懸遠者若望手受不遇觸緣至中已來亦不失受然望過中停過須臾即失受法故須口法也舉下三藥者十律二十六優波離問佛三種藥非時分藥七日藥盡形藥是三種藥舉宿得口受不佛言不得惡捉得口受不佛言不得是三種藥手受口受不病得服不佛言不得是三種藥手受口受病得服不佛言得如自己藥者下藥法云若是已腐爛藥墮地者應以器盛水和之漉受然後服若未墮地者以器承之水和漉之不須受手受有十者有五種受手與手受手與物受物與手受物與物受若遙過物與者受者俱知中間無所觸礙得墮手中復有五種受身身與衣衣與曲肘曲肘與器器與若有日緣置地與身衣時器地也口受差別對三可知者身業胡跪口業發言受詞亦異如復當辨此口受業也若對境以辨二受尅漫俱成者若稱本期是尅成就不簡王季境漫亦成其唯本境不論更對具人僧尼各局手對未具不簡女男二受境殊無容交對也若淨人難得處僧尼二眾五手受食亦成也尅但同藥者但尅受蘇諸蘇皆得手通二心者乃至亦唯同藥者飯雖異器以類同故亦名為尅得兼異藥者堪食皆受無問飯羮亦望當分悞有成義者迷張比丘以為王想是口本境或迷沙彌為淨人想是手本境諸如類是悞容成也錯則不成者本對東人西人領受不成口法也兩受錯悞俱不成者迷蘇為油二受不成名誤也了知是蘇口錯言油口錯也手欲受蘇蘇墮於地油落手中手錯也此並約兩種藥以辨錯誤也亦可悞則成受錯不成者迷彼器蘇為此器蘇手口並誤成也此約用藥辨也錯不成者唯約異藥以其同藥無錯相故釋義同前了知是蘇等也第五受之方軌手口二受廣說可知者手受易知口受有三一者非時漿略以三義分別一所受藥二能授人三正加法初門者多分菓作亦有根成或藥等釀以成諸漿且下藥法中云有八漿是古昔無欲仙人所飲梨漿閻浮漿酸未漿甘漿微菓漿舍樓伽漿波樓師漿蒲桃漿准此八中第六根漿餘七菓漿也故見論十七釋云舍樓伽漿者此是憂鉢羅物物頭華根舂取汁澄使清是名舍樓伽漿波漏師者即是律云波樓師也此似菴羅菓一切木菓得作非時漿唯除七種糓一切葉得非時服即茶菓之類也唯除菜一切華得非時服唯除摩頭華汁一切菓中唯除多羅樹菓椰子菓波羅捺子甜瓠子𦬔咶𦬔此六種不得非時服一切豆不得非時服上來所辨根菓等漿應准伽論第十云問根漿華莖菓漿非時得飲不答得得幾時飲乃至未捨自性得飲過時不得飲述曰捨自性者變成異味也次辨釀成者十誦二十六云大麥去麤皮不破不煑著一器中湯浸令酢盡受盡服夜受夜服不應過時分服祇二十九云蘇毗羅漿者取輕擣却芒及塵土勿令頭破以水七遍淨渄置淨器中臥應在下風勿令臭氣入塔等院中以呵梨勒醘勒阿摩勒胡椒畢鉢如是等置中以淨疊覆之以繩鷄足繫以木蓋上以水中解然後飲若不與水解飲越毗尼若麥頭不破時非時飲若麥頭破時飲非時不得飲准此應知飯漿但以保米無糠令頭清破故不聽飲也下文酢麥汁聽飲即其事也又離八過謂惡觸二煑二宿體變謂失本味也未曾手受受已置地停過須臾謂非時中任運失受第二能受人須知作漿之法十誦二十六蒲桃食飽多殘諸比丘不知云何白佛佛言桿汁飲若蒲桃不作淨若汁中不水作淨不應飲若蒲桃作淨汁中不作淨若汁作淨蒲桃不作淨不應飲俱淨應飲已上律文由此有菓要火等淨擣法取汁若未澄清淨人欲去令煑一沸𢱈後重溫不犯自煑生飲不須煑以水渧淨淨人須解授食之法授與比丘比丘了知前漿類別仰手受已准祇第十當作是言此中淨物生我當受南山云當對一比丘作此記識也若已澄清以水淨訖但須手受不須記識第三正加法者今諸部其加法而無法文義立云應至一比丘所具儀手執藥云大德一心念我某甲比丘今為渴病因緣此是蒲桃漿為欲夜分已來服故今於大德邊受三說若有淨人數數手受無勞加此口法餘一切漿改名應知次七日藥亦有三門初門者藥體易識亦無八患於中差別言殘宿者一義如常又非餘比丘過七日藥或復自身已犯殘藥餘七同上第二能授人如法煑鹿與時食別儻若未別記識同前謂脂餘滓等油亦除滓手受准前須擬藥服若擬塗足等受即不成第三正加法要先未曾畜藥犯長若先犯長今更得藥加法即染不得服故又非他比丘至六日或七日藥如下引多論文證也多論第六云此戒體若病比丘須七日藥自無淨人求債難得應自從淨人手受從比丘口受已隨著一處七日內自取而食義云具儀執藥云大德一心念我比丘某甲今為風病因緣此胡麻油七日藥為欲七日經宿服故今於大德邊受三說南山云安淨地內須時自取食疏主云防兩宿即不同也伽論第七下三藥二受竟並不聽內宿此律明文盡形聽內宿不同伽論也或有餘病餘藥隨應准說次盡形藥一者藥無八患如上漿中二者能授南山云火淨已後無變生過十誦二十六云食冷聽更煑若生食聽火淨已得煑記識手授並准前知三者正加口法藥方所要上已廣明若欲受者總別皆得且別受者如法買得或復人施如得羊賢為欲合作紫菀藥分應手執加法云大德一心念我某甲比丘為氣病因緣此羊賢是盡形紫菀藥分為欲共宿長服故今於大德邊受三說隨得隨然若總受者合藥已成應云大德一心念我某甲比丘為氣病因緣此是紫菀丸盡形壽藥為欲共宿等餘同上餘散餘丸餘湯餘湔對治餘病改名為異一切准知南山云向市買藥令淨人料價已比丘自選過分多取聚著一處然後令秤次第受取更莫置地即覓比丘加法受取不得過限先時多選雖手已觸未知何者定屬比丘故不犯觸南山云今奉法者希有一二多任癡心抑挫佛法得便進噉何論淨穢高談虗論世表有餘攝心順教一事不徹焉知未來惡趣且快既在貪癡幸有識者深鏡大意上來即是作法方軌訖今詳南山作法且然而論羊賢於大乘中深障聖道寧索百千身命而不可用也遇緣無過者唯曾手受遇緣失竟更莫手觸都無惡觸之過更得如法受取也任運時過或有宿觸者或但有觸而無宿故云或也六日內觸者意引多論然是錯也多論第六云若六日七日異病比丘不得復受藥經七日此藥至七日應作淨故故知餘人第七日藥不令更受上指此引准此論文五日內觸更受得服也然彼論言若受藥已二日三日有藥入中應還更受從一日作始次第七日若眾多藥不知何者是受何者不受亦應更手口受然後服之異類故寬者但除同類比丘之外通下四眾及二俗也若具受對境者謂具幾受須對幾境手防不受等者不受直捉名為惡觸若噉之時具有提吉也雖先已受若任運失噉時亦爾不防二宿者殘宿犯提內犯吉也若望二煑者自煑內煑並吉也若也非時三皆不防者三藥皆不防過午異於手受防其一往不受而捉等者謂口受中任運失受即有不受惡觸罪生手防一往亦防任運是故章中置等言也又是熟藥者已火淨即是熟藥也但以藥法對盡形問者下藥揵度云諸比丘如是念盡形壽藥得界內共宿內煑不佛言聽盡形壽藥界內共宿內煑自煑盡形具六者七中除非時餘皆防也手正生殘義兼不受任運惡觸者義兼不受提任運惡觸吉也手受亦成過緣者謂全不受既成過緣於七日罪中並皆容有縱使手受亦得成過亦容七故故置亦言須加口法以防前𠎝者即前七過緣中極能防云下至防二也引文可知者殘宿戒今日手所受食時日一切沙門釋子不清淨七日藥戒云至八日一切尼薩有一者手長日短由手先故二者口長手短口長時故見論施與餘人失受者彼亦無文彼第十五但云未滿七日布施沙彌至第八日若有忽須日得就沙彌乞食無罪已上論文三義不具者謂道餘人闕屬己義也今詳疏意云若存此釋自害己宗同生及三義之理故應別釋也又假緣作法者謂假自病何得濟他然多論第六云口受已隨著一處七日內自帀而食若病重口不受亦得服設者病比丘手受口受亦成受法今三藏亦言之藥通餘人服也體現常存謂堪久時貯畜也有殘而非觸者如蘇油等加口法已二三日竟過緣失更雖曾經宿義似是殘理實不犯殘也而非惡觸過緣無過故也尊者云亦應言觸而非殘也釋義可知非藥過服六罪者即前七中除食捨墮吉也既是熟藥無自煑者簡時藥有自煑也時藥七罪即於非時六上加自煑也詳曰自煑約咽此應更思章云第二門義此塔中說者尊者云前七門義今若攝入此四緣中一者初緣攝第四攝三猶有兩門四緣未攝是故應言上七門中二三兩門即是此中第二緣攝不應但言第二門義此緣中說又疏意顯釋義之家離合俱得故相攝之文有四句可知者一鳥諍殘食二佛問所由三慶喜啟尊四開殘恣食僧食文四者三文同上四正開殘法律文注云更有餘因緣事者下足食戒律文云有一長老多知識比丘入村乞食大得積聚一處共食即許殘食來至藍中與諸比丘諸比丘足食已不敢食乃至廣說釋疑故故來者古師意儻有外疑云蘇既非時脂亦應未同是眾生身分出故即釋疑言蘇不命脂乃煞生故蘇與脂開不開別是故文言非時煑漉等如法治若爾文言如服油法云何通釋答油有二種一加口法開七日服油法謂如不加法油也緣起戒本佛直忌乎初戒本中死屍上犯彼於廣釋屍上成夷也對病殊功緣不盡舉者若一一俗舉殊功之藥成太繁之失也淨人難得者祇第十云脂者僧中行魚脂熊脂羆脂猪脂失修摩羅脂少知識比丘得持細疊漉取得七日受若事緣不得作如上酥中說彼律指上文也上文云若有事緣不得中前作當作是言此中淨物生我當作七日藥受若誤忘不受不作淨時過是名不淨文言若熟不聽飲者一以變失本性故受法亦失二以變熟或變成須故也言中是到者應言齊七日得服服若過七日者尼薩也兩句中廣解分文悉同長衣者謂文分二初廣解犯尼薩耆二此尼薩耆應捨已下捨懺方法前文復二初畜長過染以明犯二若犯捨墮藥不捨已下染用以明犯初文八章門始從得終盡忘不忘廣則三十二者若加十箇到句即三十二也又若加九箇超句即四十一也如下當知犯長不犯約此得門解之須淨不淨約第二淨施門解故章言就第二文釋等解有二種者以古師解兼命為二古師意云下六日藥被初深竟亦失受既不許服受法何存今解如章也餘句類知者且辨轉降初章一句第二六句第三五句第四四句第五三句第六二句第七一句合二十二句也第三章中到句有一第四有二第五有三第六有四合十到句也餘章不得作也超問向者第三章四第四章二第五章三合九超句餘章不得作也簡別非時者非時唯局內用故也如第七章門一日不淨下六日藥淨等者誤也得不得章可有第七淨不淨章何有第七也答藥據所防各異等者藥中說淨防長也口法防殘觸也如多論說者多論第五但云若是衣財先雖說淨後作受持即失淨法已上論文疏中准此故云本說淨財為防於長等也越此分齊則無長過故爾等者今恐疏中不契正理故今更解受七日藥於七日內全無長過八日已後長過方生故今創受懸防後長預加淨法故七日內受法防𠎝八日已去淨法防長淨法不失也問何故長衣現對說淨論其長藥懸加淨法答藥體轉變以成過限故於限內懸加淨法三衣之體不變為長故要對長方加淨法不成七日用者如燒作灰等三種處分者一塗向等是入俗也二與比丘食三還本主並據捨日及望以說者若至第八日捨懺者還法如文若至九日者初二日藥與僧俗第三日藥與比丘食下四日藥還主若至十日者初三日與僧俗第四日與比丘會下三日還主乃至十二日捨者初五日與僧俗第六日與比丘食第七日還主十三日捨處分十四日已後一向一種處分並准應思章云下五日藥雖復還主等者釋律開文中言也雨浴衣戒文言三月十六日應求四月一日應用過此時前隨應結罪多論第六云從三月十六日至四月十五日是春殘一月已上論文多論過前求用二俱尼薩者不然彼論云從求作來突吉羅過半月畜故從畜用來尼薩耆十誦第八亦從求來皆吉從受持來尼薩已上論律准善見十五云非求露衣時若求尼薩據此諸文方得斷言兩戒合制貯用得前受者先已求得故有貯畜而受用義由是復有過前受持也文言不與人過願者有兩解一若對清淨應言不與有過失願故多論第九云佛不與過願者如玉大人有從求願禮必不違若求妻妾奴婢田宅悉與佛以過此不如法與故云不與過願二者若望可辨應言不與過分之願謂如過分求聖道等一問八人所趣向果者謂受鹿母八施之人也根力覺意者五根五力七覺意亦名七覺支檀越者訛略梵云陀那鉢底譯為施主陀那是施鉢底是主亦有釋云檀越者謂由行檀越廢貧乏者義釋也三時心淨者施方便時根本施時施已後時也非法之物獲福微尠者發菩提心經云三事俱勝即是心淨財淨因淨餘皆准思囑當可知者得天上等者囑當受樂報得無漏等者囑當永得安隱樂舉前因勝顯所得果有無窮之益者次下三句正出所得出世及世果也文言不捨雨衣便持餘用者五分第五云常乞畜不受持謂夏中用時不持不施人不淨施謂夏後用乞持法已謝即是此文不捨也現有雨衣猶裸形而浴者見論十五若有雨衣不用裸形洗洛突吉羅多論雨衣二益者彼第六云比丘得畜雨衣尼畜俗衣不得畜雨衣以尼劣弱擔持難故雨浴衣凡有二事天雨時以鄣四邊於中澡浴若天熱時亦以自鄣於中澡浴二以夏月多雨常裹三衣擔持行來已上論文今三藏云其浴裙法以疊布長五肘闊肘半繞身使迊抽出舊裙迴兩頭今向前取左邊上角以右手牽向腰下令使近身併蹙右邊擪入腰內此謂著浴裙法臥時著裙其法亦爾欲出他時抖擻徐出勿令虫著若不他浴者著裙同此水遣人洗又洗浴者並須飢時浴已方食有其二益一身體清虗無諸垢穢二淡飲消散能飡飲食飽食方洗醫明所諱故知飢沐飽浴未是通方也又著三尺浴衣福小形露或全不著赤體而浴者深乖教理也述曰據三藏浴衣量也百二十日用者謂若無閏得從四月一日已去百五日用之若閏者從前四月十六日已去百二十日用之祇律十一八月半捨如章彼又言若至十六日捨越毗尼捨已得用作三衣亦得作淨准此故知捨已須說淨等急施衣戒違反兩教者本制夏竟復開十日違此制開故言違兩教也舉是以明非者十日未竟是應受故明知已前受者非也舉後以釋疑者乃至衣時應畜即釋時後不應受也二事不並者若過前犯理不重犯故無過後過後若犯明非過前也初五別解中三合釋者律文之中先釋初句次釋中三後釋第五也五分第五急施衣者若軍行若垂產婦如是等急時施過時不復施祇十一云急施衣者若男若女在家出家欲征時征還時死時女人歸時商人去時施主語比丘言若今日不取明日無是名急施非時分中但有一日故言明日自恣此文甚好亦有疏本闕無此文甚好一句也此中意破古人立義故云甚好也謂有人言七月五日去十五日已前總有十日得受急施今師意存七月六日去十六日已前總有十日得受急施謂准此文最後一句既言明日自恣不受德衣一月或受德衣五月後增九日故知即從十六日後計滿一月五月也謂前取十五日帖後九日總成十日以之為開以此反推即從十五日已前至七月六日總成十日開受急施若更向前即犯尼薩故不得言七月五日即受急衣也有疏本云今是初句故言十日畜自恣竟不受德衣一月受德衣五月復有疏本云今是初句不受德衣五月故言十日在十日畜自恣謂十日畜竟自恣也此兩說義同也此過後畜應准長衣即坐轉還計亦應得然今無文行事者且依宿付者好六夜戒此戒同異如前已辨者上戒云問不離衣六夜同是離衣何故不合答多義故離一人有勝行常流二處不同此戒衣人互在十一界犯下戒要蘭若衣必聚落三開緣異此戒以病差為限下是外難定開六夜冬分非時者謂迦提月滿已後也此恐不然次下當辨文言什物者什者雜也資生之總也江南名什物此土名行漢書貧民賜田宅什物是也今三藏云除去三衣別有十物通數即是十三資具三是三衣四尼師但那此云襯臥衣也五泥婆珊那此云裙也舊云涅槃僧是也六副泥婆珊那七僧脚崎迦此云掩腋衣量同覆膊彼似五條傳授者誤今垂在右八副僧脚崎迦九迦耶褒折娜此云拭身巾也十木佉褒折娜拭面巾也十一雞舍鉢剌底揭剌呵剃髮衣也形如縵條著而剃髮十二揵豆鉢剌底車憚娜覆瘡衣也十三殺社鉢利色家羅譯為樂直衣也今詳梵本通說十三除三說十未必契理故文言我聽諸比丘等者指下佛呵文也戒本中疏云二明非時分甄去時分不犯者此則古來供傳此釋謂迦提月滿足已後非時分中開離六夜今三藏云此戒本為後安居人開其六夜由前安居人夏滿出去後人須至迦提滿來此處護憂此月多賊又為獨居故開六夜非開上行但有迦提今觀此律理亦應然故緣起云夏安居訖迦提月滿謂前安訖後安待滿故開之也以前安人迦提月中理不須開明知開後故釋戒文應言滿來理非滿外南山輙改戒本云夏三月安居竟至八月十五日滿已若迴遠有疑恐畏難處者大成疎失也准驗餘律皆是滿來非是滿外且十誦第八戒本云若比丘三月過至八月未滿歲釋中云未滿歲者後安居最後子注云三月過者謂夏有四月雖過而後安居人日猶未滿故言未滿八月也五分第五僧祇第十一並悉大同五分戒本云若比丘住阿練若安居三月未滿八月釋中云安居三月者前安居未滿八月者後安居祇律開緣非唯為難彼云佛告優波離往沙祇國與僧滅諍優波離辭言我僧伽梨重而今半安居中留衣犯捨佛問幾日可得往還優波離言計去二日來二日都計六日可得往還因開六日彼戒本云夏三月未滿比丘在阿練等釋中云安居三月者從四月十六日至七月十五日未滿者未至八月十五日比丘未至末月中阿練若處住上來諸文皆是滿來古人因何謬解五分云爾時有八月賊常伺捕人殺以祠天多論第五始過十五日未滿八月十六日謂前安人始過七月十五日外國賊盜有時此次六夜中間是賊發時多論有病得僧羯磨者不然彼論無文乃是祇律也故言七日如祇律說者謂祇六十病比丘事前畜藥戒疏已引之疑家者謂賊師等家也五分云伽梨優多羅隨所重寄一衣不得寄安陀以著身故禮拜入僧乞食不得單著故不得寄二文五以上者一身衣可在二彼六夜竟第七夜已下教不犯法三若比丘六夜竟已下不行捨會四第七夜明相出已下離三衣提五除三衣已已下離餘衣吉迴僧戒第二物迴之無罪者疏意云文言未許故迴無罪今詳文言為僧故作如何無罪故今別釋初物文文言僧物者已許僧述曰已捨與僧猶屬本主大與爾許少即更添次物文言為僧者為僧故作未許僧述曰已與僧未定屬僧捨爾許物未定何眾後物文言已與僧者已許僧已捨與僧述曰已捨與僧已定屬僧用爾許物定與此眾准此即是初二兩物迴得薩耆第三物可如章釋釋此三物上盜戒中已辨其相准緣起現前僧物迴與自身犯捨若四方僧物後文迴入現前得突吉羅以不入己故若入己者亦應犯捨境想約初文者今詳之義約初二文也四五十三律捨竟自用者與僧祇有同有異也五分五敷永捨入僧作敷具即同祇也祇律迴僧制令入僧即不同五分得自用也開文中若與少人勸與多人者謂本少物擬與少人今勸多物令與多人者開也若少物勸與多人亦應犯吉也祇十一云若有人未欲有布施問比丘言尊者我欲布施應施何處比丘應言隨汝心所敬處便與施主復問何處果報多答言施僧果報多施主復問何等僧清淨持戒有功德比丘應言僧無有犯戒不清淨若人持物來施比丘應言施僧者得大果報若我已曾施僧今正欲施尊者比丘受者無罪若人問言我欲以此物布施為置何處使我此物長見受用爾時應語某甲比丘坐禪誦經持戒若施彼者長見受用
