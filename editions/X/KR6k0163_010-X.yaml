body:
  text: 嵩岳鎮國道場沙門賓作疏本第五祇九十二者謂於此律九十之中無不受諫及真實淨施加四不同即九十二也有人言彼無恐怖者謬也彼律第十九有恐怖戒也一輙教誡尼不白善比丘彼律第十五云若比丘往尼住處欲教誡不白善比丘除餘時波逸提餘時者病時釋中云餘時者比丘尼病時二不捨淨作三衣彼律第十九云若比丘與比丘比丘尼式叉摩那沙彌沙彌尼衣後不捨而受用提三輕他彼律第十四別有異語惱他戒此輕他戒如彼第二十云若比丘輕他者提釋中云輕他有八事一語來不來二莫來而來第三已下坐語去廣說亦爾四迴僧物向他彼律第二十一云若比丘知物向僧迴向餘人提彼律第十復有故打鉢破得提不入九十二數中也五分九十一者彼亦闕無不受諫戒彼律第六合二虫水以為一戒加三不同即九十一也一輙教尼彼律第七云若比丘僧不差為教誡故入尼住處除因緣因緣者比丘尼病律又復別有輙教誡尼二輕三師彼律第八云若比丘輕師提釋中云輕三師及戒二提三迴僧物與他彼律第九云若比丘知檀越欲與僧物迴與餘人提十律九十者彼亦無不受諫更一不同即九十也一者不恭敬彼律第十七云若比丘不恭敬者提緣起云闡陀比丘諸上座所說法律未竟中間作異語答難無畏敬心作白四記識未記識作者犯吉記識竟作者提彼律第十別有用異事嘿然惱他戒即是此律異語戒也南山云彼律別有不隨問答戒者不然五分第六有不隨問答戒即是異語戒也體雖似同文言別故疏云少有同異可知者應言多同而少異也南山又云鼻奈那律更有五不同如下所辨今詳文相十一不同窮其實體但應有八一先要後違彼律第七云若比丘先共要後作是語汝減比丘僧物用違前要者提緣起云諸比丘語六羣言有諸長者至園觀者了無賓待既招謗譏可聽糴米共賓待之六羣言善彼便悔之或以此戒贊同羯磨悔二卒嗔恚彼律第七云卒嗔恚者墮南山即錄此為一也三激人使嗔彼律第七云十比丘激動阿練若云諸忍已得初禪等戒此即是疑惱戒也南山錄為二也四不請強往彼律第七云若比丘不請強往者墮或時應往或病或執僧事作衣此應食緣起云佛在王舍時人飢饉諸長者請一比丘或四五皆往因之制也南山為三也五先往請家坐臥挵小兒彼律第八云若比丘先至請家若坐若臥挵小兒墮緣起云有長者請佛僧六羣先往食厨間止長者生嫌故制也南山為四也六初可後違彼律第八云若比丘比丘僧常法辭比丘僧僧聽使行後比丘證言不如法辭比丘僧初可後違者墮述曰先共聽行而後悔之也緣起云舍利弗辭佛僧六十日行有比丘言身子懈慢不辭故制也七證他煞虫彼律第九云若比丘不煞虫證言煞虫者墮緣起云六羣證十羣言汝前行蹈虫煞可向我悔故制也八以水相灑彼律第九云若比丘不得以水相灑驚禪者墮此戒即是水戲戒也若無戲心但擬相覺即是不同也九賖賣衣還借著壞仍責直彼律第九云若比丘賖賣衣與比丘比丘尼式叉摩那沙彌沙彌尼還借著既着衣壞復責其直者墮十高聲大喚擾亂人彼律第九云若比丘不得高聲大喚擾亂人若擾亂者墮也十一先至食處眾前挵小兒彼律第九云若比丘小食中食先至彼坐於大眾前挵小兒墮南山為五也解脫戒本亦有九十不能繁敘此律九十總為七門者准此律中有九十一下增五中有五持律一誦至三十二至九十三廣誦戒四誦二部戒五都誦毗尼餘時不依前四持律吉羅夏不依第五持律提口二十者頌曰五言妄毀兩同說實過嫌輙譏暮恐疑發鄣勸尼悔欲根此中亦有身業助成者如妄語中作書現相等隨應當知二宿者未具同宿婦女同宿過受者一食處過受也三坐者食家有寶強坐有寶屏坐與女露坐後二戒章中名為與俗女屏坐俗女露坐初開第四人後二開第三人非時食身業犯者有一古師云非時食是口業犯故別破之二隨者隨順利吒隨擯沙彌也此三十一頌曰五言二宿強脫覆衣尼過眾三非殘受道藥三坐三軍酒戲洗擊歷白二隨打博宮見論身心犯者彼論十六云此是性罪因身心起疏即釋云以見聞他犯此是通名身業者謂見他身通名為身即此見時未得覆罪故云未即成罪此義乃是往代諸師謬為此釋上婬戒前十門義中已辨非訖十九戒自口作業假他身者頌曰五言掘壞房虫足燃藏煞出虫尼衣寶牀蓐角師瘡兩來四期者尼期行尼同船婦女期行賊期行也自口作期假身共行索美者口索身受食之也此等假他身可知口業惱僧名為異語身業惱者名曰觸惱各須作白以記識之後若更為即犯提罪十一自他俱犯者頌曰掘壞房虫怖燃藏煞謗寶此三大護佛法者多論第六壞生戒云為大護佛法故凡有三戒大利益佛法一不得擔謂三十戒中擔羊毛也二不得煞草木三不掘地若不制三戒一切國王當使比丘種種作有此三戒帝主國王一切息心已上論文今章云捉寶是大護者其理亦通且如捉寶緣起大臣評論沙門釋子得捉金銀等即是失人信心也珠髻大臣為其解釋皆令生信故知不捉即是大護也六十七戒自重教輕者但吉也三十是性中逐難釋云麤說麤也強強敷也用用虫水也譏譏教戒師也駈駈他出聚落飲飲虫水也起發記四諍說說欲不鄣隨隨舉比丘擯隨擯沙彌同同羯磨悔欲不與欲也悔與欲已悔聽屏聽四諍五雙者言辭便易且說五雙理實德衣於單提內總含三戒謂背別及食前食後入聚也得羯磨一雙者謂得羯磨氣類是同非謂羯磨法無差別囑授雙亦爾七日盡形作口法受不犯殘宿不受者且據二藥若非時漿唯望不受得成雙犯望於殘宿無雙犯義故疏略不辨也亦可作法作事等者謂前但辨五雙三隻作口法邊名為作持故今更解雙約作法及以作事即通二持也以彼時外對非時入聚等者總欲為成言辭便易故也品別已如上辨者對覆律師止持止犯寄九十初明故也尼無可知者尼無教誡僧義故也行三者尼同船尼同行婦女同行也此並尼提僧吉與賊期行僧尼同提開緣不同者僧有餘法背足別制尼無餘法合制一也犯雖是同與緣不同者下僧律文云外道者裸形異學乃至在此眾外出家者是結餘眾云比丘突吉羅下疏釋云大僧要與出家外道甄去在家犯輕故爾尼亦犯提且不同結方便吉尼律文緣起云有二沙彌一名耳二名蜜一人罷道一人入外道六羣尼持食與故知出家在家俱犯下疏釋云白衣亦同犯提謂在家俱犯提故云亦減年受緣不同者尼與式叉作本法也用緣不同者尼浴衣一切時用不同大僧四月一日已後方許用也名字不同者多論第六云比丘畜雨衣尼得畜浴衣不得畜雨衣也僧寬尼狹者尼但覆殘而犯提罪僧覆夷殘並犯提罪故知寬狹也尼覆他夷自犯夷罪今辨單提故闕不辨也若約人者僧覆麤戒文云知他比丘犯麤罪即似𢩁覆比丘邊犯若尋彼釋相文云除比丘比丘尼覆餘人麤罪吉羅故知覆尼亦犯提罪若不爾者應言除比丘覆餘人吉何因乃言餘僧及尼故知所覆定通二眾夷殘兩罪也次辨尼覆得提罪者下尼律中直列戒本故例大僧通覆僧尼殘罪並提因此復辨尼覆夷戒戒本云若比丘尼知比丘尼犯夷此亦似𢩁覆尼邊犯又若尋彼釋相文云除比丘比丘尼覆餘人罪吉故知通覆僧尼夷罪並皆犯夷若不爾者應但除尼覆僧夷罪犯波逸提覆餘人罪方言犯吉或即應言但除尼眾覆餘四眾並皆犯吉何因乃言除僧及尼故知所覆亦通二眾四夷八夷也然下疏釋尼覆夷戒云覆藏𢩁女者謬也亦可尼覆二眾罪雜夷提除雜辨純故除二眾即疏家釋是也如兩舌毀呰者雖大僧中二戒並結尼眾犯提然據實理尼但毀尼得毀尼提若毀大僧自有罵比丘戒也即彼罵戒結比丘吉故知比丘毀尼但吉若僧毀僧方犯毀提若兩舌者僧望於僧容成破僧亦是惱重故得提罪若望兩眾無互破義為之亦希故但犯吉故多論第六云傳向一比丘提傳向四眾吉十誦第九云除比丘別離餘人吉別離者兩舌是也然多論云此是共戒者以義是同故云共戒理實約義即別也除屏覆二敷者以此二戒若決心去出門即犯由此定無預設方便故無任運也若本蹔出界外逢緣忽然受具乘即不來亦是任運然不決定故須除之自有科分者光統律師分此九十為九修相一從初至壞生十一个戒守口攝意身莫犯善調三業行二從異語至覆屋九个戒善將人心隨護眾意不相嬈惱行三從輙教至與女期行十一个戒遠嫌避疑離染清淨行四從施一食處至四月藥請十七个戒內資節量少欲知足行五從觀軍至白色三衣十三个戒繫意住緣離諸教放逸脩習出道無著行六從故斷畜生命至與賊期行七个戒常行遠離脩慈愍物行七從說欲不鄣至不攝耳聽六个戒深心信解敬脩諸佛教法行八從同羯磨至無根謗七个戒同住安樂不相嬈惱詳知無二共相遵奉行九從突入王宮至末十个戒衣服外儀節量謹攝無違行妄語戒梵云沒里沙婆施譯為妄語也闕緣比說等者若闕通緣闕緣方便別中闕初境差吉羅闕二想疑闕三及四容是實語闕五六及境強緣差心息故具七因也四句中第三是惡口者多論云以麤說故是惡口然此四出出在多論第六兩舌戒中彼對兩舌作四句訖復言妄語惡口作四句亦如是今詳此中四句法戒謂以妄語對餘二種妄語一向為四句頭但以餘兩二互二俱為四句也謂初俱非第四俱是中間二偏故成四句下毀兩等為四句頭應知亦爾諸句中言非妄語者多云當實說故非妄語下戒准此宮云以綺語對餘亦為四句者理不應然既不得說是毀兩非綺語故亦不說是綺語非毀兩是故多論但作三四也文言違反前語者見論十五云呵多大德與外道論時自知理屈便違反前語若外道語好便迴為己語若自理僻便言是外道語若語外道中後當論自中前來自上高座語諸檀越外道那得不來必當畏我是故不來便下高座而去中後外道來覓不得便呵釋子云何妄語五分第六云我實知非耻隨處故妄語耳違境轉心者轉即是背也列八種不淨語境界者發妄語心緣彼見等八種為境故也先解後四見聞觸知者釋此四義諸宗不同且薩婆多及智度論第四十同律中釋也若依經部如俱舍十六敘兩師釋一云有餘師說若是五根現所證境名為所見五識現量境也若他傳說名為所聞由耳傳生意地之境名聞也此即教量也若運自心以種種理比度所許名為所覺意地比量若意現證名為所知意地現量也謂五識後及定心境也於五境中一一容起見聞覺知四種言說於第六境除見有三又一釋云先軌範師聞如是說眼所現見名為所見眼識現量境也從他傳聞名為所聞同前自運己心諸所思稱名為所覺同前自內所受及自所證名為所知謂耳等四識現量境及意地現量境也若依大乘瑜伽宗說且如雜集第一云眼所受是見義耳所受是聞義自然思搆應如是知者是覺義自內所受是知義述曰大意同前先軌範說瑜伽第二第九十二顯揚十八並釋其義不能繁敘具如瑜伽注釋次隨疏釋眼根五緣能通生識了別名見者此依薩婆多宗眼根見色要由發識現在根中方得見名識者即是了別義也耳識能聞者耳根能聞而言識者由識在根方名聞其義無失餘皆准此婆沙等論並許此釋也若依成實論宗識能見聞如上謗戒中已辨訖意知一切俱能知故復有疏云意知一切俱能知發識意故述曰俱能知故者意識自業唯知法界若作他業亦能了知餘十七界發識故者疏意云眼等諸識由意識引故知意識亦與眼等所緣境同也今詳大小乘諸論皆云三緣生識一根不壞二境現前三能生作意正起詳其作意是心所法警心為性自有二種一者意識相應能令意識心心所法引眼等識二者即眼識等自有作意雖與眼識同剎那起而亦名為令眼識生同時因果理無違故前來疏意且辨前義或通辨二並皆不妨也由此意識亦具三緣三根性鈍力用處少者謂鼻等根唯能局取香味觸三無記境界故云用少也心論第二偈云二境不近受長行釋云二界不近受者眼識耳識不近境界如逼眼色不見故耳亦如是逼則不聞此釋初句意識者遠近境界悉受除自體及相應俱有餘一切悉受此釋第二句也餘一向近受者舌鼻身識要近境界依緣無間故依謂識所依根也緣謂識所緣境也根境無隔方能受也三根神通性者雜心意云眼耳二根成眼耳通意根具成餘四通也不見等四以無為境者疏意云發妄語心緣彼無見無聞等事以之為境而違此境以發妄言也又總略辨疏中意者不見言見違境寬所稱體狹謂所違境總有四種一者無見二者聞三者觸四者知故云寬也而發言見故云體狹也不聞等三准此應知因辨下文見言不見者所違境狹所稱體寬謂唯眼見為所違境故云狹也而口發言便有四種一不見二聞三觸四知故云寬也餘三准此下正辨妄中但對不見舉見對見舉不見不廣分折者懸談次後六心文也謂六心但言不見不聞不知而言見聞觸知者其文及是不廣分折也若廣分折者即如章中若依上文已下是對見舉不見反此應知亦是不廣分折也若廣分折者即如章中若舉見等發言不見等亦應并聞等已下是也初三五俱違句二四六單違心者二四六亦名境順心違此中境者如上大妄戒中辨三種境此等妄中唯約實事境辨也謂此實事望口說邊以為違順也若望自心所現之境即是六句悉皆俱違且如第二心云不見有見想此想心中亦有所現色相當心今違此境發言不見豈非心境俱違也餘句准此有疑妄即無疑二者問前云謂三妄心義不得來何以今言彼有疑妄即是小妄無疑二心也答此謂義來文不來也然諸學者必須明記謗及小妄兩處六心方可尋疏校量差別也第二以想受行等者等取心也謂配成實識想受行四心也准成實宗五識無染亦無離染由斯五識無善惡行何處得有行心見𧆞及得冷觸以此二境是眼身境故也解云由眼身境流入行心思量損益等也疏中意者見欲觸三並配行也忍配受也想配想也心配識也今詳文意見者是慧簡擇為義忍是勝解印持為義此二即是大乘之中五別境數也欲謂希求觸謂三和想謂取像此三即是大乘之中五遍行數也即心王了別為義也此中即辨五个心所一个心王准薩婆多通大地數總有十法此五即是彼十之數故知宗通大地法有此五數并心王合為六也由通大地遍一切心是故偏舉也此釋決定勿復疑之即列五妄者十律第九云有五種妄語有入吉有入提蘭殘夷夷殘可知入蘭者不具足夷殘是也入提者無根殘謗也入吉者除四妄語餘妄語犯吉除上四是及妄語體者凡妄語體不見言見見言不見等體非聖語其初三五即是此體而二四六不見言不見等相中似實故且不名體也復應言有疑便說開前二六中各三四句復應言無疑便說開前二六中各五六句者覺云此釋不然前既已說開初三五故今不應更說開三及開第五也毀呰戒梵云鄔那末奴沙婆此云減人語也謂是損減他人故也即是毀呰義也緣起中百車者姬周升法三升當今一升總計三十石餘也五百結者相傳釋云九十八使分為五品合有四百九十并根本十使合為五百或除十使而加十纏俱舍頌云纏八無慚愧嫉妬并悔眠及掉舉惛沉或十加忿䨱今詳智度論第八云迦旃延子阿毗曇中說九十八結十纏為百八煩惱迦旃延子二百年時造發智論即是有部祖師也犢子兒阿毗曇中結使亦同纏有五百又云纏者有人言十纏有人言五百纏唯彼論文今此律云五百結者譯之誤也應言纏也然法藏部與犢子部同時興世故所執義容可相同謂並三百年出也若言此律是法上即從犢子部出故所執義仍同本計也此部既無論文廣釋故不可言分九十八為五品等但知宗別耳祇律第十二種姓下者汝是旃陀羅剃髮師等中者中間種姓上者汝是剎利婆羅門種作是語欲使彼羞業下者汝是屠兒賣䐗捕鳥等中者汝是賣香坐店肆田作人等上者汝是居金銀摩尼銅器店肆人相貌下者汝是瞎眼曲脊跛脚搕頭鋸齒中者汝太黑太白太黃太赤上者汝有三十二相圓光金色病者一切盡名下汝等疥癬乃至癲狂罪者一切盡下如犯夷殘提提舍尼越毗尼罵者盡名下婬逸穢一切惡罵結使盡名下汝是愚癡闇鈍無知猶如泥團如羊白鵠角鵄祇律有一類偷蘭輕於提罪也心悔者謂責心悔不同單言越毗尼者須對手也兩舌戒論中鬪亂大比丘等者多論第六如上義門中引十誦第九亦爾伽第二亦云比丘邊兩舌提尼等四眾邊吉尼向僧邊吉或可此等部別也以其伽論小妄毀呰兩舌等並說相書等吉故也正是虗辭者不然傳實亦犯故女同宿戒五分第八女人乃至初生章云具非具非五分文也祇三趣者彼第十九云若牛驢等擎頭時未得罪委頭眠提雌狗舒頭無罪屈頭眠提鵝鷄屈頭著翅下提象正立時無罪倚眠時提畜生既犯非人准知眠中小女犯者祇云若多比丘在房同眠臥母人抱女兒入一切眠比丘提若維那知事人應語言汝正竪兒抱入准此律中小應不犯下釋相中人女有智命根不斷故也十誦十六云女者人女非人女畜生女人若坐若臥名為宿准此律開文中坐不犯十誦又云通夜坐不臥不犯他舍有女宿孔容猫子入犯也多論第八畜女堪作婬者提若不堪作婬石女根壞鬼神女天女鵨等吉羅此等部別不必須依寄相似犯者犯同宿然實端坐故不犯也無癡人者十誦律阿那律雖得羅漢不應與女共宿如熱飲食人之所欲女人於男亦復如是此說餘人不談羅漢祇云若佛生日得道日等大會若通夜說法當在露地若風雪寒者當入屋正身坐若老若病不能坐者當鄣隔鄣隔不得用疎物高齊肩腋若道行入聚落宿當別房若無屋當露地若風寒當入屋正身若老病當作障若無者女人可信應語言汝先眠我坐比丘欲眠時語令起我欲眠汝莫眠眠者汝無福未具同宿戒伽論與女無過三罪無文也若曾與男二夜竟等伽論第二有文也尼戒中者尼戒本也牒制隨開者多論第八云若都不聽或有失命因緣乃至以怜愍故得共二宿以護佛法故不聽三宿十誦十五云二事利故一者為沙彌故二者為白衣來至僧房故僧祇十七有清信人為佛作廁佛雖不須順世故受羅云露眠時夜風雨到世尊廁枕廁板臥夜有黑虵亦畏風雨欲入廁中佛常觀眾生見虵欲入畏惱羅云即放光明自到廁上以金色細滑手扶起拂拭身上塵土已將入自房指示床前言汝此中住如來已與弟子制戒是故順行此戒是故世尊跏趺坐到地了十誦廁中宿佛恐螫來為說偈云汝不為貧窮亦不失富貴但為求道故出家應忍苦將至房中到地了已語諸比丘是沙彌可怜愍無父母若不慈愍何緣得活若值惡獸得大苦惱親里必嗔言沙門釋子能畜沙彌而不能守護呵已制戒見論十五云所以入佛廁者以淨潔多人以香華供養是故入中未具同宿犯由於宿後開二三宿開宿永無一宿犯者因宿太急開至三宿故無一宿也軍中由觀後藉緣故開二三宿別立過三戒然觀軍宿因宿緣開見軍不犯等者觀軍之時晝見即犯不待明相故次釋云然觀軍非宿若爾觀軍亦有開不故次釋云因三宿緣傍開見軍非正開也乃至是故不類者不類同宿開宿宿類同故是正開也屏敷中本心蹔去開其三宿本決永去出門時犯也見論十五云乃至以衣縵作屋亦犯若多房共一戶亦犯除別有戶又云若四周各向裏開戶共一大戶出入亦犯若別有戶不犯又云若屋相連接大乃至一由旬同一戶亦犯多論第八云若共宿二夜已移在餘處過一宿已還共同宿無過祇十七寒雪等同前戒應知其相同誦戒多論第六為分別言語令分了故章中脫令字也文言與長者誦佛經者五分第六初緣聽教白衣誦經時諸比丘種種國出家音句不正居士譏呵云何晝夜親承而不知男女黃門二根人語等佛呵居士因制不教後復來求開不並誦西方聲明有三種聲一者男聲二者女聲三非男非女聲僧祇十三有婆羅門嫌言而中喡喡似如童子在學堂中學誦聲亦復不知何者是師誰是弟子彼人見已不生信心表三行理周者諸惡莫作等上之三句如次即表戒定慧三行也如上結戒六門中辨論云齊聲句異者多論第六也表止行不周者止即戒也專是過體者前制意中多論云為分別言語令分了故今令不分了故是過也資神之益名曰句味者今詳梵本云便膳那此云文也舊翻為味其義失也西國呼文呼扇呼鹽呼男女根並名便膳那謂文為依能顯名句扇能顯風鹽顯食味男女二根顯其報別由義相濫故謬譯也譯既有失疏釋亦非也表名體理圓名為字義者此釋亦非也今詳律中略舉悉談章中五字也然悉談章四十九字是諸字本多未因義以二二合三三合方有所因故不應云表名體圓也且悉談章有十四音或十二音或十六音𧙃烏可反阿伊上聲呼伊平聲呼鄔烏理釐力之反𨤲烏淣反奧菴惡此上十四音二二相對也前之八字二二對中各前短聲後是長聲也後之六字二二對中各前長聲後是短聲也次有五五二十五字名為比聲第一五者迦俱婀反佉伽舌根間聲而輕伽喉中聲而重也俄魚迦反仍以上聲呼第二五者遮車闍舌頭聲而輕闍喉中聲而重若耳者反第三五者吒咃丑家反荼上齶聲而輕荼喉中聲而重挐上聲呼第四五者多他陁舌頭聲而輕陁喉中聲而重那上聲呼第五五者婆坡婆唇吻聲而輕婆喉中聲而重摩上聲呼次有八字名為超聲野羅理假反羅魯我反婆蒲我反奢上聲呼沙上聲呼沙呵此二合為一字乞叉楚荷反仍合呼之為一字今律文中呵是十四音之首羅是超聲中第三字波是比聲中第五五中字也遮比聲中第二五中字也那是第四五中字且如波字比前十四音者除理釐聲比餘十二成十二字謂應說言簸波比晡以反比晡夷補晡閇補米反沛補毒反布寶泛布憾反博白餘二十四字各成十二准此應知然此等字且以漢字替之實亦難同也言悉談者此云成就義也往在洛陽大福先寺親見淨三藏勘此戒本中四分梵本云鉢陀此云句也今律文云句義也阿㝹鉢陀此云隨句也今律云非句義也便社那此云文也今律文云句味也阿㝹便社那此云隨文也今律云非句味也惡叉羅此云字也今律文云字義也阿㝹惡叉羅此云隨字也今律云非字義也此中義意齊聲同誦名之為句連聲逐唱名為隨句及以文字亦准此知律義意同也經論中意顯義周圓名之為句是故律云諸惡莫作等也亦應更有名及隨名詮法自性目之為名如言諸行目有為體也復言無常即顯諸行定非常住既亦間於常顯差別義義既周足即名為句故論中云名詮自性句詮差別文即是字為二所依問何故不言名及隨名答句中以含故律不說也問文即是字應無差別答文雖是字而義有異謂顯名句即說為文故此律云眼無常意辨文體能顯眼名及無常等也若論字者西方釋為無異流轉且如阿字於善惡等一切語中並不改轉故云字且正傍談還依疏釋若聲聞諸天佛力加已下祇第十三文也文言書授者謂手書而口唱非謂直爾書授故文言了了不了了等也開文言同誦者多論第六云若二人俱經利並誦無犯不得合唄若比丘無處受誦乃至得從沙彌尼受法但求好持戒重德人作伴證明耳亦得從白衣受法但不得稱阿闍梨如是展轉皆得受法但消息令不失威儀祇第十三云若僧中唱說偈時不得同說一偈得同時各各別說餘偈說麤戒文中六羣語白衣等者僧祇十四有居士請多比丘有一長老行摩那埵在下行坐優婆夷言尊者先在上今何故乃坐此中耶䟦難陀言汝阿闍梨小兒時戲由故未除彼聞已作念我阿闍梨故當犯小小戒在此下坐即捉餅擲地而去作是言尊者取食語已入房掩戶一扇而說偈言出家已經久修習於梵行童子戲不止云何受信施牒制隨開文言不知麤惡非麤惡者內心不知為犯何罪直向俗說某甲犯罪後方知彼實犯麤罪也出血破僧調達所犯身子既畏明知即是麤罪所攝也不同十律者彼無正文然十律五十一云若謗出血壞僧並得偷蘭准彼文中二逆既與謗夷不同故知三逆非麤罪攝故多論第六云若說出血壞僧及一切蘭得突吉羅多論釋十誦故五分第六文言僧所羯磨人當隨僧教若教向甲說而向乙說教說此罪而說彼罪皆提文言了了提者多論云為大護佛法故若向白衣說比丘罪則前人於佛法中無信敬心寧破壞塔像不向人說比丘過惡若說則破法身故十誦五十二云若在界內向界外人說或時反此得吉在界內提開文云若白衣先聞者祇十四云若有問言彼比丘犯婬酒者比丘應問彼言汝何處聞答我某處某處聞比丘應答我亦如是處聞若未羯磨問者答言後自當知得道戒論云者多論第六也神通聖能者且約聖說理實異生亦得五通也除漏盡通過有增微僧者須制微或不論也文言善思惟者即上文正憶念也正定即彼正受也廣釋並如大妄戒中非類非同意者文中先明非同意罪次明根力等向未具人說名曰非類又解非類即是非同意也以其非同意境非是犯提之境類也驗上大妄戒中疏意即知此後解勝開文云增上慢不犯者若爾實得自說尚得提𠎝慢說欺他如何不犯答為護他人故制說實如下文中佛告目連止止不須復說諸比丘不信汝言以不信故得多罪苦諸比丘勿起不信長夜受苦若論慢說既是不實不信無罪然由心實無不實𠎝故使夷提並開不犯准向引文即是目連為不同意緣起說法戒多論第六云五語者五種語色陰無常受想行識無常六語可知見論十五云一句經文五句義疏合成六句不犯多云有智男子若方類不同者一切不聽男子必是白衣一切出家人亦不得以事同故祇十三若七歲若過七歲雖過七歲不解語義亦名無智又云眾多女人欲聽法各各得為說六句應語第一女言我為汝說六句說已復語第二女言為汝說六句如是眾多無罪比丘出已語女送出與別若呪願言使汝盡苦際得提若言使汝無病安樂無罪復詣餘家先女後來比丘見已語言可聽得提雖見不共語直為諸女說法先女雖聞無罪多論即言先女邊得罪若不知前女在中者不犯又云若轉經者亦事事提掘地戒此二戒者謂一掘地二煞草彼論云三更加不得擔擔羊毛也如上義門中已引或二或三者一經四月如本二雨漬如本又一經四月二被雨三如本也不問覆露者不然開文云若除房內土不犯僧祇第十畜寶戒中舉金銀時若是生地教淨人知若是覆處死土若自掘若使少年比丘掘述曰故知屋下乾地掘之不犯若新屋下地猶生濕即應不開也文言燃火提者見論十五云若地被燒亦非真地謂已曾燒壞之不犯又云若犯火燒手擲地不犯僧祇十九若被雨地傷如蚊脚提又云若欲壞壁當使淨人却泥後自得擿至基際若壁不泥已曾被雨使淨人擿兩三行後自擿至地際死土被雨已不得自取使淨人取盡雨所洽際後自取無罪新雨後不得自抒井若淨人小不能者當先下淨人擾而濁然後自抒池水亦爾若泥被雨後不得自取大小行用水持手摩地提若𭯽瓶器在露地乃至種種物在覆地雨後比丘不得自取壞生戒犯緣亦同同前戒也改名為異初略釋四句者謂第五句寄下廣中釋之也鬼村者准十誦律通於鬼畜總名為鬼十律第十云鬼村者謂生草木眾生依住眾生者謂樹神泉神河神舍神交道神市神都道神蚊虻蛣𧏙蛺蝶噉麻虫蝎虫蛾子是眾生以草木為舍亦以為村聚落城邑見論十五憂尸羅香莩也疏作香誤也見云䔶見多此二種樹唯見交廣有餘方不見謂交州廣州有之也見云蘇摩那華香氣與末利相似末利華者廣州有其華騰生也就地離地俱提者意說生種有生性故縱根離地壞亦犯提如糓子等豈假有根耶假名命者依成實宗五陰實法中假立眾生名即此眾生有名即此眾生有名無體名曰假名於中命根體亦是假離陰無體文言看是知是者五分第六云若比丘一一所須語淨人言汝知是若不解復語言汝看是若不解復語言我須是若不解復語言與我是僧祇十四子種者如十七種穀當作火淨若脫皮淨如狗驎提國作糓聚畏非人偷以灰遶上作識此即為淨如摩摩帝有倉糓未淨畏年少比丘不知法使淨人火淨至食盡比丘恒得語言舂去不犯又云裹核種者如酸棗等應抓甲淨去核而食若欲合食核者當火淨多論第六亦爾異語戒口餘三過者一妄二毀三兩舌也身業綺名觸惱者尊者曰此不然也如文觸惱者喚來不來乃至不應語便語故知觸惱亦通口業故應釋言問此答彼名為餘語餘語唯口業也故違禮式稱為觸惱觸惱通二業也文言未作白便作餘語者於行者有違故律制犯若為有益亦有開義故僧祇十四云若人問比丘言從何處來答言過去中來何處去答言未來中去何處眠八木上眠床有四木并四脚為八也何處食答言五指食如是不正答者越毗尼若賊來入寺中問比丘言示我僧物比丘不得示復不得妄語應示房舍床坐等若問塔物應示塔邊供養具諸器物等若言示我淨厨應示釜鑊盆器等若屠家畜生走不得示處應言看指甲看指甲胡音與不見同阿練兒處囚走問比丘如上畜生中答若僧中問異答異提眾多人中和上等諸長老前答異越今三藏云獵師逐鹿入寺問苾芻見不應設方便觀空觀爪答獵師曰納婆鉢奢弭或云諾佉鉢奢弭言納婆者目虗空也鉢奢者是見也弭是我也即是我見虗空之義又諾佉者爪甲也鉢奢等同前語雖如是其意則異且如納婆雖目太虗亦詮無義據此亦是我見無義既實見鹿不得言無寄覩太虗傍通無義欲令獵者謬解而歸又諾佉者雖目爪甲亦通無義餘釋同前上坐喚者須是如法事嫌罵戒面嫌者釋相中云面見譏嫌也露敷戒祗十四云捨離二十五肘提非是出門二十五肘也文勢到似者文言僧物者未捨與僧疏主意云此是寄僧未定入僧不舉小罪古師所辨第三句物到似初物也今詳文意人與爾許少則更添為僧者為僧作未捨與僧今詳文意捨爾許物未定何眾也疏意亦爾屬僧者已入僧已捨與僧用爾許物已入此眾疏意亦爾有古律本云僧物者已捨與僧也此即當前第三物也為僧者未捨與僧也當前第二物也屬僧者已入僧者已入僧而未捨當前初物今詳古師依此後本故與疏主一倍相翻疏主不知有此律本故云到似也然尋古師所憑律本即是又真三藏佛陀耶舍初譯律本後有晉國沙門支法領從西國還遂更重勘時時改之即是疏主所憑本也強敷戒我為彼有者以相親故我有即是彼有也十誦十一云若比丘為惱他故閇戶開戶閇向開向燃火滅火燃燈滅燈若唄呪願讀經說法問難隨他所不樂事作一一提牽出戒春冬房者春冬非是分得既有通義牽出過重故犯提罪若是夏中分得屬己牽彼出時情過是輕但犯小罪也僧祇十四若抱柱若捉戶若倚壁牽離一一提若口呵遣隨語離一一提若比丘嗔恚虵鼠駈出越若作是言此是無益之物駈出無罪虫水戒隨開中文言不知無犯者即是有作無想一向本迷也五分第六有虫疑亦犯提若諦視不見囊漉不得不犯十誦十一境想六句虫水虫想有作無想有虫疑此三句並提二句吉一句無犯可知多論第六如章所引第八又云一時舍利弗以淨天眼見空中有虫如水邊沙如器中粟無邊無量見已斷食二三日佛勑令食凡制有虫水齊宍眼所見漉囊所得不制天眼見也凡用水法應取上好細疊縱廣一肘作漉囊令一比丘持戒多聞深信罪福安詳審悉宍眼清淨者令其知水如法漉水置一器中足一日用明日更看若有虫者更應好漉以淨器盛水向日諦視若故有虫應作二重若故有虫應三重作若故有虫不應此處住應急移去僧祇十五營作者須水若池若河若井漉取滿器者無虫然後用若故有虫者當重囊漉諦視之若至三重故有虫者當更作井如前諦觀若故有虫者當捨所營至餘處去漉水法當竪三木以漉囊繫之以器承下漉囊中恒停水數倒着井中虫生無常或先無今有或今有後無是故比丘日日諦觀無虫便用已上論律文也此律下文宏墎者應作橫墎字也橫者說文云闌木也郭謂廓也在外廓落之稱也宏大也宏非此義也五十同爾者謂上來諸相大約同也淨三藏云每於晨旦必須觀永濾水法者西方用上白氎東夏宜用密絹其絲細勻經緯停緻或以米喿或可微煑生絹虫過存驗自知可取姬周四尺為量半腰中疊一邊縫合兩角牽開其兩角牽開其兩角頭仍各施帶兩畔安紐橫杖張開即羅樣也其縫羅法細緣却刺兩道行鍼務取無孔使虫不出繫羅兩柱中間著盆使承羅下若上傾水鑵要入羅逐長細寫如其不爾虫隨水落墮地墮盆還損虫也汲水了時先以淨水用淋鑵底再三令淨中以水盪務令虫盡方得將鑵淨處置之汲未了間鑵勿置地恐虫墮地故也於是取先濾竟之水置新漆器安竪塼或可別作觀水之臺以手掩口良久視之若銅器中觀者其虫白色與器相似不得見也若見有虫倒寫水中以餘淨水盪觀水器使虫淨盡且翻虫羅以水淋淨應准論律二三重漉三藏又云若六七月其虫更細生絹十重虫亦直過樂護生看應務令免漉水既訖即可翻羅要使兩人各捉一摕翻羅令入生器中以水遍澆羅中三遍外邊復以淨水遍淋務令虫盡其放生器作小水鑵令口直開猶如桶形底更安鼻鼻繫長繩傍安鈎其鑵糸放下井中縱囊脫鈎再三入水然後抽出若不爾者井上翻羅定應著堓設令到水仍恐傷生故應存意也時有作小圓羅纔受一舛兩合生疎薄絹元不觀漉懸著鉢邊令他知見無心護命日日招𠎝師弟相承用為傳法誠哉可難良足悲嗟其觀水器人人自畜放生之鑵在處須有瓶中之水足悲嗟其觀水器人人自畜放生之鑵在處須有瓶中之水經夜更觀先漉經宵皆應准此看覆戒具緣中使人人覆者戒可自覆亦犯也文言屋便摧破者多論第七闡那作房即日崩倒作此大房用三十萬錢功用甚大諸比丘為檀越說法房雖崩倒功德成就房未壞時佛已到此房中即是受用佛是無上福田佛既受用功德深廣不可測量又云房始成時有一新受戒比丘戒德清淨入此房中已畢施德設起億數種種房閣設有淨戒比丘蹔時受用已畢施恩何以故佛無量劫脩行成道始體解木叉以授眾生木叉是背世俗向泥洹門凡房舍等是世間法是故一淨戒比丘若蹔受用已畢施恩今三藏云此是造寺非是大房今詳部別也不差教尼戒有少德行者尊者云設令無德計亦必犯也增五云若具持木叉一也多聞二也善語慈心辨說了了今聽者得解三也不為佛出家而犯重罪四也二十臘若過二十臘五也一違八敬之教二違本要期受戒之心者隨行與受開此二別所以然者為明教戒師難等者此問意言所以須舉此文來答如章此是般陀得道之偈者見論十六云般陀者漢言路邊生也其母本是大富長者女與奴私通逃至他國後即懷胎臨欲產時憶母欲還至於半路以生一男慙愧父母却還家後復懷胎半路生男如前還歸後送二兒外家養活其外父母臨欲終時以其家業悉付二兒後因聞法兄便出家得阿羅漢其弟久後心自念言兄捨家業與我如人嘔吐無異即往兄所求欲出家兄即度之教其一偈四月不得兄念鈍根即牽袈裟令出門外般陀啼哭不欲還家佛觀可度安慰其心觀將得道說入寂偈遣聞此偈即得羅漢婆沙百八十云室羅筏有婆羅門婦數生男子生已輙死後產一男棄之大路經久不死故名大路後復生子棄之小路尊者大路利根見行出家得道尊者小路愛行鈍根於後未久父母喪亡財寶散失大路愍之度令出家授一伽他身語意莫作一切世間惡離欲念正知不受苦無義雨四月中懃苦習誦牧牛羊者在路聞之誦皆通利彼猶未得過雨四月處處苾蒭來謁世尊每日晨旦新學苾蒭皆往鄔波陀耶阿遮梨耶所受文請義理所忘小路効他將出房戶兄問何往答言欲往鄔波陀耶所受文請義理所廢忘其兄語言我即是鄔波陀耶更何所往然彼小路是應呵擯而入道者兄搦其頂曳出房外叱言愚人我四月中授汝一頌牧牛羊者誦皆通利汝猶未得而今乃言欲往他處小路被擯誓多林門啼泣而住佛從外入見而問之可憐小路何以啼泣彼以上事具白世尊佛以神力轉彼所有誦伽他障尋時誦得復別授以除垢之頌語言今日苾蒭外來汝可為拭草屣上塵小路敬諾如教奉行至日暮時有一苾蒭草屣極垢小路拭之一隻極淨一隻苦拭而不能淨即作是念外物塵垢蹔時染著猶不可淨況內貪欲嗔癡等垢長夜染心何由能淨作是念時彼不淨觀及持息念便現在前次第即得阿羅漢果問小路何緣如是闇鈍答尊者小路於昔迦葉佛時彼佛法中具足受持彼佛三藏由法慳垢覆蔽其心曾不為他授文解義及理廢忘由彼業故今得如是極闇鈍果有說彼尊者曾於婆羅痆斯城作販猪人縛五百猪口運置船上度至彼岸及下船時氣不通故猪皆已死由彼業力如是闇鈍有說尊者昔餘生中曾閇塞瞿陀獸窟門令不得出在中而死由彼業故闇鈍如是上有半偈正明定慧者顯道諦也下一偈半正明所治者顯滅諦也亦可通有者既有定慧必由戒生也解除貪患者除貪縛也𢶕除無明癡心八使故曰調伏我慢者十使之中前文已辨斷貪恚訖今明餘八即是五見慢疑無明此准成實一切煩惱即癡差別離癡之外更無別體故云癡心八使也薩婆多及大乘八使各自有別體此疏意云文中且言調伏我慢理實具足斷八使也前來雖爾今詳文意此之兩偈顯六出界六出界義上大妄中已略敘訖今且配文入寂者歡喜見法得安樂者以無相心出離相界也無恚最樂者謂慈無量與有情樂無嗔為性出離恚界也不害於眾生者謂悲無量拔有情苦不害為性出離害界也世間無欲樂者謂喜無量慶慰有情小乘即以喜根為性大乘即以無嫉為性於他世間興盛事中自無希欲不生不樂其心安樂喜慰於他此即出離不樂界也出離愛欲者謂捨無量能治欲貪無貪為性出離欲界也調伏我慢等者空解脫門能治非想四蘊我慢出離我慢界也准瑜伽十四為超三界難超越故立六出界謂四無量超下欲界無相定心超一切相由斷我慢超越有頂此即顯斷三界惑盡也又此偈意以無相心創入見道斷見道惑次四無量斷欲脩惑次空解脫斷上界惑也此釋決定勿復生疑種聲聞因緣等者謂種三乘順解脫分善也三科法門謂有三種法門科段也一者五分法身二者八大覺三者十二因緣八大人覺者此是大人之所覺悟名大人覺故瑜伽五十九辨煩惱斷已有多種相謂八大人覺等一少欲二知足三出要謂道體即慧也四進業者謂精進五捨雜者謂遠離也遠離有兩一身遠離獨處閑靜智度云敢近三里遠更益喜二心遠離俱舍二十二離不善尋智度七十二離五欲五葢六趣善於中含兩一念二定八不處憒𠆴謂離戲論也撿瑜伽五十九及瓔珞本業上卷初及九十此之三德身口業色為體者並由持行身語表無表為體故云業色也餘九利他者覺云此亦不定若不多聞有不學等吉既離此過亦即自利也今詳望離過邊即戒律具中攝故章釋者善感得清淨四大者謂得造聲四大也片是報法顯異宗義也故婆沙百十一八云謂犢子部分別論者欲令音聲是異熟果若依薩婆多聲非異熟辨異義在可知者如下釋名中辨也母云善解脩多羅等者誤應言見論十五云多聞者解一阿含或言二阿含是名多聞法師問何以不言知阿毗曇答曰若能知阿毗曇最善若下根者知律及脩多羅亦得教授已上論文見云何以言音聲流利答女人多貪著音聲然後聽法論云汙尼三眾者見論十五也犯餘罪未悔不具於初者意顯未悔雖同汙尼並不具初論其悔已義即有別故次釋云故須第九等也年少輕躁亦是見論釋也教授者文言八不可違法是也下有正文者云若僧不差或非教授日而往與說八不可違法者突吉疏主准此云說八敬吉尊者云恐不然也戒本分明教授得提釋中又云教授者八不可違明說八敬亦得提罪若爾下文云何釋答既言或非教授日往故知舉敬以結日非也又五分第七云教誡者說八敬法若不差教誡尼語語提若爾何故不舉說法以結日非答文中且顯舉敬日非顯法日非舉法結提顯敬結提也斯事皆宜者謂斯敬事一切皆宜不但局八也五分第七般陀問尼曾聞八敬不答言曾聞復語姉妹更聽即列八也不得先受衣食者僧祇三十云若有人請尼食者應語先請上尊若言我於彼無敬心正欲請諸尼者應語言我亦不受若言我已曾請若爾者應受下至先與僧一團食尼後得種種好食無罪請與尼作房下至先與僧一蚤厨得受大房無罪若請與床先曾與小床後受好床蓐無罪廣說准上了論尊法明了疏云尊有三義一佛為世尊是佛所說故名尊法二敬世尊三若受此八法能令此人成尊舊翻八敬此非彼名也二部僧中等者明了疏云八尊法中若隨犯一名隨部聚依輕重悔言摩捺多懺謝眾僧也非是殘家行法以摩捺多通故問難比丘者論疏云舉罪也教學者尼設有知比丘無知不得教言應作等也愛道經者彼經古譯文相難見今撮彼意略而敘之一者敬心從僧受法當此受戒二者若有新學比丘不得輕心而慰問云新學門勞精進乎當此罵也三者比丘比丘尼不得並居同止四者依僧安居共相撿押甲音也謂相押束使不犯過當此安恣五者不得舉比丘罪六者請問經律之事不得共說世間之事七者犯戒半月僧中自首悔過八者百歲比丘尼當在新受戒比丘下坐謙敬作禮今詳彼經第四敬中含安恣二加第三敬以之為八即是彼寬此狹也此律八者束為頌曰百罵舉受懺請安恣敬法雖眾不過受隨者第四是受第五懺是隨也亦可第四生善第五滅惡初則生解者第六也一者生善安居也二者滅惡自恣也亦可安恣立二者向生善等據起行說今言安恣是約法論也第三四五此三吉者第四不往僧中受戒定不得戒縱生輕心輕毀此法但得吉羅而下尼律不與式叉受戒得提更有取衣不與受及本法經宿彼但尼中自生此過非是輕僧受法也第二一敬義含殘提者罵僧得提謗中理含殘提及吉如謗提等得吉故得戒無優劣者優劣皆是發戒緣故餘受異此者尊者云亦可羯磨有違如不與受亦即犯也若就根本愛道具八者此中意言愛道得戒具因八得餘人但因第四敬得然後差別雖因第四正從僧得又約所戒一向約具若約所為第四為未具餘七為具尋疏可見以有同犯者媒謗四諫僧已先犯尼若犯者即當第二故須二部僧中懺悔尊者曰不禮不受亦是未制何須獨責懺殘未制耶今詳制戒必令奉行是故要須持犯方制令授八敬任其進不是故逆制無相違過任其能行即聽出家若不能行即不聽也又解制在一代結集時就滿足論之也百臘者俗書臘獵取禽獸祭先祖也此即歲終祭神之名經律言臘即歲終義或言夏或言歲皆是一也一尼眾差請人時者如尼律百四十一戒聽白二差一尼為尼僧半月往僧中得教授彼獨行無護口差二三人為伴白二法如下文二囑授時者下文云彼當往大僧中禮僧足已由身伍頭合掌作如是說應加大德一心念某寺比丘尼僧和合禮比丘僧是求教授如是三說應言求請教授比丘尼人者好此之二時須在大僧說戒前作第三代請及差已下三時此戒中自具可知如祇律說者祇第三十教誡尼有八事一非時二非處三過時四時未至五不和合六眷屬七長句說法八迎教誡非時者從日沒至明相未出教誡得提已下七種皆得越毗尼非處者不得深狹處不得露現處當在不深不露處若講堂若樹下三過時者十四日十五日四時未至者月一日若二日三日應從四日至十三日往教五不和合者和合已然後誡倒已應問尼僧和合未若不和合應呼來若老病等緣聽與欲六眷屬者不得偏教應一切尼僧和合已教七長語說者如尊者難陀長語教尼應作是說一切惡莫作諸善奉行乃至是諸佛教姉妹此是教誡欲聽者便聽去者住意八迎法者若聞某日比丘來若無供人者應請諸年少比丘賷持華香幡蓋往迎若無者下至合掌設敬代擔衣鉢若一由旬半由旬一拘盧半拘盧下至出城邑聚落外迎應勸化作前食非時漿盡心供養及眷屬七日勿令有乏若無者出己衣鉢之餘持用供養若復無者下至合掌恭敬若尼來時不得低頭而住應觀相威儀若見油澤塗頭莊眼著上色衣擣令光澤白帶繫腰應呵有俗人者不得教勿令前人起不善心言沙門教婦應問餘尼此誰弟子應語彼師呵令順行斯之處定通於五時者尊者云此亦不定且如囑授問可不并迎逆豈不通於自然界也尼來僧寺然未入作法界中逢人即囑即問故應得也下尼律中不得囑四人非客非遠行非病非無智謂在尼法中說者下尼單提中百四十一戒也前已引之舉上時五中第三已下三時釋之第三時中分兩一請二差此律請文不具依五分二十四云應於說不來諸比丘欲清淨時從坐起在僧前立白言大德僧聽某精舍和合比丘尼僧頂禮和合比丘僧足乞教誡人文中𨷂無無差白二如下文也第四比丘僧應尅時下問可不時也文云彼既囑授已明日不往問佛言應往問可不比丘應尅期往已下如此戒之第五迎可知舉不差種者此古師亦許不差說敬吉也尊者不許如上已論若日非說二者一敬二法也此兩日非俱得吉故過由義微者起過由僧義微也明無不差者無不差即是有差也如與女宿宿即隨結不制過三不差亦爾言即犯輙不制日暮界制過三要假非女日暮制犯要假僧差也其日非教授發言即結不是由無不差後結日非者無却不差明即有差此中意言發言即結不由有差不同日日暮暮方結要由有差日非既是不由有差復亦不由無差也見論十六不差有日暮不能具錄准餘律說者五分二十四大僧代尼請教誡訖上坐應答從某甲受若僧無所差人有能說法者應答往某甲比丘邊受若復無者上座應答此無差教授人又無能說法者汝等莫放逸諸尼明日應來問所囑人云竟為我白僧不此比丘應傳上座語語之述曰理應尼受上座教已還尼寺中集僧索欲梵唄已訖使尼告云大僧上座今有略教聞此語已尼眾齊起端身正立立已具宣上座略教宣已齊聲唱頂戴持禮佛取散開文云至集會日與說八不可違法應次往與說法者見論十五云若不說八敬先說餘法吉若說八敬已後說餘法不犯除答問不犯若尼先問餘法答不犯日暮戒多論第七云非佛弟難陀往昔唯衛佛出現於世為眾生說法彼佛滅後王起牛頭栴檀塔種種莊嚴此王有五百夫人供養此塔各發願言願我等將來從此王邊而得解脫爾時王者今難陀是爾時五百夫人者今五百尼是以是本願因緣故應從難陀而得解脫船濟處者多人渡船經日暮也謂因大會汎說法者此中意云若是差來理犯日暮不開尼寺今開尼寺明是不差復由大會亦無輙過大曾之時道俗同會無譏故開亦可以是都教授處等者此第二釋意說犯暮以就城外別處作一都教授堂於中犯暮如緣起中是其義也若在尼寺即無此譏故開不犯今詳文意僧寺犯暮同五分說若爾何故前戒制迎答儻往制迎不遮不往何成妨難與尼屏露坐戒因緣露坐者文云在門外共一處坐無第三人者多論第六要以白衣男子為第三人一切出家不得為第三人也如上過五六語中引之若准僧祇尼益食來即不犯去時方犯者即是不簡男女差別皆得為第三人也此律開文云不犯者若比丘有伴下俗女三坐開文並云二比丘為伴比丘亦得為第三人也尼共俗男坐提者下尼律中具有三戒一食家有寶強坐二有寶屏坐三俗男露坐也共比丘坐吉者即此戒下文結尼吉也且就道俗有寶無寶等故須離制者道女一向無寶也下疏云尼境不別無寶處齊俗女或有寶或無寶不定也又開緣異僧與二女坐盡有教授不教授尼對二男並無教授者某義謬也若僧對尼有教授開若對俗女無教授開故須道俗離制戒者尼對二男既並無開即應合制何以俗男亦開三戒對僧得吉亦不合耶即由此義亦破同宿僧對二女尼對二男並無教授故合制也是故還依初釋者好又行中開不開異者與尼同行開大伴等若俗女行一向無開也但屏露有異寶無寶別者僧對俗女總制三戒然於三中兩屏有寶一露無寶如下辨故有常處等者於他夫妻常相染處名為有寶強坐開第四人也若不對夫於如是處名為有寶屏坐開三人也故云坐屏開四人開三人也此則俗女屏坐更復分兩竟俗女制三者前者所辨屏露有異已顯俗女露坐戒竟向來復辨屏坐分兩故成三也下第四十三四十四四十五戒是也一食家有寶強坐二有寶屏處三獨與女露坐亦可准多五二文與衣作衣亦同犯限者謬也多論第七有文可爾五分第七與衣作衣下二眾吉如上與衣戒章中自已引訖所對有異故有兩句其實一人也尼同行戒五分第七從此聚落至彼聚落得提無聚落處如章尼同船戒隨境業者境可知業者隨一一上下結罪也祇律十五經一聚落間一提若無聚落空地一拘盧舍一提十律十二多論第分齊並同開文彼岸不安者直度至中方聞彼難遂開上下讚食戒文言請舍利目連者多論第七云請大迦葉舍利弗大目連阿那律凡有五事能與眾生作現世福田一初入見帝二大盡智三滅盡定四四無量五無諍三昧俱舍十五頌云於佛上首僧及滅定無諍慈見脩道出損益業即受廣釋如彼佛上首僧者福田僧中佛最為上正理四十八意如此也脩道出者斷一切脩惑盡也餘不具敘多論意言大迦葉等或從慈等四無量起或滅定起作現世福故居士請之多論又云尼語居士婦言為請誰耶答言請某尼言汝為辦粳米飯蘇豆羮雞宍鵽肉鶉肉比丘食者提乃至教以少薑著食中比丘食者吉羅此戒體偏讚其德犯若尼言應請比丘居士居士婦言為請誰耶答言請某居士婦言我已先請尼問辦何食答言麤食尼言為辦粳米飯乃至鵽肉等比丘食者吉羅若不由讚功德但說布施沙門功德其福甚大如是凡說食之無罪覺云是祇律文者誤也一食過受戒俟待也祇律十六云若十六間一家施食若比丘為僧事私事事不了者乃至十六間中宿食已事訖當去若復不了不得更食當乞食乞食時當餘處乞不得還從其家乞若本作舍時同村相助亦不得從乞當往餘村中乞食已即彼村宿宿已更來事若不了得如上十六間食若不了者復離去隔一宿已復得來食展轉食戒三對四句意者下開文云若請與非食或不足者但開犯提計應背請亦得小罪又餘釋言據違信邊下三句吉非望食之咽咽犯吉違開文故又有餘釋背前正食受後不正此句犯提章言犯吉理不然也文開非食者開背前家非食也不足不淨准例應知僧祇二十九難陀母逼上飯汁自飲即覺身中內風除宿食消覺飢須食作是念阿闍梨是一食人應當須粥取多水著少米合煎去兩分然後內胡椒畢鉢粥熟已持詣祇洹白佛佛言從今聽食粥爾時世尊說偈呪願持戒清淨人所奉由持戒故為人所奉此即顯福田勝恭敬能施之人施心慇淨隨時以粥施所施物清又離非時之失十利饒益於行者總標利數顯益受施之人色力壽樂詞清辨前四可知第五辭清即詞無礙解也於諸方域言詞清美故也粥是四辨之緣非即正得第六辨者辨無礙解得一必四且略舉二婆沙百八十若得一時必具得四宿食風除一者內風二者宿食此二得除飢渴消能消飢渴兩患也是名為藥佛所說除患益身是名為藥欲生人天常受樂欲謂悕求也人及欲天常受快樂也應當以粥施眾僧結勸正因使其脩習有餘言飢渴消者消即此律大小便調者今恐不然以除對消是消除義也十誦二十六粥有五事利身一者除飢二者除渴三者下氣四者却齊下冷五者消宿食舉二請以為犯緣者謂舉少信前請及舉濃粥後請也此即背前食後濃粥為犯過緣也以其專不專故所以語異者此古雲師等義也謂長離等但使一月五月時中必定一向得五事利名之為專若背別等雖在一月五月時中復須時中有衣食請方開背別無請單時既不得利故云不專亦可以下疏主正義正義意言單時定開背請別眾於時之外施食及衣亦開背別此時非時律文俱說名施衣時相對解釋其義便易故異長離戒也文開病者十誦十二云病比丘應受一請不應受二若一請處不能飽應受第二第二不飽應受第三第三不飽應受已漸漸食乃至日中多論第七亦同捉時望衣食衣食是時家之餘並是古師義疏主意欲不存故下疏云亦可同彼細解至下別眾食中釋是正義意也後單衣請如前者如前取衣已還前家食也此古師妄引十誦彼律十二多論第七各有十四句不繁錄之然與古師引不相當也五分第三戒者本應言第四戒本也彼律第七初對緣略制第二開病第三開衣時第四開施衣時即立第四戒本章中分者是也崇立諸師對此解僧祇六念針與此文不果扶會今詳自是祇律中處處食戒列斯六念處處食者即此律展轉食也如彼祇律第十六說隨緣有六者六為所緣念為能緣也第一念章引文雖爾而念行事作念應言第一念此月大或小白月或黑月一日二日等准知崇云西方本制白月純大黑有小大此土總以三十日為月故作念者就總三十以知大小黑白數日別標一二即順此方復順西國今詳西國雖有黑白然論大小還就總辨又於總中黑先白後何因乃言白大黑不定耶故俱舍頌云十二月為年因何局云西國黑白也今日得食施某甲者施某比丘乃至沙彌等也某甲於我不計者即所施比丘或沙彌等無局執心於我不計也今行事者若全無請應云第二念不背請食如下章云若也無請此第二念全不須作今時行事即不存之也若有二三請等一請自受餘請應捨如此律言長老我應往彼今布施汝謂往彼檀越家第三念祇文及義如章今行事者人人皆誦故不須辨又應言乃至某時受具足戒一夏二夏等也第四念祗文乃義如章行事應言三衣鉢具足若有闕者應言僧伽梨多羅僧已具安陀會未具我當具餘衣或鉢具闕准知也已受持或言僧伽梨已受持多安陀未受持我當受持餘衣及鉢等准知長衣已說淨若多畜長衣於中或一段二段未說淨者不可具牒爾許已說是故直云某長未說淨我當說淨若都無長衣應言無長衣也第五念如章或有別眾食緣應言我有病緣應別眾食餘施衣等緣准知也第六念文義如章行事應言我今無病依眾行道若有病應言我今有病當療治也今詳此律上下散說憶說戒日及受戒時及背別等故使古來依祇作念彼文雖復唯第二念遣清旦作准彌益某善然又五念意同此律第二念法祇文有異如彼律開心念捨請所以要須清旦作之謂未請前懸施與人說淨已訖背亦無罪義同長衣淨已受用若據此律要待多請方對人捨若但一請全不須捨然亦懸表護持之心故未請食又餘五念縱日暮作但通一日其義不妨且隨第二相從清旦對於五篇說可知者初防吉不憶說戒日故二四防提背請犯長等故第三防夷偷夏唱大得利計直故第五防殘以容破僧作違諫故六防提舍若不依眾容於蘭若安坐受食故釋疏且然縱論七聚應准知之第四門是就祇律作問答也古師意以別屬故作法是難以味通故作法是易是其意也別屬味通如上已釋復在後釋一三說者向者後釋防提三說防吉一說也如其有請或不作念者但有一請直爾赴之何須作念或可一說三說者若背前家為防提故三說捨請若背後家為防吉故一說捨請也尼背足合制並得提罪今結吉羅且示不同之相結方便吉也或容犯足者若未破威儀若作餘食法即不犯足不爾即犯也伽論第二云慈愍故受食者不犯了論云第五憐愍食此食不礙次第傳食明了疏云張王李三家如其次第諸比丘食若依次第傳食三家斯則無罪若逆傳次先食第三爾時未罪至第二家食方得罪進一粒即波逸提准此無比丘處為愍白衣一日之中受多請者理是無罪應依次第人護足食又要離貪也有三因緣不以傳次為礙一者施衣謂第三家有衣及食先食無罪二者有病須先食彼第三家食三者第一請家曾前兩過請比丘食先食第三却食第一由第一家以成舊故無罪如來憐愍若有三緣逆傳次第食無罪述曰此蓋應與伽論意同別眾食戒制意兩義者是上破僧違諫中文也初義為開三人已下各處不犯次義為令四人已上盡集不犯損重利淺者人多生惱即損重也雖獲施福由心不歡故利淺也濫別犯故者能所俱眾若從所名以制犯者能取俱別亦應從取以成犯也即是僧名是局眾名是通者古師意云法食二中皆言集眾也細解如破僧違諫中說者彼疏釋云以眾翻僧和合者僧家義用不德總以和合眾以翻僧等也疏云法食無限多則轉妙皆應盡集等者若爾食中盡集豈非轉妙各理實盡集食法俱妙今且辨其食中三人開各處食法中無開三人各秉也但不秉法能唯犯吉設秉對手亦但吉罪者章中意說所別之處不秉法等能別不起一切吉罪今更細釋約秉不秉能所俱至三句並吉通於僧別也第四俱秉若秉對手亦唯犯吉此唯別人也若秉羯磨即犯破蘭能取俱唯僧也若約對手俱五三句三句並吉無第四俱不秉句前已說故也即總情重者惱他所別不得食資也法就正非正者正謂羯磨不正謂對手等可以思知者食中能所東家四人即是能別西家一人即是所別此即是定也若兩家俱四人者五望以為能所即不定也法中秉處是則名能其不秉處是則名所是定也若俱秉即不定可知俱除結界者同一自然界俱秉結界亦是破僧也有人言七百結集簡有德人往斷諍處豈非僧次答取餘人欲何成僧次盜僧祇翻為眾有也報恩經者彼經第三知事嗔恚嫌客僧多隱匿蘇油停遲不與准賢愚十五亦云佛在羅閱城邊汪水有一大虫其形像蛇加有四足東西馳走受苦無量佛告比丘過去毗婆尸佛法中有諸賈客撰眾妙寶用施眾僧規俟飲食僧付摩摩帝後僧食盡從其索彼言汝曹噉屎寶是我有何緣乃索由其欺僧惡口罵故墮阿鼻獄身常宛轉沸屎之中九十一劫章云九十億有經本同之乃從獄出今復墮此過去六佛皆將弟子至此為說因緣我第七佛今示汝等如是一切賢劫千佛各各皆示十律鹿子母者五十九云佛於阿耨達池上鹿母別請乃至各以神力從窓入或從空下或從地出有從坐上出者等應即取此一分食次第行食者多論第七云若僧眾界內有檀越食應先作意請僧中一人而妄不請食已在前應作一分食置上坐頭送與眾僧遠者應取此食次第行之次第唱臘者多云若有檀越作長食或一月或九十日先隨意請人各使令定至食初日一切合集清晨打楗稚眾僧已歡化比丘應立一處舉聲大唱六十臘者應入若無者次第唱五十九臘乃至應唱沙彌若無沙彌亦得清淨餘如章說又云九十日竟檀越續有一月半月食即前唱法更不須唱應打犍搥者多云若食僧祇食時應作四相一打犍搥二吹貝三打皷四唱令令界內聞知此四種相必使有常勿或打皷或吹貝等不作四相名盜僧食上盜戒已辨三事利者上破僧違諫戒文言自今已去不得別眾食聽齊三人食所以然者有二事利故為攝難調人故為慈慜白衣家故何以故恐彼難調人故自結別眾以總眾僧多論四人各自乞食於一處食無罪者疏意云是別施主故不同此律與五人俱家家乞食明同一主也見論兩个四句者彼論十六云別眾食有二種一者請二者乞云何成別眾食有一優婆塞往至四比丘大德受之是名請成別眾食此即由序也一時受請或明日或明日或後日一時受一處食成別眾食四人俱得罪此即第一句也一一句中皆約四法一請二去三受四處文言明日後日者即是一時去之時節也一時受請已各去至檀越家以一時受食還各處食得罪如故法師曰何以故為一時受食故由即第二句也一時受請各食不得罪第三句也別請別去至檀越家一時受得罪是名受請得罪此即第四句并總結也此句蓋應一處食文中闕也今者束為頌曰請去及受處一一句約此四也四同請受同四同者初句也諸受同者第二句也已顯二同明知二別釋餘句准此也請同及受同諸同者第三句也受同者第四句也唯第三無罪見論人云云何從乞得罪者有四乞食比丘或坐或立見優婆塞語言與我四人飯或一一人乞言與我飯亦如是言亦如是者謂四句法亦同前但改前請云一時乞等也或俱去或各去一時受食是名從乞得罪俱去者初句也各去者下三句一時受者諸句中一時受邊得罪也義不須論者謂不約咽即不與此律宗同故不論也問法中詳聚容可翻非者食亦詳聚應成換淨答法翻益多食換益少故不同也事非者所為事中有不如也七中初非雖亦含事且約文句增減及到羯磨等辨是疏意也問別食本為難調愍俗見論覆鉢此律七開寧免二過答順開行事明非難調故不違理也見論十六云請四人有一解律比丘欲俱食畏犯即作方便覆鉢不受檀越問言何以不受答言但與三人食我欲呪願三人食竟後便受食不犯多論四句准義而作非謹論文也二長短分二者一長二短也病及施衣道行等四謂道行船行大會沙門施食舉道行等餘三故云等四也此六開是長也病及道行等五者將病兼道行等四為五也於六種中且辨此五以義俱據前緣無准故二反報者衣食二也一解乃至馬齒一縫等者此前一解直辨一月五月中要須作衣方得受利由不盡理故更後解何以一月等中要須作衣故即釋言無受德衣意為作衣若決不作或復作竟即失德衣故下文竟失不竟失等是也自有一人直爾受衣不別標為極於五月名曰衣時非作衣時五月辨異其義可然一月云何答亦是無意一人無心我若作衣即受五利若不作衣便止不受復有一人不別標為此兩人中前名作衣時後名衣時也失利不失雖不由標據心差別亦有異也施衣大眾沙門此三共有者大眾一共其義可然餘不定也施衣沙門俱請即共不請自來計即不共也寬狹等門亦准此知餘五不定非無共義者若俱船行是即名共有行不行即不共也餘類應知水陸兩行通於洗浴有同不同者相傳釋言若准十誦別眾及洗開制並同若准善見義即不同且辨十誦欲行行竟別食及洗俱得提罪若正行時別洗俱開故說同也若准見論別食同前洗開正行及以行竟即是別洗不同也今尋十誦似有其文若尋見論無此文也且十誦十三云昨日來今日食提明日行今日食提提即日行別食不犯船行文同又十誦十六洗浴戒文亦同也多論第七亦同撿見論實無此文若以義說理容可得謂據隔日如十誦說若據當日如向引見論釋也然實見論無文衣時等二者謂衣時作衣時也病緣少寬然有差別者諸戒開病稍多故云寬也言差別者別食中病開脚跟躃展轉食病不能一坐食好食令足過一食病若離彼村增動燃火中病得火便身病名雖同各隨其相隨文應知文言施衣時者疏中意分為兩一施衣二時也以此准餘並是不盡者隨於自然作法界中但不盡集皆犯也不同界不犯也深違經論者經即五分也論謂多論如前解具緣中多論云不於界內請一人不送一分食是犯明知不盡集也見論十六云云何不請足四檀越請四人一人不去檀越問上座來不三人答言不來檀越臨中見一比丘即喚入與食四人俱不犯乃至云何鉢蓋足四請三道人一鉢請食不犯餘可知病者已下釋第三開緣者見論十六云病者脚破沙土入中不能行故得別眾食一釋大眾者謂八人已上者此古師准十律多論釋也十律第十三云大眾集者極少乃至八人四舊四客以是緣故令諸居士不能供給若減八人別食得提多論第七同爾倍供兼濟准此應釋今師破此古師意云汝若釋言四人長一是小眾犯即應百人大眾不犯何以文中百人長一亦云是患故不然也又有古師釋言食處成眾斯即是犯不假所別言足四人長一人為患者即是三人長第四人以成犯患也展轉相望為患成犯乃至百人長九十七於其長中義同一人故云一人為患也今師即言不假所別深違經論故不存也不得食者已是合去不可更結不白之𠎝過三鉢戒多論上鉢取一鉢無罪等者彼論第七文也然彼論第五云鉢者三種上中下上者受三鉢他飯一鉢他羮餘可食物半羮是名上鉢下者受一鉢他飯半鉢他羮餘可食物半羮是名下鉢上下兩間是名中鉢述曰即與此律大者三斗小者一斗半大呪同也然一鉢他計有六合稍強也多論云三鉢他飯可秦斗二斗一鉢他羮餘可食物半羮是一鉢他半也復是秦斗一斗上鉢受秦斗三斗又云下鉢受秦斗一斗二斗半述曰應言一斗二升六合半強論文且一舉全數也南山云姚秦時用姬周之斗古今不改也俗中量法筭數有八一圭二抄三撮四勹五合六升七斗八斛即用此升也准唐升上鉢一升下鉢五升是也十律第七量同多論文四可知者初至不持食來即是不持來食白方法二若持一鉢已下持一鉢來食白方法三時兩鉢四時三鉢並准可知准此律文所言持來者於彼家食竟復得持三鉢來故第四改文云若盡持三鉢還白餘比丘可於彼食慎勿持還若准五分第七云有諸比丘就家食已復索持去佛言若就家食不得更持去一提三吉者文中提下方便吉羅不在三吉數攝也五分過受及不分但犯提者彼律初制過三次戒本開病第三戒本制不分祇十七云所索食來應共食若不共食者提價客去後不死者祇文也祇又云非送女餅非行道粮為比丘作得取不犯足食戒四種之差謂一揣食一坐食不作餘法及作餘法也有人更立裁食如三分義一等者即一揣食是手中鉢中一切不須者謂已食竟餘者不須即表是殘也五處足者如後律文云知飯知持來知遮知威儀知捨威儀是也等准知此等五者是人如法者前來所辨能作法人有三又所對人於中者二合為五也尋疏可見見聞疑等者謂不淨肉也能對威儀中三自手捉者准多論第七云來從坐起是人邊偏袒胡跪擎鉢言長老憶念述曰此據能對之人若所對人全未曾食亦可胡跪若正食上即應依本若改威儀便已犯足何得為他也或得失法不免提罪等者前四如中所對人非及食不淨并威儀非並法不成不免提罪所餘失法而無提罪非時提唯非此戒收也自餘十二者束為頌曰讚一展別逼羮藥非殘不受飲酒虫非謂作餘食法開無背請者古有人云我准戒文或時文受請不作餘法是故犯提若受請時作餘法者即無背請故廣釋三略中初句可知者有疏本云故廣釋三段中初句可知今詳前本指下廣中具解三句而於略中初句可知後本單指廣中具三以初句可知故也然前本為正也僧祇十六食者五種飯麥飯魚肉十誦第八及第十三五法闍尼謂根食莖食葉食磨食菓食五蒲闍尼謂飯糒蒲秘反說文乾飯也一日熬大豆與米者也魚肉五似食謂糜粟麥莠子迦師准彼三五並須餘法五分第七五正食同此律見論十六釋五正食如章所引彼又云若少飯和多水食已離威儀應作殘法然此律藥法云時諸比丘作如是念飲煑飯汁為是食非食是請非請是足食不佛言若合飲非食非請非足食述曰此即是粥故與見論不同祇中八遮者僧祇十六云足有八種一自恣足者檀越自恣與飯麥飯魚肉及雜正食自恣勸食比丘言我已滿足如是起離坐不作殘法食提二少欲足者檀越與五正食及雜正食比丘動手現少取相如是離坐已餘如前三穢汙足者行食時淨人手瘡及請不淨比丘見汙之言不用過去餘如前四雜足者淨人持乳酪器盛飯行比丘見已污之言不用過去餘如前說五不便足者淨人行食比丘問言是何等答言比丘言此動我風病我不便過去餘如前說問言堅濡答言堅比丘言難消我不便問是何宍答言牛宍比丘言牛宍性熱我不便若言水牛肉言性冷難消等廣說同前應知也六諂足者行五正五雜正比丘畏口言足現手作相若搖頭若縮鉢起離坐餘如前七停住足者行五正五雜比丘言長壽莫先行飯揣恐犯足當先下菜鹽洽水如是起離坐餘如前若作直日維那等指示現相不名足八自己足者比丘乞食至一家放囊置一處從檀越乞水欲飲檀越作是念此比丘必當須即問言須不比丘作是念此檀越必欲家中取與我答言須時檀越即捉比丘比丘以惜己便言置置如語已起離坐餘如前離坐者離有八處行住坐臥長床坐床乘乘述曰即釋此律捨威儀也上四可知若比丘長床上食若見和上闍梨不得離坐得曳身不離床移避若床折者即名離處不作殘法提若在獨坐床食若坐方覺背後有塔若僧若和上等應不離床迴身若雨當持傘蓋覆上若無蓋合床轝轝時倒地即名離處若在船上食船築岸觸木石若迴彼比丘身離處不作殘法提若在乘上食上坂下坂若乘翻身離處不作殘法提已上祇文即解結罪成犯緣者具緣成犯也以餘四食一一和飯作四句者初句飯第二飯乾飯乃至第四飯宍二二和為六者初句除後二第二除三五第三除三四第四除二五第五除二四第六除二三合六句也三三來和為三者不然也應為四句第一除第五第二除第三第四除第二不得更除第一以其飯是頭故今詳不應妄說頭尾故更除初以成五句以四并和者即是五種都一處也佉闍尼和復為一句且辨前來諸師所立合十七句若其不須論頭尾者即十八句章言十六誤也覺云更加三句謂一食五正竟更食佉闍二七日和飯三佉闍和七日帖前十七即二十句餘四食作頭各二十句即一百句約四威儀成四百句今詳不然所加三中初三兩句既不和飯為頭飯既非頭何得說言以飯為頭飯既非頭餘四頭義如何得立又尋章中十六句者亦是非理一一和飯云飯是顯既二相和誰先誰後而言頭尾豈不謬也乃至五種總和一處准此應破既有此非但應總約諸食相和勿論頭尾但成十六句或二十句先食飯訖更食二十或食訖更食二十乃至食宍更食二十合有百句四儀各示即四百句又前三三和中若作五句即二十一食五正後各二十一即一百五四儀總計四百二十句也愚闇相對名雖有異俱不知法故云愚闇恭慢者自手對他太恭也買地對他太慢也文言使淨人持食作法不成者准祇十六不同此律故彼文云比丘足食已往檀越家主人言某甲家有比丘未足若須食者我當往作殘法比丘言可爾檀越淨洗器盛滿中種種美食比丘受取持好細氎覆莫使外塵入著淨人手中作是言如法作殘食已持來淨人持到彼比丘願尊為作我殘食彼比丘應淨洗手受此食已語淨人言汝近我邊申手內立比丘食一口已作是言我手中器中所有食一切不須作殘食與汝淨人持來一切比丘得食若國土少比丘處比丘已有大檀越持種種食至比丘已起當云何若彼有直月維那諸知事人未足食者當從作殘食若無者上座邊作若上座羞不能人中作當合坐轝至屏處作之復無者有客比丘來當問長老今日自恣足未若言我未夏安居云何自恣足當知是人未知律相更應問汝食未若言已食復問檀越自恣與不答言水菜不足況復飲食當知是不足應從作殘食若言檀越自恣與食當知已足僧應方便不應破檀越善心若眾中有大沙彌將至戒場與受具教作殘食已然後當食准彼律即淨人作法得成不同此部覆好是慳持去是貪也多論尼足食犯小罪者不然彼論第七云此戒不共二眾不犯也尼無餘法開古人相傳非今師意也古人以尼無勸足戒故作此釋也離合不同者尼背請足食合制一戒也請言旦食稠粥作薄粥想者必須旦朝正食粥時作此想也若旦朝時飢故方謂朝薄此是轉想須結前心也文言食作非食法者後解分為三義者不然若言作餘法不犯者何異後文若已作餘食法無犯故前解為善也總開不離境界等五者即祇律五不離也總反七不成者前愚闇相對等八句之中一成七不成是也此是總相相反也一一別開中但略反四者即別別反前愚闇等八但反使淨人持食一置地二自捉三盡持去四也餘四不反愚闇一對淨人前及覆四也略也勸足戒情俠隱沒其事者如緣起中隱沒恨心也違制及開者制不許勸開作餘法也比丘尼勸他受染心男子衣食緣起云正使彼有染汙心無染汙心能那汝何汝自有染汙心若得食但以時清淨受取故章云謗佛擊刺者違制妄言名之為謗云汝有染即是擊刺謂刺彼人令其必受也戒本中食二種食成足已竟者一者足食已謂是僧食二者若受請謂檀越食也供養意者不然無法勸他供養亦犯亦可不作法勸他名為不供養也文言請亦有五種亦如上者上展轉戒云展轉食者請也請有二種僧次別請也食者飯乾飯魚及宍述曰即是五正為五正為五請也非時食戒文言觀伎者突吉羅文言四天下食亦爾者十誦五十二云開拘耶尼國用何時食答若此間宿用此間時若彼間宿用彼間時餘二方亦如是今詳非時食戒人多喜犯者悉是放逸人也如教中說放逸犯戒受報極重如有頌言愚作罪小亦沉惡聖為罪大亦脫苦如團鐵小亦沉水為鉢鐵大亦能將亦有教云若不為解脫故出家者乃至不消一杯之水況非時噉寧容不慎遍尋諸部曾不見開唯十誦宗文開意密十誦第六十云佛在蘇摩國那律弟子病服下藥中後心悶佛言與熬稻花汁與竟悶不止佛言竹笋汁與之不差佛言囊盛米煑煑粥絞汁與不差佛言將屏處與米粥述曰稻汁笋汁囊盛米汁次第悶息理即不開悶極臨終後方開粥時有愚夫不服下藥又非悶極妄憑聖教直進稠粥咽咽招𠎝也言密意者文言開粥乃是不開以稻汁等足至天曉故五分第八服吐下藥不及時食腹中空而悶佛言以蘇塗身故不差以塗身故不差蘇和塗身故不差以煖湯澡洗故不差與煖湯飲故不差以瓮盛肥肉汁坐著中以如此等足以至曉一切不得過時食明知十誦稻汁等意漸引至明非直開也僧祇十七亦云若比丘服吐下藥醫言應與清粥若不得者便死當云何爾時應以渄米潘米音也泔是也汁槽盛漬病比丘若病人不堪者取不破稻穬麥七過淨洗盛著囊中繫頭淨洗器煑之不得令稻頭破若破者不得與病比丘唯中哯出者說文云不歐而吐也見論十六云若食吐未出咽喉還咽不犯若出咽喉又口還咽犯提殘宿戒應有奢耶尼者據單手受以成殘也下七日過七日者雖是奢耶尼據口受也祇十七云若比丘食時以手摩口即名不淨當更洗手若兩手相揩摩即名不淨當更洗入聚乞食無淨水可求當開鉢囊捉一處乞食乞食已還出到池水當置鉢淨草上然後淨洗手寫置淨石淨草上寫時不得於不淨手捉處寫指所觸飯當㧥去寫已當更淨洗鉢還盛著鉢中而食食已有殘當寫聚石上捨去明日乞食都無所得空鉢而出不作意還從本道來見石上飯若有淨人當使授若無者有烏鳥食處當㧥却自取食若淨人持不淨手行飯上坐不淨餘者得名為淨五百問云問乞食長得與人不答先無貪心取有長得施眾生無眾生捧著樹頭有眾生噉者好若無明日還自受取食不得棄以信施重故所以還得取者以更無主故如單越取食法又云昔有執事比丘命終墮餓鬼中有一羅漢夜上廁聞呻喚聲聞汝是誰答是餓鬼昔於此寺為僧執事問汝精進何由墮此答持不淨食與僧謂眾僧甕器盛食具等以指拄器教取是用初犯墮三說戒不悔轉增乃至重以是故墮餓鬼中兩手擗胸裂肉破肉㗘㗱吹吼問何以擗胸虫噉身痛故何以㗘㗱吹吼口中有虫故何以呻喚飢極欲死故意欲食糞諸鬼推排不能得前願僧為我咒願僧與呪願便得食糞不復呻喚以是證知比丘不得手造飲食及僧器物若非僧器物若非僧器手受得行與僧無犯見論十六多比丘行唯一小沙彌各自擔粮至食時自分之沙彌得分已語比丘言今持沙彌分與大德易易得已復持與第二上坐展轉乃至眾多若沙彌不解法比丘自持分與沙彌易第二上坐復易乃至眾多皆得換易食不犯共宿惡觸准此換易唯開惡觸共宿時有愚夫過七日藥換而更受悉犯非時殘宿二提也不受食戒多論第八五義受食如上七日藥中已引之文言置地與者祇十六云有登瞿國是邊地耶見惡比丘故不授食與人爾時當滿荼羅此翻為壇規地作相若葉蔽鉢下作是言受受受得名受五分第七云有諸白衣惡賤比丘不肯親授以食著比丘前地語令自取諸比丘不知云何佛言若施主惡賤不肯授食亦聽以後語取為受食又云有販馬人請佛及僧行水已有人語言火燒馬屋彼以此不展授食語比丘言可自取食言已便去佛言若無淨人以施主語為受食彼文開五趣受食如彼廣說祇十六云道路共商人行借淨人有牛尊者須當取使淨人長囊盛種種粮食計日日食分作一齊已細結著牛上至食時當使淨人取若無淨人者一人挽細一人承取口言受受受是名為受食盡未至當淨浣囊更求餘食細結如前當與牛食著涼處不得使苦惱到已牛還大主道行乞昔蔗彼言自取比丘言我不得取彼言欲食便取不欲便去比丘爾時以繩細繫好昔蔗著牛頭作是言知是眾生邊有火聚驅牛過火使不燒牛得作淨已一人扶牛頭一人解細作是言受受受蕪菁根亦如是牛頭頓遜得名為受若未離地得名受但非威儀一切准知開文云鳥銜食墮鉢中等者祇云鳥墮肉段比丘鉢中下時覺非墮時是名受但非威儀墮時覺非下時亦爾下時覺墮時覺是名善受一切受食彼皆有此三句也又云風吹塵來坌鉢下草不坌食者得食草葉當受若草葉及食俱坌者一切更受牛等脚下塵來亦爾畜生振身塵來作意受者得名受鳥塵亦爾如人行衣曳地塵起來坌准牛脚下知之若行草葉應語懸放草菜等亦爾行菓墮草上即轉去者不名為受小停者得名為受十誦五十六蠅不可遮故非觸索美戒具緣云非親者此律無文開親然十誦十三云不犯者若病若親里若先請若不索自與不犯故作此釋也外道食戒白衣犯輕者以此律文云在此眾外出家者是若准多論第八云不問在家出家裸形有衣悉波逸提若眾僧與外道食亦無過正不得自手與已上論文若准祇律似唯出家者犯彼律十八云外道出家不蘭迦葉及至尼犍子又云若父母兄弟姉妹在外道中出家來者亦不得自與當使淨人與若無淨人語合自取若恐噉盡應語言授與我來得已應隨意減取已若著床机上語言自取若是親里作是嫌言汝今便作旃陀羅禮遇我比丘應答言汝出家不得處世尊制戒如是若食便食不食隨意若外道作時亦不得自手與已上祇文也至他家戒帝云謂己有請故者謂己有食請也章中又更釋云又可大有餘事請喚者謂不請食但請施衣轉經等事故云餘也文言前食後食梵語倒也應言食前食後譯者不迴文也謂齊食前齊食後也病者如上展轉戒也文言除此已餘時勸化作食辨施衣者章中且順古師釋意云此施食及衣要假一月五月以彼施衣是時家之餘此是古師義意疏主未暇改之故有斯語也上別眾食疏主正義已開為三謂作衣時施衣時彼已廣釋竟應准彼思有疏本對失囑授解義五門亦是古師義也應須簡擇不得一依也亦有疏本無此義門即是疏主正義若立五門即第四門用釋文也五往五細分有七者分庫藏聚落邊房為三兼餘四即七也邊房者如章中解無勞餘釋也亦謂不專向所往處獨言失也者為對非時入聚故作此言也章中兩解前解云非時入聚囑竟雖過餘處不失囑授此戒不爾異彼戒故故獨言失也後解亦可同此不得言獨也囑授詞句相傳義立云大德一心念我某甲比丘先受某甲請今有某緣事欲入某聚落至某家白大德知今詳但須的囑一人令善憶持不必要須大德一心念等設令遙相告白理亦是開強坐戒二俱受齊即是俱受八戒也文言食家有寶者從喻名也噉貪欲味故名為食亦相愛重名之為寶南山云四食之中是觸食者謬也此意說貪不欲辨食也此戒對夫比丘強坐開第四人後戒不對夫故開第三人也釋第三句文三第一開舒手處教不犯法二正結犯三開第四人後戒同此與俗女露坐戒十律云一丈犯提等者不然彼律第十二俱言相去一尋坐提一尋半吉相去二尋若過二尋坐不犯已上論文多論第七一同十誦也僧祇十九五分第八並無一丈等文也緣起彰露戒本稱屏者以釋相云屏處者見屏處聞屏處故知戒本雖言露地其實是屏以無屋覆名之為露由離見聞復名為屏是故章云相對受名也後解云亦可屏露合制者前之二戒有寶立二此中合制即是無寶立二也通說即分為四个戒也又此戒前二覆屏第三離見聞屏者此據現文三戒論之不據義分四戒為語也藥請戒摩訶男者見論十六云是佛叔之子大佛一月得斯陀含道也毗勒等三吉者彼十誦十七云若索呵梨勒阿摩勒毗勒彼株羅毗收𭦟陀多耶摩那迦樓迦盧尼等苦藥得者吉羅章云三吉且據前三勒言之也文云四月者夏四月也者據開更請從斷後開明知不要夏也故十誦十七云若夏三月受冬中一月受夏中二月受冬中二月受夏中一月受冬中三月受若四月過已應冬四月受祗第二十云冬請春請亦如是檀越不必定四月或一月半月若期滿已不得更受以二人形要者或言盡師一形或言盡弟子一形與師藥也准祇二十云常請食盡此倉糓比丘受之應數數問典倉者若言倉盡不得復受若檀越言何以不來答言倉盡是故不來若言我非謂一倉更有餘倉從今但來如是受者無罪諸食蘇乳苷蔗亦如是若請食盡此牛乳應數問稱者若言稱盡不得復受乃至言我非謂一牛等同前倉糓觀軍戒實則傾敗等者如下文言陣者若戲若鬪鬪即是實也昔者諸侯當今刺史各有三軍每年朔諸侯相率朝夫子論語云天子六軍諸侯大國三軍也牒制隨開中請喚聽往者多論第八云若王王夫人太子大臣大官諸將如是等遣使喚往者不犯凡人亦爾止誹謗故若喚不往當言比丘有所求時不喚自來無所求時故喚不來若往說法或得初果二果又長信敬善根故又以道俗相須長養佛法故是以聽往此亦即釋制戒意中為滅誹謗也不解純義者謂應解言純二象純二馬等也一軍有四二軍有十三軍有七四軍有五合二十六也觀之方便者亦可從道至道等隨於何時見軍即犯也祇十八云若天王出若天像出街巷中迮滿比丘爾時在一處住不作意看無罪若作意欲看越若看象馬牛鬪乃至雞鬪越若軍來詣精舍不作意看無罪作意看越下至人口諍看者越往觀軍陳合戰戒四解陳之形相者文中有五種形者像五行也張甄者雖總張羅簡精者先鋒其形尖也咸相者咸相對列其形直也飲酒戒章云娑伽不能降三毒者有人不達便言聖人何有三毒今詳調達得通豈即是聖經論悉許異生五通也除漏盡故五分第八佛往䟦陀越邑彼有毒龍常雨大雹壞諸田苗諸人常念誰有威德能除此龍聞佛與千二百五十弟子俱來歡喜出迎禮足白言願降此龍娑竭陀在佛後扇佛佛問即領汝聽此諸居士所說不答言聽第二第三問答亦爾娑竭作念世尊三問為勑我降此惡龍即禮佛而去乃至身出烟火大同四分於是化龍身合如內著鉢中如人屈申臂頃持著世界中間須臾便還諸居士歡喜白須何等答言我白衣時性好酒肉居士歡喜即為辦之娑竭飲酒已還拘睒於僧坊外醉臥吐泄衣鉢縱橫佛與阿難轝還井邊佛自汲水使阿難洗臥著床上令頭向佛須臾轉側申脚踏佛佛集僧問言娑竭陀先敬佛不答言敬佛又問今能敬不答不能乃至問娑竭陀先能伏惡龍今能降蝦蟇不答言不能呵已制戒十誦律十七降龍大同又云因莎伽陀名聲流布故諸人為僧作前食後食是中有一貧女信敬獨請莎伽陀為辦蘇乳糜女人思念沙門噉是或當冷發便取似水色水香酒持與莎伽陀不看即飲飲已向寺寺門邊倒地等僧祇二十云時有一家施食之後因渴施酒色味似水得而飲之乃至是善來比丘今能降蝦蟆不等述曰蘇揭多此云善來即莎伽陀是也十過中初有失於根有損者今尋文中色惡少力理非根損而已眼視不明是根損故相從總說也嗔增者一現嗔二益鬪也報虧者增致疾也以癡諸業者壞田業資生也文言以我為師等者凡弟子理須順教今犯此戒違教偏重以過多故不同餘戒也文中列五酒新譯經論酒有三種謂名為宰羅此云米酒迷耶謂根莖花果等酒也末陀謂𮑱桃酒也放逸處酒由飲故能生逸故云然也開文中云餘藥治不差者五分第八云娑竭陀佛制戒已不敢復飲以先習故氣絕欲死飲食不消不知云何佛言令𭊴酒器章中已廣說乃至得已便差白佛佛言已差應應漸漸斷之乃至𭊴酒器不復患者不復得𭊴水戲戒大雲經無文也僧祇十九云童子迦葉至年八歲出家得阿羅漢共十六羣入水浮戲波斯匿王在樓望見王未信佛法見已倍生不信即語末利夫人看汝家所事福田童子迦葉於其水中入頂第四禪以天耳聞語諸伴言王倍不信末利夫人心生不悅今當令彼發歡喜心皆言善哉各提澡鑵盛滿中水以著於前結跏趺坐次第行列陵空而去於王殿上空中而過夫人見已心大歡喜即白王言看我福田神德如是王大歡憙五分第八十誦十六小小差殊不錄戒本水中且據緣說釋中鉢盛水戲亦提擊攊戒僧祇十九名相指戒與此律似別彼祇緣起尼坐不正十六羣見已相指示而笑因此故制彼云一指指提乃至五指亦如是一切手指提以捲指蘭若木竹指越知事人差次食以指指言某甲去提恐怖戒悸祗季反心動也舉其前言以釋犯相等後者疏意云前方便時告前人云汝後若見如是色等汝必死示色時名了了者舉前方便時為名也尊者云亦得先以色等示之後方告云若曾見聞如是色等必是不祥故云了了也洗浴戒溫室經除七病者彼經云佛告耆域澡洗之法當用七物除去七病得七福報何謂七物一者燃火二者淨水三者澡豆四者蘇膏五者淳灰六者揚枝七者內衣此是澡浴之法何謂除七病一者四大安穩二者除風病三者除濕痺四者除寒氷五者熱氣六者除垢穢七者身體輕便眼目精明是為除眾僧七病如是供養便得七福何謂七一者四大無病所生常安勇武丁健眾所敬仰二者所生清淨面首端政塵垢不著為人所敬三者身體常香衣服潔淨見者歡喜莫不恭敬四者肌體濡澤威光德大莫不敬難獨出無雙五者多饒人從拂拭塵垢自然受福常識宿命六者口齒香好方白齊平所說教令莫不肅用七者所生之處自然衣裳光餘珍寶見者悚息上代光統述制意云水性漂蕩無恒不可常令定淺上流忽增容損身命兩月聽洗者准多論第八十誦十六說也多云熱時者春殘一月半夏初一月是二月半名熱時律師云天竺早熱是名天竺時如是隨處熱時早晚數取二月半於中洗浴無犯已上論文多論第九云凡比丘浴若露覆室要不共白衣及覆上身要著偈支述曰以偈支覆身也一當有羞愧二喜生他欲想故昔有羅漢比丘洗有一比丘見其身體鮮淨細耎便欲心生後不久男根墮落即有女根則休道為俗生子後還遇見即便識之知本所因即歸情求及羅漢教令悔過用心純至還得男根故宜不露形也又云婬持戒大比丘及沙彌罪同破七寶塔勸人出家精進斯福同塔也已上論文
