body:
  text: 嵩岳鎮國道場沙門賓作自下二十犍度西音犍度者正梵音塞建陀或云塞建圖此翻為蘊蘊即聚也若准薩婆多宗律本有十七事梵云伐窣都此云事即真諦三藏婆擻斗律是也此是梵本之中諸部名也衣藥房三謂四依是者藥犍度中有食及藥故四也前有眾法為成自行者受戒秉法為成師德作持之隨行也後有自行為成眾軌者如拘睒彌中第一持戒不毀壞等雖是自行為成眾生秉法之德也開上食資道兩緣者長離開衣背別開食入聚通開二也集多受法者八敬雖復落下尼法今明四受猶得成多也尊者曰亦可就初大段脩行成佛文中分二初至我當為其作弟子已來正明菩薩託五勝相顯具福智為息眾生五慢之義第三爾時菩薩漸漸長大已下厭世出家脩禪發智道成號佛初文復二初至開現梵行來明五勝相表蓋自他第二摩竭王洴沙備處已下聞名息慢顯相功力初文勝相文即為五初至父母真正正明菩薩昔餘生中造作僧長大宗葉業由此能感尊貴眷屬亦破眾生恃豪族慢自下諸相皆具二義一自因成二破外慢第二眾相具足已下德所依器相好莊嚴亦破眾生恃色身慢第三有此相者已下示輪王相顯必尊榮亦破眾生恃貴位慢第四七寶具足已下七珍既備受用自然亦破眾生恃財富慢第五若當出家已下正顯菩薩必當成佛十號響頒三輪化益亦破眾生恃內德慢自不且依疏釋相之所表者標幟可觀名為所表也相之所為者必納勝德名為所為也此即相之功用有此所為也文言我曾聞者瑤云優波離從讖書中聞也今詳或是此部律主自古傳聞也最初出世名大者由懷廣志以為名即劫初時田主是也故俱舍十二云謂劫初時長壽久住有地味生其味甘美次有地皮餅生次有林藤次有香稻後時有人躁性懶墮長取香稻貯擬後食餘人復學多收無厭故隨收處無復再生遂共分田有懷侵奪劫盜過起共聚詮量一有德人各以所收六分之一雇令防護封為田主因斯故立剎帝利名大眾欽承恩流率土故復名大三末多王此云大等意自後諸王此為首瑜伽第二云彼最初王名大意也有經文十王等者或有律本阿濕卑七王或言六王故也此方名為道眾生梵云菩提薩埵譯者略之故云菩薩也菩提翻覺舊翻為道也薩埵翻為有情舊翻為眾生也具佛地論第三卷中翻菩薩名總有三義一云謂諸薩埵求菩提故此即求菩提之薩埵故名菩薩依主釋也二云又緣菩提薩埵為境故名菩薩具足自利利他大願求大菩提利有情故自利顯智也利他顯悲也大願顯菩提願也謂緣覺果及所化生起智悲願故約所緣以立其名即有財釋也三云又薩埵者是勇猛義精進勇猛求大菩提故名菩薩此約果及行為名亦有財釋也婆沙百七十六有其兩義故彼論云由此薩埵未得阿耨多羅三藐三菩提時以增上意樂恒隨順菩提趣向菩提親近菩提愛樂菩提尊重菩提渴仰菩提求證欲證不懈不息於菩提中心無暫捨是故名為菩提薩埵此即初義復次薩埵是勇猛義未得阿耨菩提時恒於菩提精進勇猛求欲速證是故名為菩提薩埵此即後義離心第十五但有初義也仍本名說故曰菩薩此悅頭檀王所生言悅頭檀者是五分彼律淨飯王又有疏本闕無言說頭檀者已下文也又有疏本云言悅頭檀者是彼律淨飯王又有疏本云此悅頭檀王所生若依五分王舍城有王名摩王有四子一名照目二名聰目三名調伏勇四名尼樓聦明神武有大威德為第一夫人故擯行四子奉命而去到雪山北營建城邑數年之中父王思之問子何許答言在雪山北近舍夷林築城營邑人民熾盛地沃野豐衣食無乏王聞三歎我子有能從此遂號為釋迦種尼樓有子名烏頭羅烏頭羅有子名瞿頭羅瞿頭羅有四子一名淨飯二名白飯三名斛飯四名甘露飯淨飯有二子一菩薩二難陀白飯二子一阿難二調達斛飯二子一摩訶男二阿那律甘露王二子一婆婆二䟦提菩薩有子名羅云因果經智論同然此言悅頭檀者是彼律淨飯王也已上四本疏又不同然尋五分律第十五云佛在王舍告諸比丘過去有王名曰摩有四庶子一名照目等尋彼庶子即是第二夫人之子也譯者不善其意乃譯為庶子者甚為疎謬耳故彼文云第一夫人子名長生頑薄醜陋眾人所賤夫人雖長才不及物而彼四子並有威德當說何方固子基業即便白王王之四子並有威德我子雖長才不及物承係大業必為陵奪若王擯斥我情及安王言四子孝友於國無𠎝今云何擯夫人又言王此四子並有威德必相彌滅大國之祚王即呼子勅令出國時四子母及同生姉妹咸求同去一切人民多樂隨從王悉聽之乃至廣說王聞三歎我子有能從是遂號釋迦種也釋迦此翻為能既因第一夫人之子遂擯四子故知即是第二夫人之子如轉輪王白夫人何有小大宜撿佛本行經即知非是庶子彼經第五卷云第一之妃生一子不堪為主第二妃生四子故云庶子者深失本意也此兒有三十二大人之相者瑜伽四十九釋三十二相及八十隨好地持第十亦同瑜伽地持第十大品二十六亦釋相及好涅槃二十八但釋三十二相今且依婆沙百七十七云問相是何義答標識義是相義殊勝義是相義祥瑞義是相義三十二相者一足善住謂足下平滿不凹不凸於踐躡時等案觸地其跡分明惡心欲者終不能滅諸在家者若有此相必為人王賓伏卛土諸出家者若有此相必為法王化導一切二者千輻輪相謂佛雙足下有文如輪千輻具足轂輞圓滿分明巧妙妙業天子雖極作意不能擬之而別化作所以者何妙業天子所化作事是無䨱無記知所引此相是純淨業所引故生得智所引加行智所引一生所習智所引無量生所習智所引更成兩復次三指纖長相謂指纖長傭而漸銳節不麤現並時無隟安布得中光澤圓滿四足跟圓長相謂佛足跟圓長端嚴廣直地持第十云四者𦟛足跟是也五者手足細𣽈相謂佛手足細𣽈如妬羅綿六者手足網縵相謂佛指間皆有網縵猶如鵝王指若合時網即不現而無皺緩開時便現而無卛急七者足趺端厚相謂佛足趺圓厚向指傭寫兩邊圓直與跟相稱躡時不廣足下如紅蓮華色網內邊如綵樹文紺潤爪甲如赤銅葉色網外邊作真金色網毛紺潤如吠瑠璃八者繫泥耶謂佛脛圓直漸下傭細如繫泥耶鹿王九者勢峯藏密相謂佛勢峯藏密猶如馬王若爾云何所化得見有說世尊慜所化故方便示之有說世尊化作象馬陰藏殊妙告所化言如彼我亦爾十者身分圓滿相謂佛身分圓滿如諾瞿陀樹如從齊至頂如是從齊至足上下相稱十一者身毛上摩相十二者孔生一毛相瑜伽云身諸毛孔一一毛生如紺青色螺文右旋十三者身毛右旋相諸佛身諸毛孔各生一毛如吠瑠璃其色紺潤宛轉右旋毛端上摩所以一一毛孔唯一毛者以菩薩時不亂說法故十四者身真金色相映奪世間一切金光令不復現如今時䥫比今時金威光不現今時所用金至佛在世時所用金邊威光不現佛在世時所用金若至大海轉輪王路金破砂瞻部捺陀金邊威光不現此金比七山比三十三天莊嚴具金如是展轉乃至樂變化天莊嚴具金比他化自在天莊嚴具金廣說應知此他化自在天莊嚴具金若至佛身金邊威光不現是故佛身金色最勝映奪一切世間金色十五者常光一尋相周匝常有光明面各一尋晝夜恒照十六者皮膚細謂相塵水不著如吠瑠璃及蓮華葉設佛以之蹈於塵山吠嵐婆風於中擊坌欲令佛身及佛足下一塵染著無有是處十七者七處充滿相兩手兩足兩肩及項是為七處十八者身廣洪直相諸佛身廣洪直不不僂亦不傍㿲端雅充實十九者師子上身相謂佛𮌎臆分齊方廣威肅如師子王上半身分二十者肩髆圓滿相謂佛肩髆圓滿非諸備力妹壯力士之所能及二十一者立手摩膝相謂佛平立舒手摩自膝輪二十二者師子頷輪相頷字胡感反骨圓如輪故云頷輪也謂佛頷輪廣好如師子王二十三者具四十齒相二十四者齒齊平密相二十五牙齒鮮白有光明相謂佛具四十齒皆悉齊平中間無隟如毛髮許其色鮮白光明晈映如雪山王間餘人但三十二齒而說彼身中有一百三骨佛具四十齒何故亦言身中有一百三骨而不增耶答餘人頭骨九分合成世尊頭骨但有一段是以俱有一百三骨二十六者得最上味相謂舌相淨故合所飲食變成上味有說佛咽喉中有二乳泉若飲食時其乳流出離諸飲食皆成上味然於此中舌根淨故令味殊勝此理應然二十七廣長舌相薄𣽈廣長出時覆面至耳髮際若還入口而於口中無所妨礙二十八者目紺青相眼目脩廣其色紺淨如蘇闍多青蓮華葉二十九者牛王睫相謂佛眼睫安布善好猶如牛王三十者烏瑟膩沙相謂佛頂髮骨肉合成骨如覆捲青圓殊妙三十一者眉間白豪相長半尋量右旋宛轉光明清徹三十二者得梵音聲相謂佛於唯藏中有妙大種能發悅音和雜梵音如羯羅頻迦鳥及發深遠雷霍之聲如帝釋皷如是音聲具八功德一深遠二和雅三分明四悅耳五入心六發喜七易了八無厭束為頌曰足善并輪相指鐵足跟圓手足𣽈鵝王足趺端鹿王峯藏身分滿上摩生一毛右旋及金色常光膚細滑七處身洪直上身肩髆圓摩膝師子頷四十齒齊密鮮白最上味舌長目紺青𥇒相烏瑟尼白毫梵音相此與瑜伽有少離合大分同之也手足肩及項是為七處滿心王菩薩經云所以三十二相者對三十二知見鬼神各有一相生慢故婆沙云問何故丈夫相唯三十二脇尊者說曰若增若減俱亦生疑唯三十不違法相有說三十二者世間共許是吉祥數故不增減有說三十二相莊嚴佛身則於世間最勝無比若當少者便當闕少若更增者則亦雜亂皆非殊勝故唯爾所如佛說法不可增減佛相亦爾無減可增無增可減智論三十云如嚴身具雖復富貴多有珠璣不可量著瓔珞第九十云隨眾生所好或有國主現千萬相或無量阿僧祇相隨天竺所好故現三十二相八十隨形好八十隨好下當辨婆沙又云問菩薩所得三十二相與輪王相有何差別答菩薩所得有四事勝一熾盛二分明三圓滿四得處復次有五事勝一得處二極端嚴三文像深四隨順勝智五隨順離染釋七寶名華嚴五十七也如下藥法中目連取藕其池有七大龍象王其中有供給四天下轉輪聖王者即是象寶也七種瑞寶者彼經云一劒寶不賓伏處自往罸之劒無害心彼諸眾生見劒束時自然歸伏得歸伏已還住王前二皮寶商人海中得海龍王皮來進火燒不燋水漬不爛極為光澤高五由旬若王行時軍眾在下各別得房舍三衣寶逾常妙好柔𣽈能免寒熱飢渴四房舍寶日月星辰等皆於中現又聞諸天音樂五薗林寶一切日月星辰奇異物等皆於中現諸天音樂諸天設奏於此中現王得受用六足所用寶着此行時入火不燒履水不溺行縱至百千由旬終無疲乏七床寶王心清淨其寶常現若放逸時即沒不現不高不下不靳不𣽈每常稱意自然禪定束為頌曰劒皮衣及房薗林足與床三輪化益者初至而自娛樂顯神足輪及憶念輪也與眾生說法已下是說法輪也三輪義下當辨總別口歎者終無差錯文是總也別舉七寶十號等文是別也一邊境備慮者至處處衛邏已來文是也言中是到者應言時王邏人聞所說也今詳文亦不到此中先頭所聞之事後方正顯邏人白王故也若就自行名修世間善法者薩婆多宗菩薩後身先脩有漏六行斷下八地惑得四靜慮四無色定名為世間善法四門所現皆是淨居諸天化作欲令菩薩生欣猒也淨居天悉是那含也五分十五云至年十四嚴駕遊觀出東城門乃至菩薩久後復勑御者嚴駕遊觀出南城門餘准此知然出西門逢見死人却還之時逢出家人不言北門見也因果經二月八日出家瑞應本起經四月八日佛本行讚三月八日出家太子五夢經佛四月八日生調達四月七日生難陀九日生阿難十日生此等非但別日年亦不同也五分十四向阿菟耶林去城不遠便下馬脫寶衣語闡陀言汝可牽馬并持寶衣還宮道吾拜白父母今辭學道不久當還願不垂憂恐損他故者大乘方便經云有三因緣自剃髮一太子威顏肅物一切人天八部無敢近者二為太子誠出家故能自剃不同世人三為護他故父王有勑若有剃者誅其五族今言恐損即第三義也五分即為剃之釋提桓因如屈申臂頃至菩薩前以衣承髮持還天宮智論第一貿麤布僧伽梨於尼連河側六年苦行佛本行十八云時淨居天應時化作獵師之形身著袈婆染色之衣太子與身易之而著遠之羅閱者之適也往也不列得鉢之所者五分十四入城乞食威儀庠序視地而行時未有鉢持蓮荷葉展轉道路葉不離根王與諸臣於高樓上遙見菩薩以為奇雅顧語眾臣未曾見聞若斯人比咸皆自言昔聞淨飯王子相師相之當為輪王或成佛道此人必是見論十六云先受乳糜時鉢度尼連禪河時沒在水中海龍王將供養亦不言得處顧說文云邪視也八十種好者涅槃二十四云所以復脩八十種好世有眾生事八十神瑜伽四十九云如來八十隨好謂兩手足具二十指及以節分並皆殊妙是即名為二十隨好兩手兩足表裏八處手四足四並皆殊玅是即名為八種隨好兩踝膝股六處殊玅是即名為六種隨好兩臂肘腕六處殊玅是即名為六種隨好腰縫殊妙各一隨好兩核殊妙為二隨好核謂卵也陰藏殊妙為一隨好兩臀殊妙為二隨好臗臗尻也臚蘆音皮臚也臍三並皆殊妙各一隨好兩脇腋乳並皆殊妙為六隨好腹𮌎項脊各一隨好如是所說除頸已上於下身分六十隨好上下齒鬘並皆殊妙為二隨好其齒秀出行列猶如花鬘故名𪙾腭殊妙為一隨好去於反五各反齒內上下肉也兩脣眷屬並皆殊妙為二隨好善圓滿為一隨好兩頰圓滿善安其所為二隨好兩目眷屬並皆殊妙為二隨好兩眉殊妙為二隨好其鼻二孔並皆殊妙為二隨好其額殊妙為一隨好角鬢兩耳並皆殊妙為四隨好頭髮殊妙為一隨好如是所說從頸已上二十隨好前有六十後有二十總合說為八十隨好地持第十與瑜伽同大般若五百三十一及三百八十一并智論九十一全有不同隨相不可繁敘且依瑜伽束為頌曰指及表裏二十八兩踝膝股臂肘腕腰縫各一兩核陰兩臂臗臚臍兩脇腋乳腹𮌎項脊下下者頸已下六十也齒二𪙾一兩脣頰目眉鼻各為二額一兩鬢兩耳髮若子儼然者外學者釋君臨上位子愛下人也非是捨位者覺云為對古師云是捨位今詳此未必然也謂舉讚中三四二句者前文非是下賤人及諦視前進等是也三父母名者或有律本云父姓名為白白淨王子故也若爾前引五分云淨飯王子耶答鴦崛經云住大沙門白淨王太子故不可一准也亦可俱姓者或有律云父姓名為日謂日炙種也即顯日種是上代姓言釋迦者是後代姓也本行集第五云經律異相云西方相傳剎帝種昔被墓位子逃於外有一仙人収養漸長欲令剎嗣續不斷有占星者白彼怨王剎利星現怨王令人捕捉將送捨是貫於尖標之上仙人來至勸喻小兒命起情欲欲令剎後胤不絕小兒受苦情欲不發仙人化為密雲掩障細雨霑潤令苦暫息復化一女與小皃合池精於地仙人遂以牛糞褁精將歸置在甘蔗園中日炙糞團生一男兒形貌端正其後長大還嗣王位因此相傳其有毀者名牛糞種其有讚者即名日種具習諸定者此雖不說理亦決然謂必要先斷下地惑展轉乃至得入非想無有不斷下地煩惱入上地義大乘雖伏義亦同然信等五根者信精進念定慧五根也非奪者中有三者一法非二人非三果非也崇云舊解執自餓是道等者今解不爾但以欲求勝法中路遇緣遂經六年不獲聖法其休息法即後成佛父是苦行是耶非休息法今詳遇緣遂經六年者豈容菩薩虗棄六年若復救言佛是佛迹而非虗棄者亦應化迹亦執自餓何用謬破也次苦行中詣大將者前科文言行同外道體是一也如餘經說者六度集云佛昔為王有人誤飲池水詣王伏首王言夫買宅者即有其井占其田者即惜其汲水刈草非告不取汝不告而取豈非盜乎餘如章中非是二空者古師云前文同於耶脩從此已下名為還歸本宗文言捨欲惡不善法者挍量邪正二定有能除患不能除患之義此古師意挍量二空知是邪定即名欲惡不善也今師意說欲惡不善是初禪障非是二空故破之也計理應言捨而得也者若加此句便成十句也不勞廣為十六者也今廣出之第一三者時菩薩復作是念頗因欲不善法得樂法不此第一句也文現有之復作是念不由欲不善法得樂法此第二句也文亦現有復作是念我今寧可捨欲惡不善法此第三句也文無理有第二三者復作是念頗有習無欲捨不善法得樂法耶此第一句也文中現有復作是念然我定由習無欲捨不善法得樂法此第二句也文無理有復作是念我今寧可習無欲捨不善法得樂法此第三句也文無理有第三三者復作是念頗因此自苦身得樂法不此第一句也文無理有復作是念然我不由此自苦身得樂法此第二句也文中現有復作是念我今寧可捨自苦身得樂法此第三句也文無理有第四三者復作是念頗因食少飯得充氣力不此第一句也文無理有復作是念然我定由食少飯得充氣力此第一句也文無理有復作是念我今寧可食少飯得充氣力耶此第三句也文中見有因果等經謂食牧牛乳糜者餘經或見天衣等者智度論三十八云經曰我當於菩提樹坐四天王乃至阿迦尼吒天以天衣為坐者當學般若波羅蜜論曰問如經說佛敷草樹下坐而成佛道今云何言天衣為坐答聲聞經中說敷草摩訶衍經中隨眾生所見或有見敷草樹下或見敷天綩綖隨其福德多少所見不同乃至如是等寶衣敷坐菩薩坐坐上成阿耨菩提述曰我當於菩提樹下等者顯菩薩發願也大寶蓮華王坐等者謂大乘中自受用身居於大寶蓮華王坐而成正覺故唯識第十云自受用身還依自土此即舉身顯所居土謂圓鏡智相應淨識舉能變識也由昔所脩自利無漏純淨佛土因緣成熟顯淨識中淨土種子從初成佛盡未來際相續變為純淨佛土顯由淨識及前種子因緣力故從初成佛盡未來際所變淨土相續現起然此淨土如佛地經解深密等總攝以為十八圓滿然佛地論有其三釋一云此是變化土攝一云此是受用土攝一云如實義者釋迦牟尼說此經時地前大眾見變化身居此穢土為其說法地上大眾見受用身居佛淨土為其說法所聞雖同所見各別准彼論中正義家釋地前一向不見淨土地上大眾見斯淨土然尋彼論通據自他二受用說自受用土理亦必具十八圓滿故唯識論釋自用土如彼文云周圓無際眾寶莊嚴自受用身常依而住述曰此即十八圓滿中略顯分量及以依持二圓滿也自土既有此二圓滿何妨復有餘之十六合為十八也十八圓滿者一顯色圓滿二形色圓滿三分量四方所五因六果七主八輔翼九眷屬十住持十一事業十二攝蓋十三無異十四住處十五路十六乘十七門十八依持束為頌曰顯形分量方因果主翼眷持業蓋無畏處路乘門依佛地經云薄伽梵住最勝光曜七寶莊嚴放大光明並照一切無邊世界生即顯色圓滿也謂大宮殿用最勝光曜七寶莊嚴或大宮殿七寶莊嚴故最勝光曜無量方所妙飾間列此即色形圓滿也如今國中無量城邑安布得所西明法師云言方所者如綺井等今詳失意也周圓無際其量難測此即分量圓滿也或周圓難測或經量難測也超過三界所行之處此即方所圓滿也且如三界是自地愛之所行處亦是所緣及相應縛之所隨增復亦是彼異熟增上二種果法今此淨土非彼三種之所行處故云超過勝出世間善根所起此即因圓滿也准佛地論以得智為此淨土土變現生因若准攝論具由根本及後得智最極自在淨識為相此即果圓滿也謂一切法識為體相今此淨土佛無漏識以為體相如來所都此即主圓滿也此土為主故諸大菩薩眾所雲集此即輔翼圓滿也無量天龍藥叉乃至人非人等常所翼從此即眷屬圓滿也准攝論說此化非實也以義而推若自用土菩薩等亦是佛化以莊嚴土以其自土唯佛與佛方能知故廣大法味喜樂所持此即住持圓滿也即法華經中法喜禪悅食也現作眾生一切義利此即事業圓滿謂佛能化生事業也現益名義當益名利也滅諸煩惱交橫纏結此即攝益圓滿也佛地論云又現證得解脫煩惱及以纏結殊勝福知故名攝益遠離眾魔此即無畏圓滿也謂無四魔怨敵過諸莊嚴如來莊嚴之所依處此即住處圓滿過菩薩莊嚴住處唯是如來妙飾莊嚴為所住處大念慧行以為遊路此即路圓滿也大念即是無分別智大慧即是後所得智此二俱有造作淨土增上業用並名為行由此二智通生淨土故名遊路大止妙觀以為所乘乘圓滿也乘此止觀行前通路大空無相無願解脫為所入門門圓滿也佛地論云依從此門而入淨土又云此淨土中亦應有路乘門等為命有情欣樂實德故就行說無量功德眾所莊嚴大寶華王眾所建立大宮殿中此即依持圓滿也無量功德眾善所起大寶紅蓮華王以為依持猶如大地依風輪等也大寶華王者華中最勝名曰華王或即如來說名為王大寶華王有此王故從王為名也眾所建立者此華非一或華葉多故名為眾長時續依此華王故名建立也此十八圓滿經文具如佛地及解深密經廣釋其相如佛地論第一及二本攝論第十說也三僧祇劫依八定等者地前三賢為第一阿僧祗劫言三賢者第一十住一發心住二治地住三修行住四生貴住五方便住六正心住七不退住八童真住九法王子住十灌頂住第二十行一歡喜行二遶益行三無恚恨行四無盡行五離癡亂行六善現行七無著行八尊貴行九善法行十真實行第三十迴一救護一切眾生相迴向二不壞迴向三等一切佛迴向四至一切處迴向五無盡功德藏迴向六隨須平等善根迴向七隨順等觀一切眾生迴向八如相迴向九無縛無著解脫迴向十法界無量迴向次從初地至七地終為第二阿僧祇劫從八地至第十地終為第三阿僧祇劫言八定者地前脩四地上亦四合有八定且辨地前者如唯識第九𤏙等四位修四尋思四如實智四尋思者一尋思名二尋思義三尋思名義自性四尋思名義差別觀此四境假有實無名四尋思下品尋思觀無所取立為𤏙位上品尋思觀無所取立為頂位四如實智者亦緣名義自性差別遍知所取及能取空是如實知於中下品立為忍位若上品者立世第一此四善根如其次第依明得定初獲慧日前行相故立明得名次依明增定明相轉盛故名明增次依印順定於無所取決定印持無能取中亦順樂忍印前順後立印順名次依無間定雙印所取能取二空從此無間必入見道故名無間謂前忍位總有三品下忍時印境空相中品忍時於能取空順樂忍可上品忍時印無能取今世第一二空雙印故不同也此四善根上代諸師略有四釋常法師云此四善根如其次第以配地前四十心位謂准本業瓔珞經於十住前更加十信一信二念三進四慧五定六不退七迴向八護法九戒十願烋法師云十住為𤏙十行為頂第九迴向以之為忍第十迴向為第一誓法師云第十迴向最後位中開四善根唐三藏意取誓法師以為正義即是初僧祇第十迴向終次心也辨地上復四定亦如唯識第九卷說一大乘光明定謂此能發照了大乘理教行果智光明故二集福王定謂此自在集無邊福如王勢力無等雙故三賢守定謂此能守世出世間賢善法故四健行定謂佛菩薩大健有情之所行故西明法師云此之四定若辨位地未見誠文舊諸師說初之四地名大乘光明五六七地名集福王八九十地名為賢守金剛并及諸如來名健行定今詳不然知唯識論於十地中漸修十度復辨三學以攝十度此之四定即是定學定學即是靜慮度攝靜慮既在第五地然彼論中四門辨攝一自性攝謂以戒學唯攝戒度定攝靜慮慧攝後五謂般若方便願力智也二并伴攝三與十度皆具相攝三隨用攝戒前三定攝靜慮慧攝後五三皆攝進四隨顯攝戒攝前四定攝靜慮慧攝後五准彼自性及隨顯門此之四定局在五地若隨用門通四五地若助伴門即通十地論甚分明何因不見良由五地名極難勝真俗二諦行相相違一智雙證極難勝故故此四定為此智依禪慧二波羅蜜是第三階者謂有漏六行觀也問前於藍所已入非想明知已斷下八地惑何因此中始言修禪又諸菩薩不動種姓必先有退何因如此答理實前時已得靜慮然諸菩薩別有退義故婆沙六十一云是有三種一已得退二未得退三受用退已得退者謂先已得諸勝功德遇緣而退未得退者一切有情若對方便皆應獲得諸聖慧眼但不精進修正方便於四真諦未得現觀於聖慧眼有未得退受用退者謂於已得諸勝功德不現在前如是三退佛有一種謂受用退所得功德有不現前故獨覺有二種一未得退二受用退聲聞中不時解脫有二種如獨覺說時解脫具三有作是說佛全無退乃至評曰初說為善諸佛定有受用退故准此前時雖已得禪而今欲令現前受用重修令起由諸菩薩定依根本第四靜慮起無漏道三十四心一坐成佛故須令彼靜慮現前故不違理本音禪那此名思惟脩者靜慮支義廣如瑜伽三十三及第十一顯揚十九雜集第九成實十八婆沙八十及八十一等俱舍二十八順正理七十七婆沙百五十七已下即是定蘊彼上廣釋差別之相今略料簡三門分別一釋名二體相三廢立言釋名者先列後釋且列名者俱舍頌云靜慮初五支尋伺喜樂定第二有四支內淨喜樂定第三具五支捨念慧樂定第四有四支捨念中受定雜集云支建立者謂初靜慮有五支何等五一尋二伺三喜四樂五心一境性第二靜慮四支一內等淨二喜三樂四心一境性第三靜慮有五支一捨二念三正知四樂五心一境性第四靜慮有四支一捨清淨二念清淨三不苦不樂受四心一境性婆沙八十列名一同大小宗義雖有少異名字支數悉同十八次釋名者梵云䭾演那此云靜慮舊名禪那者訛也翻為思惟脩或翻功德聚林者並義譯也婆沙八十云問何故名靜慮支靜慮支是何義答寂靜思慮故名靜慮隨順此靜慮故名靜慮支俱舍云依何義故立靜慮名答云由此寂靜能審慮故審慮即是實了知義述曰定體寂靜慧復審慮由定及慧名為靜慮梵本云振多此云審慮即為字緣也梵云地即是字界也此謂振多字緣之中若置地為字界相助名為駄演那此云靜慮也俱舍難云若爾諸等持皆應名靜慮難意云寂靜慧即名靜慮者八地諸定亦皆慧俱悉應名為靜慮解云諸等持中唯此建立五支四支止觀均行故唯就勝獨名靜慮如世間言發光名日非螢燭等亦得日名第二體相者先引新經論名略辨相已後方辨體且引經者顯揚第二引經解釋且依婆沙八十及八十一云如契經說苾芻當知有四天道能令未淨者淨者轉明謂離欲惡不善法有尋有伺離生喜樂初靜慮具足住是名第一天道復次尋伺滅內等淨心一趣無尋無伺定生喜樂第二靜慮具足住是名第二天道復次離喜住捨正念正慧正身受樂聖應說捨第三靜慮具足住是名第三天道顯揚云離喜住捨念正知及樂身正受聖者宣說成就捨念樂住第三靜慮具足住復次斷樂斷苦先憂喜沒不苦不樂捨念清淨第四靜慮具足住是名第四天道若欲釋律即取律文放像此文而解釋之依此經文以之為本大小乘宗決釋建立婆沙釋意云且初定中離欲惡不善法者事欲具欲名之為欲所餘煩惱名惡不善復次欲謂五欲惡不善者即是五蓋復次欲謂欲愛惡不善者謂欲界中所餘煩惱廣釋如彼瑜伽三十三意云欲有二種一煩惱欲二事欲此即通收婆沙初釋又云離者一相應離二者境界離如次即是斷相應縛及斷緣縛也離惡不善者因煩惱欲所生不善身業語業持杖持刀詐為妄語等名為不善此與小宗不同也言有尋有伺者婆沙意云與尋俱及伺俱法名有尋伺然小宗中尋伺即是心所法數有別體性大乘宗中於思於慧假立尋伺離思慧外無別尋伺成實論宗離心之外無別尋伺由此薩婆多於一心同時即與尋伺俱起俱舍第四釋云如冷水上浮以熟蘇上烈日光之所照觸蘇因水日非釋非凝如是一心有尋有伺心由尋伺不過麤細瑜伽釋云有尋有伺者由於尋伺未見過失彼地猶有對治欲界諸善尋伺是故名為有尋有伺言離生者婆沙一釋意云初定地中能離所有苦根憂根界根女男無慚無乃至五蓋五欲等故獨名離已上定地雖亦從離而生以初居首故初得名瑜伽釋意云離者無間道由此為因無間所生起解脫道故名為生意同婆沙向釋也言喜樂者瑜伽意云已獲輕安身心調適有堪能故說名喜樂顯揚意說悅轉識邊名之為喜悅阿賴耶名之為樂以其色身賴耶能攝今瑜伽云已獲輕安者顯得轉依身心調適如顯揚釋薩婆多宗即不同此謂彼小宗樂是輕安喜是受數不同大乘喜樂體一望悅於身即名為樂望悅心邊即名為喜若依成實宗意大同大乘瑜伽復釋初者創首獲得依數次說名之為初言靜慮者於一所緣繫念寂慮言具足者得解脫道故言住者成辦故得無艱難乃至七日能正安住次釋第二定言尋伺滅內等淨者瑜伽意云於忩務境能正遠離於不忩務境安住其心一味寂靜名尋伺滅內等淨言忩務者尋伺令心忩務也婆沙云問得第二定總斷初定一切法盡何故但說尋伺滅答此為上首總滅餘法復次尋伺難斷難破難可越度是故偏說廣如彼釋婆沙釋內等淨者內者謂心等淨謂信由信平等令內心淨名內等淨若依大乘內淨即以三法為體故瑜伽六十三及顯揚十九云問內等淨以何法為體答以念正知及捨為體由此前說於不忩務境安住其心一味寂靜名為內淨心一趣者瑜伽意云超過尋伺有間缺位能正獲得無間缺位故言心一趣也顯揚云謂於入時多相續住諸尋伺法恒不現行婆沙心一趣者謂一門轉如欲界心於六門轉初靜慮心四門轉今第二定心一門轉故名一趣大乘意說離尋伺故名為一趣是專注澄淨之義今小乘中直言一門蘭濫不盡雖一門轉容非一趣故也無伺者以皆斷故言定生者瑜伽意云定是無間道生是解脫道婆沙云初定亦有定何故第二名定生邪答意云此地等持增盛過於初定故偏說之復以初定後現在前故不同初非定所引等如彼廣說言喜樂等准前應知婆沙云喜謂喜根受蘊所攝樂謂輕安行蘊所攝不同大乘如前已辨次釋第三定言離喜者瑜伽云彼於喜相深見過失故云離喜婆沙云以喜為首總離餘法復云以喜難斷難破難越等如前准知住捨等者瑜伽意云爾時離尋伺及喜二種亂心灾患能於第二定攝持其心故言住捨由有捨故安住正念令喜不行若不善修或時失念即速了知故有正知婆沙云捨謂行捨念謂善念慧謂善慧言身受樂者瑜伽云離喜寂靜㝡極寂靜心受得生爾時色身意身領納受樂及輕安樂故言身受樂述曰悅色身及意身並即名樂不同下地悅心名喜以彼動踴有過患故非極悅心不得名樂婆沙意同故顯揚云離善離勇安適受受所攝故名為樂聖應說捨者大乘意說聖應宣說以其捨字牽屬下釋瑜伽意說已下說地無如是樂及無間捨謂常流注名為無間不遮下地有間斷捨亦有法師云下地無意地捨理不然也第三定已上雖有無間捨而復無樂故於此地佛及弟子等諸聖應宣說婆沙意云聖謂諸佛及佛弟子應為他說應自住捨問諸地皆應說何故唯說第三答第三定中具有自他二地留難故偏說之他地留難者第二靜慮喜所漂沒如邏剎斯男聲呼之名邏剎娑今以女聲呼之即目羅剎女於大海中現嬌媚相請人為夫愚人被誘便被食之能令瑜伽師於第二定離染衰退故應說捨所言自地留難者第三定樂生死樂中此樂最勝諸瑜伽師染著此樂不求上勝亦應說捨然瑜伽意為說差別故聖宣說婆沙論意為捨留難故聖說捨不同也小宗引經但有捨字仍牽屬上大乘引經云捨念樂住牽屬下釋顯揚釋意云已上地中無如是樂下地之中無此勝樂復無捨念為對治支故今此地名為捨念樂住也第三靜慮具足住准前知之次釋第四定斷樂斷苦先憂喜沒者瑜伽意云若准第三靜慮應言斷樂住捨正念正知然不作此說而直說言斷樂斷苦等者以其捨念正知能斷樂根與第三定種類相似故略不說但直說其所斷之樂故云斷樂也即於爾時所有苦樂以苦攝憂以樂攝喜皆得超越故總集言斷樂斷苦先喜憂沒謂入第四定時樂受斷故入第二定苦受斷故入第三定喜受沒故入初定時憂受沒故復言不苦不樂者且約四受斷故說非苦樂意說理實下地一切法斷非唯四受復言捨念清淨者下地一切灾患已斷謂尋伺喜樂入息出息謂尋六種擾亂故言捨念清淨若准婆沙言斷樂者以樂為首總斷下地又復樂根難破等准前應知故偏斷樂也言斷苦者於已斷中說之又依雙法盡故俱說斷聲言雙法者謂苦與樂離欲染時雖苦已盡而樂未盡今離第三定染苦樂俱盡故雙說之廣說如彼先憂喜沒者離欲染時憂根已沒離第二染喜根已沒故云先憂喜沒不苦不樂捨念清淨者以離八擾亂事故云清淨八擾亂者苦樂憂喜入息出息尋伺也具足住等准前應知大意雖同然言離欲苦根斷者不同大乘大乘宗意苦根既在五識地中念初靜慮雖實無苦然有三識是苦所依有無堪性亦說名若准成實亦第二定方滅苦根然與大乘亦稍異故彼論第十八二禪品云初禪已滅憂故喜二禪滅苦故喜彼品又云初禪近不定心不定心者能生欲界諸識於中生苦是故不說初禪苦滅述曰彼宗意說初禪與欲界散亂地法極相隣逼故與欲界心互相入出故云近不定心不定心中既能生苦故今初禪心中亦有無堪任性故亦名苦故云亦禪方斷苦根也上來引經略釋相訖次辨體者且列大乘百法薩婆多七十五法然後出體大乘百法者心法有八心所合有五十一分為六位第一遍行五觸作意受想思第二別境五欲勝解念慧三摩地第三善大地十一信進慚愧無貪等三根輕安不放逸行捨不害第四煩惱地六貪瞋慢無明疑不正見即五見也第五隨煩惱忿恨覆惱嫉慳誑諂害惰無慚無愧掉舉惽沉不信懈怠放逸失念散亂不正知第六不定四睡眠惡作尋伺色法十一五根五境法處所攝色心不相應行二十四得命根同分異生性二定無想異熟名身句身四相流轉定異相應勢速次第方時數和合不和合無為六虗空擇滅非擇滅不動想受滅真如薩婆多七十五法者色十一五根五境無表心法一六識合說為一心所五位并不定地合有六位總四十六第一大地法十即大乘遍行及別境舊名通大地第二大善地十大乘十一中除無疑第三大煩惱六無明放逸懈怠不信惽沈掉舉第四大不善地二無慚無愧第五小煩惱十即大乘二十隨煩惱中初十是也第六不定地八大乘四外加貪嗔慢疑不相應十四得非得同分無想二定命根四相名身等三無為法三即虗空二滅是也上來略列其名若略解釋如初卷記次出體者章云體有其九隨事十一枝即十八者此即且依薩婆多宗七十五法中九法為體謂通大地四謂大地十法中取四也一念念謂於緣明記不忘順正理云於境不忘失因述因緣境明記為後不忘因也二定新經論名三摩地此云等持或名心一境性或名定並體是一言等持者由定力故平等持心於一境住三慧慧謂於能有簡擇正理云簡擇所緣邪正等相說名慧簡擇末決亦得疑俱四受受謂領納苦樂俱非有差別故麤相分三謂苦樂細即分五苦中開憂樂中開喜也來通大地中四法竟善大地有三法一信俱舍云信者令心澄淨有說於諦實業果中現前忍許故名為信入阿毗達磨云具能除遣心濁穢法如水清珠著於水內令穢水皆即澄淨如是信珠在心地內心諸穢濁皆悉除遣二猗猗即輕適之樂也輕安是也謂心堪任正理云正作意轉身心輕利安適之因心堪任性說名輕安述曰已作意轉者即如理作意也此作意與輕安相應能為身心安適之因心堪任性者即指體也三捨心平等性無警覺性述曰心平等性者即舉其體也謂能對治沈掉不平故得名也警覺即掉今此性中無警覺也上來善大地三法說大地外二謂覺觀者謂五地之外故俱舍第四云如是已說五品心所復有此餘不定心所是也計理直應言不定地者好若言大地外者小煩惱地即非大也言覺觀者斯經論尋伺是也俱舍第四云尋伺者謂心麤細心之麁性名尋心之細性名伺光法師云尋謂尋求伺謂察寶法師云伺察察若麤理即是尋尋求若細即應是伺無勞別目也今詳伺察定不尋求定不細大小爾論處處有文何因妄破章云隨事十一者若據法數如前已論以受數隨地別分即有十一以其喜受樂受捨受望領細邊同是受數然體名異即分為三故成十一十一之中第四樂字是猗樂也第十樂是受數也餘可知此即當婆沙八十云四靜慮支名雖十八實體有幾答有十一謂初靜慮支名與實體俱有五種即尋伺喜樂等持也第二定四支三體同前加內等淨謂喜樂等持同前加信一種也第三五支第五同前但加前四謂等持同前但加捨念慧樂也第四四支後三如前但加第一謂捨念等持同前但加不苦不樂受也故靜慮支實體十一復有說者受體唯十前三靜慮樂合為一故評曰彼不應住是說初二定樂是輕安故故前說好俱舍二十八即同評家說也章云支有十八者即次下云四法不分者覺觀此二局初禪信局二禪慧局三禪餘五離分以成十四者定受各四且定四者四禪各有定即為四也即一心是也受四者初二禪喜三禪樂四禪不苦不樂此四念是受數也餘三各二者猗通前二禪即二種也捨念局三四即四種也上來即十八支也若依成實樂是受樂即同婆沙不正義釋十法為體故章云其義則別也故彼宗中第八卷五受根品云猗樂不異受樂又彼第十八云又無別猗法但喜生時身心無麤重法柔𣽈調適故名曰猗述曰即與大乘意同大乘義已上辨竟因此復辦法數出體者彼宗離心無別心所十八禪支若並就實即一法為體謂即心王若依假說即七法為體謂前九法之中除猗信二種餘並同前以其內淨亦同大乘故也若開此七即為十八是故章云謂覺觀在初禪即二數也內淨唯第二加前為三安慧局第三加前為四也慧與樂俱故名為安也不苦不樂唯第四加前為五喜枝該初二加前為七捨念通三四加前為十一也樂支遍前三加前為十四也一心等諸地加前為十八也若准大乘法數出體假實通論即有七法唯論實體但有六法謂尋及伺各以思慧為體雖成二種然望慧邊即不異彼第三定中慧數故不增之但約思邊以為一數若癈實論假亦成二數即尋伺為二也此二即不定地數初及二禪喜之與樂第三禪樂第四禪不苦不樂此六即遍行中受數此一受數加前尋伺即是三也第三禪念慧及第四禪念并四禪各有等持此七即別境中三法謂念慧定三加前為六也第三及第四禪捨此二即善十一中一數加前即七第二禪中內等淨即念捨慧三法為體故不別論也若隨事別亦但有十義並同成實也然少差別若依大乘於一念中尋伺不俱以其忩遽於境麤轉名之為尋若細轉者即名為伺無有一心亦麤亦細尋伺二法復無別體自餘喜樂一心等支並得一念俱起若成實定無一心諸支俱起且如初禪有五支者但以初禪有爾許法隨順定心故立為支而實起時一一別起以其彼宗立心所法但是心家分位差別約用名喜名樂等異不可頓有多用同時故一一起或可喜支望悅心邊名之為喜望悅身邊即名為樂此之一種得二俱起義說為二故也次辨第三大門廢立者於中有四初明支數增減次約百法等廢立第三諸支相望決擇問答第四支離合且辨支數增減者婆沙問何故初及第三靜慮俱立五支第二第四俱立四支答隨順義是支義謂四靜慮各有爾所能隨順法不增不減復次界諸惡難斷破難可越度故初靜慮建立五支為窂堅對治第二靜慮重地極喜難斷乃至難越度故第三定建立五支為窂強對治初及第三靜慮俱無如是難斷法故唯立四支復次為治欲界五欲境貪故初立五支為治第二定中五部重地喜愛故第三立五支初及第三無知此法故唯四支廣說如彼瑜伽十一云諸靜慮中雖有餘法然此勝故於脩定者為思重故偏立為支此與婆沙初禪意同次依百法等廢立者略有五重簡之一者染門二者三性門三者定散門四者有所緣無所緣門五心王心所門且染不染者今辨禪支准取清淨慮建立支數故簡煩惱及隨煩惱者若小宗中即簡大煩惱大不善小煩惱并不定中貪嗔慢疑第二約性者唯取善性善性之中除生得聞思唯是脩慧即由此義定散門中併簡一切欲界三性彼並散故第四有所緣無所緣者靜慮體性並是心聚皆有所緣即簡色法不相應行並無為法故婆沙八十云問何故正語正業正命非靜慮支者謂與靜慮相定慧為靜慮體必有所緣所緣根也所緣及有警覺乃名相應正語業命無如是義故非彼支由此四相及諸得等皆不應立為靜慮支非助等持住一境故婆沙且約語業命及下相應簡之理實亦簡色無為等已上四門若百法中已簡六十七法唯有心法八遍行五別境五善十一不定四合有三十三法未簡若七十五法中已簡五十法唯有心法一大地及善地各十并不定地四合有二十五法未簡並於第五心王心所門中簡之問大乘八識小乘六識何非禪支小宗不釋令依大宗雜集第九云問法有無量何故唯立尋等支答為對治支故利益支故彼二所依自故謂對治及利益二種所依即定是也由此三種支分滿足不待餘故准彼三義今此諸識無彼三義故非禪支問遍行五中觸作意想思四種何不立支將欲料簡自餘心所先明具緣即前雜集以為三緣更加第四地法差別且如初禪尋伺及喜第二禪喜第三禪樂第四禪捨此六隨應四禪之中法爾應有然今遍行雖遍諸心唯受一種在上下地有差別相餘四全無差別之相故不立支別境五中定是所緣依念慧是俱故即立支欲與勝解非四緣攝故亦非支且如欲解於加行時希求即可於境有用今是根本無復功能故無支用也善十一中信不放逸可為加行於根本中亦無四義進性忩遽不順定門已有喜等為利益支不須輕安三根順於發業此唯寂止慚愧不害能止惡戒故於靜慮並無四義若依小乘善唯有十闕無無癡故不須簡內淨是信彼宗意云第二定信於諸界地俱可離染初生大信謂欲界染我既能離色無色染亦定能離又初定染我既能離乃至非想我必亦離前得初定未生定信後得三四復非是初故第二定獨支今詳彼宗若作此釋第二定中全無能治以信但能信後離染為後加行非今對治喜樂一心復非能治便為大失故依大乘念慧捨三為內淨體即是能治又立輕安以為靜慮根本攝者有意地樂第三靜慮近分根本皆有意樂故不同也次辨不定四者睡眠惡作唯欲界法故不立支尋伺二種立之為支為欲對治欲界之中恚等尋故初定立也次以諸支相望決釋問答者尋伺喜樂展轉向上理不合有故不問答且如內淨三法為體初定理亦三法相應何不立支答欲界所有欲恚等理應初定善尋能治故彼三法被尋所覆故顯揚十九云由尋伺門所引發故雖有不說復無煩用故不立支若爾初二禪中已有喜根為利益支復何須樂答悅身心別故不相例若依小宗以信為體初定亦有何不立支答即前說言第二定中初生大信是彼宗意又依小宗初二禪樂是輕安樂上地理亦定有輕安何故上地不立為支婆沙八十云為欲對治欲界立識身及所引身麤重故初定立輕安為對治初定二識身及所引身麤重故第二定立輕安已上諸地無此所治重識及所引身麤重故不立之此意說云識依五根身合彼有無堪任性故立輕安應習輕安以為對治已上諸地既無此義故並行捨以與對已上二地喜擾動故捨不明淨不得立支問第三定中立慧為支上下諸地何故不立答若依大乘尋依慧立初定已有內淨含慧二定亦有唯第四定不立慧者以第四定捨極增勝捨之與慧相相違故故不立慧若爾第三定捨與慧亦應爾答既非殊勝無相違相如微冷暖無大相違故顯揚釋第四定云即此捨念極善清淨顯了述曰意說捨念極勝故無正知也婆沙意說初定尋伺所覆二定喜踊所覆四定捨受覆障故並不立慧為支也如第八十不能繁敘次辨離合若小宗中四支五支體各一法無離合義若大乘中尋伺或於思上假立或於慧上或思慧合故須辨之內淨復以三法為體亦應辨之謂欲界中欲恚等尋既亦假立故今初定亦合立之以為對治又有喜踊今慧明故合名尋第二定中內淨合立至第三定即開為三者顯揚自釋云第二定中有踴躍自體之所作業謂喜受也及心所有少分煩惱謂喜貪也所纏覆故總以內等淨名顯之謂淨定心數與受味不相入出第三定中彼心所有少分煩惱皆遠離故喜順於愛彼地名已斷故也顯彼自相謂顯捨念慧三法自相也第四定中即此捨念極善清淨顯了故諸定中如應差別謂第四定捨念極勝故顯自性以違慧故不立正知為又上來廢立門竟次當略辨四無色定如上大妄戒八解脫章已略釋訖然無色定本業瓔珞經中雖亦立支自餘經論並不立支即此八定及滅盡定經中說為九次第定謂諸聖者欲引種種神通等德要先輪環入此九定極令能熟然後引起種種功德故名九次第定也然前八定復有三種一味相應定二淨定三無漏定大小乘宗同有此義故婆沙百六十二云有八等至謂四靜慮四無色有三等至謂味相應淨無漏此中前七各具三種第八唯二謂除無漏述曰謂八定中唯非想地無無漏道故論除之味相應者謂愛相應也愛能持心於境流注其相順定故獨受名謂出淨定八愛味定以愛味心緣定起貪其猶欲界生者數起貪愛後令墮落味定亦爾是退墮緣故維摩經云貪著禪味是菩薩縛若依大乘有四種定一愛上靜慮二見上靜慮三慢上靜慮四疑上靜慮雜集第九四無記根所生煩惱是也謂末那四惑名無記根能生第六識中愛見慢疑也第四無明根命疑上也廣如彼釋此於律相不為甚要故不廣陳言淨定者即有漏善定心也婆沙百六十三俱舍二十八意云淨初靜慮有四種謂順退分順住分順勝進分順決擇分若住退分多分退故若住住分多分不退住勝進多分勝進更趣上定若住決擇分者多分能入見道乃至無所有處非想處等隨應當知謂決擇分唯在四禪也無漏定者即是無漏心作十六行相觀若依大乘不局十六行也於中淨與無漏隨應具足四支五支味相應定不具立支廣如俱舍婆沙等瑜伽顯揚對法等亦釋之今辨菩薩將成正覺即依淨定引決擇分也又聲聞人通依大地能入見道菩薩要唯依第四靜慮入見道也第四靜慮止觀勝故言六地者即未至及中間靜慮并四根本靜慮也又前八定修加行時斷下地惑九無間道前八解脫道一向名為近分第九解脫或入根本或有不入隨應知之若不入根本者亦是近分所攝若依大乘第九解脫一向定能入根本定又就八定之中初靜慮家近分即是未至定也亦有未至非九無間道所攝如具縛者創起五停心觀漸入現觀後修道中方起九無間道斷欲界惑故知彼人見道所依未至定非九無間所攝如應知之初靜慮有尋有伺更後勝修進得無尋唯伺定者即名中間靜慮此亦即是初靜慮攝修得此定從此命終生彼天處作大梵王此以有尋有伺無尋唯伺無尋無伺三地分之居在中間故名中間靜慮始從欲界至初靜慮名有尋有伺地即中間靜慮名無尋唯伺地第二靜慮已上乃至非想名無尋無伺地然四根本靜慮經論名為現法樂住以住此定多受樂故依此起聖道即名樂道中間靜慮及未至定并下三無色亦起聖道然以定慧不均以起艱難名為苦道若廣分別如諸論中略知如此次隨疏釋初禪文三等者上辨相門雖已釋訖然未校量與此律文同異之相然此辨相通辨除障及利益支所從生處等不欲局明四支五支以三四禪准諸論釋不辨四支五支故也隨文應知且如初禪文言除欲惡不善法有覺有觀喜樂一心遊戲初禪者即是婆沙所引經云離欲惡不善法有尋有伺離生喜樂初靜慮具足住准此喜樂一心即是離生喜樂也遊戲初禪即是初靜慮具足住也疏釋一心是所依三昧未必全相當也以此文意通辨相狀不欲局辨五支之義故具足住總顯初定止觀自在如上已引瑜伽論釋得無艱難乃至七日能正安住是也下皆准此創察於法名覺等者若依成實及大乘宗可作此說若依薩婆多宗一心之中具有覺觀即不得言重審名觀也以有覺觀故無內淨等者略辨廢立此亦一相若廣明者如上廢立門釋之二禪文云除有覺有觀得內信譯者置此信字也應言內淨也喜樂一心念無覺無觀遊戲二禪即是婆沙所引經云尋伺滅內等淨律云除有覺有觀得內信是也心一趣律中念也無尋無伺律云無覺無觀定生喜樂律中喜樂一心是也第二靜慮具足住律云遊戲二禪也疏釋可知三禪文云除去喜身受快樂得聖所見護念樂遊戲三禪即是婆沙所引經云離喜律云除去喜住捨正念正慧律中略無也身受樂律云身受快樂聖應說捨律云聖智所見護念也護念即是捨也以捨貪愛故也或如顯揚所引經經聖者宣說成就捨念樂住第三靜慮具足住律云聖智所見即是聖者宣說也護念云聖智所見即是聖者樂即是捨念樂住後釋好也顯揚即用捨念為對治如上已辨第三靜慮具足住律中准前可知四禪文云已捨樂苦先已去憂喜無苦無樂護念清淨遊戲四禪即是婆沙所引經云斷樂斷苦先喜憂沒不苦不樂不捨念清淨第四靜慮具足住章云清淨是一心者非也此中意說捨清淨念清淨故不應謬釋也以對二亂始故等者相承釋云欲界五欲名為外亂初二禪喜名為內亂初禪為治外亂之始三禪為治內亂之始故各五支也以對二亂終故者即初三禪隨應即是外亂內亂終無之處故二四禪不須五支以為對治也此義即同婆沙八十云復次為對治界五欲境貪故初靜慮立五支對治第二靜慮五部重地喜愛故第三靜慮亦立五支初及第三俱無如是所對治故第二第四俱立四支已上論文自下第二斷惑成佛者前明四禪顯所依定理應俱明依四靜慮起𤏙頂等順決擇分次入見道後方盡漏證得通明而今文中但舉三明意顯漏盡貫前見修等故不具辨也諸功德門圓明明洞朗者意顯佛身具足無邊共不共德言共德者無量解脫勝處無諍願智等不苦德者如瑜伽論百四十不共功德上十二分教中已辨如是功德實無邊量且辨三明略以六門分別一列三名二釋別名三辨體性四釋通名五明因起六隨文釋列三名者如章云先宿命次天眼次漏盡俱舍二十七及婆沙一百二云宿住隨念智證明二死生智證明三漏盡智證明釋別名者如章云照於過去名宿命照未來善惡名天眼照現在事名漏盡此顯三明治三際遇名宿命等故俱舍云謂宿住通治前際愚死生智通治後際愚盡智通治中際愚謂六通中三通能治三際愚故立為三明又中際者顯今一期所發惑業發惑業令其永斷故名為治也章云現在亦即為顯一期現在也又訓者如章云事謝於往等可知亦可約報就根者報謂天報根謂天眼也問菩薩天眼理是脩得如何約報答即於佛身假說為天天身中眼名為天眼也或可此釋非理不須救之五住地煩惱者出勝鬘經一無明住地二見一處住地三欲愛住地四色愛住地五有愛住地古來傳釋云欲界一切惱除癡及五見名欲愛住地色界諸惑除癡及見名色愛住地無色界惑除癡及見名色愛住地三界癡為無明住地三界見為見住地今依唯識論第九一切所知障中見疑無明等種子合為無明住地三界見所斷一切惑種名為見一處住地一處合斷得一處名欲色無色脩惑種子為餘三住地故彼論云若所知障有見疑等如何此種契經說為無明住地問也無明增故總名無明非無見等答也如煩惱種立見一處欲色有愛四住地名豈更無餘慢無明等指餘四住地以為例也謂見住地亦有慢等餘三亦爾也總述意者初一局是所知障種餘四局是煩惱障種是現行或所住處名為住地然尋律文自以三漏釋漏盡智是故不勞辨五住地也五住地雖是有漏然文就顯辨其三漏第三辨體性者如章云論其明體其唯智性者准俱舍出體者前二是世俗智第三或六智或十智性若緣漏盡為境即唯六智謂世俗盡無生及法類滅智也若言漏盡身中起者即十智為性謂加苦集道及他心也若三性分別者人眼智通唯是無記謂是眼識相應慧故謂五識中唯生得善若欲界者越地不起若色界者必非定心之所生故故從定心唯生無記謂此即是通果無記若准大乘通善無記餘之二明唯是善性第四釋通名者章云三世境界無所不照故曰三明此即帶數釋也第五明因起者問為何事故學此三明婆沙一百二順正理七十六並釋云宿住智通憶念前際自他苦事死生智通觀察後際他身苦事由此猒背生死眾苦起漏盡通即是俱舍治三際愚故立三明也第六隨文釋章云以第四禪者律中雖無第四禪者律口語而言無瑕住堅固等尋諸經論並是第四禪相也下皆准此八種事六種同行此准地持第十釋佛十力中宿住隨念智力也地持即是瑜伽論中菩薩地同也然與瑜伽同本別譯曇無讖譯八種事六種同行者准瑜伽四十九名為八言說句差別類中隨念六種略所行行述曰此中意說八種名言差別事類此名所行有六同相後名同行瑜伽意說名名言所行略有六種所行行相其意即同地持所說也俗數名字者瑜伽名為呼召假名假名即俗數義也謂以世俗慧數施設名言也有人不違遂假疏文以為俗姓者謬言六種者一俗數名字二剎利等色三父母四飲食五善惡瑜伽名為興盛衰損六壽命撿瑜伽論其義自顯章云此應合八中壽等三故六種者是疏主釋也又云八種六種也他及自身作如是說等者引其續次論文也此是論中列八六已重釋所由也謂由前列六種八種義故於他及自作是說言此是我名等也故瑜伽云由諸世間依憑如是八言說句六種略行於自於他起言起說又准瑜伽應言此是我名此是彼名我剎利等彼為剎利等乃至廣說今地持文譯家並略彼名彼剎利等一邊文也次字某已下列其八事者一字某二姓某三如是生四食如是食五壽命如是世間應壽百年然自所感但壽五十也六壽命限齊如是即如世間應壽百年北州應壽千歲等七住世長短如是謂延促者八受如是苦樂言時菩薩於初夜得此初明等者婆沙一百三意說初中後夜起三明者為欲次第降伏魔怨此謂菩薩坐樹下已誓取菩提魔王驚懼速出自宮謂菩薩曰可起此座今濁惡時不應證覺且應現受轉輪王位菩薩告曰汝今所言如誘童令我起此定無是處魔言汝若不用我語令汝見怖菩薩告曰汝由一設無遮大會感此天身我設大會其數難知況餘功德由觀宿因須起宿智魔知非歒各自還宮為欲觀彼為何所作復起天眼此以二明降天魔也復思魔黨何緣起惡知由煩惱既猒煩惱遂盡諸漏此即降煩惱魔此亦降蘊死二魔除擁障者障明之擁即是所知障也小乘名為不染無知也除性障者性是染汙能障聖智即煩惱障也小乘名為染汙無知也崇釋亦言除此二障今詳除擁障者其義契理言除性障理即不然此明非是斷道攝故故但應依擁障之中以配無間解脫二道者好也下漏盡中可明性障次天眼文三如上者初牒前生後二舉境彰智三釋得所由即是廣上死者文言墮地獄等亦即是生故違理也即是廣上生者文言命終生天上故亦有死也漏盡中章云舉境以彰於中文四者第一緣四諦第二見諦故斷漏第三斷漏故得脫第四已解脫故四智究竟釋並如章尋之可見初一往緣諦等者今詳文意可以大乘義釋心緣漏盡智者顯緣四諦真如也如實諦如苦等者由知真故違四諦相也此並顯根本智也以得聖諦如實知之等者牒其由得前根本智更起後智如漏漏集等也此義必然此即根本後得緣諦不同也見諦故斷漏者謂能見知四諦之理非謂見道中見諦也此且順疏上釋如前彼作如是知牒前緣諦如是觀舉向斷漏者今詳文言彼作如是知者牒前根本後得二智也如是觀於欲漏意解脫等者於所斷漏以顯其智也三漏者俱舍第二十頌云欲煩惱并纏忿䨱嫉惱無慚無愧惽沈掉舉睡眠惡作名為十纏除癡名欲漏有漏上二界唯煩惱除癡同無記內門定地故合一無明諸有本故別為一漏長行釋云豈不上界亦有沈掉二種纏邪今於此中何故不說迦濕彌羅國毗婆沙師言彼界纏少不自在故又云何緣合說二界隨眠為一有漏同無記性上界惑唯是有覆無記性於內門轉緣內身起依定地生由三義同故合為一婆沙四十七一釋云流派義是漏義如泉出水乳房出乳如是有情從六處門諸漏流派顛倒放逸等廣如彼釋大乘三漏義復有異恐煩不敘文言已解脫得解脫智生者如次顯彼無為有為二解脫也依涅槃說永斷三世生因緣故等者涅槃三十七云永斷三世生因緣故是故自說我生已盡亦斷三界五陰身故是故唱言我生已盡所脩梵行已畢竟故唱言梵行已立又捨學道亦名已立如本所求今日已得是故唱言所作已辦脩道得果亦名已辦獲得盡智無生智故唱言我已盡諸有結以是義故名阿羅漢已上謹寫經文章中生盡配見苦智梵行已立配證滅智所作已辦配脩道智不受後有配斷集智又云但應言道獲得盡智等者此意難言集因盡義名為盡智苦果喪義名無生智此准大乘釋理應唯說因己之義何用後說苦果喪義故即答云謂舉果盡以顯因亡此並應理崇師妄引婆沙一百二以破此義者將小僻宗破大義甚承正理也不能繁敘餘二文可知者上來四文總當第二舉境以彰而今文中得之時節即當第三此上三文復是第二舉境彰智自下第三何以故下釋得所由今疏即指得時已下為餘二也為對見聞故有斯別者俱舍寶疏初授記法師云自古經律論師皆言見聞異者謂隨機感或見曰多或見曰少理不應爾初生出家成道法輪理應同見何得有異彼即廣引經論會釋文言繁雜不能具敘略述彼意者一者以涅槃日及推成道明知即是建寅為正二月八日成道為定二者以成道日順推法輪明知定是八月八日方轉法輪且反推者依釋律論即此疏中所引薩婆多論是也此法此意惡人識之故改名為釋律論也及婆沙論並言八月八日轉法輪依婆沙論法輪之前先逕四月調五人根又依智度論梵王請前有五十七日相乘通計合成六月八月八日轉法輪前既有六月明知二月八日成道為定也故彼廣引薩婆多論第二卷說以八月八日弗星現時轉法輪又引婆沙一百八十二云於迦栗底迦月白半八日時憍陳那㝡初見法此上即顯法輪日也又引長含第四卷云八日如來生八日佛出家八日成菩提八日取滅度二月如來生二月佛出家二月成菩提八月取滅度又引釋律論第二卷文同長阿含此即二月八日成道文也今詳二文並八月八日涅槃此文與法師為妨下當辨又引灌佛經云十方諸佛皆用四月八日夜半時生四月八日夜半出家四月八日夜半成道四月八日夜半涅槃此中四月八月涅槃復與法師為妨亦如下辨法師即問答云問諸文成道八日皆同何故約月或云二月或云四月答婆羅門國以建子為正此先時建寅為正存梵本者而言四月依此方者即云二月故知二月八日成道也法輪前有六月者如下順推中廣釋二者以成道日順推法輪日者引三教文相乘計之一者准四分律解脫樂時逕六七日二者准法華經思惟法時逕三七日三者准婆沙論調五人根逕於四月相乘積數總有六月至法輪日也謂四分律佛成道已逕六七日受解脫樂廣如文辨此即解脫樂時也自此已後律文復言我今已獲此法甚深難解脫難知永寂休息等此是思惟深法之時不言日數准法華經於三七日中思惟如事是我所得智慧微妙最第一眾生諸根鈍著樂癡所盲如斯之等類云何而可度此即思惟法時三七日也此上含成九七日智度論同下當會也依婆沙論一百八十二云佛以三十四心得菩提已遍觀誰應初聞我法便知阿藍迦藍及頭藍子先應聞法然已命終廣如彼說次文復云除彼二人誰應聞法尋即知五人應先聞法便往教化廣如彼說經於四月此即調五人根逕四月也令彼五人善根熟已於迦栗底迦月白半八日時憍陳那最初見法又釋律論過安居已至八月八日得入見諦爾時始名轉於法輪此即顯八月八日轉法輪問何故智度論第八云佛得道後五十七日寂不說法自言我法甚深難解乃至不如嘿然入涅槃樂時諸菩薩釋梵天王諸天敬請佛嘿然受法師釋云准前四分七日中前出定日即後入定日除重六日并思惟法復三七日合計即是五十七日至梵王請時也又廣會文云四分六七日者解脫樂時也法華三七日者思惟法時也出曜經莊嚴論七七日五分律八七日通解脫樂及思惟時也智度論五十七日梵王請前也婆沙論四月調根時也有經半年者以六月故實無此經十二由延經一年者以經夏故律文受歲經謂夏為歲故也今詳此雖廣設劬勞而有大妨且如婆沙四月調根者彼論文云如是教化逕於三月有說四月既云三月或四月明知即是見聞有異何因乃隱三月之文獨乃用四彼又無文云正不正何理定知四月是實一不可也又婆沙論迦栗底迦白半八日云轉法輪者且如西方黑前白後即從此方八月半後至九月半名迦栗底迦月故淨三藏寄歸傳云月八半後名哥栗底迦月遍問梵僧皆問此說既言白半八日即是九月八日也從二月八至九月八計逕七月日數方足但有明知不足釋論云八月八日者此是西方八月白半以黑為初如向已說以此理推六月不足二不可也又云西國建子為正竊未曾聞何因謬說以其西國正月半後名為制怛羅月即為年初正當此方建寅為正正月半後何處得有建子為正三不可也又前所引薩婆多論長阿含等八月八日云般涅槃灌佛經中四月八日夜半涅槃此等語文說涅槃日與成道日及法輪日隣次而說成道法輪既會諸教涅槃月日復如何會如涅槃經二月十五日臨涅槃時理不可言譯經者錯以其彼經第三十卷師子吼問何故世尊二月涅槃佛即答言二月名春春陽之月百草滋茂一切眾生皆生常相為破眾生如是常心又問何故十五日夜入般涅槃佛復答云十五日夜行人見道等有十一種事如彼廣說婆沙百九十一云佛於迦栗底迦月白半八日中夜涅槃爾時月輪沒於山頂佛遍知月亦隱靜慮大涅槃山則時二種黑闇俱起謂色性闇及無明闇時諸大眾覩斯事已便於生死起大猒怖故於中夜而般涅槃上來二文月日各別解釋所由復亦不同如何可會亦有救云二月告滅八月涅槃此違聖文以扶曲見涅槃經首云娑羅雙樹間與大比丘八十億百千人俱前後圍遶二月十五日臨涅槃時豈容告滅而在雙林億百千眾皆來設供又若二月云是告滅灌佛經四月八日夜半涅槃復是何日涅槃月日若不可會何用獨會成道法輪四不可也故還依舊見聞有異以為正義耳多論云第一七日入喜法門等者多論第二卷也喜法門者四無量中喜無量也此亦即顯依初二禪也樂法門者第三禪也或可樂者與樂意樂即慈無量通依四禪也解脫者八解脫也大捨者即捨無量在佛身中故名為大或可捨者謂三念住謂諸弟子一向敬順如來不歡安住大捨一向不敬如來不憂安住大捨一類恭敬一類一敬如來緣之不欣不慼安住大捨此三念住念慧為體如俱舍二十七釋之次二七日離波多樹下者誤也文中是離波那也事三還三者事三謂是樹離波那樹文鱗龍也還三者處有三也初會人天者價人及四天獻鉢也第二非人者樹神是鬼道攝也第三四五並婆羅門也第六龍是畜也鉢置水中者見論十六問曰先受乳糜鉢今何所在今復受四天王獻鉢答曰如來前受乳糜鉢度尼連禪河于時沒在水中海龍王將供養是故更受因果經云佛自思念我今若受一王鉢者餘王必當生於恨心即便普受四王之鉢累置掌上案合成一使四際現因果經呪願云今所布施欲令食者得充氣力當令施者得色得力得瞻得喜安快無病終保年壽諸善鬼神恒隨守護飯食布施斷三毒根將來當獲三堅法報身命財為三堅聰明智慧尊信佛法在在所生正見不昧現在之中父母妻子親戚眷屬皆悉熾盛無諸灾恠不吉祥事門族之中若有命過墮惡道者當令以所施之福還生人天不起邪見增進功德常得奉諸佛如來得聞妙說見諦得證所願具足爾時世尊呪願已即便受食辨意長者子經一卷成辨意長者子白佛言唯願世尊及諸眾會明日受食世尊嘿許明日俱往就座儼然不食未訖有一乞兒前歷坐乞佛未呪願無敢與者遍無所得便生惡念長者迷惑用為飯此無慈愍者吾為王者以鐵輞車轢斷其頭言已便去佛達嚫訖梵云達嚫拏或云䭾器尼以用右手受他所施為其生福因之為名有一乞兒來入乞匃會坐眾人各各與之大得飯食即生善念善哉長者乃能供事此等大士其福無量吾為王者當供養佛及弟子乃至七日言已便去以食已訖還精舍中佛告阿難從今已後嚫訖下食以此為常尊者每言准此經文先呪願訖方下佛僧二監時二乞食人展轉他國臥遊道邊深草之中彼國王崩無有繼後相師讖記當有賤人應為王者諸臣百官案行國界顧見草中上有雲蓋諸臣拜謁各各稱臣沐浴香湯著王之服光相儼然導從前後迴車入國時惡念者在深草中臥寐不覺車轢斷頭王到國中人民安樂即遣使者往請世尊飯食已訖佛告王曰乃至時善念者今王是也時惡念者王受正位迴車入國轢斷其頭死入地獄為火車所轢億劫乃出第五賈人白佛已下信心未決請乞證驗者於中大文分二初至我自欲供養定光如來至真等正覺故顯定光佛本異兩國化人受供第二爾時彼國有一大臣婆羅門名曰禮施已下顯釋迦佛過去曾作彌劫摩納布髮供養定光如來緣起之事前文分二初明定光出家成道第二價人當知定光如來已下外化受供第二大段文分為五初明婆羅門作祠祀時彌劫摩納移十二醜自生勝處獲供而去十二醜者一傴屢二凸瘠三癭四黃色五黃頭六眼青七鋸齒八齒黑第九第十手脚曲戾十一身不與人等十二凸臗也當移坐時地六種動者依十地論第十二云一動搖動也二踊東踊西沒等三覺謂上昇去也四起凸起也五震謂下去也六吼聲吼也第二彌劫摩納還入鉢摩大國已下因人供佛廣明摩納布髮供養得佛記別第三時數千臣億萬人已下供養其髮四價人當知已下十二醜結怨因緣五結會古今證成髮爪能生福利摩納者梵云摩納縛迦此云年少淨行也章云第五文可知者爾時價人兄弟二人已下如前疏中科釋云第五爾時賈人已下禮獻事畢敬而請退是也第六龍王會中佛從三昧起已龍王以偈讚佛其偈與上輙教戒中般陀偈同也攝利度人者攝受利益也一乘之理體唯自古者此義欲依涅槃二十七云畢竟有二種一者莊嚴畢竟謂六波羅蜜二者究竟畢竟謂一切眾生所得一乘意顯真如是迷悟依真如之性自古不易故唯識第十云迷悟依謂真如由此能作迷悟根本諸染淨法依之得生聖道轉令捨染得淨述曰真如之體雖非染淨而與染淨為其實性故依真如染淨得生也寄相而論者即寄染淨相論也非尋數量等者凡立道理總有三量一比量二現量三教量今此真如言教不及故云非尋教量等也體證圓覺至果無為者謂能證菩提圓覺覺至果中無為理也闇或羈纏者顯無明也取相明白者由無明故起惡見也邪命自資故曰異命者今詳存養惡見為異命法性真旨起染淨之本故曰緣起法者亦依涅槃云十二因緣名為佛性佛性者名第一義空此亦顯迷悟依也由依真性起無明等十二緣起此緣起性不離真如然諸愚夫不能了達故流轉也迷一乘因等者不達緣起之性名為迷因不達涅槃名為迷果謂不能成淨分勳習者數緣具理是故能令賴耶識中染種漸減淨種漸增最後能起無分別智親證真理斷惑成聖今由迷真故不能成淨分勳習也四住煩惱者如上已辨五住地義除無明住即是四住也無明永喪故名愛盡者即顯無明住地也因乘者佛性也果乘者法身也此依涅槃經宗也愚闇身所愛者無明在身覆於正見也入世俗心者婆沙九十九云如來無漏心心所法乃未曾得有漏心心所法俱非他心智現所取境曾得有漏心心所法佛欲令他知者即知謂佛若欲令鈍根者知我心非利根者則虵奴等亦知佛心舍利子等皆不能知若欲令傍生趣等知我心非人天趣則傍生等亦知佛心人天不知若准大乘佛無有漏心心所法然能化現似有漏法故唯識第十云無上覺者神力難思故能化現無形質法若不爾者云何聲聞及傍生等如來心如來實心等覺菩薩尚不知故斷功德者無為名斷斷惑顯故起得在身故云成就也智具足有即能證智謂是智德也曾得一乘想解者謂曾過去假想真理種大乘因也變成小感者如本業瓔珞經等舍利弗因於過去施眼緣故退菩提心是其事也隨願在此者謂佛立誓我要不起此金剛座而成正覺此座正在摩竭國中也隨念功德者六隨念中佛是一數也謂緣佛寶隨順生念增長功德故也多論第二云譬如大龍乃至然後說法也各有上中下故合為九者世間生下生鈍根中也畏罪上少上也多中也難度下也長下也利根中也易度上也如似世間有目男子觀池華三別者地水華三也崇云然此為顯所化有情生長不同品類差別不是為明三乘九性若約三乘分為九者不知依何理教作此判文若無理教可憑定是傳者𮌎臆又佛總觀所化不簡乘與非乘如何配文乃約乘說故知舊釋不合旨歸冀諸智人思文取悟今詳法華經云尋念過去佛所行方便力我今所得道亦應說三乘乃至思惟是事已即趣波羅捺即是明教也諸佛出世必為化生令免生死具悲智故即是理也五比丘事亦復可知者恐人疑佛五比丘邊學得此法故今先度釋外疑情尊者云佛先藍邊習非想等可須釋疑五人先來學佛自餓佛本不從五人學法何用釋疑故不然也若釋須就因果勸意可知者彼昔妄執不用處等以為涅槃執自餓等為涅槃因今舉四智究竟破彼執果也舉修八正破彼執因也欲之波羅者之適也適往也佛說偈答者五分第十五偈云一切智為最無累無所縛我行不由師自然通聖道唯一無有等能令世安樂當於波羅奈擊甘露法皷依阿含以為四問者有人云此中有八問口說有五意中有三也言口五者謂二難三問也三問如疏已辨言二難一諸根寂靜難佛無智德似愚駭人二顏色怡悅難佛無斷德似有貪人意中三者一問何處去二作何事三為欲自利為欲利他答中具八一切智為上答初難也一切欲愛解答第二難也自然二句答學何法也我亦一偈答師誰也我是一偈答從誰學也欲於一偈答意中三也泠而常安隱者泠字歷經久泠然清涼皃也冷然亦解悟之意也勝者止也顯佛智德有遮止之功非是訓字也文中我脫一切結非是勝字也頌云言外者謂梵志嘿然領意也不同五分憂陀不受也是中道因體者謂八正道名為因體以能趣向涅槃果故涅槃等寂行者等取沙門行也八正道者上偈序中雖已略釋今應廣辨正語業命疏云如智論云以無漏慧所起身業是正業等者此意為顯語業命三是道俱戒未必即是正釋正業等義
