body:
  text: 別轉文四者因此略辨四諦義章五門分別第一建立次第第二釋名辨體第三辨述諦惑第四斷之方法第五緣諦行相言建立次第者疏中別轉文分為四此門即約初文釋之問依何義立苦等四諦復由何義先苦次集乃至廣說答如疏云論諦雖四乃至命物生所故所以爾者此中意說世與出世各有因果故開成四婆沙七十七難云若依因果而建立者諦應有五謂有漏法因果別故既立為二諸無漏道亦有因果應分為二滅為第五故有五諦謂道諦中具有同類相應俱有能作四因復有等流士用增上三果也滅諦之中唯離繫果故成五諦論意釋云無漏道中因性果性皆是能趣苦滅行合立為一若爾有漏法中因性及果皆趣流轉亦應合一答行相開合故唯四諦謂有漏果具有苦等四種行相有漏因性復具集等四種行相無漏因果合成四行由斯開合故但四諦今詳彼宗甚誤劬勞良由苦集體是一物約因果別開為兩諦故例道諦亦應因果開為兩諦今據大乘雖異熟果是真苦諦業與煩惱是真集諦二體既別故不得例一體之道令其道諦開為兩諦故世間中唯約異熟因果之性立為苦集出世之中約能通達及所達理因果之性立為滅道二門因果名雖相似兩義懸殊何成相例數有法師引婆沙論釋大乘義甚失意也今此疏中依成實宗同大乘判次辦次第者婆沙七十八云問何故世尊先說苦諦乃至㝡後說道諦耶答隨順文詞故作是說次第有三一生起次第二易說次第三現觀次第今於此中依易說次第復次依現觀時作如是說謂現觀位先現觀苦乃至㝡後現觀道諦故作是說以四諦中苦諦㝡麤故先現觀漸次乃至道諦㝡細脇尊者云脩觀行者知五取蘊如病如㿈如箭等已次求其因知是集諦次求無處知是滅諦後求對治知是道諦俱舍二十二亦云隨現觀位先後而說疏意同俱舍第二釋名辨體者先釋名後辨體疏中雜乱今別簡之且釋名者自有三重一釋苦等四種別名二釋諦名三釋聖諦且釋苦等四別名者如疏云苦以逼迫為義集謂聚積滅謂寂泊通物為道婆沙七十七脇尊者曰逼迫是苦相生長是集相寂靜是滅相出離是道相依此四相即立四名問緣四聖諦各四行相且如苦諦一苦二無常三空四非我乃至道諦各具四行由此亦應名無常諦或空等諦及因等諦靜等諦如等諦何故但名苦集滅道婆沙七十九答已亦應說為無常等諦而不說者是有餘說復次既說為苦當知已說為無常空非我諦乃至道諦准應知乃至復次此苦諦名舊所傳說是舊文句過去諸佛過殑伽沙皆以苦名表示苦諦今佛亦爾乃至道諦准此應知若准華嚴第五四諦品中一一諦各列四十名列已復云如是四諦有四十億百千那由他名隨諸眾生所應調伏作如是說如是十方百千億不可量不可數世界諸佛說名各有爾許經論既然令且就顯但釋苦集滅道四諦第二釋諦名者如疏云此之四種並實爾不謬乃至更無餘道婆沙七十七云實義真義如是不顛倒義無虗誑義是諦義問若言實義乃至無誑義名為諦者如四顛倒及誑語應非諦攝婆沙意釋云以別義故名顛倒等復由別義是諦所攝謂由無常妄計為常乃至無我妄計為我以倒解故名為顛倒復由此中有因性故有果性故是諦所攝誑語語准知疏中復簡非諦之義謂不同凡夫苦妄計樂者迷苦諦故也微塵世性自在天等以之為因者迷集諦故也二空為滅者謂阿藍迦等執不用處及非想處二空為涅槃即迷滅諦故也理實外道妄計涅槃相眾多且約妄計二空為滅也烏鷄等戒計之為道者迷道諦故也由此迷故此即非諦也微塵者如順世外道梵云路伽耶陁或云路伽耶提此云順世也彼計一切色心等法皆用四大極微為因亦四大中㝡精靈者能有緣慮即為心法猶如諸色雖皆是大而燈發光餘則不爾故四大中有能緣慮其義無失若論色法四大為體其義極成又如勝論執有常散極微為因成器世間此外道出在成劫之始人壽無量歲動人心故於夜分人間乞食時人因此號為鵂鶹又名羯拏此云食米齊也此人形貌醜陋頭髮蓬乱人見怖之後遂不乞但於外分舂簸之處糠𥢶之中渄取米齊食而存命因此號為食米齊仙人也又名勝論梵云吠世色迦奢薩怛羅此云勝論舊名衛世師是也造六句義論其論勝異故從所造之論名勝論也六句義者一實句義謂地水火風空時方意我九法為體二德句義謂色聲香味觸數量一異合離好醜苦樂憎愛愚智懃墮二十一法為體三業句義取捨屈申行五法為體四大有句義謂實德業體不無者由此大有有之故也離實等外有別實體十法為體五同異句義如地堅地有其同義堅於水等即有異義地之同異是地非水水等各然然離實等有別實體此即隨於所同異法有眾多體六和合句義謂法和聚由和合句如鳥飛空忽至樹枝住而不去由和合句故令其住也此亦多體然實句中地水火風四大極微有常無常其常住者初壞之時各各散住劫欲成時兩兩和合生一子微然其子塵量等父母二二子微復生孫乃至展轉生麤色相成大地等子微已去即是無常也次辨世性諸經論中或說勝性或名㝡勝或名諦或名自性其是一也此謂數論外道計也梵云僧佉奢薩怛羅此云數論謂所造論從慧數生亦生慧數故名數論亦名劫比羅舊名迦毗羅此翻黃赤此人頭面俱黃赤故因以為名也依涅槃經第三十九名闍提首那彼造三彌叉論此云觀察廣辨二十五諦然彼仙人恐身滅後其法滅沒遂往大自在天所請延壽法自在天言頻陁山下有餘甘子若未熟時其色即青至於熟時其色黃白初噉之時其味酸苦食已飲水甘味如蜜故名餘甘子汝食此𭛙可得長壽時彼仙人即取食之心猶不決更請要術自在天云變為一石可得久住遂即變之其石可如一床許大在頻陀山下餘甘子林中後至千年之餘有陳那菩薩出現於世廣造諸論破斥彼宗彼宗門人既不能救共往石所以所造論書其石上創書之時有經一宿而釋通者頻頻更難有經七日方始解者㝡後更書不復能解其石流汗發聲雷吼自然而碎彼宗所立二十五諦雖諸論中小小差別且依金七十論有一頌云自性次第生大我慢十六十六內有五從此生五大述曰第一自性諦即世性是也此以薩埵剌闍者亦有三答摩三德為性謂薩埵者自有三義一黃二貪三樂次剌闍者亦有三義一赤二嗔三苦次答摩者亦有三義一黑二癡三捨若總辨者黃赤黑即是色德貪嗔癡即是心德樂苦捨是受用德其位有兩一者在性位眠伏不起二者在大等二十三諦位中便有覺悟第二大諦此從性轉變生也猶如種子欲生芽時漸脹大也第三我慢諦謂恃我而起慢即此為體此即從前大生也第四十六諦從前我慢生也十六者一五唯一聲二觸三色四味五香此五各唯有體有能故名之也二五知根一耳二皮三眼四舌五鼻此五能知境界名五知根三五作根一舌二手三足四男女根五大遺大遺者遺棄大便也此五名為五種作業根也四者心根加前合為十六也又加自性大我慢合十九諦也第五五大諦從前十六之中五唯生也謂聲唯生空大觸唯生風大色唯生火大味生水大香唯生地大此五加前十九合二十四諦也此二十四並是我所并神我諦合二十五也謂神我諦欲受用境遂與性共相和合由此性轉變生餘二十三諦與我受用和男女合生子息等我是受者而非作者餘二十四唯是作者而非受者具如金七十論釋之昔於此外道部中有一眾首至金地園中頭戴火盆䥫鍱纏腹聲王輪鼓命僧論義東天竺有僧與此外道論義彼立世界是常此僧難云今必有滅以劫壞時世界滅故證知今滅彼反難云後必不滅如今山等彼王于時此外道遂令此僧乘驢受辱王重外道以七十斤真金遺之因金七十論有七十行頌廣敘彼宗以金標之兼揚其德後有世親菩薩出世之時造勝義七十論廣破彼宗救前僧義爾時國王重世親論復命國人廣行其論於是世親發數論屍及證義者以鞭其骨故有法師云世親習舊五支鞭骨彰德陳那創勒三分吼石表能是其事也次辨自在天以為因者西方有倮形外道亦名塗灰外道并諸婆羅門黃為此計也彼宗計大自在天有二住處一在雪山北二在南海末剌耶山昔摩羅陀國有兄弟二人事自在天同往雪山求見彼天至山忽見一婆羅門云大自在天事汝國釋迦牟尼佛何不禮事兄弟報云我先承習但事天神恃婆羅門變為天形面上三目復現四臂或現八臂告兄弟曰汝可還國菩提樹東造釋迦降魔之像菩提樹南復穿一池濟渴乏者彼宗因此計二住處以為不謬也復有三身一者法身體常周遍量同虛空能生萬物二受用身在色天之上三變化身隨形六道教化眾生又計梵王能生萬物如提婆菩薩造破外道小乘涅槃論云從那羅延天臍中生大蓮華蓮華之上生梵天祖公梵天即是萬物祖公也彼梵天作一切命無命物謂造作一切情非情物也從梵天口生婆羅門兩臂中生剎利兩髀中生毗舍兩脚跟生首陁此等妄計其類繁多不能具敘此並不了集因故作此計也烏鷄等或以之為道者等取牛狗等戒也此由二因生此妄計一由天眼見有眾生從烏鷄中即生天上二由非理尋思妄生此計婆沙百一十四有二外道一名布剌拏憍雉迦受持牛戒二名頞制羅拪儞迦受持狗戒二人異時俱往佛所種種愛語相慰問已時布剌拏先為他問此拪儞迦受持狗戒脩學已滿當生何處世尊告曰汝止莫問復再三請佛以慈心告言諦聽受持狗戒若無缺犯當生狗中若有缺犯當墮地獄聞佛語已悲泣哽咽不能自勝世尊告曰吾言止不須問今果懷恨時布剌拏白言不以彼人當生狗趣故我悲泣然我長夜受持牛戒恐亦當爾唯願大慈為我宣說世尊告曰准前應知此等皆由不了真道婆沙又云問云何受持牛戒狗戒名無缺犯答一如牛法一如狗法名無缺犯此等妄計並非諦也第三釋聖諦者疏中雖約第二假徵列名文中辨之今且懸敘如疏之會聖生解名聖除集生解會滅生解等今依婆沙略敘三釋一云聖者成就故名聖諦成就即是得之異名若爾異生亦成苦集何不名為異生諦也答聖具成四獨名聖諦問亦有聖者不具成四如苦忍時爾時但得一剎那道爾時都未證得擇滅故知未具四也答此後必具成就四諦異生恒時不具成四是故但應名為聖諦二云尊者僧伽筏蘇說曰佛在世時異生聖者共興諍論諸異生說諸行是常樂淨我諸聖者說諸行是無常苦空非我各自說言我語諦實佛為决云聖言是諦由諸聖者於苦等諦現知見覺所言是諦此即聖者依諸證宣說故名聖諦三云聖者世友謂曰唯諸聖者聖慧通達故名聖諦疏中即當此後釋也若准大乘佛身一向准是無漏道諦所攝然變化身相似苦集實非苦集由此約餘二乘聖者可言成四若約佛身唯成後二餘之兩釋不違大乘次辨體者略敘三宗一依薩婆多二依經部三依大乘且依薩婆多者自有三義一依實理二依勝說三依別門且實理者如婆沙七十七云如是說者若隨自相續五蘊若墮他相續五蘊若有情數及無情數諸縕如是一切皆是苦是苦諦問墮他相續及無情數於自相續既非逼切何故行者亦觀為苦答無始來於一切苦皆起無智為對治彼皆應起智故應遍觀况彼於自亦能逼切謂若為他所打觸者亦生大苦空中木石墮自身上亦生大苦既有逼切故觀為苦已上苦諦若墮自相續他相續有情無情諸蘊之因一切皆是苦是苦諦此辨集諦若墮自相續他相續有情無情諸蘊盡一切皆是滅是滅諦此辨滅諦若墮自相續乃至無情諸蘊治一切皆是道是道諦述曰一切有漏善等三性為果分邊為苦諦體通於異熟等流士用增上四果也為因分邊為集諦體通於六因故俱舍二十二云此中果性取蘊名為苦諦因性取蘊名為集諦是能集故由此苦集因果性分名雖有殊非物有異其文易了一切有漏隨墮三世數量無邊得解脫時如彼數量各證離繫離繫即是無為異名其無為數如彼數量並滅諦體三乘聖者身中所有學無學無漏聖道及彼相應隨轉法等並是道諦脩觀行時皆觀為境境雖如是於自身中所起聖道必不頓起乘差別故根差別故三世之中其量多故此滅道體條然各別故俱舍云滅道二諦物亦有殊第二依勝說者婆沙七十八云苦諦云何如契經說生苦老苦病苦死苦非愛會苦愛別離苦求不得苦略說一切五取蘊苦述曰五取蘊苦雖則與前寬狹無異然前七苦墮觀一境亦是苦諦其相則狹但由相顯故偏說之令生猒背或可取蘊亦狹前門前通非情此唯有情故也五取蘊者俱舍第一釋云煩惱名取從取生故名為取蘊蘊屬取故亦名取蘊或蘊生取亦名取蘊若准大乘雜集第一取謂欲貪欲謂希求去來自體引取當蘊令起現前貪謂染着現在自體執取現蘊令不捨離故名取蘊今敘小宗且依前說次辨集諦者即婆沙云如契經說諸所有愛及後有愛喜俱行愛彼彼喜愛名苦集聖諦述曰一切有漏皆是集諦今說四愛就增強說此四愛者緣現緣自身生愛立初二愛緣現緣後資具生愛立後二愛次辨滅諦者婆沙云如契經說即諸所有愛及後有愛喜俱行愛彼彼喜愛無餘斷弃名苦滅聖諦述曰理實一切有漏法滅名為滅諦今就勝說俱滅四愛次辨道諦者婆沙云如契經說八支聖道名趣苦滅道聖諦述曰道諦理實通於相應及隨轉法今且就勝唯說八支如八支不說心王受想思等故非盡理第三依別門者大小乘宗皆說逆觀十一有支起四諦智如是總成四十四智且如老死起四智者婆沙百一十云知老死智苦諦智也知老死集智集諦智也知趣老死滅智滅諦智也知趣老死滅行智道諦智也生有取愛受觸六處名色識行各趣四智廣說應知彼論釋云四十四智皆通有漏無漏然不斷惑唯此四諦有十一重且說老死為苦諦體即以生支為集諦體以與老死為集因故彼滅彼道是餘二諦為第一重復以生支為苦諦體即以有支為集諦體以與生支為集因故餘二可知乃至行支立為苦諦以無明支立為集諦餘二准知無明更無緣起支攝法為因故故無四智更欲搜括別門之義其類繁多故且略顯方隅而已第二依經部者先隨諸師將成實論以為經部後當別敘譬喻師義且依成實者如疏云苦諦體者五受陰等者此意為顯熟果以為果法以為苦諦故成實第二云以此五事起受身因緣名五受陰述曰謂求五陰事故起異熟因因名能受從因立名名五受陰次辨集諦者如疏云其集諦體者謂業煩惱等如疏應知次辨滅諦體者如疏云滅無異狀等者謂所顯滅體非一異約能顯事自有三別故成實論第十五假名品云滅三種心名為滅諦謂假名心謂五陰中所執眾生有名無體種為假名緣此假名起妄執心滅此執心即生空也法心即五陰體名之為法前達生空獨執此法今復滅此執法之心即名法空空心前達法空復執空相今復滅此執空相心故名空心也此上三空總名滅諦問云何滅此三心問於何位作何方法而滅三心答曰假名心或以多聞因緣智滅聞慧或以思惟因緣智滅思慧也始從五停至念處位也法心在𤏙法中以空智滅修慧也始從𤏙乃至最後金剛心位也空心入滅盡定滅即盡智起證滅盡定立為有餘涅槃是此宗意若入無餘泥洹斷相續時滅此上總顯二涅槃位滅空心也上來即顯始從𤏙位乃至有學金剛心位有空相心若爾四善根位與入見道有何差別答善根位中相心間雜入見道已相心不陵故有別也問若有餘涅槃是滅盡定與不還果諦滅盡定有何差別答不還所得但滅心法羅漢所得永滅煩惱故成論第十八卷八解脫品云問汝言滅盡定是阿羅漢名漏盡者學人應得漏盡謂不還果亦得滅定應即漏盡答有二種滅一滅二次第滅第十九卷滅定品云滅定二種一煩惱盡即前二種滅中初滅是也二煩惱未盡即前二種中後滅是也煩惱盡者在解脫中是第八解脫亦名阿羅漢煩惱未盡者在次第定中謂九次第定中也上來三空即是三種執心無處名為滅諦如燈滅已無別滅體不同薩婆多無為數量如有漏數亦異大乘生法二空所顯真理體性非無次辨道諦者如疏云言道諦者謂戒定慧等問成論十七定因品云道諦者謂八直聖道今何故云戒定慧也答正語業命即是戒學正念正定即是定學正見正思即是慧學釋進即是三學並攝故不違也然觀滅諦既通聞思故知聞思亦道諦攝即是不同薩婆多宗唯無漏通為道諦體次辨經部祖師譬喻論師如婆沙七十七云譬喻者說名色是苦諦名是四蘊色是色蘊意因成實業煩惱是集諦業煩惱盡是滅諦此滅但是滅無之處未必即同成實三空奢摩他毗鉢舍那是道諦彼宗止觀葢亦通於聞等三慧次辨大乘出體者略分四別一者菩薩諦境二者聲聞諦境三者依別門義四者略釋通別且菩薩者為修道智應曉二門一者諦體邊際二者約門建立且辨邊際如雜集論從第六卷至第十卷廣辨四諦且苦諦者總攝勿過有情世間及器世間以之為體有情世間自有八苦三苦等相眾多義門器世間者十方世界三千大千等差別之相此等總是苦諦體性此中雖通情非情數然唯意顯異熟果法及以外器增上果法體唯無記不同薩婆多通於三體有漏法也言集諦者煩惱與業煩惱之中所有結縛隨眠隨煩惱纏等無量異門業中復有律儀所攝非律儀非不律儀所攝等無量異門此等並是集諦體性若准婆多業煩惱中等流果等猶是苦諦同類因等猶是集諦言滅真如境上有漏法滅若世間道次所得滅若出世道斷所得滅若有學若無學若佛菩薩所得滅一切皆是滅諦體性大宗無為體非一異然隨相說故有差別言道諦者資粮加行見修無學道一切皆是道諦體性此通有漏無漏道也如彼廣說不可具敘第二初門建立者如顯揚論辨六諦謂即世俗及勝義諦并苦等四合為六也故彼論第二卷云諸諦有六一世俗諦謂名句文身及依彼義名等為能詮妙義為所詮一切言說及依言說解了義言聲為能詮義為所詮也此之兩重約教安立名俗諦也又曾得世間心及心法及彼所行境義此顯有漏聞思修慧及所了義也問𤏙等善根是曾得不答若望無始未曾起邊名未曾得然是有漏亦名曾得此約有漏智境名俗諦也二勝義諦謂聖智及彼所行境界彼相應心法等此即無漏慧及所行義也前非究竟故名世俗此約究竟名為勝義第三苦諦此下四諦即是前說二諦辨之中各開為四此有二種一世俗諦所攝如經中說生等七苦二勝義諦所攝謂經中略攝一切五取蘊苦此約一相不盡理說故名世俗若盡理說名為勝義四十中世勝各通前門世勝二義由各有教有漏智境及無漏智境故也第四集諦此有四種一者全攝謂一切三界煩惱及業謂攝一切集諦義盡也二者勝攝謂緣已得未得自體及境界所起愛及後有愛喜貪俱行愛彼彼喜樂愛四愛如上薩婆多義同也愛於集諦最勝也故三者世俗諦攝謂因能感世俗諦所攝苦諦於前全攝業與煩惱之中自有一分感是圓滿因感生等七苦也如離間語一分感愛別離苦等也四者勝義諦攝謂因能感勝義諦所攝苦諦即於業煩中一分是牽引因感異熟五取蘊苦也第五滅諦此亦四種一者全攝謂全攝集諦無餘斷棄吐盡此約見道之中斷四諦惑離欲滅沒此約修道中斷三界修惑也此上即顯有餘涅槃寂靜此顯無餘涅槃二者勝攝謂勝攝集諦無餘斷如前廣說謂四愛斷等三者世俗諦攝謂世俗諦所攝集諦斷棄等如前廣說感五取蘊四者勝義諦攝謂即勝義諦攝集諦無餘斷等如前廣說感取蘊曰斷等自斷等也第六道諦亦有四種一者全攝謂一切覺分即三十七覺分通世出世道也而以理推外道世道非趣菩推非道諦攝二者勝攝謂八聖道支唯無漏三者世俗諦攝謂於世俗諦所攝苦集滅如其次第為遍知故為永斷故為作證故所有一切聖道謂知七苦斷七苦因證七苦滅因滅也謂佛熟宜聞說七苦等得知斷證四者勝義諦謂於勝義諦攝苦集滅諦如其次第為遍知故為永斷故為作證故一切聖道准前釋問何以苦諦不明全攝及勝攝答若約剋性則五取蘊是全攝若約相從則有情世間及器世間合為合攝由義不定故不明之既不明亦不明勝理實勝攝唯異熟識是苦諦體以第八識是真異熟故次辨聲聞既不遍學但就宜聞或聞全攝而得解脫或聞勝攝而得解脫乃至廣說聲聞四諦如瑜伽三十四不能繁敘次依別門者亦有四十四智等如前無異次辨通別者若據通相亦同薩婆多苦集是一物且如四十四智中觀生支時為因義邊即是集諦為果義邊即是苦諦餘可准知五取蘊中若約尅性唯異熟蘊是苦諦體若論通相善染等法亦蘊所攝亦約因果以分集苦也若約別相剋性辨者唯異熟果是真諦唯業煩惱是真集諦彼滅彼道是餘二諦第三辨迷諦惑者一辨薩婆多二辨大乘且依薩婆多約十隨眠迷四諦異及三界別成八十八先辨欲界迷四諦異成三十二謂迷苦諦具十隨眠一有自見二邊執見三邪見四見取五戒禁取六疑七貪八嗔九慢十無明次辨迷集及迷滅諦各唯七種謂於十中除身邊見及除戒取次辨迷道唯除身邊具餘八種如是通計總三十二上二界中無可增境故迷四諦各除一嗔通計但有二十八惑色界既然無色亦爾如是總計成八十八於中若辨親疎迷諦十隨眠中二種一向親迷四諦一邪見二疑四種一向疎迷四諦一見取二貪三嗔四慢一通親疎迷於四諦謂是無明二種唯局親迷苦諦謂身邊見一通親迷苦道兩諦謂戒禁取於中且辨二親迷四者謂由邪見撥無四諦復由疑故疑於苦等為是苦等為非苦等次辨四種疎迷四者謂由見取執前邪見以為最勝復由貪嗔貪著自見增嫉他見復由慢故恃己惡見陵蔑於他次辨無明通親疎者不共無明親愚四諦不能了知也相應無明若與邪見疑相應者亦是親迷與貪嗔慢見取相應即是疎迷辨身邊唯親疎苦者婆沙五十二意云且有身見迷五取蘊苦果處故執我我所復起邊見執我斷常理無迷餘集等三諦而執我等故此二見唯親迷苦次辨戒取親迷苦道者即五十二意云執能得淨名為戒取然諸外道亦能知其惑業之集招於穢果故不於集執能得淨然此戒取總有二種一者非因計因二者非道計道且非因計因者由不了知苦果是苦執梵王等苦體為因能生有情故親迷苦非道計道者由諸外道亦能知滅是清淨處為求此淨發起種種無利苦行謂之為道此由親迷真實道故故親迷道非因計因不名迷集以識集故非道計道名為迷道不聞道故上來廣辨見所斷惑因此乘明脩所斷惑緣事而起欲界有四貪嗔慢無明上界除嗔三界總計合有十種故薩婆多見脩所斷總九十八次辨大乘十種隨眠通約三界見脩所斷自有二門一者總迷門通計三界見脩所斷合有一百二十八二者別迷門通計三界見脩所斷合有一百四且總迷者先辨欲界十種隨眠皆迷四諦唯諦第六釋云苦集是彼因依處故滅道是彼怖畏處故述曰唯識論主依集論第四作如是釋雜集第七釋集論云苦集二諦皆是十種煩惱因緣又為依處諸家章疏釋集論不堪記錄今且釋云苦是十惑因依處者第八藏識是真苦識中惑種是彼現惑之親因緣即此識體是彼種現之所依處集是十惑因依處者十惑種現是集諦體現行十惑薰生種子種子生種種生現行此等皆是十惑因緣即前前念現行十惑引後後念現行十惑名為依處謂若不迷苦集二諦十惑無由從苦集生是故十惑各迷苦集也滅道是彼怖畏處者雜集第七釋云由煩惱力樂著生死於涅槃界起懸崖想生大怖畏述曰由十隨眠在身中故怖於滅道迷於四諦既各具十故成四十上之二界各除四嗔如是通計三界合有百一十二其脩所斷多迷事起欲界有六謂身邊見雖迷苦理於中有二謂分別起見道中斷其俱生者修道方斷并貪嗔慢及以無明故總有六上界除嗔故各具五三界合計總有十六通前百一十二合成百二十八次別迷者前總迷門通迷一切自所起處乃非起處故四諦境各具十迷今別門唯辨十惑自所起處以為所迷其義則異故唯識論第六云二唯迷苦八通迷四述曰身邊二見唯於苦果不違是空及非我故執我我所及以斷常故唯迷苦餘之八惑四諦境中皆容得起故通迷四且如邪見撥無四諦疑及無明隨應准知見取貪等疎迷易曉而論戒取不同小宗親疎苦道謂此大宗亦是疎迷故通迷四且大宗中見戒二取若苦諦下即執身邊及以邪見以為最勝及能得淨餘三諦下唯執邪見以為最勝及能得淨問若爾二取有何差別答見取但執最勝得淨論其戒取不但執勝及能得淨并欲隨順此邪見等受持戒禁戒取既隨邪見等生故是疎迷四諦之境故通迷四十宗見取唯執最勝戒取唯執得淨由斯理趣苦下具十餘三各八欲界合計有三十四上界除嗔是故三界別迷諦境合九十四脩所斷十同薩婆多以身邊見決定不脩所斷中所緣事起故須除之也事理體同而由解異故也如是總計見脩所斷三界合成一百四惑此別迷門具如瑜伽第五十八西明法師唯識疏第六中不曉差別而令別迷亦有一百二十八者深為謬矣次辨迷諦親疎者有麤細門且麤門者戒取迴入疎迷之中嗔通親迷滅道二諦增此二故餘義並同薩婆多說細相門者貪嗔慢三通親迷四不能繁敘第四斷之方法者由轉法輪故斷煩惱轉法輪義復為四門一釋名二辨體第三辨轉法輪之相第四問答先釋名者婆沙百八十二雖有多義於理非要今且一相通大小乘宗釋其名者八聖道法以成輪性故名法輪如轉輪王所有輪寶降伏四洲所有怨敵如是行者以此法輪摧破一切見所斷惑故名法輪若望世尊自己心中見脩無學三道法輪具能摧破見脩所斷俱舍二十四云尊者妙音說曰八支聖道似世間輪謂語業命其相似轂正定似輞餘四如輻此意說言戒能內防定能外攝猶如轂輞餘四必依戒定而生其義似輻以此法成故名法輪次辨體者且薩婆多自有二門一者剋性如婆沙百八十二八支聖道是法輪體若兼眷屬即五蘊性俱舍頌云於中唯見道說名為法輪述曰故知唯局見道之中八支聖道為法輪體見道速疾疾似輪相故亦此唯據他身中說婆沙意同不能繁敘若據通相即佛身中三轉法輪所有聖道此通見修無學三道皆是法輪故順正理六十七云毗婆沙師本意總說一切聖道皆名法輪以說三輪三道攝故於他相續見道生時已至轉初故名已轉亦唯見道是法輪初故說法輪唯是見道謂佛身中三轉聖道通名法輪亦就勝說唯他身中見道說為法輪若大眾部一說部說出世部鷄胤部一切佛語皆是法轉故宗輪論敘此四部云諸如來語皆轉法輪若依經部法輪有二一者十二分教為法輪體故俱舍二十四敘經部云即此三轉十二行相所有法門名為法輪法門者即十二分教也二者聖道為法輪體即俱舍敘經部云或諸聖道皆是法輪於所化生身中轉故於他相續見道生時已至轉初故名已轉此義雖同正理所說然意有別謂正理意云法輪通相雖通佛身三轉聖道而論實理唯他身中見道名轉今經部意即佛身中亦是剋性法輪之體非謂通相也若依大乘者西明法師解深密疏第五卷中云同經部今更委說謂若剋性就勝說者即佛身中三無漏根所攝聖道并陳如等身中創生八支聖道等並是法輪體故瑜伽九十五云正見等法所成性故說名法輪維摩經云三轉法輪於大千其輪本來常清淨天人得道此為為證問准大乘宗八聖道支在修道位何名創生答修道中勝非謂見道而無八支二者若據通相說者即通見修無學三道及以聖道所緣之境并取言教總名法輪故解深密第二云以四諦相轉正法輪又云而於彼時所轉法輪是未了義此中諦相即所緣境又云所轉是未了義故知言教名未了義此未了教即是所轉法輪也三道名轉者即處處經皆言三轉法輪故也然三轉者疏中敘舊人釋名為示相轉勸脩轉引證轉義亦少失今尋經論初轉示見道相次轉示脩道相後轉示無學道相即是三轉皆示相也下當更辨第三辨轉法輪相者一者能轉唯由言教故婆沙百八十二云世尊若不以言教手為其轉者則彼聖道無因得生二者所轉即轉世尊自己身中三道法輪至陳如等身中創生即如前引順正理六十七云毗婆沙師本意總說一切聖道皆名法輪以說三轉三道攝故於他相續見道生時已至轉初故名已轉然唯見道是法轉初故說法輪唯是見道諸天神類即就最初言轉法輪不依二道謂不依修道及無學道名轉法輪也問既許三道皆是法輪即應佛在菩提樹下身中所證名轉法輪何故要至鹿苑之中方名轉也婆沙百八十二云轉法輪何故要至鹿苑之中方名轉也婆沙百八十二云轉法輪有二種一自相續中轉二令他相續中轉菩提樹下是自轉鹿苑是令他轉佛以利他為正所作故依令他轉說為初轉廣說如彼若准大乘瑜伽九十五義意大同故彼文云復次由五種相當知名為善轉法輪一者世尊為菩薩為得所緣境界謂於因位為求了知所緣諦境二者為得所得方便方便者巧智也謂求於三轉法輪中生三道巧智也三者證得自所應得前來既求今此既證也四者得已樹他相續令於自證深生信解樹者俗書訓為立也謂自證已復於他身立聖道也由令他證便信佛證也五者令他於他所證深生信解佛起世俗心了知陳如已解我法意令地神等知佛此心便信陳如證也次下論文釋此五相意云第一所緣境者即四聖諦第二得方便者謂於四諦三周正轉十二相智謂依十二相而生智也最初轉者謂昔菩薩入見道時知是苦諦乃至道諦於中聖智能斷見道所斷煩惱名之為眼依此聖眼斷去來今三世惑故如此復名智及明覺若准此律有六種名謂智眼覺明通慧也如下辨第二轉者謂是脩道謂此猶於更有所作應當知其未知苦乃至應當修其所未修道生眼智等准前應知第三轉者謂是無學謂所應作我皆已作生眼智等亦准前知若准婆沙阿毗達磨諸論師義及俱舍二十四并此律文一一諦中別辨三轉且婆沙七十九云如契經說佛告苾蒭此苦聖諦我昔未聞於此法中如種作意由此便生眼智明覺此是初轉此苦聖諦慧應遍知我昔未聞乃至廣說此第二轉此苦聖諦慧已遍知我昔未聞乃至廣說此第三轉集滅道諦廣說亦爾此後三諦論中略敘彼論中釋三轉如次即是未知當知根已知根具知根也即同瑜伽見修無學三道彼論又云大德法救云我思此經舉身毛竪以佛所說必不違義合此經義何以越次謂於具知根後復說未知根故然彼大德遂迴經云應言此苦聖諦我昔未聞乃至廣說集滅道諦廣說亦爾此為初轉此苦聖諦慧應遍知集應永斷滅應作證道應修習昔未聞等廣說如前此第二轉此苦聖諦慧已遍知集已永斷滅已作證道已脩習昔未聞等廣說如前此第三轉阿毗達磨諸論師言不應輙迴此經文句過去無量諸大論師利根多聞過於大德尚不敢迴況今大德而可輙迴但說法者依二次第謂或有依說法次第或復有依現觀次第若依說次即此經是若依觀次即如大德今准瑜伽同法救義也若准律文即同諸論師義也瑜伽又釋第三證得自所應得者謂無上正等菩提理實見修無學三道皆得今約極處且言得菩提第四樹他相續令於自證生信解者謂憍陳如從佛聞已最初解悟等第五令他他所證生信者陳如證已起世俗心云我已證如來復起世俗之心云陳如證並起世俗心者意令地神證展轉相告乃至梵世上來義釋准瑜伽意非錄文也婆沙百八十二釋聲至梵天瑜伽又云當知世尊轉所轉法置於阿若憍陳身中次復隨轉置餘身中彼復隨轉置餘身中以是展轉隨轉義故說名為輪正見等法所成性故說名法輪即正覺是道之中等者等取正思等七也此中既言轉所轉法故知即轉世尊身中三轉聖道至憍陳如等身中名為所轉也第四問答分別者問凡入道法從五停心別相念次起𤏙等方入見道何以陳如不說五停直教四諦答婆沙第六前三善根皆命終捨俱舍二十三云若先已得𤏙等善根經生故捨遇了分位善說法師便生頂等若不遇者還從本脩述曰何妨陳如等先世已曾起𤏙等法故今世尊直為宣說四聖諦法聞已入四善根位乃至見道舍利弗等暫聞諦理即入聖道並准此釋第五大門緣諦行相者大小乘宗皆言緣諦各四行相謂緣苦諦四行相者一苦二非常三空四非我集四行者一集二因三生四緣滅四行者一滅二靜三妙四離道四行者一道二如三行四出也行謂行解相謂相狀婆沙七十九云問何故名行相行相是何義答於諸境相簡擇而轉是行相義謂以聖慧作簡擇行解釋十六行者婆沙兩釋俱舍二十六具敘婆沙并有世親自作兩釋大妄戒中已敘初釋餘不能敘今應略敘大乘宗意苦四行者如雜集論第六卷釋今略述意不謹錄文所言苦者或有三苦或八苦相言無常者略有二義一者無謂遣除義也常一切時義也蘊界處中無此常故名曰無常二者變異滅壞義等名曰無常所言空者蘊界處中我我所等人法皆無名之為空即此無我所顯空性其體是有此則空及空性皆名為空言非我者外道等執我我所相今蘊界處非如彼相故云非我集四行者如雜集第八今亦述意所言因者業感種子是能引發名言種因所言集者即名言種是五趣中敢集生因所言生者即由前說業感種子及名言種於趣生中各差別生所言緣者由業勢力令諸有情捨曾得身得未曾得即說業勢名之為緣滅四行者如雜集第八今亦述意所言滅者集因之中煩惱永滅所言靜者苦果之中取蘊永盡所言妙者謂真性中由煩惱滅其體是淨由苦由盡其體是樂即樂淨體名之為妙所言離者最極安隱永不退故名之為離道四行者如雜集第十亦且述意所言道者是諸聖者證真義路真義即是涅槃所言如者一切煩惱皆不如理道能除此是故名如所言行者辦事名行謂能成辦覺真實義所言出者涅槃名出此能趣故得彼出名此十六行通聞思脩有漏無漏如𤏙等位及後所得世俗智必並是有漏略知如是然前門中三轉十二者且就四諦各一行說若具足說十六行相及成十二轉四十八行相也故婆沙七十九云問此應有十二轉四十八行相何故但說三轉十二行相耶答雖觀一一諦皆有三轉十二行相謂一一諦各四行相四相各三故成十二苦諦既爾餘三各然而不過三轉十二行相如預流者極七返有等預流理實二十八生而不過七故云極七也然婆沙意三轉各觀一諦四行故成十二瑜伽論意三周遍觀四諦各一故成十二然復婆沙就說法門是故總說三轉各觀一諦四行理實見道決定唯觀一一諦中四行隨一定無遍觀一諦四行𤏙等位中理真許觀一一四行西明法師解深密疏第五卷中云一一轉各生眼知明覺故成十二餘三諦各爾合成四十八行相者深為謬也彼法師以俱舍二十四文云即於如是一一轉時別別發生眼智明覺說此名曰十二行相法師乘此眼智明覺成十二行今詳論云別別發生等者意顯苦等四行名為別別也乘此別別成十二也如是義門無邊差別且為開智略示方隅耳次隨疏釋疏云次釋其文等者上釋名門雖已略辨今復隨疏逐要釋之文云苦盡聖諦者滅諦也疏云此實三諦無處等者苦盡集已諸宗同許道諦無處名為滅諦者依成實宗空心滅處以顯滅諦是其義也若依婆沙七十八釋此義云問集亦應滅如何但說苦滅聖諦答此亦應說集滅聖諦而不說者是有餘說乃至復次若說苦滅應知已說集諦亦滅要滅其因果乃滅故廣說如彼道及道具者正見是道餘七是道具也文言苦出要聖諦者婆沙云趣苦滅道聖諦是也彼論云問此應說趣集滅道如何但說趣苦滅道答應知此是有餘乃至若說趣苦滅應知已說趣集滅要趣因滅乃滅故以乃至復次為欲遮遣諦道者故謂有無學未命終間受種種苦如受四百四病等世人便謗道不盡苦故世尊說聖道能滅後有眾苦由如是等種種因緣但說趣苦滅道而不說為趣集滅道第三辨相或有疏本云第三說相疏意此下正顯三轉文也疏云初三轉十二法轉第二此苦聖諦已下舉上十二轉一一能剋六種功德勸脩而未得益者不得意也謂疏意云智眼覺明通慧等大望陳如等實未證得也今詳准前義章中所引正理婆沙瑜伽意並說云三轉法輪所生眼智眼覺並據世尊身中自證舉此自證宣說向人非望陳如以辨三轉也此後律文意亦如是故後文云我於四諦三轉十二行相如實而知我今成無上正真道而無疑滯故知亦同諸論意也故今更解依瑜伽九十五判為王相一者前初文云四聖諦何謂為聖諦乃至此苦出要聖諦我已修者此顯世尊為菩薩時謂得所得所緣境界謂求知此所緣境界也此即第一相也二者文言此苦聖諦本未聞法乃至是謂四聖諦者顯世尊為菩薩時為得所方便謂求生此三轉巧增智此即第二相也三者文言若我不脩此四聖諦三轉十二行如實而不知已下為顯世尊證得自所應得謂即已證三轉之中眼智明覺得大菩提此即第三相也四者文言如來說此四聖諦眾中有無有覺悟者已下為顯世尊得已樹他相續令於自證深生信解此即第四相也五者文言爾時世尊已知阿若憍陳如心中所得已下為顯世尊令他於他所證深生信解令他地神等知他陳如得證而生信此第五相也又云示相勸修等者並失義意也上義門中略敘訖今詳五相科文之中初相文云當修八正道者意云我昔既求所緣修八正道而後得證汝亦當修然必得證曉前諸義訖餘如疏釋死者盡也者不然此中意顯死位之中未命終前受逼迫苦非謂己命盡也未受惡法者怨逼名惡非謂三性之中惡也有心同惡名增者惡字愛故反也眾苦熾盛名五盛蘊苦者婆沙七十八廣釋前之七苦義訖次文即云如是諸苦皆是有漏取蘊所攝故名略說一切五取蘊苦述曰今疏中云七苦並集義即同彼而言眾苦熾盛者理恐不然也今詳盛者受義取義也即是五取蘊也然言諸苦皆取蘊攝者之七苦隨其所應即是苦樂二受受蘊攝也論云愛別離時所有苦生者舊婆沙文也新婆沙七十八云諸可愛境遠離身時引生眾苦故名愛別離苦其義同也五盛蘊苦總收三苦者准諸論中苦苦即以苦受為體壞苦即以樂受為體樂必歸壞而生苦受以果推因故知亦苦行苦即以捨受為體前之七苦若配壞苦即顯樂受若配苦苦即顯苦受今說取蘊非但攝前復顯捨受是故總收三苦義盡雜集第六以三攝八與此雖異此中疏義理亦可通勿謂為妨略舉一貪者意說十使雖皆發業且於十中舉一貪也業與臨終妄受相應者謂潤業煩惱也大乘薩婆多等一切煩惱皆能潤生於中愛增說為愛取成論十五雜問品中破云有人言欲界繫一切煩惱能使欲有相續色無色界五如是是事云何答曰但愛能令諸有相續廣說如彼花池等解者成實論第十五明因品云眾生以癡力故顛倒心生將命終時遙見地獄謂是花池以貪著故則於中生上來疏釋恐不契文文意云緣愛本所生與欲相應受樂此顯愛後有愛喜貪俱行愛彼彼希樂愛也此四愛上義門已辨訖謂現與後自身及資具名愛本也緣此愛本生四種愛故云緣愛本所生也此生也此生愛與欲相應希求受樂也此釋決然勿復疑惑彼愛永盡煩惱無處等者此釋決定不契文意也今詳彼愛永盡者四愛斷也此總顯集諦已也無欲欲界愛盡滅色界愛盡捨無色愛盡出要解脫顯有餘涅槃永盡休息無有樔窟顯無餘涅槃此釋決定亦勿疑之一一轉下各彰六種功德者疏配六通尋之可見又云此是中道因家之果者意顯後時當得此果非謂陳如見道之時已得此果疏意且然依前五相判文此則違理也瑜伽婆沙俱舍正理並言生眼智明覺四種功德此律更加通生慧生故成六也崇云此是見道位中何以舉通來勸斯實利生非是未得此疏前云未實得益故彼破之也如婆沙云一一轉時各別發生眼智明覺眼是觀見義智是決斷義明是照了義覺是驚察義更加通生慧生通是除障義慧是簡擇義以此解文不違正理冀諸學者詳而鏡之今詳彼師云是見道位中者遍違諸論三轉配見修無學三道也瑜伽釋眼智明覺如上章中已辨訖婆沙七十九有兩釋於中後釋如崇己敘然前釋中次第以配法忍法智類忍類智廣敘已訖任依一釋然加通生慧生者通謂辨說無疑滯智慧謂傍修世俗智也阿之言無若猶如也者婆沙百八十二云以憍陳那先見法故因斯號彼為阿若多述曰阿者無也此是所悟之理也若多此云知也此是能證智也義翻為初智也乃至盡苦原者戒之功力者謂由受戒後當漏盡非謂正受之時已盡苦原也故十誦律云諸佛法王自在力故一唱善來無有學地而命終者轉名而說者謂轉苦集滅道之名以為呵欲等語也一釋如疏今更詳之此名三德契經也一者布施為欲令彼離貧窮怖是故為彼說施契經二者持戒為欲令彼離惡趣怖是故為說持戒契經即離二怖是生天法三者修習謂如文言呵欲不淨等為欲令彼離生死怖是故為說修習契經故名三德契經也呵欲不淨者欲界苦集也有漏繫縛者上二界苦集也讚歎為樂者滅道二諦也即於坐上諸麤垢盡得法眼淨見法得法者如婆沙百八十二雜集第九集論第五瑜伽八十三及八十六並釋此文且婆沙云此中遠塵者謂遠隨眠謂貪嗔等十隨眠如上辨離垢者謂離纏垢俱舍二十一頌云纏八無慚愧嫉慳并悔眠及掉舉惽沉或十加忿覆述曰纏或有八或言有十也垢者六垢即彼頌云煩惱害恨諂誑憍述曰此六從煩惱生有穢汙相故名為垢於諸法中者謂於四聖諦中也生淨法眼者謂見四聖諦淨法眼生即當此律得法眼淨也見法得法彼論不釋若依瑜伽八十三有一釋云麤者所謂我慢及見所斷一切煩惱我慢大乘通見修斷今意欲取見斷者垢謂二品所有麤重此麤重言意曰種子故彼論八十六云由彼隨眠得離繫故名為離垢於諸法中者謂於自相共相所住法中謂真如法是彼色聲等自相及常無常共相所住更也此意云證生空真如也言法眼者謂如實現證唯有法慧謂無漏證真如法了知無我也顯根本智也言見法者謂於苦等如實見故此顯後得智緣安立四諦言得法者謂隨證得沙門果故次第證者見道同時證得初果若超證者或證二三也自餘論釋不能繁敘多論一解等者多論第二文也謂三人中自有兩義一是佛父親二愛多也謂貪愛煩惱多二人亦有兩義一是佛母親二見多謂五見煩惱多今詳此律二人三人所乞得食皆足六人並是食前若准婆沙百八十二不同此律故彼文云於日初分為二人說法令餘三人入村乞食彼所乞食充足六人於日後分為三人說法令餘二人入村乞食彼所乞食充足五人世尊性離非時食故如是教化經於三月有說四月令彼五人善根熟已於迦栗底迦月白半八日時憍陳那最初見法述曰未制非時食故五人暮食也第三是故諸比丘已下廣類如破者古人而字多作如字也復有疏本云廣類以破須陀洹人實無身見可破乃至猶有慢心我故者疏主見薩婆多宗定無身見復見成實第十七滅法品云學人或時散亂念故則起我慢遂作此釋意云我慢者恃我而起慢即是慢也慢通脩道所斷故今破之今詳不然謂成實宗許有學人猶起我慢若薩婆多我慢雖通修道所斷然不現起如俱舍十九意云我慢既由我見所增我見已斷皆已折故聖不能起今若許具實無身見是則我慢必不現起何須破之然成實宗意許預流我見猶有是故我慢亦得現起故今破者正破我見此義即同大乘宗說唯識第二云然諸我執略有二種一者俱生二者分別俱生我執細故難斷後修道中數數修習勝生空觀方能除滅故知有學猶有我執分別我執麤故易斷初見道時觀一切法生空真如即能除斷故初見道但斷一分我執疏云色應不增益而我不受苦者尋諸律文皆云若色是我者色不增益而我受苦疏中准義云不受苦今詳文意色不增益者反難也而我受苦者順難也是我所不者是餘四陰若色是我受是童僕等三合十二句又有疏云是我所不者是餘四陰若色是我童僕等三合十二句此本意云以色為我其餘四陰為童僕等故成十二復有疏本云是我所不者是我色陰定實不五比丘並以己之解心對佛故曰非此本意云是我家之色陰是定實不此意即以色陰為所也良由前後疏本不同也且釋初疏本云色是我受是童僕等三者等取想行識各有童僕等諸句三也且如色是我以受為童僕等一句三者婆沙第八云於餘四蘊展轉隨執一是我已然後於色執為有如人有財有瓔珞等此是第一執也於餘四蘊展轉隨執一是我已然後於色執為我所如人有待有童僕等此是第二執也於餘四蘊展轉隨執一是我已然後於色執為我器我處其中如油在麻中乃至乃在鞘中等此是第三執也乃至觀識各有此三准此婆沙五蘊皆得執為我所各有三句便成十五句也今疏中為色為我是故就中且除色蘊計餘四蘊故云十二也餘四為我各有十二合六十句我所見若并我見即六十五即是此中是我所是彼所謂我所見也者疏意云文中雖言是我所不理實即含我所彼所二義也此二義謂是我所見也文言一切色過去未來現在色等者此十二種色俱舍第兩釋一云無常已滅名過去若未已生名未來已生未謝名現在自身名內所餘名外或約處辨眼等六處名內色等六處名內有對名麤即五根也五境也無對名細無表色也或待立如一極微對多積集名為最細餘皆類知染汙名劣律名為醜不染名勝律名為好去來名遠現在名近乃至識蘊應知亦然而有差別謂依五根名麤即五識心聚唯依意根名細即意識心聚或約他辨下下地麤上上地細毗婆沙師所說如是此第一釋大德法救云五根所取名麤色即色等五境也所餘名細色即五根及無表也非可意者名劣色所餘名勝色不可見處名遠色如他方色在可見處名近色如星月等一切准知過去等色如自名顯三世及內外也受等亦然隨所依力應知遠近謂他方人身之中所有受等名遠等麤細同前同前婆沙師依五根等也瑜伽五十六亦釋此十一種不能繁敘今詳疏中五根為麤四麁為細理恐不通也餘義容得也無色界色者如仁王經上卷釋迦牟尼佛頂上出千寶蓮華上至非想非非想天光亦復爾又云時無色界雨無量無變大香華香如車輪華如須彌山王如雲而下唐朝已後諸法師釋云此是定果色今詳未必然也應檢悲華經成實說論中許無色界有業果色亦應撿之廣類破中律文云一切色非我非彼所彼我所述曰疏中開非彼所為兩句也文言耶輸伽已學智無學道智也學道修道智也諸塵垢盡得法眼淨見道智也文言即如先所見重察者如先見道中八智所見今重起之以斷餘惑也八忍必不重起文中梵志諮訪六師宗雖有六而有十人也第一不蘭迦葉正梵音云布剌拏迦葉波也布剌拏此云滿也此是名也迦葉波此云飲光此是姓也二末佉梨正梵音云末薩羯梨此云常行也此外道常行不住三劬奢離梵云瞿舍梨此云牛舍也此是母名也其母本生牛舍之中因為名也子名應云牛舍子也四阿夷頭梵云阿耆多此云天勝也此外道自云世天勝我也五翅舍欽婆羅梵云繫奓欽婆羅此云髮衣也此外道著此衣也六牟提侈婆休有律本闕牟提兩字此名詳之七迦旃延梵云迦多衍那此云算數也上古有仙常念算數因為姓也八訕若梵云柵門耶此云圓勝此外道自云我最圓勝九毗羅吒子梵云迷羅和弗怛羅此云空城子也其母生處國為母名十尼揵子梵云尼犍爛徒此云離繫也此外道裸形無衣以手乞食常行不住執為離繫佛毀為無慚外道准涅槃十九列六師名一富蘭那當此第一二末伽梨拘賖梨子當此第二第三三刪闍夜比羅胝子當此第八第九四阿奢多翅舍欽婆羅當此第四第五也五迦羅鳩駄迦旃延似當第六第七也六尼乹陀若提子當第十律中闕無若提子也六識開導所以為王者開避導引後念心聚唯是心王不通心所也若據等無間緣即心心所皆引後念不同開導依也以染成者者若准瑜伽第十九染者即是所染心王也與染等者顯能染之中三界貪也不染則無垢者無二種垢一無相應貪垢二無貪所感果垢也染者謂之愚亦有二種染一相應貪染二貪所感果染也彼瑜伽文甚難見意不能繁敘傳言者相傳言也我已脫一切因患盡者內身外境皆是生染之境故云一切也凡夫第六意識尚不為五塵所染者意識通緣六界何以言不染也今此偈意云五識緣境而不染者由第六識有能治道我於第六之中既得無欲故雖五識緣於五境而不染著故有頌云妙境如本住世間智者於中已除欲多論牛呞比丘者多論第二文也廣現神變者瑤云散說十八總但有八今詳十八變者攝義不盡以其十八皆是神境智通所攝如下文中知迦葉心是他心通故應釋云廣為迦葉現六神通也此據總說不必要須具現六且十八變者束為頌曰震動自然流布示現轉變往來卷舒身同類隱自在制施辨念樂放光明述曰其義廣如瑜伽三十七云謂佛菩薩神境智通略有二種一者能變通二者能化云何能變謂十八變一者振動二者熾然三流布四示現五轉變六往來七卷八舒九眾像入身十同類往趣十一顯十二隱十三所作自在十四制他神通十五能施辨子十六能施憶念十七能施安樂十八放大光明廣釋如彼今略論者振動者乃至無量無數三千大千世界皆能振動熾然者從其身上發猛焰火於其身下注清冷水身下反上入火界定舉身洞然出種種焰青黃赤白乃至頗胝迦色流布者流布光明無數世界無不充滿如前振動示現者悉令現見下諸惡趣上諸人天諸餘佛土及彼土中某名如來等轉變者地令成水火風等亦爾好色有情令成惡色惡色反此肥瘦亦爾往來者牆壁山石縱身往來乃至梵世色究竟天或傍天量或遠令近等卷舒者能卷雪山王等如極微或復反此眾像入身者一切色像內己身中令諸大眾各各自知入其身內同類往趣者或能往趣剎帝利眾同其色類如彼形量似彼言音彼若以召如是義二即以此召如是義然後為其演說正法化事既終歘然隱沒沒後時眾遞相顧言天耶人耶往婆羅門乃至二十八天等亦爾隱顯者於大眾前隱沒自身復令顯現所作自在者普於一切諸有情界皆自在轉令去即去令住即住令來即來令語即語制他者普能制伏其餘一切具神通者施辨者若諸有情辨才窮盡能與辨才施念者於法失念能與憶念施樂者令聽法時身心輕安令離蓋專心聽法疾疫令息放光者或有一光往十方面令惡趣等息彼眾苦以要言之能作無量無數利益之事論中釋云轉變所餘有自性物令成餘物故名能變神境智通論云云何能化境智通謂若略說無事而有是名為化述曰謂化似自身或似他身或化飲食一時化作種種形類或化為語等無量差別准此論文若言十八不攝化食等又此律中化迦葉時無施辨施念等隨准可知文云鴦伽摩竭國中皆稱為阿羅漢者真諦部執疏云佛滅後二百年大眾部住央掘多羅國此國在王舍城北故知央伽在摩竭之北也然尋文中現神變細分有三十五事也瑤云總但有八者即是科文也一自在神通相教化如伏龍火光三昧等今詳不然伏龍即是制他神變火光即是熾然神也二速疾神通相教化如取菓等今詳乃至取曼陀羅華等並是往來神變三感供神通相教化如諸天來等今詳若為化迦葉佛力令彼梵天等來即是所作自在神通若天自來即非十八變攝可依瑤釋無爽四化心神通相教化如知迦葉心等今詳即他心通也非十八攝也文言書同味處者書同取靜處也五如意神通相教化如池石樹等今詳池石或非十八攝也如前感供義釋云樹者即是轉變神變六分身神通相教化如化五百等今詳此是能化神境通也火爐亦是七禁呪神通相教化如破薪瓶水露地經行等今詳此是自在所作神變何因乃言禁呪耶佛豈可禁呪也八無礙神通相教化如船上出等今詳是往來神變三事教化者瑜伽二十七名為三神變婆沙一百三名為三示導一神變示導二記心示導三教誡示導此三即是神境他心漏盡三通也問何故名示導答示謂示現導謂導引現希有事引入正法故名示導如守門者示現內事導引外人謂彼侯王若不澡浴𮄊食觀寶即便引現惑示現外事導引內人謂彼伺外貢猷珍奇殊方信物引內人受如是示現佛正法中微妙功德方便導引所化有情令其趣入故名示導又云問何故六通三是示導三非示導答現希有事令他信伏故名示導三有此義餘三不然謂若自說我能遠聞我能遠見我能遠憶諸宿住事他皆生疑為虗為實不即信伏故非示導曾聞有一居士信外道法屈請離繫親子及彼徒眾來起其家供以餘食離繫親子適入其家即便微失笑居士恠問師離掉舉何故笑耶彼遂答言吾有妙德汝在家者量盡知耶於是居士殷勤問之彼便者日捺末陀河側有二獼猴共鬪不已俱墮彼河為水漂溺吾慜而笑居士讚言甚為希有食時既至居士念言我當日食驗彼虗實便以餘覆曤先授與師以曤沃飯與彼弟子弟子受已即食師獨不食居士問言大師何緣不食便言無曤居士調言奇哉天眼乃能遠見不能近觀外道師徒時深慚恥故天眼等不即令他即信伏故如何可引令入正法故非示導若為示現神境智通變一為多等令多有情深心信伏引入正法故名示導若為示現他心智通記說彼心思念差令多有情深心信伏引入正法故名示導若為示現漏盡智通隨其所宜教誡教授速令見諦展轉乃至永漏永盡令多有情淨心信伏引入正法故名示導第一明因熾然者疏意三毒為因能抓八苦故名因也然依瑜伽第八雜集第七貪嗔癡三自有多多或名株杌對治道犁難可壞故或名為垢乃至或名熾然瑜伽云如大熱痛故名熾然謂熱勢謂熱惱身心雜集云由依止貪嗔痴故為非法貪火所燒具以三毒為因而生決重貪果以惱身心也准瑜伽意貪等三毒當體燒惱名熾然准雜集意貪三種從果為名也今詳律意貪等三種體是熾然其根境識及所生受并所受果八苦等類相從說為熾然也於此相從之中疏判以為因果者亦不違理也然疏意依成實宗義之也增上緣以生熾然者眼根與眼識以為增上緣也緣緣中以生熾然者舊名緣緣新經論中名為所緣緣也謂色境是眼識之所緣緣也次第緣中以生熾然者新名等無間緣也四緣義上受緣中已略料記一釋謂和合以生熾然者謂依薩婆多宗心所法中自有觸體根境識三和合之時有此觸生力增長餘心心所又依成實論宗者彼宗離心無別心所即從識後以生於想上即於想義說為觸然初誠心創了境故取彼自相非假安立也次起想心取境別相安立怨親中庸差別故云想是對傁之初也即成實第八想陰品云取假法相故名為想因於三想者一怨想二親想三中庸想也遠生三毒者彼論宗意云怨想之後即生苦受苦受之後即生嗔心親想之後即生樂受樂受之後即生貪心中庸想後即生捨受捨受之後即生癡心既隔三受故云遠生也三受報法者彼宗識想受三種心雖復取境實假不同皆是報法即異熟無記也不能發智斷彼資道緣中貪味之過者此顯未斷欲界之中段食貪也亦復不能斷彼色貪者謂未斷欲界婬貪也女是所愛色境及祀者婆羅門法煞羊祀天須大婆羅門教其祀法其婆羅門此時廣受種種供養故貪此供也文言不異不可異者一釋如疏或應更釋言不異者不異世尊所立真道也不可異者外難不能令其屈狀也初一上三等者疏意云勇猛者顯佛釋進也一切解者顯佛智同德也次二句顯佛無貪善根也謂於受欲而生慚愧慚愧即與無貪相應也疏意總顯佛三圓德一智圓德二斷圓德三恩圓德化生者是尋之可見普曜經答偈云吾師天中天三界無極尊相好身丈六神通遊虗空第二偈云化訓去五陰拔斷十二根不貪天女位心淨開法門初句顯無餘涅槃令陰永滅證也次句顯有餘涅槃謂十二有支無明為根也斷此根故即須斷集智也一切諸法本集諦因緣空無主以從緣生故空無我此顯苦諦息心修道智也違本原於滅智也此律三問答亦含三者一問汝為誰意問云汝是人師為是弟子師字誰問師名也學何法問所學法一答我師大沙門是我所尊答第二問我從彼學答初問自表是弟子三重舉第三問云即復問乃至說何法耶答云我年幼稚已下是也章中引智論第十三不依文也彼文云諸法因緣生是法說因緣是法因緣盡大師如是說章中第三句謬加及字舍利弗聞此偈已即得初道已上論文初道見道也智論第二十云如佛於四諦或二或三如馬星比丘為舍利弗說偈諸法從緣生是法緣及盡我大師聖主是義如是說此偈說三諦入道當知道諦已在其中不相離故已上論文復言憂婆提舍拘律陀先有要言等者智論十三云大目連舍利弗友而親之舍利弗才明見重目連豪爽最貴此二人者才智相比德行互周行則俱遊住則同止後作梵志其師名那若耶他日其師疾病舍利弗在頭側立目連在之後立其命將終慜爾而笑二人同心俱問笑意師言世俗無眼為愚癡所授所我見金地國王死其大夫人自投大𧂐求同一處二人受語欲以驗之後有金地商人遠來二人驗之果如師語二人憮然歎曰我非其人耶謂非受法之器耶為是師隱我耶謂師恡法耶二人相與誓自若先得甘露要必同味餘事大同此律文憂婆提舍等者前聞法時已得初果後文為說生天等法弟子得果也善見十七云和上者外國語此言知罪知無罪是名和上力生者謂依於師道力得生正梵云鄔婆拖耶鄔婆第耶此云親教或名近誦謂弟子年少常不離師受經而誦也和上或作和闍皆于闐語也見論第一泥瞿陀沙彌言無罪見罪訶責是名我師共於善法中教授令知是我闍梨祇和上四心者尊者云彼無正文義說有四也尸迦羅越六方禮經和上五心檢共行七法後文當釋且為頌曰不作令僧解悔殘及瞻病移處與除疑捨惡并將護見聞具故者有人言若僧知和上有罪則不聽度人今詳疏意對眾相攝令眾同知弟子心伏不伏不敢起非也崇云今者思文撿義未必須在僧中云云多釋今詳此義既非幽玄無勞多釋且依僧祇二十三云欲受具足人初入僧中一一頭面禮僧足已先求和上請文如彼非謂略無者為遣疑情也人言對古師也寄說可知者南山云具脩威儀合掌白師取其進不淨三藏云西方現今合掌低頭設禮一拜便即雙跪請白所營今詳此法太成勞倦但應合掌曲躬而百量宜弟子八句者下說戒犍度約所營事非同伴所詣處非友終參差應為八句彼文但七闕無所營好同伴好所詣非一句也五分十五有諸弟子臨行時辭和上闍梨佛言不聽臨行辭要先二三日白師師應籌量所行往處有可依止人乃聽去到彼住處應先禮塔次禮上坐索屋舍然後永依止依止比丘應問汝和上阿闍梨是誰先住何處誦何經答若如應與作依止若不如法應語言汝不識我我不識汝汝可往識汝處求依止若疑應語小住乃至六宿觀之合意應語如上祇二十八云弟子犯小小戒別眾食乃至截生不淨菓食等應教莫作若言我更不作者善若言但自教教他為者應語知床蓐人和食人斷食若前人凶惡能作不饒益事和上應避去若依止闍梨出界一宿即離依止若和上闍梨不教者越毗尼若弟子為王收錄師不應便遂去應在外伺候消息若王家問准是和上闍梨爾時應入若事狂橫應求知識證明若須財物追逐應與若無應乞求與若二師有事弟子應諫不得麤語如教誡法應濡語諫若言子我更不作者善若言汝非我和上闍梨我當教汝汝更教我汝莫更說若是和上應遠去若是依止應出界一宿還依止餘人若師有力勢應遠去若不去應依止有德重人今詳若作永捨之心出界一宿便失依止功德之法亦失師弟相攝之法若不永捨但失功德不失相攝後但白事功德還生彼律又云弟子若欲熏鉢若取巨磨泥壚及熏時一一應白不能一一白者但言我欲作熏鉢事律文一白通了復問和上闍梨欲熏不隨教應作染衣浣等亦爾染時不得持師衣裹己衣應持己衣裹師衣剃髮時應白師師應問誰與汝剃答言某甲某甲知剃不答言此是眼見事師言不可若言知應觀前人善持戒者應剃與他剃反上說若二師二入聚落後剃髮人來欲令剃者白餘長老比丘師還應白師破瘡廣說應知若受處離穀道四指莫觸餘處應作問齊幾許得不白與取半條線半食是名不白與取與他迎食迷他迎食等悉白出藍門過二十五肘應白而去若經行若坐禪應白令知處所若欲大施應白師師應語出家人要須三衣鉢名師檀漉水囊草屣弟子言除是外一切盡施師應相望若不善持戒不受誦行道應言聽若善知持戒應語布施非是堅法汝依是物以備湯藥可得行道若言我有親里供給者聽若欲行不得臨行乃白應先一月半預白師應問何事故去者若言師營事務不授我經故去若能授者應語莫去若不能者眾中有善持戒誦利者應語於彼授若復無者彼問有知識多聞比丘應遙囑不白而去者越廣如彼律不能繁錄𨵦牡律文作籥母字非此用也牡記文云開下牡也謂對圓開令不可開也辭設推辭其事妄設異端也和上如法所教事者祇二十五云和上闍梨語作是事共法中應作若不作越毗尼若語喚婦人來取須來應語和上闍梨我聞法中不許作已上祗文南山云此律四紙餘文必須別抄依用一則白𫮀我慢二則報恩供養三則護法住持正文住也善見十六若和上將去著衣持鉢隨和上後不得近不得遠去和上七尺而行又後文若和上多有弟子一人供給餘者隨意讀誦阿闍梨正云阿遠利耶此云軌範師或云正行依師行正故云正行也兩益者以教誡故不壞法身相瞻待故不損道器也愚痴比丘盡形壽依止者下文云若愚癡無智者盡形壽依止僧祇二十九云若比丘不善知毗尼不能自立不能立他如是比丘盡壽應依止住十誦二十一云優波離問大比丘應從小比丘受依止住不佛言應受復問大比丘應承供養小比丘不佛言除禮足餘盡應作祇二十六云雖復百歲應依止持戒下至知二部律十歲比丘晨起應問訊與出大小便器唾壺齒木掃地迎食浣衣熏鉢一切供給唯除禮案摩若病時得令案摩教二部律若不能教一部闍梨有五者皮革文云有出家阿闍梨所依得出家者是有受戒阿闍梨受戒時作羯摩者是有教授闍梨教授威儀是有受經闍梨從受經讀誦乃至四句偈有依止闍梨乃至依止一宿捨畜眾者謂和上樂靜自發誓願從今已後不復教授門人故也須意可知者見論十六受戒已多作諸惡不案威儀有小欲知足比丘呵責比丘答誰請大德與我戒誰請大德為作和上乃至世尊因此制不請和上不乞戒不得授具足求解生善行者二十六云有師依止住無衣食湯藥復不能說出家修梵行天上沙門果如是師不問而去此謂無法無衣食也有衣食無法者須問而去無衣食有法者如是阿闍梨共住雖苦盡壽不應去此名苦住依法俱有者如是阿闍梨雖駈遣盡壽不應去此名樂住也並如文辨者即後文自辨也第五門亦復文辨也前文有三者簡小取大簡愚取智簡懈怠制攝授也七羯磨具如呵責犍度罪處所如下滅諍犍度不禮如下尼犍度捨教如下尼犍度惡罵如下增八文覆鉢如下雜犍度究其不同但有十五者第八五中式叉及沙彌尼分為二故言十五然文意者合之為一即但十散亂人即樂看之既廢修道故應呵之若准下增五文云不得往捕魚𩻪人家即是惡律儀家招譏故呵也第三呵者前文云汝莫為我作使也第二呵者莫入我房也第四呵者莫至我所五百文云比丘多度弟子作三師都不教誡犯何事答犯墮昔迦葉佛時有比丘度弟子不教誡弟子多作非法命終生龍中龍逕七日一受火燒其身肉盡骨在尋復還復復已復燒不能堪苦便自思惟我宿作沙門師不教誡我便作毒念其師與五百人乘船度海龍便出水投其船頭眾人問何以投船答云汝下此比丘此本我師不教誡我我今受苦眾人不得止欲投比丘著水中比丘曰我自入水不須見投即便投水命過以此驗之度人不可不教誡也然亦去經宿意者此第二文初之兩句既云決意明知擬宿其第五段雖不分還亦是擬宿故云然也以其依止准一者覺云准一心隔失無餘三句失今觀疏意專相攝授名為准一也此中疏意四句料簡謂從前來辨文四句並是第一心隔宿不隔句也疏云若無輕出界已下第二宿隔止不隔句也疏云無有心宿但隔失已下第三俱隔句也尊者云此俱句理得有且如無心蹔出界外至明相時方決不來是也疏云若蹔出界已下第四俱不隔句也前為力生後為依止者此約和上前在受中名為和上後在隨中由依住故即名依止也是故文中和上然云失依止也若望衣夏四句等者疏中前云衣夏疏中前云衣夏二事唯俱隔失宿隔月前依止說者雖是異辨兩句同異說而義未闇故今具約四句以辨依夏失不也於四句中總為三住一者定失如疏云心病俱隔失二者定不失如疏云不同依止真心隔及俱不隔此二不失三或失或不失如疏云第三宿隔有失有不失一上文得擯者即次前段文也此中疏文不依律文次第也且如疏云二死三去四休道者即是文中第二五中數也疏云五師呵責六入戒場者即是第一五中數也疏云七五歲者還是第二五中數也八見本和上者第三五中數也九還在目下住者第八五中數也除第四以不與依止同第一故者或可更解第一是師呵責第四是捨畜眾故不應除也若欲配文者從疏文云五師呵責者謂五種呵非僧呵也已下配之此言五者疏文數中自當第五而據律文即是第一也疏云見本和上失者本補和上空處既見根本無空可補者即第三五中之一數也自下第二明二師之德中律文云增上淨行者上二篇也增上木叉者二部戒本也此釋且𮨇疏上下意第六少一者第六五中減十歲同第五五中減十歲故也有疏本云窮其實體但三十九此本是正復有疏云但三十七此本錯四辨者斷經論名四無礙解廣如瑜伽四十五地持第七顯揚第四唯識第九婆沙第八十俱舍二十七順正理七十六今略二門分別一釋名二辨體且釋名者是列後釋列名者一法二義三詞四辨俱舍頌云無礙解有四謂法義詞辨舊名如律一法辨二義辨三了了辨此應在第四明之即是辨無礙解也或名應辨或名案說辨也四辭辨此應在第三明也先釋通名者婆沙云何故名無礙解答於所知境通達無滯名無礙解舊名辨者於所知境善能辨了故名之也謂法無礙解於名句文身義無礙解於涅槃勝義或通於一切所詮之義詞無礙解於諸方言詞辨無礙解於正說及道以不退智解無滯礙名無礙解有說於所知境現見而知名無礙解次釋別名者法謂能詮名等法門義謂所詮一切義理婆沙一釋准取涅槃義疏中不約能詮所詮為辨法義乃約世諦差別法相名之為法約勝義諦一味義理名之為義又反釋意云世諦差別有無量門名之為義勝義對彼法門中勝故獨名法前釋是涅槃十七後釋是義准也今依瑜伽婆沙等論此之二諦並是所詮俱是義攝第三詞者即是言詞謂即約聲也第四辨者且依大義善達機宜為彼辨說故名為辨詳其小宗辨無礙解緣說及道者緣說即是緣法與詞緣道即是緣於義境有何別體而別立之故依大宗緣彼稱機而辨說者名之為辨也緣法義等解無疑滯故云法無礙解等也次出體者婆沙云問四無礙解自性是何答自性是慧品類足說無礙解云何謂於名句文身不退轉智乃至辨無礙解云何謂於應理說及自在定慧中不退轉智由此故知慧為自性智即慧故大乘意亦同彼故准唯識論云法無礙解即於能詮總持自在於一名句字中現一切名句字故謂因一字解一切字義無礙解即於所詮總持自在於一義中現一切義故詞無礙解即於言音展轉訓釋總持自在於一音聲中現一切音聲故辨無礙解善達機宜巧為說故述曰既云總持自在及云善達故即以慧為體了了辨也應辨者應機之辨也樂說辨者謂令他人一句義問不能通者必失名聞不歸大法今當與之七日論義乃至第七日舍利弗說欲從思想生尼犍說欲從對起思想謂內心也對謂外境也俱舍第八頌云世諸妙境非真欲真欲是人分別貪妙境如本住世間智者於中已除欲邪命外道便詰尊者舍利子言若世妙境非真欲說欲是人分別貪比丘應名受欲人起惡分別尋思故時舍利子反質彼言若世妙境是真欲恒觀可意妙色故婆沙一百七十三亦同俱舍也文言得正決定心者得初果不壞信決定也故見論十六云脩得四禪亦不得與具足戒要滿四月若得須陀洹即日為受具足戒長阿含第四云佛告阿難我涅槃後諸異學梵志來求為道亦聽出家授具足戒勿試四月所以者何彼有異論若小稽留則生本見涅槃後分下卷臨涅槃時還令試驗見論十六云若髮結外道事火外道不須波利婆沙何以故此二外道有業信因果過去諸佛為菩薩時波羅蜜皆於此道學祇二十四與四月法竟在沙彌下食應日日在前毀呰外道不信邪見種種毀呰若言長老莫作是語彼聞亦有賢善須陀洹等應語言汝還去彼間求阿羅漢若言實無慚愧作泥犁行願拔濟我滿四月心不動者應與出家若中間得聖即名試竟見論十六云若奴主奴出家語諸比丘言若奴有道心者施無道心還復為奴若如是諸者不得度出家五百問云問比丘度人不問本末後知是佛奴而不發遣犯何事答知而度犯重若先不知知便發遣不發遣犯重問其人是上大道人不答非度賊五分十五云佛言聽將至人不識處與出家受具奪三十五事如下呵責犍度釋夷以殘為餘同種類為相似方便名從生更犯覆藏名惡於此難提從四禪起者為見妙色退禪犯戒若不退者不起欲貪理無犯義母論第三禪那陀行不淨已脫三衣著肩上露身而走喟言賊賊邊人問之有何等賊答為煩惱賊劫僧中智者語言尊者波奢善持毗尼能除汝罪即到其所向波奢說答言汝除罪能用我語不答曰無違遣人作大火坑滿中炎火語言汝欲除罪可投坑中波奢先共餘比丘論比丘若直入坑奢汝等捉之此比丘用語直入邊人捉之知此心實即為白四得羯磨已名為清淨持戒但此一身不得超生離死證於四果亦不得無漏功德然鄣不入地獄耳如樹葉落還生樹上無有是處若犯初篇得證四果亦無是處此人雖與僧同處但與其滿途隔治禪病經應檢之遲除致反遲待也其成長此是律文佛阿毗曇下卷請出家闍梨亦得故有文准理不請亦得故不緣也崇云若則折羅漢為上法緣者不應正理今詳立上法好如上受緣中已釋說不知界之大小者意說無樹齊何是界尊者云但齊坐處斯即是界但須先稍寬坐結竟更開中開合容沙彌差教授師界外間遮理亦無爽餘二者謂有祿無名無名無祿然彼律二十四云有祿無名此間不聽餘處聽無名無祿此間聽餘處亦聽疏中不委細也和上前三句者此犍度末有四句文初句有從不持戒和上受戒不知不持次句知不持不知不應從受次句知不持知不應從受不知從受不得戒次句三事皆知前三得戒第四不得今約三衣亦為四句初句不知借謂餘人與僧也次不應借次不得戒唯說應知多論第二云問曰不除鬢髮得戒不答曰得戒但非威儀若無衣鉢得戒不答言得戒問曰若得者何故必須衣鉢答一為威儀故二為生前人信敬心故如獵師著袈裟鹿則無怖三以表異相故內德既異外相亦異述曰此但問其受戒時事不論一形若許一形佛初出家何用剃髮披法服等三衣既是三世佛制何容不著而起是比丘若無受時擬然者必不須戒又此部別不可准用十三難頌邊尼賊破黃五逆非畜二釋名辨難義等者取難相難體得名通塞也釋名解難義者謂因釋名解其總相之義也辨難相者辨難別相前門麤解此門細解故不同也但捉心不固毀犯四禁者尊者云應言不固違於重禁以四不攝尼八夷故亦不得言毀犯夷戒下眾無故又不得言犯婬盜等俗人雖犯不名邊故故初釋違重禁好也見論十七云受外道法下至拔一髮患痛悔還應滅擯簡餘外道者疏意此拔髮不信因果餘信者非難計亦成難志無恒故破內之外道者意欲證成破內正信以成不信因果也若據律文破壞二道即內外俱破無志性故不堪出家現報未移者顯未入無餘也應悟乘崇者應得聖果而不得如五百比丘也瞻波法中第三難名賊心受戒餘處多言賊心入道然謗戒中云賊心受戒也不得受後三戒者且據別解脫戒然彼論第一云若破五戒中重戒若更八戒十戒具戒辨禪無漏一切不得餘汙尼等十二亦爾者亦不得戒及作和上也對內辨邊者疏主意云世人多分曾受五戒若言無戒傷損甚多造論之家何必契理如唐朝靜邁法師翻譯圖記說沙門釋智嚴涼州人也躬往西域以宋元嘉四年歲次丁卯於楊都枳園寺譯普曜經等然嚴未出家前曾受五戒有所虧犯後受大戒疑不得戒遂汎海至印度諮問羅漢羅漢不決為請彌勒彌勒答言得戒嚴甚喜焉彌勒既登第十地滿故可依也尊者云設欲依母論者凡欲受戒必須緣境要期成就世人多就講座之下輙坐受五戒何必即能如法得戒既不得戒毀亦非邊見論十七云沙彌十惡應滅擯謂殺盜婬欺飲酒毀佛法僧邪見壞比丘尼是名十惡法唯壞尼淨行永擯不得出家餘九戒若能改悔不更作得出家此即異部殺等非遂理難通用崇云舊解對內名邊今詳不爾遂列母多二文者今詳還依前解者好見論十七以白衣服強與尼著就行婬不得出家若尼自樂著不鄣出家若初壞不得出家第二壞者不障餘如疏說祇律要須淨尼者祇二十三云破尼淨行者若阿羅漢尼阿那含尼若初中後一切皆名壞尼淨行若斯陀含須陀洹凡夫持戒尼初若受樂者是名壞尼淨行中後不名壞黃門有五者頌曰生犍婬變牛唯生身父母是難如十律說者然尋十律說者然尋十律意同伽論故彼律五十三憂波問中問養兒欲出家應問何何答應問所養母伽論第八云若一女生子一女取養後殺何者得波羅夷得逆罪耶答煞生母得夷并得逆出家時問何者問養母俱舍十八云設有女人羯賴藍墮餘女收取置產門中生子煞何成害母逆答因彼面者身生本故諸有所作應諮後母能飲能養能長成故述曰羯剌藍者此云凝滑父母不淨極相和合如蜜和酪受生七日如酪上膏凝結肥滑也舊真諦亦翻俱舍也又十二句者下破僧犍度疏主釋三个四句云非法想破非法想說非法想破法想說法想破非法想破法想說第一四句也非法不疑破非法不疑破法疑說法疑破破法不疑說法不疑破非法疑說法不疑破法不疑說第三四句也疏主判云前兩四中各前三句墮劫各後一句并第三四並不墮也尊者云計理三个四中各前三墮便成九墮亦須改疏中句法也至破僧法中當辨若邊從逆離云婬盜第者人便生疑云俗人亦有邊也逆從邊合若直言五逆即俗人無破僧也約境事別者由約境故一人容可犯五若論黃門理無並有不對外境故尊者云邊離即有繁文也過若爾逆亦應然答逆為簡輕如煞養母及辟支等但是逆類非正鄣戒若爾賊心云句前四非難後兩是難應簡前四離後成二答二句同對眾法故合也父句如後辨且為頌曰至一二三四皆不共二法至四單說雙四非後兩擯出體中三種出體名三聚出體是總相約三聚也第二墮別出體者於前三聚一一聚一一聚一一聚中自有多法多法之中別指法體第三墮法門出體者即指事出體也謂指律中邊罪者先犯重戒犯尼者若淨種等事也合前二種名法相出體第三門名指事出體也黃門等總三聚為體者身形是色復有內心辨命根四相等即不相應行即是一包二心三不相應也餘九准色者謂邊尼賊破外及五逆並業色作無作也餘二亦爾者黃門二形也餘通身口者邊賊四逆也除破僧故其無作者法入中攝者薩婆多宗無作十二入中法入攝五蘊中色蘊𠬧此即名為法處所攝色也成實亦法處攝然是非色非心行蘊攝逆為難體者逆者逆即是業也義用受攝者障戒之理名之為義義即是用有鄣戒用故若據前二出體等者前二既名法相出體故令得名亦約法相差別道理以為名類也無他人義名曰非人黃門等三者等畜生二形也報事五因者事即體事也餘趣無造此等九業餘趣無戒何有邊罪俱舍等論餘趣復無五無間業尼賊破三據應受者餘趣不應故亦不說如七日藥有多過者有殘觸不受非時乃長等多過也但生二過也但生非時及長也喻意云非畜二難正由鄣戒彼之黃二不由鄣戒如長非時正由口法殘觸等過不由口法也僧但十一者問賊心無戒何名為僧答此約總相相類似僧說也十一頌曰邊尼賤破黃五逆及二形也尼又除破尼立主伴不能破僧但合塵垢不成逆業也十者頌曰邊丘賊破黃四逆及二形也下三各九又除破內不受具戒不成破內九者頌曰邊尼賊黃門四逆及二形二俗准八者又除邊罪八者頌曰尼賊與黃門四逆并二形比丘就事但十等者此並據體是比丘比丘尼等說也若爾黃門二形應是無戒答先受後變據初而說也十者頌曰邊尼破黃門五逆及黃門破僧四二二形名六者頌曰邊破及黃門破僧血二形尼事唯九頌曰邊丘破黃門四逆及二形名五者頌曰邊破與黃門出血并二形式叉等事九頌曰邊尼賊黃門血逆與二形名五頌曰邊賊與黃門出血及二形名事俱八頌曰尼賊及黃門血逆并二形也餘八義局頌曰邊尼賊破內三煞并破僧犯尼等四等取三殺也除二如前者如前除出血破僧並問十三者若須並問何用前來辨體有無答雖復總問若據實理不必一切皆定障戒如尼破僧即非鄣戒故須辨體有無也餘准應知僧祇二十三子注中云佛分已般泥洹故依舊文也故知要須十三具問也古人將分外義以釋邊名即十三種皆應名邊故作具義簡監立名也具義者頌曰內尼通破賊不通黃三殺及非畜二形究竟除出血釋曰由具四義初得邊名一曾得內法今甄眾外內法謂曾受佛戒也簡却犯尼二通僧沙彌同鄣出家簡却二破及以賊心二破局僧賊唯沙彌即非同鄣三不通俗犯簡却黃門三煞非畜二形此七通七眾故四是究竟罪簡却出血即有難言尼後四禁不通沙彌闕第二義應非邊攝若許是邊攝者二破賊心何非邊攝彼即救即言尼犯八重悉不名邊且尼不犯清淨捨戒更欲出家尚不許受何用論邊今師意云汝以分外以釋邊名故有多妨我今釋邊名故有妨邊是十三當體別號分外自用難名釋之故無勞釋也隨僧乞戒作法加被而不得戒是難攝者若爾減年既不得戒應是難攝故應釋云此中難攝要具二緣一雖具眾緣作法加被而不發戒二始終體空不可改轉且如減年雖不發戒害待年滿即非體空如一切青一切黃一切黑一切赤一切白三角眼彌離眼等雖是體定作法加被容其得戒如盲聾等雖不得戒若生盲等猶有差義況暫患者此即容可合其改轉還成淨器祇二十三云盲者若見手掌文若省日已與出家不應駈出聾者若間高聲得出家瘂者不能語用手示語相不應與出家已出家已出家不應駈出此律盖應不得不能乞戒故也祇二十九有四人捨鬪欲家入毗舍離見本讎家一人捉弓一人張弓一人射而不死一人射斷命根後之二人不應出家者應駈出前二人不應出家已出家者置若後作惡應駈出如是惡人若度越毗尼人皆釋云此中二人輕躁無志故制駈出今詳或可二人緣境立心不能決定故不得戒前之二人雖亦不定然猶未作決定煞心故開進不理實四人若能緣境要期決定亦應得戒今且一相說之也明了論中二十人不得戒五黃門生犍妒七十二娘五無間汙尼誓言我非比丘誓言者當此律自言也謂自言犯重非比丘即是罪也偷住人賊住龍攝一切畜生夜叉攝一切非人瘂人聾人瘂聾人不乞戒人遮謂一白遮也述曰不乞戒亦非永定餘准應知五百問云沙彌詐為大道人受大比丘禮後得受戒不答不得述曰但言不得不言不得言不得戒不必是難也八難者三途地獄餓鬼畜生北單無佛法也長壽天非想天八萬劫無想天五百劫人多執常也佛前佛後佛未出及佛滅後也諸根不具知盲聾等鬪於受道世智辨聰多墮邪見故也成論第二四法品云四輪能增善法一住善處二依善人三自發正願四宿善根住善處者謂處中國離於五難離前八中初五也依善人者生值佛世離第六難植善根者不聾瘂等離第七難今未為頌曰三途北長壽前後諸根辨善處摧前五值植願餘三諸根不具等皆無求乞者設有求乞如截耳等亦非離攝餘九業鄣者於中邊尼賊破四種是身口業故云業鄣此辨三鄣謂是三鄣相以種類非是三障正體也三障正體如後引俱舍釋也若望障聞思修唯五逆者次生定受其報名邪定聚故於今生決定不起聖道及道加行也問九業之中邊尼賊破律文亦言於我法中無所長益何得不說障聞思修答此據多分無所長益儻若遇佛大菩薩等教令悔除猶可免墮故名不定聚攝故不說之也若汎論者謂不局明此十三難而是汎論經論之三鄣義也俱舍十七頌云三鄣無間業及數行煩惱并一切惡趣北洲無想天述曰辨體也長行釋五無間可知釋煩惱障云煩惱有二第一數行謂恒起煩惱二者猛利謂上品煩惱應知此中唯數行者名煩惱障如扇搋等扇搋有五謂生犍等故云等煩惱數行難可伏除故說為障上品煩惱雖復猛利非恒易可伏除於下品中數行煩惱雖非猛利而難伏除由彼恒行難得便從下品生中中復生上令伏除道無便得生故煩惱中隨品上下但數行者名煩惱障三惡趣全人中北洲及無想天名異熟障舊名報障此障何法謂障聖及障聖道加行善根決辨寬狹論頌云三洲有無間非餘扇搋等小恩小羞恥餘障通五趣述曰唯人三洲有無間業言非北俱盧餘趣餘界及扇搋等由扇搋等是受行類性極懆動不能定起極惡意樂及彼父母於彼少恩為彼身缺增上緣故既由少恩彼於父母慙愧心復頌中羞即蹔愧是也以無現前增上慙愧可言壞故觸無間罪餘障通五趣者煩惱障中不簡五趣乍言似寬唯取數行其類最少故狹於報也異熟障中三惡趣全人中北洲及想天亦是五趣然是最寬也唯可有擯不擯者若據此律五皆須祇律六中三擯三不擯如後辨也餘類可知者若變為畜說為失戒畜變為人豈可得戒等也三偷者偷法形也如往一人二人處偷對手法可不成賊者疏主難意往一人處兼己為二即偷對手至二人處可知五六二中但盜對手已去者謂五六二句中具有四境至前定偷對手若至後二即偷眾法也問六句中何以無共說戒不共羯磨故無此句也伽祇云何通答伽祇無文云何通偷別法不成賊何須通見論三偷者彼第十七云有三種偷一者偷形二者偷和合三者亦偷形亦偷和合云何偷形無師自出家不依比丘臘不依次第受禮不入僧法事一切利養不受是偷形云何偷和合有師出家受十戒未受具戒往他方方十臘次第受禮入僧布薩及一切羯磨依次受人信施是名偷和合云何俱偷無師自出家依次受臘入一切羯磨受人信施禮拜是俱偷之形者得出家梵云半擇迦此云黃門生黃門者梵云扇搋半擇迦謂本生來男根不滿故不生子犍黃門者梵云留拏半擇迦留拏此云割即被刑者也妬黃門者梵云伊梨沙半擇迦伊梨此云妬也變黃門者即變為根不滿等也半月黃門者梵云博叉半擇迦博叉此云助也半月能男半月不能此且據男若二形人半月作男半月作女亦此中攝也祇律二十三六黃門生者同此律釋捺破者小時捺破割者若王大臣取入割却男根以備門閤此律犍是也因他者因前人觸故身生起身生者男根是妬半同此律釋十律二十一生犍半同此律釋精者彼云何等精不能男因他人婬身身分用是釋不能男身分用者男根起也何等病不能男若朽爛若塗若虫噉是病不能男章云第五聽此家者不然彼云病不能男先與出家受具足已若落若朽爛若虫噉不動謂男報不起名不動聽住雖不動若捨戒還俗出家受具不應與出家若與出家應滅擯衣藥淨法等失不失義者等取受持也律儀便有增減僧尼身中不等故也漸捨之過者若捨具戒唯十戒在雖是漸義今意論漸直於具位而有漸過也能防受體不生不滅者即受中形具俱無作也緣犯俱同煞盜婬等或復緣異謂犯同緣異如長鉢離五衣三衣過俗衣諸諫僧違僧諫尼違尼諫故相久也二宿僧與女宿未具男宿尼與男宿未具女宿兩舌僧聞亂僧尼聞亂尼嫌罵僧罵僧尼罵尼牽僧牽僧出房尼牽尼出房駈僧駈僧出聚落尼駈尼出聚落俗女露屏僧與俗女屏露坐尼與俗男屏露坐漏失僧犯殘尼犯提摩觸犯僧殘尼犯夷索美僧犯單提尼犯提舍尼七滅僧吉尼提有無不同洗淨過分等尼有僧無也輙發日暮等僧有尼無也以具三義等者無知吉罪後若學知亦具三義已起吉罪何因須懺以悟及迷不同伏道以彼自背故伏道無戒可犯無無知罪二無知不續簡不學人罪續不滅三迷悟雖可別時同具修人異於命終命終無續而非道器上持犯中他舌師言無知不可懺無斷續故後若學知解即反或復不須懺命師即難以解反或義容可餘也起惡作豈不須除今類轉根以斷反續義容可爾已起惡業豈不須除若無懺境故更不須懺洗淨等戒對尼作法擯變為僧豈有大僧對尼懺耶餘篇准說比丘犯四種罪者下四篇也初篇同戒不可懺故尼犯五種者尼後四夷是不同故根變罪滅非比丘即尼是見論第八云男子若多罪者而失男根變男女根女人若多功德而變為男子若有二比丘同住而一比丘夜半轉根成女悉得共宿罪若覺知者將至比丘尼等去時不得兩人而往若得四五比丘乃可共往明他炬火投杖行尼寺若遠在聚落外度江若置眾者此無罪也謂若尼寺遠不得遠置比丘眾中無罪也後魏拓拔無從北代州遷都洛陽之後熈平二年洛陽女子王昌蒲年十九化為男子五為續作者初始作名曰五為先行覆竟續與六夜名為續作六夜出罪等准說應知有疏本云不須可有有字錯也有疏云不須互為續作由根本罪已滅竟故僧不同者漏失觸兩麤二房等六戒是是以多論行六夜未竟變行波利婆沙未竟變並清淨住尼變亦是尼不同云謂言人度賊女解舉四獨等十戒等取二受二習捨三實發四諦半月法未行漏未滿若變者皆清淨住若同犯者謂媒謗等七戒等取四諫多論云若比丘犯僧殘乃至十年五年已上疏文同也復有疏云不須年為續作由根本罪已滅竟故是以多論行六夜未竟變行波利婆沙未變並清淨住尼變亦如是若同犯者多論云若比丘犯僧殘乃至十年五年已上故亦同也善見尼雖先覆亦不行覆者彼論第八云若尼時行媒嫁法覆藏不出不發露名不出轉根為比丘不須露藏六夜半罪媒是同戒而言二法並不須作葢部別章中所引應是此文餘處無亦也冐涉義不具者假冐無罪濫涉清眾義不具足且如尼中雖已先覆今創入僧僧中未覆故云不具若至僧中覆者亦應行覆若於不同罪有七情過者今詳同義七皆容有且如到說法非法等起七情過即七皆同也若辨不同即不通七謂前六皆通同犯及不同犯第七惡耶決是同犯定無不同理也且辨前六不同相者如因輙教惱亂僧眾即呵責治或因麤語污家惡行即與擯治或因數犯漏失等故與依止治或因言人遮不至即由此等不見不懺故並容有不同犯也崇云此七羯磨是治人法無不治罪罪謝法何尺此乃云隨謝此難先懺罪既已滅而法存例知變根罪雖已滅治法不謝又遮不至為懺白白衣治法不謝餘者為調伏人法在何失意難此疏獨許遮不至法不謝也今詳先懺罪雖已滅為防更造治法不已論其轉根罪既已滅無更造理故治法謝見論比丘變為尼三衣及藥失受者准義取文非謹錄也彼論第八似其比丘有過六夜等者是疏釋非論文也變後之業亦應不成遇緣者今詳成過緣以尼得與比丘受食故今尼觸即應失受也又法不滿者謂羯磨未竟也五分自截有擯不𢷤者彼律十五一比丘欲火所燒不能堪忍自截其形乃至佛呵癡人不應截而截應截更不截應截等欲心也告諸比丘若截頭及半吉都截蘭若去一卵蘭去兩卵應滅擯若為惡獸嚙若怨家所害已下如疏第二三同外道俗衣者如論第三云若白衣為和上與白衣受具戒為得戒不答得戒諸比丘犯吉述曰此文難可依信此律文云三種人不成也文中截手也已下一百三十三也瞷眼故間反說文戴眼也爾雅馬一眼白曰瞷同也律文作間非象頭等者十律二十一諸鬪將婦聟往行久與非人通生子如是六群喜作罪好人不肯住邊見是人等心自思惟畜好弟子皆捨我去當畜是人無捨去者遂度出家五分十五度截手脚人等乃至如上說等者得鞕壞好相謂打破身體壞身好相也彼律上文不如法度人吉又彼上文度負債人告諸比丘應先問若言不負應度若言負不應度皆突吉羅故云如上說也文言老極者祇二十三云太老者過七十若減七十不堪造事臥起須人若過七十能有所作此二不聽年滿七十康健能修諸業聽與出家太小者若減七歲若滿七歲不知好惡皆不應度若滿七歲解知好惡應與出家違者皆犯越在空已下者制簡前十段文也截手等中有得不得者謂截男根如前釋五句無根中引五分判若臂等無然都去理亦不得若瘂聾者如上十三難義門中引祇律判之餘墮准說亦有九法者一請和上二置沙彌處三差教授四往撿問五喚入眾六教令乞七戒師白八撿遮難九正白四頌曰請置差往喚乞白撿白四故多論凡欲受戒先與說法者說法者說法之道隨機遂要而必不可謹誦一文今且略敘南山羯磨本云應語彼言六道眾生多是戒障唯人得受猶含遠難不必並堪汝無遮難定得受戒汝當發增上心所謂上救攝一切眾生以法度彼又戒是諸善根本能作三乘正因又戒是佛法中寶餘道所無又能護持佛法正法久住又羯磨威勢眾僧大力能舉法界勝法置汝身心中汝當一心諦受抄中更云要而言之不過情與非情空有二諦滅理涅槃成三聚戒趣三解門又言四分是大乘宗以或文言欲求於佛道文皆共成佛道等故須令發大乘以等今詳此言誠為大失不能繁破也推尋可知者此某甲牒間名也從某甲永受者牒請師也今從僧乞也某甲為和上牒間和上名也自說已下牒二師撿問時到已下結成白辭羯磨准知初總者文中初非釋種子總舉標宗也次別者汝一切不得已下別列四戒一一有五初至不淨行舉其止持二若比丘下鄣作犯之過有法喻合法中三者若比丘者舉能人二正明作犯三非沙門下彰其過損准合各三准知第三汝是中下持之時分四不得等者審其持心五自言堪持餘文同前者同上尼律釋也尼律釋云次說四依知足之行於中亦二尼總舉彰益二比丘依糞掃下別列四法初依文二初上品二若得長利下開於中下上品文五一所憑依體二依此已下顯其依蓋三舉時分四審持心五自言堪持藥依之中崇云古來解是內身之穢西方梵僧若有食者眾所不容故今正解是殘棄藥今詳西方外道異見持諱觸穢佛法出家習見者亦內外道世尊善知法相染識機宜即有開處明了論中立大開量即亦通之五百問卷末亦開為藥不能繁敘次總以結勸文二初結受緣具足二汝當善受已下舉益勸持文三第一現付勸持第二餘所未知已下付彼二師隨時教授第三自今已下為防護故增三文云有三法應為解羯磨應見而見應懺而懺應捨而捨應為解羯磨五分駈出即此擯羯磨也下意即此遮不至也羯磨受法全無量事者制初篇前未興羯磨何處得有十三難知上阿難何用問之今更詳之如制三語亦云自制已後下名受具例如即制十三難師亦不復得句人受其故名制後非謂制五篇及料簡弟子十三難也所以開和上以是根本恐留難故是以佛開餘師非根本故不應開者難曰和上是根本尚恐留難而佛開餘既非根本何不恐難亦開許故不應理也應更釋云和上是僧所為故聖開之餘僧體須是僧故不開許
